syntax = "proto3";

package pyramid.data_model.agra;

import "pyramid/data_model/pyramid.data_model.base.proto";
import "pyramid/data_model/pyramid.data_model.common.proto";

// A-GRA ActionType values relevant to the worked example
// (doc/research/AME/a_gra_e2e_worked_example.md): find/search then
// monitor/observe. Not the full A-GRA enumeration -- just enough for the
// proof.
enum ActionType {
  ACTION_TYPE_UNSPECIFIED = 0;
  ACTION_TYPE_FIND_SEARCH = 1;
  ACTION_TYPE_MONITOR_OBSERVE = 2;
}

// The MA_Action tasking payload (A-GRA Command-2 analogue): the worked
// example's "Find the suspected mobile vehicle in area AOI-1 using EO"
// tasking. action_constraints carries the EMCON/keep-out strings verbatim --
// enough to exercise the contract without modelling the full constraint
// taxonomy.
message MA_Action {
  pyramid.data_model.common.Entity base = 1;  // Inherited from Entity

  ActionType action_type = 2;
  string target_object = 3;
  repeated string action_constraints = 4;
}

// The MA_ActionPlan Data-1 publication (worked example §4 Phase A): the
// plan product C2 reads before approving. summary is a human-readable
// projection; the correlation to the tasking is action_id.
message MA_ActionPlan {
  pyramid.data_model.common.Entity base = 1;  // Inherited from Entity

  pyramid.data_model.base.Identifier plan_id = 2;
  pyramid.data_model.base.Identifier action_id = 3;
  string summary = 4;
}

syntax = "proto3";

package pyramid.data_model.common;

import "pyramid/data_model/pyramid.data_model.base.proto";

enum Progress {
  PROGRESS_UNSPECIFIED = 0;
  PROGRESS_NOT_STARTED = 1;
  PROGRESS_IN_PROGRESS = 2;
  PROGRESS_COMPLETED = 3;
  PROGRESS_CANCELLED = 4;
  PROGRESS_FAILED = 5;
}

enum AcceptanceState {
  ACCEPTANCE_STATE_UNSPECIFIED = 0;
  // The request object has been received for processing.
  ACCEPTANCE_STATE_RECEIVED = 1;
  // The request object was rejected before execution.
  ACCEPTANCE_STATE_REJECTED = 2;
}

enum StandardIdentity {
  STANDARD_IDENTITY_UNSPECIFIED = 0;
  STANDARD_IDENTITY_UNKNOWN = 1;
  STANDARD_IDENTITY_FRIENDLY = 2;
  STANDARD_IDENTITY_HOSTILE = 3;
  STANDARD_IDENTITY_SUSPECT = 4;
  STANDARD_IDENTITY_NEUTRAL = 5;
  STANDARD_IDENTITY_PENDING = 6;
  STANDARD_IDENTITY_JOKER = 7;
  STANDARD_IDENTITY_FAKER = 8;
  STANDARD_IDENTITY_ASSUMED_FRIENDLY = 9;
}

enum BattleDimension {
  BATTLE_DIMENSION_UNSPECIFIED = 0;
  BATTLE_DIMENSION_GROUND = 1;
  BATTLE_DIMENSION_SUBSURFACE = 2;
  BATTLE_DIMENSION_SEA_SURFACE = 3;
  BATTLE_DIMENSION_AIR = 4;
  BATTLE_DIMENSION_UNKNOWN = 5;
}

enum DataPolicy {
  DATA_POLICY_UNSPECIFIED = 0;
  // Query existing data only
  DATA_POLICY_QUERY = 1;
  // Actively collect new data to fulfill need
  DATA_POLICY_OBTAIN = 2;
}

message GeodeticPosition {
  int32 latitude = 1;
  int32 longitude = 2;
}

message PolyArea {
  Location base = 1;  // Inherited from Location

  repeated GeodeticPosition points = 2;
}

message Achievement {
  Entity base = 1;  // Inherited from Entity

  Progress status = 2;
  optional pyramid.data_model.base.Percentage quality = 3;
  // Acceptance state for pub/sub request acknowledgement.
  AcceptanceState acceptance = 4;
  // Reason supplied when a request is rejected.
  optional string acceptance_reason = 5;
}

// Base representation of a Requirement to be requested from Component services.
message Requirement {
  Entity base = 1;  // Inherited from Entity

  Achievement status = 2;
}

// Base Entity.
// Allows all CRUD EntityActions.
// This represents a piece of subject matter which has standardised semantics.
// Any service using a specialisation of this type will always have standard (CRUD) exchange mechanics:
// Create
// Read
// Update
// Delete
// The platform specific translation will implement these depending on the target protocol.
message Entity {
  // Identifier for this Entity,
  pyramid.data_model.base.Identifier id = 1;
  // Identifier for the source of this Entity to allow traceability.
  optional int32 source = 2;
}

message CircleArea {
  Location base = 1;  // Inherited from Location

  GeodeticPosition position = 2;
  int32 radius = 3;
}

message Location {}

message Point {
  Location base = 1;  // Inherited from Location

  GeodeticPosition position = 2;
}

// Generic constraint representation, name <> value pair
message Constraint {
  int32 constraint = 1;
  pyramid.data_model.base.Time time_frame = 2;
  bool global = 3;
}

message Ack {
  // success = true means I have done the requested action. ie. Created the requirement (not actioned) or deleted the requirement
  bool success = 1;
  pyramid.data_model.base.Identifier identifier = 2;
}

message Query {
  repeated pyramid.data_model.base.Identifier id = 1;
  optional bool one_shot = 2;
}

message Request {
  Entity base = 1;  // Inherited from Entity

  optional int32 constraint = 2;
}

message DependencyRequest {
  Request base = 1;  // Inherited from Request
}

message Information {
  Entity base = 1;  // Inherited from Entity

  pyramid.data_model.base.Identifier requirement_id = 2;
}

message DependencyInformation {
}

message RequirementSolution {
  // The id of the requirement this solution is for
  pyramid.data_model.base.Identifier requirement_id = 1;
  repeated Action action_list = 2;
}

// Work done as part of the solution such as doing an internal calculation or managing a dependency on another component
message Action {
  Request request = 1;
  optional DependencyRequirement dependency_requirement = 2;
}

message DependencyRequirement {
}

message Capability {
  repeated Constraint contraint = 1;
  Request request = 2;
  bool availability = 3;
  CapabilitySolution solution = 4;
}

message CapabilitySolution {
  repeated Action action_list = 1;
}

message AUTDependencyRequest {
  DependencyRequest base = 1;  // Inherited from DependencyRequest

  pyramid.data_model.base.Time time_frame = 2;
}

message AUTPredecessorDependencyRequest {
  AUTDependencyRequest base = 1;  // Inherited from AUTDependencyRequest

  pyramid.data_model.base.Identifier predecessor = 2;
}

message AUTPositionalDependencyRequest {
  AUTDependencyRequest base = 1;  // Inherited from AUTDependencyRequest

  int32 position = 2;
}

message AUTDependencyRequirement {
  DependencyRequirement base = 1;  // Inherited from DependencyRequirement
}

message AUTPositionalDependencyRequirement {
  AUTDependencyRequirement base = 1;  // Inherited from AUTDependencyRequirement

  int32 position = 2;
}

message AUTPredecessorDependencyRequirement {
  AUTDependencyRequirement base = 1;  // Inherited from AUTDependencyRequirement

  pyramid.data_model.base.Identifier predecessor = 2;
}


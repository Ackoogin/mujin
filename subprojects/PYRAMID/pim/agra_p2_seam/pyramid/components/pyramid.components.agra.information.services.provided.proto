syntax = "proto3";

package pyramid.components.agra.information.services.provided;

import "google/protobuf/empty.proto";
import "pyramid/options/pyramid.options.proto";
import "pyramid/data_model/pyramid.data_model.agra.proto";

message MA_Action_Service_Information {
  oneof payload {
    pyramid.data_model.agra.MA_ActionMT ma_action = 1;
  }
}

service MA_Action_Service {
  rpc Read(google.protobuf.Empty) returns (stream MA_Action_Service_Information) {
    option (pyramid.options.pyramid_op) = { pattern: PUBLISH topic: "MA_Action" qos: { reliability: RELIABLE durability: VOLATILE depth: 10 } };
  }
}


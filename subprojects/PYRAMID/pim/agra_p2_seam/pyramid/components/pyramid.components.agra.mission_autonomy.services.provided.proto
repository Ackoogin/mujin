message MA_MissionPlanCommand_Service_Request {
  oneof payload {
    pyramid.data_model.agra.MA_MissionPlanCommandMT ma_mission_plan_command = 1;
    pyramid.data_model.agra.MA_MissionPlanCommandStatusMT update = 2;
  }
}

message MA_MissionPlanCommand_Service_Requirement {
  oneof payload {
    pyramid.data_model.agra.MA_MissionPlanCommandStatusMT ma_mission_plan_command_status = 1;
  }
}

service MA_MissionPlanCommand_Service {
  rpc Create(MA_MissionPlanCommand_Service_Request) returns (pyramid.data_model.agra_port_grammar.Ack) {
    option (pyramid.options.pyramid_op) = { pattern: SUBSCRIBE topic: "MA_MissionPlanCommand" qos: { reliability: RELIABLE durability: VOLATILE depth: 10 } };
  }
  rpc Read(pyramid.data_model.agra_port_grammar.Query) returns (stream MA_MissionPlanCommand_Service_Requirement) {
    option (pyramid.options.pyramid_op) = { pattern: PUBLISH topic: "MA_MissionPlanCommandStatus" qos: { reliability: RELIABLE durability: VOLATILE depth: 10 } };
  }
  rpc Update(MA_MissionPlanCommand_Service_Requirement) returns (pyramid.data_model.agra_port_grammar.Ack) {
    option (pyramid.options.pyramid_op) = { pattern: SUBSCRIBE topic: "MA_MissionPlanCommand" qos: { reliability: RELIABLE durability: VOLATILE depth: 10 } };
  }
  rpc Cancel(pyramid.data_model.agra_port_grammar.Identifier) returns (pyramid.data_model.agra_port_grammar.Ack) {
    option (pyramid.options.pyramid_op) = { pattern: SUBSCRIBE topic: "MA_MissionPlanCommand" qos: { reliability: RELIABLE durability: VOLATILE depth: 10 } };
  }
}


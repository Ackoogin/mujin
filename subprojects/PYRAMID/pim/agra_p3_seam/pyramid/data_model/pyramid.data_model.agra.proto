  // This element represents the ServiceID of the Gateway Service that sent this
  // message.
  ServiceID_Type gateway_service_id = 1;
  // Indicates an instance of a Waveform Capability command. A Capability
  // command message can have multiple command instances to allow a sequence of
  // related commands in a single coherent message. Each command instance
  // reports status via a separate, independent Capability CommandStatus message.
  repeated GatewayCommandType command = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message GatewayCommandType {
  oneof choice {
    // Indicates a new invocation of a Gateway Capability. Generally, if accepted,
    // the command will result in one or more new Gateway Activities being created
    // and reported via the Gateway Activity message. The request/response
    // interaction terminates as soon as the command is accepted or rejected; this
    // element is not used to interact with an "active" command. Updates and/or
    // additional interaction with the resulting Activity (after the command is
    // accepted) is accomplished via the sibling Activity element.
    GatewayCapabilityCommandType capability = 1;
    // Indicates a command to modify an existing Gateway Activity (which was
    // previously reported via the Gateway Activity message and was marked as
    // "interactive"). The request/response interaction terminates as soon as the
    // modification is accepted or rejected. The modifications are reflected in
    // subsequent GatewayActivity messages.
    GatewayActivityCommandType activity = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message GatewayCapabilityCommandType {
  // composed xsd extension base CapabilityCommandBaseType
  CapabilityCommandBaseType base = 1;
  // Indicates a command to change the connection status of the waveform. Note
  // that this field applies to the waveform's status with respect to joining or
  // disconnecting from the network. It does not directly apply to the
  // connection status of individual links maintained by the waveform. (The
  // waveform's connection status may indirectly impact the connection status of
  // individual data links. For example, a connection request to DISCONNECT
  // would likely cause the individual data links to disconnect and would
  // nominally cause the waveform to disconnect from the network.).
  optional CommConnectionCommandEnum connection_request = 2;
  // Provides a mechanism to command change to settings which a gateway may
  // apply in order to control the operational environment.
  optional GatewayControlType common_settings_change = 3;
  // Provides a mechanism to command change to the configuration of this gateway
  // in regards to Message and Product Processing.
  repeated GatewayConfigurationType gateway_configuration = 4;
  // The Profile to which this activity should be instantiated to.
  optional CommProfileID_Type activate_profile_id = 5;
  // Provides means to control the generation of verbose Activity messages that
  // provide full field reporting.
  optional VerboseStatusType verbose_status = 6;
}

// Utilized to control the waveform setup, modification, and status for a
// capability.
// uci_version: 001.000.000.000
message GatewayControlType {
  // Sets / Indicates whether the capability is silent (No Transmission).
  optional bool inhibit_transmit = 1;
  // Sets / Indicates whether the capabilities receiver is deaf.
  optional bool inhibit_receive = 2;
  // Sets / Indicates whether the capability to not re-trans.
  optional bool inhibit_relay = 3;
  // This element represents the channel width for the receive.
  // xsd type: FrequencyType
  optional double instantaneous_receive_bandwidth = 4;
  // This element represents the channel width for the transmit.
  // xsd type: FrequencyType
  optional double instantaneous_transmit_bandwidth = 5;
}

// Ties the unique gateway - Link - Capability/Activity to Message and Product

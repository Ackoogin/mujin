// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message AccessAssessmentRequestMDT {
  // composed xsd extension base RequestBaseType
  RequestBaseType base = 1;
  // Indicates whether this request for assessment is a request for a single
  // reply, or a request for periodic assessments with a corresponding request
  // to cease periodic assessments.
  RepeatEnum request_frequency = 2;
  // Indicates the time period over which the assessment should be made.
  optional DateTimeRangeType assessment_period = 3;
  // Indicates the time between assessments when performed periodically.
  // Required when the sibling RequestFrequency indicates periodic.
  // xsd type: DurationType
  optional string assessment_interval = 4;
  // Indicates a subject of the AccessAssessment; a column to include in the
  // access assessment table result. See AccessAssessment message for more
  // insight into table structure.
  repeated IdentityKindAssetType subject_object = 5;
  // Indicates an object to assess for each sibling SubjectObject; a row to
  // include in the access assessment table result. See AccessAssessment message
  // for more insight into table structure.
  repeated IdentityKindAssetType object_to_assess = 6;
  // Indicates a modeled "level of effort" to assess per capability per Object.
  // Each Subject-Object pair is a cell in the resulting access assessment
  // table. Each cell can include an access assessment dimension per modeled
  // level of effort indicated here. See AccessAssessment message for more
  // insight into table structure. List size for this element is based on
  // "Select All That Apply" condition.
  repeated AccessEffortEnum effort_to_assess = 7;
  // Indicates capabilities of each sibling Object to assess for each sibling
  // Subject. Each Subject-Object pair is a cell in the resulting access
  // assessment table. Each cell can include an access assessment dimension per
  // Object capability indicated here. See AccessAssessment message for more
  // insight into table structure.
  optional CapabilityTaxonomyUniversalType capabilities_to_assess = 8;
  // Indicates the name of the access assessment to use.
  // xsd type: VisibleString32Type (pattern [ -~]{0,32})
  optional string assessment_name = 9;
  // If TRUE this element specifies that the response to this message should be
  // an AccessAssessmentRequestStatus and an AccessAssessment message. If FALSE
  // the assessment data that is generated should be bundled inside the
  // AccessAssessmentRequestStatus.
  bool results_in_access_assessment_message = 10;
}


  // propulsion energy source of the satellite.
  optional EnduranceBaseType propulsion = 1;
  // Indicates the maneuverability endurance, expressed as the largest single
  // velocity change that could be achieved with the satellite's remaining or
  // planned propulsion endurance.
  optional OrbitalManeuverDetailsBaseType maneuver = 2;
  // Indicates the satellite's remaining or planned operational endurance. It is
  // expected that at least one of the optional children is populated,
  // corresponding to the operational energy source of the satellite.
  optional EnduranceBaseType operational = 3;

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message RadarEmitterIdentityType {
  // This element represents Electronic Intelligence (ELINT) Notation for
  // non-communications electronic emissions. Used to preserve original signal
  // identification in case of modification by subsequent processing.
  // xsd type: NotationType (pattern [A-Z0-9]{5}|UNKN|NONE)
  optional string elnot_identifier = 1;
  // This element (Defense Intelligence Equipment Index) further refines the
  // ELNOT type.
  optional ForeignKeyType dieqp_key = 2;
  // Indicates the general purpose of the detected RADAR.
  optional RadarModeEnum radar_mode = 3;
  // For a Signal/Emitter that can track, indicates the tracking mode inferred
  // from the Signal. See enumerate annotations for further details.
  optional TrackModeEnum track_mode = 4;
  // Indicates the emitter index associated with the emitter. Emitter index is
  // an index into a table/database of emitters. The table/database is generally
  // created in pre-mission planning and included in one or more MDFs. This
  // element is only useful/meaningful to subscribers who are aware of the
  // table/database/MDF used by the publisher. For inter-System
  // interoperability, the sibling ELNOT_ID and DIEQP_ID elements are preferred
  // and likely required.
  optional ForeignKeyType emitter_index = 5;
}


  // request is applicable to all areas. This element is logically ANDed with
  // its siblings.
  repeated ZoneChoiceType inclusion_zone = 1;
  // If specified, indicates the Zone not applicable. If unspecified, then the
  // request is applicable to all areas. This element is logically ANDed with
  // its siblings.
  repeated ZoneChoiceType exclusion_zone = 2;
}

// See annotations in child elements and messages/elements that use this type

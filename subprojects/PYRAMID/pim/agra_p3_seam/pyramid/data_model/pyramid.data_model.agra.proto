  optional FrameOriginEnum origin = 1;
  // Horizontal position from where to begin cropping, starting from the Origin.
  uint32 x_position = 2;
  // Vertical position from where to begin cropping, starting from the Origin.
  uint32 y_position = 3;
  // Width in pixels along the x-axis of the cropped frame, starting at the
  // X_Position.
  uint32 width = 4;
  // Height in pixels along the y-axis of the cropped frame, starting at the

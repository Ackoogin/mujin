  // Indicates a Profile (preset) that is applicable to this Capability. Only
  // the profiles currently available and applicable to this Capability should
  // be listed. A Profile (or preset) is a logical collection of data, whose
  // implementation is not specified, that is used to tailor, configure or
  // otherwise affect the behavior of a Capability. Profiles can vary from
  // mission to mission or even by phases of a single mission. They are
  // generally developed in pre-mission planning and are unique for each
  // Subsystem model. Their content is not standardized by UCI, but the
  // mechanism for advertising their availability and activating them is. Their
  // content is abstracted by the UCI concept of Capability.

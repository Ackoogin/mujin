// Utilized to report current statistics of a link on a communications
// capability.
// uci_version: 001.000.000.000
message CommLinkStatisticsType {
  // Indicates a unique identifier for the configuration of an individual
  // network connection. Provides for the correlation of network link to a new
  // activity or to an existing activity that will be updated.
  optional NetworkLinkID_Type network_link_id = 1;
  // The average Carrier to Noise Ratio for this waveform capabilities links.
  // xsd type: DecibelType
  optional double carrier_to_noise_ratio = 2;
  // The average Signal to Noise ratio for this waveform capabilities links.
  // xsd type: DecibelType
  optional double signal_to_noise_ratio = 3;
  // The average Data Rate for this waveform capabilities links.
  // xsd type: DataRateType
  optional uint32 current_data_rate = 4;
  // In percentile, the average Error Rate for Messages for this waveform
  // capabilities links.
  // xsd type: PercentType
  optional double message_error_rate = 5;
  // In percentile, the average Bit Error Rate for this waveform capabilities
  // links.
  // xsd type: PercentType
  optional double bit_error_rate = 6;

// See the annotation in the associated message for an overall description of
// the message and this type.
// uci_version: 001.000.003.000
message FileMetadataMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // Indicates the state of the internal software object that the data in the
  // message is based upon. The state of the software object is determined by
  // the publisher. The publisher could be the original/master publisher or an
  // intermediary re-publisher such as a persistence/data manager. This element
  // is not a commanded CRUD operation. It is not an indication of the state of
  // an instance of a message. It is not a mechanism for partial, incremental,
  // or fragmentary publication of a message. It is a signal from a publisher to
  // subscribers. For REMOVED state, in particular, some subscribers will mirror
  // the publisher and treat the message as if the object no longer exists, but
  // others, such as mission recorders, might not (in order to support retaining
  // historical records of activity, for example).
  optional ObjectStateEnum object_state = 2;
  // This element represents the details regarding the metadata for a particular
  // file.
  FileMetadataMDT message_data = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.001.002
message FileMetadataMDT {
  // composed xsd extension base DataRecordBaseType
  DataRecordBaseType base = 1;
  // This element represents the unique identifier of the file metadata.
  FileMetadataID_Type file_metadata_id = 2;
  // Indicates the content and format of the File associated with this
  // FileMetadata.
  FileOutputType file_description = 3;
  // Indicates the name of the File associated with this FileMetadata.
  // xsd type: FileNameType (pattern [a-zA-Z0-9_-]+\.[a-zA-Z0-9_.-]+)
  string file_name = 4;
  // Indicates the UCI fluent source or sources of the File associated with this
  // FileMetadata; the source that introduced the File onto a UCI network.
  SourceFiltersType file_source = 5;
  // Indicates the UCI fluent consumer or consumers for whom the File associated
  // with this FileMetadata was created.
  optional SourceFiltersType file_consumer = 6;
  // Indicates the type of source that originally created the associated File,
  // regardless of how/by-whom/when it was introduced to a UCI network. For
  // example, for files created by a Subsystem, the creation source is
  // SUBSYSTEM. For files generated by a non-UCI mission planning system, ground
  // station or other external entity and then introduced to a UCI network by a
  // UCI bridge/adapter Service, a creation source of IMPORTED should be used.
  CreationSourceEnum creation_source = 7;
  // Indicates whether this File has been altered from its original form by a
  // user, external (i.e. non-system) component or other untrusted service.
  bool untrusted_modification = 8;
  // This element represents the time and date in when the File was created.
  // xsd type: DateTimeType (pattern .+Z)
  string timestamp = 9;
  // This element describes the security level of the file corresponding to this
  // message. The security level of this message itself is indicated in the
  // message header.
  SecurityInformationType security_information = 10;
  // Indicates the cryptographic hash for the associated file. See annotations
  // of this element's type for further details.
  // xsd type: SHA_2_256_HashType
  optional bytes sha_2_hash = 11;
  // Indicates the unique file metatdata ID of a file that is being associated
  // with this file. The associated files may have been created together or are
  // used together.
  repeated FileMetadataID_Type associated_id = 12;
}

// See annotations in child elements and messages/elements that use this type

// Current commanded Flight details.
// uci_version: 001.000.001.000
message MA_VehicleCommandStateType {
  // Commanded Altitude Type
  optional AltitudeReferenceType altitude = 1;
  // Intended heading of the aircraft.
  optional MA_DirectionReferenceType heading = 2;
  // Roll, pitch, yaw of aircraft.
  optional OrientationType orientation = 3;
  // Change in orientation of the aircraft
  optional OrientationRateType orientation_rate = 4;
  // Indicates average throttle setting of all engines as a percentage.
  // xsd type: PercentType
  optional double power_level = 5;
  // Defines speed type (reference frame) for all speed related fields in this
  // message.
  optional PathSegmentSpeedValueType speed = 6;
  // Defines speed type (reference frame) for all speed related fields in this
  // message.
  optional Acceleration3D_Type acceleration = 7;
}

// Indicates the curve following parameters and status.
// uci_version: 000.000.000.000
message MA_CurveFollowingControlType {
  // Specifies the flyout curve as a set of NURBS points.
  repeated MA_NURBS_PointType flyout_curve = 1;
  // Specifies the curve following status and execution progress.
  optional MA_CurveFollowingStatusType curve_following_status = 2;
  // Specifies the behavior at the completion of executing the curve.
  optional MA_EndOfCurveBehaviorEnum received_end_of_curve_behavior = 3;
}

// Specifies a Non-Uniform Rational Basis Spline (NURBS) representation of the
// platform trajectory to this endpoint. The following constraints should be
// observed when specifying the trajectory: A) A third-order curve should be
// sufficient for accurate description and higher orders add complexity
// without significant benefit, B) The curve description should be terminated
// at both endpoints and C) the curve should be continuous to first and second
// order across the path segments for the active route.
// uci_version: 000.000.000.000
message MA_NURBS_PointType {
  // Indicates the reference point from which the control points for the
  // trajectory curve are defined. The frame of reference for the control points
  // is specified as Azimuthal Equidistant Projection (AEP) to prevent
  // discontinuties that a LLA (latitude, longitude, altitude) frame of
  // reference may experience at the antipodes.
  WayPointPointChoiceType center_reference = 1;
  // Contains the collection of control points that with the knot vector
  // describe the desired trajectory for this endpoint. Minimum size value is
  // defined to ensure this endpoint is continuous with the rest of the route
  // path. Maximum size value is defined for a third-order curve.
  repeated MA_NURBS_ControlPointType control_points = 2;
  // Contains the collection of knots that with the control points describe the
  // desired trajectory for this endpoint. The number of knots is directly
  // related to the number of control points and the order of the curve. The
  // minimum size value is defined to ensure this endpoint is continuous with
  // the rest of the route path. The maximum size value is defined for a
  // third-order curve.
  // xsd type: DoubleNonNegativeType
  repeated double knot_vector = 3;
  // Choice of Speed or Duration contraints to apply to curve following
  optional MA_CurveTraversingType curve_traversing_parameters = 4;
  // Indicates the curvature value for the desired trajectory. This is an
  // indication of the smoothness of the trajectory.
  // xsd type: DoublePositiveType
  optional double curvature = 5;
  // Index into the ControlPoints array that indicates the initial control point
  // for this path segment trajectory description. To ensure a continous route
  // path, this value should be identical to the endpoint of the previous
  // segment in this path.
  optional uint32 initial_control_point_index = 6;
  // Index into the ControlPoints array that indicates the final control point
  // for this path segment trajectory description. To ensure a continous route
  // path, this value should be identical to the endpoint of this path segment.
  optional uint32 final_control_point_index = 7;
}

// Specifies a single point and weighting factor in a Non-Uniform Rational
// Basis Spline (NURBS) trajectory description.
// uci_version: 000.000.000.000
message MA_NURBS_ControlPointType {
  // Indicates the value of a single control point for the trajectory curve. To
  // reduce the chance of discontinuities in the curve description, the frame of
  // reference for each point is an Azimuthal Equidistant Projection (AEP)
  // offset from a center reference point.
  Point2D_RelativeType control_point = 1;
  // Indicates the weight factor used for this control point.
  double weight = 2;
}

// Contains speed or time contraints to applied for a curve following command
// uci_version: 000.000.000.000
message MA_CurveTraversingType {
  oneof choice {
    // Speed constraint to be applied to commanded curve traversal
    SpeedRangeType speed_range = 1;
    // Time contraint to inform intended duration of the commanded curve traversal
    // xsd type: xs:duration (carried as string on the OMS wire)
    string duration = 2;
  }
}

// Indicates the curve following status and execution progress.
// uci_version: 000.000.000.000
message MA_CurveFollowingStatusType {
  // Specifies the curve execution status.
  MA_CurveStatusEnum curve_status = 1;
  // Specifies the current segment being executed.
  uint32 current_segment = 2;
  // Specifies the current completion progress as a percentage whole number.
  uint32 segment_completion_percentage = 3;
}

// Defines possible statuses of an actively executing curve.
enum MA_CurveStatusEnum {
  MA_CURVE_STATUS_ENUM_UNSPECIFIED = 0;
  MA_CURVE_STATUS_ENUM_START_CURVE_FOLLOWING = 1;
  MA_CURVE_STATUS_ENUM_CURVE_IN_PROGRESS = 2;
  MA_CURVE_STATUS_ENUM_CURVE_COMPLETED = 3;
}

// Specifies the type of behavior at the completion of curve following.
enum MA_EndOfCurveBehaviorEnum {
  MA_END_OF_CURVE_BEHAVIOR_ENUM_UNSPECIFIED = 0;
  MA_END_OF_CURVE_BEHAVIOR_ENUM_CSA = 1;
  MA_END_OF_CURVE_BEHAVIOR_ENUM_CIRCULAR_LOITER = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.001.000
message MA_FlightCapabilityMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // Indicates the state of the internal software object that the data in the
  // message is based upon. The state of the software object is determined by
  // the publisher. The publisher could be the original/master publisher or an
  // intermediary re-publisher such as a persistence/data manager. This element
  // is not a commanded CRUD operation. It is not an indication of the state of
  // an instance of a message. It is not a mechanism for partial, incremental,
  // or fragmentary publication of a message. It is a signal from a publisher to
  // subscribers. For REMOVED state, in particular, some subscribers will mirror
  // the publisher and treat the message as if the object no longer exists, but
  // others, such as mission recorders, might not (in order to support retaining
  // historical records of activity, for example).
  optional ObjectStateEnum object_state = 2;
  // See annotations in child elements and messages/elements that use this type
  // for details.
  MA_FlightCapabilityMDT message_data = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.001.000
message MA_FlightCapabilityMDT {
  // composed xsd extension base CapabilityBaseType
  CapabilityBaseType base = 1;
  // Provides a list of the specific Flight Capabilities as defined by the
  // FlightCapabilityEnum.
  repeated MA_FlightCapabilityType capability = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.001.001.001
message MA_FlightCapabilityType {
  // composed xsd extension base CommandableCapabilityDeclarationType
  CommandableCapabilityDeclarationType base = 1;
  // Indicates the type of Flight capability. See enumeration annotations for
  // further details. List size for this element is based on "Select All That
  // Apply" condition.
  repeated MA_FlightCapabilityEnum capability_type = 2;
  // Provides per-control mode performance parameters. Enables autonomy commands
  // to properly conform to envelope limits or limit summary values before
  // sending a FlightCommand to the vehicle.
  optional MA_FlightCapabilityPerformanceProfileType flight_capability_performance_profile = 3;
}

// Indicates the types of Flight capability.
enum MA_FlightCapabilityEnum {
  MA_FLIGHT_CAPABILITY_ENUM_UNSPECIFIED = 0;
  MA_FLIGHT_CAPABILITY_ENUM_MUST_FLY = 1;
  MA_FLIGHT_CAPABILITY_ENUM_LOITER = 2;
  MA_FLIGHT_CAPABILITY_ENUM_FORMATION = 3;
  MA_FLIGHT_CAPABILITY_ENUM_WAYPOINT_FOLLOWING = 4;
  MA_FLIGHT_CAPABILITY_ENUM_CURVE_FOLLOWING = 5;
  MA_FLIGHT_CAPABILITY_ENUM_HSA_CSA = 6;
  MA_FLIGHT_CAPABILITY_ENUM_ALTITUDE_STACKED_MARSHALL = 7;
  MA_FLIGHT_CAPABILITY_ENUM_LAUNCH = 8;
  MA_FLIGHT_CAPABILITY_ENUM_RECOVERY = 9;
}

// Provides performance profiles on a per-flight control mode type.
// uci_version: 000.000.000.000
message MA_FlightCapabilityPerformanceProfileType {
  // Indicates performance profile for HSA/CSA flight control mode.
  optional MA_FlightControlModesPerformanceProfileType hsa_csa_performance_profile = 1;
  // Indicates performance profile for Waypoint Following flight control mode.
  optional MA_FlightControlModesPerformanceProfileType waypoint_following_performance_profile = 2;
  // Indicates performance profile for Curve Following flight control mode.
  optional MA_FlightControlModesPerformanceProfileType curve_following_performance_profile = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.001.000
message MA_FlightControlModesPerformanceProfileType {
  // Minimum allowable airspeed given as a function of altitude.
  repeated MA_AirspeedLimitType min_airspeed = 1;
  // Maximum allowable airspeed given as a function of altitude.
  repeated MA_AirspeedLimitType max_airspeed = 2;
  // Airspeed of maximum endurance given as a function of altitude.
  repeated MA_AirspeedLimitType best_endurance_airspeed = 3;
  // Airspeed of maximum range given as a function of altitude.
  repeated MA_AirspeedLimitType best_range_airspeed = 4;
  // Minimum allowable altitude.
  optional AltitudeReferenceType min_altitude = 5;
  // Maximum allowable altitude.
  optional AltitudeReferenceType max_altitude = 6;
  // The vehicle's acceleration limits in the current operating domain of the
  // system as a function of time. Flight control modes such as HSA and Waypoint
  // Following should only use the first time index, while Curve Following may
  // utilize an unbounded number of time indices to form dynamically feasible
  // trajectories.
  repeated MA_AccelerationLimitsType min_acceleration_limits = 7;
  // The vehicle's acceleration limits in the current operating domain of the
  // system as a function of time. Flight control modes such as HSA and Waypoint
  // Following should only use the first time index, while Curve Following may
  // utilize an unbounded number of time indices to form dynamically feasible
  // trajectories.
  repeated MA_AccelerationLimitsType max_acceleration_limits = 8;
  // Euler Angle Sequence describing the maximum orientation of the vehicle in
  // the order yaw, pitch, roll as a function of time. The angles are given in a
  // locally level, North-East-Down coordinate system centered on the vehicle.
  // Flight control modes such as HSA and Waypoint Following should only use the
  // first time index, while Curve Following may utilize an unbounded number of
  // time indices to form dynamically feasible trajectories.
  repeated OrientationType max_orientation_limits = 9;
  // Euler Angle Sequence describing the rate of orientation change of the
  // vehicle in the order yaw, pitch, roll. The angles are given in a locally
  // level, North-East-Down coordinate system centered on the vehicle. Flight
  // control modes such as HSA and Waypoint Following should only use the first
  // time index, while Curve Following may utilize an unbounded number of time
  // indices to form dynamically feasible trajectories.
  repeated MA_OrientationRateLimitsType max_orientation_rate_limits = 10;
  // Maximum allowable turn rate in radians/sec.
  // xsd type: AngleRateType
  optional double max_turn_rate = 11;
  // Maximum allowable climb rate in meters/sec.
  // xsd type: SpeedType
  optional double max_climb_rate = 12;
  // Maximum allowable descent rate in meters/sec.
  // xsd type: SpeedType
  optional double max_descent_rate = 13;
}

// This message shall be used to specify airspeed limits over a range of
// altitudes.
// uci_version: 000.000.000.000
message MA_AirspeedLimitType {
  // Specified airspeed limit at corresponding altitude value.
  PathSegmentSpeedValueType airspeed_limit = 1;
  // Altitude value for corresponding specified airspeed limit.
  AltitudeReferenceType altitude_pair = 2;
  // Mass value for corresponding specified airspeed limit.
  // xsd type: MassType
  optional double weight_pair = 3;
}

// This type allows the specification of acceleration limits paired with
// orientation rates.
// uci_version: 000.000.000.000
message MA_AccelerationLimitsType {
  // Specified acceleration limits in body reference or NED coordinate frame.
  MA_BodyReferenceAccelerationType acceleration_limit = 1;
  // Paired value for the specified acceleration limit, provided either as a set
  // of body referenced oritentation rates, or a unitless Mach value.
  MA_AccelerationLimitPairType acceleration_limit_pair = 2;
}

// Body-referenced acceleration components along the x, y, and z axis.
// uci_version: 000.000.000.000
message MA_BodyReferenceAccelerationType {
  // Body-referenced acceleration component along the longitudinal (x or roll)
  // axis, measured in meters/sec^2
  // xsd type: AccelerationType
  double x_accel = 1;
  // Body-referenced acceleration component along the lateral (y or pitch) axis,
  // measured in meters/sec^2
  // xsd type: AccelerationType
  double y_accel = 2;
  // Body-referenced acceleration component along the vertical (z or yaw) axis,
  // measured in meters/sec^2.
  // xsd type: AccelerationType
  double z_accel = 3;
  // Indicates the time when the acceleration data was measured or last known to
  // be correct. The element can also indicate the time at which a future
  // velocity of a System, Entity, etc. will be achieved.
  // xsd type: DateTimeType (pattern .+Z)
  optional string timestamp = 4;
}

// Provides a choice between body reference orientation rates and unitless
// Mach value for the specification of a paired value to an aircraft
// acceleration limit.
// uci_version: 000.000.000.000
message MA_AccelerationLimitPairType {
  oneof choice {
    // Body reference orientation rates to be paired with the specified
    // acceleration limit.
    MA_BodyReferenceOrientationRateType body_reference_orientation_rate = 1;
    // Unitless Mach value to be paired with the specified acceleration limit.
    // xsd type: MachType
    double mach_value = 2;
  }
}

// Body-referenced attitude rate components along the x, y, and z axis.
// uci_version: 000.000.000.000
message MA_BodyReferenceOrientationRateType {
  // Body-referenced attitude rate component along the longitudinal (x or roll)
  // axis, measured in radians/sec.
  // xsd type: AngleRateType
  double roll_rate = 1;
  // Body-referenced attitude rate component along the lateral (y or pitch)
  // axis, measured in radians/sec.
  // xsd type: AngleRateType
  double pitch_rate = 2;
  // Body-referenced attitude rate component along the vertical (z or yaw) axis,
  // measured in radians/sec.
  // xsd type: AngleRateType
  double yaw_rate = 3;
  // Indicates the time when the velocity data was measured or last known to be
  // correct. The element can also indicate the time at which a future velocity
  // of a System, Entity, etc. will be achieved.
  // xsd type: DateTimeType (pattern .+Z)
  optional string timestamp = 4;
}

// This type allows the specification of orientation rate limits paired with
// airspeeds.
// uci_version: 000.000.000.000
message MA_OrientationRateLimitsType {
  // Specified orientation rate limits in body reference or NED coordinate frame.
  MA_BodyReferenceOrientationRateType orientation_rate_limits = 1;
  // Airspeed pair value for associated orientation rate limit, specified in
  // body reference or NED coordinate frame.
  PathSegmentSpeedValueType airspeed_pair = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_FlightCapabilityStatusMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // See annotations in child elements and messages/elements that use this type
  // for details.
  MA_FlightCapabilityStatusMDT message_data = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_FlightCapabilityStatusMDT {
  // composed xsd extension base CapabilityStatusBaseType
  CapabilityStatusBaseType base = 1;
  // Indicates the high level availability/state of a Capability instance.
  repeated MA_CapabilityStatusType capability_status = 2;
}

// Provides general status information for a Capability. Each
// *CapabilityStatusMDT type will need to add a field of CapabilityStatusType
// independently but may contain something different, SAR and Strike are
// examples of this.
// uci_version: 000.000.000.000
message MA_CapabilityStatusType {
  // Indicates the unique ID of the Capability corresponding to this message.
  CapabilityID_Type capability_id = 1;
  // Indicates the availability of the Capability corresponding to this message.
  MA_AvailabilityInfoType availability_info = 2;
  // Indicates the precedence of the Capability amongst all Capabilities of the
  // Subsystem.
  optional uint32 capability_precedence = 3;
  // The ID of the represented entity needed to express release authorization
  // for applicable capabilities. Operator launches and mission planned launches
  // are examples of this.
  optional ForeignKeyType representation_key = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_AvailabilityInfoType {
  // Indicates the availability for data, e.g., Capability, SubCapability,
  // SupportCapability, Component, or other.
  CapabilityAvailabilityEnum availability = 1;
  // Indicates details regarding the reason for and/or a contributing factor to
  // the sibling Availability element. This element is only expected when there
  // is a potentially undesirable state such as faulted, temporarily unavailable
  // or otherwise expects less than optimum results.
  optional MA_CannotComplyType availability_reason = 2;
  // Indicates a prediction of when the next time window is available.
  // xsd type: DateTimeType (pattern .+Z)
  optional string next_available_window = 3;
}

// See annotations in child elements and messages/elements that use this type

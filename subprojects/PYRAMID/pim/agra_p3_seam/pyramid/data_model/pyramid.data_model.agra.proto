  ENTITY_SOURCE_ENUM_EOB = 1;
  ENTITY_SOURCE_ENUM_SOB = 2;
  ENTITY_SOURCE_ENUM_IFF = 3;
  ENTITY_SOURCE_ENUM_AIS = 4;
  ENTITY_SOURCE_ENUM_BFT = 5;
  ENTITY_SOURCE_ENUM_EXTERNAL_IBS = 6;
  ENTITY_SOURCE_ENUM_EXTERNAL_LINK16 = 7;
  ENTITY_SOURCE_ENUM_EXTERNAL_LINK16_EW = 8;
  ENTITY_SOURCE_ENUM_EXTERNAL_OTHER = 9;
  ENTITY_SOURCE_ENUM_FUSION_C2 = 10;
  ENTITY_SOURCE_ENUM_FUSION_SPACE_SURVEILLANCE = 11;
  ENTITY_SOURCE_ENUM_FUSION_SYSTEM = 12;
  ENTITY_SOURCE_ENUM_FUSION_OTHER = 13;
  ENTITY_SOURCE_ENUM_INTERNALLY_DERIVED = 14;
  ENTITY_SOURCE_ENUM_OPERATOR = 15;
  ENTITY_SOURCE_ENUM_CAPABILITY_ACTIVE_OPTICAL = 16;
  ENTITY_SOURCE_ENUM_CAPABILITY_PASSIVE_OPTICAL = 17;
  ENTITY_SOURCE_ENUM_CAPABILITY_SAR = 18;
  ENTITY_SOURCE_ENUM_CAPABILITY_SMTI = 19;
  ENTITY_SOURCE_ENUM_CAPABILITY_AMTI = 20;
  ENTITY_SOURCE_ENUM_CAPABILITY_ESM = 21;
  ENTITY_SOURCE_ENUM_CAPABILITY_ELINT = 22;
  ENTITY_SOURCE_ENUM_CAPABILITY_COMINT = 23;
  ENTITY_SOURCE_ENUM_CAPABILITY_EA = 24;
  ENTITY_SOURCE_ENUM_CAPABILITY_ORBITAL_SURVEILLANCE = 25;
  ENTITY_SOURCE_ENUM_CAPABILITY_OTHER = 26;
  ENTITY_SOURCE_ENUM_PRODUCT_DERIVED = 27;
  ENTITY_SOURCE_ENUM_UNKNOWN = 28;
}

// Nature and/or source of a drop restriction.
// uci_version: 000.000.000.000
message DropRestrictionType {
  // Indicates the type of drop restriction on the Entity.
  DropRestrictionEnum drop_restriction = 1;
  // Indicates the message that is requiring the drop restriction.
  optional AssociatedDropRestrictMessageType associated_message = 2;
}

// Indicates the type of drop restriction on an entity.
enum DropRestrictionEnum {
  DROP_RESTRICTION_ENUM_UNSPECIFIED = 0;
  DROP_RESTRICTION_ENUM_BAILOUT = 1;
  DROP_RESTRICTION_ENUM_LOCAL_ENGAGEMENT = 2;
  DROP_RESTRICTION_ENUM_LOCAL_CONTROL = 3;
  DROP_RESTRICTION_ENUM_DROP_PROTECT = 4;
  DROP_RESTRICTION_ENUM_MONITOR = 5;
  DROP_RESTRICTION_ENUM_PAIRED = 6;
  DROP_RESTRICTION_ENUM_REMOTE_ENGAGEMENT = 7;
  DROP_RESTRICTION_ENUM_THREAT_WARNING = 8;
}

// Message type and/or specific identifier or identifiers responsible for a
// drop restriction.
// uci_version: 000.000.000.000
message AssociatedDropRestrictMessageType {
  // Indicates the type of message that this notification is associated with or
  // the cause of the notification.
  MessageTypeDropRestrictionEnum message_type = 1;
  // Indicates a specific ID in the associated message which can be used to
  // identify specific message instance or instances which are associated with
  // or the cause of the notification.
  optional ID_Type associated_id = 2;
}

// List of all message types in UCI that can cause a drop restriction.
enum MessageTypeDropRestrictionEnum {
  MESSAGE_TYPE_DROP_RESTRICTION_ENUM_UNSPECIFIED = 0;
  MESSAGE_TYPE_DROP_RESTRICTION_ENUM_CONTROL_STATUS = 1;
  MESSAGE_TYPE_DROP_RESTRICTION_ENUM_ENTITY = 2;
  MESSAGE_TYPE_DROP_RESTRICTION_ENUM_RELATIONSHIP_DESIGNATION = 3;
}


  // Indicates the System which made the weather radar observation.
  SystemID_Type observing_system_id = 1;
  // Indicates the observing System's location at the time of the weather radar
  // observation.
  Point3D_Type location = 2;
  // Indicates the time when the weather radar observation was made.
  // xsd type: DateTimeType (pattern .+Z)
  string timestamp = 3;
  // Indicates the Capability which made the weather radar observation.
  optional CapabilityID_Type capability_id = 4;
  // Defines the size of the weather observation cells reported in the sibling
  // Cell element.
  WeatherRadarCellSizeType cell_size = 5;
  // Represents the data for each weather observation cell observed by the
  // weather radar.
  repeated WeatherRadarCellType cell = 6;
}

// See annotations in child elements and messages/elements that use this type

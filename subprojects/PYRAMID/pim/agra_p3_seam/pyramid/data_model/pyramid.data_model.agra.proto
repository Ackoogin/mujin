}

// The NameValuePairValue is used to report the value of a single status
// attribute. This type is used to provide status for unique attributes that
// cannot be reported with other types or structures.
// uci_version: 000.000.000.000
message NameValuePairValueType {
  oneof choice {
    // A boolean value.
    bool boolean_value = 1;
    // A byte value.
    int32 byte_value = 2;
    // An unsigned byte value.
    uint32 unsigned_byte_value = 3;
    // A short value.
    int32 short_value = 4;
    // An unsigned short value.
    uint32 unsigned_short_value = 5;
    // An int value.
    int32 int_value = 6;
    // An unsigned integer value.
    uint32 unsigned_int_value = 7;
    // A long value.
    int64 long_value = 8;
    // A float value.
    float float_value = 9;
    // A double value.
    double double_value = 10;
    // A string value. A string value can be used to represent all non-primitive
    // data types.
    // xsd type: VisibleString256Type (pattern [ -~]{0,256})
    string string_value = 11;
  }
}


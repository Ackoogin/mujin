// This type contains the data necessary for a DLZ.
// uci_version: 001.001.000.001
message DLZ_DataType {
  // Launch slant range at which the weapon will intercept the target and arm
  // its fuze, assuming no platform guidance or weapon guidance errors for:
  // 1.Current steering 2.Current shooter kinematic conditions (e.g.,
  // altitude/airspeed) 3.Target turn-and-close maneuver RangeTurnandClose is
  // not applicable to ballistic trajectory targets.
  // xsd type: DistanceType
  optional double range_turn_and_close = 1;
  // Launch slant range at which the weapon will intercept the target and arm
  // its fuze, assuming no platform guidance or weapon guidance errors for:
  // 1.Current steering 2.Current shooter kinematic conditions (e.g.,
  // altitude/airspeed) 3.No target maneuvers Note: ballistic trajectory
  // velocity changes are not considered maneuvers.
  // xsd type: DistanceType
  double range_minimum = 2;
  // Launch range at which the weapon will intercept the target with high
  // energy, assuming no platform guidance or weapon guidance errors for:
  // 1.Current steering 2.Current shooter kinematic conditions (e.g.,
  // altitude/airspeed) 3.Target turn-and-run maneuver RangeTurnAndRun is not
  // applicable to ballistic trajectory targets.
  // xsd type: DistanceType
  double range_turn_and_run = 3;
  // Launch range at which the weapon will intercept the target with high
  // energy, assuming no platform guidance or weapon guidance errors for:
  // 1.Current steering 2.Current shooter kinematic conditions (e.g.,
  // altitude/airspeed) 3.No target maneuvers Note: ballistic trajectory
  // velocity changes are not considered maneuvers.
  // xsd type: DistanceType
  double range_probability_of_intercept = 4;
  // Launch range at which the weapon will intercept the target with nominal
  // energy, assuming no platform guidance or weapon guidance errors for:
  // 1.Current steering 2.Current shooter kinematic conditions (e.g.,
  // altitude/airspeed) 3.No target maneuvers, Note: ballistic trajectory
  // velocity changes are not considered maneuvers.
  // xsd type: DistanceType
  double range_max_guidance = 5;
  // Launch range at which the weapon will intercept the target with high
  // energy, assuming no platform guidance or weapon guidance errors for:
  // 1.Optimal steering 2.Current shooter kinematic conditions (e.g.,
  // altitude/airspeed) 3.No target maneuvers, Note: ballistic trajectory
  // velocity changes are not considered maneuvers.
  // xsd type: DistanceType
  double range_optimal = 6;
  // Launch range at which the weapon will intercept the target with nominal
  // energy, assuming no platform guidance or weapon guidance errors for:
  // 1.Optimal steering 2.Current shooter kinematic conditions (e.g.,
  // altitude/airspeed) 3.No target maneuvers, Note: ballistic trajectory
  // velocity changes are not considered maneuvers.
  // xsd type: DistanceType
  double range_max_aero = 7;
  // The target closure rate as a velocity in ft-per-second.
  Velocity2D_Type target_closure_rate = 8;
  // The slant range to the target.
  // xsd type: DistanceType
  double target_range = 9;
  // The range from the weapon to the target at weapon seeker activation,
  // assuming no platform guidance errors or weapon guidance errors. This data
  // is only applicable to weapons with an end-game seeker.
  // xsd type: DistanceType
  optional double weapon_to_target_seeker_activation_range = 10;
  // The range from the weapon to the target when the weapon is autonomous (does
  // not require data link support). This data is only applicable to weapons
  // with a data link.
  // xsd type: DistanceType
  optional double weapon_to_target_autonomous_range = 11;
  // The range from the weapon to the target when the weapon activates its
  // Medium Pulse Repetition Frequency mode, assuming no platform guidance
  // errors or weapon guidance errors. This data is only applicable to weapons
  // with active seekers which implement a MPRF mode.
  // xsd type: DistanceType
  optional double weapon_to_target_mprf_range = 12;
  // The range from the shooter to the target when the weapon activates its
  // seeker, assuming no platform or weapon guidance errors for: 1.Current
  // steering 2.Current shooter kinematic conditions (e.g., altitude/airspeed)
  // 3.No target maneuvers This data is only applicable to weapons with an
  // end-game seeker.
  // xsd type: DistanceType
  optional double a_pole = 13;
  // The range from the shooter to the target when the weapon intercepts/impacts
  // the target, assuming no platform or weapon guidance errors for: 1.Current
  // steering 2.Current shooter kinematic conditions (e.g., altitude/airspeed),
  // and 3.No target maneuvers
  // xsd type: DistanceType
  optional double f_pole = 14;
  // The range from the shooter to the target when the weapon activates its
  // Medium Pulse Repetition Frequency mode, assuming no platform or weapon
  // guidance errors for: 1.Current steering 2.Current shooter kinematic
  // conditions (e.g., altitude/airspeed) 3.No target maneuvers This data is
  // only applicable to weapons with active seekers which implement a MPRF mode.
  // xsd type: DistanceType
  optional double m_pole = 15;
  // The maximum amount of steering error which will still result in a
  // successful weapon intercept/impact with nominal energy.
  // xsd type: AnglePositiveType
  optional double allowable_steering_error = 16;
  // Steering unit vector and its defined coordinate frame.
  optional SteeringUnitVectorType steering_unit_vector = 17;
  // Required pitch angle to get to the maximum aero range for the missile.
  // xsd type: AngleType
  optional double loft_angle = 18;
  // The magnitude of the maximum angle the target can turn away from the
  // platform which results in weapon intercept of the target with nominal
  // energy, assuming an immediate employment command. This field is valid only
  // if RangeMaxGuidance >= TargetRange >= RangeTurnandRun. This field is never
  // greater than the magnitude of the target aspect angle. For air platforms,
  // this turn is in the horizontal plane defined by the north and east axes.
  // xsd type: AnglePositiveType
  optional double digital_maneuvering_cue_angle = 19;
  // The time of weapon intercept/impact of the target, assuming no platform
  // guidance or weapon errors, for: 1.Current steering 2.Current shooter
  // kinematic conditions (e.g., altitude/airspeed) 3.No post-launch target
  // maneuvers
  // xsd type: TimeType (pattern .+Z)
  string time_of_intercept = 20;
  // The seconds time to activate for the proposed launch store type.
  // xsd type: TimeType (pattern .+Z)
  string time_to_release = 21;
  // The time of weapon seeker activation, assuming no platform guidance or
  // weapon errors, for: 1.Current steering 2.Current shooter kinematic
  // conditions (e.g., altitude/airspeed) 3.No post-launch target maneuvers
  // xsd type: TimeType (pattern .+Z)
  optional string time_of_activation = 22;
  // The time of weapon seeker MPRF (for weapons with MPRF mode), assuming no
  // platform guidance or weapon errors, for: 1.Current steering 2.Current
  // shooter kinematic conditions (e.g., altitude/airspeed) 3.No post-launch
  // target maneuvers
  // xsd type: TimeType (pattern .+Z)
  optional string time_of_mprf = 23;
  // The time of weapon being autonomous (not using data link), assuming no
  // platform guidance or weapon errors, for: 1.Current steering 2.Current
  // shooter kinematic conditions (e.g., altitude/airspeed) 3.No post-launch
  // target maneuvers
  // xsd type: TimeType (pattern .+Z)
  optional string time_of_autonomous = 24;
}

// Steering unit vector and its defined coordinate frame.
// uci_version: 000.000.000.000
message SteeringUnitVectorType {
  // Indicates the base reference frame for the LOS_UnitVector data. Four
  // reference frame options are enumerated: Body, NED, Inertial, and
  // Capability. The Body frame is defined relative to the host platform, the
  // NED frame is a local North, East, Down frame, the Inertial frame is similar
  // to the NED frame with the addition of a Wander Angle, the Capability frame
  // is defined with respect to the subsystem providing the associated
  // Capability. Additional details can be found in the annotations for each
  // enumeration value.
  LOS_ReferenceEnum los_reference_frame = 1;
  // This indicates the Capability that defines the reference frame for the LOS
  // unit vector when the Capability Enumeration is used in the
  // LOS_ReferenceFrame element.
  optional CapabilityID_Type capability_id = 2;
  // Line of sight vector from the system to the Entity. The meaning of the
  // X,Y,Z components of the LOS vector depends upon the enumeration value of
  // the sibling LOS_ReferenceFrame element.
  UnitVectorType los_unit_vector = 3;
}

// See the annotation in the associated message for an overall description of
// the message and this type.
// uci_version: 002.001.002.000
message DLZ_RequestMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // See annotations in child elements and messages/elements that use this type

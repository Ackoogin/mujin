enum StrikeMessageOutputsEnum {
  STRIKE_MESSAGE_OUTPUTS_ENUM_UNSPECIFIED = 0;
  STRIKE_MESSAGE_OUTPUTS_ENUM_STRIKE_ACTIVITY = 1;
}

// Mission store representation.
// uci_version: 001.000.001.001
message StoreInformationType {
  // composed xsd extension base StoreInformationBaseType
  StoreInformationBaseType base = 1;
  // This represents the current available ammunition. As ammunition is used,
  // this value will decrease until it reaches zero or empty. For most bombs and
  // missiles, this will be 0 or 1. For guns, it will be some integer greater
  // than or equal to 0.
  int32 ammo = 2;
  // Indicates the fuzes in the weapon. Typically a weapon with a fuze will have
  // them located in the nose, tail or both.
  repeated FuzeType fuzes = 3;
}

// Indicates possible store settings that could be used to id the state or
// extra data related to the attached Mission or Carriage Store.
// uci_version: 000.000.000.001
message StoreInformationBaseType {
  // Mnemonic representation of the store.
  // xsd type: VisibleString256Type (pattern [ -~]{0,256})
  optional string mnemonic = 1;
  // Indicates if this is a simulated Store.
  bool simulated = 2;
  // Store location as defined by system related to int number of Store Point.
  repeated int32 store_location = 3;
  // Indicates if and in which situations a store can be jettisoned. List size
  // for this element is based on "Select All That Apply" condition.
  repeated StoreJettisonOptionsEnum jettisonable_option = 4;
  // Indicates if the Store is powerable, i.e. can be turned on/off at will.
  optional bool powerable = 5;
}

// Weapon Jettison options supported.
enum StoreJettisonOptionsEnum {
  STORE_JETTISON_OPTIONS_ENUM_UNSPECIFIED = 0;
  STORE_JETTISON_OPTIONS_ENUM_UNKNOWN = 1;
  STORE_JETTISON_OPTIONS_ENUM_EMERGENCY = 2;

    // this command.
    ISAR_SubCapabilityType isar = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message SAR_SubCapabilityType {
  // Indicates the target of the SAR Command via explicit values for geospatial
  // characteristics or sensor referenced coverage area.
  RadarPointingTargetType radar_pointing_target = 1;
  // Indicates a command to perform multi-look SAR based on the Command's
  // Repetition element.
  optional bool multi_look = 2;
  // Indicates the policy to use for ellipticity. Policy is specified to
  // indicate minimum dwell, maximum dwell, or minimum ellipticity.
  optional SAR_EllipticityPolicyEnum ellipticity_policy = 3;
  // Indicates the allowable ellipticity for activities created from this
  // command. This value is a magnitude less than or equal to -1.0 or greater
  // than or equal to 1.0. Positive values indicate range resolution is favored,
  // negative values indicate azimuth resolution is favored.
  optional float allowable_ellipticity_magnitude = 4;
  // Indicates the maximum beam roll-off. Used to limit effects of a non-uniform
  // antenna beam.
  // xsd type: DecibelType
  optional double maximum_beam_rolloff_db = 5;
  // Indicates whether to perform a number of processing techniques.
  optional SAR_SubCapabilityNparDetailsType npar_details = 6;
  // If populated, this field controls clutter parameters used in executing this
  // command and can be used to specify the minimum quality for feasibility of a
  // collection. Achieved performance may be reported in the SAR_Activity
  // message.
  optional SAR_SubCapabilityClutterParametersType clutter_parameters = 7;
}

// This is a switch that allows TargetType to be a sibling of
// SensorReferencedCoverageArea.
// uci_version: 002.000.002.000
message RadarPointingTargetType {
  oneof choice {
    // Indicates details of the target of the Command.
    TargetType geospatial_target = 1;
    // Indicates a coverage area specified by azimuth extent and elevation extent
    // or azimuth extent and range extent.
    SensorReferencedCoverageAreaType sensor_referenced_coverage_area = 2;
  }
}

// Definition of a Sensor Reference Coverage Area (SRCA). Allows a Subsystem
// to include a sensor relative target definition used for air to ground
// collections.
// uci_version: 001.000.000.000
message SensorReferencedCoverageAreaType {
  // Indicates the reference for pointing for a SensorReferencedCoverageArea
  // Target. The enumeration values are PLATFORM or SENSOR.
  SensorReferencedCoverageAreaReferenceEnum reference = 1;
  // Azimuth extent of the look area. When the sibling Reference is PLATFORM,
  // pointing is relative to the body of the aircraft in an east north up
  // coordinate system. Zero azimuth and elevation will point out the nose of
  // the platform. Azimuth increases counterclockwise as a rotation about the up
  // vector. When the sibling Reference is SENSOR, pointing is relative to the
  // boresight of the sensor in an east north up coordinate system with north
  // pointing in the direction of boresight. Zero azimuth and elevation will
  // point in the direction of boresight. Azimuth increases counterclockwise as
  // a rotation about the up vector.
  AnglePairType azimuth_extent = 2;
  // Indicates the range or elevation extent of the look area When the sibling
  // Reference is PLATFORM, pointing is relative to the body of the aircraft in
  // an east north up coordinate system. Zero azimuth and elevation will point
  // out the nose of the platform. Elevation is positive up as a rotation about
  // the rotated east vector. When the sibling Reference is SENSOR, pointing is
  // relative to the boresight of the sensor in an east north up coordinate
  // system with north pointing in the direction of boresight. Zero azimuth and
  // elevation will point in the direction of boresight. Elevation is positive
  // up as a rotation about the rotated east vector.
  RangeElevationExtentChoiceType range_elevation_extent = 3;
}

// Indicates the reference for pointing for a SensorReferencedCoverageArea
// Target. The enumeration values are PLATFORM or SENSOR.
enum SensorReferencedCoverageAreaReferenceEnum {
  SENSOR_REFERENCED_COVERAGE_AREA_REFERENCE_ENUM_UNSPECIFIED = 0;
  SENSOR_REFERENCED_COVERAGE_AREA_REFERENCE_ENUM_PLATFORM = 1;
  SENSOR_REFERENCED_COVERAGE_AREA_REFERENCE_ENUM_SENSOR = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message RangeElevationExtentChoiceType {
  oneof choice {
    // Elevation extent of the look area.
    AnglePairType elevation = 1;
    // Range extent of the look area.
    RangeExtentType range = 2;
  }
}

// Range extent of the look area.
// uci_version: 001.000.000.000
message RangeExtentType {
  // Minimum range of the look area from the sensor in meters.

  string date_time = 1;
  // Indicates the sigma or standard deviation of the sibling DateTime element.
  // xsd type: DurationType
  optional string date_time_sigma = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.001
message EntitySourceType {
  // ID of the System that created the Entity. Re-published Entities should
  // retain the ID of the creating System.
  SystemID_Type system_id = 1;
  // ID of the Service that created the Entity. Re-published Entities should
  // retain the ID of the creating Service. Required when there are multiple
  // Services within a System that are sources of Entity.
  optional ServiceID_Type service_id = 2;
  // Indicates data that is relevant to the Entity but is related to the
  // configuration, operator commands, etc. of the System/Service that is
  // reporting the Entity as opposed to "measured" physical characteristics of
  // the Entity.
  optional EntitySourceSpecificDataType source_specific_data = 3;
  // Indicates the type, from an Entity reporting perspective, of System and/or
  // Service which created the Entity. See enumerated type annotations for
  // further details.
  EntitySourceEnum source_type = 4;
  // Indicates a unique ID which corresponds to or is associated with the
  // sibling Entity SourceType element.
  optional EntitySourceIdentifierType source_type_identifier = 5;
  // Indicate sensor type detecting target.
  optional Link16SensorTypeEnum sensor_type = 6;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.002.001.000
message EntitySourceSpecificDataType {
  // Indicates the eligibility of this Entity for automated fusion operations by
  // the Entity's source System/Service and/or fusion tier. FULL indicates that
  // this Entity, and therefore its contributor Entity or Entities, is fully
  // eligible for future automated fusion operations. SELECTIVE_EXCLUSION
  // indicates that the Entity is eligible for future automated fusion
  // operations excluding merging with the Entity or Entities given in the
  // sibling CorrelatedEntity element. SELECTIVE_INCLUSION indicates that the
  // Entity is eligible for future automated fusion operations but only with the
  // Entity or Entities given in the sibling CorrelatedEntity element. NONE
  // indicates that this Entity is not eligible for future automated fusion
  // operations regardless of the associated Entity. This element does not
  // restrict operator initiated fusion operations via the
  // EntityManagementRequest.
  optional EntityFusionEligibilityEnum fusion_eligibility = 1;
  // Indicates the unique ID of an Entity which is eligible for or excluded from
  // future automated fusion operations with the Entity represented by this
  // Entity message. This element is required when the sibling FusionEligibility
  // element indicates SELECTIVE_EXCLUSION or SELECTIVE_INCLUSION and should be
  // omitted otherwise.
  repeated CorrelatedEntityID_Type correlated_entity_id = 2;
  // Indicates the drop restriction on an Entity. These restrictions can be
  // applied by operator action or by other services due to dependencies on
  // other messages.
  repeated DropRestrictionType drop_restriction = 3;
  // Indicates the unique ID of an Entity that for at least a singular point in
  // time was kinematically uncertain with this Entity. An example of this is
  // when two vehicles come to a common intersection, stop, and then depart
  // together. Tracking algorithms have to make a decision on which track goes
  // with which target and are not guaranteed to make the correct decision
  // unless there are outside sources (FBCB2, High Range Resolution Profiles,
  // etc.) that allow the tracker to either confirm the decision, or determine
  // that a swap is necessary at a later time. At the time of the intersection,
  // the uncertainties of the tracks make them kinematically ambiguous so that
  // information should be carried on with the fused Entity. If the tracker
  // makes the correct decision, than the other Entity will not be a
  // ContributorID, since it will have never contributed to the overall fused
  // picture. Likewise, the Identity of the fused Entity will not be modified
  // since the other Entity never made a contribution. If the tracker makes an
  // incorrect decision than the other Entity will be a ContributorID and will
  // possibly contribute to the Identity of the Fused Entity. Regardless of the
  // decision, the Ambiguous ID must be updated to reflect the ambiguous state
  // that occurred.
  repeated EntityID_Type ambiguous_entity_id = 4;
  // This element is the track quality as defined by MIL-STD-6016. This element
  // represents the positional accuracy of the Entity, when the Entity came from
  // a Link-16 source. It is the area, in square data miles, within which it is
  // assessed that there is a 95% probability that the track/point lies.
  // xsd type: Link16_TrackQualityType
  optional uint32 track_quality = 5;
  // Indicates the source determined priority of the Entity. For example an
  // Entity from a Capability might have an MDF determined priority based on the
  // Identity and/or Signal characteristics of the Entity.
  optional ComparableRankingType priority = 6;
  // Indicates the type of sensor as either passive or active.
  optional PassiveActiveEnum passive_active_indicator = 7;
}

// Indicates the level of eligibility for automated fusion.
enum EntityFusionEligibilityEnum {
  ENTITY_FUSION_ELIGIBILITY_ENUM_UNSPECIFIED = 0;
  ENTITY_FUSION_ELIGIBILITY_ENUM_FULL = 1;
  ENTITY_FUSION_ELIGIBILITY_ENUM_SELECTIVE_EXCLUSION = 2;
  ENTITY_FUSION_ELIGIBILITY_ENUM_SELECTIVE_INCLUSION = 3;
  ENTITY_FUSION_ELIGIBILITY_ENUM_NONE = 4;
}

// Indicates the unique ID of an Entity which is eligible for or excluded from
// future automated fusion operations with the Entity represented by this
// Entity message. This element is required when the sibling FusionEligibility
// element indicates SELECTIVE_EXCLUSION or SELECTIVE_INCLUSION and should be
// omitted otherwise.
// uci_version: 001.000.001.000
message CorrelatedEntityID_Type {
  // composed xsd extension base EntityID_Type
  EntityID_Type base = 1;
  // Optional reference to entity type which is either eligible for or excluded

}

// Indicates component specific/unique status information. Similar to
// SubsystemStatusDetailed that supports reporting vendor specific data.
// uci_version: 000.001.001.001
message ComponentDetailedStatusType {
  // The UUID of a part within a component that typically does not use UCI but
  // needs to be identified via a UUID by a component. Systems with redundant
  // components and Subsystems can require use of UUIDs.
  ComponentElementID_Type component_element_id = 1;
  // Indicates an externally defined identifier for a type of component element
  // that is specific to a system, subsystem, component, or service.
  optional ComponentElementIdentifierChoiceType component_element_identifier = 2;
  // Indicates descriptive information about the component element.
  // xsd type: VisibleString256Type (pattern [ -~]{0,256})
  optional string component_element_description = 3;
  // Indicates the state of the component element. This could be a roll up of
  // component element states in sibling ComponentDetailedStatusInfoType.
  optional ComponentElementStateType component_element_state = 4;
  // This contains detailed status of a component element. This field can be
  // used to provide status for component elements such as electrical systems,
  // hydraulic systems, etc. For example an electrical system may have a
  // generator, AC or DC components that need to have a status reported.
  repeated ComponentDetailedStatusInfoType component_detailed_status_info = 5;
}


// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_MissionPlanActivationCommandMDT {
  // The ID of the Mission Plan Activation Command. Used to reference the
  // command when providing status.
  MissionPlanActivationCommandID_Type command_id = 1;
  // Indicates the command(s) that initiated the Activation Approvals for the
  // *Plans identified in the sibling Command element. The approval status can
  // be found by locating the corresponding MissionPlanActivationApprovalStatus
  // with the ID identified here. The ActivationCommand identified in the
  // sibling Command\ActivationDetails should be verified against the
  // ActivationType that is identified in the associated
  // MissionPlanActivationApprovalCommand.
  repeated CommandID_Type approval_management_command_id = 2;
  // The state of the command message data. Indicates if a command message is a
  // NEW command, an UPDATE to an existing command, or a CANCEL of an existing
  // command.
  CommandStateEnum command_state = 3;
  // Indicates command or commands to change the activation state of a
  // MissionPlan and/or it subplans or subordinate plans. If more than one
  // instance of this element is given, each should correspond to a different
  // MissionPlanID. For example, if the intent is to transition from one
  // MissionPlan to another, the new MissionPlan can be activated in one
  // instance and the old MissionPlan can be deactivated in another instance.
  repeated MA_MissionPlanActivationCommandType command = 4;
  // Indicates the System or Systems who are being commanded to activate a
  // specified plan.
  optional MA_PlanApplicabilityType applicability = 5;
}


  // Setting this field to true will enable the automatic enabling/disabling of
  // the Component and/or associated item. Setting this field to false will
  // disable it.
  optional bool auto_enable_disable = 2;
  // Indicates a command to reset to factory/default configuration.
  // xsd type: EmptyType (pattern [A-Za-z]{0})
  optional string reset = 3;
}

// Allowable range of values for track parameters that can be used to
// customize target detections.
// uci_version: 000.000.000.000
message PO_TrackCapabilityType {
  // A passive optical sensor will contain one or more subsystem track options.
  // Each subsystem track option is identified by a unique ID. This ID is used
  // in messages and capabilities to identify a particular track option. This
  // field is the ID of the track option whose status is being reported.
  TrackOptionsID_Type track_option_id = 1;
  // These are the additional features that the PO_Command can support and are
  // not specifically settable (i.e., not available in PO_SettingsCommand). List
  // size for this element is based on "Select All That Apply" condition.
  repeated PO_TrackCapabilityTypeEnum track_control_options = 2;
  // These define the supported ATR Filter track capabilities provided by the
  // corresponding PO sensor. This sets Automatic Target Recognition (ATR)
  // filter parameters capabilities using one or more valid identity types based
  // on MIL-STD-6016.
  optional IdentityBasicType atr_filter = 3;
  // Allowable track offset setting parameters (Azimuth/Elevation/Roll and
  // Azimuth/Elevation/Roll Rates) from the center of the LOS of the PO sensor.
  optional PO_OffsetTrackSettingsType offset_track_settings = 4;
  // The maximum and minimum range of thresholds allowed for the current
  // capability that defines the number of seconds since the last update of an
  // Observed Entity before the data is considered to be stale.
  optional DurationRangeType observed_entity_threshold_settings = 5;
  // The minimum and maximum tracking range allowed for the current capability.
  optional DoubleMinMaxType tracking_range = 6;
  // This is the allowed range of coast time settings associated with an
  // environment setting for coasting a track before dropping it. List size is
  // based on allowing one per environment option available.
  repeated PO_CoastSettingOptionsType coast_setting_options = 7;
  // Indicates whether current capability track option supports commanding a
  // blanking volume.
  optional bool blanking_volume_supported = 8;
}

// Commanded values supported for track parameters that are available for a
// capability and can be used to customize target detections.
enum PO_TrackCapabilityTypeEnum {
  PO_TRACK_CAPABILITY_TYPE_ENUM_UNSPECIFIED = 0;
  PO_TRACK_CAPABILITY_TYPE_ENUM_COMMAND_TRACK_MODE = 1;
  PO_TRACK_CAPABILITY_TYPE_ENUM_TRACK_AREA_CONTROL = 2;
  PO_TRACK_CAPABILITY_TYPE_ENUM_TRACK_LOCK_PERSISTENCE = 3;
}

// Allowable track offset setting parameters (Azimuth/Elevation/Roll and
// Azimuth/Elevation/Roll Rates) from the center of the LOS of the PO sensor.
// uci_version: 000.000.000.000
message PO_OffsetTrackSettingsType {
  // Indicates the maximum and minimum allowed values for the LOS in azimuth.
  DoubleMinMaxType azimuth_settings = 1;
  // Indicates the maximum and minimum allowed values for the LOS in elevation.
  DoubleMinMaxType elevation_settings = 2;
  // Indicates the maximum and minimum allowed values for the LOS in roll.
  optional DoubleMinMaxType roll_settings = 3;
  // Indicates the maximum and minimum allowed rates for the LOS in azimuth,
  // elevation and roll.
  optional RatesSettingsType rates_settings = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message RatesSettingsType {
  // Indicates the maximum and minimum allowed rates for the LOS in azimuth.
  DoubleMinMaxType azimuth_rate_settings = 1;
  // Indicates the maximum and minimum allowed rates for the LOS in elevation.
  DoubleMinMaxType elevation_rate_settings = 2;
  // Indicates the maximum and minimum allowed rates for the LOS in roll.
  optional DoubleMinMaxType roll_rate_settings = 3;
}

// Represents the allowed range of coast times for a designated PO environment.
// uci_version: 000.000.000.000
message PO_CoastSettingOptionsType {
  // Range of allowed coast time settings for a designated environment that
  // defines the time frame for coast tracks prior to dropping.
  DurationRangeType coast_time_settings = 1;
  // Indicates the PO environment associated with the allowed coast time
  // settings.
  EnvironmentEnum environment = 2;
}

// This type is used to specify a set of constraints that constrain when a PO
// or AO sensor can start collecting the requested image data.
// uci_version: 001.000.001.001
message PO_CollectionConstraintsType {
  // composed xsd extension base OpticalCollectionConstraintsType
  OpticalCollectionConstraintsType base = 1;
  // This field specified the type of collection constraint that is supported by
  // this sensor. See the enumeration for the various constraints that can be
  // supported.
  PO_CollectionConstraintsEnum constraint_type = 2;
  // Indicates the controllability of the collection constraint. Omission of
  // this element indicates the collection constraint is not dynamically
  // controllable. Enabling/disabling a product output controls whether or not
  // the sibling Product type and format will be generated. Resetting a product
  // output restores its product specific settings to default/factory
  // configuration. A configurable product output's settings can be changed.
  optional ComponentControllabilityA_Type controllability = 3;
}

// The enumeration of all collection constraints that may apply to a Passive
// Optical sensor.
enum PO_CollectionConstraintsEnum {
  PO_COLLECTION_CONSTRAINTS_ENUM_UNSPECIFIED = 0;
  PO_COLLECTION_CONSTRAINTS_ENUM_MAP_ANGLE = 1;
  PO_COLLECTION_CONSTRAINTS_ENUM_GRAZING_ANGLE = 2;
  PO_COLLECTION_CONSTRAINTS_ENUM_LOOKAHEAD_ANGLE = 3;
  PO_COLLECTION_CONSTRAINTS_ENUM_ELEVATION_ANGLE = 4;
  PO_COLLECTION_CONSTRAINTS_ENUM_SLANT_RANGE = 5;
  PO_COLLECTION_CONSTRAINTS_ENUM_COLLECTION_PATTERN = 6;
  PO_COLLECTION_CONSTRAINTS_ENUM_SUN_ELEVATION = 7;
  PO_COLLECTION_CONSTRAINTS_ENUM_SUN_AZIMUTH = 8;
  PO_COLLECTION_CONSTRAINTS_ENUM_SWEEP_SPEED = 9;
  PO_COLLECTION_CONSTRAINTS_ENUM_GIMBAL_ORIENTATION = 10;
}

// Indicates the field of regard (FOR) limits for a passive optical sensor to
// what it can view from its mounting position on the platform typically due
// to physical barriers such as sensor window limitations. Establishes
// conditions for defined FOR and provide lists of LOS points that allows
// defining a region relative to the reference position and provide an
// optional warning threshold when within range of boundaries.
// uci_version: 001.000.000.000
message FOR_Type {
  // Indicates what FOR curve that this series of points and/or warning
  // threshold pertains to.
  FOR_Enum for_type = 1;
  // Indicates the Azimuth/Elevation position for a point or series of points to
  // allow a FOR curve to be generated.
  repeated LOS_VariableA_Type los = 2;
  // Indicates a minimum angle value to allow a subsystem to figure out all
  // curves based on this value and one additional curve.
  // xsd type: AnglePositiveType
  optional double warning_threshold = 3;
}


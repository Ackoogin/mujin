  repeated CapabilityStatusType capability_status = 2;
  // Indicates the remaining fuel of the capability.
  optional AvailableFuelType fuel_remaining = 3;
  // Indicates a message that is currently an output of the Capability.
  optional RefuelCapabilityStatusType refuel_capability_status = 4;

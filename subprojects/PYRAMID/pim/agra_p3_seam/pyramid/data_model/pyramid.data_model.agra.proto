// See the annotation in the associated message for an overall description of
// the message and this type.
// uci_version: 000.000.000.000
message MA_TaskMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // Indicates the state of the internal software object that the data in the
  // message is based upon. The state of the software object is determined by
  // the publisher. The publisher could be the original/master publisher or an
  // intermediary re-publisher such as a persistence/data manager. This element
  // is not a commanded CRUD operation. It is not an indication of the state of
  // an instance of a message. It is not a mechanism for partial, incremental,
  // or fragmentary publication of a message. It is a signal from a publisher to
  // subscribers. For REMOVED state, in particular, some subscribers will mirror
  // the publisher and treat the message as if the object no longer exists, but
  // others, such as mission recorders, might not (in order to support retaining
  // historical records of activity, for example).
  optional ObjectStateEnum object_state = 2;
  // See annotations in child elements and messages/elements that use this type
  // for details.
  MA_TaskMDT message_data = 3;
}

// See the annotation in the associated message for an overall description of
// the message and this type.
// uci_version: 000.000.000.000
message MA_TaskMDT {
  // Unique identifier for a task. Minor updates to the Task can be indicated by
  // an update of the value in the child Version element. More significant
  // updates, replacements, etc. might warrant a new instance with a different
  // child UUID value.
  TaskID_Type task_id = 1;
  // Identifies the type of this Task instance.
  MA_TaskType task_type = 2;
  // Indicates whether the task is meant to be executed by a single entity or as
  // a joint operation. A join operation implies forming a group prior to
  // execution. A single entity could be a single system or a single pre-formed
  // group.
  MA_TaskPluralityEnum task_plurality = 3;
  // Indicates any Constraints that apply to the Task.
  repeated MA_ConstraintID_Type constraint_id = 4;
  // Indicates constraints on the Task. The constraint type used here is common
  // to all Requirement types: Effect, Action, Task, [Capability]Command,
  // Response. Requirement constraints can be 1) given in a [Requirement]
  // message, 2) overridden as a planning input in a [Requirement]PlanCommand
  // message, 3) further refined/overridden during plan creation and reported in
  // a [Requirement]Plan message to inform subsequent planning or execution.
  optional MA_RequirementConstraintsType task_constraints = 5;
  // Indicates guidance on planning and C2 of the Task.
  optional RequirementGuidanceType task_guidance = 6;
  // Indicates traceability and other metadata associated with the Task.
  optional RequirementMetadataType metadata = 7;
}

// Identifies the type of this Task instance. Note: When modifying this
// complexType (whether adding or removing choices), there are equivalent
// complexTypes that require the same modifications. Changes to this type may
// necessitate a modification to CapabilityTaxonomyType.
// uci_version: 000.000.000.000
message MA_TaskType {
  oneof choice {
    // Air sample includes direct sampling of the air (SAMPLE) and remote sensing
    // with spectral analysis (SPECTROMETER) with the intent of detecting NBC
    // events.
    AirSampleTaskType air_sample = 1;
    // Indicates a Task to collect Air Moving Target Indicator (AMTI) data.
    AMTI_TaskType amti = 2;
    // Indicates a Task to perform an optical emission such as laser designation.
    AO_TaskType ao = 3;
    // Indicates a Task to perform Combat Air Patrol.
    MA_CAP_TaskType cap = 4;
    // Indicates a Task to transfer cargo between locations.
    CargoDeliveryTaskType cargo_delivery = 5;
    // Indicates a Task to provide COMINT.
    COMINT_TaskType comint = 6;
    // Indicates a Task to provide communications relay support.
    CommRelayTaskType comm_relay = 7;
    // Indicates a Task to employ a CounterSpace capability.
    CounterSpaceTaskType counter_space = 8;
    // Indicates a Task to escort another Entity or System.
    MA_EscortTaskType escort = 9;
    // Indicates a Task to provide electronic attack support to another System. It
    // guides/constrains the EA System by specifying where it should fly, what it
    // should protect and what the threat is.
    EA_TaskType ea = 10;
    // Indicates a Task to collect ESM data.
    ESM_TaskType esm = 11;
    // Indicates a Task to effect the flight path/plan of the System.
    MA_FlightTaskType flight = 12;
    // Indicates a Task to a jettisonable weapon from the system.
    MA_JettisonTaskType jettison = 13;
    // Indicates a task to perform an orbit change via a spacecraft maneuver.
    OrbitChangeTaskType orbit_change = 14;
    // Indicates an Orbital Surveillance Task.
    OrbitalSurveillanceTaskType orbital_surveillance = 15;
    // Indicates a task to perform orbital surveillance sensor tasking.
    OrbitalSurveillanceSensorTaskType orbital_surveillance_sensor = 16;
    // Indicates a Task to collect Passive Optical data, imagery and video as well
    // as perform PO search and track capabilities.
    PO_TaskType po = 17;
    // Indicates a Task for one System to refuel another.
    RefuelTaskType refuel = 18;
    // Indicates a Task to collect a Synthetic Aperture Radar (SAR) image.
    SAR_TaskType sar = 19;
    // Indicates a Task to collect Moving Target Indicator (MTI) data.
    SMTI_TaskType smti = 20;
    // Indicates a Task to kinetically attack/strike, with a weapon that can be
    // released from the System.
    StrikeTaskType strike = 21;
    // Indicates a task to perform a deployment or release of a system at a
    // specified location.
    SystemDeploymentTaskType system_deployment = 22;
    // Indicates a task to perform a tactical order.
    TacticalOrderTaskType tactical_order = 23;
    // Indicates a task to collect weather radar data.
    WeatherRadarTaskType weather_radar = 24;
  }
}

// See annotations in child elements and messages/elements that use this type

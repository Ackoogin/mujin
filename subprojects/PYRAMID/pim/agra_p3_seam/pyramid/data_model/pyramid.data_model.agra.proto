message WeatherRadarCommandMDT {
  // Indicates an instance of a Weather Radar Capability command. A Capability
  // command message can have multiple command instances to allow a sequence of
  // related commands in a single coherent message. Each command instance
  // reports status via a separate, independent Capability CommandStatus message.
  repeated WeatherRadarCommandType command = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.002.000
message WeatherRadarCommandType {
  oneof choice {
    // Indicates a new invocation of a Weather Radar Capability. Generally, if
    // accepted, the command will result in one or more new Weather Radar
    // Activities being created and reported via the WeatherRadarActivity message.
    // The request/response interaction terminates as soon as the command is
    // accepted or rejected; this element is not used to interact with an "active"
    // command. Updates and/or additional interaction with the resulting Activity
    // (after the command is accepted) is accomplished via the sibling Activity
    // element.
    WeatherRadarCapabilityCommandType capability = 1;
    // Indicates a command to modify an existing Weather Radar Activity (which was
    // previously reported via the WeatherRadarActivity message and was marked as
    // "interactive"). The request/response interaction terminates as soon as the
    // modification is accepted or rejected. The modifications are reflected in
    // subsequent WeatherRadarActivity messages.
    RadarActivityCommandType activity = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.002.000
message WeatherRadarCapabilityCommandType {
  // composed xsd extension base CapabilityCommandBaseType
  CapabilityCommandBaseType base = 1;
  // This defines the air volume for A2A activities. This can be used for both
  // general volume search as well as a cued search.
  AirVolumeSensorReferencedType air_volume = 2;
  // Indicates the frequency to be used for the Command. If omitted, frequency
  // selection is left to the command recipient within constraints of
  // RF_Profiles imposed by RF_ControlCommand, MDF, etc.
  optional CapabilityCommandFrequencyType frequency = 3;
  // Indicates guidance regarding which aspect or aspects of collection to favor
  // if the command cannot be optimally scheduled as requested. See enumerated
  // type annotations for further details. Omitting this element is equivalent
  // to FLEXIBLE, that is deferring to the Command recipient.
  optional CollectionPolicyEnum collection_policy = 4;
  // Indicates the required repetition of the command. If omitted, the command
  // should be performed once.
  optional RepetitionType repetition = 5;
  // Indicates a required output Product of the Command. Only Products
  // consistent with WeatherRadar and supported by the commanded WeatherRadar
  // Capability should be requested. If omitted, no output Product should be
  // produced. See ProductTypeEnum for further details.
  repeated ProductOutputCommandBasicType product_output = 6;
  // Used to control the RF emissions associated with this command. If this
  // field is not populated, the service determines all parameters.
  optional EmconConstraintType emcon = 7;
  // Indicates the list of externally controllable EP options that should be
  // applied to this command instead of the EP options currently enabled for
  // this Capability. If this list is a subset of the EP options that are
  // available for this capability, then no other EP options should be employed
  // for this command.
  repeated ElectronicProtectionOptionsEnableType electronic_protection_options_override = 8;
}


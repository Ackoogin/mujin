// The base type extended from for all *CapabilityStatusMDT types. The
// SystemReadiness message depends on each CapabilityStatus message following
// this pattern. Each *CapabilityStatusMDT type will need to add a field of
// CapabilityStatusType independently but may contain something different, SAR
// and Strike are examples of this.
// uci_version: 000.000.000.000
message CapabilityStatusBaseType {
  // The MDF status for the Capabilities. Includes the Current, Commanded and
  // Failed MDF status applicable to the Capabilities. If individual MDF_Status
  // needs to be reported for a specific Capability it can be done by extending
  // the CapabilityStatusType; see message structure for
  // CommTerminalCapabilityStatus.
  optional MDF_StatusType mdf_status = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MDF_StatusType {
  // Indicates the currently active Mission Data File for this Capability.
  repeated MDF_CommandType current_mdf = 1;
  // Indicates the MDF that has been commanded for activation for this
  // Capability. Upon completion of activation, this MDF becomes the CurrentMDF.
  repeated MDF_CommandType commanded_mdf = 2;
  // Indicates the MDF that most recently failed activation for this Capability.
  repeated MDF_CommandType failed_mdf = 3;
}

// Indicates the commanded Mission Data File (MDF). An MDF is a collection of
// data, organized into files, that is used to tailor, configure or otherwise
// affect the behavior of a Capability. MDFs can vary from mission to mission
// or even by phases of a single mission. They are generally developed in
// pre-mission planning and are unique for each Subsystem model. Their content
// is not standardized by UCI, but the mechanism for advertising their
// availability and activating them is. Their content is abstracted by the UCI
// concept of Capability.
// uci_version: 000.000.000.000
message MDF_CommandType {
  // Indicates the unique ID associated with the MDF. The child DescriptiveLabel
  // should indicate a human readable description of the MDF that distinguishes
  // it from others associated with the same Capability.
  MDF_ID_Type mdf_id = 1;
  // Indicates a subcategory of files that make up the MDF. When an MDF is
  // "active", at most one file from each subcategory can be active. The
  // subcategory concept allows a variety of MDF structures across Capability
  // types and manufacturers. For an ESM Capability, example subcategories could
  // be "scan files" and "emitter ID files". For an EA Capability, an example is
  // "jam files". This element is optional to support Capabilities or Subsystems
  // whose MDF isn't decomposed into individually selectable categories and
  // files.
  repeated MDF_CommandSubCategoryType sub_category = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MDF_CommandSubCategoryType {
  // Indicates the unique ID associated with the MDF subcategory. The child
  // DescriptiveLabel should indicate a human readable description of the
  // subcategory that distinguishes it from others in the same MDF.
  MDF_SubCategoryID_Type sub_category_id = 1;
  // Indicates the unique ID of the active or commanded file associated with the
  // MDF subcategory. For a given subcategory, only one file can be active or
  // commanded at a time. The child DescriptiveLabel should indicate a human
  // readable description of the file that distinguishes it from others in the
  // same subcategory.
  MDF_SubCategoryFileID_Type file_id = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MDF_SubCategoryID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// Provides general status information for a Capability. Each
// *CapabilityStatusMDT type will need to add a field of CapabilityStatusType
// independently but may contain something different, SAR and Strike are
// examples of this.
// uci_version: 001.000.002.000
message CapabilityStatusType {
  // Indicates the unique ID of the Capability corresponding to this message.
  CapabilityID_Type capability_id = 1;
  // Indicates the availability of the Capability corresponding to this message.
  AvailabilityInfoType availability_info = 2;
  // Indicates the precedence of the Capability amongst all Capabilities of the
  // Subsystem.
  optional uint32 capability_precedence = 3;
  // The ID of the represented entity needed to express release authorization
  // for applicable capabilities. Operator launches and mission planned launches
  // are examples of this.
  optional ForeignKeyType representation_key = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.002.000
message AvailabilityInfoType {
  // Indicates the availability for data, e.g., Capability, SubCapability,
  // SupportCapability, Component, or other.
  CapabilityAvailabilityEnum availability = 1;
  // Indicates details regarding the reason for and/or a contributing factor to
  // the sibling Availability element. This element is only expected when there
  // is a potentially undesirable state such as faulted, temporarily unavailable
  // or otherwise expects less than optimum results.
  optional CannotComplyType availability_reason = 2;
  // Indicates a prediction of when the next time window is available.
  // xsd type: DateTimeType (pattern .+Z)
  optional string next_available_window = 3;
}

// Indicates the availability state of the defined capability. See enumeration
// annotations for further details.
enum CapabilityAvailabilityEnum {
  CAPABILITY_AVAILABILITY_ENUM_UNSPECIFIED = 0;
  CAPABILITY_AVAILABILITY_ENUM_AVAILABLE = 1;
  CAPABILITY_AVAILABILITY_ENUM_UNAVAILABLE = 2;
  CAPABILITY_AVAILABILITY_ENUM_TEMPORARILY_UNAVAILABLE = 3;
  CAPABILITY_AVAILABILITY_ENUM_EXPENDED = 4;
  CAPABILITY_AVAILABILITY_ENUM_DISABLED = 5;
  CAPABILITY_AVAILABILITY_ENUM_FAULTED = 6;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message RF_ProfileType {
  // Indicates the unique ID of a RF_Profile to apply to the Capability.
  RF_ProfileID_Type rf_profile_id = 1;
  // Indicates the geospatial zone and optionally time/date span or spans when
  // the profile is active. The profile is applicable to RF operations that 1)
  // are scheduled to complete within the time/date span and 2) have a target
  // which falls within the zone. This element supersedes the sibling Expires
  // element.
  optional TimedZoneType timed_zone = 2;
  // Indicates the time and date when the profile expires. The profile is
  // applicable to RF operations initiated prior to this time. When the sibling
  // TimedZone element is used, the time spans specified there supersede this
  // element.
  // xsd type: DateTimeType (pattern .+Z)
  optional string expires = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message RF_ProfileID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// Extends ZoneType with a time schedule during which the zone applies.
// uci_version: 002.000.002.001
message TimedZoneType {
  // composed xsd extension base ZoneType
  ZoneType base = 1;
  // Indicates the time schedule (multiple time spans, periodic availability or
  // both) when the zone is applicable.
  ScheduleType schedule = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message ScheduleType {
  oneof choice {
    // Supports specifying multiple spans of time.
    ScheduleType_TimeSpan_List time_span = 1;
    // Supports specifying daily periodicity.
    ScheduleType_WeekdayInterval_List weekday_interval = 2;
  }
}

// synthesized list wrapper for repeated choice member TimeSpan in ScheduleType (choice)
message ScheduleType_TimeSpan_List {
  repeated DateTimeRangeType items = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message WeekdayIntervalType {
  // Indicates the period of time during which the weekday interval is valid. In
  // other words, this sets the number of weeks/months during which the
  // WeekdayInterval is active.
  DateTimeRangeType time_span = 1;
  // Indicates the days of the week in which the interval is valid. List size
  // for this element is based on "Select All That Apply" condition.
  repeated WeekdayEnum weekday = 2;
  // Indicates the number of weeks between occurrences. 1 = weekly, 2 = every
  // other week, etc.
  uint32 weekly_interval_period = 3;
  // Indicates the time of day, on a day given by the Weekday element, at which
  // the interval starts.
  // xsd type: TimeType (pattern .+Z)
  optional string start_time = 4;
  // Indicates the duration of each occurrence.
  // xsd type: DurationType
  optional string duration = 5;
}

// An enumeration indicating the day of the week.
enum WeekdayEnum {
  WEEKDAY_ENUM_UNSPECIFIED = 0;
  WEEKDAY_ENUM_SUNDAY = 1;
  WEEKDAY_ENUM_MONDAY = 2;
  WEEKDAY_ENUM_TUESDAY = 3;
  WEEKDAY_ENUM_WEDNESDAY = 4;
  WEEKDAY_ENUM_THURSDAY = 5;
  WEEKDAY_ENUM_FRIDAY = 6;
  WEEKDAY_ENUM_SATURDAY = 7;
}

// synthesized list wrapper for repeated choice member WeekdayInterval in ScheduleType (choice)
message ScheduleType_WeekdayInterval_List {

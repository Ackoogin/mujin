message WeaponTargetPairingChoiceType_DMPI_ID_List {
  repeated DMPI_ID_Type items = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.001.003.001
message WeaponeeringLocationType {
  // composed xsd extension base WeaponeeringType
  WeaponeeringType base = 1;
  // Indicates information specifying the location of the DMPI.
  DMPI_LocationType target_location = 2;
}

// Specifies the DMPI location information.
// uci_version: 001.000.002.000
message DMPI_LocationType {
  // Indicates the geographic location of the DMPI. Generally, services are
  // encouraged to send time data whenever it is known. In this case the time
  // data should indicate the time when mensuration of the target/DMPI was
  // performed.
  Point3D_Type dmpi_coordinates = 1;
  // Indicates the altitude error of the DMPI. This element specifies the
  // vertical component of the geospatial position accuracy due to measurement
  // errors. It is the linear error of the location with an uncertainty
  // specified by sibling field Confidence, i.e. a percent (indicated by sibling
  // field Confidence) of all vertical errors in the DMPI location will be less
  // than or equal to this element. The sibling CircularErrorProbable and
  // Confidence fields should be provided when this field is provided.
  // xsd type: DistanceType
  optional double linear_error_probable = 2;
  // This element specifies the horizontal component of the geospatial position
  // accuracy due to measurement errors. It is the radius of a circle centered
  // on the location in which there is a specified probability (sibling field
  // Confidence) that the target lies within. The sibling LinearErrorProbable
  // and Confidence fields should be provided when this field is provided.
  // xsd type: DistanceType
  optional double circular_error_probable = 3;
  // This element is the percent of confidence in the measurement errors
  // associated with the geospatial accuracy of a location. For example if the
  // value is 90%, then 90% of all DMPI location horizontal errors will be less
  // than or equal to sibling CircularErrorProbable and 90% of all DMPI location
  // vertical errors will be less than or equal to sibling LinearErrorProbable.
  // The sibling CircularErrorProbable and LinearErrorProbable fields should be
  // provided when this field is provided.
  // xsd type: PercentType
  optional double confidence = 4;
}

// synthesized list wrapper for repeated choice member Weaponeering in WeaponTargetPairingChoiceType (choice)
message WeaponTargetPairingChoiceType_Weaponeering_List {
  repeated WeaponeeringLocationType items = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.002.000
message PlannedReleaseConditionsType {
  // Notional System position at time of release.
  Point3D_Type position = 1;
  // Representation of the vehicle's velocity as directional components in True
  // Air Speed.
  Velocity2D_Type velocity = 2;
  // Euler Angle Sequence describing the orientation of the vehicle in the order
  // yaw, pitch, roll. The angles are given in a locally level, North-East-Down
  // coordinate system centered on the vehicle.
  optional OrientationType orientation = 3;
  // This element represents wind speed at the release point.
  optional Velocity2D_Type wind_velocity = 4;
  // Indicates the RoutePlan associated with the sibling release conditions.
  optional RoutePlanReferenceType associated_route_plan = 5;
}


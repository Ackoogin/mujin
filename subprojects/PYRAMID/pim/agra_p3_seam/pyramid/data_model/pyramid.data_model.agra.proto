  repeated MA_FlightCapabilityEnum capability_type = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_JettisonTaskType {
  // Indicates which capability weapon mission stores are to jettisoned.
  MA_JettisonStoreSelectionType jettison_store_selection = 1;
  // Indicates if and in which situations a store can be jettisoned.
  MA_StoreJettisonTypeEnum store_jettison_type = 2;
}

// See annotations in child elements and messages/elements that use this type

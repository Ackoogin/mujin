// uci_version: 002.000.003.000
message MA_ConstrainingPlansType {
  // Indicates a type of Plan that constrains the existing/referenced/commanded
  // *Plan (OrbitPlan, RoutePlan, etc.). A *PlanCommand that includes the
  // ancestor ReplanReason element occurs only during live and/or autonomous
  // operations. During live/autonomous operations, a constrained *PlanCommand
  // is understood to be constrained by the current/latest *Plan. Therefore, a
  // *PlanCommand with a ReplanReason can indicate a constraining *Plan without
  // listing the unique ID; this element alone is sufficient to identify the
  // constraining plan. During non-live/non-autonomous operations, when the
  // sibling ReplanReason element is not given, the sibling *Plan element
  // corresponding to this element should include the specific *Plan unique ID
  // and constraining details corresponding to this element. If omitted during
  // non-live operations, the corresponding sibling *Plan element should also be
  // omitted. List size for this element is based on "Select All That Apply"
  // condition.
  repeated PlanTypeEnum constraining_plan_type = 1;
  // Indicates a MissionPlan that constrains the existing/referenced/commanded
  // *Plan (OrbitPlan, RoutePlan, etc.). For a given kind of System, *Plans
  // might always be created in a particular order. For other Systems, *Plans
  // might initially be created in a particular order with updates in another
  // order or orders. For other Systems, the order might be completely variable
  // depending on conditions, priority, operator preference, etc. Therefore, any
  // kind of *Plan might be a constraint on the creation or update of any other
  // kind. When omitted, the existing/referenced/commanded *Plan isn't
  // constrained by a MissionPlan.
  repeated MissionPlanID_Type mission_plan_id = 2;
  // Indicates a TaskPlan that constrains the existing/referenced/commanded
  // *Plan (OrbitPlan, RoutePlan, etc.). For a given kind of System, *Plans
  // might always be created in a particular order. For other Systems, *Plans
  // might initially be created in a particular order with updates in another
  // order or orders. For other Systems, the order might be completely variable
  // depending on conditions, priority, operator preference, etc. Therefore, any
  // kind of *Plan might be a constraint on the creation or update of any other
  // kind. When omitted, the existing/referenced/commanded *Plan isn't
  // constrained by a TaskPlan.
  repeated MA_TaskPlanConstraintType task_plan = 3;
  // Indicates a RoutePlan that constrains the existing/referenced/commanded
  // *Plan (OrbitPlan, RoutePlan, etc.). For a given kind of System, *Plans
  // might always be created in a particular order. For other Systems, *Plans
  // might initially be created in a particular order with updates in another
  // order or orders. For other Systems, the order might be completely variable
  // depending on conditions, priority, operator preference, etc. Therefore, any
  // kind of *Plan might be a constraint on the creation or update of any other
  // kind. When omitted, the existing/referenced/commanded *Plan isn't
  // constrained by a RoutePlan.
  repeated RoutePlanConstraintType route_plan = 4;
  // Indicates a RouteActivityPlan that constrains the
  // existing/referenced/commanded *Plan (OrbitPlan, RoutePlan, etc.). For a
  // given kind of System, *Plans might always be created in a particular order.
  // For other Systems, *Plans might initially be created in a particular order
  // with updates in another order or orders. For other Systems, the order might
  // be completely variable depending on conditions, priority, operator
  // preference, etc. Therefore, any kind of *Plan might be a constraint on the
  // creation or update of any other kind. When omitted, the
  // existing/referenced/commanded *Plan isn't constrained by a
  // RouteActivityPlan.
  repeated RouteActivityPlanConstraintType route_activity_plan = 5;
  // Indicates an OrbitPlan that constrains the existing/referenced/commanded
  // *Plan (OrbitPlan, RoutePlan, etc.). For a given kind of System, *Plans
  // might always be created in a particular order. For other Systems, *Plans
  // might initially be created in a particular order with updates in another
  // order or orders. For other Systems, the order might be completely variable
  // depending on conditions, priority, operator preference, etc. Therefore, any
  // kind of *Plan might be a constraint on the creation or update of any other
  // kind. When omitted, the existing/referenced/commanded *Plan isn't
  // constrained by an OrbitPlan.
  repeated OrbitPlanConstraintType orbit_plan = 6;
  // Indicates an OrbitActivityPlan that constrains the
  // existing/referenced/commanded *Plan (OrbitPlan, RoutePlan, etc.). For a
  // given kind of System, *Plans might always be created in a particular order.
  // For other Systems, *Plans might initially be created in a particular order
  // with updates in another order or orders. For other Systems, the order might
  // be completely variable depending on conditions, priority, operator
  // preference, etc. Therefore, any kind of *Plan might be a constraint on the
  // creation or update of any other kind. When omitted, the
  // existing/referenced/commanded *Plan isn't constrained by an
  // OrbitActivityPlan.
  repeated OrbitActivityPlanConstraintType orbit_activity_plan = 7;
  // Indicates an ActivityPlan that constrains the existing/referenced/commanded
  // *Plan (OrbitPlan, RoutePlan, etc.). For a given kind of System, *Plans
  // might always be created in a particular order. For other Systems, *Plans
  // might initially be created in a particular order with updates in another
  // order or orders. For other Systems, the order might be completely variable
  // depending on conditions, priority, operator preference, etc. Therefore, any
  // kind of *Plan might be a constraint on the creation or update of any other
  // kind. When omitted, the existing/referenced/commanded *Plan isn't
  // constrained by an ActivityPlan.
  repeated ActivityPlanConstraintType activity_plan = 8;
  // Indicates a CommAllocation that constrains the
  // existing/referenced/commanded *Plan (OrbitPlan, RoutePlan, etc.). For a
  // given kind of System, *Plans might always be created in a particular order.
  // For other Systems, *Plans might initially be created in a particular order
  // with updates in another order or orders. For other Systems, the order might
  // be completely variable depending on conditions, priority, operator
  // preference, etc. Therefore, any kind of *Plan might be a constraint on the
  // creation or update of any other kind. When omitted, the
  // existing/referenced/commanded *Plan isn't constrained by a CommAllocation.
  repeated CommAllocationConstraintType comm_allocation = 9;
  // Indicates an EffectPlan that constrains the existing/referenced/commanded
  // *Plan (OrbitPlan, RoutePlan, etc.). For a given kind of System, *Plans
  // might always be created in a particular order. For other Systems, *Plans
  // might initially be created in a particular order with updates in another
  // order or orders. For other Systems, the order might be completely variable
  // depending on conditions, priority, operator preference, etc. Therefore, any
  // kind of *Plan might be a constraint on the creation or update of any other
  // kind. When omitted, the existing/referenced/commanded *Plan isn't
  // constrained by an EffectPlan.
  repeated EffectPlanConstraintType effect_plan = 10;
  // Indicates an ActionPlan that constrains the existing/referenced/commanded
  // *Plan (OrbitPlan, RoutePlan, etc.). For a given kind of System, *Plans
  // might always be created in a particular order. For other Systems, *Plans
  // might initially be created in a particular order with updates in another
  // order or orders. For other Systems, the order might be completely variable
  // depending on conditions, priority, operator preference, etc. Therefore, any

message AvailableFuelType {
  oneof choice {
    // Indicates the actual weight of the fuel remaining.
    // xsd type: MassType
    double fuel = 1;
    // Indicates the amount of fuel remaining as a percentage of capacity.
    // xsd type: PercentType
    double percent = 2;
  }

  // sensitivity levels. If omitted tracking range selection is the full range
  // of the reference type. A common range is [0,15].
  optional uint32 false_alarm_level_upper_limit = 5;
  // Indicates the list of EP capabilities that the current HW / SW allows an
  // external actor to control for this capability.
  repeated ElectronicProtectionOptionsSupportedType electronic_protection_options_supported = 6;
}

// Indicates the multistatic options supported by the Capability.
// uci_version: 000.000.000.000
message MultistaticOptionsSupportedType {

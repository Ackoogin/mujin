  AMTI_SUB_CAPABILITY_ENUM_ACTIVE_TRACK_UPDATE = 3;
  AMTI_SUB_CAPABILITY_ENUM_AUTO_SUBCAPABILITY_SELECT = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.001.002.000
message AirTargetVolumeCommandType {
  oneof choice {
    // Indicates the commanded air volume extents.
    AirVolumeCueType air_volume = 1;
    // Indicates the unique ID of an Entity that is the target of a cued AMTI
    // search. This element can be used as the full specification of the target
    // volume for the cued search. It can also be used in combination with the
    // sibling AirVolume element to define extents of the cue volume around the
    // Entity.
    EntityID_Type entity_id = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message AirVolumeCueType {
  // Indicates the commanded air volume center and extents.
  AirTargetVolumeType volume_location = 1;
  // If capability is CUED, this field provides an estimate of the velocity of
  // the center of the cue for moving targets. This velocity is at the center of
  // the current cue.
  optional Velocity2D_UncertaintyType cue_velocity = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message AirTargetVolumeType {
  oneof choice {
    // Indicates a 3D sensor referenced volume that an air volume capability is
    // directed against. This will define the volume in terms of azimuth and
    // elevation angles.
    AirVolumeSensorReferencedType air_volume_sensor_referenced = 1;
    // Indicates a 3D area that an air volume capability is directed against. This
    // should define the latitude/longitude extents of the volume along with any
    // guidance regarding the height of the volume.
    ZoneType air_volume_location = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message AirVolumeSensorReferencedType {
  // Indicates the commanded azimuth width. It represents the angular width
  // between the two 3 dB extents of the scan volume.
  // xsd type: AnglePositiveType
  double azimuth_scan_width = 1;
  // Indicates the commanded azimuth center. For BODY stabilized volumes it is
  // referenced to the centerline of the platform. For INERTIAL stabilized
  // volumes it is referenced to true north; clockwise rotation is positive in
  // both cases.
  // xsd type: AngleType
  double azimuth_scan_center = 2;
  // Indicates the commanded elevation scan width. It represents the angular
  // width between the two 3 dB extents of the scan volume.
  // xsd type: AngleHalfType
  double elevation_scan_width = 3;
  // Indicates the commanded elevation center. For BODY stabilized volumes it is
  // referenced to the centerline of the platform. For CENTER_ALTITUDE
  // stabilized volumes it is referenced to the center altitude range pair.
  // xsd type: AngleHalfType
  double elevation_scan_center = 4;
  // Indicates the maximum range of interest. This will potential affect dwell
  // times, scan rates, reported Entities, etc.
  // xsd type: DistanceType
  double max_range_of_interest = 5;
  // Indicates the minimum range of interest. This will potential affect dwell
  // times, scan rates, reported Entities, etc.
  // xsd type: DistanceType
  double min_range_of_interest = 6;
  // Center of volume can be stabilized either relative to the centerline of the
  // aircraft (BODY) or relative to true north (INERTIAL). In either case the
  // radar will position volume either aligned with the aircraft's current
  // direction or a particular line of bearing.
  LOS_ReferenceEnum azimuth_scan_stabilization = 7;
  // Center of volume can be stabilized either relative to the boresight of the
  // antenna installation on the aircraft (BODY) or relative to a location
  // defined by the Elevation Scan Center Altitude Range Pair (CENTER_ALTITUDE).
  // In either case the radar will position volume either aligned with the
  // aircraft's current pitch.
  ElevationScanStabilizationEnum elevation_scan_stabilization = 8;
  // For a center altitude stabilized elevation volumes, this is the center
  // point around which the volume is stabilized.
  optional AltitudeRangePairType elevation_scan_center_altitude_range_pair = 9;
  // Indicates whether (TRUE) or not (FALSE) the volume should be stabilized
  // parallel to the horizon.
  bool roll_stabilized = 10;
}

// Indicates the reference for pointing of a Capability. For example, for an
// AMTI Capability this enum would indicate whether the AMTI scan volume is
// pointed relative to the System body or along a fixed inertial angle.
enum LOS_ReferenceEnum {
  LOS_REFERENCE_ENUM_UNSPECIFIED = 0;
  LOS_REFERENCE_ENUM_BODY = 1;
  LOS_REFERENCE_ENUM_NED = 2;
  LOS_REFERENCE_ENUM_INERTIAL = 3;
  LOS_REFERENCE_ENUM_CAPABILITY = 4;
}

// For an A2A search volume; this enum defines how to interpret the elevation
// volume center.
enum ElevationScanStabilizationEnum {
  ELEVATION_SCAN_STABILIZATION_ENUM_UNSPECIFIED = 0;
  ELEVATION_SCAN_STABILIZATION_ENUM_BODY = 1;
  ELEVATION_SCAN_STABILIZATION_ENUM_CENTER_ALTITUDE = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message AltitudeRangePairType {
  // This defines the altitude around which the volume is stabilized.
  // xsd type: AltitudeType
  double altitude = 1;
  // This defines the range at which the associated altitude is calculated to
  // define a particular geospatial point.
  // xsd type: DistanceType
  double range = 2;
}

// A zone comprises a two dimension region and an optional altitude band. If
// AltitudeReference is not specified, altitude is the WGS-84 height above the
// ellipsoid.
// uci_version: 002.000.002.001
message ZoneType {
  // Indicates the geometry used to define the zone area.
  AreaChoiceType shape = 1;
  // The lowest altitude boundary of this zone. If omitted the lower boundary is
  // the earth's surface. Altitude information found in the sibling Shape
  // element is invalid in all cases.
  // xsd type: AltitudeType
  optional double min_altitude = 2;
  // The highest altitude boundary of this zone. If omitted there isn't an upper
  // boundary. Altitude information found in the sibling Shape element is
  // invalid in all cases.
  // xsd type: AltitudeType
  optional double max_altitude = 3;
  // If specified, altitudes in MinAltitude and MaxAltitude will be dictated by
  // the measurement source enumeration.
  optional AltitudeReferenceEnum altitude_reference = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message AreaChoiceType {
  oneof choice {
    // Specifies the vertices of a polygon; three or more points and sides. These
    // can be absolute geospatial points or they can be geospatial points relative
    // to a specific reference frame.
    PolygonType polygon = 1;
    // An ellipse is defined by a center point and a circular or oval shape. An
    // ellipse can also be defined relative to a reference frame. Note that there
    // are two degrees of freedom for the ellipse orientation: 1. Using the
    // Orientation field within the ellipse the orientation of the ellipse within
    // the reference frame may be specified. 2. Using the orientation of the
    // reference frame specifies the orientation of every object relative to the
    // reference frame. As an example, two ellipses could be specified with
    // different orientations within the reference frame. When the reference frame
    // turns the orientation of the ellipses relative to each other would not
    // change but they both would rotate relative to true North.
    LocatedEllipseType ellipse = 2;
    // A rectangle is defined by a center point, a width, height, and orientation.
    LocatedRectangleType rectangle = 3;
    // An area defined by two ranges and two angles relative to a geospatial
    // point. The geospatial point can be stationary or it can be relative to a
    // moving object/location so its definition is an offset to a location defined
    // in ReferenceFrame.This allows for defining an area around a location/object
    // that is moving, i.e. the area moves along with a system or entity.
    SlantRangeAreaType slant_range_area = 4;
  }
}

// Specifies a polygon. The vertices of the polygon can be specified by
// geospatial locations or as locations relative to a separately defined
// reference frame. Simple polygons (including those in which interior
// polygons are defined within a bounding polygon) are supported.
// uci_version: 002.001.002.001
message PolygonType {
  // Indicates the type of lines that form the BoundingPolygon and any
  // InteriorPolygon definitions.
  LineProjectionEnum line_projection = 1;
  // Geospatial points defining the vertices of a simple polygon (i.e closed and
  // non-intersecting). These points are ordered and assumed to be unique.
  // Closure is assumed between the final point and the first point. Smaller
  // polygon areas within the BoundingPolygon can be excluded from its
  // functional/operational purpose using the sibling InteriorPolygon element.
  PolygonPointChoiceType bounding_polygon = 2;
  // Geospatial points defining the vertices of a simple polygon (i.e closed and
  // non-intersecting) whose vertices lie wholly inside the BoundingPolygon and
  // whose edges do not intersect with other InteriorPolygon definitions. These
  // points are ordered and assumed to be unique. Closure is assumed between the
  // final point and the first point. The area within an InteriorPolygon is
  // functionally/operationally equivalent to the area outside the sibling
  // Bounding Polygon.
  repeated PolygonPointChoiceType interior_polygon = 3;
}

// Indicates the method in which a line is created.
enum LineProjectionEnum {
  LINE_PROJECTION_ENUM_UNSPECIFIED = 0;
  LINE_PROJECTION_ENUM_GREAT_CIRCLE = 1;
  LINE_PROJECTION_ENUM_RHUMB = 2;
}

// Specifies a polygon by geospatial locations or as locations relative to a
// separately defined reference frame.
// uci_version: 002.000.002.000
message PolygonPointChoiceType {
  oneof choice {
    // Geospatial points defining the vertices of a polygon.
    PolygonPointChoiceType_Point2D_List point2_d = 1;
    // Indicates a polygon that is relative to a separately defined reference
    // frame defined in ReferenceFrames message.
    PolygonRelativeType relative_polygon = 2;
  }
}

// This type represents positional data. The latitude and longitude, relative
// to the WGS-84 ellipsoid, are mandatory entries. If AltitudeReference is not
// specified, altitude is the WGS-84 height above the ellipsoid.
// uci_version: 001.000.002.001
message Point2D_Type {
  // Geospatial latitude measured in radians.
  // xsd type: AngleHalfType
  double latitude = 1;
  // Geospatial longitude measured in radians.
  // xsd type: AngleType
  double longitude = 2;
  // Height measured in meters using the reference specified by the
  // AltitudeReference field. If AltitudeReference is not specified, then the
  // reference is to be taken as WGS-84 ellipsoid.
  // xsd type: AltitudeType
  optional double altitude = 3;
  // Minimum and maximum height measured in meters in the reference specified by
  // the AltitudeReference field. If AltitudeReference is not specified, then
  // the reference is to be taken as WGS-84 ellipsoid.
  optional AltitudeRangeType altitude_range = 4;
  // Reference to altitude measurement source. This field should only be
  // populated when the Altitude or AltitudeRange field is populated.
  optional AltitudeReferenceEnum altitude_reference = 5;
  // Indicates the time when the positional data was measured or last known to
  // be correct. The element can also indicate the time at which a future
  // position of a System, Entity, etc. will be achieved.
  // xsd type: DateTimeType (pattern .+Z)
  optional string timestamp = 6;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message AltitudeRangeType {
  // Minimum value of the altitude range.
  // xsd type: AltitudeType
  double min = 1;
  // Maximum value of the altitude range.
  // xsd type: AltitudeType
  double max = 2;
}

// Source of reported altitude measurement data.
enum AltitudeReferenceEnum {
  ALTITUDE_REFERENCE_ENUM_UNSPECIFIED = 0;
  ALTITUDE_REFERENCE_ENUM_ALTITUDE_BAROMETRIC = 1;
  ALTITUDE_REFERENCE_ENUM_WGS_HAE = 2;
  ALTITUDE_REFERENCE_ENUM_MSL = 3;
  ALTITUDE_REFERENCE_ENUM_AGL = 4;
}

// synthesized list wrapper for repeated choice member Point2D in PolygonPointChoiceType (choice)
message PolygonPointChoiceType_Point2D_List {
  repeated Point2D_Type items = 1;
}

// Indicates a polygon that is relative to a separately defined reference
// frame defined in ReferenceFrame message.
// uci_version: 002.000.002.000
message PolygonRelativeType {
  // UUID of the reference frame object that this offset applies to.
  ReferenceFrameID_Type reference_frame_id = 1;
  // A relative polygon has a minimum of 3 vertices relative to the reference
  // frame origin. All points in the list are relative to the reference frame
  // origin, i.e. none of the points is assumed to be the reference point or
  // origin of the reference frame.
  repeated RelativeOffset2D_Type vertex = 2;
}

// The ID type for UCI IDs that correspond to reference frames.
// uci_version: 000.000.000.000
message ReferenceFrameID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.002.002.000
message RelativeOffset2D_Type {
  // Indicates frame rotation. See annotations of individual enumerations for
  // additional details.
  RotationEnum rotation = 1;
  // Indicates how the X and Y Offsets are to be interpreted. See annotations of
  // individual enumerations for additional details.
  OffsetXY_Enum xy_offsets = 2;
  // Offset in the X direction from the reference frame origin.
  // xsd type: DistanceOffsetType
  double x = 3;
  // Offset in the Y direction from the reference frame origin.
  // xsd type: DistanceOffsetType
  double y = 4;
  // Offset in the Z direction from the reference frame origin.
  optional Z_ChoiceType z = 5;
}

// Indicates how the X and Y Offsets are to be interpreted. See annotations of
// individual enumerations for additional details.
enum RotationEnum {
  ROTATION_ENUM_UNSPECIFIED = 0;
  ROTATION_ENUM_UNROTATED = 1;
  ROTATION_ENUM_ROTATION_2D = 2;
  ROTATION_ENUM_ROTATION_3D = 3;
  ROTATION_ENUM_HEADING = 4;
}

// Indicates how the X and Y Offsets are to be interpreted. See annotations of
// individual enumerations for additional details.
enum OffsetXY_Enum {
  OFFSET_XY_ENUM_UNSPECIFIED = 0;
  OFFSET_XY_ENUM_CARTESIAN = 1;
  OFFSET_XY_ENUM_GEODETIC_GREAT_CIRCLE = 2;
  OFFSET_XY_ENUM_GEODETIC_RHUMB = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.001.001.000
message Z_ChoiceType {
  oneof choice {
    // Offset in the Z direction from the reference frame origin. Down is positive.
    // xsd type: DistanceOffsetType
    double z = 1;
    // Offset in the Z direction is considered an altitude difference with
    // positive values corresponding to increases in altitude.
    AltitudeOffsetReferenceType altitude_offset = 2;
    // Optional choice to use Absolute Altitude per altitude reference instead of
    // a vertical offset from the reference frame origin.
    AltitudeReferenceType absolute_altitude = 3;
  }
}

// See annotations in child elements and messages/elements for more details.
// uci_version: 001.001.001.000
message AltitudeOffsetReferenceType {
  // Reference to altitude offset measurement source.
  AltitudeReferenceEnum altitude_offset_reference = 1;
  // Altitude offset as measured from reference type in units of meters.
  // xsd type: DistanceOffsetType
  double altitude_offset = 2;
}

// See annotations in child elements and messages/elements for more details.
// uci_version: 001.000.001.000
message AltitudeReferenceType {
  // Reference to altitude measurement source.
  AltitudeReferenceEnum altitude_reference = 1;
  // Altitude as measured from reference type in units of meters.
  // xsd type: AltitudeType
  double altitude = 2;
}

// Specifies an ellipse that has a location.
// uci_version: 002.000.002.000
message LocatedEllipseType {
  // composed xsd extension base EllipseType
  EllipseType base = 1;
  // Point of intersection of the two axes. This can be an absolute location or
  // be specified relative to a separately defined reference frame.
  PointChoiceType center_point_choice = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message EllipseType {
  // This element represents the length of the semi-major axis.
  // xsd type: DistanceType
  double semi_major_axis_length = 1;
  // This element represents the length of the semi-minor axis.
  // xsd type: DistanceType
  double semi_minor_axis_length = 2;
  // This element represents the orientation as the angle between the semi-major
  // axis and true north.
  // xsd type: AngleHalfType
  double orientation = 3;
}

// Specifies a location either as a geospatial location or a location relative
// to a separately defined reference frame.
// uci_version: 002.000.002.000
message PointChoiceType {
  oneof choice {
    // Contains a geospatial location.
    Point2D_Type absolute_point = 1;
    // The offset of the area from the origin of the reference frame specified by
    // the sibling field.
    Point2D_RelativeType relative_point = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message Point2D_RelativeType {
  // UUID of the reference frame object that this offset applies to.
  ReferenceFrameID_Type reference_frame_id = 1;
  // Positional data relative to the reference frame origin.
  optional RelativeOffset2D_Type relative_offset = 2;
}

// Defines a rectangle that is relative to a geospatial location. The
// geospatial location can be stationary or moving. The moving location is
// relative to a reference specified in ReferenceFrame.
// uci_version: 002.000.002.000
message LocatedRectangleType {
  // composed xsd extension base RectangleType
  RectangleType base = 1;
  // The center point of the rectangle is the point of intersection of the two
  // diagonals of the rectangle.
  PointChoiceType center_point_choice = 2;
}

// Dimensions and orientation of a rectangular or square shape.
// uci_version: 001.000.000.000
message RectangleType {
  // Size of the rectangle perpendicular to the orientation.
  // xsd type: DistanceType
  double width = 1;
  // Size of the rectangle parallel to the orientation.
  // xsd type: DistanceType
  double height = 2;
  // This element represents the orientation as the angle between the height
  // axis and true north.
  // xsd type: AngleHalfType
  double orientation = 3;
}

// An area defined by two ranges and two angles relative to a geospatial
// point. The geospatial point can be stationary or it can be relative to a
// moving object/location so its definition is an offset to a location defined
// in ReferenceFrame.
// uci_version: 002.000.002.000
message SlantRangeAreaType {
  // The Radius about a point.
  SlantRangeConstraintsType radius = 1;
  // The angle measured clockwise with True North at 0. This is used to
  // calculate the azimuth extent for a tracking area around a designated point,
  // entity, ownship, or system.
  AnglePairType azimuth_extent = 2;
  // This element represents the orientation as the angle between the area and
  // the orientation of the reference frame.
  // xsd type: AngleHalfType
  double orientation = 3;
  // The location of the slant range area.
  PointChoiceType point_choice = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message SlantRangeConstraintsType {
  // Indicates the minimum distance for this slant range.
  // xsd type: DistanceType
  double min = 1;
  // Indicates the maximum distance for this slant range.
  // xsd type: DistanceType
  double max = 2;
  // Indicates the defined ranges are absolute distances.
  optional bool absolute = 3;
}

// Specifies a range of angles that will always go from the Min value to the
// Max value in the positive angle direction.
// uci_version: 001.000.000.000
message AnglePairType {
  // Minimum value of the angle pair.
  // xsd type: AngleType
  double min = 1;
  // Maximum value of the angle pair.
  // xsd type: AngleType
  double max = 2;
}

// Velocity relative to WGS-84 ellipsoid with associated uncertainty element.
// uci_version: 001.000.000.000
message Velocity2D_UncertaintyType {
  // composed xsd extension base Velocity2D_Type
  Velocity2D_Type base = 1;
  // Provide a measure of uncertainty concerning the velocity.
  optional UncertaintyType uncertainty = 2;
}

// Velocity relative to WGS-84 ellipsoid.
// uci_version: 000.000.000.000
message Velocity2D_Type {
  // The speed component along the true north vector in meters/sec.
  // xsd type: SpeedType
  double north_speed = 1;
  // The speed component along the true east vector in meters/sec.
  // xsd type: SpeedType
  double east_speed = 2;
  // Inertial vertical speed component pointing down measured in meters/sec.
  // xsd type: SpeedType
  optional double down_speed = 3;
  // Indicates the time when the velocity data was measured or last known to be
  // correct. The element can also indicate the time at which a future velocity
  // of a System, Entity, etc. will be achieved.
  // xsd type: DateTimeType (pattern .+Z)
  optional string timestamp = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message UncertaintyType {
  // This element represents an ellipse describing the 1-sigma position
  // uncertainty. The ellipse is defined by the length of its semi-major and
  // semi-minor axes. The orientation of the ellipse defines the angle between
  // the semi-major axis and true north.
  EllipseType uncertainty_ellipse = 1;
  // This element represents 1-sigma position uncertainty perpendicular to the
  // sibling UncertaintyEllipse surface (in the up-down direction). Combined
  // with the sibling UncertaintyEllipse this results in an uncertainty
  // ellipsoid with "height".
  // xsd type: DistanceType
  optional double uncertainty_vertical = 2;
  // Measured as the angle between the projection of the slant range position
  // uncertainty axis onto the level plane and the slant range position
  // uncertainty axis. Positive angle is measured counter-clockwise from local
  // level.
  // xsd type: AngleHalfType
  optional double uncertainty_tilt = 3;
}

// The ID type for UCI IDs that correspond to entities.
// uci_version: 000.000.000.000
message EntityID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// Provides a choice between Time-Based and Event-Based Repetition.
// uci_version: 003.000.001.000
message RepetitionType {
  oneof choice {
    // Indicates when the Requirement should be repeated on a Time basis.
    RepetitionTimeBasedType time_based = 1;
    // Since it may be difficult to predict the exact time of an event, this
    // element allows for the same input to be used in planning as the cycle moves
    // from week-ahead planning to day-ahead planning.
    RepetitionEventBasedType event_based = 2;
  }
}

// Represents a Time-Based repetition.
// uci_version: 000.000.000.000
message RepetitionTimeBasedType {
  oneof choice {
    // Indicates the Requirement should be done continuously, within other
    // temporal constraints of the Requirement. This element is oriented towards
    // Capabilities that are continuous in nature and interruptible. This element
    // generally shouldn't be used for Capabilities that are discrete and/or
    // single shot in nature with a physics- and/or design-driven duration.
    RepetitionContinuousType continuous = 1;
    // Indicates the Requirement should be repeated a specific number of times
    // within the overall temporal constraints of the Requirement. This element is
    // oriented towards capabilities that are discrete and/or single shot in
    // nature.
    RepetitionFiniteType finite = 2;
    // Indicates the Requirement should be repeated periodically within the
    // overall temporal constraints of the Requirement. Depending on perspective
    // and/or Capability type, this element indicates the time duration between
    // starts of successive repetitions of the Requirement, time between revisits
    // to a target or area in a search volume or other meanings. A periodic
    // command with no end time continues until canceled. This element is oriented
    // towards Capabilities that are discrete and/or single shot in nature.
    RepetitionPeriodicType periodic = 3;
  }
}

// Indicates a Continuous Repetition with an optional maximum interrupt
// duration.
// uci_version: 000.000.000.000
message RepetitionContinuousType {
  // Indicates the maximum acceptable duration of interrupts in output products
  // during the "active" time for the Requirement. Formerly known as
  // MaxContiguousDropoutAllowed. If omitted, maximum interrupt duration is left
  // to the discretion of the recipient.
  // xsd type: DurationType
  optional string maximum_interrupt_duration = 1;
}

// Indicates a finite repetition type with a set number of repetition attempts
// and an optional interval.
// uci_version: 000.000.000.000
message RepetitionFiniteType {
  // Indicates the number of times the Requirement should be repeated before
  // being considered complete. This element can be used, for example, to
  // perform just a single scan of an area or to limit the number of attempts to
  // acquire a cue.
  uint32 repetition_attempts = 1;
  // Indicates the duration between repetitions of the Requirement. If omitted
  // the interval is left to the discretion of the recipient within other
  // overall temporal constraints.
  // xsd type: DurationType
  optional string repetition_interval = 2;
}

// Indicates a periodic repetition with a specified interval.
// uci_version: 000.000.000.000
message RepetitionPeriodicType {
  // Indicates the duration between repetitions of the Requirement.
  // xsd type: DurationType
  string repetition_interval = 1;
}

// Provides a set of elements to describe an event-based repetition.
// uci_version: 003.000.001.000
message RepetitionEventBasedType {
  // Indicates the event upon which the repetitions should be based.
  RepetitionEventType event = 1;
  // This is optionally used to offset the location/time of the sibling
  // EventWindow that is in reference to the Event. This Offset defines the
  // center of the sibling EventWindow.
  optional EventOffsetChoiceType event_offset = 2;
  // The desired window around the specified Event combined with any specified
  // EventOffset. The value is intended as +/- around the specified Event as
  // adjusted by any offset defined by the sibling EventOffset field. For
  // example: to specify a collection window of 100 seconds after Engine Cutoff,
  // one would specify an EventOffset of +50 seconds and an EventWindow of 50
  // seconds.
  optional EventWindowChoiceType event_window = 3;
  // If this option is populated schedule the repetition times based on the
  // Event of this object rather than the object in the Requirement.
  optional ReferenceAssetKinematicsType alternate_reference_object = 4;
  // Indicates the number of times the sibling Event element should trigger
  // repetition of the Requirement.
  uint32 repetition_attempts = 5;
}

// Provides a choice between event types to act as a trigger for an
// event-based repetition.
// uci_version: 002.000.000.000
message RepetitionEventType {
  oneof choice {
    // PositionChange is a way to specify a time based on an object change in
    // position.
    RepetitionPositionChangeType position_change = 1;
    // RouteEvent is a way to specify a time based on when the system/asset
    // reaches a specific event in the life cycle of the route.
    RouteEventEnum route_event = 2;
    // OrbitalEvent is a way to specify a time based on when a space object
    // reaches a specific point in orbit or in life cycle.
    OrbitalEventEnum orbital_event = 3;
  }
}

// Provides a choice of position delta types.
// uci_version: 002.000.000.000
message RepetitionPositionChangeType {
  oneof choice {
    // Indicates the change in LOS from commanded System to target, which triggers
    // repetition of the Requirement.
    LOS_Type los_bearing_elevation = 1;
    // Indicates the change in LOS from commanded System to target, which triggers
    // repetition of the Requirement.
    LOS_InertialA_Type los_az_el = 2;
    // Indicates the change in orbital RTN kinematics from the commanded System to
    // target, which triggers repetition of the Requirement.
    ThresholdOffOrbitTriggerDataType orbital_rtn = 3;
  }
}

// This type describes the line of sight (LOS) between two points.
// uci_version: 001.000.000.000
message LOS_Type {
  // Indicates the line-of-sight distance between two points.
  // xsd type: DistanceType
  optional double slant_range = 1;
  // Indicates the angle from true north to target point measured from a
  // reference point to a second point.
  // xsd type: AnglePositiveType
  optional double bearing = 2;
  // Indicates the angle between a level plane in the global frame and the line
  // between the two points. Angles above the plane are positive.
  // xsd type: AngleType
  optional double elevation = 3;
}

// Defines a line of sight ray in a world inertial frame of reference.
// uci_version: 001.000.000.000
message LOS_InertialA_Type {
  // Indicates the azimuth from an observation point to a point of interest.
  // Azimuth is defined as the angle between two lines in a global horizontal
  // plane at the observation point. The first line is from the observation
  // point to true north. The second line is from the observation point to the
  // point of interest projected onto the global horizontal plane. An azimuth of
  // zero indicates true north with values increasing clockwise. The terms
  // azimuth and bearing are often used interchangeably but they are technically
  // different. Azimuth values are angles between 0 and 2*Pi radians (0 and 360
  // degrees) relative to north, in this case true north. Bearing values are a
  // combination of a reference direction (north or south) and an angle between
  // 0 and Pi radians (0 and 180 degrees) towards the east or west direction.
  // For example, an azimuth of Pi/2 radians (90 degrees) is equivalent to a
  // bearing of "North 90 East" or "South 90 East". UCI uses azimuth because it
  // is easier for machine/software use.
  // xsd type: AnglePositiveType
  optional double azimuth = 1;
  // Indicates the elevation from an observation point to a point of interest.
  // Elevation is defined as the angle between two lines in a global vertical
  // plane at the observation point. The first line originates from the
  // observation point and extends along the azimuth. The second line is from
  // the observation point to the point of interest. An elevation of zero
  // indicates the point of interest is in the observation point's horizontal
  // plane. Elevation values are positive when the point of interest is above
  // the horizontal plane, negative when below.
  // xsd type: AngleType
  optional double elevation = 2;
  // Indicates the line-of-sight distance between the observation point and
  // point of interest.
  // xsd type: DistanceType
  optional double slant_range = 3;
}

// A trigger that refers to a spacecraft that has deviated from its planned
// orbit to such a degree that a replan is required.
// uci_version: 002.000.000.000
message ThresholdOffOrbitTriggerDataType {
  // Indicates the threshold for position error of the spacecraft's orbit
  // expressed in Radial-Transverse-Normal coordinates.
  optional RTN_PositionDeltaType position_error_threshold = 1;
  // Indicates the threshold velocity error of the spacecraft's orbit expressed
  // in Radial-Transverse-Normal coordinates.
  optional RTN_VelocityDeltaType velocity_error_threshold = 2;
  // Indicates the time difference threshold between the planned time and the
  // current time which would demonstrate a spacecraft has deviated from the
  // planned route to such a degree that a replan is required.
  optional TimeErrorType time_threshold = 3;
}

// Indicates a delta position vector in the Radial-Transverse-Normal Reference
// System.
// uci_version: 000.002.000.000
message RTN_PositionDeltaType {
  // Indicates the delta radial component of position in the
  // Radial-Transverse-Normal Reference System.
  // xsd type: DistanceOffsetType
  optional double radial_delta = 1;
  // Indicates the delta transverse component of position in the
  // Radial-Transverse-Normal Reference System.
  // xsd type: DistanceOffsetType
  optional double transverse_delta = 2;
  // Indicates the delta normal component of position in the
  // Radial-Transverse-Normal Reference System.
  // xsd type: DistanceOffsetType
  optional double normal_delta = 3;
}

// Indicates a delta velocity vector in the Radial-Transverse-Normal Reference
// System.
// uci_version: 000.000.000.000
message RTN_VelocityDeltaType {
  // Indicates the delta radial component of velocity in the
  // Radial-Transverse-Normal Reference System.
  // xsd type: SpeedType
  optional double radial_delta = 1;
  // Indicates the delta transverse component of velocity in the
  // Radial-Transverse-Normal Reference System.
  // xsd type: SpeedType
  optional double transverse_delta = 2;
  // Indicates the delta normal component of velocity in the
  // Radial-Transverse-Normal Reference System.
  // xsd type: SpeedType
  optional double normal_delta = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message TimeErrorType {
  // The difference between the planned time and the current time.
  // xsd type: DurationType
  optional string early = 1;
  // The difference between the planned time and the current time.
  // xsd type: DurationType
  optional string late = 2;
}

// Indicates the events of a Mission.
enum RouteEventEnum {
  ROUTE_EVENT_ENUM_UNSPECIFIED = 0;
  ROUTE_EVENT_ENUM_TAKEOFF = 1;
  ROUTE_EVENT_ENUM_LANDING = 2;
  ROUTE_EVENT_ENUM_INGRESS = 3;
  ROUTE_EVENT_ENUM_EGRESS = 4;
}

// Indicates a list of orbital events.
enum OrbitalEventEnum {
  ORBITAL_EVENT_ENUM_UNSPECIFIED = 0;
  ORBITAL_EVENT_ENUM_APOGEE = 1;
  ORBITAL_EVENT_ENUM_ASCENDING_NODE = 2;
  ORBITAL_EVENT_ENUM_DESCENDING_NODE = 3;
  ORBITAL_EVENT_ENUM_ENGINE_CUTOFF = 4;
  ORBITAL_EVENT_ENUM_ENGINE_START = 5;
  ORBITAL_EVENT_ENUM_LAUNCH = 6;
  ORBITAL_EVENT_ENUM_LOCAL_SOLAR_TIME = 7;
  ORBITAL_EVENT_ENUM_ORBIT_INJECTION = 8;
  ORBITAL_EVENT_ENUM_PERIGEE = 9;
  ORBITAL_EVENT_ENUM_WITHIN_EARTH_FIXED_VOLUME = 10;
}

// Provides a choice of event offset types.
// uci_version: 001.000.000.000
message EventOffsetChoiceType {
  oneof choice {
    // The offset time from the associated OrbitalEvent.
    // xsd type: DurationType
    string offset_time = 1;
    // The offset angle from the associated Event.
    // xsd type: AngleType
    double offset_angle = 2;
    // The Azimuth, Elevation, and Range of the Offset from the Event.
    LOS_InertialB_Type az_el = 3;
  }
}

// Defines a line of sight ray in a world inertial frame of reference.
// uci_version: 001.000.000.000
message LOS_InertialB_Type {
  // Indicates the azimuth from an observation point to a point of interest.
  // Azimuth is defined as the angle between two lines in a global horizontal
  // plane at the observation point. The first line is from the observation
  // point to true north. The second line is from the observation point to the
  // point of interest projected onto the global horizontal plane. An azimuth of
  // zero indicates true north with values increasing clockwise. The terms
  // azimuth and bearing are often used interchangeably but they are technically
  // different. Azimuth values are angles between 0 and 2*Pi radians (0 and 360
  // degrees) relative to north, in this case true north. Bearing values are a
  // combination of a reference direction (north or south) and an angle between
  // 0 and Pi radians (0 and 180 degrees) towards the east or west direction.
  // For example, an azimuth of Pi/2 radians (90 degrees) is equivalent to a
  // bearing of "North 90 East" or "South 90 East". UCI uses azimuth because it
  // is easier for machine/software use.
  // xsd type: AnglePositiveType
  double azimuth = 1;
  // Indicates the elevation from an observation point to a point of interest.
  // Elevation is defined as the angle between two lines in a global vertical
  // plane at the observation point. The first line originates from the
  // observation point and extends along the azimuth. The second line is from
  // the observation point to the point of interest. An elevation of zero
  // indicates the point of interest is in the observation point's horizontal
  // plane. Elevation values are positive when the point of interest is above
  // the horizontal plane, negative when below.
  // xsd type: AngleType
  double elevation = 2;
  // Indicates the line-of-sight distance between the observation point and
  // point of interest.
  // xsd type: DistanceType
  optional double slant_range = 3;
}

// Provides a choice of event window size definitions.
// uci_version: 001.000.000.000
message EventWindowChoiceType {
  oneof choice {
    // Indicates a boundary for an Event described as an angle.
    // xsd type: AnglePositiveType
    double window_angle = 1;
    // Indicates a boundary for an OrbitalEvent described as a time-based offset.
    // xsd type: DurationType
    string window_duration = 2;
    // Indicates a boundary for an Event described as a radius.
    // xsd type: DistanceType
    double window_radius = 3;
  }
}

// Indicates a reference asset and associated kinematics.
// uci_version: 003.000.001.000
message ReferenceAssetKinematicsType {
  // Indicates the identity of the object that is to be used as the basis for
  // the Event.
  AssetType reference_asset = 1;
  // Indicates the kinematics source to use for the sibling Object.
  optional OrbitalKinematicsSourceEnum orbit_kinematics_source = 2;
  // Use this type when the cataloged orbit is different than the orbit you
  // have. Use this for lost items, items that have maneuvered, and items that
  // have changed orbital states between the last cataloging and the current
  // orbital state. If the expected or last reported orbit is valid, omit this
  // value.
  optional OrbitKinematicsType orbit_kinematics_override = 3;
}

// Provides a choice between a System and an Entity.
// uci_version: 000.000.000.000
message AssetType {
  oneof choice {
    // This element contains the ID of a UCI compliant vehicle which is
    // "discoverable" via published of PositionReports and/or SystemStatus
    // messages.
    SystemID_Type system_id = 1;
    // This element contains the ID of a protected asset which is not reporting
    // PositionReports and/or SystemStatus messages. The asset is being tracked
    // and reported as a friendly Entity.
    EntityID_Type entity_id = 2;
  }
}

// Indicates the kinematics source as defined below.
enum OrbitalKinematicsSourceEnum {
  ORBITAL_KINEMATICS_SOURCE_ENUM_UNSPECIFIED = 0;
  ORBITAL_KINEMATICS_SOURCE_ENUM_ELEMENT_SET = 1;
  ORBITAL_KINEMATICS_SOURCE_ENUM_EPHEMERIS = 2;
  ORBITAL_KINEMATICS_SOURCE_ENUM_SINGLE_POSITION = 3;
  ORBITAL_KINEMATICS_SOURCE_ENUM_PLAN = 4;
}

// The measured orbit determined by spacecraft ranging.
// uci_version: 002.001.001.000
message OrbitKinematicsType {
  // Indicates the default or "catalog" orbital element set (also known as two
  // line element or TLE) for the satellite.
  optional TLE_BaseType element_set = 1;
  // Describes satellite orbit at date and time intervals.
  optional OrbitalEphemerisChoiceType ephemeris = 2;
  // Describes the orbit in terms of a state vector along with covariance data.
  optional OrbitalVCM_Type vcm = 3;
  // Provides single vector information of the spacecraft's new orbit in
  // standard coordinate reference frame.
  optional OrbitalKinematicsChoiceType single_vector = 4;
}

// Indicates the default or "catalog" orbital element set (also known as two
// line element or TLE) for the satellite.
// uci_version: 002.001.001.000
message TLE_BaseType {
  // composed xsd extension base COE_OrbitBaseType
  COE_OrbitBaseType base = 1;
  // Time at which the orbital elements are valid. Formatted as UTC DateTime
  // values.
  // xsd type: DateTimeType (pattern .+Z)
  string epoch = 2;
  // The element set number is a carryover from the legacy Two Line Element set
  // (TLE) format, and is provided to support processes that transform to/from
  // that format. Element Set Number increments with each newly generated
  // element set. A common range is [0,999].
  optional uint32 element_set_number = 3;
  // First time derivative of the mean motion, in units of revolutions per day.
  // This field is only used with the SGP orbital model (ephemeris type = 1).
  optional double first_time_derivative_of_mean_motion = 4;
  // Second time derivative of the mean motion, in units of revolutions per day.
  // This field is only used with the SGP orbital model (ephemeris type = 1).
  optional double second_time_derivative_of_mean_motion = 5;
  // Ballistic drag coefficient.
  optional double bstar_drag = 6;
  // Position of the spacecraft at the time indicated by the sibling Epoch
  // element.
  COE_PositionType position = 7;
  // The number of revolutions per day.
  double mean_motion = 8;
  // Represents the revolution number (Revs) at the Epoch.
  optional uint32 revolution_number = 9;
}

// Indicates the set of classic orbital elements (COE) describing an orbit.
// Elements describing the position of a satellite on the orbit are often
// considered part of COE but are omitted from this type which is only
// intended to describe the orbit.
// uci_version: 002.001.001.000
message COE_OrbitBaseType {
  // Indicates the orbit's shape expressed as eccentricity. Eccentricity is a
  // quantity describing the shape of the satellite's orbit. In mathematics the
  // eccentricity of a conic section is a measure of how much the shape deviates
  // from being circular. A value of zero represents a perfect circle. As the
  // eccentricity varies from zero to 1 the ellipse becomes more "stretched". An
  // eccentricity of 1 is a parabolic rather than elliptical, and values greater
  // than 1 are hyperbolas.
  // xsd type: DoubleNonNegativeType
  double eccentricity = 1;
  // Indicates the tilt of the orbit with respect to the equatorial plane. Units
  // in radians. Valid values range from zero to PI.
  // xsd type: AngleHalfPositiveType
  double inclination = 2;
  // Indicates the orientation of the orbital plane in space and of the orbit
  // within its plane. Equatorial orbits are a special case that result in some
  // classical orbital elements (COE) for orientation being undefined;
  // equatorial orbits use alternate elements to define orientation.
  COE_OrientationType orientation = 3;
}

// Indicates the orientation of the orbital plane in space and of the orbit
// within its plane.
// uci_version: 001.001.000.001
message COE_OrientationType {
  oneof choice {
    // Indicates that the orbit is non-equatorial. A non-equatorial orbit is an
    // orbit with a non-zero inclination.
    COE_NonEquatorialOrientationType non_equatorial_orbit = 1;
    // Indicates the angle measured from the principal direction to perigee in the
    // direction of the spacecraft's motion. Used for equatorial orbit where RAAN
    // and argument of perigee are undefined. Units in radians. Valid values range
    // from zero to 2*PI.
    COE_EquatorialOrientationType equatorial_orbit = 2;
  }
}

// Elements to describe orbits that go from south to north.
// uci_version: 001.000.000.000
message COE_NonEquatorialOrientationType {
  // Right ascension of the ascending node (RAAN). Units in radians. Valid
  // values range from zero to 2*PI(). This element describes the orbital
  // plane's orientation with respect to the principal direction (vernal equinox
  // direction); how the orbital plane is rotated in space. RAAN is measured
  // from the principal direction eastward along the equator to the ascending
  // node. Thus, the right ascension of the ascending node is the angle from the
  // principal direction to the ascending node. The ascending node is the point
  // of intersection of the orbit with the equatorial plane, crossing from the
  // southern hemisphere to the northern hemisphere.
  // xsd type: AnglePositiveType
  double right_ascension_of_ascending_node = 1;
  // Argument of perigee is the angle from the body's ascending node to its
  // periapsis, measured in the direction of motion. Perigee indicates this is
  // an Earth-centered orbit. Generically, this is the Argument of Periapsis.
  // Units in radians. Valid values range from zero to 2*PI().
  // xsd type: AnglePositiveType
  double argument_of_perigee = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message COE_EquatorialOrientationType {
  // Indicates the angle measured from the principal direction to perigee in the
  // direction of the spacecraft's motion. Used for equatorial orbits with no
  // Ascending Node. Required when Eccentricity is non-zero. Units in radians.
  // Valid values range from zero to 2*PI().
  // xsd type: AnglePositiveType
  optional double longitude_of_perigee = 1;
}

// Indicates the set of classic orbital elements (COE) describing a
// spacecraft's position in an orbit. Elements describing the size, shape and
// other characteristics of the orbit are in other types.
// uci_version: 001.000.000.000
message COE_PositionType {
  oneof choice {
    // Indicates position of the spacecraft expressed as the angular distance from
    // the pericenter which a fictitious body would have if it moved in a circular
    // orbit, with constant speed, in the same orbital period as the actual body
    // in its elliptical orbit. This means of expressing position is used for
    // non-circular orbits. Units in radians. Valid values range from zero to
    // 2*PI().
    // xsd type: AnglePositiveType
    double mean_anomaly = 1;
    // Indicates the position of the spacecraft expressed as the angle along the
    // orbital path from the ascending node to the spacecraft's position in the
    // direction of the spacecraft's motion. This means of expressing position is
    // used for circular orbits where mean anomaly is undefined. Units in radians.
    // Valid values range from zero to 2*PI().
    // xsd type: AnglePositiveType
    double argument_of_latitude = 2;
    // Indicates the position expressed as the angle from the principal direction
    // (vernal equinox direction) to the spacecraft's position vector in the
    // direction of the spacecraft's motion. This means of expressing position is
    // used for circular equatorial orbits where mean anomaly and argument of
    // perigee are undefined. Units in radians. Valid values range from zero to
    // 2*PI().
    // xsd type: AnglePositiveType
    double true_longitude = 3;
  }
}

// Indicates the ephemeris expressed in one of several orbital kinematics
// standards.
// uci_version: 002.000.001.000
message OrbitalEphemerisChoiceType {
  oneof choice {
    // Indicates ephemeris expressed in terms of a standard frame centered on a
    // celestial object.
    OrbitalKinematicsStandardEphemerisType standard_frame = 1;
    // Indicates ephemeris expressed relative to a reference object that is in
    // orbit around a celestial object.
    OrbitalKinematicsRelativeEphemerisType orbiting_object_relative = 2;
  }
}

// Indicates ephemeris expressed in terms of a standard reference frame
// centered on a celestial object.
// uci_version: 002.001.000.001
message OrbitalKinematicsStandardEphemerisType {
  oneof choice {
    // Indicates kinematic vector(s) in the Earth-Centered Inertial (ECI) J2000
    // (ECI-J2K) reference system.
    OrbitalKinematicsStandardEphemerisType_J2K_StateVector_List j2_k_state_vector = 1;
    // Indicates kinematic vector(s) in the Geocentric Celestial Reference System
    // (GCRS).
    OrbitalKinematicsStandardEphemerisType_GCRS_StateVector_List gcrs_state_vector = 2;
    // Indicates kinematic vector(s) in the barycentric celestial reference system
    // (BCRS).
    OrbitalKinematicsStandardEphemerisType_BCRS_StateVector_List bcrs_state_vector = 3;
  }
}

// Indicates kinematics vectors in the Earth-Centered Inertial (ECI) J2000
// (ECI-J2K) Reference System.
// uci_version: 001.001.000.000
message J2K_KinematicsType {
  // Indicates the time when the kinematic data is valid.
  // xsd type: DateTimeType (pattern .+Z)
  string epoch = 1;
  // Indicates a position vector in the Earth-Centered Inertial (ECI) J2000
  // (ECI-J2K) Reference System.
  J2K_PositionType position = 2;
  // Indicates a velocity vector in the Earth-Centered Inertial (ECI) J2000
  // (ECI-J2K) Reference System.
  OrbitalKinematicsVelocityType velocity = 3;
  // Indicates an acceleration vector in the Earth-Centered Inertial (ECI) J2000
  // (ECI-J2K) Reference System.
  optional OrbitalKinematicsAccelerationType acceleration = 4;
  // Indicates the quaternion attitude in the Earth-Centered Inertial (ECI)
  // J2000 (ECI-J2K) Reference System.
  optional QuaternionType attitude = 5;
  // The covariance matrix along with its associated category that defines the
  // elements represented in the covariance matrix in the Earth-Centered
  // Inertial (ECI) J2000 (ECI-J2K) Reference System. See the individual
  // category enumerations for detailed explanations.
  optional CovarianceMatrixType covariance = 6;
}

// Indicates a position vector in the J2K Reference System.
// uci_version: 000.001.000.000
message J2K_PositionType {
  // Indicates the x value of position in the J2K Reference System.
  // xsd type: DistanceOffsetType
  double x = 1;
  // Indicates the y value of the position in the J2K Reference System.
  // xsd type: DistanceOffsetType
  double y = 2;
  // Indicates the z value of the position in the J2K Reference System.
  // xsd type: DistanceOffsetType
  double z = 3;
}

// Indicates a velocity vector in the specified reference system.
// uci_version: 000.000.000.000
message OrbitalKinematicsVelocityType {
  // Indicates the x value of velocity in the specified reference system.
  // xsd type: SpeedType
  double x = 1;
  // Indicates the y value of velocity in the specified reference system.
  // xsd type: SpeedType
  double y = 2;
  // Indicates the z value of velocity in the specified reference system.
  // xsd type: SpeedType
  double z = 3;
}

// Indicates an acceleration vector in the specified reference system.
// uci_version: 000.000.000.000
message OrbitalKinematicsAccelerationType {

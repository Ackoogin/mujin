  // process. A Response given here overrides the same Response in the sibling
  // ProposedResponsePlan. An empty list here, combined with no sibling
  // ProposedResponsePlan is considered a command to deallocate previously
  // allocated Tasks.
  repeated ResponseAllocationType proposed_response = 4;
  // Indicates an association between Requirements that is a constraint on how
  // the Responses are allocated and planned.
  repeated RequirementAssociationConstraintType association_constraint = 5;
  // Indicates a Part that is required in the output ResponsePlan. When
  // populated, this element must match or be a subset of the Parts associated
  // with the planning process (sibling PlanningProcessID) as advertised in
  // PlanningFunction*messages. This element is optional when all Parts of the
  // process are required.

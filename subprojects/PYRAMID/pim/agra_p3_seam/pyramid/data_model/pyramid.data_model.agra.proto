  optional string time_difference_of_arrival = 2;
  // Frequency of arrival of measurement. Units are in hertz.
  // xsd type: FrequencyType
  optional double frequency_of_arrival = 3;
  // Frequency difference of arrival for two receiver measurements. For use with
  // unambiguous associations of frequencies only.
  // xsd type: FrequencyOffsetType
  optional double frequency_difference_of_arrival = 4;
}

// See annotations in child elements and messages/elements that use this type

// uci_version: 000.000.000.000
message IFF_SimultaneousSelectionType {
  // Each mode listed will be enabled by the Capability. If Simulataneus is
  // false, the Capability can chose when and how to sequence the enabled modes.
  // Some modes may not be able to operate in sequence with other modes, for
  // example Mode 5, Format 3 should not be selected with any other mode.
  repeated IFF_ModeSelectionType iff_mode_enable = 1;
  // If Capability supports simulataneous operation, the list of IFF Modes in
  // the sibling IFF_ModeEnable should be attempted to be operated
  // simultaneously. If simulatnaeity can't be performed, the oreder of
  // operation is up to the Capablity.
  bool simultaneous = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message IFF_ModeSelectionType {
  // IFF_Mode selection for this stage in the sequence.
  IFF_ModesEnum iff_mode = 1;
  // Must be provided when Mode 5 is selected. Format 3 is not allowed to be
  // placed in sequence with any other format
  // xsd type: IFF_Mode5_FormatType
  optional uint32 mode5_format = 2;
  // Available when Mode 5 is active. This pulse goes out with the SIF modes to
  // suppress responses.
  bool suppression_pulse = 3;
  // May be provided when Mode S and only Mode S is selected.
  // xsd type: OctalValueType (pattern [0-7]+)
  repeated string mode_s_aircraft_address = 4;
  // The Registers to ask for in interrogation. Must be provided when Mode S is
  // selected.
  repeated bytes ehs_bds_registers = 5;
  // If excluded, Mode S is not enabled. If included, fill out remaining
  // structure
  optional ModeS_OptionsType mode_s_options = 6;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message ModeS_OptionsType {
  // Mode S Interrogator Address.
  ModeS_InterrogatorAddressType mode_s_interrogator_address = 1;
  // Additional Pulse transmitted with Mode 3/A and Mode C Interrogations to
  // prevent responses from Mode S Capable transponders. That information is
  // obtained through Roll Calls for Mode S transponders.
  bool short_p4_enable = 2;
  // Mode S Types.
  IFF_ModeS_SupportEnum mode_s_type = 3;
  // Specific BDS Registers.
  optional SpecificBDS_RegistersType specific_bds_registers = 4;
  // With All Calls enabled, the interrogator will actively transmit All Call
  // interrogations to acquire targets new to the surveillance volume. When
  // disabled, the interrogator will rely on ADS-B squitter to initiate Mode S
  // tracks and track solely with Roll Calls.
  bool all_call_enable = 5;
  // When enabled, targets that have been acquired and are being interrogated
  // using Roll Calls will no longer reply to All Calls from this interrogator's
  // II or SI Code. Lockout expires on the transponder after 18 seconds.
  bool lockout_enable = 6;
  // In the event that two nearby platforms have interrogators with the same II
  // or SI Code, lockout initiated on a target by one platform can prevent
  // detection of that target from the other platform since Roll Calls from the
  // first platform command the transponder not to reply. When enabled, this
  // control will command the transponder to respond to All Calls regardless of
  // the Lockout Command received in Roll Calls.
  bool lockout_override_enable = 7;
  // Some older tranponders only recognize Interrogator Addresses with II Codes,
  // which use 4 of the 7 bits used to define SI Codes in the RF transmission.
  // When this control is enabled, the interrogator will be allowed to lockout
  // the non-SI transponders using the apparent II Code. When disabled, the
  // interrogator cannot lock out those older transponders. Note that Lockout is
  // commanded in Roll Call Interrogations.
  bool mixed_mode_lockout_enable = 8;
  // Specifies the maximum Probability of Reply for Mode S All Call
  // interrogations. In the event that two nearby aircraft both respond to each
  // All Call interrogations from an interrogator, responses can be garbled
  // preventing the interrogator from detecting replies from one or both
  // transponders. When set to values of "1 in 2" or lower ("1 in 4", "1 in 8",
  // etc.), each transponder will apply the specified probability to whether
  // they respond to a specific interrogation, and over the course of several
  // interrogations, there will be replies from one transponder without the
  // other enabling the interrogator to identify each transponder's Aircraft
  // Address. The interrogator can then continue into Roll Call interrogations
  // where each transponder is uniquely interrogated.
  MaxPOR_Enum max_por = 9;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message ModeS_InterrogatorAddressType {
  oneof choice {
    // Interrogator ID (legacy address type): used for transponder lockout
    // interactions
    // xsd type: InterrogatorIdentifierType
    int32 interrogator_identifier = 1;
    // Surveillance Identifier (modern address type): lockout interactions
    // xsd type: SurveillanceIdentifierType
    int32 surveillance_identifier = 2;
  }
}

// See annotations in child elements and messages/elements that use this type

  MA_ApprovalRequestStatusMDT message_data = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.001
message MA_ApprovalRequestStatusMDT {
  // composed xsd extension base RequestStatusBaseType
  RequestStatusBaseType base = 1;
  // The ApprovalState indicates the current state of the approval for an
  // approval request.
  ApprovalStatusEnum approval_request_processing_state = 2;
  // Indicates details regarding the reason for and/or a contributing factor to
  // the sibling ApprovalRequestProcessingState element. This element is only
  // expected when the Request is in a potentially undesirable state such as
  // rejected, canceled or accepted with less than optimum results expected.

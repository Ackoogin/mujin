// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.003.002
message SubsystemStatusMDT {
  // Indicates the unique ID of the Subsystem whose status is given in the
  // message.
  SubsystemID_Type subsystem_id = 1;
  // Indicates the current state of the Subsystem. The state machine and
  // allowable transitions for Subsystem states is described in supporting
  // documentation. A given Subsystem might not support all states. Subsystem
  // state can be controlled via SubsystemStateCommand, discrete/special signals
  // and/or other means. See enumeration annotations for further details.
  SubsystemStateEnum subsystem_state = 2;
  // This element is intended to provide a human readable, supplemental
  // description of the sibling SubsystemState.
  // xsd type: VisibleString256Type (pattern [ -~]{0,256})
  optional string subsystem_state_description = 3;
  // Indicates a Subsystem setting that is currently enabled. Settings are
  // enabled/disabled via the SubsystemSettingsCommand. See SubsystemSettingEnum
  // for further details. If multiple instances are given, each should be of a
  // different setting type as indicated by the child element.
  repeated SubsystemEnabledSettingType enabled_setting = 4;
  // SettingParameters identified here indicate the SettingParameters specified
  // in the SubsystemConfiguration message that are commandable at this point in
  // time.
  repeated SubsystemSupportedSettingType commandable_subsystem_setting_parameters = 5;
  // Indicates status of erase of the Subsystem. Erase can be controlled via
  // SubsystemEraseCommand, discrete/special signals and/or other means. If
  // omitted, erase is not active.
  optional ProcessingStatusEnum erase_status = 6;
  // Indicates whether or not the Subsystem is transitioning between states, or
  // transitioning to its SHUTDOWN state.
  optional StateTransitionStatusEnum state_transition_status = 7;
  // Indicates the possible state or states the Subsystem can be commanded to
  // transition into from its current state. This is not intended to replace the
  // service contract but is intended to be used to advertise state transitions
  // that change depending on things such as the altitude an aircraft is at. For
  // example, a subsystem on an aircraft is not able to transition to state X
  // until it reaches 30K ft., something that is difficult/impossible to do with
  // a service contract. List size for this element is based on "Select All That

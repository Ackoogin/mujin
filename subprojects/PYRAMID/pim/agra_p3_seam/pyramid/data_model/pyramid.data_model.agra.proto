enum TailConeLightEnum {
  TAIL_CONE_LIGHT_ENUM_UNSPECIFIED = 0;
  TAIL_CONE_LIGHT_ENUM_DIM = 1;
  TAIL_CONE_LIGHT_ENUM_BRIGHT = 2;
  TAIL_CONE_LIGHT_ENUM_OFF = 3;
}

// This reports status of the two-step process to command the hose to be cut.

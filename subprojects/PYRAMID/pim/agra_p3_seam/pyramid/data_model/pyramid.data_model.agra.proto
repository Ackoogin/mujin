// IPv4 connection endpoint details.
// uci_version: 001.000.000.000
message IPv4_ConnectionType {
  // Source IP address. A 32bit field, with each group of 8 bits representing an
  // address octet. (ex: 192.168.0.35 = 0xC0A80023 = 3232235555).
  // xsd type: IPv4_AddressType (pattern (([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5]))
  optional string i_pv4_address = 1;
  // Using CIDR notation this is the number of leading 1 bits in the routing
  // mask (0-32). For example if the routing mask is 24 then when using CIDR
  // notation 192.168.100.22/24 denotes the 192.168.100.X network.
  // 192.168.100.0/22 identifies 1024 address (192.168.100.0 through
  // 192.168.103.255).
  optional int32 i_pv4_source_cidr_mask = 2;
  // IPv4 "Protocol" field identifier (e.g. TCP=6, UDP=17).
  optional int32 i_pv4_protocol_header = 3;
  // Start of range of valid source ports; requires protocol If only a single
  // source port is required then srcportend should not be populated or specify
  // the same port.
  optional int32 i_pv4_port_range_start = 4;
  // End of range of valid source ports; requires protocol. If a range of source
  // ports are required, srcportend would be populated with the highest port of
  // the range. Should not be populated if a single port is required which is
  // specified in srcportstart.
  optional int32 i_pv4_port_range_end = 5;
  // IPv4 "DS" field a 6-bit Differentiated Services Code Point (DSCP) value
  // used for traffic classification. (Default =0, Expedited Forwarding (RFC
  // 3246) = 46, Voice Admit (RFC 5865) = 44).
  optional int32 i_pv4_ds_field = 6;
  // Size (in bytes) of largest IP datagram that can be sent across a physical
  // network. MTU=Maximum Transmission Unit.
  optional int32 i_pv4_mtu_size = 7;
}

// IPv6 connection endpoint details.
// uci_version: 001.000.000.000
message IPv6_ConnectionType {
  // Source IP address.
  // xsd type: IPv6_AddressType (pattern ((:|[0-9a-fA-F]{0,4}):)([0-9a-fA-F]{0,4}:){0,5}((([0-9a-fA-F]{0,4}:)?(:|[0-9a-fA-F]{0,4}))|(((25[0-5]|2[0-4][0-9]|[01]?[0-9]?[0-9])\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9]?[0-9]))))
  optional string i_pv6_address = 1;
  // Using CIDR notation this is the number of leading 1 bits in the routing
  // mask (0-128).
  optional int32 i_pv6_cidr_mask = 2;
  // IPv6 "NextHeader" field identifier (e.g. TCP=6, UDP=17). This is similar to
  // IPv4 "Protocol" field identifier.
  optional int32 i_pv6_protocol_header = 3;
  // Start of range of valid source ports; requires protocol If only a single
  // source port is required then srcportend should not be populated or specify
  // the same port.
  optional int32 i_pv6_port_range_start = 4;
  // End of range of valid source ports; requires protocol If a range of source
  // ports are required, srcportend would be populated with the highest port of
  // the range. Should not be populated if a single port is required which is
  // specified in srcportstart.
  optional int32 i_pv6_port_range_end = 5;
  // IPv6 "DS" field a 6-bit Differentiated Services Code Point (DSCP) value
  // used for traffic classification. (Default =0, Expedited Forwarding (RFC
  // 3246) = 46, Voice Admit (RFC 5865) = 44).
  optional int32 i_pv6_ds_field = 6;
  // Size (in bytes) of largest IP datagram that can be sent across a physical
  // network. MTU=Maximum Transmission Unit.
  optional int32 i_pv6_mtu_size = 7;
}

// File name and type of the associated data.

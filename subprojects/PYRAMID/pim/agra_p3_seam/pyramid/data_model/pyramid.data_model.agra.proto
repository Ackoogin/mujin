// Utilized to define Course to Fix Civil Path Terminator Leg Type. This path
// terminates at a fix with a specified course at that fix.
// uci_version: 000.000.000.000
message CF_CourseToFixType {
  // Indicates the Civil Path Terminator associated with the specified waypoint.
  // xsd type: AnglePositiveType
  double course = 1;
}

// Utilized to define Radius to Fix Civil Path Terminator Leg Type. This path
// is a constant radius circular path around a defined turn center that
// terminates at a fix.
// uci_version: 000.000.000.000
message RF_RadiusToFixType {
  // Indicates the center point of the radius-to-fix turn.
  Point2D_Type radius_center_point = 1;
  // Indicates the radius distance for the radius-to-fix turn.
  // xsd type: DistanceType
  double turn_radius = 2;
  // Indicates the course associated with the RF leg type start point.
  // xsd type: AnglePositiveType
  double course_in = 3;
  // Indicates the course associated with the RF leg type end point.
  // xsd type: AnglePositiveType
  double course_out = 4;
  // Indicates the initial point at which the arc turn starts.
  Point2D_Type arc_initial_point = 5;
  // Indicates the end point at which the arc turn terminates.
  Point2D_Type arc_end_point = 6;
  // Indicates the distance along the arc turn.
  // xsd type: DistanceType
  double arc_distance = 7;
  // Indicates the direct distance between the start of the arc turn and the end
  // of the arc turn.
  // xsd type: DistanceType

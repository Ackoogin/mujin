// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_MissionPlanInputsType {
  // composed xsd extension base MA_PlanInputsCoreType
  MA_PlanInputsCoreType base = 1;
  // Indicates specific Systems to consider and plan for along with
  // System-specific planning constraints. If omitted, all Tiers and all Systems
  // at and below those that the planning process is applicable to shall be
  // planned. A System is a planning "candidate" because its plan may or may not
  // change as a result of the command; zero to one Plans per *Plan type will
  // potentially be created for each candidate.
  repeated MA_RequirementPlanningCandidateType planning_candidate = 2;
  // Indicates an existing [Requirement]Plan of the System superior to the
  // sibling PlanningCandidates that provides a proposed "requirement deck" to
  // allocate amongst the candidates. This element can be supplemented with
  // additional Requirements from the sibling ProposedRequirements element.
  optional MA_RequirementPlanConstraintType proposed_requirement_plans = 3;
  // Indicates a proposed Requirement for the planning process. A Requirement
  // given here is added to any Requirements provided in the sibling
  // ProposedRequirementPlans and constraining *Plans of the sibling
  // PlanningCandidates to create the full set of Requirements to be considered
  // by the planning process. A Requirement given here overrides the same
  // Requirement in the sibling ProposedRequirementPlan. An empty list here,
  // combined with no sibling ProposedRequirementPlans is considered a command
  // to deallocate previously allocated Requirements.
  optional MA_RequirementAllocationCommandType proposed_requirements = 4;
  // Indicates an association between Requirements that is a constraint on how
  // they are allocated and planned.
  repeated RequirementAssociationConstraintType association_constraint = 5;
  // In some cases, the commanding service or HMI may not want to receive the
  // planning process summarized in a MissionPlan message. For example, if
  // MissionPlanCommand is being used to produce a combination of plans (such as
  // a RoutePlan and RouteActivityPlan) for a portion of a sortie, with no
  // immediate intent of producing a full mission plan for the whole sortie,
  // then the results could be published without creating a MissionPlan message.
  // If TRUE, the results will be published in individual *Plan messages and
  // summarized in a published MissionPlan message. If FALSE, the results will
  // be published in individual *Plan messages without a summary MissionPlan
  // message.
  bool results_in_mission_plan = 6;
  // Indicates a type of Plan that is required as an output of the
  // MissionPlanCommand. When populated, this element must match or be a subset
  // of the *Plans associated with the planning process (sibling
  // PlanningProcessID) as advertised in PlanningFunction*messages. This element
  // is optional when all *Plan outputs of the process are required.
  optional MA_PlanPartsType output_plan_type = 7;
}

// Indicates input data used to create different types of *Plans.
// uci_version: 000.000.000.000
message MA_PlanInputsCoreType {
  // Indicates the unique ID of the planning process invoked by the *PlanCommand.
  PlanningProcessID_Type planning_process_id = 1;
  // This element indicates whether the Plan was initiated autonomously from a
  // planning service, was operator initiated or edited, or was created
  // externally.
  PlanInitiationSourceEnum plan_initiation = 2;
  // Indicates the category of messages to use as the source for System
  // position, Capability, status, etc. data to use as the basis for the plan.
  PlanningDataSourceEnum planning_data_source = 3;
  // Indicates the reason for the replan. This element is used during live
  // operations and/or operation with autonomous planning, contingency
  // management, etc.
  optional MA_ReplanReasonType replan_reason = 4;
  // Indicates a selective override of an item in the mission environment world
  // state to use/used in the Plan.
  repeated MA_MissionEnvironmentConstraintType environment_override = 5;
  // Further constrain a Mission Plan to an operational constraint that
  // indicates how much the constraint should play a role in the planning
  // process. The multiplicity is based on the list of available
  // OpConstraintEnums.
  repeated OpConstraintWeightingType op_constraint = 6;
  // Free-text explanation of any extraordinary instructions at the plan level.
  optional FileLocationID_Type special_instructions_id = 7;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_ReplanReasonType {
  // Indicates the trigger that initiated the replan. Autonomous triggers are
  // enabled/disabled via the PlanningFunction* message.
  MA_PlanningTriggerType trigger = 1;
  // Indicates autonomous planning action (referenced by UUID) that was
  // triggered by the sibling Trigger. The parameters of the autonomous planning
  // actions are defined in the PlanningFunction* message.
  optional AutonomousPlanningActionID_Type autonomous_planning_action_id = 2;
  // Indicates the unique ID of a MissionContingencyAlert associated with the
  // replan. The alert can provide additional context for the replan such as the
  // ID of a failed Task, a LAR that couldn't be met, etc.
  optional MissionContingencyAlertID_Type mission_contingency_alert_id = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_PlanningTriggerType {
  // Indicates the initiator of the replan; whether the planning was
  // autonomously triggered by the sibling Trigger elements or Operator invoked.
  PlanningTriggerSourceEnum source = 1;
  // Indicates an initial "by case" trigger for autonomous mission planning
  // functions. This element is only optional if the sibling Source element has
  // a value of OPERATOR_INVOKED_TRIGGER.
  optional MA_PlanningByCaseTriggerType by_case_trigger = 2;
  // Indicates a "by result" trigger that must occur, as a result of the initial
  // trigger described in the sibling ByCase element, in order for the parent
  // autonomous trigger to occur. If omitted, the parent autonomous trigger
  // occurs purely based on the sibling ByCase element, regardless of the
  // results of the mission planning functions it triggers.
  optional MA_PlanningByResultTriggerType by_result_trigger = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_PlanningByCaseTriggerType {
  oneof choice {
    // This trigger refers to a new Capability or SubCapability which becomes
    // available or a previously failed Capability which has been restored.
    CapabilityTaxonomyType capability_added = 1;
    // This trigger refers to a failure of a Capability and/or SubCapability
    // needed to perform a Requirement.
    CapabilityTaxonomyType capability_failure = 2;
    // This trigger refers to lost comms.
    CommsLostTriggerDataType comms_lost = 3;
    // This trigger refers to a situation where the designated DMPIs exceed those
    // initially reserved for the Task, if this creates a shortage for other
    // assigned Tasks.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string dmpi_over_designation = 4;
    // This trigger refers to a situation where the designated DMPIs are less than
    // those initially reserved for the task, and if weapons not designated can be
    // used to perform previous unallocated tasks.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string dmpi_under_designation = 5;
    // This trigger refers to a low remaining endurance condition such as low fuel
    // or battery power. This trigger can further be specialized by the definition
    // of the Endurance thresholds to define the trigger.
    EnduranceType endurance_low = 6;
    // This trigger refers to a vehicle that has deviated from the planned route
    // to such a degree that a replan is required.
    ThresholdOffRouteTriggerDataType off_route = 7;
    // This trigger refers to the proximity of two items (Systems, Entities or
    // other items) that exceeded a minimum geospatial separation limit as
    // specified in OpRouting messages.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string proximity_conflict = 8;
    // This trigger refers to the location of a DMPI, updated LAR calculations or
    // other changes that have resulted in the planned release point for a weapon
    // falling outside the weapon LAR.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string release_point_outside_lar = 9;
    // This trigger refers to a route that exceeded a minimum geospatial
    // separation limit with another item or items. The separation is between a
    // planned/navigated route and other routes or conflicting items as specified
    // in OpRouting messages.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string route_conflict = 10;
    // This trigger refers to vulnerability due to exposure along the route with
    // and without suppression.
    PlanVulnerabilityType route_vulnerability = 11;
    // This trigger refers to a system state transition, as indicated by the
    // SystemStatus message.
    SystemStateFilterType system_state_change = 12;
    // This trigger indicates a new Requirement.
    MA_RequirementTriggerType requirement_added = 13;
    // This trigger indicates a Requirement that cannot be planned/performed
    // because a Requirement it is dependent on cannot be planned/performed.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string requirement_dependency_failed = 14;
    // This trigger refers to a Requirement execution state transition to DROPPED,
    // as indicated by execution status message for the Requirement (EffectStatus,
    // TaskStatus, etc.).
    MA_RequirementTriggerType requirement_dropped = 15;
    // This trigger refers to a Requirement execution state transition to FAILED,
    // as indicated by execution status message for the Requirement (EffectStatus,
    // TaskStatus, etc.).
    MA_RequirementFailedTriggerType requirement_failed = 16;
    // This trigger refers to a change to a Requirement that impacts an existing
    // plan. For example, a change of the position of the target of the
    // Requirement.
    MA_RequirementTriggerType requirement_change = 17;
    // This trigger a Requirement that is not expected to meet its timing
    // constraints.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string requirement_timing = 18;
    // This trigger refers to an OpZone conflicts with the current plan.
    ZoneViolationTriggerDataType zone_violation = 19;
    // This trigger refers to the position along a future
    // planned/predicted/propagated orbit for a spacecraft exceeding a minimum
    // geospatial separation limit with another item or items.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string orbit_conflict = 20;
    // This trigger refers to a spacecraft that has deviated from its planned
    // orbit to such a degree that a replan is required.
    ThresholdOffOrbitTriggerDataType off_planned_orbit = 21;
    // This trigger refers to a low remaining endurance condition such as low fuel
    // or battery power. This trigger can further be specialized by setting
    // trigger thresholds in descendant elements.
    SatelliteEnduranceType spacecraft_endurance_low = 22;
    // This trigger refers to the proximity of two spacecraft (Systems, Entities
    // or other space items) that exceeded a minimum geospatial separation limit.
    // Monitoring for this trigger should be based on current position of live
    // items, not planned/predicted/propagated positions of Systems; see sibling
    // OrbitConflict element.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string spacecraft_proximity_conflict = 23;
    // This trigger indicates planning triggered by a Response and/or ResponsePlan.
    ResponseID_Type response_id = 24;
  }
}


// uci_version: 002.000.001.000
message RefuelCommandMDT {
  // Indicates an instance of an Refuel Capability command. A Capability command
  // message can have multiple command instances to allow a sequence of related
  // commands in a single coherent message. Each command instance is then
  // statused via a separate, independent Capability CommandStatus message.
  repeated RefuelCommandType command = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.001.000
message RefuelCommandType {
  oneof choice {
    // Indicates a new invocation of an Refuel Capability. Generally, if accepted,
    // the command will result in one or more new Tanking Activities being created
    // and reported via the TankingActivity message. The request/response
    // interaction terminates as soon as the command is accepted or rejected; this
    // element is not used to interact with an "active" command. Updates and/or
    // additional interaction with the resulting Activity (after the command is
    // accepted) is accomplished via the sibling Activity element.
    RefuelCapabilityExtendCommandType capability = 1;
    // Indicates a command to modify an existing Tanking Activity (which was
    // previously reported via the TankingActivity message and was marked as
    // "interactive"). The request/response interaction terminates as soon as the
    // modification is accepted or rejected. The modifications are reflected in
    // subsequent TankingActivity messages.
    RefuelActivityCommandType activity = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.001.000
message RefuelCapabilityExtendCommandType {
  // composed xsd extension base CapabilityCommandBaseType
  CapabilityCommandBaseType base = 1;
  // Indicates an installed Refuel Capability, its configurable characteristics
  // and its controllability.
  repeated RefuelCapabilityCommandType command_type = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message RefuelCapabilityCommandType {
  oneof choice {
    // Expansion point for commands associated with a capability of a tanker
    // equipped with a boom.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string boom = 1;
    // Commands associated for a capability for a tanker equipped with a drogue.
    RefuelCapabilityDrogueCommandType drogue = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message RefuelCapabilityDrogueCommandType {
  // composed xsd extension base RefuelCapabilityDrogueCommonType
  RefuelCapabilityDrogueCommonType base = 1;
  // If true, resets the reference pressure acting on the combination hose and
  // drogue.
  optional bool reset_reference_pressure = 2;
  // If true, reset the delivered fuel to 0 lbs.
  optional bool reset_delivered_fuel = 3;
  // If true, reset the mission fuel to 0 lbs.
  optional bool reset_mission_fuel = 4;
  // This is a two-step process to command the hose to be cut.
  optional HoseCutCommandEnum hose_cut = 5;
}

// This is a two-step process to command the hose to be cut.
enum HoseCutCommandEnum {
  HOSE_CUT_COMMAND_ENUM_UNSPECIFIED = 0;
  HOSE_CUT_COMMAND_ENUM_ENABLE = 1;

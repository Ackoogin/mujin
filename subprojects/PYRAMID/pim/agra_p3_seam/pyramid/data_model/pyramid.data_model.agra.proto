// See the annotation in the associated message for an overall description of
// the message and this type.
// uci_version: 003.000.003.000
message AccessAssessmentRequestStatusMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // See annotations in child elements and messages/elements that use this type
  // for details.
  AccessAssessmentRequestStatusMDT message_data = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.003.001
message AccessAssessmentRequestStatusMDT {
  // composed xsd extension base RequestStatusBaseType
  RequestStatusBaseType base = 1;
  // Intermediate status information for an assessment. Typically populated when
  // sending periodic statuses of PROCESSING, but can also store start and
  // finish times for this assessment.
  optional CompletionStatusType completion_status = 2;
  // This element indicates any assessments that failed to complete. It is used
  // to indicate details about why a specific assessment target failed to
  // process.
  repeated IncompleteProcessingType incomplete_assessment = 3;
  // This element indicates traceability of the boolean true value for
  // AccessAssessmentRequestMDT.ResultsInNativeAccessAssessment.
  optional AccessAssessmentResultType result = 4;
}

// The base type for all *RequestStatus messages.
// uci_version: 001.000.002.000
message RequestStatusBaseType {
  // Indicates the unique ID of the request message corresponding to this status
  // message.
  RequestID_Type request_id = 1;
  // Indicates the status of the request message. Indicates how the receiver of
  // the request has responded to the request message.
  RequestProcessingStateEnum request_processing_state = 2;
  // Indicates details regarding the reason for and/or a contributing factor to
  // the sibling RequestProcessingState element. This element is only expected
  // when the Request is in a potentially undesirable state such as rejected,
  // canceled or accepted with less than optimum results expected.
  optional CannotComplyType request_processing_state_reason = 3;
}

// Indicates the processing status of a request.
enum RequestProcessingStateEnum {
  REQUEST_PROCESSING_STATE_ENUM_UNSPECIFIED = 0;
  REQUEST_PROCESSING_STATE_ENUM_QUEUED = 1;
  REQUEST_PROCESSING_STATE_ENUM_PROCESSING = 2;
  REQUEST_PROCESSING_STATE_ENUM_COMPLETED = 3;
  REQUEST_PROCESSING_STATE_ENUM_FAILED = 4;
  REQUEST_PROCESSING_STATE_ENUM_CANCELED = 5;
  REQUEST_PROCESSING_STATE_ENUM_REJECTED = 6;
}

// A generic type that allows the specification of incremental status. Usually
// populated when reporting a status of "Processing".
// uci_version: 001.000.000.000
message CompletionStatusType {
  // Estimated time that the process will be completed.
  // xsd type: DateTimeType (pattern .+Z)
  optional string estimated_time_complete = 1;
  // Estimated percentage of the process that has been completed.
  // xsd type: PercentType
  optional double estimated_percent_complete = 2;
  // Record of the actual time that the operation started.
  // xsd type: DateTimeType (pattern .+Z)
  optional string actual_time_started = 3;
  // Record of the actual time that operation completed.
  // xsd type: DateTimeType (pattern .+Z)
  optional string actual_time_complete = 4;
  // Text field to communicate a description of the status to the operator.
  // xsd type: VisibleString1024Type (pattern [ -~]{0,1024})
  optional string description = 5;
}

// When processing multiple items (e.g. vehicle mission plans, route
// vulnerability assessments), this represents an item that failed to process
// successfully.
// uci_version: 001.000.002.000
message IncompleteProcessingType {
  // Indicates the unique ID of the item (message, System, Task, etc.) that
  // failed to process. For example, if information for a particular vehicle was
  // incomplete then the vehicle's SystemID might be given here to indicated
  // planning/processing for that vehicle is/was incomplete.
  ID_Type incomplete_item_id = 1;
  // Indicates the reason why the processing on the item failed and/or generally
  // cannot be completed satisfactorily. See enumeration annotations for further
  // details.
  CannotComplyEnum reason = 2;
  // A human-readable text description of the reason the processing can not
  // complete satisfactorily.
  // xsd type: VisibleString1024Type (pattern [ -~]{0,1024})
  optional string description = 3;
}

// Specifies the Subject and the associated objects of the AccessAssessment.
// uci_version: 003.000.003.000
message AccessAssessmentResultType {
  oneof choice {
    // This element references the results of the assessment in a separate
    // AccessAssessment message. It is optional based on whether the assessment
    // request specified that the response should result in native message.
    AccessAssessmentResultType_AccessAssessmentID_List access_assessment_id = 1;
    // This element indicates the results of the assessment. It is optional based
    // on whether the assessment request specified that the response should result
    // in native message.
    AccessAssessmentResultType_Assessment_List assessment = 2;
  }
}

// The ID type for UCI IDs that correspond to AccessAssessments.
// uci_version: 000.000.000.000
message AccessAssessmentID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// synthesized list wrapper for repeated choice member AccessAssessmentID in AccessAssessmentResultType (choice)
message AccessAssessmentResultType_AccessAssessmentID_List {
  repeated AccessAssessmentID_Type items = 1;
}

// Specifies the Subject and the associated objects of the AccessAssessment.
// uci_version: 003.000.003.000
message AccessAssessmentType {
  // Indicates the subject of the AccessAssessment; a column in the access
  // assessment table.
  IdentityKindAssetType subject_object = 1;
  // Each instance is a row for the Subject column.
  repeated AccessObjectType assessed_object = 2;
}

// Specifies the parameters for the AccessObject.
// uci_version: 003.000.003.000
message AccessObjectType {
  // Indicates the subject of the prioritization list item.
  IdentityKindAssetType identity = 1;
  // Indicates one or more assessed capabilities and their associated access
  // events. When more than one instance of this element is given, each should
  // be a distinct assessed capability or collection of related capabilities.
  repeated AccessCapabilityType assessed_capability = 2;
}

// Specifies the parameters for the AccessCapability.
// uci_version: 003.000.003.000
message AccessCapabilityType {
  // Indicates capabilities included in the access assessment.
  CapabilityTaxonomyUniversalType assessed_capabilities = 1;
  // Indicates an access event for the sibling AssessedCapabilities.
  repeated AccessEventType access_event = 2;
}

// Specifies the parameters for the AccessEvent.
// uci_version: 003.000.003.001
message AccessEventType {
  // Indicates a modeled "level of effort" to assess.
  AccessEffortEnum effort = 1;
  // The time of the event.
  // xsd type: DateTimeType (pattern .+Z)
  string time = 2;
  // The duration of the event.
  // xsd type: DurationType
  optional string duration = 3;
  // Indicates the probability that this access event is being attempted on this
  // subject.
  // xsd type: PercentType
  optional double probability_of_access_attempt = 4;
  // Indicates the object's probability of successfully accessing the subject.
  // xsd type: PercentType
  optional double probability_of_successful_access = 5;
  // The kinematics of the subject object.
  optional KinematicsMultiStandardType subject_object_kinematics = 6;
  // The kinematics of the assessed object.
  optional KinematicsMultiStandardType assessed_object_kinematics = 7;
  // The separation of the objects.
  // xsd type: DistanceType
  optional double object_separation = 8;
  // The unambiguous time of the event.
  // xsd type: DateTimeType (pattern .+Z)
  optional string unambiguous_time = 9;
  // The resources required or consumed.
  optional EnduranceMultiStandardType resource_consumption = 10;
  // Indicates the maneuver the assessed object would have to perform to be an
  // access.
  optional ManeuverMultiStandardType assessed_object_maneuver = 11;
}

// Indicates endurance in terms of the domain specific choice.
// uci_version: 002.000.002.000
message EnduranceMultiStandardType {
  oneof choice {
    // Indicates endurance in terms of maximum ground/surface distance that can be
    // reached given the current system state.
    EnduranceType endurance_footprint = 1;
    // Logical comparator to use when comparing the current endurance remaining to
    // the sibling EnduranceRemaining element. The logical expression is (current
    // endurance remaining) (LogicalOperator) (sibling EnduranceRemaining). When
    // the logical expression is TRUE then the parent Endurance Condition is TRUE.
    SatelliteEnduranceType satellite_endurance = 2;
  }
}

// Indicates the maneuver in terms of the domain specific choice.
// uci_version: 003.000.003.000
message ManeuverMultiStandardType {
  // The kinematics for this sequence of the orbit plan associated with a
  // maneuver.
  optional OrbitManeuverType orbit_maneuver = 1;
  // The route type associated with a maneuver.
  optional RouteType route_maneuver = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.001.000
message OrbitManeuverType {
  // Indicates whether the maneuver is the result of detailed planning (TRUE),
  // or is a simple "stick" (FALSE).
  bool detailed = 1;
  // Indicates the unique ID of the instance of the sibling Segment series which
  // is the first segment in the orbit maneuver.
  OrbitManeuverSegmentID_Type first_segment_id = 2;
  // Includes a series of orbit maneuver segments. Each segment is defined from
  // the segment EndPoint (or current spacecraft state if no previous segment)
  // to the current segment EndPoint. Elements given here are not necessarily in
  // mission order; it is necessary to follow the linkages provided in
  // NextSegmentID to traverse the segments in mission order.
  repeated OrbitManeuverSegmentType segment = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.001.000
message OrbitManeuverSegmentType {
  // Indicates the unique ID of the orbit maneuver segment.
  OrbitManeuverSegmentID_Type segment_id = 1;
  // Defines whether the orbit segment was defined by an automated orbit/route
  // planning service or if it was manually defined by an operator.
  PathSegmentSourceEnum source = 2;
  // Indicates the time when the maneuver starts.
  // xsd type: DateTimeType (pattern .+Z)
  string start_epoch = 3;
  // Indicates the end point of the PathSegment. The start point is the end
  // point of the previous PathSegment.
  OrbitalKinematicsChoiceType end_point = 4;
  // This flag is used to determine whether this segment can be modified/removed
  // in subsequent planning steps and/or replans.
  bool locked = 5;
  // Indicates a reason for the maneuver. List size for this element is based on
  // "Select All That Apply" condition.
  repeated OrbitPlanManeuverTypeEnum maneuver_type = 6;
  // Indicates the change in velocity that initiates the transit from the
  // segment start point to the sibling EndPoint.
  optional OrbitalManeuverDetailsBaseType delta_velocity = 7;
  // If this element is present and set to TRUE, this segment has been modified.
  // This data is valuable to some planning algorithms to support validation of
  // a user modified route.
  optional bool modified = 8;
  // Indicates the next segment in the maneuver sequence.
  optional OrbitManeuverSegmentID_Type next_segment_id = 9;
}

// An enumeration specifying if the path segment was routed by the system or
// the operator.
enum PathSegmentSourceEnum {
  PATH_SEGMENT_SOURCE_ENUM_UNSPECIFIED = 0;
  PATH_SEGMENT_SOURCE_ENUM_AUTO_ROUTED = 1;
  PATH_SEGMENT_SOURCE_ENUM_OPERATOR_DEFINED = 2;
}

// The type of orbital maneuver.
enum OrbitPlanManeuverTypeEnum {
  ORBIT_PLAN_MANEUVER_TYPE_ENUM_UNSPECIFIED = 0;
  ORBIT_PLAN_MANEUVER_TYPE_ENUM_ALTITUDE_CHANGE = 1;
  ORBIT_PLAN_MANEUVER_TYPE_ENUM_PLANE_CHANGE = 2;
  ORBIT_PLAN_MANEUVER_TYPE_ENUM_MAINTENANCE = 3;
  ORBIT_PLAN_MANEUVER_TYPE_ENUM_STATION_KEEPING = 4;
  ORBIT_PLAN_MANEUVER_TYPE_ENUM_RENDEZVOUS = 5;
  ORBIT_PLAN_MANEUVER_TYPE_ENUM_PROXIMITY_OPERATIONS = 6;
  ORBIT_PLAN_MANEUVER_TYPE_ENUM_COLLISION_AVOIDANCE = 7;
  ORBIT_PLAN_MANEUVER_TYPE_ENUM_THREAT_MITIGATION = 8;
  ORBIT_PLAN_MANEUVER_TYPE_ENUM_DEORBIT = 9;
  ORBIT_PLAN_MANEUVER_TYPE_ENUM_MOMENTUM_DUMP = 10;
  ORBIT_PLAN_MANEUVER_TYPE_ENUM_LAUNCH_TRANSFER_AND_INIT = 11;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.001
message RouteType {
  // Indicates whether the route is the result of detailed mission planning
  // (TRUE), or is a simple stick route (FALSE).
  bool detailed = 1;
  // Indicates the unique ID of the first Path of the Route. The first Path of
  // the Route would generally be of PRIMARY PathType.
  PathID_Type first_in_route_path_id = 2;
  // Indicates which line/curve generation type was used to define the route.
  LineProjectionEnum route_projection = 3;
  // A series of path segments. A route can contain many paths. Some paths
  // provide alternate routes and contingency routes which branch from the
  // primary path. Other paths can be standalone, disconnected paths. Elements
  // given here are not necessarily in mission/flight order; it is necessary to
  // follow the linkages provided in NextPathSegment and/or
  // ConditionalPathSegment to traverse the segments in mission/flight order.
  repeated RoutePathType path = 4;
  // Indicates information about the route from an operator that is intended for
  // display. Both short and longer detailed information can be provided.
  optional RemarksType remarks = 5;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.001
message RoutePathType {
  // Indicates the unique ID for this Path. Other Paths or PathSegments may
  // branch to this path by referring to this ID.
  PathID_Type path_id = 1;
  // Indicates which path type is defined in this path object.
  PathTypeEnum path_type = 2;
  // Indicates the unique ID of the first PathSegment of the Path.
  SegmentID_Type first_in_path_segment_id = 3;
  // A PathSegment is defined from the previous path segment EndPoint (or
  // current vehicle state if no previous path segment) to the current path
  // segment EndPoint. Elements given here are not necessarily in mission/flight
  // order; it is necessary to follow the linkages provided in NextPathSegment
  // and/or ConditionalPathSegment to traverse the segments in mission/flight
  // order.
  repeated PathSegmentType path_segment = 4;
  // Indicates planned or assessed initial conditions of the vehicle at the
  // beginning of the Path.
  optional PlanningLocationType initial_conditions = 5;
  // Indicates the Airfield message containing the Runway information.
  optional AirfieldID_Type airfield_id = 6;
  // Indicates the runway at which this path is either taking off or landing.
  optional RunwayID_Type runway_id = 7;
  // Indicates information about the path from an operator that is intended for
  // display. Both short and longer detailed information can be provided.
  optional RemarksType remarks = 8;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.003.002
message PathSegmentType {
  // Indicates the unique ID for this PathSegment. Other Paths or PathSegments
  // may branch to this path segment by referring to this ID.
  SegmentID_Type path_segment_id = 1;
  // Defines whether the path segment was manually defined or if it was defined
  // by an operator. This element can be used for many reasons including, but
  // not limited to, operator display.
  PathSegmentSourceEnum source = 2;
  // Indicates the end point of the PathSegment. The start point is the end
  // point of the previous PathSegment.
  EndPointType end_point = 3;
  // This flag is used to determine whether the segment can be modified/removed
  // or was driven by an operator and therefore cannot be modified.
  optional bool locked = 4;
  // If this element is present and set to TRUE, this PathSegment has been
  // modified as part of a MODIFIED_ROUTE MissionPlan. This data is valuable to
  // some planning algorithms to support validation of a user modified route.
  optional bool modified = 5;
  // Indicates the speed or speed optimization of the System along the
  // PathSegment at the EndPoint.
  optional PathSegmentSpeedType speed = 6;
  // Defines the Civil Path Terminator information associated with the End Point.
  optional CivilPathTerminatorType civil_path_terminator = 7;
  // Indicates whether the vehicle shall climb/descend and at what rate while
  // traversing the path segment.
  optional ClimbType climb = 8;
  // Indicates the maximum roll allowed along the PathSegment. Angle in radians
  // representing vehicle's rotation about the longitudinal axis (the axis
  // through the body of the vehicle from tail to nose) in a locally level,
  // North-East-Down coordinate system centered on the vehicle. Roll is zero
  // when the aircraft is wing-tip to wing-tip level in the North-East plane.
  // xsd type: AngleType
  optional double maximum_roll = 9;
  // Indicates the acceleration of the System along the PathSegment at the
  // EndPoint.
  // xsd type: AccelerationType
  optional double acceleration = 10;
  // This element is used to specify the next non-conditional PathSegment. This
  // path segment can be the next segment in the current path or can be a
  // transitional segment to another Path defined by the PathID. If the PathID
  // is specified and differs from the current PathID, then this signals the end
  // of the current Path and a transition to another Path. If no NextPathSegment
  // is given then this is the end of the Route.
  optional NextPathSegmentType next_path_segment = 11;
  // This element is used to specify one or more conditional PathSegment.
  repeated ConditionalPathSegmentType conditional_path_segment = 12;
  // This element is intended to provide detailed inertial state information at
  // user defined increments within a path segment. This element provides data
  // which may be required for pre-mission analysis of a Route. Position data
  // may be specified as either a geospatial point or relative to a separately
  // defined reference frame.
  repeated InertialStateRelativeType inertial_state = 13;
  // Describes the mission planned required time of arrival. This message allows
  // the operator to see a delta between the required and estimated arrival
  // times that would allow for speed up/slow down determinations. This field is
  // used as a constraint on the timing of the waypoint.
  optional TimeWindowType required_time_of_arrival = 14;
  // Indicates information about the path segment from an operator that is
  // intended for display. Both short and longer detailed information can be
  // provided.
  optional RemarksType remarks = 15;
  // Specifies the navigation performance accuracy required in an airspace. This
  // value is in meters rather than the RNP standard of nautical miles.
  // xsd type: DistanceType
  optional double required_navigation_performance_in_meters = 16;
  // Specifies a geographical position determined by visual reference to the
  // surface, by reference to one or more radio NAVAIDs, by celestial plotting
  // or another navigational device.
  optional ForeignKeyType fix_identifier = 17;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message EndPointType {
  oneof choice {
    // This element is used to specify a point in the route where no turning
    // occurs. It is generally used for points associated with Actions such as
    // task "transitions", changes in acceleration, changes in speed, changes in
    // altitude, etc.
    WayPointType way_point = 1;
    // This element is used to specify all cases of turns in a segment including
    // fly-through and turn-short. It can additionally be associated with
    // tasks/actions that require or are coincident with turns. TurnPoints will
    // generally come in groups of at least two in linked PathSegments. All but
    // the last in a group will include a TurnRadius.
    TurnPointType turn_point = 2;
    // This element specifies a Loiter. Currently specifying a task/action
    // associated with a LoiterPoint when the task/action occurs only during a
    // portion of the Loiter is not supported.
    LoiterPointType loiter_point = 3;
  }
}

// This element is used to specify a point in the route where no turning
// occurs. It is generally used for points associated with Actions such as
// task "transitions", changes in acceleration, changes in speed, changes in
// altitude, etc.
// uci_version: 002.000.002.000
message WayPointType {
  // Location associated with the specified waypoint.
  WayPointPointChoiceType point_choice = 1;
  // Indicates the action associated with the specified waypoint.
  WaypointTypeEnum waypoint_type = 2;
  // Indicates that this point is the final point in a weapon route with the
  // weapon expecting to impact at the DMPI specified. The last waypoint of a
  // weapon route may be the terminal guidance entry point. In this case, the
  // waypoint specified may not be the same as the DMPIs location. It is the
  // point of entrance into terminal guidance of the weapon.
  optional DMPI_ID_Type dmpi_point_id = 3;
}

// Location associated with the specified waypoint expressed as either a
// geospatial or relative point.
// uci_version: 002.000.002.000
message WayPointPointChoiceType {
  oneof choice {
    // Indicates the geospatial point corresponding to the waypoint. Generally,
    // services are encouraged to send altitude and/or time data whenever it is
    // known.
    Point2D_Type point2_d = 1;
    // Indicates the Relative point corresponding to the waypoint. Generally,
    // services are encouraged to send altitude data whenever it is known.
    Point2D_RelativeType relative_point = 2;
  }
}

// Indicates the action associated with the specified waypoint.
enum WaypointTypeEnum {
  WAYPOINT_TYPE_ENUM_UNSPECIFIED = 0;
  WAYPOINT_TYPE_ENUM_NAV_ONLY = 1;
  WAYPOINT_TYPE_ENUM_TAXI = 2;
  WAYPOINT_TYPE_ENUM_RUNWAY_START = 3;
  WAYPOINT_TYPE_ENUM_RUNWAY_THRESHOLD = 4;
  WAYPOINT_TYPE_ENUM_RUNWAY_LIMIT = 5;
  WAYPOINT_TYPE_ENUM_APPROACH = 6;
  WAYPOINT_TYPE_ENUM_APPROACH_INITIAL_POINT = 7;
  WAYPOINT_TYPE_ENUM_APPROACH_FINAL_POINT = 8;
  WAYPOINT_TYPE_ENUM_TAKEOFF = 9;
  WAYPOINT_TYPE_ENUM_TAKEOFF_INITIAL_POINT = 10;
  WAYPOINT_TYPE_ENUM_TAKEOFF_FINAL_POINT = 11;
  WAYPOINT_TYPE_ENUM_TOUCHDOWN = 12;
  WAYPOINT_TYPE_ENUM_PASSIVE = 13;
  WAYPOINT_TYPE_ENUM_HARD_DITCH = 14;
  WAYPOINT_TYPE_ENUM_END_OF_PATH = 15;
}

// The ID type for UCI IDs that correspond to DMPIs.
// uci_version: 001.001.000.000
message DMPI_ID_Type {
  // composed xsd extension base VersionedID_Type
  VersionedID_Type base = 1;
}

// This element is used to specify all cases of turns in a segment including
// fly-through and turn-short. TurnPoints will generally come in groups of at
// least two in linked PathSegments. All but the last in a group will include
// a TurnRadius.
// uci_version: 002.001.002.001
message TurnPointType {
  // This element indicates the location and time of arrival of the end of the
  // path segment.
  WayPointPointChoiceType waypoint = 1;
  // Represents the desired behavior at the associated way point.
  TurnPointTypeEnum turn_point_type = 2;
  // Indicates the course at the Waypoint of this TurnPoint.
  // xsd type: AngleType
  optional double course = 3;
  // Indicates the bank angle or radius of the turn. When Turn Geometry is not
  // specified, indicates that the TurnPoint is in the end of a turn.
  optional TurnGeometryChoiceType turn_geometry = 4;
}

// Indicates the desired behavior at the associated turn point.
enum TurnPointTypeEnum {
  TURN_POINT_TYPE_ENUM_UNSPECIFIED = 0;
  TURN_POINT_TYPE_ENUM_TURN_SHORT = 1;
  TURN_POINT_TYPE_ENUM_FLY_OVER = 2;
  TURN_POINT_TYPE_ENUM_CAPTURE_OUTBOUND_COURSE = 3;
  TURN_POINT_TYPE_ENUM_START_TURN = 4;
  TURN_POINT_TYPE_ENUM_END_TURN = 5;
}

// This element is used to specify whether a turn is a bank angle or turn
// radius.
// uci_version: 001.000.000.000
message TurnGeometryChoiceType {
  oneof choice {
    // Indicates the radius of the turn. When neither BankAngle nor TurnRadius are
    // specified, indicates that the TurnPoint is in the end of a turn.
    // xsd type: DistanceType
    double turn_radius = 1;
    // Indicates bank angle of the turn. When neither BankAngle nor TurnRadius are
    // specified, indicates that the TurnPoint is in the end of a turn.
    // xsd type: AngleHalfType
    double bank_angle = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message LoiterPointType {
  // The geospatial loiter details.
  LoiterType loiter = 1;
  // Indicates the time at which the loiter will end.
  // xsd type: DateTimeType (pattern .+Z)
  optional string end_time = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message LoiterType {
  oneof choice {
    // The details of an orbit loiter.
    OrbitType orbit = 1;
    // The details of a hover loiter.
    HoverType hover = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message OrbitType {
  // What flight pattern this orbit will take.
  OrbitEnum orbit_type = 1;
  // A single point will be provided if and only if OrbitType is Circle. See
  // annotations of each OrbitType (OrbitEnum) value for further details.
  repeated CircleType circle = 2;
  // Direction of turn when rounding the first loiter point. For a figure 8,
  // this direction applies to the first of the two Circle elements.
  RelativeDirectionEnum turn_direction = 3;
  // Duration for the orbit as either a required time spent in the orbit pattern
  // or the number of orbits to make around the pattern.
  OrbitDurationType duration = 4;
}

// An enumeration specifying the type of orbit.
enum OrbitEnum {
  ORBIT_ENUM_UNSPECIFIED = 0;
  ORBIT_ENUM_CIRCLE = 1;
  ORBIT_ENUM_RACETRACK = 2;
  ORBIT_ENUM_FIGURE_EIGHT = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message CircleType {
  // The center point or relative focus for a circle.
  PointChoiceType point_choice = 1;
  // The radius of a circle in meters.
  // xsd type: DistanceType
  double radius = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message OrbitDurationType {
  oneof choice {
    // Required amount of time to be spent in the loiter pattern.
    // xsd type: DurationType
    string time = 1;
    // Required number of laps to be spent in the loiter patter.
    uint32 number_of_orbits = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.001.002.000
message HoverType {
  // The geolocation to perform the hover loiter. Position data may be specified
  // as either a geospatial point or relative to a separately defined reference
  // frame.
  PointChoice3D_Type point3_d = 1;
  // The duration to perform the hover loiter.
  // xsd type: DurationType
  string duration = 2;
}

// Specifies a location either as a geospatial location or a location relative
// to a separately defined reference frame.
// uci_version: 001.000.001.000
message PointChoice3D_Type {
  oneof choice {
    // Contains a geospatial location.
    Point3D_Type absolute_point = 1;
    // The offset of the location from the origin of the separately defined
    // reference frame.
    Point3D_RelativeType relative_point = 2;
  }
}

// This type represents positional data. The latitude and longitude, relative
// to the WGS-84 ellipsoid, are mandatory entries along with altitude. If
// AltitudeReference is not specified, altitude is the WGS-84 height above the
// ellipsoid.
// uci_version: 001.000.002.001
message Point3D_Type {
  // Geospatial latitude measured in radians.
  // xsd type: AngleHalfType
  double latitude = 1;
  // Geospatial longitude measured in radians.
  // xsd type: AngleType
  double longitude = 2;
  // Height measured in meters using the reference specified by the
  // AltitudeReference field. If AltitudeReference is not specified, then the
  // reference is to be taken as WGS-84 ellipsoid.
  // xsd type: AltitudeType
  double altitude = 3;
  // Reference to altitude measurement source.
  optional AltitudeReferenceEnum altitude_reference = 4;
  // Indicates the time when the positional data was measured or last known to
  // be correct. The element can also indicate the time at which a future
  // position of a System, Entity, etc. will be achieved.
  // xsd type: DateTimeType (pattern .+Z)
  optional string timestamp = 5;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.001.000
message Point3D_RelativeType {
  // UUID of the reference frame object that this offset applies to.
  ReferenceFrameID_Type reference_frame_id = 1;
  // Positional data relative to the reference frame origin.
  optional RelativeOffset3D_Type relative_offset = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.001.000
message PathSegmentSpeedType {
  // Indicates the speed that the vehicle shall traverse the path segment. Speed
  // can be represented as referenced speed (e.g., ground speed in m/s) or as a
  // unitless Mach number.
  optional PathSegmentSpeedChoiceType speed_choice = 1;
  // Indicates that the System will vary its speed autonomously according to the
  // specified optimization algorithm.
  optional SpeedOptimizationEnum speed_optimization = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.001.001.000
message PathSegmentSpeedChoiceType {
  oneof choice {
    // Indicates the speed that the vehicle shall traverse the path segment.
    PathSegmentSpeedValueType speed_value = 1;
    // Indicates the unitless Mach number realized at a particular speed during
    // flight.
    // xsd type: MachType
    double mach_value = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.001.000
message PathSegmentSpeedValueType {
  // Indicates the speed along the PathSegment at the EndPoint.
  // xsd type: SpeedType
  double value = 1;
  // Indicates whether the given vehicle speed is reference to ground speed or
  // true air speed.
  SpeedReferenceEnum reference = 2;
}

// Indicates the speed reference for the associated speed value.
enum SpeedReferenceEnum {
  SPEED_REFERENCE_ENUM_UNSPECIFIED = 0;
  SPEED_REFERENCE_ENUM_GROUNDSPEED = 1;
  SPEED_REFERENCE_ENUM_TRUE_AIRSPEED = 2;
  SPEED_REFERENCE_ENUM_CALIBRATED_AIRSPEED = 3;
}


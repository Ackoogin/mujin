  COMPONENT_ELEMENT_STATE_ENUM_INACTIVE = 10;
  COMPONENT_ELEMENT_STATE_ENUM_ENGAGED = 11;
  COMPONENT_ELEMENT_STATE_ENUM_DISENGAGED = 12;
  COMPONENT_ELEMENT_STATE_ENUM_ON = 13;

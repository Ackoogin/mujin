  DateTimeRangeType transition_time = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message PlannedActivityBaseType {
  // Indicates the unique ID of the Planned Activity.
  PlannedActivityID_Type planned_activity_id = 1;
  // Indicates the type of planned Activity and the details to command and
  // execute it.
  ActivityChoiceType activity_type = 2;
  // This flag is used to determine whether this Planned Activity can be
  // modified/removed in subsequent planning steps and/or replans.
  optional bool locked = 3;
  // Indicates the planned state transition for the Planned Activity.
  // Transitions for a single Planned Activity can happen on different segments
  // of an associated kinematic Plan and/or be far separated in time. For
  // example, a Task-based Planned Activity could start on one kinematic segment
  // and end on a later one with many segments in between.
  ActivityTransitionEnum activity_transition = 4;
  // The time or time window when the result of the sibling ActivityTransition
  // is planned to occur. This element is intended for transitions where time of
  // execution start and time of results aren't simultaneous; for example Strike
  // Tasks or OrbitChange Tasks.
  optional DateTimeRangeType result_time = 5;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message ActivityChoiceType {
  oneof choice {
    // Indicates the unique ID of the Effect associated with the Planned Activity.
    EffectID_Type effect_id = 1;
    // Indicates the unique ID of the Action associated with the Planned Activity.
    ActionID_Type action_id = 2;
    // Indicates the unique ID of the Task associated with the Planned Activity.
    TaskID_Type task_id = 3;
    // Indicates the unique ID of the Response associated with the Planned
    // Activity.
    ResponseID_Type response_id = 4;
    // Indicates a Capability command that is planned to occur. This is an
    // abstract polymorphic extension point/element; the CapabilityCommandBaseType
    // used here is an abstract base type used in a Capability-specific type that
    // describes the unique Capability command such as EA_Command. This abstract
    // element must be replaced by a Capability-specific command type to form a
    // valid planned Activity.
    CapabilityCommandBaseType capability_command = 5;
    // Indicates a Supporting Capability command that is planned to occur. This is
    // an abstract polymorphic extension point/element; the
    // SupportCapabilityCommandBaseType used here is an abstract base type used in
    // a Capability-specific type that describes the unique Capability command
    // such as StoreManagementCommand. This abstract element must be replaced by a
    // Supporting Capability-specific command type to form a valid planned
    // Activity.
    SupportCapabilityCommandBaseType supporting_capability_command = 6;
    // Indicates a planned system/vehicle setting that is generally independent of
    // mission, tasking and kinematic planning from a UCI perspective. These
    // activities are related to operation of the system/vehicle itself as opposed
    // to a mission Capability.
    VehicleCommandDataType vehicle_settings = 7;
    // Indicates planned/needed communications resources/activities. For example,
    // this could indicate that an EO/IR capability is being used during a
    // kinematic segment and therefore higher bandwidth is needed by the System in
    // order support streaming video.
    CommDataType comm_action = 8;
    // Indicates the unique ID of a Product management Task
    // (ProductDisseminationTask, ProductProcessingTask, etc.) associated with the
    // Planned Activity.
    TaskID_Type product_task_id = 9;
  }
}


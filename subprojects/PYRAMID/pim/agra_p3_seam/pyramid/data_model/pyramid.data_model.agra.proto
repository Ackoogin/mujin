  double angle = 1;
  // The range extent of a cell.
  // xsd type: DistanceType
  double range = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.003.000
message WeatherRadarCellType {
  // Represents the center of the weather observation cell.
  WeatherRadarCellLocationType cell_location = 1;
  // Indicates equivalent reflectivity of the radar signal at the cell location.
  // Units are dBZ where Z is the standard meteorological measure of equivalent
  // reflectivity.
  double reflectivity = 2;
  // Indicates weather characteristics of the cell which have been inferred
  // based on the weather radar observation.
  optional WeatherAreaDataType weather_data = 3;
  // Indicates weather warnings for the cell which have been inferred based on
  // the weather radar observation.
  optional WeatherWarningEnum weather_warning = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message WeatherRadarCellLocationType {
  // Geospatial latitude measured in radians.
  // xsd type: AngleHalfType
  double latitude = 1;
  // Geospatial longitude measured in radians.
  // xsd type: AngleType
  double longitude = 2;
  // Height above WGS-84 ellipsoid measured in meters.
  // xsd type: AltitudeType
  double upper_altitude = 3;
  // Height above WGS-84 ellipsoid measured in meters.
  // xsd type: AltitudeType
  optional double lower_altitude = 4;
}


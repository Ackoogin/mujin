// for details.
// uci_version: 001.000.000.000
message PO_ComponentLensAssemblyFieldOfViewType {
  oneof choice {
    // This field specifies the FOV for those lens that have a fixed FOV (do not
    // support zooming).
    // xsd type: AngleQuarterType
    double fixed_fov = 1;
    // This field specifies the FOV for those lens whose FOV can be changed, i.e.
    // support zooming. This field is for optical zoom only and not electronic
    // zoom.
    PO_ComponentLensAssemblyZoomType zoom = 2;
  }
}

// Indicates the zoom characteristics of the lens.
// uci_version: 001.000.000.000
message PO_ComponentLensAssemblyZoomType {
  // This field specifies the methods by which the incremental zoom function can
  // be controlled.
  optional PO_ComponentLensAssemblyZoomIncrementalType incremental_zoom = 1;
  // This field specifies the methods by which the absolute zoom function can be
  // controlled.
  optional PO_ComponentLensAssemblyZoomAbsoluteType absolute_zoom = 2;
}

// Indicates the incremental zoom characteristics of the lens.
// uci_version: 000.000.000.000
message PO_ComponentLensAssemblyZoomIncrementalType {
  // Indicates the controllability of the zoom where one or more of the
  // Component Control Interfaces values should be identified. List size for
  // this element is based on "Select All That Apply" condition.
  repeated ComponentControlInterfacesEnum zoom_control = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message PO_ComponentLensAssemblyZoomAbsoluteType {
  // Indicates the controllability of the zoom where one or more of the
  // Component Control Interfaces values should be identified. List size for
  // this element is based on "Select All That Apply" condition.
  repeated ComponentControlInterfacesEnum zoom_control = 1;
  // The minimum value the lens's field of view (FOV) can be set to.
  // xsd type: AngleQuarterType
  double min = 2;
  // The maximum value the lens's field of view (FOV) can be set to.
  // xsd type: AngleQuarterType
  double max = 3;
}

// Indicates the focus characteristics of the lens.
// uci_version: 000.000.000.000
message PO_ComponentLensAssemblyFocusType {
  // The existence of this field specifies that this lens supports the
  // capability of changing its focus setting. If allowed, one or more of the
  // Component Control Interfaces values should be identified. List size for
  // this element is based on "Select All That Apply" condition.
  repeated ComponentControlInterfacesEnum percentage_focus_control = 1;
  // Some lens assemblies support the ability to automatically adjust their
  // focus settings as the assembly is zoomed into or out of the target. The
  // existence of this field specifies that this lens supports this ability of
  // automatically adjusting its focus setting while zooming. If allowed, one or
  // more of the Component Control Interfaces values should be identified. List
  // size for this element is based on "Select All That Apply" condition.
  repeated ComponentControlInterfacesEnum auto_focus_zoom_control = 2;
  // The existence of this field specifies that this lens supports the
  // capability of changing its focus setting via incremental control. If
  // allowed, one or more of the Component Control Interfaces values should be
  // identified. List size for this element is based on "Select All That Apply"
  // condition.
  repeated ComponentControlInterfacesEnum incremental_focus_control = 3;
}


}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.001
message AMTI_TaskType {
  // composed xsd extension base AMTI_TaskBaseType
  AMTI_TaskBaseType base = 1;
  // Indicates the volume or specific Entity that defines the extents of the
  // spatial region covered by the command. For VOLUME AMTI Capabilities, the
  // Entity is not an option. For CUED AMTI Capabilities, two instances of this
  // element are allowed to support an air volume that defines the extents of
  // the cue volume around the Entity. For CUED AMTI Capabilities, a single
  // instance is allowed if it is an Entity in which case the Entity location
  // uncertainty defines the extents of the cue volume. For TRACK AMTI
  // Capabilities it is expected that the Entity is the only valid selection.
  repeated AMTI_TargetType target = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.001
message AMTI_TargetType {
  oneof choice {
    // Indicates a 3D sensor referenced volume that an air volume capability is
    // directed against. This will define the volume in terms of azimuth and
    // elevation angles.
    AirVolumeSensorReferencedType air_volume_sensor_referenced = 1;
    // Indicates a 3D area that an A2A capability is directed against. This should
    // define the latitude/longitude extents of the volume along with any guidance
    // regarding the height of the volume.
    ZoneType air_volume_location = 2;
    // Indicates the unique ID of an Entity that is the target of a cued AMTI
    // search. This element can be used as the full specification of the target
    // volume for the cued search. It can also be used in combination with the
    // sibling AirVolume element to define extents of the cue volume around the
    // Entity.
    EntityID_Type entity_id = 3;
  }
}


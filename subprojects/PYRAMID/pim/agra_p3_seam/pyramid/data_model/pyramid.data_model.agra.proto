// uci_version: 003.001.003.000
message ESM_TaskType {
  // composed xsd extension base ESM_TaskBaseType
  ESM_TaskBaseType base = 1;
  // Indicates Command details for a Subcapability of the ESM_Capability
  // indicated by the sibling CapabilityID. One instance of this element for
  // each Subcapability category (acquisition, ID, geolocaiton, measurement or
  // pulse data collection) of that ESM_Capability is required. If multiple
  // instances are given, each must be of a different category in the descendant
  // choice statement.
  SubCapabilityDetailsType sub_capability_details = 2;
}

// See annotations in child elements and messages/elements that use this type

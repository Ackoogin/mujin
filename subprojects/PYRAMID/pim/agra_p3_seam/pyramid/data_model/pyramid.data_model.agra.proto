  SAR_CapabilityCommandSubCapabilityType sub_capability = 2;
  // Indicates the Multistatic Mode settings and associated data to be used for
  // the command.
  optional MultistaticModeType multistatic_mode = 3;
  // Indicates the frequency to be used for the Command. If omitted, frequency
  // selection is left to the command recipient within constraints of
  // RF_Profiles imposed by RF_ControlCommand, MDF, etc.
  optional CapabilityCommandFrequencyType frequency = 4;
  // Indicates required optional aspects of SAR to be included in the Command.
  // Only those options supported by the SAR Capability should be Commanded.
  optional SAR_CollectionOptionsType collection_options = 5;
  // Indicates constraints on the collection and/or processing.
  optional SAR_CollectionConstraintsType collection_constraints = 6;
  // Indicates the unit normal vector for the plane in which imaging is to
  // occur. If not included, the Capability determines the unit vector.
  optional ECEF_UnitVectorType plane_normal_unit_vector = 7;
  // This coefficient is used to compensate for quadratic phase errors and
  // geolocation errors.
  optional double coefficient_of_tropospheric_refraction = 8;
  // Atmospheric propagation information to be used when determining CNR or
  // range/power levels. If multiple instances are given, each should be of a
  // different band as indicated by the child element.
  repeated AtmosphericPropagationLossType atmospheric_propagation = 9;
  // This element defines the desired waveform to use for the collection.
  optional SAR_DesiredWaveformType desired_waveform = 10;
  // Indicates the Command's role in a pair collection. See enumeration
  // annotations for further details.
  optional PairIdentifierEnum pair_identifier = 11;
  // Indicates the required repetition of the command. If omitted, the command
  // should be performed once.
  optional RepetitionType repetition = 12;
  // Indicates a required output Product of the Command. Only Products
  // consistent with SAR and supported by the commanded SAR Capability should be
  // requested. If omitted, no output Product should be produced. See
  // ProductTypeEnum for further details.
  repeated ProductOutputCommandImageryType product_output = 13;

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message EntityRemoveInfoType {
  // See enumeration annotations.
  EntityRemoveReasonEnum remove_reason = 1;
  // Indicates the unique ID of the Entity which this Entity was fused to.
  // Required when the sibling RemoveReason element indicates FUSED. For
  // example, say Entity 1 is a fusion input from System A, Entity 2 is a fusion
  // input from System B and initially fusion outputs Entity 3 (corresponding to
  // Entity 1) and Entity 4 (corresponding to Entity 2). Later, fusion
  // determines that Entity 1 and Entity 2 refer to the same physical system and
  // fuses them into an updated Entity 3. Entity 4 is then REMOVED with
  // RemoveReason of FUSED and MergedToID (this element) indicating Entity 3.
  optional EntityID_Type merged_to_id = 2;
}


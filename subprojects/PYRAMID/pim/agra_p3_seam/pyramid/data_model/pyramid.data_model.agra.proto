// Defines an OpZone via a reference objects filter and buffers. Geometry,
// position and velocity of the referential object shall be treated
// identically as in the referenced object, but expanded per the defined
// buffers. For OpZones defined referring to OpVolumes, the furthest 2D
// extents of the volume shall be used such that the resulting OpZone
// circumscribes all points within the OpVolume. Geometry of referential
// OpZones shall progress through time as the referenced geometry progresses
// through time. Geometry of referential OpZones shall be updated as the
// referenced geometry is updated. Only objects containing a geometry
// definition, and not be defined referentially, shall be used as a reference
// object. Only the current geometry of active reference objects shall be
// considered. Inactive geometry shall be ignored and future or past geometry
// shall be ignored. For the example of weather, this means that only the
// current state of weather will be used, rather than the full area across the
// full forecast summed up. An AND relationship can be created between
// multiple characteristics by including them in one filter type. An OR
// relationship can be created by putting characteristics in different filters
// uci_version: 000.000.000.000

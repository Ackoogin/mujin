  // items included in the BIT are given in the sibling BIT_Item element. See
  // enumeration annotations for further details.
  SubsystemBIT_ResultEnum result = 3;
  // Indicates a human readable reason why the BIT failed. This element is only
  // expected when the sibling Result element indicates the BIT failed.
  // xsd type: VisibleString256Type (pattern [ -~]{0,256})
  optional string fail_reason = 4;
  // Indicates the results of an item tested by the BIT.
  repeated SubsystemCompletedBIT_ItemType bit_item = 5;
}


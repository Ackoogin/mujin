  // Indicates that the capability has the ability to run concurrently with at
  // least one other capability.
  bool concurrent_operation_supported = 6;
  // Indicates the multistatic options supported by the Capability.
  optional MultistaticOptionsSupportedType multistatic_options_supported = 7;
  // Indicates the list of EP capabilities that the current HW / SW allows an
  // external actor to control for this capability.
  repeated ElectronicProtectionOptionsSupportedType electronic_protection_options_supported = 8;
  // Indicates the list of Supported Sensor Resolution Capabilities that the
  // current HW/SW allows an external actor to control for this capability.
  repeated SupportedResolutionType supported_resolution = 9;
  // Indicates a collection option for a COARPs SAR Capability.
  optional COARPS_SAR_CollectionOptionsEnum coarps_sar_collection_option = 10;
}


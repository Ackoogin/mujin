// This type represents a task for a CounterSpace capability.
// uci_version: 002.000.001.000
message CounterSpaceTaskType {
  // The name of the tasked force for reference with the external (non-UCI)
  // tasking system.
  optional ForeignKeyType force_name = 1;
  // Engagement data.
  CS_EngagementDataType engagement_data = 2;
}

// This type represents engagement parameters for a CounterSpace task.
// uci_version: 002.000.001.000
message CS_EngagementDataType {
  // System Engagement Number. This is an external (non-UCI) ID number for an
  // engagement group.
  // xsd type: CS_SENO_Type (pattern [A-Z][IRS][0-9]{3})
  optional string seno = 1;
  // Indicates an external reference name for the CounterSpace system.
  SystemID_Type system_id = 2;
  // Identifies satellite catalog number and satellite name.
  SatelliteIdentifierType satellite = 3;
  // Identifies the satellite transponder for the engagement.
  ForeignKeyType transponder = 4;
  // Indicates an external (non-UCI) reference name for a CounterSpace
  // tactic/effect.
  ForeignKeyType tactic = 5;
  // Free text comments for the engagement.
  optional FileLocationID_Type comment_id = 6;
  // Signal data details for the signal being engaged.
  CS_DetailDataType detail_data = 7;
  // Observed signals of interest.
  repeated CS_SignalType signals = 8;
}

// This type represents lower level signal details for a CounterSpace
// task/engagement.
// uci_version: 001.000.001.000
message CS_DetailDataType {
  // Name for CounterSpace engagement relevant data.
  // xsd type: VisibleString32Type (pattern [ -~]{0,32})
  string name = 1;
  // Comments. Free text.
  optional FileLocationID_Type details_id = 2;
  // The signal identifier for which a CounterSpace force is tasked to engage.
  // This is an external (non-UCI) identifier for the signal.
  optional ForeignKeyType signal = 3;
  // Uplink center frequency.
  // xsd type: FrequencyType
  optional double uplink_frequency = 4;
  // Uplink polarization.
  optional PolarizationEnum uplink_polarization = 5;
  // Downlink center frequency.
  // xsd type: FrequencyType
  optional double downlink_frequency = 6;
  // Downlink polarization.
  optional PolarizationEnum downlink_polarization = 7;
  // Modulation for signal.
  optional ModulationEnum modulation = 8;
  // Bandwidth of signal.
  // xsd type: FrequencyType
  optional double bandwidth = 9;
  // Additional attributes for the signal.
  optional FileLocationID_Type attributes_id = 10;
  // Signal data additional parameters.
  repeated CS_SubDetailDataType sub_detail_data = 11;
}

// This type represents low level signal parameters and values for
// CounterSpace.
// uci_version: 000.000.000.000
message CS_SubDetailDataType {
  // SubDetail identifier from an external, non-UCI source.
  ForeignKeyType sub_detail_identifier = 1;
  // UCI ID for a file with sub-detail (lower level) signal parameters and
  // attributes.
  FileLocationID_Type sub_detail_data_file_id = 2;
}

// This type represents an associated or reference signal for a CounterSpace
// engagement.
// uci_version: 001.000.000.000
message CS_SignalType {
  // Indicates an external reference signal name.
  ForeignKeyType signal = 1;
  // Low end of uplink frequency range.
  FrequencyRangeType uplink_frequency = 2;
  // Uplink polarization.
  PolarizationEnum uplink_polarization = 3;
  // Low end of downlink frequency range.
  FrequencyRangeType downlink_frequency = 4;
  // Downlink polarization.
  PolarizationEnum downlink_polarization = 5;
  // Additional signals IDs overserved within or associated with the tasked
  // signal.
  repeated ForeignKeyType existing_signal = 6;
}

// See annotations in child elements and messages/elements that use this type

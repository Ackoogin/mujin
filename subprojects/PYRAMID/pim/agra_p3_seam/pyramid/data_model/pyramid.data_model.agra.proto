// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.001.000.000
message TaskPlanConstraintType {
  // Indicates the unique ID of the TaskPlan being referenced. When omitted, the
  // current/active TaskPlan for the System is implied.
  optional TaskPlanID_Type allocation_plan_id = 1;
  // Indicates which kinds/categories of allocations in the TaskPlan indicated
  // by the sibling AllocationPlanID are considered changeable. The exact
  // definition of "changeable" is left to particular Services and/or Systems to
  // develop according to their requirements. A lenient interpretation would
  // equate "changeable" with "deallocation allowed" thereby giving a System
  // and/or planning Service freedom to deallocate any changeable allocations
  // from the constraining plan in order to optimize a new *Plan for new and/or
  // unchangeable allocations. Those unallocated Tasks would then be dealt with
  // in subsequent planning steps/iterations. With this definition, an
  // "unchangeable" allocation item is "System/vehicle constrained" and
  // therefore the new *Plan being developed should avoid changes that would
  // cause the item to be unallocated. A stricter interpretation might
  // additionally require that any temporal constraints of an unchangeable
  // allocation item from the constraining TaskPlan be unchanged as a result of
  // the new *Plan being developed. In a System of Systems with inter-*Plan
  // temporal dependencies, this stricter interpretation could reduce automated
  // replanning chain reactions.
  PlanChangeableConstraintsEnum changeable_allocations = 2;
  // Indicates a type of Task in the TaskPlan referenced by the sibling
  // AllocationPlanID element that constrains the new *Plan. If any are given,
  // only allocations associated with those Task types are constraints. If
  // omitted, allocations associated with all Task types are constraints. List
  // size for this element is based on "Select All That Apply" condition.
  repeated TaskTypeEnum task_type = 3;
}


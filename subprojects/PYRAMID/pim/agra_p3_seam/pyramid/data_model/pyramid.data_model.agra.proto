enum FailureGuidanceEnum {
  FAILURE_GUIDANCE_ENUM_UNSPECIFIED = 0;
  FAILURE_GUIDANCE_ENUM_RETRY = 1;
  FAILURE_GUIDANCE_ENUM_ESCALATE = 2;
  FAILURE_GUIDANCE_ENUM_CONTINUE = 3;
  FAILURE_GUIDANCE_ENUM_ABORT = 4;
  FAILURE_GUIDANCE_ENUM_SKIP = 5;
}


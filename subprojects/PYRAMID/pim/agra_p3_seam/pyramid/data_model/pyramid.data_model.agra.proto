// Defines a line of sight ray in a world inertial or body frame of reference.
// uci_version: 001.000.000.000
message LOS_VariableA_Type {
  // Specifies whether the sibling Azimuth and Elevation elements are referenced
  // to a body, NED, or inertial frame.
  LOS_ReferenceEnum reference = 1;
  // Indicates the azimuth from an observation point to a point of interest.
  // When the sibling Reference element indicates INERTIAL, azimuth is defined
  // as the angle between two lines in a global horizontal plane at the
  // observation point. The first line is from the observation point to true
  // north. The second line is from the observation point to the point of
  // interest projected onto the global horizontal plane. An azimuth of zero
  // indicates true north with values increasing clockwise. When the sibling
  // Reference element indicates BODY, azimuth is defined as the angle between
  // two lines in the plane containing the observer's roll and pitch axis (the
  // "RP" plane). The first line is from the observation point along the
  // observer's roll axis or "down the nose" in aircraft terminology. The second
  // line is from the observation point to the point of interest projected onto
  // the RP plane. An azimuth of zero indicates directly ahead of the observer
  // ("down the nose") with values increasing clockwise. An azimuth of Pi/2
  // indicates directly right of the observer ("down the right wing"). The terms
  // azimuth and bearing are often used interchangeably but they are technically
  // different. Azimuth values are angles between 0 and 2*Pi radians (0 and 360
  // degrees) relative to reference. Bearing values are a combination of a
  // reference direction (north or south) and an angle between 0 and Pi radians
  // (0 and 180 degrees) towards the east or west direction. For example, an
  // azimuth of Pi/2 radians (90 degrees) is equivalent to a bearing of "North
  // 90 East" or "South 90 East". UCI uses azimuth because it is easier for
  // machine/software use.
  // xsd type: AnglePositiveType
  double azimuth = 2;
  // Indicates the elevation from an observation point to a point of interest.
  // When the sibling Reference element indicates INERTIAL, elevation is defined
  // as the angle between two lines in a global vertical plane at the
  // observation point. The first line originates from the observation point and
  // extends along the azimuth. The second line is from the observation point to
  // the point of interest. An elevation of zero indicates the point of interest
  // is in the observation point's horizontal plane. Elevation values are
  // positive when the point of interest is above the horizontal plane, negative
  // when below. When the sibling Reference element indicates BODY, elevation is
  // defined as the angle between two lines in a plane containing the observer's
  // yaw axis. The first line originates from the observation point and extends
  // along the azimuth. The second line is from the observation point to the
  // point of interest. An elevation of zero indicates the point of interest is
  // in the observer's roll-pitch (RP) plane. Elevation values are positive when
  // the point of interest is above the RP plane, negative when below.
  // xsd type: AngleType
  double elevation = 3;
}


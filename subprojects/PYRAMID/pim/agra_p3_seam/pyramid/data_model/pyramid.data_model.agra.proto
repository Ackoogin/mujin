  double slant_range = 1;
  // Discrete value indicating the error in SlantRange.
  // xsd type: DistanceType
  optional double slant_range_error = 2;
  // Indicates the relative velocity along the line-of-sight.
  // xsd type: SpeedType
  optional double slant_range_rate = 3;
  // Discrete value indicating the one sigma error in SlantRangeRate.
  // xsd type: DoubleNonNegativeType
  optional double slant_range_rate_error = 4;
}

// This type contains the 1-sigma covariance of line of sight angles and slant
// range. The covariance is symmetric and therefore the covariance values
// expressed here are the minimum set.
// uci_version: 000.000.000.000
message LOS3D_CovarianceType {
  // Row 1 Column 1 term of the result matrix. Vertical Vertical angle-angle
  // covariance. As radian is unitless result is unitless.
  double rv_rv = 1;
  // Row 1 Column 2 term of the result matrix. Vertical Horizontal angle-angle
  // covariance. As radian is unitless result is unitless.
  double rv_rh = 2;
  // Row 2 Column 2 term of the result matrix. Horizontal Horizontal angle-angle
  // covariance. As radian is unitless result is unitless.
  double rh_rh = 3;
  // Row 1 Column 3 term of the result matrix. Slant Range Vertical
  // position-angle covariance. The result is in units of meters.
  optional double ps_rv = 4;
  // Row 2 Column 3 term of the result matrix. Slant Range Horizontal
  // position-angle covariance. The result is in units of meters.
  optional double ps_rh = 5;
  // Row 3 Column 3 term of the result matrix. Slant Range Slant Range
  // position-position covariance. The result is in units of meters squared.
  optional double ps_ps = 6;
}


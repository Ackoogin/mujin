  optional CapabilityID_Type capability_id = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message StrikeActivityMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // Indicates the state of the internal software object that the data in the
  // message is based upon. The state of the software object is determined by
  // the publisher. The publisher could be the original/master publisher or an
  // intermediary re-publisher such as a persistence/data manager. This element
  // is not a commanded CRUD operation. It is not an indication of the state of
  // an instance of a message. It is not a mechanism for partial, incremental,
  // or fragmentary publication of a message. It is a signal from a publisher to
  // subscribers. For REMOVED state, in particular, some subscribers will mirror
  // the publisher and treat the message as if the object no longer exists, but
  // others, such as mission recorders, might not (in order to support retaining
  // historical records of activity, for example).
  optional ObjectStateEnum object_state = 2;
  // See annotations in child elements and messages/elements that use this type
  // for details.
  StrikeActivityMDT message_data = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message StrikeActivityMDT {
  // Indicates the Subsystem which hosts the Strike Capabilities whose
  // Activities are given in this message.
  SubsystemID_Type subsystem_id = 1;
  // Indicates the dynamic operational characteristics of an Activity of a
  // Strike Capability.
  repeated StrikeActivityType activity = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.003.001
message StrikeActivityType {
  // composed xsd extension base ActivityBaseType
  ActivityBaseType base = 1;
  // Key Load indicates the store has been put into a state where it is ready to
  // receive cryptographic keys.
  bool selected_for_key_load = 2;
  // When true, the weapon is in the armed state.
  bool weapon_armed = 3;
  // The store has been prepared for launch such that when released the store
  // will function properly.
  bool ready_for_release = 4;
  // When Master Arm, Release Consent, and any LAR or vehicle Attitude
  // parameters enforced by the carriage are all met, this store will be
  // released.
  bool selected_for_release = 5;
  // Jettison indicates an ejection from the host system without powering or
  // preparing the delivery vehicle. The store will be in an inert state. When
  // Master Arm, Release Consent, and any LAR or vehicle attitude parameters
  // enforced by the carriage are all met, this store will be jettisoned.
  bool selected_for_jettison = 6;
  // Indicates the Entity target assigned to the StrikeCapability.
  optional GeoLocatedObjectType assigned_target = 7;
  // Indicates the current/set AO/laser PRF and/or PIM code.
  optional AO_CodeType ao_code = 8;
  // Indicates the ID of the associated LAR and/or LAR_Report associated with
  // the Strike capability.
  optional LAR_ID_Type lar_id = 9;
  // Indicates whether (TRUE) or not (FALSE) the Activity requires consent to
  // transition from the ENABLED state to an ACTIVE state. This element is
  // required and shall be TRUE for Activities associated with "mother may I"
  // Capabilities.
  optional bool consent_required = 10;
  // Indicates the state of consent for the Activity. This element is required
  // for Activities which require Consent.
  optional ConsentEnum consent_state = 11;
  // The estimated footprint of where the store may fall if released from the
  // current position.
  optional EnduranceFootprintType kinetic_footprint = 12;
  // Indicated whether (TRUE) or not (FALSE) a lock on target has been acquired.
  optional bool target_lock_acquired = 13;
  // Data regarding the munition while it is in flight.
  optional MunitionInFlightType munition_in_flight = 14;
  // Time interval before strike capability is released.
  // xsd type: DurationType
  optional string time_to_release = 15;
}


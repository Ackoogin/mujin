// uci_version: 001.000.000.000
message TurretCommandPositionType {
  // Heading of the turret relative to the coordinate frame specified by the
  // Reference element. BODY: 0=down the nose, + values are clockwise. i.e.,
  // 1.57 = looking down the right wing. INERTIAL: 0=True North, + values are
  // clockwise.i.e., 1.57 = looking East.
  // xsd type: AnglePositiveType
  double azimuth = 1;
  // Pitch of the turret relative to the coordinate frame specified by the
  // Reference element. BODY: 0=straight ahead relative to vehicle waterline.
  // Positive values are down and back. i.e., 1.57 = straight down. INERTIAL:
  // 0=straight ahead relative to local level in the global frame. Positive
  // values are up.i.e., 1.57 = straight up.
  // xsd type: AngleType
  double elevation = 2;
  // Specifies if parameters are Inertial Referenced or Body Referenced.
  LOS_ReferenceEnum reference = 3;
}


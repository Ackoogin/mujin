  ESM_SettingsCommandMDT message_data = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.002
message ESM_SettingsCommandMDT {
  // composed xsd extension base CapabilitySettingsCommandBaseType
  CapabilitySettingsCommandBaseType base = 1;
  // Indicates the commanded order in which identity ambiguity should be
  // reported in the Capability's subsequent output messages. See enumerate
  // annotations for further details.
  optional AmbiguityOrderingEnum set_ambiguity_ordering = 2;
  // Indicates a command to enable (true) or disable (false) the audio tone
  // produced by the RWR system.
  optional bool rwr_audio_enable = 3;
  // Indicates a command to enable (TRUE) or disable (FALSE) the
  // SpectralDensityReport.
  optional bool spectral_density_reporting = 4;
  // Indicates a command to edit one emitters' settings based on the CurrentMDF
  // (and any previous edits). The emitter edits may include the emitter
  // activation and the current Emitter Priority Bin. If the current MDF listed
  // is not the actual MDF in use, the command will return an error.
  optional ESM_ProfileEditType edit_esm_profile = 5;
  // Indicates any applicable zone this command is valid for.
  optional ApplicableZoneType applicable_zone = 6;
  // Indicates any applicable volume this command is valid for.
  optional ApplicableVolumeType applicable_volume = 7;
  // Specifies which messages are to be output by the Capability as the result
  // of capability commands. Note: Only values advertised in the Capability
  // message are allowed. Any non-supported values should result in rejection of
  // the settings command. List size for this element is based on "Select All
  // That Apply" condition.
  repeated ESM_MessageOutputsEnum message_output = 8;
  // Used to set Emitter Priority Bin data explicitly.
  repeated ESM_BinProfileType scan_schedule_profile_data = 9;
}

// ESM Profile for the current MDF contains Emitter Priority Bin and
// activation for each emitter. This structure allows controlling the entries
// in the ESM Profile, only for the current MDF.
// uci_version: 001.000.001.000
message ESM_ProfileEditType {
  // If the specified Current MDF does not match the MDF in use, the command
  // will return an error.
  MDF_CommandType current_mdf = 1;
  // In a single ESM MDF, editing of emitter priority bin and/or activation can
  // occur for multiple element in a message at a time.
  repeated ESM_ProfileEntryType esm_profile_entry = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.001.000
message ESM_ProfileEntryType {
  // Specify an emitter by ID or by MDF_Entry number.
  repeated EmitterEntryType emitter_entry = 1;
  // Specifies the Emitter Priority Bin for the sibling EmitterEntry. These bins
  // are for a "binned" set of emitters without identifying them individually.
  optional uint32 emitter_priority_bin = 2;
  // States whether the subject emitter is individually activated or deactivated
  // for use by ESM.
  optional ESM_ActivationEnum activation = 3;
}

// Specify an emitter by ID or by MDF_Entry number.
// uci_version: 001.000.001.000
message EmitterEntryType {
  oneof choice {
    // One or more emitters, defined by emitter IDs, may be the subject of the
    // message.
    EmitterIdentityType emitter = 1;
    // One or more emitters, defined by an MDF_Entry key, may be the subject of
    // the message.
    ForeignKeyType mdf_entry = 2;
  }
}

// Indicates applicable zone with inclusion zones and exclusion zones.
// uci_version: 002.000.002.000
message ApplicableZoneType {

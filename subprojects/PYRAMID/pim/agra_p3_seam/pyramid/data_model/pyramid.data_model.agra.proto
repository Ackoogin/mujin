// See the annotation in the associated message for an overall description of
// the message and this type.
// uci_version: 000.000.000.000
message MA_FlightCommandMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // See annotations in child elements and messages/elements that use this type
  // for details.
  MA_FlightCommandMDT message_data = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_FlightCommandMDT {
  // Indicates an instance of a Flight Capability command. A Capability command
  // message can have multiple command instances to allow a sequence of related
  // commands in a single coherent message. Each command instance reports status
  // via a separate independent Capability CommandStatus message.
  repeated MA_FlightCommandType command = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_FlightCommandType {
  oneof choice {
    // Indicates a new invocation of a Flight Capability. Generally, if accepted,
    // the command will result in one or more new Flight Activities being created
    // and reported via the Flight Activity message. The request/response
    // interaction terminates as soon as the command is accepted or rejected; this
    // element is not used to interact with an "active" command. Updates and/or
    // additional interaction with the resulting Activity (after the command is
    // accepted) is accomplished via the sibling Activity element.
    MA_FlightCapabilityCommandType capability = 1;
    // Indicates a command to modify an existing Flight Activity (which was
    // previously reported via the Flight Activity message and was marked as
    // "interactive"). The request/response interaction terminates as soon as the
    // modification is accepted or rejected. The modifications are reflected in
    // subsequent Flight Activity messages.
    MA_FlightActivityCommandType activity = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_FlightCapabilityCommandType {
  // composed xsd extension base CapabilityCommandBaseType
  CapabilityCommandBaseType base = 1;
  // Indicates the parameters for a loiter.
  optional MA_LoiterType loiter = 2;
  // Indicates the parameters for a must fly.
  optional MustFlyType must_fly = 3;
  // Indicates the relative positions for the entities in the formation.
  repeated MA_FormationType formation = 4;
  // See annotations in child elements and messages/elements that use this type
  // for details.
  optional MA_FlightControlModesChoiceType flight_control_mode = 5;
  // Indicates kinematics for an altitude stacked marshall.
  optional MA_AltitudeStackedMarshallType altitude_stacked_marshall = 6;
  // this element identifies the parameters for a launch/take-off task.
  optional MA_LaunchType launch = 7;
  // this element identifies the parameters for a recovery/land task.
  optional MA_RecoveryType recovery = 8;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message MustFlyType {
  // Indicates the location that must be flown.
  MustFlyLocationType location = 1;
  // Indicates constraints on approach/ingress angles for the must fly location.
  // The child Min and Max elements define the acceptable range of bearing
  // values at the sibling Location that the System must approach from. Bearing
  // from is defined as the true heading from the sibling Location to the
  // System. Because of wrap-around Max value can be smaller than Min value.
  optional AnglePairType ingress_constraint = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.001
message MustFlyLocationType {
  oneof choice {
    // Indicates the must-fly location is an Entity, This is typically an
    // overflight location with the desired altitude determined by the service
    // design.
    EntityID_Type entity_id = 1;
    // Indicates the must-fly location is an OpPoint.
    OpPointID_Type op_point_id = 2;
    // Indicates the must-fly location is an OpLine.
    OpLineID_Type op_line_id = 3;
    // Indicates the must-fly location is an OpZone.
    OpZoneID_Type op_zone_id = 4;
    // Indicates the must-fly location is an OpVolume.
    OpVolumeID_Type op_volume_id = 5;
    // Indicates the must-fly location is a geospatial point.
    Point3D_Type point = 6;
    // Use of the Zone Target implies that a vehicle must enter the zone.
    ZoneExternalType zone_target = 7;
    // Use of the Line Target implies that a vehicle must fly through a corridor.
    LineTargetType line_target = 8;
    // Use of the Volume Target implies that a vehicle must enter the volume.
    OpVolumeType volume_target = 9;
  }
}

// Indicates the formation configuration.
// uci_version: 000.000.000.000
message MA_FormationType {
  // Indicates the different variations of formation flight.
  MA_FormationTemplateEnum formation_template = 1;
  // The designated anchor point for calculation of positions of all other
  // formation members.
  MA_FormationAnchorType formation_anchor = 2;
  // Slot identifier for system's formation position.
  // xsd type: MA_FormationSlotType
  int32 formation_slot = 3;
  // Attribute-defined keep-in zones.
  ZoneExternalType zone_target = 4;
}

// Indicates the different variations of formation flight.
enum MA_FormationTemplateEnum {
  MA_FORMATION_TEMPLATE_ENUM_UNSPECIFIED = 0;
  MA_FORMATION_TEMPLATE_ENUM_AGILE = 1;
  MA_FORMATION_TEMPLATE_ENUM_CONTAINER = 2;
  MA_FORMATION_TEMPLATE_ENUM_TRAIL = 3;
}

// The designated anchor point for calculation of positions of all other
// formation members.
// uci_version: 000.000.000.000
message MA_FormationAnchorType {
  // Platform ID used for relative peer positioning.
  ReferenceFrameID_Type reference_frame_id = 1;
}

// Provides a choice among available flight control mode types.
// uci_version: 000.000.000.000
message MA_FlightControlModesChoiceType {
  oneof choice {
    // This message shall be used to provide the ability to command a new flight
    // vector to the Platform.
    MA_HSA_CSA_Type hsa_csa = 1;
    // This message shall be used to provide the ability to send a new waypoint
    // path or segment for the Platform to follow.
    MA_WaypointFollowingType waypoint_following = 2;
    // Indicates the parameters for curve following control.
    MA_CurveControlType curve_following = 3;
  }
}

// This message shall be used to provide the ability to command a new flight
// vector to the Platform.
// uci_version: 000.000.000.000
message MA_HSA_CSA_Type {
  // Altitude hold value to be achieved and reference to altitude measurement
  // source.
  optional AltitudeReferenceType altitude = 1;
  // Defines speed type (reference frame) for all speed related fields in this
  // message.
  optional PathSegmentSpeedType speed = 2;
  // Defines heading or course type and reference to hold.
  optional MA_DirectionChoiceType direction = 3;
}

// This message shall be used to provide the ability to send a new waypoint
// path or segment for the Platform to follow.
// uci_version: 000.000.000.000
message MA_WaypointFollowingType {
  // Indicates the Paths and Segments that make up the Route to be flown.
  MA_RouteType route = 1;
}

// Defines the curve control elements including the curve segments, whether to
// append the curve, and end of curve behavior.
// uci_version: 000.000.000.000
message MA_CurveControlType {
  // Specifies the curve segments as a set of NURBS points.
  repeated MA_NURBS_PointType curve_segments = 1;
  // Specifies this curve will be appended to a previous curve command. This is
  // only valid if the vehicle is currently executing a curve.
  // xsd type: EmptyType (pattern [A-Za-z]{0})
  optional string append_curve = 2;
  // Specifies the vehicle behavior at the completion of the curve.
  optional MA_EndOfCurveBehaviorEnum end_of_curve_behavior = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_AltitudeStackedMarshallType {
  // This element defines the parameters for a loiter.
  LoiterType loiter_kinematics = 1;
  // The minimum altitude of the stacked marshall in meters.
  // xsd type: AltitudeType
  double minimum_altitude = 2;
  // The maximum altitude of the stacked marshall in meters.
  // xsd type: AltitudeType
  optional double maximum_altitude = 3;
  // The altitude separation for the vehicles in the marshall in meters.
  // xsd type: DistanceType
  optional double minimum_altitude_separation = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_LaunchType {
  oneof choice {
    // This element defines the parameters for a carrier launch task.
    MA_CarrierLaunchType carrier_launch = 1;
    // This element defines the parameters for an airfield takeoff task.
    MA_AirfieldTakeoffType airfield_takeoff = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_CarrierLaunchType {
  // This is the CASE desingation which indicates visibility level which impacts
  // the departure and recovery routing
  optional MA_CaseTypeEnum case_designation = 1;
  // This ID of the OpLine that represents the Departure Radial
  OpLineID_Type departure_radial_line_id = 2;
  // The SystemID of the carrier
  SystemID_Type carrier_id = 3;
  // The ID of the catapult
  MA_CatapultID_Type catapult_id = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_AirfieldTakeoffType {
  // Indicates a unique ID, assigned to this airfield report message.
  AirfieldID_Type airfield_id = 1;
  // Indicates the unique ID for this Runway.
  RunwayID_Type runway_id = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_RecoveryType {
  oneof choice {
    // This element defines the tasks used in carrier recoveries.
    MA_CarrierRecoveryChoiceType carrier_recovery = 1;
    // This element defines the parameters for an airfield land task.
    MA_AirfieldLandType airfield_land = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_CarrierRecoveryChoiceType {
  oneof choice {
    // This element defines the parameters for a carrier recovery task.
    MA_CarrierRecoveryType recovery = 1;
    // This element defines the parameters for a "Delta" command that will command
    // recovering aircraft to hold a certain amount of time if feasible
    MA_DeltaType delta = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_CarrierRecoveryType {
  // This is the CASE desingation which indicates visibility level which impacts
  // the departure and recovery routing
  optional MA_CaseTypeEnum case_designation = 1;
  // The bearing for the final approach
  // xsd type: AngleType
  double final_bearing = 2;
  // The descent angle of the final approach
  // xsd type: AngleType
  double glideslope = 3;
  // The relative touch down point is defined as an offset of the location from
  // the origin of the separately defined reference frame which is a location on
  // the carrier.
  Point3D_RelativeType relative_touch_down_point = 4;
  // The SystemID of the carrier
  SystemID_Type carrier_id = 5;
  // The ID of the OpZone that represents the playbox area for the carrier
  optional OpZoneID_Type carrier_playbox_id = 6;
  // Expected arrival time (EAT) for the aircraft to land on the carrier deck
  // xsd type: DateTimeType (pattern .+Z)
  optional string expected_arrival_time = 7;
}

// Command to order recovering aircraft to hold if feasible when on approach
// or in recovery marshal
// uci_version: 000.000.000.000
message MA_DeltaType {
  // The amount of time a recovering aircraft will hold in seconds
  // xsd type: DurationType
  string time_delta_seconds = 1;
}


// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message MA_StrikeActivityMDT {
  // Indicates the Subsystem which hosts the Strike Capabilities whose
  // Activities are given in this message.
  SubsystemID_Type subsystem_id = 1;
  // Indicates the dynamic operational characteristics of an Activity of a
  // Strike Capability.
  repeated MA_StrikeActivityType activity = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.003.001
message MA_StrikeActivityType {
  // composed xsd extension base ActivityBaseType
  ActivityBaseType base = 1;
  // Key Load indicates the store has been put into a state where it is ready to
  // receive cryptographic keys.
  bool selected_for_key_load = 2;
  // When true, the weapon is in the armed state.
  bool weapon_armed = 3;
  // The store has been prepared for launch such that when released the store
  // will function properly.
  bool ready_for_release = 4;
  // When Master Arm, Release Consent, and any LAR or vehicle Attitude
  // parameters enforced by the carriage are all met, this store will be
  // released.
  bool selected_for_release = 5;
  // Jettison indicates an ejection from the host system without powering or
  // preparing the delivery vehicle. The store will be in an inert state. When
  // Master Arm, Release Consent, and any LAR or vehicle attitude parameters
  // enforced by the carriage are all met, this store will be jettisoned.
  bool selected_for_jettison = 6;
  // Indicates the Entity target assigned to the StrikeCapability.
  optional GeoLocatedObjectType assigned_target = 7;
  // Indicates the current/set AO/laser PRF and/or PIM code.
  optional AO_CodeType ao_code = 8;
  // Indicates the ID of the associated LAR and/or LAR_Report associated with
  // the Strike capability.
  optional LAR_ID_Type lar_id = 9;
  // Indicates whether (TRUE) or not (FALSE) the Activity requires consent to
  // transition from the ENABLED state to an ACTIVE state. This element is
  // required and shall be TRUE for Activities associated with "mother may I"
  // Capabilities.
  optional bool consent_required = 10;
  // Indicates the state of consent for the Activity. This element is required
  // for Activities which require Consent.
  optional ConsentEnum consent_state = 11;
  // The estimated footprint of where the store may fall if released from the
  // current position.
  optional EnduranceFootprintType kinetic_footprint = 12;
  // Indicated whether (TRUE) or not (FALSE) a lock on target has been acquired.
  optional bool target_lock_acquired = 13;
  // Data regarding the munition while it is acttive or in flight.
  optional MA_MunitionActiveType munition_active = 14;
  // Time interval before strike capability is released.
  // xsd type: DurationType
  optional string time_to_release = 15;
}

// Provides further timing, state and orientation data pertaining to the
// munition during the strike activity.
// uci_version: 000.000.000.000
message MA_MunitionActiveType {
  // composed xsd extension base MunitionInFlightType
  MunitionInFlightType base = 1;
  // Provides further munition state data detail if the Activity is ENABLED,
  // ACTIVE_* or COMPLETED as reported by the ActivityState. This message can be
  // omitted if ActivityState is DISABLED, FAILED or DELETED. List size for this
  // element is based on "Select All That Apply" condition.
  repeated MA_ActiveWeaponStateEnum active_weapon_state = 2;
  // Provides the heading/course, speed, and altitude of the munition while the
  // Activity is ACTIVE_*.
  optional MA_HSA_CSA_Type active_weapon_hsa_csa = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MunitionInFlightType {
  // Delta time in nano seconds until munition seeker activation. Assume seeker
  // is active if time is zero or negative.
  // xsd type: DurationType
  optional string time_to_active = 1;
  // Delta time in nano seconds until the munition is fully autonomous and able
  // to guide without data link or external target designation. Assume munition
  // is autonomous if time is zero or negative.
  // xsd type: DurationType
  optional string time_to_autonomous = 2;
  // Delta time in nano seconds until the munition impacts the target based on
  // its current target estimate.
  // xsd type: DurationType
  string time_to_impact = 3;
}

// This enumerated type provides further detail to the ENABLED, ACTIVE_* or
// COMPLETED enumerations provided by the ActivityStateEnum enumeration. If
// the activity is ENABLED, ACTIVE_* or COMPLETED this message enumeration
// defines the specific state of the weapon store during the activity.
enum MA_ActiveWeaponStateEnum {
  MA_ACTIVE_WEAPON_STATE_ENUM_UNSPECIFIED = 0;
  MA_ACTIVE_WEAPON_STATE_ENUM_TARGETED = 1;
  MA_ACTIVE_WEAPON_STATE_ENUM_REQUESTED = 2;
  MA_ACTIVE_WEAPON_STATE_ENUM_SEEKER_INACTIVE = 3;
  MA_ACTIVE_WEAPON_STATE_ENUM_SEEKER_ACTIVE = 4;
  MA_ACTIVE_WEAPON_STATE_ENUM_FUZE_INACTIVE = 5;
  MA_ACTIVE_WEAPON_STATE_ENUM_FUZE_ACTIVE = 6;
  MA_ACTIVE_WEAPON_STATE_ENUM_NOT_FULLY_AUTONOMOUS = 7;
  MA_ACTIVE_WEAPON_STATE_ENUM_FULLY_AUTONOMOUS = 8;
  MA_ACTIVE_WEAPON_STATE_ENUM_DEFEATED = 9;
  MA_ACTIVE_WEAPON_STATE_ENUM_TIMED_OUT = 10;
  MA_ACTIVE_WEAPON_STATE_ENUM_SUCCESS = 11;
}

// See the annotation in the associated message for an overall description of

}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.002.000
message ControlStatusMissionControlType {
  // Indicates the unique ID of the System which is responsible for mission
  // control. A system without a mission controller and/or a self-controlling
  // system should indicate its own ID. The System with mission control of
  // another System is responsible for responding to ControlRequests for that
  // System.
  SystemID_Type controller_system_id = 1;
  // Indicates whether (TRUE) the system is currently executing mission tasking.
  // A system that is InMission will have a SystemState of OPERATIONAL or
  // DEGRADED.
  bool in_mission = 2;
  // Indicates "Planned C2" mission control interfaces supported by the System
  // along with their activation state. A supported interface isn't necessarily
  // enabled currently. List size allows for each PlanType
  // (InterfacePlanTypeEnum) available to be represented.
  repeated PlannedControlInterfacesType planned_control_interface = 3;
  // Indicates "Direct C2" mission control interfaces supported by the System
  // along with their activation state. A supported interface isn't necessarily
  // enabled currently. If more than one instance of this element is given, each
  // should be of a different child ActivationState.
  repeated DirectControlInterfacesType direct_control_interface = 4;
  // The voice call sign being used to refer to the controlled system by the
  // controlling system.
  // xsd type: VoiceCallSignType (pattern [ 0-9A-Z]{4})
  optional string voice_call_sign = 5;
}

// Indicates supported Mission Control related messages/interfaces along with
// their current state of activation.
// uci_version: 000.000.000.000
message PlannedControlInterfacesType {
  // Indicates the specific *Plan type that the interface is associated with.
  InterfacePlanTypeEnum plan_type = 1;
  // Indicates the specific messages/interface for the *Plan type indicated by
  // the sibling element. If multiple instances of this element are given, each
  // should be of a different message/interface type as enumerated by the child
  // ControlInterface element.
  repeated PlannedControlInterfaceStateType control_interface = 2;
  // Indicates how many of the *Plan indicated by the sibling PlanType can be
  // activated and executed simultaneously by the System. For example, a System
  // that supports multiple simultaneous active/executing RouteActivityPlans for
  // different Capability types would indicate MULTIPLE_PARALLEL. A System
  // supporting activation of a current and future sequential RoutePlans would
  // indicate MULTIPLE_SERIAL. A System supporting only one RoutePlan active at
  // a time would indicate SINGLE.
  PlanSimultaneityEnum plan_simultaneity = 3;
}

// Indicates a type of *Plan. This enumerated type is a duplicate subset of

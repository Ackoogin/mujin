// uci_version: 000.000.000.000
message MA_RulesOfEngagementStatusMDT {
  // Contains the ID of the Rules of Engagement message that is currently
  // active. If this field is empty, that means there is no active Rules of
  // Engagement and Engagement is not authorized.
  optional MA_RulesOfEngagementID_Type rules_of_engagement_id = 1;
  // The ID(s) of an OpZone/OpVolume or specified zone(s) that defines where the
  // ROE is applicable. If this field is not empty, the ACP must be in this
  // region when it fires, and the calculated weapon impact location of the
  // Target must be within this region. The MA shall only start an engagement
  // for targets inside of the Region(s).
  repeated MA_RegionChoiceType applicable_region = 2;
  // The time window for which the Rules of Engagement is valid. If this field
  // is left empty, the ROE is valid until the Command is canceled or an updated.
  optional DateTimeRangeType time_valid = 3;
  // The IDs, Package or ACP, that this message applies to. If an ACP is a
  // member of a package, the ACPs SystemID does not need to be in this field as
  // well.
  repeated MA_PackageSystemType applies_to_i_ds = 4;
}

// See the annotation in the associated message for an overall description of
// the message and this type.
// uci_version: 000.000.000.000
message MA_RxDataPayloadMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // Indicates the state of the internal software object that the data in the
  // message is based upon. The state of the software object is determined by
  // the publisher. The publisher could be the original/master publisher or an
  // intermediary re-publisher such as a persistence/data manager. This element
  // is not a commanded CRUD operation. It is not an indication of the state of
  // an instance of a message. It is not a mechanism for partial, incremental,
  // or fragmentary publication of a message. It is a signal from a publisher to
  // subscribers. For REMOVED state, in particular, some subscribers will mirror
  // the publisher and treat the message as if the object no longer exists, but
  // others, such as mission recorders, might not (in order to support retaining
  // historical records of activity, for example).
  optional ObjectStateEnum object_state = 2;
  // See annotations in child elements and messages/elements that use this type
  // for details.
  MA_RxDataPayloadMDT message_data = 3;
}

// See the annotation in the associated message for an overall description of
// the message and this type.
// uci_version: 000.000.000.000
message MA_RxDataPayloadMDT {
  // Indicate the unique ID assigned to this DataPayload.
  MA_RxDataPayloadID_Type rx_data_payload_id = 1;
  // Indicates the unique network endpoint that is identified as the originator
  // for the encoded payload. This field represents the original source of the
  // payload, not the immediate sender.
  SystemID_Type data_payload_originator_id = 2;
  // Represents the encoded data payload received by the DMS.
  bytes encoded_payload = 3;
  // Indicates the time at which the encoded message was initially recieved.
  // xsd type: DateTimeType (pattern .+Z)
  string timestamp = 4;
  // Indicates the UCI type of message in the EncodedPayload.
  MessageTypeEnum message_type = 5;
  // Indicates the precedence and priority levels of the particular data
  // payloads being sent.
  optional ComparableRankingType priority = 6;
  // Indicates the time at which the encoded message is expired.
  // xsd type: DateTimeType (pattern .+Z)
  optional string message_expiry = 7;
  // Indicates whether the message was routed only to the listed
  // SpecificDestinationIDs or to both the topic which corresponds to the listed
  // MessageType and also to any SpecificDestinationIDs.
  MA_DestinationHandlingEnum destination_routing = 8;
  // Indicates a unique network endpoint that is identified as a destination for
  // the encoded payload.
  repeated SystemID_Type specific_destination_id = 9;
}

// The ID type that refers to a DataPayload.
// uci_version: 000.000.000.000
message MA_RxDataPayloadID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// How topic and specific destination routing should be handled.
enum MA_DestinationHandlingEnum {
  MA_DESTINATION_HANDLING_ENUM_UNSPECIFIED = 0;
  MA_DESTINATION_HANDLING_ENUM_SPECIFIC_DESTINATION_ONLY = 1;
  MA_DESTINATION_HANDLING_ENUM_TOPIC_AND_SPECIFIC_DESTINATION = 2;
}


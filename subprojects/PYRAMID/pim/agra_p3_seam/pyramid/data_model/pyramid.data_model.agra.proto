// uci_version: 000.000.000.000
message PackageMDT {
  // composed xsd extension base DataRecordBaseType
  DataRecordBaseType base = 1;
  // Indicates the unique ID of the Package whose status is being reported.
  PackageID_Type package_id = 2;
  // Human readable name of the package.
  // xsd type: VisibleString256Type (pattern [ -~]{0,256})
  optional string package_name = 3;
  // Indicates the unique ID of the lead System in the package.
  optional SystemID_Type lead_system_id = 4;
  // Indicates package-related details for a partner System in the package,
  // which can also include a lead System being considered a partner in the
  // package. The package concept informs Mission and Capability control
  // established by the ControlStatus message. For example, a package of Systems
  // with partnered ESM_Capabilities performing multi-ship geo-location could be
  // thought of as a single resource during planning and execution of Mission
  // and Capability control.
  repeated PackagePartnerBaseType package_partner = 5;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message PackagePartnerBaseType {
  // Indicates the unique ID of a partner System in a package.
  SystemID_Type system_id = 1;
  // Indicates the unique ID of a Capability (of the System indicated by the
  // sibling SystemID) whose operation is partnered with Capability(ies) of
  // other Systems in the package. For example, two Systems could be paired in a
  // "bi-static surveillance package" with one System's active bi-static SAR
  // Tx/illumination Capability partnered with another System's passive
  // bi-static SAR Rx/collection Capability. As another example, a "swarm
  // package" of UAV Systems could coordinate their FlightCapability using
  // kinematic/navigation sensors and/or a datalink associated with a
  // CommsTerminalCapability.
  repeated CapabilityID_Type capability_id = 2;
}


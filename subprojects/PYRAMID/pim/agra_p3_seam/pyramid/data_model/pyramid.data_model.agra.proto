    // Indicates the reference object is an OpPoint.
    OpPointID_Type op_point_id = 2;
    // Indicates the reference object is a System UUID.
    SystemID_Type system_id = 3;
  }
}

// Provides a choice of line of sight vector definitions.
// uci_version: 001.001.001.001
message LineOfSightChoiceType {
  oneof choice {
    // LOS data provided in alternate spaces to preserve relevant data in order to

enum ExternalCommandExecutionStateEnum {
  EXTERNAL_COMMAND_EXECUTION_STATE_ENUM_UNSPECIFIED = 0;
  EXTERNAL_COMMAND_EXECUTION_STATE_ENUM_EXECUTING = 1;
  EXTERNAL_COMMAND_EXECUTION_STATE_ENUM_CANCELED = 2;
  EXTERNAL_COMMAND_EXECUTION_STATE_ENUM_RECOMMEND_REATTACK = 3;
  EXTERNAL_COMMAND_EXECUTION_STATE_ENUM_WEAPON_ASSIGNED = 4;
  EXTERNAL_COMMAND_EXECUTION_STATE_ENUM_LOCKED_ON = 5;
  EXTERNAL_COMMAND_EXECUTION_STATE_ENUM_ENGAGING = 6;
  EXTERNAL_COMMAND_EXECUTION_STATE_ENUM_WEAPON_RELEASED = 7;
  EXTERNAL_COMMAND_EXECUTION_STATE_ENUM_EFFECTIVE = 8;
  EXTERNAL_COMMAND_EXECUTION_STATE_ENUM_PARTIALLY_EFFECTIVE = 9;
  EXTERNAL_COMMAND_EXECUTION_STATE_ENUM_NOT_EFFECTIVE = 10;
  EXTERNAL_COMMAND_EXECUTION_STATE_ENUM_ENGAGEMENT_BROKEN = 11;
  EXTERNAL_COMMAND_EXECUTION_STATE_ENUM_HEADS_UP = 12;
  EXTERNAL_COMMAND_EXECUTION_STATE_ENUM_ENGAGEMENT_INTERRUPTED = 13;
  EXTERNAL_COMMAND_EXECUTION_STATE_ENUM_INVESTIGATING = 14;
  EXTERNAL_COMMAND_EXECUTION_STATE_ENUM_SHADOWING = 15;
  EXTERNAL_COMMAND_EXECUTION_STATE_ENUM_INTERVENING = 16;
  EXTERNAL_COMMAND_EXECUTION_STATE_ENUM_COVERING = 17;
  EXTERNAL_COMMAND_EXECUTION_STATE_ENUM_BDA_UNKNOWN = 18;
  EXTERNAL_COMMAND_EXECUTION_STATE_ENUM_TARGET_NOT_FOUND = 19;
  EXTERNAL_COMMAND_EXECUTION_STATE_ENUM_EVALUATION_REPORT = 20;
}

// Indicates the type of pairing or association between two objects.
enum PairingRelationshipEnum {
  PAIRING_RELATIONSHIP_ENUM_UNSPECIFIED = 0;
  PAIRING_RELATIONSHIP_ENUM_GENERAL_PAIRING = 1;
  PAIRING_RELATIONSHIP_ENUM_INTERDICTION = 2;
  PAIRING_RELATIONSHIP_ENUM_RENDEZVOUS = 3;
  PAIRING_RELATIONSHIP_ENUM_CAP = 4;
  PAIRING_RELATIONSHIP_ENUM_CAS = 5;
  PAIRING_RELATIONSHIP_ENUM_RTB = 6;
  PAIRING_RELATIONSHIP_ENUM_TANKER = 7;
  PAIRING_RELATIONSHIP_ENUM_TERMINATE = 8;
  PAIRING_RELATIONSHIP_ENUM_COUPLING = 9;
  PAIRING_RELATIONSHIP_ENUM_ASSOCIATION = 10;
  PAIRING_RELATIONSHIP_ENUM_CONTROLLING_AGENCY = 11;
}


// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message PO_TechniqueSettingType {
  // Indicates the SubCapability technique used for tracking and/or searching
  // for targets.
  PO_TechniqueEnum technique = 1;
  // Indicates the intensity of a pixels to consider it a track object.
  optional float intensity_value = 2;
  // Indicates the number of pixels around a detection to search when combining
  // detections.
  optional float constellation_value = 3;
  // Indicates how many frames in which to use adaptive frame differencing.
  optional float stride_value = 4;
  // This value controls the scale of the point to find.
  optional float point_intensity_value = 5;
  // This value controls the scale of the edge to find.
  optional float edge_intensity_value = 6;
  // Indicates the acceptable false alarm level for outputs from the Command.

message RemoteDestinationType {
  // Indicates the known system id of the remote destination. Used to obtain
  // information about the destination from published data available in the
  // environment.
  optional SystemID_Type remote_system_id = 1;
  // Indicates the known entity id of the remote destination. Used to filter
  // entities to obtain further information on the destination.
  optional EntityID_Type remote_entity_id = 2;
  // Indicates the known position of the remote destination (typically used for
  // terrestrial, non-orbiting objects).
  optional Point4D_Type remote_position = 3;
  // If applicable, provides the known Two Line Element set coordinate system
  // position data (typically used for Earth orbiting objects).
  optional TLE_Type remote_tle = 4;
}

// Two Line Element (TLE) is a standard format for conveying the orbital
// elements of an Earth orbiting object at a point in time. Prediction models
// may be used to determine past and future positions of the object based on
// the TLE content.
// uci_version: 003.001.001.000
message TLE_Type {
  // composed xsd extension base TLE_BaseType
  TLE_BaseType base = 1;
  // Indicates the identity of the asset.
  SatelliteIdentifierType satellite_identity = 2;
  // The classification of the TLE.
  ClassificationEnum classification = 3;
  // Represents the orbital model used to generate the data. 1=SGP, 2=SGP4,
  // 3=SDP4, 4=SGP8, 5=SDP8, 0=SGP4/SDP4 as appropriate. Distributed element
  // sets are typically marked 0.
  uint32 ephemeris_type = 4;
}


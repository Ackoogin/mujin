// uci_version: 000.000.000.000
message MA_CAP_TaskType {
  // Defines orbits to be used for CAP task.
  repeated MA_OrbitType orbits = 1;
  // How many assets are to be assigned to each CAP pattern.
  optional uint32 assets_per_orbit = 2;
  // Desired priority for MA execution of CAP.
  optional MA_CAPOptimizationEnum optimization_strategy = 3;
  // Define synchronization scheme across multiple orbits/assets.
  optional MA_SynchronizationChoiceType synchronization_strategy = 4;
  // References target zone for Keep In boundary for CAP execution.
  repeated OpZoneID_Type keepin_zone_id = 5;
  // References zone that provides threat region of interest information.
  repeated OpZoneID_Type hostile_zone_id = 6;
  // Speed at which CAP should be flown.
  optional PathSegmentSpeedType cap_speed = 7;
}

// Indicates CAP optimization strategy.
enum MA_CAPOptimizationEnum {
  MA_CAP_OPTIMIZATION_ENUM_UNSPECIFIED = 0;
  MA_CAP_OPTIMIZATION_ENUM_MAX_ENDURANCE = 1;
  MA_CAP_OPTIMIZATION_ENUM_MAX_SENSOR_COVERAGE = 2;
  MA_CAP_OPTIMIZATION_ENUM_MAX_SENSOR_COVERAGE_WITH_DRIFT = 3;
  MA_CAP_OPTIMIZATION_ENUM_CUSTOM_SPEED = 4;
}

// Defines the CAP synchronization method to be utilized.
// uci_version: 000.000.000.000
message MA_SynchronizationChoiceType {
  oneof choice {
    // Desired orbit synchronization across the package as a specified high level
    // tactic.
    MA_CAPSynchronizationTypeEnum strategy = 1;
    // Relative offset assignments at point(s) on the CAP path that can be used by
    // assets performing a decentralized synchronization method.
    MA_SynchronizationChoiceType_RelativePositioning_List relative_positioning = 2;
  }
}

// Indicates overall CAP synchronization offset options.
enum MA_CAPSynchronizationTypeEnum {
  MA_CAP_SYNCHRONIZATION_TYPE_ENUM_UNSPECIFIED = 0;
  MA_CAP_SYNCHRONIZATION_TYPE_ENUM_LINE_ABREAST = 1;
  MA_CAP_SYNCHRONIZATION_TYPE_ENUM_COUNTER_ROTATING = 2;
  MA_CAP_SYNCHRONIZATION_TYPE_ENUM_COUNTER_OPPOSE = 3;
}

// Defines relative positions used for CAP synchronization when a
// decentralized synchronization method is used.
// uci_version: 000.000.000.000
message MA_CAPRelativePositionType {
  // Defines asset the reference points apply to.
  SystemID_Type asset_id = 1;
  // Defines reference system the positions are relative to.
  SystemID_Type reference_id = 2;
  // Defines Reference points and desired offsets.
  repeated MA_CAPReferencePointType reference_point = 3;
}

// Defines ArrivalOffsets that each apply when the reference system is at the
// corresponding specified LegIndex point in the CAP pattern.
// uci_version: 000.000.000.000
message MA_CAPReferencePointType {
  // Defines a reference point.
  MA_CAP_LegIndexEnum leg_index = 1;
  // Defines an offset from the reference point, in terms of delay (time,
  // distance, or percent behind the reference system).
  MA_CAPOffsetType arrival_offset = 2;
}

// Defines the type and value of the offset (delay relative to the reference
// system) used for CAP synchronization.
// uci_version: 000.000.000.000
message MA_CAPOffsetType {
  oneof choice {
    // Offset is TOA based.
    DurationRangeType time = 1;
    // Offset is relative distance based.
    // xsd type: DistanceType
    double distance = 2;
    // Offset is a percentage of the CAP pattern.
    // xsd type: PercentType
    double percentof_pattern = 3;
  }
}

// synthesized list wrapper for repeated choice member RelativePositioning in MA_SynchronizationChoiceType (choice)
message MA_SynchronizationChoiceType_RelativePositioning_List {
  repeated MA_CAPRelativePositionType items = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.002.000
message CargoDeliveryTaskType {
  oneof choice {
    // Indicates the details for cargo pickup.
    CargoTransitionType pickup = 1;
    // Indicates the details for cargo dropoff/delivery. If multiple Dropoff
    // elements are specified, the first element is the primary dropoff point and
    // secondary points follow in priority order, highest to lowest.
    CargoDeliveryTaskType_Dropoff_List dropoff = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.002.000
message CargoTransitionType {
  // A list of the unique IDs assigned to the cargo items involved in this cargo
  // relocation.
  repeated CargoID_Type cargo_id = 1;
  // This element indicates the vehicle control strategy desired/required for
  // the cargo transition.
  VehicleControlStrategyEnum vehicle_control_strategy = 2;
  // Indicates the loading and/or unloading strategy for the cargo transition.
  CargoDeliverySubCapabilityEnum load_unload_strategy = 3;
  // Point of control and/or cargo transition (release, drop, pick-up, launch,
  // handover, etc.). For the case of independent hand-off and hand back points,
  // two are given with the hand-off point being first.
  repeated Point3D_Type transition_location = 4;
  // Defines a wedge or pie shaped region for egress to the point specified by
  // the TransitionLocation element. The angles are referenced to true north at
  // the point specified by the TransitionLocation element. The first (minimum)
  // and second (maximum) angles are as encountered in a clockwise rotation
  // beginning at true north.
  optional SectorType egress_constraint = 5;
  // Defines a wedge or pie shaped region for ingress to the point specified by
  // the TransitionLocation element. The angles are referenced to true north at
  // the point specified by the TransitionLocation element. The first (minimum)
  // and second (maximum) angles are as encountered in a clockwise rotation
  // beginning at true north.
  optional SectorType ingress_constraint = 6;
}

// Indicates the vehicle control strategy desired/required for the specified
// action.
enum VehicleControlStrategyEnum {
  VEHICLE_CONTROL_STRATEGY_ENUM_UNSPECIFIED = 0;
  VEHICLE_CONTROL_STRATEGY_ENUM_HANDOFF_TO_LOCAL_CONTROL = 1;
  VEHICLE_CONTROL_STRATEGY_ENUM_VEHICLE_OPERATOR_CONTROL = 2;
  VEHICLE_CONTROL_STRATEGY_ENUM_FULLY_AUTOMATED_CONTROL = 3;
}

// See annotations in child elements and messages/elements that use this type

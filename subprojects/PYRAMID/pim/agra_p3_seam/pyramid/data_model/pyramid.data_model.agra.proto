// This represents a fault for the system. Intended to be used by services
// such as a health monitoring service for centralized fault management and
// fault isolation of a system. Includes a modified Fault Severity Enumeration
// for Mission Autonomy adaptation.
// uci_version: 001.000.002.000
message MA_FaultMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // Indicates the state of the internal software object that the data in the
  // message is based upon. The state of the software object is determined by
  // the publisher. The publisher could be the original/master publisher or an
  // intermediary re-publisher such as a persistence/data manager. This element
  // is not a commanded CRUD operation. It is not an indication of the state of
  // an instance of a message. It is not a mechanism for partial, incremental,
  // or fragmentary publication of a message. It is a signal from a publisher to
  // subscribers. For REMOVED state, in particular, some subscribers will mirror
  // the publisher and treat the message as if the object no longer exists, but
  // others, such as mission recorders, might not (in order to support retaining
  // historical records of activity, for example).
  optional ObjectStateEnum object_state = 2;
  // Reports a fault for the system.
  MA_FaultMDT message_data = 3;
}

// This represents a fault for the system. Intended to be used by services
// such as a health monitoring service for centralized fault management and
// fault isolation of a system.
// uci_version: 000.000.001.001
message MA_FaultMDT {
  // composed xsd extension base DataRecordBaseType
  DataRecordBaseType base = 1;
  // Contains the fault information for the message.
  repeated MA_SubsystemFaultType fault_information = 2;
}

// Contains fault data for reporting by subsystems and services.
// uci_version: 000.000.000.001
message MA_SubsystemFaultType {
  // The unique ID for this fault. Every fault from a Subsystem, Capability,
  // SupportCapability, Component, or Service should have a unique ID.
  FaultID_Type fault_id = 1;
  // The severity of the fault. This enumeration is modified for Mission
  // Autonomy adaptation.
  optional MA_FaultSeverityEnum severity = 2;
  // The state of the fault.
  optional FaultStateEnum fault_state = 3;
  // Additional fault data which contains key/value pairs with format and unit
  // indicated for the data value. This data supports fault isolation and helps
  // to minimize false alarms.
  repeated FaultDataType fault_data = 4;
  // Indicates the time the fault was detected; it does not indicate the time
  // the fault was transmitted.
  // xsd type: DateTimeType (pattern .+Z)
  optional string detection_time = 5;
  // Indicates the "code" or name of the fault.
  // xsd type: VisibleString256Type (pattern [ -~]{0,256})
  string fault_code = 6;
  // Indicates the number of occurrences of the associated FaultCode and a set
  // FaultState.
  optional int32 fault_code_count = 7;
  // Indicates a human readable description of the fault and/or its cause. This
  // could be different than DescriptiveLabel in the sibling FaultID field. For
  // example, DescriptiveLabel could be "Engine 1 overheat" and the
  // FaultDescription could be "Lubrication oil" or "Exhaust nozzle" indicating
  // the underlying cause of the fault.
  // xsd type: VisibleString256Type (pattern [ -~]{0,256})
  optional string fault_description = 8;
  // The Subsystem that the fault occurred within.
  optional SubsystemID_Type subsystem_id = 9;
  // The Service that this fault occurred within.
  optional ServiceID_Type service_id = 10;
  // Indicates the unique ID of a Capability related to the fault.
  repeated CapabilityID_Type capability_id = 11;
  // Indicates the unique ID of a SupportCapability related to the fault.
  repeated SupportCapabilityID_Type support_capability_id = 12;
  // Indicates the unique ID of a Component related to the fault. When multiple
  // components are identified, it should be inferred that each Component has
  // been individually determined to be related to the fault. In situations
  // where the Subsystem has not yet been able to isolate the fault to
  // individual components, the sibling AmbiguityGroup element should be used.
  repeated ComponentID_Type component_id = 13;
  // Indicates that a fault has been narrowed down to a set of components, but
  // not yet fully isolated. Separate AmbiguityGroups can be provided when it is
  // desirable to associate specific tests with a subset of the set of
  // components.
  repeated SubsystemFaultAmbiguityGroupType ambiguity_group = 14;
}

// A fault id should be unique for every fault. DescriptiveLabel should have
// as much detailed information as possible about the fault. The name should
// be something short that fits nicely in a display where as description can
// be long and help the user really understand the fault. For example,
// DescriptiveLabel - "Temp Over Heat in Oil pump engine 1 inlet", Name -
// "Temp Over Heat Eng 1".
// uci_version: 000.000.000.000
message FaultID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
  // A short name used to display to an operator if the fault code is not
  // meaningful to a human and in the case where the fault description is too
  // long.
  // xsd type: VisibleString64Type (pattern [ -~]{0,64})
  optional string name = 2;
}

// An enumeration specifying the severity of a fault. See enumerated type
// annotations for further details.
enum MA_FaultSeverityEnum {
  MA_FAULT_SEVERITY_ENUM_UNSPECIFIED = 0;
  MA_FAULT_SEVERITY_ENUM_NOMINAL = 1;
  MA_FAULT_SEVERITY_ENUM_ADVISORY = 2;
  MA_FAULT_SEVERITY_ENUM_CAUTION = 3;
  MA_FAULT_SEVERITY_ENUM_WARNING = 4;
  MA_FAULT_SEVERITY_ENUM_FAILED = 5;
}

// An enumeration specifying the state of a fault. See enumerated type
// annotations for further details.
enum FaultStateEnum {
  FAULT_STATE_ENUM_UNSPECIFIED = 0;
  FAULT_STATE_ENUM_SET = 1;
  FAULT_STATE_ENUM_CLEARED = 2;
  FAULT_STATE_ENUM_UNKNOWN = 3;
}

// Reports the data that caused the fault. Contains key/value pair along with
// format and unit indicated for the data value.
// uci_version: 000.000.000.000
message FaultDataType {
  // This is the amplifying data for the fault indicating what the value
  // represents.
  // xsd type: VisibleString1024Type (pattern [ -~]{0,1024})
  string key = 1;
  // This is the amplifying data for the fault indicating what the value is.
  // xsd type: VisibleString1024Type (pattern [ -~]{0,1024})
  string value = 2;
  // The format of the value e.g. string, float, int, ...
  // xsd type: VisibleString64Type (pattern [ -~]{0,64})
  string format = 3;
  // The unit for the value e.g. Deg F, Hz, ...
  // xsd type: VisibleString64Type (pattern [ -~]{0,64})
  optional string units = 4;
}

// Identifies a group of components that a Subsystem has identified as being
// potentially related to a fault. Also identifies diagnostic tests (when
// known) that may be run to further isolate the fault.
// uci_version: 000.000.000.000
message SubsystemFaultAmbiguityGroupType {
  // Identifies tests that may be used to further isolate the fault among the
  // identified Components. There is no direct relationship implied between a
  // test in this list and a ComponentID in the sibling list.
  repeated BIT_ID_Type diagnostic_test_id = 1;
  // Indicates the unique IDs of Components that may be related to the fault.
  repeated ComponentID_Type component_id = 2;
}


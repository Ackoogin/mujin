  PO_CapabilityEnum capability = 1;
  // Indicates the spectrum that will be used for the PO Collection. List size
  // for this element is based on "Select All That Apply" condition.
  repeated SensorSpectrumEnum sensor_spectrum = 2;
  // Indicates an adjusted and/or more specific geospatial location for the
  // collection. This element is used in cases where the sibling Target element

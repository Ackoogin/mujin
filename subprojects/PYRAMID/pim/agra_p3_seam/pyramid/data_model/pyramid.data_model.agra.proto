  // child elements are logically ANDed. If a child element is omitted then any
  // OLOI matches that element's filter.
  optional OperatorLocationOfInterestClauseType oloi = 6;
  // Indicates a ResponseCommand message as the trigger.
  optional ResponseID_Type response_command_id = 7;
  // Indicates a trigger based on any UCI message, filtered/constrained by a
  // query filter. Filter elements with cardinality greater than 1 are logically
  // ORed. Sibling filter elements are logically ANDed.
  optional QueryMessageType any_message = 8;
  // This trigger refers to a new Capability or SubCapability which becomes
  // available or a previously failed Capability which has been restored.
  optional CapabilityTaxonomyType capability_added = 9;
  // This trigger refers to a failure of a Capability and/or SubCapability
  // needed to perform a Requirement.
  optional CapabilityTaxonomyType capability_failure = 10;
  // This trigger refers to lost comms.
  optional CommsLostTriggerDataType comms_lost = 11;
  // This trigger refers to a low remaining endurance condition such as low fuel
  // or battery power. This trigger can further be specialized by the definition
  // of the Endurance thresholds to define the trigger.
  optional EnduranceType endurance_low = 12;
  // This trigger refers to a vehicle that has deviated from the planned route

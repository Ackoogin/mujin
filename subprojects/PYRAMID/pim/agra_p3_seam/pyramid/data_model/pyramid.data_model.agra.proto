  optional OpticalCollectionConstraintsType collection_constraints = 6;
  // Indicates the Task's role in a pair collection. See enumeration annotations
  // for further details.
  optional PairIdentifierEnum pair_identifier = 7;
  // Indicates a desired output Product of the Task.
  repeated PO_ProductOutputCommandImageryType output = 8;

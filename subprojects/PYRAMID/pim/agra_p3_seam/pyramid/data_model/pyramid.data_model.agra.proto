  // frame.
  RTN_PositionSigmaType position_sigma = 1;
  // Desired maximum velocity uncertainty in Radial-Transverse-Normal coordinate
  // frame.
  RTN_VelocitySigmaType velocity_sigma = 2;
  // Indicates the time window for which the Orbit Accuracy needs to be valid.
  optional DateTimeRangeType time_valid = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.000.000
message CharacterizationObjectiveType {
  oneof choice {
    // Indicates a task to characterize an object using one or more specified
    // phenomenologies.
    CharacterizationOptionsType phenomenology_collection = 1;
    // Indicates a task to assess the stability and orientation of an object.
    StabilityCharacterizationType stability_and_orientation_assessment = 2;
    // Indicates a task to characterize or assess changes to the structure of a
    // spacecraft.
    StructureAssessmentType structure_assessment = 3;
    // Indicates a task to verify that the target on the designated orbit is the
    // expected spacecraft.
    IdentificationVerificationType identification_verification = 4;
    // Indicates a task to perform collections to detect operations changes of the
    // target object.
    SatelliteOperationsChangesCharacterizationType operations_changes = 5;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.000.000
message CharacterizationOptionsType {
  // Indicates the type of characterization to be performed as part of this
  // task. Multiple options (one per available choice) may be selected to
  // address the Information Objective. Refer to the sibling Logical Operator
  // element to understand the relationships.
  repeated CharacterizationChoiceType characterization_type = 1;
  // Indicates whether all (AND), any (OR), or only one (XOR) of the sibling
  // CharacterizationTypes must be performed.
  LogicalOperatorEnum logical_operator = 2;
  // Indicates the desired characterization product to be returned/reported.
  optional CharacterizationProductTypeEnum characterization_product = 3;
}

// The CharacterizationChoiceType is a choice type that allows the user to
// select a specific type of characterization of the object.
// uci_version: 002.000.000.000
message CharacterizationChoiceType {
  oneof choice {
    // The Frequency parameters are in regards to the RF Frequencies to measure.
    // The min signal strength indicates the lowest threshold of collection. The
    // RF Frequency resolution indicates the granularity of the collection. The
    // frequency range indicates the specific RF band to collect. The optional
    // product resolution time parameter is the minimum amount of time needed to
    // get the desired level of resolution for the product.
    FrequencyParamsType frequency = 1;
    // The Infra-Red Image parameters describe the desired images to collect. The
    // spectral frequency resolution parameter indicates the size of the
    // wavelength to collect. The temperature resolution parameter indicates the
    // amount of temperature variance to measure. The optional IR image setting
    // parameter indicates the range of the IR frequency to measure. The optional
    // product resolution time parameter is the minimum amount of time needed to
    // get the desired level of resolution for the product.
    IR_ImageParamsType ir_image = 2;
    // The metric observation parameters consist of the desired distance
    // resolution. The optional product resolution time parameter indicates the
    // minimum amount of time needed to get the desired level of resolution for
    // the product.
    MetricParamsType metric_observations = 3;
    // The Narrowband Space Object of Interest (NB_SOI) parameters consists of the
    // amplitude in decibels of the desired Resolution. The optional product
    // resolution time parameter is the minimum amount of time needed to get the
    // desired level of resolution for the product.
    Narrowband_SOI_ParamsType narrowband_soi = 4;
    // The optical Image parameters consist of the overall desired image
    // resolution. The optional product resolution parameter provides guidance on
    // the color depth and horizontal and vertical pixel counts. The optional
    // product resolution time parameter is the minimum amount of time needed to
    // get the desired level of resolution for the product.
    OpticalImageParamsType optical_image = 5;
    // The radar cross section (RCS) parameters include: the desired amplitude
    // resolution measure in decibels per square meter, the optional product
    // resolution time parameter is the minimum amount of time needed to get the
    // desired level of resolution for the product.
    RCS_ParamsType rcs = 6;
    // The Visual Magnitude (VisMag) parameters consists of the amplitude
    // resolution (measured in meters per pixel) and the optional product
    // resolution time parameter (the minimum amount of time needed to get the
    // desired level of resolution for the product).
    VisMagParamsType vis_mag = 7;
    // The Wideband Space Object of Interest (WB SOI) parameters consist of the
    // range resolution of both the range and cross range. The optional product
    // resolution time parameter is the minimum amount of time needed to get the
    // desired level of resolution for the product.
    Wideband_SOI_ParamsType wideband_soi = 8;
    // The Photometry parameters consist of the amplitude in decibels of the
    // desired resolution. The optional product resolution time parameter is the
    // minimum amount of time needed to get the desired level of resolution for
    // the product.
    PhotometryParamsType photometry = 9;
    // The Color Photometry parameters consist of the desired sensor spectrum to
    // use for the collection. The optional product resolution time parameter is
    // the minimum amount of time needed to get the desired level of resolution
    // for the product.
    ColorPhotometryParamsType color_photometry = 10;
  }
}

// The Frequency parameters are in regards to the RF Frequencies to measure.
// The min signal strength indicates the lowest threshold of collection. The
// RF Frequency resolution indicates the granularity of the collection. The
// frequency range indicates the specific RF band to collect. The optional
// product resolution time parameter is the minimum amount of time needed to
// get the desired level of resolution for the product.
// uci_version: 001.001.000.000
message FrequencyParamsType {
  // This is the minimum and maximum frequencies to collect.
  optional FrequencyRangeType frequency_range = 1;
  // This is the threshold level of the collection. It is the power referenced
  // to one milliwatt in units dBm.
  // xsd type: MilliwattPowerRatioType
  optional double min_signal_strength = 2;
  // This is the desired resolution of the signal in the band of the expressed
  // frequency.
  optional double rf_frequency_resolution = 3;
  // The optional product resolution time parameter is the minimum amount of
  // time needed to get the desired level of resolution for the product.
  // xsd type: DurationType
  optional string product_resolution_time = 4;
}

// The Infra-red Image parameters describe the desired images to collect. The
// spectral frequency indicates the size of the wavelength to collect. The
// temperature resolution is amount of temperature variance to measure. The
// optional Ir Image setting indicates the range of the IR frequency to
// measure. The optional product resolution time parameter is the minimum
// amount of time needed to get the desired level of resolution for the
// product.
// uci_version: 001.001.000.000
message IR_ImageParamsType {
  // The spectral frequency resolution is the desired resolution of the size of
  // the light wavelengths to collect. Note: The spectral frequency resolution
  // is traditionally measured in angstroms (10-10 m). The DistanceType is in
  // meters: Visible light wavelengths are in the range of 4000-7000 Angstroms
  // (4.0*10-7 - 7.0*10-7 m). Normal values for this parameter would be between
  // 0.0000004 and 0.0000007.
  // xsd type: DistanceType
  optional double spectral_frequency_resolution = 1;
  // This is the desired resolution on the temperature of the collection.
  // xsd type: TemperatureType
  optional double temperature_resolution = 2;
  // This is an optional parameter of the minimum and maximum of the infrared
  // spectrum to collect if it indicated. Without this parameter the entire IR
  // spectrum is collected.
  optional FrequencyRangeType ir_image_setting = 3;
  // The optional product resolution time parameter is the minimum amount of
  // time needed to get the desired level of resolution for the product.
  // xsd type: DurationType
  optional string product_resolution_time = 4;
}

// The metric obs parameters consist of the desired distance resolution and
// the optional product resolution time.
// uci_version: 001.001.000.000
message MetricParamsType {
  // This indicates the allowable deviation from the actual location.
  // xsd type: DistanceType
  optional double pos_metric_resolution = 1;
  // The optional product resolution time parameter is the minimum amount of
  // time needed to get the desired level of resolution for the product.
  // xsd type: DurationType
  optional string product_resolution_time = 2;
}

// The Narrowband Space Object of Interest (NB_SOI) consists of the amplitude
// in decibels of the desired Resolution. The optional product resolution time
// parameter is the minimum amount of time needed to get the desired level of
// resolution for the product.
// uci_version: 000.001.000.000
message Narrowband_SOI_ParamsType {
  // This is the desired resolution of the radar amplitude measured in decibels.
  // xsd type: DecibelType
  optional double amplitude_resolution = 1;
  // The optional product resolution time parameter is the minimum amount of
  // time needed to get the desired level of resolution for the product.
  // xsd type: DurationType
  optional string product_resolution_time = 2;
}

// The optical image parameters consist of the overall desired image
// resolution. The optional ProductResolution provides guidance on the color
// depth and horizontal and vertical pixel counts. The optional product
// resolution time parameter is the minimum amount of time needed to get the
// desired level of resolution for the product.
// uci_version: 000.002.000.000
message OpticalImageParamsType {
  // This is the meters per pixel of the image.
  // xsd type: ResolutionMetersPerPixelType
  optional double image_resolution = 1;
  // This indicates the imagery product resolution in horizontal and vertical
  // pixels and color depth on the service.
  optional ProductResolutionType product_resolution = 2;
  // The optional product resolution time parameter is the minimum amount of
  // time needed to get the desired level of resolution for the product.
  // xsd type: DurationType
  optional string product_resolution_time = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message ProductResolutionType {
  // Indicates the horizontal number of pixels in an image file.
  uint32 horizontal_pixel_count = 1;
  // Indicates the vertical number of pixels in an image file.
  uint32 vertical_pixel_count = 2;
  // Indicates the number of discrete color values in each band, e.g. 8-bit

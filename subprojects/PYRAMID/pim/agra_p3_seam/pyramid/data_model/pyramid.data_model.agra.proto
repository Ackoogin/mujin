  MISSION_PLANNING_BY_CASE_TRIGGER_ENUM_CAPABILITY_FAILURE = 2;
  MISSION_PLANNING_BY_CASE_TRIGGER_ENUM_COMMS_LOST = 3;
  MISSION_PLANNING_BY_CASE_TRIGGER_ENUM_DMPI_OVER_DESIGNATION = 4;
  MISSION_PLANNING_BY_CASE_TRIGGER_ENUM_DMPI_UNDER_DESIGNATION = 5;
  MISSION_PLANNING_BY_CASE_TRIGGER_ENUM_ENDURANCE_LOW = 6;
  MISSION_PLANNING_BY_CASE_TRIGGER_ENUM_OFF_ROUTE = 7;
  MISSION_PLANNING_BY_CASE_TRIGGER_ENUM_PROXIMITY_CONFLICT = 8;
  MISSION_PLANNING_BY_CASE_TRIGGER_ENUM_RELEASE_POINT_OUTSIDE_LAR = 9;
  MISSION_PLANNING_BY_CASE_TRIGGER_ENUM_ROUTE_CONFLICT = 10;
  MISSION_PLANNING_BY_CASE_TRIGGER_ENUM_ROUTE_VULNERABILITY = 11;
  MISSION_PLANNING_BY_CASE_TRIGGER_ENUM_SYSTEM_STATE_CHANGE = 12;
  MISSION_PLANNING_BY_CASE_TRIGGER_ENUM_REQUIREMENT_ADDED = 13;
  MISSION_PLANNING_BY_CASE_TRIGGER_ENUM_REQUIREMENT_DEPENDENCY_FAILED = 14;
  MISSION_PLANNING_BY_CASE_TRIGGER_ENUM_REQUIREMENT_DROPPED = 15;
  MISSION_PLANNING_BY_CASE_TRIGGER_ENUM_REQUIREMENT_FAILED = 16;
  MISSION_PLANNING_BY_CASE_TRIGGER_ENUM_REQUIREMENT_CHANGE = 17;
  MISSION_PLANNING_BY_CASE_TRIGGER_ENUM_REQUIREMENT_TIMING = 18;
  MISSION_PLANNING_BY_CASE_TRIGGER_ENUM_ZONE_VIOLATION = 19;
  MISSION_PLANNING_BY_CASE_TRIGGER_ENUM_SPACECRAFT_PROXIMITY_CONFLICT = 20;
  MISSION_PLANNING_BY_CASE_TRIGGER_ENUM_ORBIT_CONFLICT = 21;
  MISSION_PLANNING_BY_CASE_TRIGGER_ENUM_OFF_PLANNED_ORBIT = 22;
  MISSION_PLANNING_BY_CASE_TRIGGER_ENUM_SPACECRAFT_ENDURANCE_LOW = 23;
  MISSION_PLANNING_BY_CASE_TRIGGER_ENUM_RESPONSE_PLAN = 24;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message ZoneViolationTriggerDataType {

}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message StoreCommandType {
  oneof choice {
    // For stores systems that must move stores into release position, this
    // commands the stores manager to move the specified store station into
    // release position.
    ForeignKeyType next_store_station = 1;
    // For carriage systems that can carry a mixed load, this dictates what type
    // of store is associated with the next release command. The currently
    // installed store types are reported in the StoreManagementStatus messages.
    // This is an alternative to selecting a specific store instance for release
    // using the sibling NextStoreStation element.
    StoreType next_store_type = 2;
    // When true, this commands the carriage to ignore LAR constraints when
    // releasing a store.
    bool override_lar = 3;
    // When true, this commands the carriage to ignore the safety constraints
    // placed on the host platform's attitude when releasing a store.
    bool override_attitude_constraints = 4;
    // When true, the carriage is commanded to the armed state.
    bool master_arm = 5;
    // This provides the carriage the operator's consent to release or jettison a
    // store.
    ReleaseConsentType release_consent = 6;
    // TRUE = hold the current wind velocity reported by the host platform and
    // stop accepting updates. FALSE = begin accepting wind velocity updates from
    // the host platform and replace the previously held or override value.
    bool lar_calculation_wind_hold = 7;
    // By specifying the wind velocity, the command source dictates the winds to
    // be used in the calculation of the LAR for the hosted expendables.
    Velocity2D_Type lar_calculation_wind_override = 8;
    // Command to verify carriages and mission stores loaded onto a platform match
    // an allowable configuration.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string verify_inventory = 9;
  }
}

// ReleaseConsentType expresses that release is authorized and to express
// special aspects of the launch.
// uci_version: 000.000.000.000

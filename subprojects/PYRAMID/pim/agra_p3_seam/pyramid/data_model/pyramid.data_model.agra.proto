// Performance feedback characteristics for each access period.
// uci_version: 001.001.000.001
message PeriodPerformanceFeedbackType {
  // ID of the Access Period being reported for performance feedback.
  uint32 access_period_index = 1;
  // Indicates the resource percent access as allocated from Resource Manager.
  // xsd type: PercentType
  double percent_access_allocated = 2;
  // Indicates the percentage of the timeline being requested in the resource
  // request message.
  // xsd type: PercentType
  double percent_access_requested = 3;
  // Indicates the resource percent access achieved in this Activity.
  // xsd type: PercentType
  double percent_access_achieved = 4;
  // Percent of interruption that the activity has experienced since obtaining
  // access to resources.
  // xsd type: PercentType
  optional double unusable_granted_time = 5;
  // Percent of interruption that the activity has experienced since obtaining
  // access to resources.
  // xsd type: PercentType
  double percent_interruption = 6;
  // Longest period of time where the activity has access to resources and has
  // not been interrupted.

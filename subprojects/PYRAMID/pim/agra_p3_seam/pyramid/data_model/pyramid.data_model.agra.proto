// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message RefuelCapabilityStatusType {
  oneof choice {
    // Expansion point for a capability for a tanker equipped with a boom.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string boom = 1;
    // Status associated for a capability for a tanker equipped with a drogue.
    RefuelCapabilityDrogueStatusType drogue = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message RefuelCapabilityDrogueStatusType {
  // composed xsd extension base RefuelCapabilityDrogueCommonType
  RefuelCapabilityDrogueCommonType base = 1;
  // If true indicates drogue is stowed.
  optional bool drogue_stowed = 2;
  // Amount of Scheduled Mission Fuel to be Delivered.
  // xsd type: MassType
  optional double scheduled_mission_fuel_to_be_delivered = 3;
  // If CUT, the hose has been cut. If ENABLED, the ACTIVATE command will cut
  // the hose and the DISABLE command will return the state to NORMAL. If
  // NORMAL, the ENABLE command will change the state to ENABLED. See the
  // RefuelCommand.Capability.CommandType.Drogue.HoseCut element for commands.
  optional HoseCutStatusEnum hose_cut_status = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message RefuelCapabilityDrogueCommonType {
  // If true, the power is On. If false, the power is off.
  optional bool power = 1;
  // Aerial Refueling Drogue Command. Drogue Extract, Drogue Retract and Reset.
  optional DrogueCommandEnum hose = 2;
  // If true, this store will be selected for ejection from the host platform
  // without being armed or otherwise prepared for launch. The next time all
  // release conditions are met and release consent is provided this store will
  // be jettisoned.
  optional bool select_for_jettison = 3;
  // Allows the operator to command the scheduled amount of fuel to be delivered.
  // xsd type: MassType
  optional double scheduled_fuel_to_be_delivered = 4;
  // Allows the operator to command the intensity of the tail cone status lights
  // used by the receiver aircraft. OFF is used for Status only.
  optional TailConeLightEnum tail_cone_lights_intensity = 5;
}

// Indicates the type of hose command.
enum DrogueCommandEnum {
  DROGUE_COMMAND_ENUM_UNSPECIFIED = 0;
  DROGUE_COMMAND_ENUM_EXTEND = 1;
  DROGUE_COMMAND_ENUM_RETRACT = 2;
  DROGUE_COMMAND_ENUM_LOCK = 3;
  DROGUE_COMMAND_ENUM_EMERGENCY_EXTEND = 4;
}

// This commands or reports on the tail cone lighting intensity. OFF is used

// The message data for the ComponentStatus message.
// uci_version: 001.000.003.000
message ComponentStatusMDT {
  // The status of a component. A component can be physical or functional and
  // could be outside of a Subsystem. Any component that is relevant to the
  // state, health and/or C2 of a system can be reported.
  repeated ComponentType component_status = 1;
}

// Contains component status information. See individual field annotations for
// more information.
// uci_version: 001.000.001.003
message ComponentType {
  // Indicates the unique ID of the Subsystem Component corresponding to this
  // message.
  ComponentID_Type component_id = 1;
  // This enumerated element represents the current operational statue of the
  // resource.
  ComponentStateEnum component_state = 2;
  // Indicates the time the data was last known to be accurate.
  // xsd type: DateTimeType (pattern .+Z)
  optional string data_timestamp = 3;
  // Indicates the temperature of the Subsystem Component corresponding to this
  // message.
  repeated TemperatureStatusType temperature = 4;
  // This element is only applicable when the sibling ComponentState indicates a
  // fault, in which case it specifies the BIT or BITs in which failure was
  // identified.
  repeated BIT_ID_Type bit_id = 5;
  // This element is only applicable when the sibling ComponentState indicates a
  // fault, in which case TRUE means this is a Subsystem critical failure.
  optional bool subsystem_critical = 6;
  // This element is only applicable when the sibling ComponentState indicates a
  // fault, in which case it identifies the additional diagnostic BIT or BITs
  // that can be run to verify the fault has been repaired.
  repeated BIT_ID_Type diagnostic_test_id = 7;
  // This element provides an abstract extension for reporting status of a
  // component.
  optional ComponentExtendedStatusPET extended_status = 8;
  // This element provides a generic way of reporting specific or unique
  // component status information. For example, it could be used to report
  // status for items in electrical equipment or hydraulic equipment that are
  // documented outside of UCI in an ICD or to report engine specific status
  // information such as throttle.
  repeated ComponentDetailedStatusType specific_status = 9;
  // This element is only applicable when the sibling ComponentState indicates a
  // fault, in which case it specifies the Subsystem maintenance test(s) in
  // which failure was identified.
  optional SubsystemMaintenanceID_Type subsystem_maintenance_test_id = 10;
}


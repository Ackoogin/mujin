// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.003.000
message AMTI_CommandMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // See annotations in child elements and messages/elements that use this type
  // for details.
  AMTI_CommandMDT message_data = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message AMTI_CommandMDT {
  // Indicates an instance of an AMTI Capability command. A Capability command
  // message can have multiple command instances to allow a sequence of related
  // commands in a single coherent message. Each command instance reports status
  // via a separate, independent Capability CommandStatus message.
  repeated AMTI_CommandType command = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message AMTI_CommandType {
  oneof choice {
    // Indicates a new invocation of an AMTI Capability. Generally, if accepted,
    // the command will result in one or more new AMTI Activities being created
    // and reported via the AMTI_Activity message. The request/response
    // interaction terminates as soon as the command is accepted or rejected; this
    // element is not used to interact with an "active" command. Updates and/or
    // additional interaction with the resulting Activity (after the command is
    // accepted) is accomplished via the sibling Activity element.
    AMTI_CapabilityCommandType capability = 1;
    // Indicates a command to modify an existing AMTI Activity (which was
    // previously reported via the AMTI_Activity message and was marked as
    // "interactive"). The request/response interaction terminates as soon as the
    // modification is accepted or rejected. The modifications are reflected in
    // subsequent AMTI_Activity messages.
    AMTI_ActivityCommandType activity = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.003.002
message AMTI_CapabilityCommandType {
  // composed xsd extension base SharedRF_ApertureCapabilityCommandBaseType
  SharedRF_ApertureCapabilityCommandBaseType base = 1;
  // Indicates a specific AMTI SubCapability being invoked by the command. If
  // omitted, all SubCapabilities of the sibling CapabilityID are to be invoked.
  // If specified, only those SubCapabilities specified are required in order to
  // satisfy the command. See enumeration annotations for further details. List
  // size for this element is based on "Select All That Apply" condition.
  repeated AMTI_SubCapabilityEnum sub_capability = 2;
  // Changes Activities that this Activity is dependent on. If the dependent
  // Activity's Resource Allocation is removed or never allocated, this
  // Activity's Resource Allocation will be removed or not fulfilled. This is
  // used to tie Activities within or across subsystems.
  optional DependentActivityType dependent_activity = 3;
  // Indicates the unique ID of a Shared Antenna and/or AntennaResources to be
  // used for the resulting Activity. This allows direction of a specific
  // antenna, antenna resource type, or antenna resource instance to be used by
  // the resulting Activity.
  repeated ResourceSelectionType resource_selection = 4;
  // Indicates the Multistatic Mode settings and associated data to be used for
  // the command.
  optional MultistaticModeType multistatic_mode = 5;
  // Indicates the volume or specific Entity that defines the extents of the
  // spatial region covered by the command. For VOLUME AMTI Capabilities, the
  // entity is not an option. For CUED AMTI Capabilities, two instances of this
  // element are allowed to support an air volume that defines the extents of
  // the cue volume around the Entity. For CUED AMTI Capabilities, a single
  // instance is allowed if it is an Entity in which case the Entity location
  // uncertainty defines the extents of the cue volume or a sensor volume with a
  // cue velocity. For TRACK AMTI Capabilities it is expected that the Entity is
  // the only valid selection.
  repeated AirTargetVolumeCommandType target_volume = 6;
  // Indicates an air volume that should be "blanked"; the Capability should not
  // generate outputs associated with the volume because it is a known source of
  // clutter or other interference for the Capability. For example, a blanking
  // volume could be created around a wind farm that interferes with AMTI.
  repeated AirTargetVolumeType blanking_volume = 7;
  // Indicates the frequency to be used for the Command. If omitted, frequency
  // selection is left to the command recipient within constraints of
  // RF_Profiles imposed by RF_ControlCommand, MDF, etc.
  optional CapabilityCommandFrequencyType frequency = 8;
  // Indicates guidance regarding which aspect or aspects of collection to favor
  // if the command cannot be optimally scheduled as requested. See enumerated
  // type annotations for further details. Omitting this element is equivalent
  // to FLEXIBLE, that is deferring to the Command recipient.
  optional RadarCollectionOptionsType collection_options = 9;
  // Indicates a set of bounding requirements for the particular collection
  // associated with this command. The subsystem should attempt to satisfy all
  // specified constraints.
  optional AMTI_CollectionConstraintsType collection_constraints = 10;
  // Indicates the range within which a track should be initiated and a
  // corresponding Entity message reported for detected moving targets. Beyond
  // this range tracks should not be initiated and Entity should not be reported
  // for detected moving targets. This element can be used to control track
  // loading for large and/or dense search volumes. If omitted tracking range
  // selection is left to discretion of the command recipient.
  // xsd type: DistanceType
  optional double tracking_range = 11;
  // Indicates the required repetition of the command. If omitted, the command
  // should be performed once.
  optional RepetitionType repetition = 12;
  // Indicates a required output Product of the Command. Only Products
  // consistent with AMTI and supported by the commanded AMTI Capability should
  // be requested. If omitted, no output Product should be produced. See
  // ProductTypeEnum for further details.
  repeated ProductOutputCommandBasicType product_output = 13;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.001.000
message SharedRF_ApertureCapabilityCommandBaseType {
  // composed xsd extension base CapabilityCommandBaseType
  CapabilityCommandBaseType base = 1;
  // Set of Performance Constraints a capability must adhere to. Each set should
  // be treated as an option. Meaning at least provide the minimum performance,
  // but try to execute the best performance within the constraints.
  repeated PerformanceMetricSetType performance_constraint = 2;
}

// The base type for all [Capability]Command messages.
// uci_version: 002.000.001.000
message CapabilityCommandBaseType {
  // composed xsd extension base CommandBaseType
  CommandBaseType base = 1;
  // Indicates the Capability instance being commanded.
  CapabilityID_Type capability_id = 2;
  // Indicates the command's rank relative to other commands and rank-related
  // overrides and tailoring.
  CapabilityCommandRankingType ranking = 3;
  // Indicates temporal constraints for the command. If omitted, the command
  // should be scheduled immediately while satisfying other applicable
  // constraints.
  optional CapabilityCommandTemporalConstraintsType temporal_constraints = 4;
  // Indicates that the Command shall be performed even though it was previously
  // rejected.
  optional bool override_rejection = 5;
  // C2 sources work at different levels of detail and abstraction, progressing
  // from what to do to how specifically to do it. Inputs from abstract tasking
  // sources and Tasks can be decomposed into discrete, actionable Tasks and/or
  // Capability commands. This element provides traceability to the external
  // tasking or Task from which this Capability command was derived.
  optional TraceabilityType traceability = 6;
  // This element provides the classification label that the Subsystem should
  // place on messages and other data resulting from the Command.
  optional SecurityInformationType classification = 7;
}

// The base type for all *Command messages.
// uci_version: 001.000.001.000
message CommandBaseType {
  // Indicates the unique ID of the Command corresponding to this message. Used
  // to reference the command when providing status.
  CommandID_Type command_id = 1;
  // The state of the command message data. Indicates if a command message is a
  // NEW command, an UPDATE to an existing command, or a CANCEL of an existing
  // command.
  CommandStateEnum command_state = 2;
}

// Indicates whether an instance of a message is new, an update to an existing
// message/object or a request/command to remove the message/object from the
// network.
enum CommandStateEnum {
  COMMAND_STATE_ENUM_UNSPECIFIED = 0;
  COMMAND_STATE_ENUM_NEW = 1;
  COMMAND_STATE_ENUM_UPDATE = 2;
  COMMAND_STATE_ENUM_CANCEL = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.001.000.000
message CapabilityCommandRankingType {
  // Indicates the rank of the Command amongst other Commands and Tasks. For a
  // given "network" or family of Services, it is assumed that all creators of
  // Commands and Tasks will use Rank in a consistent and coordinated fashion.
  // Then, implementers can use Rank to determine the relative importance of all
  // their Command and Task inputs. Rank does not dictate temporal ordering; it
  // gives guidance on which Commands and Tasks to favor when resources are
  // limited.
  ComparableRankingType rank = 1;
  // Indicates whether (TRUE) or not (FALSE) this command should interrupt other
  // scheduled (currently executing, inevitable or future) activities in order
  // to satisfy this command, regardless of consequences such as loss of the
  // interrupted activity's output products. This element is interpreted
  // depending on whether the command source is a primary or secondary
  // controller. Secondary controllers can only interrupt activities of lower
  // Rank; when this element is FALSE the command is "nice" in that it allows
  // activities of lower Rank to complete. Primary controllers interrupt
  // activities of any Rank from any controller when this element is TRUE and
  // defer to Rank when FALSE. Omission of this optional element is equivalent
  // to FALSE.
  optional bool interrupt_other_activities = 2;
  // Indicates a temporary override value for Capability precedence for the
  // Capability associated with the command. The temporary override applies for
  // this command instance only. Capability precedence is generally controlled
  // via the associated [Capability]SettingsCommand message. Only primary
  // controllers are allowed to change or override Capability precedence.
  optional uint32 capability_precedence_override = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message CapabilityCommandTemporalConstraintsType {
  // Indicates temporal scheduling of the Command is critical in order for the
  // Command's results to be useful. This element amplifies the sibling elements
  // by explicitly stating which *must* be met. If omitted, scheduling the
  // command to satisfy the sibling elements isn't critical; the sibling element
  // can be used as guidance if given but the command should still be scheduled
  // even if they aren't all satisfied.
  optional SchedulingCriticalityEnum temporal_criticality = 1;
  // Indicates the start time window for the command, including repetition. The
  // beginning of the range represents a start-no-earlier-than time. The end of
  // the range represents a start-no-later-than time. If omitted, the command
  // should be scheduled for immediate start within other scheduling constraints.
  optional DateTimeRangeType start_time_window = 2;
  // Indicates whether the sibling StartTimeWindow applies to only the first
  // command of a repeating series (TRUE) or all (first and all subsequent)
  // commands in a repeating series (FALSE). Optional for non-repeating
  // commands. Equivalent to TRUE when omitted for repeating commands.
  optional bool window_on_first_only = 3;
  // Indicates the end time window for the command, including repetition. The
  // beginning of the range represents an end-no-earlier-than time. The end of
  // the range represents an end-no-later-than time. If omitted, end time is
  // left to the discretion of the command recipient.
  optional DateTimeRangeType end_time_window = 4;
}

// This type describes scheduling criticality from a temporal perspective.
enum SchedulingCriticalityEnum {
  SCHEDULING_CRITICALITY_ENUM_UNSPECIFIED = 0;
  SCHEDULING_CRITICALITY_ENUM_START_TIME_CRITICAL = 1;
  SCHEDULING_CRITICALITY_ENUM_END_TIME_CRITICAL = 2;
  SCHEDULING_CRITICALITY_ENUM_START_AND_END_TIME_CRITICAL = 3;
}

// Specifies the antenna resource to which the sibling ResourceAccessPriority
// applies. When the Shared Antenna/Resources are not specified, the RF_Mode
// must be present to control whether the sibling ResourceAccessPriority
// applies to transmit or receive beams of the resulting EA_Activity.
// ResourceSelection may only be omitted when a single instance of
// "PrioritizeResources" is present in the EA_Command, in which case, the
// ResourceAccessPriority applies to any and all beams (whether transmit or
// receive) associated with the EA_Command.
// uci_version: 002.000.002.000
message ResourceSelectionType {
  // Controls whether SelectAntenna applies to transmit or receive beams of the
  // resulting EA_Activity.
  optional RF_TypeEnum rf_mode = 1;
  // Indicates the unique ID of a Shared Antenna and/or AntennaResources to be
  // used for the EA activity.
  optional SelectAntennaType select_antenna = 2;
}

// Indicates the Multistatic Mode settings and associated data to be used for
// the command.
// uci_version: 000.000.000.000
message MultistaticModeType {
  // Indicates when to operate in bistatic or multistatic radar mode (ENABLE)
  // and when not to (DISABLE).
  MultistaticModeActivationEnum multistatic_mode_activation = 1;
  // Indicates the unique ID of the emitter data corresponding to this message.
  optional MultistaticEmitterDataID_Type multistatic_emitter_data_id = 2;
}

// Indicates whether the specific Multistatic Mode option advertised by the
// capability has been commanded to be enabled or disabled. See enumerated
// values for more details.
enum MultistaticModeActivationEnum {
  MULTISTATIC_MODE_ACTIVATION_ENUM_UNSPECIFIED = 0;
  MULTISTATIC_MODE_ACTIVATION_ENUM_ENABLE = 1;
  MULTISTATIC_MODE_ACTIVATION_ENUM_DISABLE = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message CapabilityCommandFrequencyType {
  // Indicates an additional RF_Profile which further constrains the allowed
  // frequencies to be used for the Command. The allowed frequencies for the
  // Command are the intersection of the allowed frequencies in this RF_Profile,
  // RF_Profiles imposed by RF_ControlCommand on the associated Capability, MDF
  // settings, threat avoidance, etc. If the sibling RF_ControlOverride is set
  // to TRUE, this command is only constrained by the RF_Profiles listed here.
  repeated RF_ProfileID_Type rf_profile_id = 1;
  // Indicates an override of all RF_ControlCommand and/or RF_Profile
  // constraints for the Command and the associated Capability. The Capability
  // is free to use its full frequency spectrum with no limitations. This
  // element is only accepted from a Primary Controller (as defined in the
  // ControlRequest message). In the event it is sent by another controller, the
  // command is rejected. If an RF Profile is specified and this value is TRUE,
  // the command overrides RF_Profiles specified by the RF_ControlCommand and
  // only uses those RF_Profiles listed in this command.
  bool rf_control_override = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message RadarCollectionOptionsType {
  // Indicates guidance regarding which aspect or aspects of collection to favor
  // if the command cannot be optimally scheduled as requested. See enumerated
  // type annotations for further details. Omitting this element is equivalent
  // to FLEXIBLE, that is deferring to the Command recipient.
  optional CollectionPolicyEnum collection_policy = 1;
  // Indicates a desire to force an array taper on receive. Omission of this
  // field allows the capability to automatically choose its Spoil/Taper.
  optional RadarSpoilTaperType force_rx_spoil_taper = 2;
  // Indicates a desire to force an array taper for transmit of the command.
  // Omission of this field allows the capability to automatically choose its
  // Spoil/Taper.
  optional RadarSpoilTaperType force_tx_spoil_taper = 3;
  // Indicates that the requestor is willing to accept any degradations
  // associated with running other capabilities concurrently for this command.
  optional bool concurrent_operation_accepted = 4;
  // Indicates the list of externally controllable EP options that should be
  // applied to this command instead of the EP options currently enabled for
  // this Capability. If this list is a subset of the EP options that are
  // available for this capability, then no other EP options should be employed
  // for this command.
  repeated ElectronicProtectionOptionsEnableType electronic_protection_options_override = 5;
}

// This type enumerates policies regarding which collection aspects should be
// favored for a collection Capability.
enum CollectionPolicyEnum {
  COLLECTION_POLICY_ENUM_UNSPECIFIED = 0;
  COLLECTION_POLICY_ENUM_COVERAGE = 1;
  COLLECTION_POLICY_ENUM_PERFORMANCE = 2;
  COLLECTION_POLICY_ENUM_COVERAGE_AND_PERFORMANCE = 3;
  COLLECTION_POLICY_ENUM_FLEXIBLE = 4;
}

// Beam spoiling or taper to be applied to transmit or receive beam.
// uci_version: 001.000.000.000
message RadarSpoilTaperType {
  oneof choice {
    // Specific taper to be applied to this command. Note that capability does not
    // necessarily implement every combination of taper that can be commanded. If
    // this value is chosen, collection performance may degrade.
    RadarTaperType taper = 1;
    // Beam spoiling to be applied. This value is the ratio of the spoiled beam
    // width to the unspoiled beam width. If this value is chosen, collection
    // performance may degrade.
    RadarSpoilType spoil = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.001.000.000
message RadarTaperType {
  // Weighting function of the taper to be applied.
  RadarTaperWeightingFunctionType weighting_function = 1;
  // Sidelobe level distance from main lobe (in dB). Note that the capability
  // does not necessarily implement all values of this field. It is likely that
  // only discrete sidelobe levels can be achieved. This field is omitted if the
  // WeightingFunction type selected is UNIFORM or if the sidelobe level of the
  // tape is to be determined by the capability.
  // xsd type: DecibelNonNegativeType
  optional double sidelobe_level = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message RadarTaperWeightingFunctionType {
  oneof choice {
    // Beam taper to be used during collection. If this value is chosen,
    // collection performance may degrade.
    RadarWeightingFunctionsEnum standard_weighting_function = 1;
    // Additional taper weighting functions may be commanded through the use of a
    // foreign key type.
    ForeignKeyType other_taper = 2;
  }
}

// Indicates the type of weighting function used. Weighting functions, also
// known as windows, are applied to radar data to reduce spectral leakage
// associated with finite observation intervals.
enum RadarWeightingFunctionsEnum {
  RADAR_WEIGHTING_FUNCTIONS_ENUM_UNSPECIFIED = 0;
  RADAR_WEIGHTING_FUNCTIONS_ENUM_UNIFORM = 1;
  RADAR_WEIGHTING_FUNCTIONS_ENUM_TAYLOR = 2;
  RADAR_WEIGHTING_FUNCTIONS_ENUM_CHEBYSHEV = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message RadarSpoilType {
  // Beam spoil type to be used during collection.
  RadarSpoilTypeEnum spoil_type = 1;
  // Beam spoil factor to be used during collection. If this value is chosen,
  // collection performance may degrade.
  // xsd type: SpoilFactorType
  float spoil_factor = 2;
}

// Indicates the beam spoil type to be used during collection. Beam spoiling
// is typically used to produce a narrow beam in one dimension, and a
// relatively wide beam in the other. This increases the scan rate but
// decreases the ability to resolve a target location.
enum RadarSpoilTypeEnum {
  RADAR_SPOIL_TYPE_ENUM_UNSPECIFIED = 0;
  RADAR_SPOIL_TYPE_ENUM_AZIMUTH = 1;
  RADAR_SPOIL_TYPE_ENUM_ELEVATION = 2;
  RADAR_SPOIL_TYPE_ENUM_AZIMUTH_AND_ELEVATION = 3;
}


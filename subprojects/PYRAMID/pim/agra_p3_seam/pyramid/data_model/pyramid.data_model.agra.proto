// See the annotation in the associated message for an overall description of
// the message and this type.
// uci_version: 000.000.000.000
message MA_OpLineMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // Indicates the state of the internal software object that the data in the
  // message is based upon. The state of the software object is determined by
  // the publisher. The publisher could be the original/master publisher or an
  // intermediary re-publisher such as a persistence/data manager. This element
  // is not a commanded CRUD operation. It is not an indication of the state of
  // an instance of a message. It is not a mechanism for partial, incremental,
  // or fragmentary publication of a message. It is a signal from a publisher to
  // subscribers. For REMOVED state, in particular, some subscribers will mirror
  // the publisher and treat the message as if the object no longer exists, but
  // others, such as mission recorders, might not (in order to support retaining
  // historical records of activity, for example).
  optional ObjectStateEnum object_state = 2;
  // See annotations in child elements and messages/elements that use this type
  // for details.
  MA_OpLineMDT message_data = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_OpLineMDT {
  // composed xsd extension base MA_OpBaseType
  MA_OpBaseType base = 1;
  // Indicates the unique ID of the OpLine.
  OpLineID_Type op_line_id = 2;
  // This element indicates the type of operational line.
  MA_OpLineCategoryEnum category = 3;
  // Indicates the geometric description of the OpLine. In practice, operational
  // lines can be geometric lines, areas or in some cases volumes.
  OpLineType line = 4;
}

// The base type containing information common to messages OpLine, OpPoint,
// and OpZone.
// uci_version: 000.000.000.000
message MA_OpBaseType {
  // A human-readable descriptive name with free text remarks.
  optional OpDescriptionType op_description = 1;
  // Allows the creator of this operational item to specify what the source or
  // motivation for it originated from. This could be ATO, ACO, etc.
  optional MissionTraceabilityType mission_traceability = 2;
  // Indicates the source of the information.
  optional CreationSourceEnum source = 3;
  // This element represents a date/time interval associated with the
  // operational item during which the item is in effect.
  optional ScheduleType schedule = 4;
  // Indicates time related events that are associated to the Op data type such
  // as when activated or when operational. The multiplicity is limited to N-1
  // options where NONE is an event that has no value, thus removed from list of
  // available options.
  repeated TimeFunctionType associated_time = 5;
  // List of data link ID. Multiple data link IDs can be reported for the same
  // network type.
  repeated DataLinkIdentifierPET data_link_identifier = 6;
  // This field represents the priority to be considered when choosing between
  // multiple available points.
  optional uint32 priority = 7;
  // Provides identity qualifications to augment identification and associated
  // processing of the OpPoint.
  optional QualifyingTagsType qualifying_tags = 8;
  // One or more systems to which this item applies. If omitted, item applies to
  // all systems.
  repeated MA_PackageSystemType applies_to_i_ds = 9;
  // System-specific schedule that will override any part of the main schedule.
  // This allows for system-specific schedule different than main schedule. When
  // adding a SystemScheduleOverride, the child SystemID also must be added to
  // the sibling SystemID list if the sibling list is not empty. The
  // SystemScheduleOverride is independent of time planning. For the system,
  // this override can be done at execution.
  repeated SystemScheduleStateType system_schedule_override = 10;
}


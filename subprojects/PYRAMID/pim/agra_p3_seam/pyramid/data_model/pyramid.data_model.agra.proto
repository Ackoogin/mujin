// uci_version: 002.000.003.000
message ESM_CapabilityStatusMDT {
  // composed xsd extension base CapabilityStatusBaseType
  CapabilityStatusBaseType base = 1;
  // Indicates the high level availability/state of a Capability instance.
  repeated CapabilityStatusType capability_status = 2;
  // Indicates a RF Emission Profile currently applied to the Capability. If
  // omitted, there are no current profiles and the Capability is operating per
  // its defaults and other constraints.
  repeated RF_ProfileType rf_profile = 3;
  // Indicates the order in which identity ambiguity is being reported in the
  // Capability's output messages. See enumerate annotations for further details.
  optional AmbiguityOrderingEnum ambiguity_ordering = 4;
  // Indicates the current enable (true) or disable (false) state of the audio
  // tone produced by the ESM/RWR system.
  optional bool rwr_audio_enable = 5;
  // Indicates whether (TRUE) or not (FALSE) the SpectralDensityReport message
  // is currently enabled.
  optional bool spectral_density_reporting = 6;
  // Specifies which messages are currently being output by the Capability. See
  // enumerated type annotations for details. List size for this element is
  // based on "Select All That Apply" condition.
  repeated ESM_MessageOutputsEnum current_message_output = 7;
}

// See annotations in child elements and messages/elements that use this type

  ENVIRONMENT_PAIRING_ENUM_ANY_TO_SEA_SUBSURFACE = 40;
  ENVIRONMENT_PAIRING_ENUM_ANY_TO_SPACE = 41;
  ENVIRONMENT_PAIRING_ENUM_ANY_TO_CYBER = 42;
  ENVIRONMENT_PAIRING_ENUM_AIR_TO_ANY = 43;
  ENVIRONMENT_PAIRING_ENUM_GROUND_TO_ANY = 44;
  ENVIRONMENT_PAIRING_ENUM_SEA_SURFACE_TO_ANY = 45;
  ENVIRONMENT_PAIRING_ENUM_SEA_SUBSURFACE_TO_ANY = 46;
  ENVIRONMENT_PAIRING_ENUM_SPACE_TO_ANY = 47;
  ENVIRONMENT_PAIRING_ENUM_CYBER_TO_ANY = 48;
}


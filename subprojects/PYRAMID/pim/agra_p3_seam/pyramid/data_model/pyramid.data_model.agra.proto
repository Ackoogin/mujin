  optional LocatedEllipseType look_at_coords = 3;
  // The minimum NIIRS value required. See annotations of the underlying type
  // for further details.
  // xsd type: NIIRS_Type (pattern [0-9]\.[0-9])
  optional string minimum_niirs = 4;

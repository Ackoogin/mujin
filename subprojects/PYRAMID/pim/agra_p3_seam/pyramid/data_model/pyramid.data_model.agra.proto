// Bounding allowable angular deviations from true vertical for the altimetry
// measurement.
// uci_version: 000.000.000.000
message RadarAltimeterAngleConstraintsType {
  // Contains the maximum limiting bound in the angle between the intended
  // direction of peak directivity of the transmission beam and local level
  // vertical along the z-x body plane (the x-axis is positive out the nose of
  // the aircraft in the plane of symmetry of the aircraft, and the z-axis is
  // perpendicular to the x-axis in the plane of symmetry of the aircraft and
  // positive below the aircraft) measured in radians. Positive ZX Angular
  // Offset is rotation from the positive z-axis towards the positive x-axis.
  // xsd type: AngleHalfType
  double zx_angular_offset_max = 1;
  // Contains the maximum limiting bound in the angle between the intended
  // direction of peak directivity of the transmission beam and local level
  // vertical along the y-z body plane (the y-axis is perpendicular to the x-z
  // body plane and positive out the right, or starboard, wing) measured in
  // radians. Positive YZ Angular Offset is rotation from the positive z-axis
  // towards the negative y-axis.

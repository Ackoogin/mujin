// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message AO_ComponentType {
  // Indicates the unique ID of the AO Component.
  ComponentID_Type component_id = 1;
  // Indicates minimum power in Watts.
  // xsd type: PowerType
  double minimum_power = 2;
  // Indicates the maximum power in Watts.
  // xsd type: PowerType
  double maximum_power = 3;
  // Indicates the minimum wavelength of light produced by the active optical
  // component.
  // xsd type: DistanceType
  double minimum_wavelength = 4;
  // Indicates the maximum wavelength of light produced by the active optical
  // component.
  // xsd type: DistanceType
  double maximum_wavelength = 5;
  // Indicates a PRF and/or PIM code supported by the AO component.
  repeated AO_CodeType supported_code = 6;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message AO_CodeType {
  // Joint Pub 3-09.1 indicates the following regarding PRF Code values:
  // "...Depending on the laser equipment, either a three or four-digit code can
  // be set. Three digit code equipment settings range from 111 to 788.
  // Four-digit code equipment settings range from 1111 to 1788.".
  // xsd type: AO_PRF_CodeType (pattern 1?[1-7][1-8]{2})
  optional string prf_code = 1;
  // 4 digit PIM (Pulse Internal Modulation) Code.
  // xsd type: AO_PIM_CodeType (pattern [0-9]{4})
  optional string pim_code = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.001.003.000
message AO_CapabilityStatusMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // See annotations in child elements and messages/elements that use this type
  // for details.
  AO_CapabilityStatusMDT message_data = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.002.000
message AO_CapabilityStatusMDT {
  // composed xsd extension base CapabilityStatusBaseType
  CapabilityStatusBaseType base = 1;
  // Indicates the high level availability/state of a Capability instance.
  repeated CapabilityStatusType capability_status = 2;
  // Indicates the current settings for an AO component.
  repeated AO_ComponentSettingsType component_setting = 3;
  // Specifies which messages are currently being output by the Capability. See
  // enumerated type annotations for details. List size for this element is
  // based on "Select All That Apply" condition.
  repeated AO_MessageOutputsEnum current_message_output = 4;
  // Indicates the current default NITF packing plan for the Capability. An
  // AO_SettingsCommand can be used to change the current plan being used by the
  // Capability to a commanded plan.
  optional NITF_PackingPlanPET default_packing_plan = 5;
  // Indicates the current default JPEG settings for the Capability.
  optional JPEG_SettingsType default_jpeg_settings = 6;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message AO_ComponentSettingsType {
  // Indicates the unique ID of the AO Component.
  ComponentID_Type component_id = 1;
  // The current/commanded power of the AO emission that is to be output in
  // Watts.
  // xsd type: PowerType
  double power = 2;
  // Indicates the current/commanded code for the component.
  optional AO_CodeType ao_code = 3;
}

// The base Polymorphic Extension Type (PET) used by NITF packing plan types.
// uci_version: 000.000.000.000
message NITF_PackingPlanPET {
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message JPEG_SettingsType {
  // Defined as the number of bytes in the input image divided by the number of
  // bytes in the output image.
  optional float compression_ratio = 1;
  // Set the output image quality, measured by peak signal to noise ratio (pSNR).
  optional float peak_snr = 2;
  // The target slope on the rate-distortion curve.
  optional float rate_distortion_slope = 3;
  // This element defines the settings to use for wavelet transform.
  optional JPEG_WaveletTransformType wavelet_transform = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message JPEG_WaveletTransformType {
  // This element defines the type of wavelet transform to use, which may be the
  // irreversible wavelet transform for lossy compression, or the reversible
  // wavelet transform for lossless or lossy compression.
  JPEG_WaveletTypeEnum type = 1;
  // This element defines the number of decomposition levels to perform in the
  // wavelet transforms. The number of decomposition levels in the wavelet
  // transform determines the number of resolution levels that will be available
  // in the resulting image.
  uint32 level = 2;
}

// Indicates whether the wavelet compression used is reversible.
enum JPEG_WaveletTypeEnum {
  JPEG_WAVELET_TYPE_ENUM_UNSPECIFIED = 0;
  JPEG_WAVELET_TYPE_ENUM_REVERSIBLE = 1;
  JPEG_WAVELET_TYPE_ENUM_IRREVERSIBLE = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.003.000
message AO_CommandMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // See annotations in child elements and messages/elements that use this type
  // for details.
  AO_CommandMDT message_data = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message AO_CommandMDT {
  // Indicates an instance of an AO Capability command. A Capability command
  // message can have multiple command instances to allow a sequence of related
  // commands in a single coherent message. Each command instance reports status
  // via a separate, independent Capability CommandStatus message.
  repeated AO_CommandType command = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message AO_CommandType {
  oneof choice {
    // Indicates a new invocation of an AO Capability. Generally, if accepted, the
    // command will result in one or more new AO Activities being created and
    // reported via the AO_Activity message. The request/response interaction
    // terminates as soon as the command is accepted or rejected; this element is
    // not used to interact with an "active" command. Updates and/or additional
    // interaction with the resulting Activity (after the command is accepted) is
    // accomplished via the sibling Activity element.
    AO_CapabilityCommandType capability = 1;
    // Indicates a command to modify an existing AO Activity (which was previously
    // reported via the AO_Activity message and was marked as "interactive"). The
    // request/response interaction terminates as soon as the modification is
    // accepted or rejected. The modifications are reflected in subsequent
    // AO_Activity messages.
    AO_ActivityCommandType activity = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message AO_CapabilityCommandType {
  // composed xsd extension base CapabilityCommandBaseType
  CapabilityCommandBaseType base = 1;
  // Indicates the source of or explicit values for geospatial characteristics
  // of the target of the OpticalCommand.
  TargetType target = 2;
  // Describes the component settings for the various AO sensors.
  optional AO_ComponentSettingsType component_settings = 3;
  // This is an optional field. Describes the various emission constraints for
  // the Optical sensor components.
  optional OpticalCollectionConstraintsType emission_constraints = 4;
  // Indicates the required repetition of the command. If omitted, the command
  // should be performed once.
  optional RepetitionType repetition = 5;
}

// Indicates or references geospatial characteristics of a target.
// uci_version: 002.000.002.001
message TargetType {
  oneof choice {
    // Indicates the target is an Entity.
    EntityID_Type entity_id = 1;
    // Indicates the target is a System.
    SystemID_Type system_id = 2;
    // Indicates the target is an OperatorLocationOfInterest and provides its ID.
    OperatorLocationOfInterestID_Type operator_location_of_interest_id = 3;
    // Indicates the target is a Signal.
    SignalID_Type signal_id = 4;
    // Indicates the target is an OpPoint.
    OpPointID_Type op_point_id = 5;
    // Indicates the target is an OpZone.
    OpZoneID_Type op_zone_id = 6;
    // Indicates the target is an OpVolume.
    OpVolumeID_Type op_volume_id = 7;
    // Indicates the target is an OpLine.
    OpLineID_Type op_line_id = 8;
    // Indicates the target is a geospatial point.
    PointTargetType point_target = 9;
    // Indicates the target is a geospatial zone.
    ZoneExternalType zone_target = 10;
    // Indicates the target is a geospatial volume.
    OpVolumeType volume_target = 11;
    // Indicates the target is a geospatial line.
    LineTargetType line_target = 12;
  }
}


// uci_version: 000.000.000.000
message IFF_CommandType {
  oneof choice {
    // Indicates a new invocation of an IFF Capability. Generally, if accepted,
    // the command will result in one or more new IFF_Activities being created and
    // reported via the IFF_Activity message. The request/response interaction
    // terminates as soon as the command is accepted or rejected; this element is
    // not used to interact with an "active" command. Updates and/or additional
    // interaction with the resulting Activity (after the command is accepted) is
    // accomplished via the sibling Activity element.
    IFF_CapabilityCommandType capability = 1;
    // Indicates a command to modify an existing IFF Activity (which was
    // previously reported via the IFF_Activity message and was marked as
    // "interactive"). The request/response interaction terminates as soon as the
    // modification is accepted or rejected. The modifications are reflected in
    // subsequent IFF_Activity messages.
    IFF_ActivityCommandType activity = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message IFF_CapabilityCommandType {
  // composed xsd extension base CapabilityCommandBaseType
  CapabilityCommandBaseType base = 1;
  // This provides the modes of operation IFF should be using for this specific
  // command in conjunction with the sibling elements.
  IFF_InterrogatorTransponderModesType sub_capability_details = 2;
  // Indicates the unique ID of a Shared Antenna and/or AntennaResources to be
  // used for the resulting Activity. This allows direction of a specific
  // antenna, antenna resource type, or antenna resource instance to be used by
  // the resulting Activity.
  repeated ResourceSelectionType resource_selection = 3;
  // Indicates the volume or specific Entity that defines the extents of the
  // spatial region covered by the command. For non-CUED Capabilities, one air
  // volume instance of this element is expected. For CUED Capabilities, two
  // instances of this element are allowed: one with an Entity specified and a
  // second with an air volume that define the extents of the cue volume around
  // the Entity. For AMTI Capabilities, a single instance is allowed if it is an
  // Entity in which case the Entity location uncertainty defines the extents of
  // the cue volume.
  repeated AirTargetVolumeCommandType target_volume = 4;
  // Indicates an air volume that should be "blanked"; the Capability should not
  // generate outputs associated with the volume because it is a known source of
  // clutter or other interference for the Capability. For example, a blanking
  // volume could be created around a wind farm that interferes with IFF
  repeated AirTargetVolumeType blanking_volume = 5;
  // Indicates guidance regarding which aspect(s) of collection to favor if the
  // command cannot be optimally scheduled as requested. See enumerated type
  // annotations for further details. Omitting this element is equivalent to
  // FLEXIBLE, that is deferring to the Command recipient.
  optional RadarCollectionOptionsType collection_options = 6;
  // Indicates a set of bounding requirements for the particular collection
  // associated with this command. The subsystem should attempt to satisfy all
  // specified constraints.
  optional IFF_CollectionConstraintsType collection_constraints = 7;
  // Indicates the required repetition of the command. If omitted, the command
  // should be performed once.
  optional RepetitionType repetition = 8;
  // Indicates a required output Product of the Command. Only Products
  // consistent with IFF and supported by the commanded IFF Capability should be
  // requested. If omitted, no output Product should be produced. See
  // ProductTypeEnum for further details.
  repeated ProductOutputCommandBasicType product_output = 9;
}


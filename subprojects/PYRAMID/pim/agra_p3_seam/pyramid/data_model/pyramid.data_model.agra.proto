  // xsd type: DurationType
  string time_up = 2;
  // Indicates the current state of the Service. The state machine and allowable
  // transitions for Service states is described in supporting documentation. A
  // given Service might not support all states. Service state may be controlled
  // via ServiceLifecycleCommand. See enumeration annotations for further

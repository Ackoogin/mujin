// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message RequirementAllocationBaseType {
  // Indicates whether the Requirement's allocation can be modified/removed in
  // subsequent planning steps and/or replans.
  optional bool locked = 1;
  // Indicates refined/overridden values of constraints for the Requirement.
  // Constraints can be refined/overridden in inputs (*PlanCommand) and/or
  // outputs (*Plan) of planning processes. Values given in this element
  // refine/override those in the associated [Requirement] message. Reasons for
  // constraint overrides include refinement based on the allocated System,
  // multi-Requirement coordination, etc. Requirement constraints can be 1)
  // given in a [Requirement] message, 2) overridden as a planning input in a
  // [Requirement]PlanCommand message, 3) further refined/overridden during plan
  // creation and reported in a [Requirement]Plan message to inform subsequent
  // planning or execution.
  optional RequirementConstraintsType constraint_override = 2;
  // Indicates special/override values for miscellaneous [Requirement] message
  // elements not included in the sibling ConstraintOverride element.
  optional RequirementAllocationDetailsType other_override = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.002.003.001
message RequirementConstraintsType {
  // Indicates a constraint in the form of the Rank of the associated
  // Requirement (Effect, Action, Task, [Capability]Command or Response).
  optional ComparableRankingType rank = 1;
  // Indicates whether a) an in-work/planned item or items of a lower rank
  // should be interrupted/replanned in order to address this item (TRUE) or b)
  // this item should be simply queued/planned according to rank without
  // interrupting in-work/planned items (FALSE). For example, a Task being added
  // to an existing TaskPlan (TaskPlanCommand constrained by an existing
  // TaskPlan) would potentially cause unlocked Tasks of lower rank in the
  // existing TaskPlan to be unallocated if 1) this element indicated TRUE and
  // 2) the lower ranked Tasks prevented the higher ranked Task from being
  // allocated.
  optional bool interrupt_lower_rank = 2;
  // Indicates allocation related constraints which can vary by Requirement at
  // the discretion of the creator.
  optional RequirementAllocationParametersType allocation = 3;
  // Indicates a temporal constraint on the Requirement. Allows for defining for
  // each timing type (RequirementTimingEnum).
  repeated RequirementTimingType timing = 4;
  // Indicates a constraint in the form of kinematic position of Requirement
  // actor or actors. When more than one is given they are logically ANDed.
  repeated RequirementKinematicConstraintsType kinematic = 5;
  // Indicates a constraint in the form of a temporal dependency between
  // Requirements; between Effect, Action, Task, [Capability]Command or Commands
  // or Response. If more than one is given, they are logically ANDed. For
  // example, a pre-strike image collection (PO Task) might be required several
  // minutes prior to a strike (Strike Task) to determine combat ID and target
  // coordinates. A post-strike image collection (PO Task) might be required
  // several minutes after the strike to inform battle damage assessment. The
  // dependency between the three Tasks can be established with this element.
  // Assuming the Strike Task is the most difficult to plan/coordinate, the
  // other two Tasks would likely each have dependencies on the Strike Task in
  // order to orchestrate the desired "look-shoot-look" sequence.
  repeated RequirementDependencyType dependency = 6;
  // Indicates the maximum allowed classification level of the networks that the
  // allocated system can disseminate products to for this task. The allocated
  // system must have a dissemination route for data at this classification or
  // lower. For example, when trying to collect data to hand-off to an
  // unclassified system or network, the allocated system has to be able to
  // generate products at no higher than the specified level and have the
  // authority to disseminate on a network at no higher than the specified
  // classification level.
  optional DataProductClassificationLevelType max_product_dissemination_classification_level = 7;
  // Indicates a constraint in the form of an analytic measure that the
  // Requirement must satisfy when planned/executed.
  optional AnalyticConstraintsType analytic = 8;
  // Indicates a constraint on the highest acceptable classification level at
  // which the Response can be planned and executed.
  optional SecurityInformationType acceptable_classification_level = 9;
  // Indicates whether or not communications are required when executing the
  // Requirement. In this context, "required" means the creator or a Requirement
  // considers communications as necessary for C2 and/or Product dissemination
  // related to this Requirement, independent of the type of vehicle that it is
  // allocated to. This element may result in consideration of communications
  // allocations during Requirement allocation.
  optional bool comms_required = 10;
  // Indicates other types of Requirements that can be decomposed from, used to
  // plan, used to implement, inherited from traced parents or otherwise
  // associated with the subject Requirement.
  optional RequirementTaxonomyType allowed_requirement_types = 11;
  // Indicates other types of Requirements that cannot be decomposed from, used
  // to plan, used to implement, inherited from traced parents or otherwise be
  // associated with the subject Requirement.
  optional RequirementTaxonomyType excluded_requirement_types = 12;
  // Free-text explanation of sibling constraints, additional extraordinary
  // constraints, etc.
  // xsd type: VisibleString1024Type (pattern [ -~]{0,1024})
  optional string constraints_narrative = 13;
  // Indicates an allowed domain/environment which the Requirement can be
  // employed from and and allowed "target" domain/environment. See enumerated
  // type annotations for further details. List size for this element is based
  // on "Select All That Apply" condition.
  repeated EnvironmentPairingEnum allowed_domain_pairing = 14;
  // Indicates an excluded domain/environment which the Requirement can't be
  // employed from an excluded "target" domain/environment. See enumerated type
  // annotations for further details. List size for this element is based on
  // "Select All That Apply" condition.
  repeated EnvironmentPairingEnum excluded_domain_pairing = 15;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message RequirementAllocationParametersType {
  // Indicates the system and optionally Capability that the Requirement
  // (Effect, Action, Task, [Capability]Command, Response) MUST be allocated to
  // during the allocation process. The system can be an explicit UCI System or
  // implied UCI System (by Identity, hosted Capability, kinematics, etc.) in
  // which case the associated UCI System must be determined as part of the
  // allocation process. If multiple child elements are given: 1) allocation to
  // any one of the associated Systems is the minimum expectation, 2)
  // decomposition of the Requirement into multiple child Requirements allocated
  // across the associated Systems is acceptable, 3) there is no expectation
  // that each associated System must perform the Requirement. This element
  // allows the Requirement creator to force an allocation to a specific system
  // at the risk of 1) a less than optimal overall solution or 2) failure of the
  // Requirement being allocated despite availability of another suitable system.
  optional RequirementAllocationConstraintType required_allocation = 1;
  // Indicates the system and optionally Capability that the Requirement
  // (Effect, Action, Task, [Capability]Command, Response) should be allocated
  // to during the allocation process. The system can be an explicit UCI System
  // or implied UCI System (by Identity, hosted Capability, kinematics, etc.) in
  // which case the associated UCI System must be determined as part of the
  // allocation process. If multiple child elements are given: 1) allocation to
  // any one of the associated Systems is the minimum expectation, 2)
  // decomposition of the Requirement into multiple child Requirements allocated
  // across the associated Systems is acceptable, 3) there is no expectation
  // that each associated System must perform the Requirement. This element
  // allows the Requirement creator to suggest an allocation to a specific
  // system at the risk of 1) a less than optimal overall solution or 2) failure
  // of the Requirement being allocated despite availability of another suitable
  // system.
  optional RequirementAllocationConstraintType preferred_allocation = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message RequirementAllocationConstraintType {
  // Indicates the SystemID of the System that is the target of the allocation
  // constraint.
  repeated SystemID_Type system_id = 1;
  // Indicates a kind/type or instance of platform/system that is the target of
  // the allocation constraint. For example, this element could be used to
  // allocate a Requirement to any fighter aircraft platform, or a specific kind
  // of fighter aircraft, or a specific tail number of aircraft, or an aircraft
  // with an aircrew member with a certain voice call sign.
  repeated IdentityType identity = 2;
  // Indicates the CapabilityID of the Capability that is the target of the
  // allocation constraint. If multiple required Capabilities are given: 1)
  // allocation to any one of the Capabilities is the minimum expectation, 2)
  // decomposition of the Requirement into multiple child Requirements allocated
  // across the multiple required Capabilities is acceptable, 3) there is no
  // expectation that each Capability must perform the Requirement.
  repeated CapabilityID_Type capability_id = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.003.000
message RequirementKinematicConstraintsType {
  // Indicates which Requirement actor the sibling kinematic constraints are
  // applicable to.
  RequirementObjectEnum applicable_object = 1;
  // This element gives a geographical filter to the query.
  repeated GeoFiltersQueryType geo = 2;
  // This element gives an orbital filter to the query.
  repeated OrbitalFiltersQueryType orbital = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.001.000
message RequirementAllocationDetailsType {
  // Indicates a DMPI associated with the Requirement.
  repeated DMPI_AllocationType required_dmpi = 1;
  // Indicates the AO/laser PRF and/or PIM code to be used with the Requirement.
  // This element is applicable for laser designation or laser guided weapon
  // Requirements.
  optional AO_CodeType required_ao_code = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.001
message DMPI_AllocationType {
  // Indicates the ID of a DMPI associated with the Requirement. This element is
  // only applicable for kinetic weapon Requirements. This element allows
  // preliminary/estimated DMPIs to be associated with a Requirement and planned
  // prior to formal/final DMPIs and DMPI_Designations being created.
  DMPI_ID_Type dmpi_id = 1;
  // Indicates the relative ranking of DMPIs being associated to a Requirement.
  optional ComparableRankingType dmpi_ranking = 2;
  // Indicates a kinetic weapon Capability instance associated with the sibling
  // DMPI. Optional when any instance of Capability (of the Capability type
  // inferred by the Requirement) on the allocated System will suffice. Multiple
  // instances of this element can be used for Requirements with multiple
  // kinetic weapons assigned to a single DMPI.
  repeated CapabilityID_Type capability_id = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message ActionPlanInputsType {
  // composed xsd extension base PlanInputsCoreType
  PlanInputsCoreType base = 1;
  // Indicates specific Systems to consider and plan for along with
  // System-specific planning constraints. If omitted, all Tiers and all Systems
  // at and below those that the planning process is applicable to shall be
  // planned. A System is a planning "candidate" because its plan may or may not
  // change as a result of the command; zero to one Plans per *Plan type will
  // potentially be created for each candidate.
  repeated RequirementPlanningCandidateType planning_candidate = 2;
  // Indicates an existing ActionPlan of the System superior to the sibling
  // PlanningCandidates that provides a proposed "Action deck" to allocate
  // amongst the candidates. This element can be supplemented with additional
  // Actions from the sibling ProposedAction element.
  optional ActionPlanConstraintType proposed_action_plan = 3;
  // Indicates a proposed Action for the planning process. An Action given here
  // is added to any Actions provided in the sibling ProposedActionPlan to
  // create the full set of Actions to be considered by the planning process. An
  // Action given here overrides the same Action in the sibling
  // ProposedActionPlan. An empty list here, combined with no sibling
  // ProposedActionPlan is considered a command to deallocate previously
  // allocated Actions.
  repeated ActionAllocationType proposed_action = 4;
  // Indicates an association between Requirements that is a constraint on how
  // the Actions are allocated and planned.
  repeated RequirementAssociationConstraintType association_constraint = 5;
  // Indicates Parts required in the output ActionPlan. When populated, this
  // element must match or be a subset of the Parts associated with the planning
  // process (sibling PlanningProcessID) as advertised in
  // PlanningFunction*messages. This element is optional when all Parts of the
  // process are required.
  optional ActionPlanPartsType output_plan_parts = 6;
}

// Indicates input data used to create different types of *Plans.
// uci_version: 003.000.003.000
message PlanInputsCoreType {
  // Indicates the unique ID of the planning process invoked by the *PlanCommand.
  PlanningProcessID_Type planning_process_id = 1;
  // This element indicates whether the Plan was initiated autonomously from a
  // planning service, was operator initiated or edited, or was created
  // externally.
  PlanInitiationSourceEnum plan_initiation = 2;
  // Indicates the category of messages to use as the source for System
  // position, Capability, status, etc. data to use as the basis for the plan.
  PlanningDataSourceEnum planning_data_source = 3;
  // Indicates the reason for the replan. This element is used during live
  // operations and/or operation with autonomous planning, contingency
  // management, etc.
  optional ReplanReasonType replan_reason = 4;
  // Indicates a selective override of an item in the mission environment world
  // state to use/used in the Plan.
  repeated MissionEnvironmentConstraintType environment_override = 5;
  // Further constrain a Mission Plan to an operational constraint that
  // indicates how much the constraint should play a role in the planning
  // process. The multiplicity is based on the list of available
  // OpConstraintEnums.
  repeated OpConstraintWeightingType op_constraint = 6;
  // Free-text explanation of any extraordinary instructions at the plan level.
  optional FileLocationID_Type special_instructions_id = 7;
}

// Indicates the type of source that initiated and created a *Plan.
enum PlanInitiationSourceEnum {
  PLAN_INITIATION_SOURCE_ENUM_UNSPECIFIED = 0;
  PLAN_INITIATION_SOURCE_ENUM_PLANNER_SERVICE_AUTONOMOUS = 1;
  PLAN_INITIATION_SOURCE_ENUM_PLANNER_SERVICE_OPERATOR_INITIATED = 2;
  PLAN_INITIATION_SOURCE_ENUM_OPERATOR_CREATED = 3;
  PLAN_INITIATION_SOURCE_ENUM_OPERATOR_EDITED = 4;
  PLAN_INITIATION_SOURCE_ENUM_EXTERNAL = 5;
}

// Indicates category/type of source for data to use for planning.
enum PlanningDataSourceEnum {
  PLANNING_DATA_SOURCE_ENUM_UNSPECIFIED = 0;
  PLANNING_DATA_SOURCE_ENUM_LIVE = 1;
  PLANNING_DATA_SOURCE_ENUM_NON_LIVE = 2;
  PLANNING_DATA_SOURCE_ENUM_CONTEXT = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message ReplanReasonType {
  // Indicates the trigger that initiated the replan. Autonomous triggers are
  // enabled/disabled via the PlanningFunction* message.
  PlanningTriggerType trigger = 1;
  // Indicates autonomous planning action (referenced by UUID) that was
  // triggered by the sibling Trigger. The parameters of the autonomous planning
  // actions are defined in the PlanningFunction* message.
  optional AutonomousPlanningActionID_Type autonomous_planning_action_id = 2;
  // Indicates the unique ID of a MissionContingencyAlert associated with the
  // replan. The alert can provide additional context for the replan such as the
  // ID of a failed Task, a LAR that couldn't be met, etc.
  optional MissionContingencyAlertID_Type mission_contingency_alert_id = 3;
}

// The ID type for UCI IDs that correspond to autonomous actions.
// uci_version: 000.000.000.000
message AutonomousPlanningActionID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MissionContingencyAlertID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.001
message MissionEnvironmentConstraintType {
  oneof choice {
    // Constraint Override on an Entity.
    ConstrainedEntityType constrained_entity = 1;
    // Constraint Override on an OpPoint.
    ConstrainedOpPointType constrained_op_point = 2;
    // Constraint Override on an OpLine.
    ConstrainedOpLineType constrained_op_line = 3;
    // Constraint Override on an OpZone.
    ConstrainedOpZoneType constrained_op_zone = 4;
    // Constraint Override on an OpVolume.
    ConstrainedOpVolumeType constrained_op_volume = 5;
    // Constraint Override on a System.
    SystemStatusMDT system = 6;
    // Risk Override for this mission plan.
    RequirementRiskAdjustmentType risk_adjustment = 7;
    // Parameter Override for this mission plan. See associated
    // ServiceConfigurationParams message for appropriate values.
    ParameterAssertType parameter = 8;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message ConstrainedEntityType {
  // A surrogate allows a similar type that is known to the existing system to
  // take precedence over the reported or cross referenced ELNOT/DIEQP type. For
  // threat ambiguities, the surrogate information takes precedence over all of
  // the individual threat types.
  optional RadarEmitterIdentityType surrogate_identifier = 1;
  // This element defines a percentage that mission planning services should use
  // to decrease the effectiveness of a threat. A value of 100 percent means
  // that threat template data should be used for this threat exactly as defined
  // in configuration data. A value of 0 percent means that the threat should
  // not be considered at all. If this element is not populated then it is
  // assumed to be 100 percent.
  // xsd type: PercentType
  optional double mission_planning_weighting_factor = 2;
  // Consider this entity a valid entity for mission planning related services.
  // "false" indicates intentional ignore or lack of configuration parameters in
  // the system for this entity.
  optional bool mission_planning_candidate = 3;
  // This element indicates the unique identifier of the entity.
  EntityID_Type entity_id = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.003.001
message ConstrainedOpPointType {
  // This element indicates the type of operational point.
  OpPointCategoriesType category = 1;
  // This element contains any parameters specific to sibling Category. Not all
  // OpPoint Categories require unique parameters, only the ones that do are in
  // OpPointCategoriesUniqueDataType.
  optional OpPointCategoriesUniqueDataType category_unique_data = 2;
  // This element indicates the unique identifier of the operational point.
  OpPointID_Type op_point_id = 3;
}


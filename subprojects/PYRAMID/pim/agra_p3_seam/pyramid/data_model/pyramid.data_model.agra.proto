// This type shall be used to specify details for why FA cannot comply with a
// flight command.
// uci_version: 000.000.000.000
message MA_CannotComplyDetailsType {
  // In case of flight command rejection, provides the reason for Flight
  // Autonomy rejection. Further details can be provided by Flight Autonomy
  // through the ValidationResultReason. List size for this element is based on
  // "Select All That Apply" condition.
  repeated MA_ValidationResultEnum validation_result = 1;
  // In case of flight command rejection, provides additional context for Flight
  // Autonomy rejection.
  repeated MA_ValidationResultReasonType validation_result_reason = 2;
}

// Defines possible reasons for Flight Autonomy to reject a curve during the
// Pre-Check, Best Effort Simulation, and Post-Check phases.
enum MA_ValidationResultEnum {
  MA_VALIDATION_RESULT_ENUM_UNSPECIFIED = 0;
  MA_VALIDATION_RESULT_ENUM_INVALID_CURVE = 1;
  MA_VALIDATION_RESULT_ENUM_INVALID_WAYPOINT = 2;
  MA_VALIDATION_RESULT_ENUM_PERFORMANCE_LIMIT_EXCEEDED = 3;
  MA_VALIDATION_RESULT_ENUM_VIOLATION_ENDURANCE = 4;
  MA_VALIDATION_RESULT_ENUM_VIOLATION_GEOFENCE = 5;
  MA_VALIDATION_RESULT_ENUM_VIOLATION_AIR_TRAFFIC = 6;
  MA_VALIDATION_RESULT_ENUM_VIOLATION_TERRAIN = 7;
  MA_VALIDATION_RESULT_ENUM_CAPABILITY_NOT_SUPPORTED = 8;
  MA_VALIDATION_RESULT_ENUM_FLIGHT_COMMAND_VALID = 9;
}

// Provides additional context to validation rejections by Flight Autonomy.
// uci_version: 000.000.000.000
message MA_ValidationResultReasonType {
  // Define insufficient endurance details. List size for this element is based
  // on "Select All That Apply" condition.
  optional MA_InsufficientEnduranceType insufficient_endurance = 1;
  // Specify non-conforming performance constraint. List size for this element
  // is based on "Select All That Apply" condition.
  repeated MA_PerformanceConstraintEnum performance_constraint = 2;
  // Define invalid segments of a route.
  optional RouteValidationInvalidPathType route_validation_invalid_path = 3;
  // Define invalid section(s) of a curve.
  repeated MA_CurveSectionType curve_validation_invalid_section = 4;
  // Define the geofence ID(s) flight autonomy expected the flight command to
  // violate.
  repeated OpZoneID_Type geofence_constraint_id = 5;
  // Define the entity ID(s) flight autonomy expected the flight command to
  // intersect.
  repeated EntityID_Type entity_constraint_id = 6;
  // Define the position Flight Autonomy expected the flight command to
  // intersect.
  optional Point4D_Type terrain_constraint = 7;
  // Define the position Flight Autonomy expected the flight command to
  // intersect.
  optional CapabilityID_Type capability_id = 8;
  // Indicates the uniqueID of the commanded Capability that is not supported.
  // xsd type: VisibleString1024Type (pattern [ -~]{0,1024})
  optional string description = 9;
}

// This type shall be used to define insufficient endurance by specifying
// remaining and required endurance.
// uci_version: 000.000.000.000
message MA_InsufficientEnduranceType {
  // Remaining endurance.
  EnduranceRemainingType endurance_remaining = 1;
  // Required endurance for requested activity.
  EnduranceType endurance_required = 2;
}

// Elements of performance profile that exceed capabilities.
enum MA_PerformanceConstraintEnum {

}

// Indicates the reason a route path or route segment is invalid. See
// individual fields for more details.
// uci_version: 001.001.001.000
message RouteValidationErrorType {
  // Indicates the reason why an action (Task, [Capability]Command,
  // [SupportingCapability]Command, [Capability]Activity, etc.) was rejected,
  // interrupted, unallocated, failed and/or generally can't be completed
  // satisfactorily. See the enumeration annotations for further details.
  // Additional information may be provided in the optional Specific Reason Code
  // and/or Description elements.
  RouteValidationErrorEnum invalid_reason = 1;
  // Additional System/Subsystem/Capability/SupportCapability/Component/Service

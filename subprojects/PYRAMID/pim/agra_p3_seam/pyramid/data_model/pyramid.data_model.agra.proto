  // Activities of the Plan would occur.
  optional DateTimeRangeType window = 3;
  // Indicates which part or parts are included in the Plan. For a *ActivityPlan
  // the parts are the kinds of Activities.
  ActivityPlanPartsType parts = 4;
  // Indicates an Activity that is planned to occur on a PathSegment and/or a
  // time/location specified by the child *Trigger elements. Multiple Activities
  // occurring at different times along a straight segment can be specified with
  // 1) an EndPoint for each action to accurately describe where they will occur
  // or 2) the Trigger element to arrange the Activities along a single
  // PathSegment with a single EndPoint. The latter approach is required for
  // simultaneous Activities.

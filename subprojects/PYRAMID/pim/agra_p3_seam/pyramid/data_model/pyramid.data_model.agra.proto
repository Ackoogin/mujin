  COVARIANCE_MATRIX_CATEGORY_ENUM_POSITION = 4;
  COVARIANCE_MATRIX_CATEGORY_ENUM_POSITION_VELOCITY = 5;
  COVARIANCE_MATRIX_CATEGORY_ENUM_POSITION_VELOCITY_PARAMETERS = 6;
}


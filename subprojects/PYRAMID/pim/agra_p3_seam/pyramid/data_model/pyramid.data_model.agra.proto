  // Indicates a velocity vector in the RTN reference frame.
  RTN_VelocityType velocity = 3;
  // Indicates an acceleration vector in the RTN reference frame.
  optional RTN_AccelerationType acceleration = 4;
  // Indicates the attitude in the RTN reference frame.
  optional QuaternionType attitude = 5;
  // The covariance matrix along with its associated category that defines the
  // elements represented in the covariance matrix in the RTN reference frame.
  // See the individual category enumerations for detailed explanations.
  optional CovarianceMatrixType covariance = 6;
}


// The container for the covariance matrix and its associated category. The
// category enum value annotation specifies the shape and number of terms in
// the covariance matrix that are being represented.
// uci_version: 000.000.000.000
message CovarianceMatrixType {
  // Specifies what terms in the covariance matrix are being represented.
  CovarianceMatrixCategoryEnum category = 1;
  // The terms of the covariance matrix. The terms are provided in order of
  // appearance in the lower triangular half of the matrix from element 1,1
  // (item 1) through the last element used in the correction. The diagonal
  // terms are the variances of the solution parameter, and the off-diagonal
  // terms are the covariances.
  repeated double covariance = 2;
}

// Specifies what terms in the covariance matrix are being represented. The
// terms are provided in order of appearance in the lower triangular half of
// the matrix from element 1,1 (item 1) through the last element used in the
// correction. The diagonal terms are the variances of the solution parameter,
// and the off-diagonal terms are the covariances.

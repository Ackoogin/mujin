// uci_version: 003.000.003.000
message ElementDetailsType {
  // Indicates the kinematics of the sensor source element.
  repeated SensorKinematicsChoiceType kinematics = 1;
  // If TRUE, indicates that the sibling kinematics should be used as the
  // reference location for the relative measurements (e.g. LOS
  // Azimuth/Elevation).
  optional bool relative_measurement_reference = 2;
  // Indicates the ID of the element which is associated with the sibling
  // Kinematics.
  optional SourceKinematicsElementIdentityType source_element_identifier = 3;
  // Indicates the PulseDataID(s) which are associated with the sibling
  // Kinematics.
  repeated PulseDataID_Type pulse_data_id = 4;
  // Indicates the SignalID(s) which are associated with the sibling Kinematics.
  repeated SignalID_Type signal_id = 5;
  // Indicates whether the source element is a transmitter, receiver, or both.
  optional RF_TypeEnum rx_tx_type = 6;
}


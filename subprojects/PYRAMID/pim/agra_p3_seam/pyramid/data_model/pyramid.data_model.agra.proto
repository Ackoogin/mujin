// Indicates an installed PO high-level subCapability which adds an additional
// level of granularity to complete the mission using PO commands and tasks.
// uci_version: 000.000.000.000
message PO_SubCapabilityType {
  // A passive optical sensor will contain one or more subsystem
  // subcapabilities. Each subcapability is identified by a unique ID. This ID
  // is used in messages and capabilities to identify a particular
  // subcapability. This field is the ID of the subcapability whose status is
  // being reported.
  SubCapabilityID_Type sub_capability_id = 1;
  // Indicates the frequency band or spectrum that is used to search, track, or
  // generate products with the PO subsystem.
  SensorSpectrumEnum spectrum = 2;
  // Indicates the passive optical technique for tracking and search algorithm
  // purposes. Each technique setting requires the type with the enumeration and
  // any possible minimum and maximum settings for that technique with the
  // optional fields.
  repeated PO_TechniqueCapabilityType technique_settings = 3;
  // Indicates the passive optical target physical environment for tracking and
  // search algorithm purposes.
  optional PO_EnvironmentEnum environment = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message PO_TechniqueCapabilityType {
  // Indicates the SubCapability technique used for tracking and/or searching
  // for targets.
  PO_TechniqueEnum technique = 1;
  // Indicates the intensity of a pixels to consider it a track object.
  // Multiplier of value /10 to the auto threshold. A lower value means that
  // less likely targets are detected, and a higher value filters out the less
  // likely targets.
  optional FloatMinMaxType intensity = 2;
  // Indicates the number of pixels around a detection to search when combining
  // detections. A higher value means that an object with multiple detections is
  // more likely to be combined into one track. If the value is too high, nearby
  // objects may be treated as the same object.
  optional FloatMinMaxType constellation = 3;
  // Indicates how many frames in which to use adaptive frame differencing. A
  // stride of 1 is much like registration, but with additional processing
  // applied to resolve misregistration errors. However, a stride above one will
  // instead use a frame X frames ago. So stride 5 will mean that frame 105 will
  // be registered with frame 100. This will detect slower moving targets, but
  // may cause two detections on faster moving targets.
  optional FloatMinMaxType stride = 4;
  // This value controls the scale of the point to find.
  optional FloatMinMaxType point_intensity = 5;
  // This value controls the scale of the edge to find.
  optional FloatMinMaxType edge_intensity = 6;
  // Indicates the FalseAlarmLevel capability is supported and also defines the
  // upper limit allowed by the capability. Used to set the quantity of
  // sensitivity levels. If omitted tracking range selection is the full range
  // of the reference type. A common range is [0,15].
  optional uint32 false_alarm_level_upper_limit = 7;
}


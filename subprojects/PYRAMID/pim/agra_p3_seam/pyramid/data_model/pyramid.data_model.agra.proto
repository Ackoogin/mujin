  optional RouteValidationErrorType kinematic_invalid_reason = 2;
  // This element identifies segments that were found to be invalid.
  repeated RouteValidationInvalidSegmentType invalid_segment = 3;
  // This element defines the resulting LAR when validating releasable glider

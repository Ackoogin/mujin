  // File type information.
  optional FileOutputType type = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message VideoEncoderSettingsType {
  // Encoding algorithm or codec. Examples h264, h265, or AV1. If not specified,
  // then use the default encoding codec for the encoder.
  optional ForeignKeyType encoding_type = 1;
  // Profile for the encoding. Examples: Main:L4 or High:L5.1.
  // xsd type: VisibleString32Type (pattern [ -~]{0,32})
  optional string profile = 2;
  // Encoding Block or Coding Tree Unit size. For example, h264 has only 16x16;
  // h265 has 64x64, 32x32 and 16x16; AV1 has 128x128, 64x64, 32x32, 16x16, and
  // 8x8.
  optional VideoBlockSizeEnum encoding_blocks = 3;
  // Chroma subsampling to use for encoding.
  optional VideoChromaSubsampleEnum chroma_subsample = 4;
  // Output Frame Rate to use for encoding. Examples 24 Hz, 30 Hz, 60 Hz, etc.
  // xsd type: FrequencyType
  optional double frame_rate = 5;
  // Use High Dynamic Range (HDR) encoding otherwise use Standard Dynamic Range
  // (SDR) for encoding.
  bool hdr = 6;
  // Video encoder output bit rate from 1 Mbps up to 10 Mbps in 1 kbps
  // increments.
  optional uint32 bit_rate = 7;
  // Embed the KLV metadata in the video stream.
  bool embed_klv_metadata = 8;
  // Embed the platform/sensor metadata in the video stream.
  bool embed_platform_metadata = 9;
  // Video encoder skip frames from 0 up to 59 in 1 frame increments.
  optional uint32 skip_frames = 10;
  // Indicates the minimum and maximum allowed quantization values for the video
  // encoder.
  optional UnsignedIntegerMinMaxType quant_min_max = 11;
  // Indicates the priority of the video encoder compression. If
  // CONSTANT_QUALITY is selected, Quant Min is the Quality value and Quant Max
  // is ignored. If CONSTANT_BIT_RATE is seletected, the Quality value will vary
  // between Quant Min and Quant Max.
  optional VideoEncoderCompressionModeEnum compression_mode = 12;
  // Number of partial frames in the compressed video that reference data from
  // previous and future frames. The GOP structure is often referred by two
  // numbers, for example, M=3, N=12. The first number tells the distance
  // between two anchor frames (I or P). The second one tells the distance
  // between two full images (I-frames): it is the GOP size. For the example,
  // with M=3 and N=12, the GOP structure is IBBPBBPBBPBBI. Instead of the M
  // parameter, the maximal count of B-frames between two consecutive anchor
  // frames can be used.
  optional uint32 b_frames = 13;
  // Defines the Group of Picture (GOP) size, the number of frames between
  // I-frames.
  optional uint32 gop_size = 14;
  // Indicates to use intra-refresh mode and the intra-refresh percentage.
  bool intra_refresh_mode = 15;
  // Percentage used for the intra-refresh mode when IntraRefreshMode is set to
  // true.
  // xsd type: PercentType
  optional double intra_refresh_percentage = 16;
  // Number of bits used to indicate the color of a single pixel.
  uint32 color_bit_depth = 17;
  // Indicates cropping of a video frame and specifies the origin, width, and
  // height of the crop.
  optional CropType crop = 18;
  // Indicates the scaling of the output video for the video encoder.
  // xsd type: PercentType
  optional double scaling = 19;
}

// Indicates the video encoding blocking to use.
enum VideoBlockSizeEnum {
  VIDEO_BLOCK_SIZE_ENUM_UNSPECIFIED = 0;
  VIDEO_BLOCK_SIZE_ENUM_DEFAULT = 1;
  VIDEO_BLOCK_SIZE_ENUM_BLOCK_8_8 = 2;
  VIDEO_BLOCK_SIZE_ENUM_BLOCK_16_16 = 3;
  VIDEO_BLOCK_SIZE_ENUM_BLOCK_32_32 = 4;
  VIDEO_BLOCK_SIZE_ENUM_BLOCK_64_64 = 5;
  VIDEO_BLOCK_SIZE_ENUM_BLOCK_128_128 = 6;
}

// Indicates the video Chroma Subsample.
enum VideoChromaSubsampleEnum {
  VIDEO_CHROMA_SUBSAMPLE_ENUM_UNSPECIFIED = 0;
  VIDEO_CHROMA_SUBSAMPLE_ENUM_CHROMA_4_0_0 = 1;
  VIDEO_CHROMA_SUBSAMPLE_ENUM_CHROMA_4_2_0 = 2;
  VIDEO_CHROMA_SUBSAMPLE_ENUM_CHROMA_4_2_2 = 3;
  VIDEO_CHROMA_SUBSAMPLE_ENUM_CHROMA_4_4_4 = 4;
}

// Generic type for xs:unsignedInt minimum and maximum allowable settings

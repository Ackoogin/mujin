// See the annotation in the associated message for an overall description of
// the message and this type.
// uci_version: 000.000.000.000
message MA_InteroperabilityPolicyMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // Indicates the state of the internal software object that the data in the
  // message is based upon. The state of the software object is determined by
  // the publisher. The publisher could be the original/master publisher or an
  // intermediary re-publisher such as a persistence/data manager. This element
  // is not a commanded CRUD operation. It is not an indication of the state of
  // an instance of a message. It is not a mechanism for partial, incremental,
  // or fragmentary publication of a message. It is a signal from a publisher to
  // subscribers. For REMOVED state, in particular, some subscribers will mirror
  // the publisher and treat the message as if the object no longer exists, but
  // others, such as mission recorders, might not (in order to support retaining
  // historical records of activity, for example).
  optional ObjectStateEnum object_state = 2;
  // See annotations in child elements and messages/elements that use this type
  // for details.
  MA_InteroperabilityPolicyMDT message_data = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_InteroperabilityPolicyMDT {
  // composed xsd extension base DataRecordBaseType
  DataRecordBaseType base = 1;
  // Indicates the unique ID of the interoperability policy.
  MA_InteroperabilityPolicyID_Type interoperability_policy_id = 2;
  // Indicates a set of interoperability policies for the handling of OpPoints,
  // OpLines, OpVolumes, etc.
  repeated MA_OpPolicyType op_policy = 3;
  // Indicates the geospatial zone and optionally time/date span or spans when
  // the policy is active. For Op* types, the policy is applicable to 1) the
  // time of Op* instances that lies within the time/date span and 2) the area
  // of Op* instances which falls within the zone. This element supersedes the
  // sibling Expires element.
  optional TimedZoneType timed_zone = 4;
  // Indicates the time and date when the policy expires. The policy is
  // applicable to Op* instances during their existance prior to this time. When
  // the sibling TimedZone element is used, the time spans specified there
  // supersede this element.
  // xsd type: DateTimeType (pattern .+Z)
  optional string expires = 5;
  // Allows the creator of the interoperability policy to specify the source or
  // motivation for this InteroperabilityPolicy such as ATO, ACO, etc.
  optional MissionTraceabilityType mission_traceability = 6;
}

// The ID type for UCI IDs that correspond to interoperability policies.
// uci_version: 000.000.000.000
message MA_InteroperabilityPolicyID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// Indicates Op* Policy for Op* types
// uci_version: 000.000.000.000
message MA_OpPolicyType {
  // Indicates the unique ID of the Op* policy.
  MA_OpPolicyID_Type op_policy_id = 1;
  // Specifies which Op* types this policy is applicable to. Applicable to all
  // types if not populated
  optional MA_OpTaxonomyType applicable_types = 2;
  // Sets what Mission Autonomy can do when in the package leader role with
  // respect to Op* type management for its team members. In all cases,
  // platforms shall not modify Op* instances and Commands coming from
  // above(Mission Planning, C2, or package leader MA).
  MA_AutonomousDataManipulationPolicyEnum autonomous_op_manipulation_policy = 3;
  // In the case that conflicting incompatible OpCommands can't be deconflicted
  // due to equal rank, this policy will dictate what approach Mission Autonomy
  // shall use to deconflict those Commands.
  MA_RankConflictPolicyEnum rank_conflict_policy = 4;
  // In the case that conflicting incompatible Op* types occupy the same space

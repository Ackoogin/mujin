// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message EA_ResponseType {
  // This element specifies a task to escort an asset. The tasked vehicle shall
  // provide protection for the escorted asset. Additional protected assets can
  // be specified in the ProtectedAssets element.
  optional EA_TaskEscortType route_requirements = 1;
  // This element provides a list of friendly assets which should be protected
  // in addition to those who are being escorted, if any.
  optional EA_TaskProtectedAssetsType protected_assets = 2;
  // Indicates the threats that are the target of the electronic attack.
  optional EA_TaskThreatsType threats = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.002.000
message EA_TaskEscortType {
  // Indicates the identity and priority of escorted assets.
  repeated ProtectedAssetType escorted_asset = 1;
  // This element indicates the minimum distance the tasked vehicle should fly
  // relative to the escorted asset position.
  // xsd type: DistanceType
  optional double min_distance_offset = 2;
  // This element indicates the max distance the tasked vehicle should fly
  // relative to the escorted asset position.
  // xsd type: DistanceType
  optional double max_distance_offset = 3;
  // Angle Relative to the heading of the escorted asset measured clockwise.
  optional AnglePairType relative_angle_offset = 4;
  // Indicates the location and time for a rendezvous.
  optional Point4D_Type rendezvous_point = 5;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message ProtectedAssetType {
  // Relative priority of asset being protected. 1 through 3 with 1 being
  // highest priority.
  uint32 priority = 1;
  // The asset identifier.
  AssetType asset = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.001.000.000
message EA_TaskProtectedAssetsType {
  // If this element is "TRUE", all known friendly assets should be protected to
  // the extent EA resources are available. If this element is "FALSE", either:
  // 1.) A subset of protected assets shall be specified. This is a requirement
  // if the mission is to loiter and protect. It is optional if an escort. 2.)
  // The mission is an escort and only the escorted vehicle or entity should be
  // protected. In this case, NO protected assets shall be specified.
  bool protect_all = 1;
  // If this element is set to TRUE, the jamming asset should utilize resources
  // for self protection.
  bool self_protect = 2;
  // Indicates the identity and priority of protected assets.
  repeated ProtectedAssetAndThreatType protected_asset = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message ProtectedAssetAndThreatType {
  // Relative priority of asset being protected. 1 through 3 with 1 being
  // highest priority.
  uint32 priority = 1;
  // The asset identifier.
  AssetType asset = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.001
message EA_TaskThreatsType {
  oneof choice {
    // If true this element implies that all known threats should be jammed to the
    // extent resources are available.
    bool suppress_all = 1;
    // This element defines specific constraints on the entities or frequencies to
    // suppress.
    EA_TaskThreatsType_SuppressionConstraints_List suppression_constraints = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.003.001
message EA_TaskSuppressionConstraintsType {
  // This element contains the ID of the entity which should be jammed.
  EA_TargetType ea_target = 1;
  // This element contains the prioritization of the specified entity.
  // Priorities are relative to other entities specified in the task. Absence of
  // this element indicates that the tasked system should determine priorities
  // based on entity type.
  optional uint32 priority = 2;
  // Indicates the EA technique to be used for this target.
  optional EA_TechniqueIdentifierType technique_identifier = 3;
}

// synthesized list wrapper for repeated choice member SuppressionConstraints in EA_TaskThreatsType (choice)
message EA_TaskThreatsType_SuppressionConstraints_List {
  repeated EA_TaskSuppressionConstraintsType items = 1;
}


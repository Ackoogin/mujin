  ROUTE_VALIDATION_ERROR_ENUM_BANK_ANGLE_ERROR = 3;
  ROUTE_VALIDATION_ERROR_ENUM_ROLL_ERROR = 4;
  ROUTE_VALIDATION_ERROR_ENUM_SPEED_ERROR = 5;
  ROUTE_VALIDATION_ERROR_ENUM_ALTITUDE_ERROR = 6;
  ROUTE_VALIDATION_ERROR_ENUM_VEHICLE_ORIENTATION_ERROR = 7;
  ROUTE_VALIDATION_ERROR_ENUM_WEIGHT_ERROR = 8;
  ROUTE_VALIDATION_ERROR_ENUM_FUEL_ERROR = 9;
  ROUTE_VALIDATION_ERROR_ENUM_REQUIRED_INPUT_ERROR = 10;
  ROUTE_VALIDATION_ERROR_ENUM_UNKNOWN_ERROR = 11;

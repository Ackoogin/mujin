  // Requirement.
  PlanningResultEnum planning_result = 1;
  // Indicates the SystemID of the System whose *Plan are associated with the
  // sibling PlanningResult element.
  SystemID_Type system_id = 2;
  // Indicates *Plan associated with the sibling PlanningResult element. If the
  // sibling PlanningResult indicates the Requirement was/remained allocated
  // then this element indicates the specific *Plan it is/remains allocated in.
  // If the PlanningResult indicates the Requirement was DEALLOCATED then this
  // element indicates the constraining *Plan it was DEALLOCATED from. This
  // element isn't expected when the PlanningResult indicates UNALLOCATED.
  optional MA_PlanReferenceType associated_plans = 3;
  // Indicates a reason why the Requirement wasn't allocated or reallocated. If
  // the sibling PlanningResult element indicates the Requirement was left not
  // allocated then this element indicates why. Multiple instances of this
  // element can provide the reason for each System that was attempted and even
  // many reasons for each. If the PlanningResult indicates the Requirement was
  // allocated then this element can still be used to indicate reasons for
  // failed attempts to allocate to other Systems or plan, prior to the
  // successful allocation.
  repeated UnallocatedReasonType not_allocated_reason = 4;
}


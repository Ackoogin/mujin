// These markers are used to identify an Entity as a Friend, Neutral, or Enemy
// and which enables or confirms the Entity's Standard Identity type to be set
// to FRIEND, NEUTRAL, SUSPECT or HOSTILE.
// uci_version: 000.000.000.000
message MA_IdMatrixCriteriaType {
  // This is a list of known friend IDs.
  repeated AssetType friend_i_ds = 1;
  // These markers are used to identify an Entity as a Friend. If any of them
  // are met this enables or confirms the Entity's Standard Identity type to be
  // set to FRIEND.
  repeated MA_ElectromagneticIndicationChoiceType friend_electromagnetic_indicators = 2;
  // This is the threshold percentage that above this number is enough
  // confidence to confirm the Electromagnetic Indicator.
  // xsd type: PercentType
  repeated double friend_electromagnetic_indicators_confidence = 3;
  // This is a list of known Neutral IDs.
  repeated AssetType neutral_i_ds = 4;
  // These markers are used to identify an Entity as a Neutral. If any of them
  // are met this enables or confirms the Entity's Standard Identity type to be
  // set to NEUTRAL.
  repeated MA_ElectromagneticIndicationChoiceType neutral_electromagnetic_indicators = 5;
  // This is the threshold percentage that above this number is enough
  // confidence to confirm the Electromagnetic Indicator.
  // xsd type: PercentType
  repeated double neutral_electromagnetic_indicators_confidence = 6;
  // An Entity in these OpLine, OpZone, OpVolume types are a procedural
  // indicator that it is likely a Friend or Neutral. This cannot be used alone
  // to indicate Friend or Neutral.
  repeated MA_ConstraintPriorityTypeChoiceType friend_neutral_procedural_indicators = 7;
  // These markers are used to identify an Entity as an Enemy or enables
  // confirmation that the Entity's Standard Identity type can be set to
  // SUSPECT. Need at least one Enemy Electromagnetic Indicator (EEI) or one
  // Visual Identification (VID) to have a positive Enemy Indication.
  MA_PositiveEnemyIndicationType positive_enemy_indication = 8;
  // These markers are used to identify that an Enemy has qualified for a
  // Hostile Act (HA) or Hostile Intent (HI). The Entity must also have at least
  // one Positive Enemy Indicator and one Hostile Act/Intent which enables or
  // confirms the Entity's Standard Identity type to be set to HOSTILE.
  MA_HostileActIntentType hostile_act_intent_criteria = 9;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_ElectromagneticIndicationChoiceType {
  oneof choice {
    // Indicates Identify Friend or Foe (IFF) modes and settings for the asset.
    IFF_Type iff = 1;
    // Indicates the specific emitter type instance of the target. Specific
    // Emitter Identification (SEI) technology passively measures emitters, and
    // characterizes unique emitter signatures that can be used for friend or
    // enemy emitter identification and fingerprinting. A SEI and this
    // SpecificEmitter element refer to a specific physical instance of a type of
    // emitter as given in the sibling Emitter element.
    ForeignKeyType specific_emitter_key = 2;
    // This element represents Communications Emitter Notation (CENOT) for
    // communications electronic emissions. Used to preserve original signal
    // identification in case of modification by subsequent processing.
    // xsd type: NotationType (pattern [A-Z0-9]{5}|UNKN|NONE)
    string cenot_identifier = 3;
    // This element represents Electronic Intelligence (ELINT) Notation (ELNOT)
    // for non-communications electronic emissions. Used to preserve original
    // signal identification in case of modification by subsequent processing.
    // xsd type: NotationType (pattern [A-Z0-9]{5}|UNKN|NONE)
    string elnot_identifier = 4;
  }
}

// These markers are used to identify an Entity as an Enemy or enables
// confirmation that the Entity's Standard Identity type can be set to
// SUSPECT. Need at least one Enemy Electromagnetic Indicator (EEI) or one
// Visual Identification (VID) to have a positive Enemy Indication.
// uci_version: 000.000.000.000
message MA_PositiveEnemyIndicationType {
  // These markers are used to identify an Entity as an Enemy. If any of them
  // are met this enables or confirms the Entity's Standard Identity type to be
  // set to SUSPECT.
  repeated MA_ElectromagneticIndicationChoiceType enemy_electromagnetic_indicators = 1;
  // This is the threshold percentage that above this number is enough
  // confidence to confirm the Electromagnetic Indicator.
  // xsd type: PercentType
  repeated double enemy_electromagnetic_indicators_confidence = 2;
  // These markers are used to identify an Entity as an Enemy. If any of them
  // are met this enables or confirms the Entity's Standard Identity type to be
  // set to SUSPECT.
  repeated MA_VisualIdentificationChoiceType enemy_visual_identification = 3;
  // This is the threshold percentage that above this number is enough
  // confidence to confirm the Visual Identification.
  // xsd type: PercentType
  repeated double enemy_visual_identification_confidence = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_VisualIdentificationChoiceType {
  oneof choice {
    // Indicates a possible "platform identity" of the Entity.
    PlatformIdentityType platform_identity = 1;
    // The specific Radar Cross Section identification for a system. This will
    // typically be a system-specific and service-specific identifier for
    // pre-configured Radar Cross Sectional data. Services should have coordinated
    // this data ahead of time.
    ForeignKeyType radar_cross_section = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_HostileActIntentType {
  // The ID(s) of an OpZone/OpVolume or specified zone(s) for which entrance by
  // an Entity can be considered a Hostile Act/Intent if the entity is not a
  // Friend/Neutral and has a Positive Enemy Indicator.
  repeated MA_RegionChoiceType hostile_region = 1;
  // This can be used to identify the Types of OpZones or OpVolumes for which
  // entrance by an Entity can be considered a Hostile Act/Intent if the entity
  // is not a Friend/Neutral and has a Positive Enemy Indicator.
  repeated MA_OpZoneCategoryEnum hostile_op_zone_op_volume_category = 2;
  // Select all that apply to categorize what is considered Hostile Act/Intent
  // of an Entity.
  repeated ThreatPostureEnum hostile_threat_posture_type = 3;
  // Indicates the "activity" of the Entity that is considered a Hostile
  // Act/Intent. "Activity" is derived from MIL-STD-6016; see MIL-STD-6016
  // DFI/DUIs 1798/001, 1798/002, 1798/003, 1798/004 and 1798/005 for additional
  // details. "ActivityCategory" is Derived from MIL-STD-6016; see MIL-STD-6016
  // DFI/DUI 275/004 for additional details. Each environment has a
  // corresponding set of specific types.
  repeated ActivityByType hostile_threat_activity = 4;
}

// Indicates the current posture of a known threat.
enum ThreatPostureEnum {
  THREAT_POSTURE_ENUM_UNSPECIFIED = 0;
  THREAT_POSTURE_ENUM_SEARCH = 1;
  THREAT_POSTURE_ENUM_READY_TO_LAUNCH = 2;
  THREAT_POSTURE_ENUM_LAUNCHED = 3;
  THREAT_POSTURE_ENUM_DIRECTED_TO_ENGAGE = 4;
  THREAT_POSTURE_ENUM_UNKNOWN = 5;
}


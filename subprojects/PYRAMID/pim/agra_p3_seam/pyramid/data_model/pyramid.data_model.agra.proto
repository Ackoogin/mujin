// uci_version: 002.001.002.000
message COMINT_AcquisitionTargetType {
  // Indicates the target for the dwell.
  COMINT_TargetType target = 1;
  // Indicates the priority setting for a particular target.
  optional ComparableRankingType priority = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message COMINT_TargetType {
  oneof choice {
    // Indicates the unique ID of a specific Entity that is a target of the
    // acquisition.
    EntityID_Type entity_id = 1;
    // Indicates a type of emitter that is a target of the acquisition.
    EmitterIdentityType emitter_type = 2;
    // Indicates a specific emitter type ***instance*** that is a target of the

}

// Characterizes the resolution of the sensor.
// uci_version: 001.001.000.001
message SourceResolutionType {
  // Range resolution of source in meters.
  // xsd type: DistanceType
  optional double range_resolution = 1;
  // Range rate resolution of source meters/second.
  // xsd type: SpeedType
  optional double range_rate_resolution = 2;
  // Azimuth angle resolution of reporting source in radians.
  // xsd type: AnglePositiveType
  optional double azimuth_resolution = 3;
  // Elevation angle resolution of reporting source in radians.
  // xsd type: AnglePositiveType
  optional double elevation_resolution = 4;
  // Azimuth angle rate resolution of the reporting source in radians per second.
  // xsd type: AnglePositiveType
  optional double azimuth_rate_resolution = 5;
  // Elevation angle rate resolution of the reporting source in radians per
  // second.
  // xsd type: AnglePositiveType
  optional double elevation_rate_resolution = 6;
  // The resolution of the sensor of the inner product of the target pointing
  // vector with the sensor Y-axis. In the case of linear arrays, the Y-axis is
  // the same as the orientation of the linear array. In the case of
  // two-dimensional arrays, the Y-axis is the "Horizontal" axis, coarsely
  // equivalent to Azimuth.
  optional double coscone_y_resolution = 7;
  // The resolution of the sensor of the inner product of the target pointing
  // vector with the sensor Z axis. This term is only used for two-dimensional
  // arrays. The Z-axis is the "Down" axis of the array, perpendicular to both
  // the X-axis (boresight) and the Y-axis (horizontal), coarsely equivalent to
  // Elevation.
  optional double coscone_z_resolution = 8;
  // The resolution of the measurement of the rate of change of the inner
  // product of the target pointing vector with the sensor Y-axis of the
  // reporting source. In the case of linear arrays, the Y-axis is the same as
  // the orientation of the linear array. In the case of two-dimensional arrays,
  // the Y-axis is the "Horizontal" axis, making this coarsely equivalent to the
  // resolution of the Azimuth rate with units of per second.
  optional double coscone_y_rate_resolution = 9;
  // The resolution of the measurement of the rate of change of the inner
  // product of the target pointing vector with the sensor Z axis of the
  // reporting source. This term is only used for two-dimensional arrays. The
  // Z-axis is the "Down" axis of the array, perpendicular to both the X-axis
  // (boresight) and the Y-axis (horizontal), making this coarsely equivalent to
  // the resolution of the Elevation rate with units of per second.
  optional double coscone_z_rate_resolution = 10;
}


// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message EA_CapabilityMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // Indicates the state of the internal software object that the data in the
  // message is based upon. The state of the software object is determined by
  // the publisher. The publisher could be the original/master publisher or an
  // intermediary re-publisher such as a persistence/data manager. This element
  // is not a commanded CRUD operation. It is not an indication of the state of
  // an instance of a message. It is not a mechanism for partial, incremental,
  // or fragmentary publication of a message. It is a signal from a publisher to
  // subscribers. For REMOVED state, in particular, some subscribers will mirror
  // the publisher and treat the message as if the object no longer exists, but
  // others, such as mission recorders, might not (in order to support retaining
  // historical records of activity, for example).
  optional ObjectStateEnum object_state = 2;
  // See annotations in child elements and messages/elements that use this type
  // for details.
  EA_CapabilityMDT message_data = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message EA_CapabilityMDT {
  // composed xsd extension base CapabilityBaseType
  CapabilityBaseType base = 1;
  // Indicates an installed EA Capability, its configurable characteristics and
  // its controllability.
  repeated EA_CapabilityType capability = 2;
  // Indicates a Subsystem Component used to implement one or more EA
  // Capabilities. An EA Component's characteristics and performance directly
  // influence those of the Capabilities. A single Component can support
  // multiple Capabilities. Components may have settings/configuration
  // independent of Capabilities.
  repeated EA_ComponentType ea_component = 3;
  // The total number of tracks that can be jammed by the Subsystem. Optional
  // for Subsystems that can jam independent of tracks and/or are limited only
  // by number of beams and commutations.
  optional uint32 jammed_track_limit = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.001.002.001
message EA_CapabilityType {
  // composed xsd extension base CommandableCapabilityDeclarationType
  CommandableCapabilityDeclarationType base = 1;
  // Indicates the Capability's first tier type in the EA taxonomy. For EA, the
  // first tier is an indication of the means of initiation of the Capability.
  // See enumerated type annotations for further details.
  CapabilityInitiationEnum capability_type = 2;
  // Indicates the Capability's support for select optional elements in its
  // accepted control interface messages. Support for these elements is expected
  // to vary across Capability implementations but must be known in order to
  // adapt and configure upstream Systems and Services which use the Capability.
  EA_CapabilityOptionsType capability_options = 3;
  // Indicates a characteristic of the EA Capability. See enumerated type
  // annotations for further details. If a program-specific enumerated type is
  // CLASSIFIED, then the documentation defining the enumerated type will be
  // maintained by the classifying program, in accordance with that program's
  // Security Classification Guide (SCG).
  optional EA_IndicatorEnum ea_indicator = 4;
  // Indicates an EA technique supported by the Capability. Names and
  // implementations of techniques vary widely across EA Subsystems. This
  // element is an abstraction that describes them from a heterogeneous command
  // and control perspective.
  repeated EA_TechniqueType technique = 5;
  // Indicates a command and control relevant Subsystem Component associated
  // with the Capability. Only those Components that are independent of the
  // sibling Technique element should be listed; Technique has its own
  // association to Components. Multiple Capabilities can use the same Component.
  repeated ComponentID_Type associated_component_id = 6;
  // Indicates a message that is an output of the Capability. See enumerated
  // type annotations for details.
  optional EA_MessageOutputsEnum message_output = 7;
  // The technique group is not described in UCI. It is based on the
  // organization of EA capability and is left to external implementation.
  optional EA_TechniqueGroupIdentifierType technique_group_identifier = 8;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message EA_CapabilityOptionsType {
  // Indicates whether (TRUE) or not (FALSE) the Capability supports the
  // InterruptOtherActivities element in the EA_Command message.
  bool interrupt_other_activities = 1;
}

// This enumerated type is a placeholder for a standardized enumeration
// defined by the specific program implementation. If program specific
// enumerated type is CLASSIFIED, then the documentation defining the
// enumerated type will be maintained by the classifying Program, in
// accordance with that Program's Security Classification Guide (SCG).
enum EA_IndicatorEnum {
  EA_INDICATOR_ENUM_UNSPECIFIED = 0;
  EA_INDICATOR_ENUM_PROGRAM_SPECIFIC_TYPE_A = 1;
  EA_INDICATOR_ENUM_PROGRAM_SPECIFIC_TYPE_B = 2;
  EA_INDICATOR_ENUM_PROGRAM_SPECIFIC_TYPE_C = 3;
  EA_INDICATOR_ENUM_PROGRAM_SPECIFIC_TYPE_D = 4;
  EA_INDICATOR_ENUM_PROGRAM_SPECIFIC_TYPE_E = 5;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.001.000
message EA_TechniqueType {
  // Indicates the unique ID of the EA technique. EA techniques are not
  // taxonomically described in UCI. It is left to external actors to organize,
  // uniquely describe and identify them. See type annotations for further
  // details.
  EA_TechniqueIdentifierType technique_identifier = 1;
  // Indicates how the technique is activated. See annotated type enumerations
  // for further details. List size for this element is based on "Select All
  // That Apply" condition.
  repeated EA_ActivationEnum activation = 2;
  // Indicates how the Technique is pointed.
  EA_PointingEnum pointing = 3;
  // Indicates the bandwidth of the Technique.
  repeated FrequencyRangeType band = 4;
  // Indicates an EA Component the Technique can be assigned to.
  repeated ComponentID_Type component_id = 5;
  // Indicates an emitter type which the Technique might be effective against.
  repeated EmitterIdentityType emitter = 6;
  // Indicates the specific emitter type ***instance*** which the Technique
  // might be effective against.
  repeated SpecificEmitterIdentityType specific_emitter = 7;
}

// Indicates an ID corresponding to an EA technique. The use of ForeignKeyType
// is an indication that EA techniques aren't universally defined and come
// from multiple systems/sources but they are expected to be unique within the
// context of their source. For an EA technique in UCI, the
// EA_TechniqueIdentifierType.Key element indicates the technique ID and the
// EA_TechniqueIdentifierType.SystemName element indicates the system that
// assigned the ID and ensures it is unique.
// uci_version: 000.000.000.000
message EA_TechniqueIdentifierType {
  // composed xsd extension base ForeignKeyType
  ForeignKeyType base = 1;
}


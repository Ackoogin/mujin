  HOSE_CUT_STATUS_ENUM_UNSPECIFIED = 0;
  HOSE_CUT_STATUS_ENUM_ENABLED = 1;
  HOSE_CUT_STATUS_ENUM_NORMAL = 2;
  HOSE_CUT_STATUS_ENUM_CUT = 3;
}


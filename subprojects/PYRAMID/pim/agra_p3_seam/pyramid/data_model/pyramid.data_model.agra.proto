  // The ID of the MissionPlanActivationCommand this status pertains to.
  MissionPlanActivationCommandID_Type command_id = 1;
  // Indicates the status of the MissionPlanActivationCommand.
  PlanCommandStatusType activation_status = 2;
  // Indicates plans in a given commanded activation state. List size allows for
  // each available PlanActivationCommandState to be represented.
  repeated MA_PlanActivationStatusType activation_command_by_state = 3;
}

// Indicates the common status information for all *PlanCommands.
// uci_version: 002.000.002.000
message PlanCommandStatusType {
  // Indicates the status of the command.
  CommandProcessingStateEnum command_processing_state = 1;
  // Indicates details regarding the reason for and/or a contributing factor to
  // the sibling CommandProcessingState element. This element is only expected
  // when the Command is in a potentially undesirable state such as rejected,
  // canceled or accepted with less than optimum results expected.
  optional CannotComplyType command_processing_state_reason = 2;
  // Indicates the status of the command.
  ProcessingStatusEnum command_status = 3;
  // Indicates actual and predicted metrics for completion of the command.
  optional CompletionStatusType completion_status = 4;
  // Indicates items associated with command processing that failed to complete.
  // For example if a particular required Capability wasn't available, it could
  // be referenced here. This element/type is highly flexible. It can reference
  // almost any message/concept in UCI as a planning issue. The wide range of
  // messages/concepts it can reference makes it 1) difficult to use as a basis
  // for software/services to resolve the issue but 2) an excellent general
  // method for processing algorithms to convey issues to operators. This
  // element shouldn't be used to report processing issues/results that are more
  // directly indicated by other processing status elements. For example, for
  // planning processing, other elements focus specifically on per-Requirement
  // allocation results therefore this element shouldn't be used for
  // per-Requirement allocation results.
  repeated IncompleteProcessingType incomplete_item = 5;
}


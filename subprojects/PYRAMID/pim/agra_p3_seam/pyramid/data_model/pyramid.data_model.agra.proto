message RequirementExecutionStatusDetailsType {
  // Indicates the ID of the System executing the Requirement; the System whose
  // status on execution of the Requirement is reported in sibling elements.
  // *Plans and Requirements must be managed such that only a single System
  // executes a given Requirement.
  SystemID_Type executing_system_id = 1;

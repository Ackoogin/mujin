  // techniques. If a single SMTI Capability supports both land and sea
  // operation, a "MIXED" SubCapability will be indicated.
  SMTI_SubCapabilityEnum sub_capability_type = 3;
  // Indicates the Capability's support for select optional elements in its
  // accepted control interface messages. Support for these elements is expected
  // to vary across Capability implementations but must be known in order to
  // adapt and configure upstream Systems and Services which use the Capability.
  SMTI_CapabilityOptionsType capability_options = 4;
  // Indicates a frequency band/range used by the Capability.
  repeated FrequencyRangeType band = 5;
  // Indicates a Moving Target Indication Interpretability Rating Scale level
  // supported by the Capability. See annotations of the underlying type for

message AltitudeReferenceUncertaintyType {
  // Reference to altitude measurement source.
  AltitudeReferenceEnum altitude_reference = 1;
  // Altitude as measured from reference type in units of meters.
  // xsd type: AltitudeType
  double altitude = 2;
  // Variance of altitude measurement with units of meters squared.
  optional double var_altitude = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.001.000.000
message RCS_MedianType {
  // The measured value of RCS in dBsm (decibels per square meters).
  // xsd type: DoubleNonNegativeType
  double rcs_value = 1;
  // The variance of the reported measurement value (decibels per meters to the
  // fourth).
  // xsd type: DoubleNonNegativeType
  double rcs_variance = 2;
  // The spectral width of an object, measured in Hertz, produced a result of
  // performing coherent integration. This information can help determine if an
  // object is stable or tumbling which is often useful to distinguish a rocket
  // body from an active stabilized payload or to deduce the rotational period
  // of slowly tumbling objects at GEO. A null value implies this information is
  // not available as it was not produced by the sensor source. This measurement
  // can only be expected for radars that use long coherent processing intervals.
  // xsd type: FrequencyType
  optional double spectral_width = 3;
  // The polarization of the received electromagnetic waves.
  PolarizationEnum receiver_polarization = 4;
  // The polarization of the transmitted electromagnetic waves.
  optional PolarizationEnum transmitter_polarization = 5;
}

// The polarization of the received electromagnetic waves.
// uci_version: 001.000.000.000
message SpaceObjectVisualDataType {
  // Also known as the "normalized visual magnitude". The calibrated visual
  // magnitude scaled to the object being at some reference distance known as
  // the assumed range-to-target.
  // xsd type: VisualMagnitudeType
  optional double absolute_visual_magnitude = 1;
  // Also known as the "apparent" or "instrument" visual magnitude. The measured
  // brightness of an object in visual magnitudes (Mv) at the time it was
  // tracked. The observed visual magnitude is the actual measured value
  // adjusted for atmospheric extinction, sky background, and instrument
  // sensitivity.
  // xsd type: VisualMagnitudeType
  optional double observed_visual_magnitude = 2;
  // The estimated distance to the object which was used to compute the absolute
  // visual magnitude value.
  // xsd type: DistanceType
  optional double assumed_range_to_target = 3;
  // The angular distance between the sun and the earth from the observed object
  // (i.e., the sun-object-earth angle).
  // xsd type: AngleType
  optional double signed_solar_phase_angle = 4;
  // Stars Found is the Number of Stars detected in the Field of View (FOV) with
  // the detected object. This helps identify frames with clouds.
  optional uint32 stars_found = 5;
  // Stars Used is the Number of correlated stars in the Field of View (FOV)
  // with the detected object.
  optional uint32 stars_used = 6;
  // Sky Background refers to the incoming light from an apparently empty part
  // of the night sky.
  optional double sky_background = 7;
  // Primary Extinction is the coefficient applied to the airmass to determine
  // how much the observed visual magnitude has been attenuated by the
  // atmosphere. Extinction in general is the term used in astronomy to describe
  // the absorption and scattering of electromagnetic radiation by dust and gas
  // between an emitting astronomical object and the observer.
  optional double primary_extinction = 8;
  // Instrument Zero is the difference between the instrument measured
  // magnitudes and standard values.
  optional double instrument_zero = 9;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.001
message MeasurementKinematicsChoiceType {
  oneof choice {
    // Measurements provided in sensor relative line of sight frame (body or
    // inertial) expressed in Azimuth/Elevation/Slant Range. Reference kinematics
    // are found in the Source element.
    LOS_MeasurementWithUncertaintyType los_az_el = 1;
    // Measurements provided in the equatorial coordinate system expressed as
    // Right Ascension/Declination/Range.
    EquatorialKinematicsType los_equatorial = 2;
    // Indicates kinematics expressed in one of several orbital kinematics
    // frames/standards.
    OrbitalKinematicsChoiceType orbital = 3;
    // Indicates kinematics expressed according to the World Geodetic System (WGS)
    // frame/standard.
    KinematicsType wgs = 4;
    // Indicates kinematics expressed according to the Earth-Centered, Earth-Fixed
    // frame/standard.
    ECEF_KinematicsType ecef_kinematics = 5;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.002.002.001
message LOS_MeasurementWithUncertaintyType {
  // Indicates the timestamp at which the LOS was measured or last known to be
  // correct.
  // xsd type: DateTimeType (pattern .+Z)
  string timestamp = 1;
  // Specifies the coordinate system for which the sibling Azimuth and Elevation
  // elements are referenced, e.g. body, NED, inertial frame.
  LOS_MeasurementEnum reference = 2;
  // This indicates the Capability that defines the reference frame for the LOS
  // unit vector when the Capability Enumeration is used in the Reference
  // element.
  optional CapabilityID_Type capability_id = 3;
  // This indicates the component that defines the reference frame boresight for
  // the cone angle measurements.
  optional ComponentID_Type component_id = 4;
  // Indicates LOS measurement types. List size for this element is based on
  // "Select All That Apply" condition.
  repeated MeasurementTypeEnum measurement_type = 5;
  // Indicates the values of the collected measurements.
  LOS_MeasurementType measurement = 6;
  // Indicates the variance and covariance associated with the collected
  // measurements. The error source type allows for specifying values for three
  // types: Root Mean Square, Random or Bias.
  optional LOS_MeasurementUncertaintyErrorSourcesType uncertainty = 7;
}

// Enumeration indicating the type of measurement within a report.
enum MeasurementTypeEnum {
  MEASUREMENT_TYPE_ENUM_UNSPECIFIED = 0;
  MEASUREMENT_TYPE_ENUM_RANGE = 1;
  MEASUREMENT_TYPE_ENUM_AZIMUTH = 2;
  MEASUREMENT_TYPE_ENUM_ELEVATION = 3;
  MEASUREMENT_TYPE_ENUM_COSCONE = 4;
  MEASUREMENT_TYPE_ENUM_RANGE_RATE = 5;
  MEASUREMENT_TYPE_ENUM_AZIMUTH_RATE = 6;
  MEASUREMENT_TYPE_ENUM_ELEVATION_RATE = 7;
  MEASUREMENT_TYPE_ENUM_TDOA = 8;
  MEASUREMENT_TYPE_ENUM_FDOA = 9;
}

// This describes the line of sight with respect to the celestial sphere. It
// contains both the line of sight measurements in the equatorial coordinate
// system and corresponding covariance matrix.
// uci_version: 001.000.000.000
message EquatorialKinematicsType {
  // Contains the line of sight measurements in the equatorial coordinate
  // system: Right Ascension, Declination and Range.
  EquatorialCoordinatesType equatorial_coordinates = 1;
  // Contains the covariance matrix for the line of sight measurement in the
  // equatorial coordinate system.
  optional EquatorialCoordinatesCovarianceType equatorial_coordinates_covariance = 2;
}

// This describes the line of sight with respect to the equatorial system:
// Right Ascension, Declination and Range. These coordinates map the line of
// sight to the celestial sphere.
// uci_version: 001.000.000.000
message EquatorialCoordinatesType {
  // Indicates the date of reference for the vernal equinox direction.
  optional YearOfEquinoxEnum year_of_equinox = 1;
  // The angle measured eastward along the celestial equator, from the vernal
  // equinox. The vernal equinox is defined as the intersection between the
  // celestial equator and the ecliptic, associated with the sun's ascending
  // node.
  // xsd type: AnglePositiveType
  optional double right_ascension = 2;
  // The angular distance to the object measured North or South from the
  // celestial equator.
  // xsd type: AngleHalfType
  optional double declination = 3;
  // An observed range value from the sensor.
  // xsd type: DistanceType
  optional double range = 4;
}

// Indicates the date which applies to the corresponding equinox. Equinox is
// defined as the intersection between the celestial equator and the ecliptic,
// associated with the sun's ascending node.
enum YearOfEquinoxEnum {
  YEAR_OF_EQUINOX_ENUM_UNSPECIFIED = 0;
  YEAR_OF_EQUINOX_ENUM_MEME_J2000 = 1;
  YEAR_OF_EQUINOX_ENUM_MEME_B1950 = 2;
  YEAR_OF_EQUINOX_ENUM_TETE_OF_YEAR = 3;
  YEAR_OF_EQUINOX_ENUM_TETE_OF_DATE = 4;
  YEAR_OF_EQUINOX_ENUM_TEME_OF_DATE = 5;
}

// This describes the covariance matrix of the line of sight with respect to
// the equatorial coordinate system.
// uci_version: 000.000.000.000
message EquatorialCoordinatesCovarianceType {
  // Right Ascension - Right Ascension covariance term with units of radians
  // squared.
  optional double ra_ra = 1;
  // Right Ascension - Declination covariance term with units of radians squared.
  optional double ra_dec = 2;
  // Right Ascension - Range covariance term with units of radians * meters.
  optional double ra_range = 3;
  // Declination - Declination covariance term with units of radians squared.
  optional double dec_dec = 4;
  // Declination - Range covariance term with units of radians * meters.
  optional double dec_range = 5;
  // Range - Range covariance term with units of meters squared.
  optional double range_range = 6;
}

// This message provides the real-time notification of an OpLine, OpPoint
// OpVolume, and/or OpZone. Since the operational type(s) can be Theater wide
// and go across MissionPlan and Systems this could be the notification of an
// operational type(s) for one System or a set of Systems or all Systems.
// There could be different schedules for each system as well. An operational
// type(s) notification message could be only a partial notification for the
// whole operational type(s) based on System and schedule.
// uci_version: 002.001.003.000
message OpNotificationMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // Indicates the state of the internal software object that the data in the
  // message is based upon. The state of the software object is determined by
  // the publisher. The publisher could be the original/master publisher or an
  // intermediary re-publisher such as a persistence/data manager. This element
  // is not a commanded CRUD operation. It is not an indication of the state of
  // an instance of a message. It is not a mechanism for partial, incremental,
  // or fragmentary publication of a message. It is a signal from a publisher to
  // subscribers. For REMOVED state, in particular, some subscribers will mirror
  // the publisher and treat the message as if the object no longer exists, but
  // others, such as mission recorders, might not (in order to support retaining
  // historical records of activity, for example).
  optional ObjectStateEnum object_state = 2;
  // Contains the message data for OpNotification.
  OpNotificationMDT message_data = 3;
}

// This message provides the real-time notification of an OpLine, OpPoint
// OpVolume, and/or OpZone. Since the operational type(s) can be Theater wide
// and go across MissionPlan and Systems this could be the notification of an
// operational type(s) for one System or a set of Systems or all Systems.
// There could be different schedules for each system as well. An operational
// type(s) notification message could be only a partial notification for the
// whole operational type(s) based on System and schedule.
// uci_version: 002.000.003.000
message OpNotificationMDT {
  // composed xsd extension base NotificationBaseType
  NotificationBaseType base = 1;
  // Indicates the unique ID of the Op* item that is the subject of the
  // notification. For example a notification that an aircraft entered a No Fly
  // zone would have the No Fly OpZone as the Op Subject.
  OpID_ChoiceType op_subject = 2;
  // Indicates whether (TRUE) or not (FALSE) the Op Type schedule is active.
  // This is based on the Op Type main schedule.
  bool schedule_active = 3;
  // Indicates details regarding an asset's interaction with the sibling Op
  // Subject.
  repeated OpInteractingAssetType asset = 4;
  // Indicates a message that is associated with the Notification.
  repeated AssociatedMessageType associated_message = 5;
  // Indicates and extension point for custom notification details.
  optional OpNotificationEXT extension = 6;
}

// Describes details on an asset interacting with an op type.
// uci_version: 000.000.000.000
message OpInteractingAssetType {
  // Indicates the asset that is the subject of the notification. For example a
  // notification that an aircraft entered a No Fly zone would have the
  // aircraft's corresponding UCI EntityID or SystemID as the Asset Subject.
  AssetType identification = 1;
  // Indicates the interaction between the Asset and the Op Subject.
  OpInteractionEnum interaction = 2;
  // Indicates whether (TRUE) or not (FALSE) the Op Subject is applicable to the
  // Asset at the time of the Interaction. For example, an OpZone with a
  // temporal schedule or selective applicability to Systems might not be
  // applicable to a given System/Asset at the time of the Interaction.
  bool schedule_active = 3;
  // Indicates whether (TRUE) or not (FALSE) the Interaction represents is a
  // violation or otherwise unexpected. For example, a System capturing a No Fly
  // zone applicable to it would be considered a violation.
  bool violation = 4;
  // Indicates the time of the sibling Interaction.
  // xsd type: DateTimeType (pattern .+Z)
  string time_stamp = 5;
}

// An enumeration indicating the interaction with an op type.
enum OpInteractionEnum {
  OP_INTERACTION_ENUM_UNSPECIFIED = 0;
  OP_INTERACTION_ENUM_CAPTURE = 1;
  OP_INTERACTION_ENUM_CAPTURE_AND_EXIT = 2;
  OP_INTERACTION_ENUM_EXIT = 3;
}


// uci_version: 002.000.000.000
message ECEF_SensorKinematicsType {
  // Date/Time stamp of the sibling data elements. Date/Time stamps on
  // individual elements of the sibling data take precedence over this element
  // when they are given.
  // xsd type: DateTimeType (pattern .+Z)
  string timestamp = 1;
  // The kinematics of the sensor platform in the Earth-Centered-Earth-Fixed
  // (ECEF) coordinate system, see the WGS84C_3D world model for details.

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.003.000
message PO_CapabilityMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // Indicates the state of the internal software object that the data in the
  // message is based upon. The state of the software object is determined by
  // the publisher. The publisher could be the original/master publisher or an
  // intermediary re-publisher such as a persistence/data manager. This element
  // is not a commanded CRUD operation. It is not an indication of the state of
  // an instance of a message. It is not a mechanism for partial, incremental,
  // or fragmentary publication of a message. It is a signal from a publisher to
  // subscribers. For REMOVED state, in particular, some subscribers will mirror
  // the publisher and treat the message as if the object no longer exists, but
  // others, such as mission recorders, might not (in order to support retaining
  // historical records of activity, for example).
  optional ObjectStateEnum object_state = 2;
  // See annotations in child elements and messages/elements that use this type
  // for details.
  PO_CapabilityMDT message_data = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.003.002
message PO_CapabilityMDT {
  // composed xsd extension base CapabilityBaseType
  CapabilityBaseType base = 1;
  // Indicates an installed PO Capability, its configurable characteristics and
  // its controllability.
  repeated PO_CapabilityType capability = 2;
  // This indicates the type of pointing options that the PO Subsystem can
  // support. List size for this element is based on "Select All That Apply"
  // condition.
  repeated PointingTypeEnum pointing_capability = 3;
  // Indicates all of the subcapabilities that a PO subsystem has available for
  // command and control. Unique configurations can appear multiple times as
  // individual IDs which allows for both: 1. One ID associated with multiple
  // capabilities 2. A unique ID associated with one capability.
  repeated PO_SubCapabilityType sub_capability = 4;
  // Indicates a Subsystem Component that is relevant to command and control of
  // the associated Capability. A Component's characteristics and performance
  // directly influence those of the associated Capability. One or more defined
  // components may have settings/configuration independent with the associated
  // Capability. Independent control of subsystem components as related to
  // capabilities also adds flexibility in the command and control of
  // independent components hosted within a single subsystem. Unique
  // configurations can appear multiple times as individual IDs which allows for
  // both: 1. One ID associated with multiple capabilities 2. A unique ID
  // associated with one capability.
  repeated PO_ComponentType po_component = 5;
  // Allowable range of values for Passive Optical track parameters that can be
  // used to customize target detections. Indicates all of the track options
  // that a PO subsystem has available for command and control. Unique
  // configurations can appear multiple times as individual IDs which allows for
  // both: 1. One ID associated with multiple capabilities 2. A unique ID
  // associated with one capability.
  repeated PO_TrackCapabilityType track_option = 6;
  // This field specifies which type of collection constraints are supported by
  // this sensor. If multiple instances are given, each should be of a different
  // constraint type as indicated by the child element.
  repeated PO_CollectionConstraintsType collection_constraints = 7;
  // Indicates the field of regard or FOR limits to limit the view of the sensor
  // to what it can view from its mounting position on the aircraft. These
  // values represent an available default option that a subsystem is defaulted
  // to perform; settings command can also provide an optional override setting.
  optional FOR_Type capability_for = 8;
  // Indicates the field of regard or FOR limits to protect the sensor from
  // being blinded by the sun or weapon effects(i.e. missile leaving jet). These
  // values represent an available default option that the subsystem is
  // defaulted to perform; settings command can also provide an optional
  // override setting.
  optional FOR_Type capability_thermal_blanking_for = 9;
}


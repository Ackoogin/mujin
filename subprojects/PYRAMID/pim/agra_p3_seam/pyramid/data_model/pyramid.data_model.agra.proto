// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_CAP_ExecutionStatusReportMDT {
  // The ID of the package executing the CAP.
  optional PackageID_Type package_id = 1;
  // Contains the unique ID(s) of the package-level requirements associated with
  // the ongoing CAP activity. This will typically be a package-level
  // PROTECT_CAP Action and/or a package-level CAP Task.
  repeated RequirementInstanceID_ChoiceType package_requirement_id = 2;
  // Percent of the Area of Interest (AOI) currently covered by any vehicle's
  // sensors.
  // xsd type: PercentType
  optional double aoi_coverage = 3;
  // Sensor coverage and time gap metrics of the planned CAP routes over the
  // next racetrack cycle.
  optional MA_CAP_PlanMetrics_Type plan_metrics = 4;
  // Contains a list of CAP statuses from vehicles executing the CAP.
  repeated MA_CAP_ExecutionStatus_Type execution_status = 5;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_CAP_ExecutionStatus_Type {
  // Indicates the System executing CAP.
  SystemID_Type system_id = 1;
  // The unique ID(s) of the vehicle-level requirement associated with the
  // ongoing CAP activity. This will always include a CAP Task and optionally
  // include a PROTECT_CAP Action.
  repeated RequirementInstanceID_ChoiceType requirement_id = 2;
  // Identifies the CAP status of the associated system.
  MA_CAP_Status_Type cap_status = 3;
  // Estimated time of arrival for a given CAP point.
  repeated MA_CAP_EstimatedTOA_Type estimated_toa = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_CAP_Status_Type {
  // Indicates the state of a vehicle executing a CAP task.
  MA_CAP_StateEnum cap_state = 1;
  // This field allows the vehicle to describe the reason why it is changing
  // states.
  // xsd type: VisibleString1024Type (pattern [ -~]{0,1024})
  optional string cap_state_change_reason = 2;
}

// Indicates the system state of a vehicle executing a CAP Task.
enum MA_CAP_StateEnum {
  MA_CAP_STATE_ENUM_UNSPECIFIED = 0;
  MA_CAP_STATE_ENUM_CAP_ENTRY = 1;
  MA_CAP_STATE_ENUM_CAP_IN_PROGRESS = 2;
  MA_CAP_STATE_ENUM_CAP_DRIFT_IN_PROGRESS = 3;
  MA_CAP_STATE_ENUM_CAP_DRIFT_IDLE = 4;
  MA_CAP_STATE_ENUM_CAP_RESET = 5;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_CAP_EstimatedTOA_Type {
  // Indicates which point the TOA applies to.
  MA_CAP_LegIndexEnum point = 1;

  // composed xsd extension base VersionedID_Type
  VersionedID_Type base = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_AssessmentType {
  oneof choice {
    // This element defines the response to a communications pointing plan
    // assessment request.
    CommPointingPlanAssessmentType comm_pointing_plan = 1;
    // This assessment type is utilized to assess predicted capability utilization
    // along a mission planned route.
    CapabilityUtilizationAssessmentType capability_utilization = 2;
    // This element defines the response to a route deconfliction assessment
    // request.
    RouteDeconflictionAssessmentType route_deconfliction = 3;
    // Indicates the results of assessment of vulnerability along a route.
    RouteVulnerabilityMetricsAssessmentType route_vulnerability_metrics = 4;
    // Indicates the results of assessment of threats along a route.
    RouteThreatAssessmentType route_threat_assessment = 5;
    // This element defines the response to a target mobility assessment request.
    TargetMobilityAssessmentType target_mobility = 6;
    // This element defines the response to a vehicle threat assessment request.
    VehicleThreatAssessmentType vehicle_threat_assessment = 7;
    // This element defines the response to a threat nomination assessment.
    ThreatNominationAssessmentType threat_nomination_assessment = 8;
    // This element defines the response to an achievability assessment.
    AchievabilityAssessmentPET achievability_assessment = 9;
    // This element defines the response to a coverage assessment.
    MA_CoverageAssessmentType coverage_assessment = 10;
  }
}

// Base data structure containing both the inputs and outputs for a Comm
// Pointing Assessment.
// uci_version: 003.000.002.000
message CommPointingPlanAssessmentType {
  // This element defines the parameters used in calculating the sibling results.
  optional CommPointingPlanRequestType parameters = 1;
  // This element defines the results of a comm pointing assessment.
  CommPointingPlanDataType data = 2;
}

// The inputs used in generating and/or requesting a Comm Pointing Assessment.
// uci_version: 003.000.002.000
message CommPointingPlanRequestType {
  // Indicates a RoutePlan or parts of a RoutePlan to assess for communications
  // support and pointing.
  repeated RoutePlanReferencesType route_plan = 1;
  // Refers to the level of possible resource windows to consider in the
  // assessment, going from Unconstrained, to what's possibly Available, to only
  // what's planned/requested, and at most restrictive only base the assessment
  // on Approved Allocations.
  CommPointingAssessmentEnum assessment_constraint_level = 2;
  // This element constrains the assessment to the use of all unscheduled,
  // unpurchased, available comm. When Assessment Constraint Level is set to
  // COMM_SCHEDULE_AVAILABILITY, this element is populated concurrently with
  // communication scheduling Requirements Constraints and communication
  // schedule allocation Constraints.
  repeated CommCoverageUserDataType comm_schedule_availability_constraints = 3;
  // This element constrains the assessment to the use of communication
  // requirements that may or may not have been submitted in a
  // CommSchedulingRequest. This assessment type allows communication to be
  // analyzed based on any pending communication purchases or prior to purchase.
  // When Assessment Constraint Level is set to COMM_SCHEDULE_REQUIREMENTS, this
  // element may be populated concurrently with communicationSchedule Allocation
  // Constraints.
  repeated CommSchedulingRequirementID_Type comm_scheduling_requirement_constraints_id = 4;
  // List of external communications resources that have been allocated to
  // Missions. When Assessment Constraint Level is set to
  // COMM_SCHEDULE_ALLOCATIONS, this element is populated by itself in absence
  // of the other constraint types.
  repeated CommScheduleAllocationID_Type comm_schedule_allocation_constraints_id = 5;
  // Identifies the foreign key or keys associated with the assessment resources.
  repeated ForeignKeyType assessment_resource_list = 6;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message RoutePlanReferencesType {
  // Indicates the unique ID of the RoutePlan being referenced.
  RoutePlanID_Type route_plan_id = 1;
  // Indicates the unique ID of the MissionPlan associated with the RoutePlan.
  // If the referenced RoutePlan is part of multiple MissionPlans, this element
  // indicates the specific MissionPlan context desired.
  optional MissionPlanID_Type mission_plan_id = 2;
  // Indicates the unique ID of a Path within the RoutePlan that is being
  // referenced. This element is used if only specific Paths are being
  // referenced, excluding others. If specified, all Segments of the Path are
  // being referenced, in addition to any given by the sibling SegmentID. If
  // this element and the sibling SegmentID are not specified, then all Paths
  // and Segments of the RoutePlan are included in the reference.
  repeated PathID_Type path_id = 3;
  // Indicates the unique ID of a Segment within the RoutePlan that is being
  // referenced in addition to any Segments included in the sibling PathID. This
  // element is used to reference specific Segments of a Path, excluding others
  // in the same Path.
  repeated SegmentID_Type segment_id = 4;
  // Further constrain a RoutePlan to a Time Window or list of specific segments.
  repeated PathConstraintsType constraints = 5;
}

// Specify a section of a path, by time or by segments.
// uci_version: 001.000.000.000
message PathConstraintsType {
  oneof choice {
    // Specify a segment window within a path. The absence of a begin segment
    // indicates the window begins at the first segment within the path. The
    // absence of an end segment indicates the window extends to the end of the
    // path.
    SegmentRangeType segment_window = 1;
    // Specify a time window within a path. The absence of a begin time indicates
    // the window begins at the beginning of the path. The absence of an end time
    // indicates the window extends to the end of the path.
    TimeWindowType time_window = 2;
  }
}

// Specify a contiguous range of segments with a path.
// uci_version: 001.000.000.000
message SegmentRangeType {
  // Specify a segment within a path at which the segment range begins. If not
  // specified, the range begins at the first segment in the Path.
  optional SegmentID_Type begin_segment_id = 1;
  // Specify a segment within a path at which the segment range ends. If not
  // specified, the range ends at the last segment in the Path.
  optional SegmentID_Type end_segment_id = 2;
}

// Indicates the scope of possible resource schedule constraints to consider
// when a pointing plan is generated based on the communication assessment
// requests. See enumerated values for more details.
enum CommPointingAssessmentEnum {
  COMM_POINTING_ASSESSMENT_ENUM_UNSPECIFIED = 0;
  COMM_POINTING_ASSESSMENT_ENUM_UNCONSTRAINED = 1;
  COMM_POINTING_ASSESSMENT_ENUM_COMM_SCHEDULE_AVAILABILITY = 2;
  COMM_POINTING_ASSESSMENT_ENUM_COMM_SCHEDULE_REQUESTED = 3;
  COMM_POINTING_ASSESSMENT_ENUM_COMM_SCHEDULE_REQUIRMENTS = 4;
  COMM_POINTING_ASSESSMENT_ENUM_COMM_SCHEDULE_ALLOCATIONS = 5;
}

// The results of an assessment that determines Comms coverage for a set of
// Mission Plans.
// uci_version: 001.000.002.000
message CommPointingPlanDataType {
  // The List of Time bounded Windows supported by this Pointing Plan.
  repeated PointingPlanWindowType window = 1;
}

// A Time bounded list of Pointing Vector commands that are to be used to
// support an external communication allocation.
// uci_version: 001.000.002.000
message PointingPlanWindowType {
  // This is a reference to possible communication allocation the Vector is
  // associated with.
  optional CommScheduleAllocationID_Type allocation_id = 1;
  // Represents the communication system that is providing support for this
  // communication allocation.
  optional CommSystemID_Type comm_system_id = 2;
  // Indicates RoutePlan or Plans or portion of a RoutePlan supported by this
  // Pointing Plan.
  repeated RoutePlanReferencesType route_plan = 3;
  // Represents the list of time bounded Pointing Vectors that will need to be
  // commanded to the communication system to support a set of mission plans.
  repeated CommPointingType comm_pointing = 4;
}

// The ID type for UCI IDs that correspond to Pointing plans.
// uci_version: 001.000.002.000
message CommPointingType {
  // Indicates an identifier for the communication system to which the pointing
  // is related.
  optional CommResourceType comm_system = 1;
  // The position of the external resource providing communication at the time
  // of the pointing vector effectivity.
  optional Point3D_Type comm_system_position = 2;
  // The position of the external resource providing comm. 4D Point will be used
  // here to provide the time the command should be effected.
  Point4D_Type pointing_vector_centerpoint = 3;
  // The list of different coverage parameters based on bandwidth/service type.
  repeated PointingVectorParameterType pointing_vector_parameters = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.001.000.000
message PointingVectorParameterType {
  // The name of this bandwidth or service type.
  // xsd type: DataRateType
  optional uint32 data_rate = 1;
  // The expected loss parameter at which communications cannot be maintained
  // for this service/bandwidth type. A common range is [0,1000].
  // xsd type: DoubleNonNegativeType
  optional double loss_parameter = 2;
  // The expected footprint of transmissions from the communication equipment
  // being pointed, for this service/bandwidth type.
  optional EllipseType ellipse = 3;
}

// Base data structure containing both the inputs and outputs for a Capability
// Utilization Assessment.
// uci_version: 003.000.003.000
message CapabilityUtilizationAssessmentType {
  // This element defines the parameters used in calculating the sibling results.
  optional CapabilityUtilizationRequestType parameters = 1;
  // This element defines the results of a capability utilization assessment.
  repeated CapabilityAssessmentDataType data = 2;
}

// The inputs used in generating and/or requesting a Capability Utilization
// Assessment.
// uci_version: 002.000.001.000
message CapabilityUtilizationRequestType {
  // This element is used if the assessment should be generated in regards to
  // only certain threats. If this element is not specified then all entities
  // are considered.
  repeated EntityID_Type entity_id = 1;
  // Represents a list of tasks (beyond those allocated to the constraint
  // MissionPlan if defined) that should also be assessed as ad hoc relative to
  // the baseline Mission Plan.
  repeated TaskID_InclusionType task_identifier = 2;
  // Represents a list of capability commands (beyond those allocated to the
  // constraint MissionPlan if defined) that should also be assessed as ad hoc
  // relative to the baseline Mission Plan. This is depicted by the
  // CapabilityCommandBaseType with the expectation that the user will populate
  // with more specific {Capability}Command types.
  repeated CapabilityCommandBaseType capability_command = 3;
  // Represents a list of activity commands(beyond those allocated to the
  // constraint MissionPlan if defined) that should also be assessed as ad hoc
  // relative to the baseline Mission Plan. This is depicted by the
  // ActivityCommandBaseType with the expectation that the user will populate
  // with more specific {Capability}Command types.
  repeated ActivityCommandBaseType activity_command = 4;
  // Indicate which system or systems to assess. Optionally provide additional
  // information about the position of each system and any capabilities to
  // consider in conjunction with a specified system.
  repeated SystemRoutePlanSpecificationType system_to_assess = 5;
  // Indicate additional systems for the assessment, that are not to be
  // assessed. Optionally provide additional information about the position of
  // each system and any capabilities to consider in conjunction with a
  // specified system.
  repeated SystemRoutePlanSpecificationType supporting_system = 6;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message TaskID_InclusionType {
  // Identifies the unique ID of a task that should be assessed as ad hoc
  // relative to the baseline Mission Plan.
  TaskID_Type task_id = 1;
  // Indicates if the task should be included (INCLUSION) in the assessment.
  InclusionEnum include = 2;
}

// A type that specifies information about a System and its RoutePlan.
// uci_version: 001.000.000.000
message SystemRoutePlanSpecificationType {
  // Indicates the unique ID of the System.
  SystemID_Type system_id = 1;
  // Specify a RoutePlan or parts of a RoutePlan to assess.
  RoutePlanReferencesType route_plan = 2;
  // Specify capabilities for the system. If not specified, use the capabilities
  // last reported by the System.
  optional SystemCapabilitySpecificationType capability_constraints = 3;
}

// Specification of a group of capabilities, either explicitly, via a common
// Subsystem, or by type.
// uci_version: 001.001.000.000
message SystemCapabilitySpecificationType {
  // Reference a set of capabilities by a common subsystem.
  repeated SubsystemSpecificationType subsystem_reference = 1;
  // Reference a specific set of capabilities. If a subsystem was specified in
  // the sibling SubsystemReference that has this capability, the capabilities
  // considered for that subsystem will be limited to the capabilities specified
  // here. For capabilities not included in any specified Subsystems, they are
  // to be considered in addition to all capabilities included in the specified
  // subsystems.
  repeated CapabilitySpecificationType capability_reference = 2;
  // Reference a set of capabilities by a common type. Can be used in
  // conjunction with it's sibling elements (i.e. Capabilities on this Subsystem
  // of CapabilityType). List size for this element is based on "Select All That
  // Apply" condition.
  repeated CapabilityTypeEnum capability_type = 3;
}

// Specification of a subsystem, its components, and an MDF applied to that
// Subsystem.
// uci_version: 000.000.000.000
message SubsystemSpecificationType {
  // Unique ID of the Subsystem being referenced.
  SubsystemID_Type subsystem_id = 1;
  // List specific components of a subsystem, if applicable.
  repeated ComponentID_Type component_id = 2;
  // Specify an MDF to apply to this subsystem.
  optional MDF_ID_Type mdf_id = 3;
}

// Specification of a capability, its supporting capabilities, and an MDF
// applied to that Capability.
// uci_version: 000.000.000.000
message CapabilitySpecificationType {
  // Unique ID of the Capability being referenced.
  CapabilityID_Type capability_id = 1;
  // List specific supporting capabilities for this capability, if applicable.
  repeated SupportCapabilityID_Type support_capability_id = 2;
  // Specify an MDF to apply to this capability.
  optional MDF_ID_Type mdf_id = 3;
}

// The results of an assessment that determines capability usage during along
// a RoutePlan.
// uci_version: 003.000.003.000
message CapabilityAssessmentDataType {
  // Indicates the unique ID of the System to which the assessment applies.
  SystemID_Type system_id = 1;
  // A Capability assessment is a position along the assessed RoutePlan coupled
  // with the estimated Capability use from both a command (Tasks and Capability
  // commands) and status (Activity) perspective.
  repeated CapabilityAssessmentPointType assessment = 2;
}

// A point and/or point along a RoutePlan at which a capability is expected to
// be used by a System.
// uci_version: 003.001.003.000
message CapabilityAssessmentPointType {
  // This element indicates the approximate future geospatial position of the
  // System and time at which the sibling Command or Commands begin, for
  // assessment purposes only. The position reflects the System's future
  // progress along its planned route at the time of the command, and does not
  // imply the System will navigate to that location. When multiple sibling
  // Command or Commands are given, this element indicates the time and position
  // of the first in the sequence. Position data may be specified as either a
  // geospatial point or relative to a separately defined reference frame.
  InertialStateRelativeType inertial_state = 1;
  // If the sibling InertialState is in reference to a RoutePlan, this element
  // indicates the RoutePlan containing that point.
  optional RoutePlanReferencesType route_plan_reference = 2;
  // Indicates a planned Task or estimated [Capability]Command assessed to occur
  // at the sibling Position.
  repeated CapabilityAssessmentActionType action = 3;
  // Contains a list of estimated activities. Each activity contains a flag to
  // indicate whether this activity has been approved vs a not yet approved
  // activity being included in the assessment.
  repeated CapabilityAssessmentActivityDetailsType activity_details = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.001.000
message CapabilityAssessmentActionType {
  oneof choice {
    // Estimated Capability usage (in terms of Tasks) at the specified assessment
    // position.
    TaskID_Type planned_task_id = 1;
    // Indicates estimated Capability usage (in terms of Capability commands) at
    // the specified assessment position. This element is of an abstract
    // polymorphic extension type; the CapabilityCommandBaseType PET
    // (PolymorphicExtensionType) used here is an abstract base type that is the
    // parent type for Capability category specific child types. This abstract
    // element must be replaced by a Capability category-specific type to be valid.
    CapabilityCommandBaseType estimated_capability_command = 2;
    // Indicates estimated Supporting Capability usage (in terms of Supporting
    // Capability commands) at the specified assessment position. This element is
    // of an abstract polymorphic extension type; the
    // SupportCapabilityCommandBaseType PET (PolymorphicExtensionType) used here
    // is an abstract base type that is the parent type for Supporting Capability
    // category specific child types. This abstract element must be replaced by a
    // Supporting Capability category-specific type to be valid.
    SupportCapabilityCommandBaseType estimated_supporting_capability_command = 3;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.002.000
message CapabilityAssessmentActivityDetailsType {
  // This flag, when set to true, indicates that estimated activity is for a
  // task / command which has been either accepted by the subsystem or is on the
  // mission plan, in an approved state, and is scheduled to be commanded to the
  // subsystem. When this flag is false, it indicates that the estimated
  // activity is a proposed task / command and is associated with an ad hoc task
  // or command given in a CapabilityAssessmentRequest message.
  bool activity_approved = 1;
  // Contains either the estimated activity details of the capability or the
  // estimated capability details for supporting capability.
  CapabilityAssessmentActivityType activity = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.002.000
message CapabilityAssessmentActivityType {
  oneof choice {
    // Indicates estimated Capability usage (in terms of Capability Activity
    // report) at the specified assessment position. The ActivityBaseType used for
    // this element should be replaced by a Capability category-specific type to
    // be valid.
    ActivityBaseType estimated_capability_activity = 1;
    // Indicates estimated Supporting Capability usage (in terms of Supporting
    // Capability status) at the specified assessment position. The
    // SupportCapabilityStatusBaseType used for this element should be replaced by
    // a Supporting Capability category-specific type to be valid.
    SupportCapabilityStatusBaseType estimated_supporting_capability_report = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.002.000
message SupportCapabilityStatusBaseType {
  // Indicates the unique ID of the Support Capability corresponding to this
  // message.
  SupportCapabilityID_Type support_capability_id = 1;
  // Indicates the availability of the Support Capability corresponding to this
  // message.
  AvailabilityInfoType availability_info = 2;
}

// Base data structure containing both the inputs and outputs for a Route
// Deconfliction Assessment.
// uci_version: 001.000.002.000
message RouteDeconflictionAssessmentType {
  // This element defines the parameters used in calculating the sibling results.
  optional RouteDeconflictionRequestType parameters = 1;
  // This element defines the results of a route deconfliction assessment.
  repeated RouteDeconflictionAssessmentDataType data = 2;
}

// The inputs used in generating and/or requesting a Route Deconfliction
// Assessment.
// uci_version: 001.000.000.000
message RouteDeconflictionRequestType {
  // This element defines the list of route plans that should be considered by
  // this deconfliction assessment.
  repeated RouteDeconflictionRoutePlanType route_plan_to_consider = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message RouteDeconflictionRoutePlanType {
  // This element identifies a RoutePlan or parts of a RoutePlan to assess that
  // should be considered during the deconfliction assessment.
  RoutePlanReferencesType route_plan = 1;
  // If this element is TRUE, this RoutePlan may be modified to fix conflicts
  // upon invocation of this function. If this element is FALSE, then the
  // associated RoutePlan cannot be modified.
  bool modify_route_plan = 2;
}

// The results of an assessment that determines if Mission Plans intersect.
// uci_version: 001.000.002.000
message RouteDeconflictionAssessmentDataType {
  // This element identifies the segments of routes that conflict in time and
  // space.
  repeated RouteConflictsType route_conflicts = 1;
  // This element the unique ID of a new RoutePlan which resolves the conflicts
  // that were found.
  repeated RoutePlanID_Type updated_route_plan_id = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.002.000
message RouteConflictsType {
  // This element identifies a set of segments that conflict in time and space.
  repeated SegmentConflictsType segment_conflicts = 1;
  // This element specifies whether this route conflict was resolved or not.
  bool resolved = 2;
  // This element identifies the location where a route conflict occurs.
  repeated Point2D_Type conflict_point = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message SegmentConflictsType {
  // Indicates the unique ID of the RoutePlan being referenced.
  RoutePlanID_Type route_plan_id = 1;
  // Indicates the unique ID of the MissionPlan associated with the RoutePlan.
  // If the referenced RoutePlan is part of multiple MissionPlans, this element
  // indicates the specific MissionPlan context desired.
  optional MissionPlanID_Type mission_plan_id = 2;
  // Indicates the unique ID of a Path with a conflicted PathSegment.
  PathID_Type path_id = 3;
  // Indicates the unique ID of a PathSegment that has a conflict.
  SegmentID_Type path_segment_id = 4;
}

// Base data structure containing both the inputs and outputs for a Route
// Vulnerability Assessment.
// uci_version: 001.000.002.000
message RouteVulnerabilityMetricsAssessmentType {
  // This element defines the parameters used in calculating the sibling results.
  optional RouteVulnerabilityMetricsRequestType parameters = 1;
  // This element defines the results of a route vulnerability assessment.
  repeated RouteVulnerabilityMetricsAssessmentDataType data = 2;
}

// The inputs used in generating and/or requesting a Route Vulnerability
// Assessment.
// uci_version: 001.000.000.000
message RouteVulnerabilityMetricsRequestType {
  // composed xsd extension base ThreatAssessmentRequestType
  ThreatAssessmentRequestType base = 1;
  // This element specifies if the exposure events elements should be generated
  // and included in the resulting assessment.
  bool generate_exposure_events = 2;
  // This element specifies the probability of exposure that estimated exposure
  // calculations must exceed to be counted as an actual exposure event. The
  // length of time of exposure events are used to calculate Composite and
  // Cumulative exposure times.
  // xsd type: PercentType
  optional double exposure_event_probability_threshold = 3;
  // This element specifies if the probability metrics elements should be
  // generated and included in the resulting assessment.
  bool generate_probability_metrics = 4;
  // This element specifies if the probability of vehicle surviving route should
  // be generated and included in the resulting assessment.
  bool generate_survivability_probability = 5;
}

// The inputs used in generating and/or requesting a Route Threat Assessment.
// uci_version: 001.000.000.000
message ThreatAssessmentRequestType {
  // Specifies the threat capability to assess (i.e. - detection method or
  // technology).
  ThreatCapabilityEnum threat_capability = 1;
  // This element specifies whether the assessment results should include
  // suppression of the sibling ThreatCapability or not. The INCLUDE_BOTH option
  // indicates that the results should include assessments with and without
  // suppression.
  AssessmentSuppressionEnum threat_suppression = 2;
  // This element indicates a specific threat Entity to assess. If omitted, all
  // relevant threat Entities are assessed. If any are given, only they are
  // assessed.
  repeated EntityID_Type threat_entity_id = 3;
  // This element specifies the time interval at which assessment results should
  // be rolled up in the assessment results.
  // xsd type: DurationType
  optional string assessment_interval = 4;
  // Indicates a System or Systems to assess given their RoutePlan and available
  // capabilities.
  repeated SystemRoutePlanSpecificationType system_to_assess = 5;
  // Indicates additional systems to be considered for the assessment, but are
  // not assessed.
  repeated SystemRoutePlanSpecificationType supporting_system = 6;
}

// Specifies whether the assessment generates results including threat
// suppression.
enum AssessmentSuppressionEnum {
  ASSESSMENT_SUPPRESSION_ENUM_UNSPECIFIED = 0;
  ASSESSMENT_SUPPRESSION_ENUM_WITHOUT_SUPPRESSION = 1;
  ASSESSMENT_SUPPRESSION_ENUM_WITH_SUPPRESSION = 2;
  ASSESSMENT_SUPPRESSION_ENUM_INCLUDE_BOTH = 3;
}

// The results of an assessment that determines vulnerability of a system
// along a Route.
// uci_version: 001.000.002.000
message RouteVulnerabilityMetricsAssessmentDataType {
  // ID of the System that was assessed.
  optional SystemID_Type system_id = 1;
  // Indicates the unique ID of the RoutePlan being referenced.
  RoutePlanID_Type route_plan_id = 2;
  // Indicates the unique ID of the MissionPlan associated with the RoutePlan.
  // If the referenced RoutePlan is part of multiple MissionPlans, this element
  // indicates the specific MissionPlan context desired.
  optional MissionPlanID_Type mission_plan_id = 3;
  // Indicates the results of an assessment on the vulnerability of a system
  // along a Route.
  repeated PathVulnerabilityType path = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.002.000
message PathVulnerabilityType {
  // This element represents the unique identifier of the path associated with
  // this assessment.
  PathID_Type path_id = 1;
  // A list of path segment vulnerability metrics. Each path segment contains
  // its own vulnerability metrics, determined by the potential threats that are
  // located near that path segment.
  repeated PathVulnerabilitySegmentType path_segment = 2;
  // The vulnerability metrics of this path, determined by the potential threats
  // that are located near the path, without the effects of suppression.
  optional VulnerabilityMetricsType metrics_without_suppression = 3;
  // The vulnerability metrics of this path, determined by the potential threats
  // that are located near the path, including the effects of suppression.
  optional VulnerabilityMetricsType metrics_with_suppression = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.002.000
message PathVulnerabilitySegmentType {
  // This element represents the unique identifier of a path segment associated
  // with this path.
  SegmentID_Type path_segment_id = 1;
  // The vulnerability metrics of this path segment, determined by the potential
  // threats that are located near the path segment, without the effects of
  // suppression.
  optional VulnerabilityMetricsType metrics_without_suppression = 2;
  // The vulnerability metrics of this path segment, determined by the potential
  // threats that are located near the path segment, including the effects of
  // suppression.
  optional VulnerabilityMetricsType metrics_with_suppression = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.002.000
message VulnerabilityMetricsType {
  // Defines the detection by an Early Warning radar or by the acquisition radar
  // associated with a Surface-to-Air Missile (SAM) site.
  optional RouteVulnerabilityType acquisition_metrics = 1;
  // Defines the exposure to a SAM site's tracking (missile guidance) radar
  // system.
  optional RouteVulnerabilityType track_metrics = 2;
  // Defines missile launch opportunities, defined as a tracking radar exposure
  // that occurs at a time when a valid kinematic missile firing solution exists.
  optional RouteVulnerabilityType launch_metrics = 3;
  // Defines missile intercept opportunities, defined as a launch opportunity
  // followed by a sufficient time period of tracking/guidance radar detection
  // to guide the missile all the way to intercept, with no detection dropouts
  // longer than the missile's coast time.
  optional RouteVulnerabilityType intercept_metrics = 4;
  // Estimated cumulative probability of survival based on the above metrics.
  // xsd type: PercentType
  optional double probability_of_survival = 5;
  // Defines the probability of exposure that estimated exposure calculations
  // must exceed to be counted as an actual exposure event. The length of time
  // of exposure events are used to calculate Composite and Cumulative exposure
  // times.
  // xsd type: PercentType
  optional double exposure_event_probability_threshold = 6;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.002.000
message RouteVulnerabilityType {
  // Provides the time duration along the route or path segment that have any
  // amount of exposure time for any threats. For example, if five threats are
  // all causing one second of exposure time and all five are on the exact same
  // second along the route, the CompositeExposureTime is one second.
  // xsd type: DurationType
  string composite_exposure_time = 1;
  // Provides the sum of all exposure time incurred due to all threats for the
  // route path or segment that this data is associated with.
  // xsd type: DurationType
  string cumulative_exposure_time = 2;
  // Provides the exposure costs incurred due to a particular threat for the
  // route path or segment that this data is associated with.
  repeated ThreatExposureType threat_exposure = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.002.000
message ThreatExposureType {
  // Specifies the unique Entity that is causing the exposure being described.
  EntityID_Type entity_id = 1;
  // Provides the time duration along the route or path segment that have
  // exposure time for the specified threat.
  // xsd type: DurationType
  string exposure_time = 2;
  // Provides a method for defining exposure events along a route path or
  // segment into time segments against a particular threat. An exposure event
  // is defined as a time ranges during which exposure to a particular threat
  // occurs.
  repeated DateTimeRangeType exposure_event = 3;
  // Defines the threat exposure event positions along a route path against a
  // particular threat as a set of locations; sibling ExposureEvent provides
  // exposure with respect to time. An exposure event position is defined as a
  // start point to an end point during which exposure to a particular threat
  // occurs.
  repeated Point2D_RangeType exposure_event_position = 4;
  // Provides a method for breaking the exposure probabilities along a route
  // path or segment into time segments against a particular threat.
  repeated ThreatExposureProbabilityType probability_metrics = 5;
}

// Defines a start and end point relative to WGS-84 ellipsoid.
// uci_version: 001.000.002.000
message Point2D_RangeType {
  // This element represents the absolute begin/start position.
  Point2D_Type begin = 1;
  // This element represents the absolute end position.
  Point2D_Type end = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message ThreatExposureProbabilityType {
  // This element defines the second that was used to calculate the probability
  // of exposure.
  // xsd type: DateTimeType (pattern .+Z)
  string time_index = 1;
  // Defines the probably of exposure for the given time segment (second)
  // incurred due to the associated threat.
  // xsd type: PercentType
  double probability_of_detection = 2;
}

// Base data structure containing both the inputs and outputs for a Route
// Threat Assessment.
// uci_version: 002.000.002.000
message RouteThreatAssessmentType {
  // This element defines the parameters used in calculating the sibling results.
  optional ThreatAssessmentRequestType parameters = 1;
  // This element defines the results of a route threat assessment.
  repeated RouteThreatAssessmentDataType data = 2;
}

// The results of an assessment that determines vulnerability of a system
// along a Route.
// uci_version: 002.000.002.000
message RouteThreatAssessmentDataType {
  // Indicates the unique ID of the RoutePlan whose assessment results are given.
  RoutePlanID_Type route_plan_id = 1;
  // Indicates the unique ID of the MissionPlan associated with the RoutePlan.
  // If the referenced RoutePlan is part of multiple MissionPlans, this element
  // indicates the specific MissionPlan context desired.
  optional MissionPlanID_Type mission_plan_id = 2;
  // Indicates the unique ID of the System that was assessed.
  optional SystemID_Type system_id = 3;
  // Threat Assessment data for each path that was assessed.
  repeated PathThreatAssessmentType path = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message PathThreatAssessmentType {
  // Indicates the unique ID of the specified path in the route associated with
  // the threat assessments.
  PathID_Type path_id = 1;
  // This element provides the assessment of a path segment.
  repeated PathSegmentThreatAssessmentType path_segment = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.001.002.000
message PathSegmentThreatAssessmentType {
  // Indicates the unique ID of the specified path segment in the route
  // associated with the threat assessments.
  SegmentID_Type path_segment_id = 1;
  // An array of route threat assessments specifying location along route with
  // all corresponding threat detection probabilities for the included vehicle
  // location.
  repeated PredictedThreatAssessmentRelativeType predicted_threat_assessment = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.001.000
message PredictedThreatAssessmentRelativeType {
  // Position is required to indicate the vehicle's position along the route at
  // which assessments are being specified. Position data may be specified as
  // either a geospatial point or relative to a separately defined reference
  // frame.
  InertialStateRelativeType inertial_state_relative = 1;
  // Optional array of detection probabilities for each track (if any) with a
  // detection probability greater than 0 for the vehicle at the sibling
  // Position.
  repeated ThreatAssessmentSystemType threat_assessment = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message ThreatAssessmentSystemType {
  // ID of threat which is detecting the vehicle.
  EntityID_Type entity_id = 1;
  // This element provides the predicted threat assessment of a mission plan
  // without suppression.
  optional ThreatAssessmentMetricsType without_suppression = 2;
  // This element provides the predicted threat assessment of a mission plan
  // with suppression.
  optional ThreatAssessmentMetricsType with_suppression = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.001
message ThreatAssessmentMetricsType {
  // Defines the detection chance. The probability of detection is conversion of
  // the calculated signal to noise ratio via a Swerling model.
  optional ThreatAssessmentProbabilityType acquisition = 1;
  // Defines the track chance. The probability of track uses scan period, chance
  // of detection, and required number of detections in a frame to determine if
  // the radar tracker has initiated/maintained a track.
  optional ThreatAssessmentProbabilityType track = 2;
  // Defines missile launch opportunities, defined as a tracking radar exposure
  // that occurs at a time when a valid kinematic missile firing solution exists.
  optional ThreatAssessmentProbabilityType launch = 3;
  // Defines missile intercept opportunities, defined as a launch opportunity
  // followed by a sufficient time period of tracking/guidance radar detection
  // to guide the missile all the way to intercept, with no detection dropouts
  // longer than the missile's coast time.
  optional ThreatAssessmentProbabilityType intercept = 4;
  // Defines the probability the vehicle will not survive the intercept
  // opportunity. The probability should be a function of intercept probability,
  // and potentially predicted intercept geometry, depending on algorithm
  // fidelity. The individual kill probabilities shall be able to be combined to
  // determine the overall chance of the vehicle surviving the route.
  optional ThreatAssessmentProbabilityType kill = 5;
  // Defines the detection characteristics of the vehicle as a "BugSplat".
  repeated DetectionEnvelopeType detection_envelope = 6;
  // Defines the threat zone around an entity.
  optional ThreatZoneType threat_zone = 7;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message ThreatAssessmentProbabilityType {
  // Probability of the metric.
  // xsd type: PercentType
  optional double effective_probability = 1;
  // Provides the time duration since the last position that the exposure has
  // happened.
  // xsd type: DurationType
  optional string exposure_time = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message DetectionEnvelopeType {
  // The effective probability of detect for this DetectionEnvelope.
  // xsd type: PercentType
  optional double effective_probability = 1;
  // Defines an azimuth cut in the global horizontal plane through the 3D
  // detection envelope. Can be layered to construct the 3D detection envelope.
  repeated DetectionRangeRingType detection_range_ring = 2;
}

// Defines an azimuth cut in the global horizontal plane through the 3D
// detection envelope.
// uci_version: 001.000.000.000
message DetectionRangeRingType {
  // Indicates altitude offset between the vehicle and the sensor for which this
  // azimuth cut applies.
  // xsd type: AltitudeType
  double altitude_offset = 1;
  // Inclusive value of start of the azimuth sweep for the sibling
  // DetectionRange element. Assumed to be 0 if absent.
  // xsd type: AnglePositiveType
  optional double start_azimuth = 2;
  // Inclusive value of the end of the azimuth sweep for the sibling
  // DetectionRange element. Assumed to be 2PI (360 degrees) if absent.
  // xsd type: AnglePositiveType
  optional double end_azimuth = 3;
  // A list of detection ranges in meters which define a detection envelope.
  // Azimuth 0 is considered to be off the nose of the aircraft. Range values
  // are assumed to be evenly spaced between the start and end azimuth, going
  // clockwise.
  // xsd type: DistanceType
  repeated double detection_range = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.001.000
message ThreatZoneType {
  // Geospatial zone where the associated Entity can threaten the vehicle.
  optional AreaChoiceType threat_zone_area = 1;
  // Specifies how severe the associated Entity is violating the detection
  // envelope.
  optional RiskPrioritizationEnum detection_envelope_violation_severity = 2;
  // The effective probability of detect for thiis TheatZoneArea.
  // xsd type: PercentType
  optional double effective_probability = 3;
}

// Base data structure containing both the inputs and outputs for a Target
// Mobility Assessment.
// uci_version: 002.000.002.000
message TargetMobilityAssessmentType {
  // This element defines the parameters used in calculating the sibling results.
  optional TargetMobilityRequestType parameters = 1;
  // This element defines the results of a target mobility assessment.
  TargetMobilityAssessmentDataType data = 2;
}

// The inputs used in generating and/or requesting a Target Mobility
// Assessment.
// uci_version: 001.000.002.000
message TargetMobilityRequestType {
  // This element specifies the entity that the mobility zone is being requested
  // for.
  EntityID_Type entity_id = 1;
  // This element defines the conditions of the terrain/sea that is to be used
  // when generating the assessment.
  optional WeatherEffectsType weather_effects = 2;
  // This element is used to override the last updated location and time that is
  // in the Entity message and can be used to analyze the possible mobility of a
  // track.
  optional Point4D_Type entity_assessment_location = 3;
}

// The results of an assessment that determines the possible area a system
// could have traveled.
// uci_version: 002.000.002.000
message TargetMobilityAssessmentDataType {
  // Indicates the target is an Entity and provides its ID.
  EntityID_Type entity_id = 1;
  // This element that defines theoretical distance that a specified mobile
  // track could have moved over a period of time.
  TimedZoneType mobility_zone = 2;
}

// Base data structure containing both the inputs and outputs for a Vehicle
// Threat Assessment.
// uci_version: 002.000.002.000
message VehicleThreatAssessmentType {
  // This element defines the parameters used in calculating the sibling results.
  optional VehicleThreatAssessmentRequestType parameters = 1;
  // This element defines the results of a vehicle threat assessment.
  repeated VehicleThreatAssessmentDataType data = 2;
}

// The inputs used in generating and/or requesting a Vehicle Threat Assessment.
// uci_version: 001.000.002.001
message VehicleThreatAssessmentRequestType {
  // This element specifies whether the assessment should generate results which
  // include suppression or not. The INCLUDE_BOTH option indicates that the
  // results should include assessments with and without suppression.
  AssessmentSuppressionEnum assessment_suppression = 1;
  // Specifies the type of assessment required (i.e. - detection method or
  // technology).
  ThreatCapabilityEnum threat_capability = 2;
  // This element identifies the vehicle that should be used for threat
  // assessment.
  repeated SystemPositionSpecificationType system_to_assess = 3;
  // This element identifies other vehicles that are to be considered for the
  // assessment, but not assessed (i.e. include a vehicle with a supporting
  // capability, but there is no need to assess the supporting vehicle, just the
  // vehicle being supported).
  repeated SystemPositionSpecificationType supporting_system = 4;
  // This element is used if the threat assessment should be generated in
  // regards to only certain threats. If this element is not specified then all
  // entities are considered.
  repeated EntityID_Type entity_id = 5;
  // The presence of this element indicates a request to generate a detection
  // envelope. The sub-elements may specify parameters for how to generate it.
  optional DetectionEnvelopeParametersType generate_detection_envelope = 6;
  // The presence of this element indicates a request to generate a threat zone.
  optional bool generate_threat_zone = 7;
}

// A type that specifies information about a system including its position
// represented as a point.
// uci_version: 001.000.002.000
message SystemPositionSpecificationType {
  // Indicates the unique ID of the System.
  SystemID_Type system_id = 1;
  // Constrain the location of the vehicle to a specific point. If no position
  // constraint is provided, the assessment should consider the inertial state
  // of the vehicle at the time the assessment is performed.
  optional InertialStateType position_constraints = 2;
  // Specify capabilities for the system. If not specified, use the capabilities
  // last reported by the System.
  optional SystemCapabilitySpecificationType capability_constraints = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message DetectionEnvelopeParametersType {
  // The requested effective probability of detect for the generated
  // DetectionEnvelope. Multiple elements indicates a request to generate
  // multiple envelopes.
  // xsd type: PercentType
  repeated double effective_probability = 1;
  // Whether to generate the detection as vehicle-centric (true) or
  // threat-centric (false). Note that these will be the same unless accounting
  // for phenomena such as terrain occlusion.
  bool vehicle_centric = 2;
}

// The results of an assessment that determines vulnerability of a system at a
// given point.
// uci_version: 002.000.002.000
message VehicleThreatAssessmentDataType {
  // This element identifies the System to which this assessment applies.
  SystemID_Type system_id = 1;
  // Optional array of detection probabilities for each track (if any) with a
  // detection probability greater than 0 for the vehicle at the position
  // specified within the AssessmentRequest message.
  repeated PredictedThreatAssessmentType predicted_threat_assessment = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message PredictedThreatAssessmentType {
  // Position is required to indicate the vehicle's position along the route at
  // which assessments are being specified.
  InertialStateType inertial_state = 1;
  // Optional array of detection probabilities for each track (if any) with a
  // detection probability greater than 0 for the vehicle at the sibling
  // Position.
  repeated ThreatAssessmentSystemType threat_assessment = 2;
}

// Base data structure containing both the inputs and outputs for a Threat
// Nomination Assessment.
// uci_version: 001.000.000.000
message ThreatNominationAssessmentType {
  // This element defines the parameters used in calculating the sibling results.
  optional ThreatNominationAssessmentRequestType parameters = 1;
  // This element defines the results of a threat nomination assessment.
  ThreatNominationAssessmentDataType data = 2;
}

// The inputs used in generating and/or requesting a Threat Nomination
// Assessment.
// uci_version: 001.000.000.000
message ThreatNominationAssessmentRequestType {
  // Systems to be considered for the assessment.
  repeated SystemRoutePlanSpecificationType system_to_consider = 1;
  // This element specifies whether the assessment should generate results which
  // include suppression or not. The INCLUDE_BOTH option indicates that the
  // results should include assessments with and without suppression.
  AssessmentSuppressionEnum assessment_suppression = 2;
  // A list of entities that can be utilized during nomination (zero entities
  // assumes that all entities can be nominated).
  repeated EntityID_Type entity_id = 3;
}

// The results of an assessment that determines which entity poses the highest
// threat to a system or systems.
// uci_version: 001.000.000.000
message ThreatNominationAssessmentDataType {
  // This element defines the threat nomination result without suppression.
  optional ThreatNominationResultType nomination_without_suppression = 1;
  // This element defines the threat nomination result with suppression.
  optional ThreatNominationResultType nomination_with_suppression = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message ThreatNominationResultType {
  // The best entity to nominate based on the overall reduction in exposure and
  // flight time.
  EntityID_Type entity_id = 1;
  // A list of threat nomination results for each individual system.
  repeated EntityNominationResultType entity_nomination_results = 2;
  // The percent reduction in the exposures for all systems if the nominated
  // threat is removed from the mission.
  // xsd type: PercentType
  double global_exposure_reduction = 3;
  // The percent reduction in the flight time for all systems if the nominated
  // threat is removed from the mission.
  // xsd type: PercentType
  optional double global_flight_time_reduction = 4;
}

// The ID type for UCI IDs that correspond to entities.
// uci_version: 001.000.000.000
message EntityNominationResultType {
  // The unique ID of the System.
  SystemID_Type system_id = 1;
  // The percent reduction in the exposure of the current system if the
  // nominated threat is removed from the mission.
  // xsd type: PercentType
  double exposure_reduction = 2;
  // The percent reduction in the flight time of the current system if the
  // nominated threat is removed from the mission.
  // xsd type: PercentType
  optional double flight_time_reduction = 3;
}

// The polymorphic extension point for all Achievability Assessment types.
// uci_version: 003.000.002.000
message AchievabilityAssessmentPET {
  // composed xsd extension base AssessmentStatusType
  AssessmentStatusType base = 1;
  // This element specifies the mission plan references that was use to assess
  // achievability.
  optional RoutePlanReferencesType route_plan_reference = 2;
  // Indicates the level of achievability of the assessment.
  AchievabilityEnum achievability = 3;
  // Provides details about an unachievable assessment.
  optional CannotComplyType not_achievable_reason = 4;
}

// Contains general assessment status data for achievability and performance
// assessment types.
// uci_version: 003.000.001.000
message AssessmentStatusType {
  // The status of the assessment.
  AssessmentStatusEnum assessed_status = 1;
  // Indicates the temporal constraints for which the assessment is valid.
  optional TimingConstraintsType assessment_valid_timing = 2;
}

// This enumerated type represents the assessment state for an assessment item.
enum AssessmentStatusEnum {
  ASSESSMENT_STATUS_ENUM_UNSPECIFIED = 0;
  ASSESSMENT_STATUS_ENUM_NOT_ASSESSED = 1;
  ASSESSMENT_STATUS_ENUM_ASSESSED = 2;
  ASSESSMENT_STATUS_ENUM_ASSESSING = 3;
  ASSESSMENT_STATUS_ENUM_SKIPPED_BY_OPERATOR = 4;
}

// Indicates the level of achievability of an assessment. See enumerated
// values for more details.
enum AchievabilityEnum {
  ACHIEVABILITY_ENUM_UNSPECIFIED = 0;
  ACHIEVABILITY_ENUM_ACHIEVABLE = 1;
  ACHIEVABILITY_ENUM_PARTIALLY_ACHIEVABLE = 2;
  ACHIEVABILITY_ENUM_NOT_ACHIEVABLE = 3;
}

// Base data structure containing both the inputs and outputs for a coverage
// assessment.
// uci_version: 000.000.000.000
message MA_CoverageAssessmentType {
  // This element defines the parameters used in calculating the sibling results.
  optional MA_CoverageAssessmentRequestType parameters = 1;
  // This element defines the results of a capability utilization assessment.
  MA_CoverageAssessmentDataType data = 2;
}

// The inputs used in generating and/or requesting a CoverageAssessmentRequest
// uci_version: 000.000.000.000
message MA_CoverageAssessmentRequestType {
  // Indicate which system or systems to assess and their associated CAP Tasks.
  // Optionally provide additional information about any capabilities to
  // consider in conjunction with a specified system.
  repeated MA_CoverageAssessmentSourceType system_to_assess = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_CoverageAssessmentSourceType {
  // Indicates the unique ID of the system.
  SystemID_Type system_id = 1;
  // Specify capabilities for the system. If not specified, use the capabilities
  // last reported by the system.
  repeated SystemCapabilitySpecificationType capability_constraints = 2;
  // Reference to the CAP requirement assigned to the system that is being
  // assessed.
  optional RequirementInstanceID_ChoiceType requirement_id = 3;
  // Indicates the unique ID of the *Plan(s) associated with this assessment.
  repeated PlanReferenceID_ChoiceType plan_id = 4;
}

// The results of an assessment that determines sensor coverage.
// uci_version: 000.000.000.000
message MA_CoverageAssessmentDataType {
  // The metrics that are the result of a coverage assessment.
  MA_CAP_PlanMetrics_Type metrics = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_CAP_PlanMetrics_Type {
  // Indicates the estimated percent of time that at least one vehicle is on the
  // downrange/hot leg.
  optional MA_CAP_EstimatedDownrangeSensorCoverage_Type estimated_downrange_sensor_coverage = 1;
  // Indicates estimated time ranges when no vehicles are on the downrange/hot
  // leg.
  repeated MA_CAP_EstimatedDownrangeTimeGap_Type estimated_downrange_time_gap = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_CAP_EstimatedDownrangeSensorCoverage_Type {
  // Percent of time that at least one vehicle is on the downrange/hot leg.
  // xsd type: PercentType
  double percent = 1;
  // Indicates timespan the estimated downrange/hot leg coverage applies to.
  DateTimeRangeType applicable_timespan = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_CAP_EstimatedDownrangeTimeGap_Type {
  // Time gap when no vehicles are on the downrange/hot leg.
  // xsd type: DurationType
  string time_gap = 1;
  // Indicates timespan the estimated downrange/hot leg time gap applies to.
  DateTimeRangeType applicable_timespan = 2;
}

// See the annotation in the associated message for an overall description of
// the message and this type.
// uci_version: 000.000.000.000
message MA_AssessmentRequestMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // See annotations in child elements and messages/elements that use this type
  // for details.
  MA_AssessmentRequestMDT message_data = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_AssessmentRequestMDT {
  // composed xsd extension base RequestBaseType
  RequestBaseType base = 1;
  // This element indicates the AnalysisRoute to use when performing the
  // Assessment specified in sibling Category.
  optional AnalysisRouteID_Type analysis_route_id = 2;
  // Indicates whether this request for assessment is a request for a single
  // reply, or a request for periodic assessments with a corresponding request
  // to cease periodic assessments.
  RepeatEnum request_frequency_type = 3;
  // If requesting periodic assessments, this field specifies the amount of time
  // that should elapse between the periodic assessments, i.e. the repetition
  // time interval of the assessment.
  // xsd type: DurationType
  optional string request_frequency_period = 4;
  // If TRUE this element specifies that the response to this message should be
  // an AssessmentRequest and an Assessment message. If FALSE the assessment
  // data that is generated should be bundled inside the response. In some cases
  // there isn't a native message and the results can only be reported via
  // AssessmentRequestStatus.
  bool results_in_assessment_message = 5;
  // Indicates the assessment category for requested assessment.
  MA_AssessmentRequestType category = 6;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_AssessmentRequestType {
  oneof choice {
    // This element is used to specify that communication requests should be
    // assessed, and a Pointing Plan should be generated based on the requests.
    // The native message is CommPointingPlan.
    CommPointingPlanRequestType comm_pointing_plan = 1;
    // This assessment type is utilized to assess predicted Capability utilization
    // along a mission planned route.
    CapabilityUtilizationRequestType capability_utilization = 2;
    // This element is used to specify that an assessment of the conflicts along a
    // route is requested.
    RouteDeconflictionRequestType route_deconfliction = 3;
    // This element is used to specify that detection metrics need to be
    // recomputed along a route due to threats. The data generated for detection
    // metrics are different from threat assessments because detection metrics
    // break down the exposure numbers to a much greater detail in order to
    // generate a route than a threat assessment will.
    RouteVulnerabilityMetricsRequestType route_vulnerability_metrics = 4;
    // This element is used to specify that an assessment of the threat exposure
    // along a route is requested.
    ThreatAssessmentRequestType route_threat_assessment = 5;
    // This element is used to specify that an assessment of the possible zone an
    // Entity could have moved within some given period of time.
    TargetMobilityRequestType target_mobility = 6;
    // This element is used to specify that a threat assessment is being requested
    // for the current position of a vehicle.
    VehicleThreatAssessmentRequestType vehicle_threat_assessment = 7;
    // This element is used to specify that a threat nomination assessment is
    // being requested for the given mission plans and entities.
    ThreatNominationAssessmentRequestType threat_nomination_assessment = 8;
    // This element is used to specify that achievability assessment is being
    // requested for the given type of AchievabilityRequest.
    AchievabilityAssessmentRequestPET achievability_assessment = 9;
    // This element is used to specify that assessment is being requested for
    // sensor coverage.
    MA_CoverageAssessmentRequestType coverage_assessment = 10;
  }
}

// The polymorphic extension point for all Achievability request types.
// uci_version: 003.000.001.000
message AchievabilityAssessmentRequestPET {
  // This element specifies the mission plan information to use to validate
  // achievability. If empty all mission plans and all paths are considered.
  repeated RoutePlanReferencesType route_plan_reference = 1;
  // Indicates temporal constraints regarding when the assessment should be
  // performed.
  optional TimingConstraintsType timing_constraints = 2;
  // This field is used to override the global value specified in the
  // AssessmentRequest message. If requesting periodic assessments, this field
  // specifies the amount of time that should elapse between the periodic
  // assessments, i.e. the repetition time interval of the assessment.
  // xsd type: DurationType
  optional string request_frequency_period = 3;
}

// See the annotation in the associated message for an overall description of
// the message and this type.
// uci_version: 000.000.000.000
message MA_AssessmentRequestStatusMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // See annotations in child elements and messages/elements that use this type
  // for details.
  MA_AssessmentRequestStatusMDT message_data = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_AssessmentRequestStatusMDT {
  // composed xsd extension base RequestStatusBaseType
  RequestStatusBaseType base = 1;
  // Intermediate status information for an assessment. Typically populated when
  // sending periodic statuses of PROCESSING, but can also store start and
  // finish times for this assessment.
  optional CompletionStatusType completion_status = 2;
  // This element indicates the results of the assessment. It is optional based
  // on whether the assessment request specified that the response should result
  // in native message.
  optional MA_AssessmentType assessment = 3;
  // This element indicates any assessments that failed to complete. It is used
  // to indicate details about why a specific assessment target failed to
  // process.
  repeated IncompleteProcessingType incomplete_assessment = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_AuthorizationMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // Indicates the state of the internal software object that the data in the
  // message is based upon. The state of the software object is determined by
  // the publisher. The publisher could be the original/master publisher or an
  // intermediary re-publisher such as a persistence/data manager. This element
  // is not a commanded CRUD operation. It is not an indication of the state of
  // an instance of a message. It is not a mechanism for partial, incremental,
  // or fragmentary publication of a message. It is a signal from a publisher to
  // subscribers. For REMOVED state, in particular, some subscribers will mirror
  // the publisher and treat the message as if the object no longer exists, but
  // others, such as mission recorders, might not (in order to support retaining
  // historical records of activity, for example).
  optional ObjectStateEnum object_state = 2;
  // See annotations in child elements and messages/elements that use this type
  // for details.
  MA_AuthorizationMDT message_data = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.003.001
message MA_AuthorizationMDT {
  // composed xsd extension base DataRecordBaseType
  DataRecordBaseType base = 1;
  // Indicates the unique ID of the authorization.
  AuthorizationID_Type authorization_id = 2;
  // Indicates the unique ID of the User being granted authorization to task.
  // User types are SystemID, OperatorRoleID, or UserIdentifier
  MA_UserType user_identifier = 3;
  // Indicates the unique ID of the System which the User, given in the sibling
  // UserIdentifier element, is authorized to task.
  SystemID_Type system_id = 4;
  // This element indicates the precedence level at which the User is authorized
  // to task the System. The larger the number, the higher the precedence. Any
  // Tasks or Commands created by the User must not exceed this precedence level.
  uint32 precedence = 5;
  // Indicates authorization to send Plan Activation commands.
  repeated MA_PlanAuthorizationType by_plan_activation = 6;
  // Indicates which Requirement (Effect, Action, Task, [Capability]Command,
  // Response) execution/performance related activities are authorized.
  optional MA_RequirementAuthorizationType by_requirement_execution = 7;
  // Indicates which types of data messages are authorized to be created,
  // modified or deleted.
  optional MA_DataModificationAuthorizationType by_data_modification = 8;
  // Indicates which types of data are authorized to be activated.
  optional MA_DataActivationAuthorizationType by_data_activation = 9;
  // Indicates which types of request messages are authorized to be sent.
  optional MA_OperatorRequestAuthorizationType by_operator_request = 10;
  // This element indicates authorization to create, modify and dissolve teams.
  optional bool package_authorization = 11;
  // This element indicates authorization to send settings commands.
  optional MA_SettingsModficationAuthorizationType by_platform_settings_modification = 12;
  // This element indicates the time range during which the Authorization
  // applies. More specifically, this is the time range in which the User must
  // create/submit Tasks in order for them to be allocated to the specified
  // System. If omitted, the Authorization is applicable until removed.
  optional DateTimeRangeType authorized_time = 13;
  // This choice type indicates the area over which the authorization applies.
  // It contains either a zone defined in this messge or the ID of an existing
  // OpZone
  optional MA_AuthorizedZoneChoiceType authorized_area = 14;
}

// The ID type for UCI IDs that correspond to authorizations.
// uci_version: 000.000.000.000
message AuthorizationID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_UserType {
  oneof choice {
    // This choice type is used in the context of RBAC to specify an operator role
    // to tie a set of authorized permissions to.
    OperatorRoleID_Type operator_role_id = 1;
    // This choice type is used to specify a system ID to tie a set of authorized
    // permissions to.
    SystemID_Type system_id = 2;
    // This choice type is used to specify a User Identifier to tie a set of
    // authorized permissions to.
    // xsd type: UserIdentifierType (pattern [0-9a-zA-Z]{1,25})
    string user_identifier = 3;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.001
message MA_PlanAuthorizationType {
  oneof choice {
    // This element indicates that all plan types are authorized to be activated
    // with the exception of the enumeration values listed in the permissionsType.
    MA_PlanActivationPermissionsType authorized_except_for = 1;
    // This element indicates that all plan types are NOT authorized to be
    // activated with the exception of the enumeration values listed in the
    // permissionsType.
    MA_PlanActivationPermissionsType unauthorized_except_for = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.001
message MA_PlanActivationPermissionsType {
  // Indicates the set of ByMissionPlan activation commands that are authorized.
  // List size allows for identifying those MissionPlans whose subordinate
  // MissionPlans are either included in the activation (TRUE) or not (FALSE)
  // via the CommandSubordinatePlans setting.
  repeated MissionPlanActivationSettingType by_mission_plan = 1;
  // Indicates which *Plan parts are authorized to be activated.
  optional MA_PlanPartsType by_plan_parts = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.001
message MA_RequirementAuthorizationType {
  oneof choice {
    // This element inidcates that all requirement types are authorized to be

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message EntityIdentityType {
  // composed xsd extension base IdentityConfidenceType
  IdentityConfidenceType base = 1;
  // Indicates that this identity data was reported by the asset and not
  // gathered by sensors.
  optional bool self_reported_identity = 2;
  // Indicates that the reported identity is currently being resolved with
  // conflicting ID data.
  optional bool difference_indicator = 3;
  // Indicates the time at which the Identity was most recently updated.
  // xsd type: DateTimeType (pattern .+Z)
  string identity_timestamp = 4;
  // Provides identity qualifications to augment identification and associated
  // processing of the Entity.
  repeated QualifyingTagsType qualifying_tags = 5;
  // Indicates time related events that are associated to the entity such as
  // when activated or when operational. The multiplicity is limited to N-1
  // options where NONE is an event that has no value, thus removed from list of
  // available options.
  repeated TimeFunctionType associated_time = 6;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.001.000.000
message QualifyingTagsType {
  // Used to provide qualifying amplification to the reported object; Value of 0
  // indicates a simple notification that the object is elevated as "special"
  // with respect to its defined Standard Identity, other values provide
  // implementation specific qualification. A common range is [0,4094].
  optional uint32 qualified_special = 1;
  // Used to indicate the reported object should be treated with special care –
  // tainted; Simple notification that object is tagged with some definition of
  // "special" with respect to processing requirements.
  // xsd type: EmptyType (pattern [A-Za-z]{0})
  optional string process_special = 2;
  // Used to indicate that reported object should force through display or
  // processing filters and be "included"; Indicate that the object should
  // override any filtering associated with qualifying system id.
  // xsd type: EmptyType (pattern [A-Za-z]{0})
  optional string filter_override = 3;
  // Used to indicate the reported object should be treated as a high interest
  // object with respect to processing requirements.
  // xsd type: EmptyType (pattern [A-Za-z]{0})
  optional string high_interest = 4;
  // Indicates if this object should be automatically retained if updates aren't
  // received.
  // xsd type: EmptyType (pattern [A-Za-z]{0})
  optional string retain = 5;
  // Identifies the system that specified the qualification.
  SystemMessageIdentifierType qualifying_source = 6;
}

// Identifies a system and service as an object in a message.
// uci_version: 000.000.000.000
message SystemMessageIdentifierType {
  // The system that should process a message.
  SystemID_Type system_id = 1;

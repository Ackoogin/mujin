// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.003.003.002
message PO_ActivityType {
  // composed xsd extension base ActivityBaseType
  ActivityBaseType base = 1;
  // Indicates the actual time when the Activity started.
  // xsd type: DateTimeType (pattern .+Z)
  optional string actual_start_time = 2;
  // Indicates the actual time when the Activity stopped.
  // xsd type: DateTimeType (pattern .+Z)
  optional string actual_completion_time = 3;
  // Flag indicating whether or not all products (e.g. ProductLocation) and
  // messages (e.g. Entity) expected to be produced by this activity have been
  // output.
  optional bool all_products_and_messages_produced = 4;
  // Indicates the field of view (FOV), the pointing and angular extents, of the
  // Activity. The FOV is referenced to the North-East-Down coordinate frame.
  // For optical systems that use a Turret SupportCapability for pointing, body
  // referenced azimuth and elevation can be found in the Turret messages. For
  // optical Capabilities with multiple lens and zoom possibilities, this is the
  // overall effective FOV of the Activity.
  optional FOV_ActivityType fov = 5;
  // Provides the dynamic pointing report on the line-of-sight for the PO
  // Subsystem. If the PO Subsystem does not possess its own pointing
  // capability, then the TurretSlaved Type is used. FixedPointing is used to
  // point to a predetermined location defined by its Enum values.
  optional PO_TargetType pointing_activity_report = 6;
  // Indicates detailed PO sensor Subcapabilities settings that will be used for
  // this Activity. If the Activity is interactive and the Component controls
  // and settings support manual interaction, these settings can be changed via
  // PO_Command. Activity to optimize the captured imagery and tracks. If
  // omitted, the Activity is subject to the default/current settings when the
  // Activity starts.
  repeated PO_SubCapabilitySettingsType sub_capability_status = 7;
  // Indicates detailed PO sensor control states and settings that will be used
  // for this Activity. If the Activity is interactive and the Component
  // controls and settings support manual interaction, these settings can be
  // changed via PO_Command. Activity to optimize the captured imagery. If
  // omitted, the Activity is subject to the default/current Component state
  // when the Activity starts.
  repeated PO_ComponentStatusType component_status = 8;
  // Indicates detailed PO sensor collection constraints that will be used for
  // this Activity. If the Activity is interactive and the Component collection
  // constraints support manual interaction, these settings can be changed via
  // PO_Command. Activity to optimize the captured imagery. If omitted, the
  // Activity is subject to the default/current constraints when the Activity
  // starts.
  optional PO_CollectionConstraintsStatusType collection_constraints_status = 9;
  // Indicates the track status associated with the current activity for a
  // passive optical track option capability. If the Activity is interactive and
  // the track controls and settings support manual interaction, these settings
  // can be changed via PO_Command. Activity to optimize the captured tracks. If
  // omitted, the Activity is subject to the default/current track settings when
  // the Activity starts.
  optional PO_TrackDetailsType track_options_status = 10;
  // Indicates the current status of the product output associated with this
  // Activity.
  repeated ProductOutputCapabilityStatusImageryType product_output_status = 11;
  // Indicates the current status of a PO search activity.
  optional SearchTrackActivityDetailsType search_activity = 12;
  // Indicates the current status of a PO track activity.
  optional PO_TrackActivityType track_activity = 13;
  // Indicates the current constraint condition for field of regard limits.
  optional FOR_Enum for_state = 14;
  // Indicates the current thermal field of regard constraint condition to
  // protect the sensor from being blinded by the sun or weapon effects(i.e.
  // missile leaving jet).
  optional FOR_Enum thermal_blanking_for_state = 15;
  // Indicates the repetition of the Activity. If omitted, the Activity is not
  // repetitive.
  optional RepetitionType repetition = 16;
}


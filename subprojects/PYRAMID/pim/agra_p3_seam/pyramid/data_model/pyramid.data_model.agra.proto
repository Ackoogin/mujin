  // the sibling ActivityCategory element.
  uint32 activity = 2;
  // Indicates the MIL-STD-6016 list/category of the sibling Activity element.
  // Derived from MIL-STD-6016; see MIL-STD-6016 DFI/DUI 275/004 for additional
  // details. Each environment has a corresponding set of specific types.
  EnvironmentEnum activity_category = 3;
  // Indicates a custom activity that is supplemental to the sibling Activity
  // element. This element is expected only if a custom activity, which isn't
  // included or fully described by MIL-STD-6016 can be identified. In that
  // case, the sibling Activity element indicates "no statement" or the closest
  // match and this element completes the activity characterization.
  optional ForeignKeyType custom_activity = 4;
}

// See annotations in child elements and messages/elements that use this type

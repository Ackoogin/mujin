  double azimuth_rate = 1;
  // Indicates the rate of movement of the LOS in elevation.
  // xsd type: AngleRateType
  double elevation_rate = 2;
  // Indicates the rate of change of the Roll.
  // xsd type: AngleRateType
  optional double roll_rate = 3;
}


  repeated ElectronicProtectionOptionsDefaultType electronic_protection_options = 2;
  // See enumeration annotations for details.
  optional EmissionBalanceEnum emission_balance_state = 3;
  // Specifies which messages are to be output by the Capability as the result
  // of capability commands. See enumerated type annotations for details. List
  // size for this element is based on "Select All That Apply" condition.
  repeated AMTI_MessageOutputsEnum message_output = 4;

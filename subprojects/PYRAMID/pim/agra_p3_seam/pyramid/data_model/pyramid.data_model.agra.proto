// uci_version: 003.001.002.000
message DataUpdateRequestMDT {
  // composed xsd extension base RequestBaseType
  RequestBaseType base = 1;
  // The service that should handle this request.
  ServiceID_Type service_id = 2;
  // Selects if the request should go to all data producers or only the source
  // of the selected type.
  DataUpdateOriginatorType originator = 3;
  // List of parameters describing the specific kind or kinds of data that are
  // being requested.
  repeated DataUpdateRequestType request_type = 4;
}

// Description of the data producer or producers that are expected to respond
// to a data update request.
// uci_version: 000.000.000.000
message DataUpdateOriginatorType {
  oneof choice {
    // Request data from all producers of the requested data.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string all_producers = 1;
    // Request data from the last producer of the requested object.
    DataUpdateSourceType source = 2;
  }
}

// Description of data producer or producers that should service a data update
// request.
// uci_version: 000.000.000.000
message DataUpdateSourceType {
  // The external Systems that need to respond to the request.
  repeated SystemID_Type system_id = 1;
}

// Parameters describing the specific kind of data that is being requested.
// uci_version: 000.000.000.000
message DataUpdateRequestType {
  oneof choice {
    // Indicates the type of message data being requested and filter parameters
    // applicable. The QueryMessageType here consists of an optional list of
    // MessageTypes to limit the query and an abstract polymorphic extension
    // point/element; the QueryPET (PolymorphicExtensionType) used here is an
    // abstract base type as a polymorphic extension point consisting of number of
    // extended types.
    QueryMessageType query = 1;
    // Extension point to allow for application specific queries that cannot be
    // specified using QueryPETs.
    QuerySpecificDataPET query_specific_data = 2;
  }
}

// A data request for the messages matching the specified Message types and
// Query. The Message types evaluated by the Query is restricted to only the
// ones specified by the MessageType field. If neither MessageType nor Query
// is specified, then this query will yield all messages retained by the
// responder.
// uci_version: 001.000.001.000
message QueryMessageType {
  // The Message types that the Query should be performed for. If not present,
  // then the Query should be performed for all Message types.
  repeated MessageTypeEnum message_type = 1;
  // The query used to select the messages or IDs that are returned by the
  // corresponding status. If not present, then the operation should return the
  // Message types specified by the MessageType field, or all messages if no
  // MessageType is specified.
  optional QueryPET query = 2;
}

// The polymorphic extension point of all queries.
// uci_version: 000.000.000.000
message QueryPET {
}

// Base class to support polymorphic extensions that define
// application-specific queries not definable via QueryPETs. Available
// extension types include: IJMS_QuerySpecificDataType,
// Link11QuerySpecificDataType, Link16TN_QuerySpecificDataType,
// NATO_Link1QuerySpecificDataType, SelectionQuerySpecificDataType.
// uci_version: 000.000.000.000
message QuerySpecificDataPET {
}


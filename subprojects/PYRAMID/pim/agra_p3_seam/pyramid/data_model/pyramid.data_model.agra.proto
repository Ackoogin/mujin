// This message is used as an event to generate a position estimate
// assessment. This message should always have the ResultsInAssessmentMessage
// set to FALSE because position estimates are reported using PositionReport
// instead of Assessment.
// uci_version: 001.001.001.000
message CommAssetEstimationRequestMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // See annotations in child elements and messages/elements that use this type
  // for details.
  CommAssetEstimationRequestMDT message_data = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message CommAssetEstimationRequestMDT {
  // composed xsd extension base RequestBaseType
  RequestBaseType base = 1;
  // The ID of the System whose state should be estimated as part of this
  // request.
  CommAssetID_Type comm_asset_id = 2;
  // The type of estimation requested and resulting messages to produce as part
  // of this request. List size for this element is based on "Select All That
  // Apply" condition.
  repeated CommAssetEstimationMessageEnum request_type = 3;
  // A System Estimation Request can be used in 2 ways: 1.) SINGLE - A request
  // for a single estimation of system state. The invoked service function is
  // called once and returns one set of responses (one per requested message
  // type). The request should not persist beyond the single call, and can be
  // deleted immediately upon successful completion. 2.) PERIODIC / STOP - A
  // request to periodically estimate system state and periodically publish the
  // requested messages. A request for periodic estimates should continue to
  // execute until the request is updated with this value set to STOP.
  RepeatEnum request_frequency_type = 4;
  // Indicates whether the position estimate should be published via the
  // "native" message or contained within the CommAssetEstimationRequestStatus
  // message. For example, if TRUE, a successful CommAssetEstimationRequest
  // would result in CommAssetPositionReport messages being published. If FALSE,
  // the CommAssetPositionReport would be embedded in
  // CommAssetEstimationRequestStatus.
  bool results_in_native_message = 5;
  // For a PERIODIC estimation, the time step determines the rate at which the
  // estimation should be published. For a SINGLE estimation, the time step
  // determines the number of estimations that will occur between the start and
  // the end.
  // xsd type: DurationType
  optional string time_step = 6;
  // In absence of this element, the estimator service should always use the
  // state last reported by the asset. It should also use the time associated
  // with the last report as the basis of estimation.
  // xsd type: DateTimeType (pattern .+Z)
  optional string estimation_start = 7;
  // This element can be used to specify the time to stop estimation. In absence
  // of this element, the estimator service should continue estimating the state
  // until requested to stop.
  // xsd type: DateTimeType (pattern .+Z)
  optional string estimation_end = 8;
}

// Indicates the type of messages to produce in response to the communication
// asset's requested position estimation. The requested estimation could be
// specifying a response in a PositionReport message
// (COMM_ASSET_POSITION_REPORT) or an Assessment message (COMM_ASSET).
enum CommAssetEstimationMessageEnum {
  COMM_ASSET_ESTIMATION_MESSAGE_ENUM_UNSPECIFIED = 0;
  COMM_ASSET_ESTIMATION_MESSAGE_ENUM_COMM_ASSET_POSITION_REPORT = 1;
  COMM_ASSET_ESTIMATION_MESSAGE_ENUM_COMM_ASSET = 2;
}

// See the annotation in the associated message for an overall description of
// the message and this type.
// uci_version: 003.000.003.000
message CommAssetEstimationRequestStatusMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // See annotations in child elements and messages/elements that use this type
  // for details.
  CommAssetEstimationRequestStatusMDT message_data = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message CommAssetEstimationRequestStatusMDT {
  // composed xsd extension base RequestStatusBaseType
  RequestStatusBaseType base = 1;
  // The result of the communication asset estimation. If a SINGLE response was
  // requested there will be multiple results for each timestep. This field will
  // be populated if ResultsInNativeMessage=true and the RequestStatus is
  // COMPLETED.
  repeated CommAssetEstimationResultType estimation_result = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message CommAssetEstimationResultType {
  // Indicates details about a specific communication asset within a particular
  // communication system in the CommAsset message format. This is optional and
  // populated only if the CommAssetEstimationRequest specified
  // ResultsInNativeMessage=FALSE so the communication asset estimation result
  // would be embedded in the CommAssetEstimationRequestStatus message.
  optional CommAssetMDT comm_asset = 1;
  // Indicates the current position of a communication asset in the
  // CommAssetPositionReport message format. This is optional and populated only
  // if the CommAssetEstimationRequest specified ResultsInNativeMessage=FALSE so
  // the communication asset estimation result would be embedded in the
  // CommAssetEstimationRequestStatus message.
  optional CommAssetPositionReportMDT comm_asset_position_report = 2;
  // Indicates the timestamp of the estimation result. This is optional and
  // populated only if the CommAssetEstimationRequest specified
  // ResultsInNativeMessage=FALSE so the communication asset estimation result
  // would be embedded in the CommAssetEstimationRequestStatus message.
  // xsd type: DateTimeType (pattern .+Z)
  string timestamp = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.002.000
message CommAssetPositionReportMDT {
  // The unique ID of the System corresponding to this PositionReport.
  CommAssetID_Type comm_asset_id = 1;
  // This is the free-text, generally human-readable, name of the System or
  // Resource corresponding to this PositionReport. This name isn't necessarily
  // unique.
  // xsd type: VisibleString256Type (pattern [ -~]{0,256})
  optional string display_name = 2;
  // This element defines whether this message was generated from actual
  // communication asset data or an estimation service.
  SystemSourceEnum source = 3;
  // This enumerated element represents the domain/environment in which the
  // communication asset is currently operating.
  EnvironmentEnum current_operating_domain = 4;
  // This element represents the inertial state of the communication asset.
  InertialStateType inertial_state = 5;
  // Indicates the angle by which the Inertial Navigation System (INS) rotates
  // the geodetic frame about the vertical axis of the North-East-Down (NED)
  // coordinate frame to avoid the introduction of a singularity at the North
  // pole when it is calculating location for the communication asset. A
  // rotation from true North towards East is reported as a positive angle.
  // xsd type: AngleType
  optional double wander_angle = 6;
  // Indicates the heading in relationship to magnetic North for the
  // communication asset.
  // xsd type: AngleType
  optional double magnetic_heading = 7;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.002.001
message InertialStateType {
  // Physical location of the referenced item in geospatial coordinates. The use
  // of the timestamp in this context represents the time the positional data
  // was last measured.
  Point4D_Type position = 1;
  // Uncertainty of the physical location of the referenced item.
  optional UncertaintyType position_uncertainty = 2;
  // Vehicle's velocity in the current operating domain of the system. Air
  // vehicle components are in True Air Speed.
  optional Velocity3D_Type domain_velocity = 3;
  // Representation of the vehicle's ground velocity as directional speed
  // components.
  optional Velocity2D_Type ground_velocity = 4;
  // The vehicle's acceleration in the current operating domain of the system.
  optional Acceleration3D_Type domain_acceleration = 5;
  // Euler Angle Sequence describing the orientation of the vehicle in the order
  // yaw, pitch, roll. The angles are given in a locally level, North-East-Down
  // coordinate system centered on the vehicle.
  optional OrientationType orientation = 6;
  // Euler Angle Sequence describing the rate of orientation change of the
  // vehicle in the order yaw, pitch, roll. The angles are given in a locally
  // level, North-East-Down coordinate system centered on the vehicle.
  optional OrientationRateType orientation_rate = 7;
  // The level of geodetic position uncertainty as estimated by the unit
  // reporting its position via Link 16, where higher number indicates lower
  // uncertainty and better quality. Values range from 0 to 15. (Based on
  // MIL-STD-6016 DFI: 283 DUI: 001).
  // xsd type: Link16_PositionQualityType
  optional uint32 link16_position_quality = 8;
}


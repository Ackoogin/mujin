  // to perform multistatic operations.
  bool multistatic_emitter_data_required = 1;
  // When present, indicates the Capability will only have the ability to
  // perform multistatic operations. When not present, indicates the Capability
  // has the ability to perform both multistatic and monostatic operations.
  // xsd type: EmptyType (pattern [A-Za-z]{0})

// Collection metrics used for describing the progress of an activity (sensor
// collection) being performed by a MTI sensor.
// uci_version: 002.000.002.000
message MTI_ActivityStatusDetailType {
  // composed xsd extension base MTI_ActivityStatusBaseType
  MTI_ActivityStatusBaseType base = 1;
  // Maximum estimated Effective Radiated Power (ERP) at the face of the array
  // used for this activity attempt. If this attempt requires multiple beam
  // positions, then this is the maximum estimate across all positions.
  // xsd type: DecibelType
  optional double estimated_erp = 2;
  // Count of how many products have been produced as a result of this activity.
  // This does not include messages (e.g. Entity) produced.
  optional uint32 products_produced = 3;
  // This is an indication of the number of hits that are currently being
  // reported in a 4607 or raw MTI data product format.
  optional uint32 hits_reported = 4;
  // Estimated performance of the activity. The multiplicity is limited to N-1
  // options where UNKNOWN is an environment type that has no value, thus
  // removed from list of available options.
  repeated EstimatedPerformanceType estimated_performance = 5;
  // This array of points should be used to define the actual area that can be
  // covered if only a portion of the requested area can be scanned currently
  // (possible result of the application of a policy).
  optional AreaChoiceType target_area_scanned = 6;
  // Indicates the amount of time that is needed for a single visit/service of
  // the Target area. This is different from Revisit Period, since other
  // Activities are not taken into account when calculating this metric.
  // xsd type: DurationType
  optional string time_to_service = 7;
  // Indicates the amount of time that is needed for a single visit/service of
  // the Target area. This is the arithmetic mean of Service times over the last
  // N visits, where N is an arbitrary number of visits greater than 1.
  // xsd type: DurationType
  optional string average_time_to_service = 8;
}

// Set of metrics used to describe the progress of an activity (sensor
// collection). This base type is intended to be reused across multiple
// domains.
// uci_version: 001.000.000.000
message MTI_ActivityStatusBaseType {
  // Integer value of the number of times a volume has been completely searched
  // for this activity.
  optional uint32 number_of_times_searched = 1;
  // This is the actual completion time for the last complete search of the
  // volume.
  // xsd type: DateTimeType (pattern .+Z)
  optional string time_last_searched = 2;
  // For the duration of this activity, this is the number of times a volume has
  // attempted to be searched completely, sanitized or the number of times the
  // radar has attempted to acquire the cue.
  optional uint32 attempts = 3;
  // For a volume search, this is the average calculated amount of time between
  // revisits of any part of the volume, for a track update activity this is the
  // average revisit rate achieved against the target.
  // xsd type: DurationType
  optional string actual_revisit_period = 4;
  // If the radar is field of regard limited, this is the percentage of the
  // volume that is currently in the radar FOR.
  // xsd type: PercentType
  optional double percentage_in_for = 5;
  // This is the first time at which this activity utilized front end resources.
  // xsd type: DateTimeType (pattern .+Z)
  optional string actual_start_time = 6;
  // This is the last time at which this activity utilized front end resources.
  // xsd type: DateTimeType (pattern .+Z)
  optional string actual_stop_time = 7;
  // This represents the current percentage of the volume that has been
  // successfully searched during the current attempt (as represented in the
  // Attempts field).
  // xsd type: PercentType
  optional double percent_searched = 8;
  // This is an indication of the number of current entities have are being
  // reported as a result of this activity.
  optional uint32 entities_reported = 9;
  // Indication that the radar has successfully acquired the target that was
  // identified as the cue.
  optional bool cue_acquired = 10;
  // Indicates the activity IDs and time windows of activities which ran
  // concurrent with this activity.
  repeated ConcurrentCollectionDetailsType concurrent_activity = 11;
  // Indicates the percentage of the target collection area was occluded as by
  // masking.
  // xsd type: PercentType
  optional double percent_occluded = 12;
  // Indicates the percentage of radar timeline which is taken up by this MTI
  // activity. The Revisit Rate and Time to Service both affect this metric. For
  // instance an Activity might execute frequently and require a long Time To
  // Service, meaning it would take up much radar timeline.
  // xsd type: PercentType
  optional double percent_radar_timeline = 13;
  // This is the percentage of the volume that is currently in the radar FOV.
  // The field of view is defined as the area where the radar can immediately
  // see. The field of regard is defined as the area the radar can see after
  // mechanical movement or rotation. Generally, the FOV is a subset of the FOR.
  // xsd type: PercentType
  optional double percentage_in_fov = 14;
  // Indicates whether target is on left or right side of the platform.
  optional RelativeDirectionEnum relative_direction_of_target = 15;
}


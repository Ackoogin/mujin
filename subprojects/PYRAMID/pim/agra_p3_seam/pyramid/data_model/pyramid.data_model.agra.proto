  MA_PERFORMANCE_CONSTRAINT_ENUM_MIN_AIRSPEED_EXCEEDED = 1;
  MA_PERFORMANCE_CONSTRAINT_ENUM_MAX_AIRSPEED_EXCEEDED = 2;
  MA_PERFORMANCE_CONSTRAINT_ENUM_MIN_ALTITUDE_EXCEEDED = 3;
  MA_PERFORMANCE_CONSTRAINT_ENUM_MAX_ALTITUDE_EXCEEDED = 4;
  MA_PERFORMANCE_CONSTRAINT_ENUM_MIN_ACCELERATION_LIMIT_EXCEEDED = 5;
  MA_PERFORMANCE_CONSTRAINT_ENUM_MAX_ACCELERATION_LIMIT_EXCEEDED = 6;
  MA_PERFORMANCE_CONSTRAINT_ENUM_MAX_ORIENTATION_LIMIT_EXCEEDED = 7;
  MA_PERFORMANCE_CONSTRAINT_ENUM_MAX_ORIENTATION_RATE_LIMIT_EXCEEDED = 8;
  MA_PERFORMANCE_CONSTRAINT_ENUM_MAX_TURN_RATE_EXCEEDED = 9;
  MA_PERFORMANCE_CONSTRAINT_ENUM_MAX_CLIMB_RATE_EXCEEDED = 10;
  MA_PERFORMANCE_CONSTRAINT_ENUM_MAX_DESCENT_RATE_EXCEEDED = 11;
}


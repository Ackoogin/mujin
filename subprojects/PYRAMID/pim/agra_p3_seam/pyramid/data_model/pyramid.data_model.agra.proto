  // xsd type: DurationType
  optional string product_resolution_time = 2;
}

// Indicates the down range and / or cross range resolution of a collection.
// uci_version: 001.000.000.000
message RangeResolutionType {
  // Indicates the down range resolution of a collection.
  // xsd type: DistanceType
  optional double range = 1;
  // Indicates the cross range resolution of a collection.
  // xsd type: DistanceType
  optional double cross_range = 2;
}

// The photometry parameters consists of the amplitude in decibels of the

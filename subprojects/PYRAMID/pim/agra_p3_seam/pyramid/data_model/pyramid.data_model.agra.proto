// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.003.000
message EA_CommandMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // See annotations in child elements and messages/elements that use this type
  // for details.
  EA_CommandMDT message_data = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message EA_CommandMDT {
  // Indicates an instance of an EA Capability command. A Capability command
  // message can have multiple command instances to allow a sequence of related
  // commands in a single coherent message. Each command instance reports status
  // via a separate, independent Capability CommandStatus message.
  repeated EA_CommandType command = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message EA_CommandType {
  oneof choice {
    // Indicates a new invocation of an EA Capability. Generally, if accepted, the
    // command will result in one or more new EA Activities being created and
    // reported via the EA_Activity message. The request/response interaction
    // terminates as soon as the command is accepted or rejected; this element is
    // not used to interact with an "active" command. Updates and/or additional
    // interaction with the resulting Activity (after the command is accepted) is
    // accomplished via the sibling Activity element.
    EA_CapabilityCommandType capability = 1;
    // Indicates a command to modify an existing EA Activity (which was previously
    // reported via the EA_Activity message and was marked as "interactive"). The
    // request/response interaction terminates as soon as the modification is
    // accepted or rejected. The modifications are reflected in subsequent
    // EA_Activity messages.
    EA_ActivityCommandType activity = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.001
message EA_CapabilityCommandType {
  // composed xsd extension base SharedRF_ApertureCapabilityCommandBaseType
  SharedRF_ApertureCapabilityCommandBaseType base = 1;
  // Indicates whether a command is for a resource manager or a subsystem. If
  // the element is present, the EWRM receives the command and treats it as
  // "directed" (CapabilityID selected by mission processing) or overridable,
  // according to the enum. The subsystem will ignore the command until the
  // resource manager sends a modified command without the
  // ResourceAllocatorCommandExtension. If field is not included, the command is
  // always interpreted to be for a subsystem (capability/activity).
  optional ResourceAllocatorCommandExtensionType resource_allocator_command_extension = 2;
  // Indicates the commanded EA emission.
  optional EA_EmissionType emission = 3;
  // Indicates the activation trigger for the EA. Reactive EA doesn't become
  // "active" until the associated emitter is detected.
  optional EA_ActivationEnum activation = 4;
  // Indicates the frequency to be used for the Command. If omitted, frequency
  // selection is left to the command recipient within constraints of
  // RF_Profiles imposed by RF_ControlCommand, MDF, etc.
  optional CapabilityCommandFrequencyType frequency = 5;
  // The ProtectedAsset child element indicates which of the protected assets of
  // the activity are the subject of the child attribute
  // ChangeProtectedAssetPredictedReturnPower. (In order to add or remove
  // protected entities, a new CapabilityCommandType must be utilized.).
  repeated ProtectedAssetReturnPowerType protected_entity_predicted_return_power = 6;
  // Indicates the unique ID of a Shared Antenna and/or AntennaResources to be
  // used for the resulting Activity. This allows Mission Processing to direct
  // an specific antenna, antenna resource type, or antenna resource instance to
  // be used by the resulting Activity.
  repeated ResourceSelectionType resource_selection = 7;
}

// Used to differentiate control from Mission Processing to Resource Manager
// vs. Resource Manager to Capability.
// uci_version: 000.000.000.000
message ResourceAllocatorCommandExtensionType {
  // Capability that is the subject of the command, even when Resource Manager
  // will receive the command and process/modify it prior to sending it to the
  // Capability.
  CapabilityID_Type requested_capability_id = 1;
  // See annotations in enum definition.
  optional ResourceAllocatorCommandControlEnum resource_allocator_command_control_type = 2;
}

// Indicates the combination of Mission Processing and Resource Allocator
// responsibility for resource selection.
enum ResourceAllocatorCommandControlEnum {
  RESOURCE_ALLOCATOR_COMMAND_CONTROL_ENUM_UNSPECIFIED = 0;
  RESOURCE_ALLOCATOR_COMMAND_CONTROL_ENUM_DIRECTED_MP_CONTROL = 1;
  RESOURCE_ALLOCATOR_COMMAND_CONTROL_ENUM_HYBRID_RA_CONTROL = 2;
  RESOURCE_ALLOCATOR_COMMAND_CONTROL_ENUM_HYBRID_OVERRIDE_ALLOWED = 3;
  RESOURCE_ALLOCATOR_COMMAND_CONTROL_ENUM_NON_DIRECTED_CAPABILITY_CONTROL = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.002.003.000
message EA_EmissionType {
  // Indicates the jamming technique. See type annotations for further details.
  optional EA_TechniqueIdentifierType technique_identifier = 1;
  // Indicates the frequency of the jamming emission.
  optional FrequencyRangeType frequency = 2;
  // Indicates the target of the EA emission. This element indicates the
  // characteristics of the target which are the focus of the EA.
  repeated EA_TargetType target = 3;
  // Attenuation applied to the payload port.
  // xsd type: DecibelType
  optional double channel_attenuation = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message EA_TargetType {
  // Indicates the source of the emitter/signal characteristics that are being
  // used to determine how to electronically attack the emitter target.
  optional EA_EmitterDataType emitter_data = 1;
  // Indicates where to point for EA beams.
  optional EA_TargetPointingType pointing = 2;
  // Indicates power level for EA beams.
  optional EA_PowerType power = 3;
  // Indicates the time at which the target emitter is last known to have
  // transmitted a signal, either by direct receipt by an ESM Capability of the
  // EA Subsystem or via an indication from a messaging input to the EA
  // Subsystem.
  // xsd type: DateTimeType (pattern .+Z)
  optional string last_signal_timestamp = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message EA_EmitterDataType {
  oneof choice {
    // Indicates the target is being attacked according to Signal/emitter data
    // from a corresponding Entity.
    EntityID_Type entity_id = 1;
    // Indicates the target is being attacked according to Signal/emitter data
    // associated with its emitter type.
    EmitterIdentityType emitter_type = 2;
    // Indicates the target is being attacked according to specifically commanded
    // Signal data.
    SignalSummaryType signal_description = 3;
    // Indicates the target is being attacked according to a previously detected
    // Signal.
    SignalID_Type signal_id = 4;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message EA_TargetPointingType {
  oneof choice {
    // Indicates the source of or explicit values for geospatial characteristics
    // of the EA target.
    TargetType location_data = 1;
    // Indicates the pointing volume for the EA transmission.
    AirVolumeSensorReferencedType air_volume = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message EA_PowerType {
  oneof choice {
    // Power at target In dBW. This will use the center point for calculation if
    // an area or line is selected.
    // xsd type: DecibelType
    double power_at_target = 1;
    // Effective Radiate Power in dBW. It is an IEEE standardized definition of
    // directional radio frequency (RF) power transmitted from a theoretical
    // half-wave dipole antenna.
    // xsd type: DecibelType
    double erp = 2;
    // Jam to Signal ratio In dB. The ratio of the signal strength of the jamming
    // signal (J) to the signal strength of the target return signal (S).
    // xsd type: DecibelType
    double jto_s = 3;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message ProtectedAssetReturnPowerType {
  // Indicates an asset to be protected.
  AssetType protected_asset = 1;
  // Provides the predicted main beam return power from the PE, observed by the
  // threat emitter. Sibling ProtectedAsset must be present in order for
  // ProtectedAssetPredictedReturnPower to be valid.
  // xsd type: MilliwattPowerRatioType
  optional double protected_asset_predicted_return_power = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.003.001
message EA_ActivityCommandType {
  // composed xsd extension base SharedRF_ApertureActivityCommandBaseType
  SharedRF_ApertureActivityCommandBaseType base = 1;
  // Indicates a command to modify an existing Beam of an existing EA Activity.
  repeated EA_ActivityChangeBeamCommandType change_beam = 2;
  // Changes Activities that this Activity is dependent on. If the dependent
  // Activity's Resource Allocation is removed or never allocated, this
  // Activity's Resource Allocation will be removed or not fulfilled. This is
  // used to tie Activities within or across subsystems.
  optional DependentActivityType change_dependent_activity = 3;
  // Update the Antenna, Antenna Resource Type, or Antenna Resource Instance
  // used for receive portion of this activity.
  optional SelectAntennaType change_receive_antenna = 4;
  // Update the Antenna, Antenna Resource Type, or Antenna Resource Instance
  // used for transmit portion of this activity.
  optional SelectAntennaType change_transmit_antenna = 5;
  // Change steering of the jamming.
  optional EA_ChangeLocationAndPowerType change_target = 6;
  // The ProtectedAsset child element indicates which of the protected assets of
  // the activity are the subject of the child attribute
  // ChangeProtectedAssetPredictedReturnPower. (In order to add or remove
  // protected entities, a new CapabilityCommandType must be utilized.).
  repeated ProtectedAssetReturnPowerType change_protected_entity_predicted_return_power = 7;
  // Indicates the frequency to be used for the Command. If omitted, frequency
  // selection is left to the command recipient within constraints of
  // RF_Profiles imposed by RF_ControlCommand, MDF, etc.
  optional CapabilityCommandFrequencyType frequency = 8;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message EA_ActivityChangeBeamCommandType {
  // Indicates the EA Beam being changed.
  BeamID_Type beam_id = 1;
  // Indicates a command to change the state of the Beam.
  optional CapabilityCommandStateEnum change_beam_state = 2;
  // Indicates a command to break the Beam's current assignment to Subsystem
  // resources/components, thereby making them available for other Beams per the
  // Subsystem's resource allocation and scheduling.
  optional bool unassign_beam = 3;
  // Indicates a command to delete a Beam. A deleted Activity can't be
  // re-enabled, including by an automated Capability that was the original
  // source of the Activity. It is equivalent to a sticky UnassignBeam command.
  optional bool delete_beam = 4;
  // Indicates a command to modify the Frequency Range of the EA_Activity.
  optional FrequencyRangeType change_frequency = 5;
}

// The ID type for UCI IDs that correspond to beams.
// uci_version: 000.000.000.000
message BeamID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message EA_ChangeLocationAndPowerType {
  // Indicates where to point for EA beams.
  optional EA_TargetPointingType pointing = 1;
  // Indicates power level for EA beams.
  optional EA_PowerType power = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.001.003.000
message EA_CommandStatusMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // See annotations in child elements and messages/elements that use this type
  // for details.
  EA_CommandStatusMDT message_data = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.003.000
message EA_CommandStatusMDT {
  // composed xsd extension base CapabilityCommandStatusBaseType
  CapabilityCommandStatusBaseType base = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message ESM_ActivityMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // Indicates the state of the internal software object that the data in the
  // message is based upon. The state of the software object is determined by
  // the publisher. The publisher could be the original/master publisher or an
  // intermediary re-publisher such as a persistence/data manager. This element
  // is not a commanded CRUD operation. It is not an indication of the state of
  // an instance of a message. It is not a mechanism for partial, incremental,
  // or fragmentary publication of a message. It is a signal from a publisher to
  // subscribers. For REMOVED state, in particular, some subscribers will mirror
  // the publisher and treat the message as if the object no longer exists, but
  // others, such as mission recorders, might not (in order to support retaining
  // historical records of activity, for example).
  optional ObjectStateEnum object_state = 2;
  // See annotations in child elements and messages/elements that use this type
  // for details.
  ESM_ActivityMDT message_data = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message ESM_ActivityMDT {
  // Indicates the Subsystem which hosts the ESM Capabilities whose Activities
  // are given in this message.
  SubsystemID_Type subsystem_id = 1;
  // Indicates the last time at which the ESM Subsystem's Entity
  // list/file/database was cleared.
  // xsd type: DateTimeType (pattern .+Z)
  optional string entity_list_cleared = 2;
  // Indicates the ESM Subsystem has reached its limit in detecting and
  // reporting emitter Entities; additional detectable emitters may exist but
  // they won't be reported.
  optional bool entity_overload = 3;
  // Indicates an excessive attitude condition exists which can result in
  // degraded performance of ESM Activities.
  optional bool excessive_attitude = 4;
  // Indicates that a pulse destiny overload condition was detected by the ESM.
  optional bool pulse_density_overload = 5;
  // Indicates whether the ESM Subsystem has less look through time than is
  // needed to perform its currently active Capabilities.
  optional bool look_through_limited = 6;
  // Estimated receiver utilization provided as a fractional percent. When
  // receiver utilization is greater than 100%, the ESM is not meeting the
  // design goal of the scan regimen provided in the mission data. This means
  // probability of detection and response time may be degraded for some
  // emitters.
  // xsd type: PercentType
  optional double receiver_utilization = 7;
  // Indicates the dynamic operational characteristics of an Activity of an ESM
  // Capability.
  repeated ESM_ActivityType activity = 8;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.003.001
message ESM_ActivityType {
  // composed xsd extension base SharedRF_ApertureActivityBaseType
  SharedRF_ApertureActivityBaseType base = 1;
  // Indicates a specific SubCapability that is included in the Activity. If
  // omitted, all SubCapabilities of the associated Capability or Capabilities
  // (as indicated in the ESM_Capability message) will be included in the
  // Activity. This element is required whenever a subset of SubCapabilities of
  // the associated Capability or Capabilities are included in the Activity.
  // List size for this element is based on "Select All That Apply" condition.
  repeated ESM_SubCapabilityEnum sub_capability = 2;
  // Indicates select SubCapability-specific details regarding the originating
  // command/source of the Activity (as indicated by the sibling ActivitySource
  // element). In other words, this element is an echo of select elements from
  // the ESM_Command, MDF, etc. that originated the Activity. Additionally, in
  // the case of ESM_Commands whose results are independent of typical ESM
  // output messages such as Entity or SignalReport, discrete command results
  // are given here instead of in those messages.
  repeated SubCapabilityDetailsType sub_capability_details = 3;
  // Indicates an ESM receiver dwell that is applicable to the Activity. This
  // element is optional in support of ESM Capabilities whose detailed dwell
  // configuration and scheduling is internally isolated. Though optional here,
  // dwell information is required for successful, higher level ESM Capability
  // management across heterogeneous families Systems, Services and Subsystems.
  // dwell information is potentially useful even if the associated Activity
  // and/or Capability aren't manual and/or interactive.
  repeated ESM_ReceiveDwellType receive_dwell = 4;
  // Indicates whether (TRUE) or not (FALSE) the Activity requires consent to
  // transition from the ENABLED state to an ACTIVE state. This element is
  // required and shall be TRUE for Activities which require consent.
  optional bool consent_required = 5;
  // Indicates the state of consent for the Activity. This element is required
  // for Activities which require Consent.
  optional ConsentEnum consent_state = 6;
  // Indicates the time when the Activity started.
  // xsd type: DateTimeType (pattern .+Z)
  optional string actual_start_time = 7;
  // Indicates the time when the Activity stopped.
  // xsd type: DateTimeType (pattern .+Z)
  optional string actual_end_time = 8;
  // Indicates the status of Spectral Density Reporting for this Activity. TRUE
  // indicates that the Activity is producing Spectral Density Reports.
  optional bool spectral_density_reporting = 9;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message SubCapabilityDetailsType {
  // Indicates the unique ID of a Shared Antenna and/or AntennaResources to be
  // used for the EA activity.
  optional SelectAntennaType select_antenna = 1;
  // Indicates a specific frequency to be used for the Acquisition command. If
  // omitted, the command defers to the active MDF.
  repeated FrequencyRangeType frequency_restriction = 2;
  // Indicates the source of or explicit values for emitter characteristics of
  // the target. If omitted, the emitter characteristics should be determined
  // from the active MDF.
  repeated ESM_TargetType target_emitter_data = 3;
  // Indicates the source of or explicit values for the kinematic location of
  // the target or search volume. When specified, the kinematic location
  // overrides any given in the sibling TargetEmitterData element.
  optional ESM_LocationType esm_location = 4;
  // Defines the parameters used to collect pulses.
  optional PulseDataCollectCommandType pulse_data_collection = 5;
  // This indicates the commanded geolocation type/technique to use.
  optional ESM_SubcapabilityGeolocationType geolocation = 6;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message ESM_TargetType {
  oneof choice {
    // Indicates the unique ID of a specific Entity that is a target of ESM
    // acquisition.
    EntityID_Type entity_id = 1;
    // Indicates a type of emitter that is a target of ESM acquisition.
    EmitterIdentityType emitter_type = 2;
    // Indicates a specific emitter type ***instance*** that is a target of ESM
    // acquisition.
    SpecificEmitterIdentityType specific_emitter = 3;
    // Indicates summary signal characteristics that are a target of ESM
    // acquisition.
    SignalSummaryType signal_description = 4;
    // Indicates the unique ID of a specific Signal that is a target of ESM
    // acquisition.
    SignalID_Type signal_id = 5;
    // Indicates the Emitter Priority Bin for grouping ESM emitters in the ESM
    // profile (to set Activation and ResourceAccessPriority). These bins are used
    // to set ResourceAccessPriority for a "binned" set of emitters without
    // identifying them individually every time their ResourceAccessPriority needs
    // to change.
    uint32 emitter_priority_bin = 6;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message ESM_LocationType {
  oneof choice {
    // Indicates the source of or explicit values for the kinematic location of
    // the target.
    ESM_SubcapabilityTargetLocationDataType target_location_data = 1;
    // Indicates the volume to search within.
    AirVolumeSensorReferencedType esm_air_volume = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.001.002.000
message ESM_SubcapabilityTargetLocationDataType {
  oneof choice {
    // Indicates the EntityID associated with the pulse data collection.
    EntityID_Type entity_id = 1;
    // Indicates the dwell's Field of View details associated with the pulse data
    // collection.
    NED_ConeType dwell_fov = 2;
    // Indicates the Point Target details associated with the pulse data
    // collection.
    PointTargetType point_target = 3;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.001.000
message PulseDataCollectCommandType {
  // Defines the single frequency for the Pulse Data collection to be used for
  // all dwells defined in the collection.
  CollectionFrequencyType collection_frequency = 1;
  // The requested start time for the subsystem to begin the commanded pulse
  // data collection.
  // xsd type: DateTimeType (pattern .+Z)
  string start_time = 2;
  // Defines the length of each dwell.
  // xsd type: DurationType
  string dwell_duration = 3;
  // Total number of collect dwells, to include the initial dwell and any
  // repetitions.
  optional uint32 dwells = 4;
  // Time (start-to-start) between dwells.
  // xsd type: DurationType
  optional string repetition_interval = 5;
  // Indicates the expected PulseWidth of the desired Pulse.
  // xsd type: DurationType
  optional string pulse_width = 6;
  // Indicates the expected PRI of the desired Pulse.
  // xsd type: DurationType
  optional string pri = 7;
  // This indicates the estimated bandwidth of the signal being processed.
  optional FrequencyRangeType signal_bandwidth = 8;
  // This indicates the modulation type to be used for the collection.
  optional ModulationEnum modulation = 9;
  // Indicates the type of geolocation to be processed.
  optional SignalTypeEnum data_collect_type = 10;
  // Set the sample rate for the collection, in Hz.
  optional float sample_rate = 11;
  // Set the number of points per sample that will be used in the Fast Fourier
  // Transform processing on the collection.
  optional int32 fft_points_per_sample = 12;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message ESM_SubcapabilityGeolocationType {
  // Indicates the current state of the ESM_Command for Geolocation.
  SignalGeolocationControlEnum geolocation_state = 1;
  // Indicates a commanded geolocation type/technique to use. List size for this
  // element is based on "Select All That Apply" condition.
  repeated SignalGeolocationMethodEnum geolocation_type = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.001.002.000
message ESM_ReceiveDwellType {
  // Indicates the dwell identifier for this dwell structure.
  DwellID_Type dwell_id = 1;
  // Indicates the state of the dwell within the active ESM as it whether or not
  // it is enabled, and the reason if it is disabled.
  ESM_DwellStateEnum dwell_state = 2;
  // Indicates the type of dwell.
  optional ESM_DwellTypeEnum dwell_type = 3;
  // Indicates the dwell's field of view (FOV) details.
  optional NED_ConeType dwell_fov = 4;
  // Indicates the time of the first collection for the Dwell.
  // xsd type: DateTimeType (pattern .+Z)
  optional string start_time = 5;
  // Indicates the cumulative collection time for the dwell, including all
  // revisits.
  // xsd type: DurationType
  optional string cumulative_dwell_time = 6;
  // Indicates an ESM component with the dwell is assigned to use. Required if
  // the dwell is assigned/active.
  repeated ComponentID_Type component_id = 7;
  // Indicates the frequency coverage of the dwell, including all
  // RF_ControlCommand, ESM_Command, MDF and other restrictions.
  repeated FrequencyRangeType frequency = 8;
  // Indicates the dwell's revisit interval, which is how often the dwell should
  // be repeated within the dwell strategy.
  // xsd type: DurationType
  optional string dwell_revisit_interval = 9;
  // Indicates the dwell's minimum pulse width.
  // xsd type: DurationType
  optional string pulse_width_low = 10;
  // Indicates the dwell's maximum pulse width.
  // xsd type: DurationType
  optional string pulse_width_high = 11;
  // Indicates the dwell's maximum pulse repetition interval (PRI).
  // xsd type: DurationType
  optional string pri_high = 12;
  // Dwell sensitivity prior to any desensitization.
  // xsd type: DecibelType
  optional double native_sensitivity = 13;
  // Desensitization if any applied to the dwell.
  // xsd type: MilliwattPowerRatioType
  optional double desensitization = 14;
  // Indicates the video bandwidth used for the measurement.
  // xsd type: FrequencyType
  optional double video_bandwidth = 15;
  // Indicates a target of the Dwell.
  repeated ESM_AcquisitionTargetType dwell_target = 16;
}

// Indicates the state of this specific ESM dwell. See enumeration annotations
// for further details.
enum ESM_DwellStateEnum {
  ESM_DWELL_STATE_ENUM_UNSPECIFIED = 0;
  ESM_DWELL_STATE_ENUM_ENABLED = 1;
  ESM_DWELL_STATE_ENUM_DISABLED_CALIBRATION_FAILURE = 2;
  ESM_DWELL_STATE_ENUM_DISABLED_ADAPTATION = 3;
  ESM_DWELL_STATE_ENUM_DISABLED_BY_COMMAND = 4;
  ESM_DWELL_STATE_ENUM_DISABLED_OTHER = 5;
  ESM_DWELL_STATE_ENUM_COMPLETED = 6;
  ESM_DWELL_STATE_ENUM_FAILED = 7;
  ESM_DWELL_STATE_ENUM_DELETED = 8;
}

// Indicates the type/purpose of an ESM dwell.
enum ESM_DwellTypeEnum {
  ESM_DWELL_TYPE_ENUM_UNSPECIFIED = 0;
  ESM_DWELL_TYPE_ENUM_MDF_ACQUISITION = 1;
  ESM_DWELL_TYPE_ENUM_MDF_ADAPTATION = 2;
  ESM_DWELL_TYPE_ENUM_MDF_SUBCATEGORY_FILE_ACQUISITION = 3;
  ESM_DWELL_TYPE_ENUM_MDF_SUBCATEGORY_FILE_ADAPTATION = 4;
  ESM_DWELL_TYPE_ENUM_MODULATION_MEASUREMENT = 5;
  ESM_DWELL_TYPE_ENUM_SCAN_MEASUREMENT = 6;
  ESM_DWELL_TYPE_ENUM_GEOLOCATION_MEASUREMENT = 7;
  ESM_DWELL_TYPE_ENUM_SPECIFIC_EMITTER_IDENTIFICATION = 8;
  ESM_DWELL_TYPE_ENUM_OTHER_MEASUREMENT = 9;
  ESM_DWELL_TYPE_ENUM_PULSE_DATA_COLLECTION = 10;
  ESM_DWELL_TYPE_ENUM_OTHER = 11;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message ESM_AcquisitionTargetType {
  oneof choice {
    // Indicates the unique ID of a specific Entity that is a target of ESM
    // acquisition.
    EntityID_Type entity_id = 1;
    // Indicates a type of emitter that is a target of ESM acquisition.
    EmitterIdentityType emitter_type = 2;
    // Indicates a specific emitter type ***instance*** that is a target of ESM
    // acquisition.
    SpecificEmitterIdentityType specific_emitter = 3;
    // Indicates summary signal characteristics that are a target of ESM
    // acquisition.
    SignalSummaryType signal_description = 4;
    // Indicates the unique ID of a specific Signal that is a target of ESM
    // acquisition.
    SignalID_Type signal_id = 5;
  }
}

// Indicates the state of consent of the item.
enum ConsentEnum {
  CONSENT_ENUM_UNSPECIFIED = 0;
  CONSENT_ENUM_INITIAL = 1;
  CONSENT_ENUM_REQUESTED = 2;
  CONSENT_ENUM_APPROVED = 3;
  CONSENT_ENUM_REJECTED = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message ESM_CapabilityMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // Indicates the state of the internal software object that the data in the
  // message is based upon. The state of the software object is determined by
  // the publisher. The publisher could be the original/master publisher or an
  // intermediary re-publisher such as a persistence/data manager. This element
  // is not a commanded CRUD operation. It is not an indication of the state of
  // an instance of a message. It is not a mechanism for partial, incremental,
  // or fragmentary publication of a message. It is a signal from a publisher to
  // subscribers. For REMOVED state, in particular, some subscribers will mirror
  // the publisher and treat the message as if the object no longer exists, but
  // others, such as mission recorders, might not (in order to support retaining
  // historical records of activity, for example).
  optional ObjectStateEnum object_state = 2;
  // See annotations in child elements and messages/elements that use this type
  // for details.
  ESM_CapabilityMDT message_data = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message ESM_CapabilityMDT {
  // composed xsd extension base CapabilityBaseType
  CapabilityBaseType base = 1;
  // Indicates an installed ESM Capability, its configurable characteristics and
  // its controllability.
  repeated ESM_CapabilityType capability = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.003.001
message ESM_CapabilityType {
  // composed xsd extension base CommandableCapabilityDeclarationType
  CommandableCapabilityDeclarationType base = 1;
  // Indicates the Capability's first tier type in the ESM taxonomy. For ESM,
  // the first tier is an indication of the means of initiation of the
  // Capability. See enumerate annotations for further details.
  CapabilityInitiationEnum capability_type = 2;
  // Indicates a SubCapability of the ESM Capability, the second tier in the
  // taxonomy of ESM. For ESM, the second tier is an indication of the specific
  // collection technique. See enumeration annotations for further details. List
  // size for this element is based on "Select All That Apply" condition.
  repeated ESM_SubCapabilityEnum sub_capability_type = 3;
  // Indicates a geolocation type/technique supported by the Capability. This
  // element is only expected when the sibling SubCapabilityType indicates
  // geolocation. List size for this element is based on "Select All That Apply"
  // condition.
  repeated SignalGeolocationMethodEnum geolocation_type = 4;
  // Indicates the Capability's support for select optional elements in its
  // accepted control interface messages. Support for these elements is expected
  // to vary across Capability implementations but must be known in order to
  // adapt and configure upstream Systems and Services which use the Capability.
  ESM_CapabilityOptionsType capability_options = 5;
  // Indicates a summary of the expected coverage of a dwell or dwells
  // associated with the Capability. This element does not indicate an actual
  // instantiated, scheduled dwell of the Capability. This element is an
  // abstraction of the MDF representation and/or design implementation of an
  // ESM Dwell. Actual, instantiated, scheduled Dwells are reported via the
  // ESM_Activity message.
  repeated ESM_DwellCoverageType dwell_coverage = 6;
  // Definition of ESM performance for the parent Capability, based on the
  // status of Supporting Capabilities (i.e. Antenna Status). For example, use
  // of a low band omni antenna in combination with AESAs would result in
  // multiple performance profiles.
  repeated ESM_PerformanceProfileType esm_performance_profile = 7;
  // Indicates a message that is an output of the Capability. See enumerated
  // type annotations for details. List size for this element is based on
  // "Select All That Apply" condition.
  repeated ESM_MessageOutputsEnum message_output = 8;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message ESM_CapabilityOptionsType {
  // Indicates whether (TRUE) or not (FALSE) the Capability supports the
  // InterruptOtherActivities element in the ESM_Command message.
  bool interrupt_other_activities = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message ESM_PerformanceProfileType {
  // Field of Regard of the Capability relative to Body Coordinates. This
  // element can be multiple if multiple instances of the same antenna are
  // installed with different Fields Of Regard.
  repeated FieldOfRegardType field_of_regard = 1;
  // Indicates the bandwidth of the Capability.
  repeated FrequencyRangeType band = 2;
  // Maximum number of independent RF receive beams for the sibling Component.
  // *Independent* means generated on a separate RF Port OR time-multiplexed
  // within a single RF Port. More than one waveform can be summed or commutated
  // in a single RF response (beam).
  optional uint32 beam_limit = 3;
  // Time between frequency changes for the Capability. Reported time considers
  // the system time for ESM tune and antenna beam setup, after ESM command is
  // received.
  // xsd type: DurationType
  optional string frequency_change_time = 4;
}

// See annotations in child elements and messages/elements that use this type

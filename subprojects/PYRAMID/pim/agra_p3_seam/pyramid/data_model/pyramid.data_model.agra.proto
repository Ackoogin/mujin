}

// A filter for messages. Each component has an 'and' relationship with the
// others.
// uci_version: 003.001.002.001
message MessageConfigurationType {
  // This is a unique ID of the particular message configuration.
  optional MessageConfigurationID_Type message_configuration_id = 1;
  // Represents the ID for a specific filter.
  FilterID_Type filter_id = 2;
  // Indicates the type of message being transmitted and filter parameters
  // applicable. Filter elements with cardinality greater than 1 are logically
  // ORed. Sibling filter elements are logically ANDed.
  QueryMessageType filter = 3;
  // Indicates if this filter is enabled (true) or disabled (false).
  bool filter_status = 4;
  // Indicates the applicability of a filter in regards to the direction of data
  // flow.
  CommDataDirectionFiltrationEnum filter_direction = 5;
  // A message list can be inclusive or exclusive. An inclusive list would
  // contain all object IDs that a system should publish to other UCI systems.
  // An exclusive list implies that all object IDs for the specified message
  // type should be published to other UCI systems except those object IDS
  // specified in the list.
  InclusionEnum filter_inclusion_type = 6;
  // Specifies an implementation specific Connection ID. This allows this
  // message configuration to be applied to a specific Connection therefore only
  // applying to message traffic on that connection.
  repeated ForeignKeyType connection_key = 7;
  // System ID of a remote System. If System ID is empty, It is assumed this is
  // a broadcast.
  repeated SystemID_Type remote_system_id = 8;
  // If specified, denotes the rate at which this message should be transmitted.
  // xsd type: DurationType
  optional string transmit_periodicity = 9;
  // Extension point to allow for the unique data-link specific methods of
  // addressing the native methods to control data ingress - egress.
  optional DataLinkNativeFilterPET data_link_native_filter = 10;
  // The importance of an item Task, Capability Command, Capability Activity,
  // etc).
  optional ComparableRankingType rank = 11;
  // Specifies whether this message is new or updated.
  optional CommConfigurationStateEnum configuration_state = 12;
}


message SensorKinematicsChoiceType {
  oneof choice {
    // Indicates the kinematics of the sensor system (or geographically disperse
    // component of a sensor system) in LLA coordinates. Each sibling element
    // represents the kinematics at a different time which would be used to
    // correlate to the timestamps of the measurements. If a sensor is stationary,
    // only one element would need to be populated.
    SignalNavDataType kinematics = 1;
    // Indicates the kinematics of the sensor system (or geographically disperse
    // component of a sensor system) in space-based coordinates. Each sibling
    // element represents the kinematics at a different time that would be used to
    // correlate to the timestamps of the measurements.
    SensorKinematicsOrbitalType orbital_kinematics = 2;
    // Indicates the kinematics of the sensor system (or geographically disperse
    // component of a sensor system) in ECEF coordinates. Each sibling element
    // represents the kinematics at a different time that would be used to
    // correlate to the timestamps of the measurements.
    ECEF_SensorKinematicsType ecef_kinematics = 3;
  }
}

// See annotations in child elements and messages/elements that use this type

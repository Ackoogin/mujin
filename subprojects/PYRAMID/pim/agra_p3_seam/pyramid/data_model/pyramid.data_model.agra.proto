  MA_PATH_TYPE_ENUM_EGRESS = 8;
  MA_PATH_TYPE_ENUM_TAKEOFF = 9;
  MA_PATH_TYPE_ENUM_LANDING = 10;
  MA_PATH_TYPE_ENUM_EMERGENCY_LANDING = 11;
  MA_PATH_TYPE_ENUM_TAXI = 12;
  MA_PATH_TYPE_ENUM_AIRBORNE = 13;
  MA_PATH_TYPE_ENUM_ARCING = 14;
  MA_PATH_TYPE_ENUM_BREAKING = 15;
  MA_PATH_TYPE_ENUM_ON_DEP_RADIAL = 16;
  MA_PATH_TYPE_ENUM_INITIAL_APPROACH = 17;
  MA_PATH_TYPE_ENUM_INTERMEDIATE_APPROACH = 18;
  MA_PATH_TYPE_ENUM_FINAL_APPROACH = 19;
  MA_PATH_TYPE_ENUM_BOLTER_WAVEOFF = 20;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_PathSegmentType {
  // Indicates the unique ID for this PathSegment. Other Paths or PathSegments
  // may branch to this path segment by referring to this ID.
  SegmentID_Type path_segment_id = 1;
  // Defines whether the path segment was manually defined or if it was defined
  // by an operator. This element can be used for many reasons including, but
  // not limited to, operator display.
  PathSegmentSourceEnum source = 2;
  // Indicates the end point of the PathSegment. The start point is the end
  // point of the previous PathSegment.
  MA_EndPointType end_point = 3;
  // This flag is used to determine whether the segment can be modified/removed
  // or was driven by an operator and therefore cannot be modified.
  optional bool locked = 4;
  // If this element is present and set to TRUE, this PathSegment has been
  // modified as part of a MODIFIED_ROUTE MissionPlan. This data is valuable to
  // some planning algorithms to support validation of a user modified route.
  optional bool modified = 5;
  // Indicates the speed or speed optimization of the System along the
  // PathSegment at the EndPoint.
  optional PathSegmentSpeedType speed = 6;
  // Defines the Civil Path Terminator information associated with the End Point.
  optional CivilPathTerminatorType civil_path_terminator = 7;
  // Indicates whether the vehicle shall climb/descend and at what rate while
  // traversing the path segment.
  optional ClimbType climb = 8;
  // Indicates the maximum roll allowed along the PathSegment. Angle in radians
  // representing vehicle's rotation about the longitudinal axis (the axis
  // through the body of the vehicle from tail to nose) in a locally level,
  // North-East-Down coordinate system centered on the vehicle. Roll is zero
  // when the aircraft is wing-tip to wing-tip level in the North-East plane.
  // xsd type: AngleType
  optional double maximum_roll = 9;
  // Indicates the acceleration of the System along the PathSegment at the
  // EndPoint.
  // xsd type: AccelerationType
  optional double acceleration = 10;
  // This element is used to specify the next non-conditional PathSegment. This
  // path segment can be the next segment in the current path or can be a
  // transitional segment to another Path defined by the PathID. If the PathID
  // is specified and differs from the current PathID, then this signals the end
  // of the current Path and a transition to another Path. If no NextPathSegment
  // is given then this is the end of the Route.
  optional NextPathSegmentType next_path_segment = 11;
  // This element is used to specify one or more conditional PathSegment.
  repeated ConditionalPathSegmentType conditional_path_segment = 12;
  // This element is intended to provide detailed inertial state information at
  // user defined increments within a path segment. This element provides data
  // which may be required for pre-mission analysis of a Route. Position data
  // may be specified as either a geospatial point or relative to a separately
  // defined reference frame.
  repeated InertialStateRelativeType inertial_state = 13;
  // Describes the mission planned required time of arrival. This message allows
  // the operator to see a delta between the required and estimated arrival
  // times that would allow for speed up/slow down determinations. This field is
  // used as a constraint on the timing of the waypoint.
  optional TimeWindowType required_time_of_arrival = 14;
  // Indicates information about the path segment from an operator that is
  // intended for display. Both short and longer detailed information can be
  // provided.
  optional RemarksType remarks = 15;
  // Specifies the navigation performance accuracy required in an airspace. This
  // value is in meters rather than the RNP standard of nautical miles.
  // xsd type: DistanceType
  optional double required_navigation_performance_in_meters = 16;
  // Specifies a geographical position determined by visual reference to the
  // surface, by reference to one or more radio NAVAIDs, by celestial plotting
  // or another navigational device.
  optional ForeignKeyType fix_identifier = 17;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_EndPointType {
  oneof choice {
    // This element is used to specify a point in the route where no turning
    // occurs. It is generally used for points associated with Actions such as
    // task "transitions", changes in acceleration, changes in speed, changes in
    // altitude, etc.
    WayPointType way_point = 1;
    // This element is used to specify all cases of turns in a segment including
    // fly-through and turn-short. It can additionally be associated with
    // tasks/actions that require or are coincident with turns. TurnPoints will
    // generally come in groups of at least two in linked PathSegments. All but
    // the last in a group will include a TurnRadius.
    TurnPointType turn_point = 2;
    // This element specifies a Loiter. Currently specifying a task/action
    // associated with a LoiterPoint when the task/action occurs only during a
    // portion of the Loiter is not supported.
    MA_LoiterPointType loiter_point = 3;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_LoiterPointType {
  // The geospatial loiter details.
  MA_LoiterType loiter = 1;
  // Indicates the time at which the loiter will end.
  // xsd type: DateTimeType (pattern .+Z)
  optional string end_time = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_LoiterType {
  oneof choice {
    // The details of an orbit loiter.
    MA_OrbitType orbit = 1;
    // The details of a hover loiter.
    HoverType hover = 2;
    // The details of a hold loiter.
    MA_HoldType hold = 3;
  }
}

// Defines details of orbit loiter
// uci_version: 000.000.000.000
message MA_OrbitType {
  // Defines shape of orbit
  MA_OrbitShapeType orbit_shape = 1;
  // Duration for the orbit as either a required time spent in the orbit pattern
  // or the number of orbits to make around the pattern. Leaving the field
  // unspecified indicates an indefinite orbit.
  optional OrbitDurationType duration = 2;
  // Desired CAP point for entry along pattern used for routing.
  optional PointChoiceType entry_point = 3;
  // Desired CAP point for exiting along pattern used for routing.
  optional PointChoiceType exit_point = 4;
}

// Defines shape of orbit
// uci_version: 000.000.000.000
message MA_OrbitShapeType {
  oneof choice {
    // Defines an orbit by its fix point and inbound course.
    MA_FixOrbitType fix_point = 1;
    // A single point will be provided if and only if OrbitType is Circle. See
    // annotations of each OrbitType (OrbitEnum) value for further details.
    MA_CircleOrbitType circle = 2;
  }
}

// Defines a racetrack orbit using a fix point, inbound course, leg length,
// and turn constraints.
// uci_version: 000.000.000.000
message MA_FixOrbitType {
  // Relative or absolute point in space to act as fix point for orbit
  // construction
  PointChoiceType point = 1;
  // Defines inbound direction course toward the fix point.
  MA_DirectionChoiceType inbound_direction = 2;
  // Distance between turn points.
  IntervalChoiceType leg_length = 3;
  // Defines the turn via bank angle or radius.
  TurnGeometryChoiceType turn_geometry = 4;
  // Direction of turn when rounding the first loiter point. For a figure 8,
  // this direction applies to the first of the two Circle elements.
  RelativeDirectionEnum turn_direction = 5;
}

// Enables the specification of a heading or course type with an associated
// reference.
// uci_version: 000.000.000.000
message MA_DirectionChoiceType {
  oneof choice {
    // Defines heading type and reference to hold.
    MA_DirectionReferenceType heading = 1;
    // Defines course type and reference to hold.
    MA_DirectionReferenceType course = 2;
  }
}

// Defines heading or course type and reference to hold.
// uci_version: 000.000.000.000
message MA_DirectionReferenceType {
  // Indicates the heading or course value to hold.
  // xsd type: AngleType
  double value = 1;
  // Reference to type of heading or course given.
  MA_HeadingReferenceEnum reference = 2;
}

// Reference to type of heading given.
enum MA_HeadingReferenceEnum {
  MA_HEADING_REFERENCE_ENUM_UNSPECIFIED = 0;
  MA_HEADING_REFERENCE_ENUM_TRUE_NORTH = 1;
  MA_HEADING_REFERENCE_ENUM_MAGNETIC_NORTH = 2;
}

// The type used to specify a distance or duration type for an interval.
// uci_version: 001.000.000.000
message IntervalChoiceType {
  oneof choice {
    // Indicates the interval amount is a distance.
    // xsd type: DistanceType
    double distance = 1;
    // Indicates the interval amount is a duration.
    // xsd type: DurationType
    string duration = 2;
  }
}

// Defines an orbit by specifying two circles
// uci_version: 000.000.000.000
message MA_CircleOrbitType {
  // What flight pattern this orbit will take.
  OrbitEnum orbit_type = 1;
  // A single point will be provided if and only if OrbitType is Circle. See
  // annotations of each OrbitType (OrbitEnum) value for further details.
  repeated CircleType circle = 2;
  // Direction of turn when rounding the first loiter point. For a figure 8,
  // this direction applies to the first of the two Circle elements.
  RelativeDirectionEnum turn_direction = 3;
}

// Defines details of orbit loiter
// uci_version: 000.000.000.000
message MA_HoldType {
  // Point at which inbound leg of hold ends.
  Point2D_Type anchor_point = 1;
  // Operational context for the hold used to determine the appropriate default
  // parameters necessary to define the hold.
  optional MA_HoldContextEnum hold_context = 2;
  // Indicates the speed to maintain during the hold pattern.
  optional PathSegmentSpeedType speed = 3;
  // Orientation of the hold, defined as the course along the inbound leg.
  // xsd type: AngleType
  optional double orientation = 4;
  // Direction of turn when rounding the first loiter point.
  optional RelativeDirectionEnum turn_direction = 5;
  // Specifies the length of the hold based on the inbound leg.
  MA_HoldLegSpecificationType leg_specification = 6;
  // Specifies the turns of the hold.
  MA_HoldTurnSpecificationType turn_specification = 7;
  // Specifies the duration of the hold.
  MA_OrbitDurationType duration = 8;
  // Specified method for entering the hold.
  MA_HoldEntryTypeEnum entry_type = 9;
}

// Operational context for the hold used to determine the appropriate default
// parameters necessary to define hold.
enum MA_HoldContextEnum {
  MA_HOLD_CONTEXT_ENUM_UNSPECIFIED = 0;
  MA_HOLD_CONTEXT_ENUM_ADMIN = 1;
  MA_HOLD_CONTEXT_ENUM_TACTICAL = 2;
  MA_HOLD_CONTEXT_ENUM_ATC = 3;
}

// Defines details of orbit loiter
// uci_version: 000.000.200.000
message MA_HoldLegSpecificationType {
  oneof choice {
    // Duration to fly the inbound leg in seconds.
    // xsd type: DurationType
    string leg_time = 1;
    // Length to fly the inbound leg in meters.
    // xsd type: DistanceType
    double leg_length = 2;
  }
}

// Specifies the turns of the hold.
// uci_version: 000.000.000.000
message MA_HoldTurnSpecificationType {
  oneof choice {
    // Radius of the hold turns in meters.
    // xsd type: DistanceType
    double turn_radius = 1;
    // Turn rate at which the hold turns are to be executed in radians per second.
    // xsd type: AngleRateType
    double turn_rate = 2;
    // Specification of the type of turn to be executed during the hold.
    MA_HoldTurnTypeEnum turn_type = 3;
  }
}

// Used to denote the context for the hold to enable MA to fill in the
// appropriate default parameters.
enum MA_HoldTurnTypeEnum {
  MA_HOLD_TURN_TYPE_ENUM_UNSPECIFIED = 0;
  MA_HOLD_TURN_TYPE_ENUM_STANDARD = 1;
  MA_HOLD_TURN_TYPE_ENUM_MIL_POWER = 2;
  MA_HOLD_TURN_TYPE_ENUM_RELAX = 3;
}

// Specifies the turns of the hold.
// uci_version: 000.000.000.000
message MA_OrbitDurationType {
  oneof choice {
    // Radius of the hold turns in meters.
    // xsd type: DurationType
    string time = 1;
    // Turn rate at which the hold turns are to be executed in radians per second.
    uint32 number_of_orbits = 2;
    // Required time(s) to enter and/or exit the hold.
    DateTimeRangeType entry_exit_time = 3;
  }
}

// Specified method for entering the hold.
enum MA_HoldEntryTypeEnum {
  MA_HOLD_ENTRY_TYPE_ENUM_UNSPECIFIED = 0;
  MA_HOLD_ENTRY_TYPE_ENUM_DIRECT = 1;
  MA_HOLD_ENTRY_TYPE_ENUM_ANCHOR = 2;
  MA_HOLD_ENTRY_TYPE_ENUM_INBOUND = 3;
  MA_HOLD_ENTRY_TYPE_ENUM_OUTBOUND = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message RoutePlanInputsType {
  // composed xsd extension base PlanInputsCoreType
  PlanInputsCoreType base = 1;
  // Indicates specific Systems to consider and plan for along with
  // System-specific planning constraints. If omitted, all Tiers and all Systems
  // at and below those that the planning process is applicable to shall be
  // planned. A System is a planning "candidate" because its plan may or may not
  // change as a result of the command; zero or more *Plans will potentially be
  // created for each candidate.
  repeated RoutePlanningCandidateType planning_candidate = 2;
  // Indicates a Part that is required in the output RoutePlan. When populated,
  // this element must match or be a subset of the Parts associated with the
  // planning process (sibling PlanningProcessID) as advertised in
  // PlanningFunction*messages. This element is optional when all Parts of the
  // process as defined in ControlStatus are required.
  optional RoutePlanPartsType output_plan_parts = 3;
}


  // Indicates the unique identifier of the Package to form, join or leave.
  PackageID_Type package_id = 2;
  // If the sibling PackageID element is a sub-package, indicates the unique
  // identifier of the parent package.
  optional PackageID_Type parent_package_id = 3;
  // Indicates the type of package change to perform.
  MA_PackageChangeEnum change_type = 4;
  // Indicates the System(s) commanded to perform a package change.
  repeated SystemID_Type system_id = 5;
  // Indicates any Constraints that may apply to this package.
  repeated MA_ConstraintID_Type constraint_id = 6;
  // Indicates the System commanded to assume package leader role. Allows for
  // the explicit specification of a leader without needing MA to conduct leader
  // election.
  optional SystemID_Type package_leader_id = 7;
  // Indicates the leadership fitness metrics for the partners in the package.
  repeated MA_PartnerMetricsType package_partner_metrics = 8;
  // Specifies which election method/algorithm the package will utilize for
  // electing a Package Leader. Implementors are expected to set a default
  // election method. If blank, the default election method will be used.
  // Integer values and corresponding elections methods are as follows: 0 -
  // Bully Election Method. Supports Dynamic Fitness Scores and cases where
  // Leadership Fitness Scores need to be shared as part of an election process.
  // 1 - Static Fitness Score Election Method. Supports nomination of a leader
  // assuming leadership fitness scores remain static once they have been
  // defined by MP/C2. 2 - Maximum Consensus Election Method. Supports utilizing
  // consensus algortihms to reach team consensus on the leader while preserving
  // communication bandwidth. 3 - Raft Leader Election Method. Supports leader
  // election using the Raft consensus algorithm, which ensures a distributed
  // and fault-tolerant approach to electing a leader.
  optional int32 package_leader_election_method = 9;
  // This field specifies the chosen fitness score determination method to be
  // used for fitness scoring for the packge.
  optional MA_LeadershipFitnessScoreDeterminationMethodChoiceType package_leadership_fitness_score_determination_method = 10;
}


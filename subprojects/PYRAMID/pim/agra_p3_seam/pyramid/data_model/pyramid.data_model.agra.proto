  INTERFACE_PLAN_TYPE_ENUM_TASK_PLAN = 2;
  INTERFACE_PLAN_TYPE_ENUM_ROUTE_PLAN = 3;
  INTERFACE_PLAN_TYPE_ENUM_ROUTE_ACTIVITY_PLAN = 4;
  INTERFACE_PLAN_TYPE_ENUM_ORBIT_PLAN = 5;
  INTERFACE_PLAN_TYPE_ENUM_ORBIT_ACTIVITY_PLAN = 6;
  INTERFACE_PLAN_TYPE_ENUM_ACTIVITY_PLAN = 7;
  INTERFACE_PLAN_TYPE_ENUM_EFFECT_PLAN = 8;
  INTERFACE_PLAN_TYPE_ENUM_ACTION_PLAN = 9;
  INTERFACE_PLAN_TYPE_ENUM_RESPONSE_PLAN = 10;
}


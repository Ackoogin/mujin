  ID_Type base = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_OpConstraintsType {
  // This element represents a date/time interval associated with the
  // operational item during which the item is in effect.
  optional ScheduleType schedule = 1;
  // Indicates time related events that are associated to the Op data type such
  // as when activated or when operational. The multiplicity is limited to N-1
  // options where NONE is an event that has no value, thus removed from list of
  // available options.
  repeated TimeFunctionType associated_time = 2;
  // System-specific schedule that will override any part of the main schedule.
  // This allows for system-specific schedule different than main schedule. When
  // adding a SystemScheduleOverride, the child SystemID also must be added to
  // the sibling SystemID list if the sibling list is not empty. The
  // SystemScheduleOverride is independent of time planning. For the system,
  // this override can be done at execution.
  repeated SystemScheduleStateType system_schedule_override = 3;
  // Specifies requirement UUIDs or types and the statuses for them during which
  // the Op* trigger will occur.
  repeated MA_ReferentialStatusTriggerType referential_status_trigger = 4;
  // Identifies the Package ID or ACP System ID for which the Op* applies. If
  // Package ID is used, this includes all package member System IDs, so a
  // member ACP's System ID does not need to be separately included.
  repeated MA_PackageSystemType applies_to_i_ds = 5;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_ReferentialStatusTriggerType {
  // Indicates the unique ID of a Requirement that must be the desired status
  // for the trigger to occur.
  RequirementInstanceID_ChoiceType requirement_id = 1;
  // Indicates a trigger based on a Requirement type with filter/preconditions
  // that must be the desired status for the trigger to occur. All immediate
  // child element filters must be met before the Option is triggered; child
  // elements are logically ANDed. If a child element is omitted then any
  // Requirement matches that element's filter.
  RequirementFilterType requirement_filter = 2;
  // Identifies the state of the Requirement during which the trigger will occur.
  RequirementExecutionStateEnum execution_state = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message RequirementFilterType {
  // Indicates a type of Requirement or Requirements that satisfies the filter.
  // If omitted, any target satisfies the Requirement filter.
  optional RequirementTaxonomyType requirement_type = 1;
  // Indicates targets of the Requirement that are required to match the filter.
  // If omitted, any target satisfies the Requirement filter.
  optional AssetFilterType requirement_target = 2;
}


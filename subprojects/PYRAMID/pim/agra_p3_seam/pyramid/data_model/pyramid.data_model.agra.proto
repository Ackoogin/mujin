// uci_version: 000.000.000.000
message MA_FlightTaskType {
  // composed xsd extension base MA_FlightTaskBaseType
  MA_FlightTaskBaseType base = 1;
  // This element defines the parameters for a loiter.
  optional MA_LoiterType loiter = 2;

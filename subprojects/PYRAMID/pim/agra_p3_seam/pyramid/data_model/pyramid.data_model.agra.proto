message PO_ComponentStatusProcessingStageProcessingSettingsType {
  // The pixels that make up the final images which are generated from the raw
  // optical data can be further processed to enhance images brightness and
  // contrast. This is accomplished by computing a new pixel value from the
  // original pixel value using the following formula "newPixelvalue = offset +
  // (gain * origPixelValue)" where the gain and offset are either set
  // automatically or manually. This field specifies the current offset and gain
  // values being used by this stage.
  optional PO_ComponentStatusProcessingStagePixelScalingType pixel_scaling = 1;
  // A common cylindrical-coordinate representations of points in an RGB color
  // model. The representations rearrange the geometry of RGB in an attempt to
  // be more intuitive and perceptually relevant than the Cartesian (cube)
  // representation.
  optional HSB_ColorControlType hsb_color_control_status = 2;
  // The RGB color model is an additive color model in which red, green, and
  // blue light are added together in various ways to reproduce a broad array of
  // colors. The name of the model comes from the initials of the three additive
  // primary colors, red, green, and blue.
  optional RGB_ColorControlType rgb_color_control_status = 3;
  // This field specifies the current value used for gamma compensation. This
  // element is intentionally unitless.
  optional double gamma_value = 4;
  // This field specifies the current value used for sharpening the image.
  // xsd type: PercentType
  optional double sharpness_value = 5;
  // This field specified the current edge enhancement setting.
  // xsd type: PercentType
  optional double edge_enhancement = 6;
  // This field specifies setting used by the Electronic Zooming processing
  // stage.
  // xsd type: PercentType
  optional double zoom = 7;
}


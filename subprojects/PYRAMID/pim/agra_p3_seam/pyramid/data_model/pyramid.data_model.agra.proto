message CommEffectivityType {
  // Indicates the unique ID for this effectivity.
  CommEffectivityID_Type effectivity_id = 1;
  // Indicates a list of communication actions/settings to be applied upon the
  // supplied triggers to support a communication plan.
  repeated PlannedCommActionExtendedType planned_comm_action = 2;
  // Signifies available triggers which would automatically invoke this
  // CommTerminalPlan.
  optional CommTerminalPlanTriggerType trigger = 3;
}

// The ID type that refers to an aggregation of effective communications
// configurations.

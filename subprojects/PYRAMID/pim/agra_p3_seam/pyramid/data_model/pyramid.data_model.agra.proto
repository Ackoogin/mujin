enum EmissionBalanceEnum {
  EMISSION_BALANCE_ENUM_UNSPECIFIED = 0;
  EMISSION_BALANCE_ENUM_ACTIVE = 1;
  EMISSION_BALANCE_ENUM_PASSIVE = 2;
  EMISSION_BALANCE_ENUM_BALANCED = 3;

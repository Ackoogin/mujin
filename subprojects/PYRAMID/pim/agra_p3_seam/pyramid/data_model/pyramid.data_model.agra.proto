  repeated CommUserIO_ID_Type associated_user_io_id = 12;
  // Identifies network components, or logical RF ports, that the waveform may
  // be dynamically configured to use as a data sink (in the case of data to be
  // transmitted) or a data source (in the case of received data).
  repeated CommUserLinkType associated_user_link = 13;
  // Indicates a command and control relevant Antenna Component associated with

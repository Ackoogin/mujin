  optional UMID_SystemID_Type umid_system_id = 14;
  // Define the Item Designator Id. The default value is nothing set.
  // xsd type: AlphanumericDashSpaceUnderscoreString16Type (pattern [A-Za-z0-9 \-_]{1,16})

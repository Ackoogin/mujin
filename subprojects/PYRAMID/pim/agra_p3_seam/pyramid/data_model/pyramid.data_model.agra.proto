  InterfaceStateEnum activation_state = 1;
  // Indicates "Direct C2" mission control interfaces supported by the System
  // along with their activation state. A supported interface isn't necessarily
  // enabled currently.
  RequirementTaxonomyType requirement_type = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message ControlStatusCapabilityControlType {
  // Indicates the unique ID of the Capability whose control status is being
  // reported.
  CapabilityID_Type capability_id = 1;
  // Indicates the primary controller, generally an operator/HCI, of the
  // Capability. The primary controller is responsible for managing and
  // responding to ControlRequests for the Capability. The primary controller
  // has exclusive responsibility for issuing ControlSourcesCommands (which
  // reflect ControlRequests) and ControlInterfacesCommands to the Capability.
  // If this field is omitted then either the Capability is not operational or
  // currently has no assigned primary controller. See ControlTypeEnum
  // annotations for further details.
  optional PrimaryControllerType primary_controller = 2;
  // Indicates a secondary controller, generally an operator/HCIs, of the
  // Capability. If this field is omitted then either the Capability is not
  // operational or currently has no secondary controllers. See ControlTypeEnum
  // annotations for further details.
  repeated SecondaryControllerType secondary_controller = 3;
  // Indicates a Capability Manager (an automation service, also known as a
  // Resource Manager) that is allowed to autonomously command the Capability.
  // Only the primary controller is allowed to attach Capability Managers, using
  // the ControlInterfacesCommand. See ControlTypeEnum annotations for further
  // details.
  repeated CapabilityManagerType capability_manager = 4;
  // Enumerated list of UCI Capability control interfaces/messages this
  // Capability will currently accept. See enumeration annotations. If not
  // present, then no commands are currently accepted. Note that the *Plan
  // related enumerations are closely related to the
  // ControlStatus...MissionControl.PlannedControlInterface but does not
  // override them. This element is an indication of the controls that the
  // primary controller currently has enabled. If the PlannedControlInterface
  // element or elements indicates *Plan related interfaces are disabled while
  // this element indicates MissionPlan related interfaces are being accepted,
  // it is an indication that the primary controller isn't currently allowing
  // Capability control via a *Plan but will potentially enable it at an
  // appropriate time in the future. List size for this element is based on
  // "Select All That Apply" condition.
  repeated CapabilityControlInterfacesEnum accepted_interface = 5;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message PrimaryControllerType {

// uci_version: 003.001.003.001
message CommTerminalActivityType {
  // composed xsd extension base SharedRF_ApertureActivityBaseType
  SharedRF_ApertureActivityBaseType base = 1;
  // Indicates whether the waveform has joined the network. The connection
  // status reflects information about the waveform capability with respect to
  // its network connectivity (typically at the physical and medium access
  // control--MAC--layers).
  optional CommConnectionStateEnum connection_status = 2;
  // Indicates general waveform configuration settings that apply to all
  // waveforms. Note that these settings do not apply to individual data-link
  // connections provided by the waveform or to the logical link control layer
  // (LLC) and above, but do apply to the physical and medium access control
  // layers that are just to maintain the waveforms connection to the network.
  optional CommControlType common_settings_status = 3;
  // The ID of the Profile to which this activity is currently executing with.
  optional CommProfileID_Type current_profile_id = 4;
  // Encapsulates the user link information that indicates the state and
  // configuration of the individual user links, which the waveform uses to
  // transport the payload data over the communication medium.
  repeated UserLinkStatusType user_link_status = 5;
  // Provides a reflection of what port assignments (IO and RF) are associated
  // with this link. It is possible to have more than one to reflect multiple
  // simultaneous paths.
  optional CommLinkPortMapType link_port_map = 6;
  // For the periodicity of this message this is a report of the statistics
  // provided by this capability and its links.
  optional CommLinkStatisticsType link_statistics = 7;
  // Indicates waveform state information regarding the waveform's network
  // access. (Typically below Medium Access Control--MAC---and physical layers.
  optional CommWaveformActivityPET waveform_specific_settings_status = 8;
  // Serving a similar as a MAC address in TCP/IP, the TerminalUnique ID
  // provides the waveform's unique identifier on the network (where needed).
  // This value would typically be loaded from an MDF, where necessary.
  optional ForeignKeyType terminal_unique_key = 9;
  // Provides current settings for the control of the generation of verbose
  // Activity messages that provide full field reporting.
  optional VerboseStatusType verbose_status = 10;
}


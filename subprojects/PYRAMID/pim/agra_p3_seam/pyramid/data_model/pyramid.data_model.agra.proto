// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.003.001
message OperatorNotificationMDT {
  // Unique ID of this operator notification.
  OperatorNotificationID_Type operator_notification_id = 1;
  // Indicates the ID of a notification template for populating the content of
  // the notification.
  optional ID_Type operator_notification_template_id = 2;
  // List of parameters used as substitution arguments when applying
  // notification templates. If a notification template syntax defined a
  // substitution token (e.g. $#) in the Title, the template parameters would be
  // used to replace those tokens. For example, given a template Title of
  // "System $1 violated zone $2" an OperatorNotification that applies that
  // template would replace the $1 token with the first template parameter and
  // the $2 with the second template parameter.
  // xsd type: VisibleString32Type (pattern [ -~]{0,32})
  repeated string operator_notification_template_parameters = 3;
  // Brief description of an operator notification. This human readable field
  // will be provided to the operator as a summary of the notification.
  // xsd type: VisibleString256Type (pattern [ -~]{0,256})
  string title = 4;
  // Detailed human readable message for display to an operator. This is not to
  // be interpreted by a machine. This information may be provided to an
  // operator when they seek a more detailed description of a notification than
  // what the title provides.
  // xsd type: VisibleString1024Type (pattern [ -~]{0,1024})
  optional string details = 5;
  // Categorizes this notification for purposes of organization and filtering.
  // It is expected that the service function providing the notification can be
  // represented by this category. For instance, if a mission planning service
  // is reporting a notification regarding a task, it should report PLANNING as
  // the category, not TASKING.
  NotificationCategoryEnum category = 6;
  // Indicates the overall severity of this notification. Informational
  // notifications are meant to provide informational context of events within
  // the system. Indicates the existence of a hazardous condition requiring
  // immediate action to prevent loss of life, equipment damage, or abortion of
  // the mission. Critical notifications indicate the need for immediate
  // operator attention.
  NotificationSeverityEnum severity = 7;
  // Indicates the geolocation of the notification.
  optional Point2D_Type location = 8;
  // Source identifiers of the notification.
  optional NotificationSourceType source = 9;
  // Actions the originator of the notification will execute or may execute
  // based on operator action commands.
  optional OperatorNotificationActionType actions = 10;
  // Occurrence count of this notification.
  optional uint32 count = 11;
  // Timestamp of when the notification event occurred. If the event has been
  // repeated, this will contain the time of the most recent occurrence.
  // xsd type: DateTimeType (pattern .+Z)
  optional string occurrence_timestamp = 12;
  // Optional priority of the notification. This may be used for ordering alerts
  // on the HMI. Higher priority values take precedence over lower ones. A
  // common range is [0,100] with priority 100 notification being the highest
  // priority available.
  optional uint32 priority = 13;
  // Audible definition assigned to the notification.
  optional AuralAlertType aural_alert = 14;
  // Destinations for this notification. This field defines which Operator
  // consoles are responsible for displaying or processing the alert. The
  // Operator consoles can be specified as an Operator console role or by a
  // non-Operator role. If this element is absent, the notification should be
  // handled by all Operator consoles.
  repeated OperatorRoleType destinations = 15;
  // Indicates a message that is associated with or the cause of the operator
  // notification. This element should be omitted if an input message was not
  // the cause of the notification.
  repeated AssociatedMessageType associated_message = 16;
}


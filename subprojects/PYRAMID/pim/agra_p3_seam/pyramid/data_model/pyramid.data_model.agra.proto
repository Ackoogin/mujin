  COMM_CONNECTION_STATE_ENUM_UNSPECIFIED = 0;
  COMM_CONNECTION_STATE_ENUM_DISCONNECTED = 1;
  COMM_CONNECTION_STATE_ENUM_CONNECTING = 2;
  COMM_CONNECTION_STATE_ENUM_CONNECTED_DEGRADED = 3;
  COMM_CONNECTION_STATE_ENUM_CONNECTED = 4;
  COMM_CONNECTION_STATE_ENUM_CONNECTED_IDLE = 5;
}

// Utilized to control the waveform setup, modification, and status for a
// capability.
// uci_version: 003.001.003.000
message CommControlType {
  // Sets / Indicates whether the capability is silent (No Transmission).
  optional bool inhibit_transmit = 1;
  // Sets / Indicates whether the capabilities receiver is deaf.
  optional bool inhibit_receive = 2;
  // Sets / Indicates whether the capability to not re-trans.
  optional bool inhibit_relay = 3;
  // Sets / Indicates the waveform capabilities specific settings related to
  // tuning and its connection. These settings are common between waveforms.
  optional CommConnectionType connection_settings = 4;
  // Sets / Indicates the power state for the waveforms receiver.
  optional CommReceiverStateEnum receiver_state = 5;
  // Indicates the power level being received by the waveforms receiver.
  // xsd type: MilliwattPowerRatioType
  optional double rx_power_level = 6;
  // Sets / Indicates the squelch level fidelity.
  optional uint32 squelch_level = 7;
  // Sets / Indicates the power state for the waveforms transmitter.
  optional CommTransmitterStateEnum transmitter_state = 8;
  // Sets / Indicates the power level for the waveforms transmitter.
  // xsd type: MilliwattPowerRatioType
  optional double tx_power_level = 9;
  // Sets / Indicates the Volume level for the Voice digitized audio.
  optional uint32 volume_level = 10;
  // Sets / Indicates the Radio Frequency Data Rate for this waveforms
  // capability.
  // xsd type: DataRateType
  optional uint32 rf_data_rate = 11;
  // Sets / Indicates the Antenna Component associated with this waveform
  // capability.
  repeated ComponentID_Type antenna_id = 12;
  // Defines the destination to which the connection should be made to.
  optional RemoteDestinationType remote_destination = 13;
}

// Utilized to perform the tuning of a communications capability.
// uci_version: 001.000.000.001
message CommConnectionType {
  // This element represents a potential list of transmit channels to tune this
  // waveform to.
  repeated ForeignKeyType transmit_channel = 1;
  // This element represents a potential list of transmit frequencies to tune
  // this waveform to.
  // xsd type: FrequencyType
  repeated double transmit_frequency = 2;
  // This element represents the channel width for the transmit.
  // xsd type: FrequencyType
  optional double instantaneous_transmit_bandwidth = 3;
  // This element represents a potential list of receive channels to tune this
  // waveform to.
  repeated ForeignKeyType receive_channel = 4;
  // This element represents a potential list of receive frequencies to tune
  // this waveform to.
  // xsd type: FrequencyType
  repeated double receive_frequency = 5;
  // This element represents the channel width for the receive.
  // xsd type: FrequencyType
  optional double instantaneous_receive_bandwidth = 6;
  // Sets / Indicates the modulation in use for this instance of the waveform.
  optional CommModulationTypeEnum modulation = 7;
  // This element represents a key to a configuration containing the network ID
  // / Name. This is specifically an ID to aid a waveform to ID its own
  // terminal, a waveform network, or IP Address.
  repeated ForeignKeyType network_key = 8;
  // This element represents a boolean denoting it is the time reference for the
  // network.
  optional bool network_time_ref = 9;
  // This element represents a boolean denoting an external time reference is to
  // be used for the network.
  optional bool external_time_ref = 10;
  // This element represents the enforced Network Time in the case where the
  // platform time is unacceptable.
  // xsd type: DateTimeType (pattern .+Z)
  optional string network_time = 11;
  // This element represents the error that can be tolerated when a terminal is
  // getting into fine sync. Value represents uncertainty in terms of seconds.
  optional float network_time_uncertainty_range = 12;
  // Allows Comm Manager service to command a network time offset to a terminal.
  // xsd type: DurationType
  optional string network_time_offset = 13;
}

// This identifies the Modulation type for a Waveform instance.
enum CommModulationTypeEnum {
  COMM_MODULATION_TYPE_ENUM_UNSPECIFIED = 0;
  COMM_MODULATION_TYPE_ENUM_PSK = 1;
  COMM_MODULATION_TYPE_ENUM_BPSK = 2;
  COMM_MODULATION_TYPE_ENUM_SBPSK = 3;
  COMM_MODULATION_TYPE_ENUM_SOQPSK = 4;
  COMM_MODULATION_TYPE_ENUM_DEQPSK = 5;
  COMM_MODULATION_TYPE_ENUM_CPM = 6;
  COMM_MODULATION_TYPE_ENUM_FSK = 7;
  COMM_MODULATION_TYPE_ENUM_ASK = 8;
  COMM_MODULATION_TYPE_ENUM_AM = 9;
  COMM_MODULATION_TYPE_ENUM_FM = 10;
}

// Identifies the state of the internal radio receiver.
enum CommReceiverStateEnum {
  COMM_RECEIVER_STATE_ENUM_UNSPECIFIED = 0;
  COMM_RECEIVER_STATE_ENUM_OFF = 1;
  COMM_RECEIVER_STATE_ENUM_ON = 2;

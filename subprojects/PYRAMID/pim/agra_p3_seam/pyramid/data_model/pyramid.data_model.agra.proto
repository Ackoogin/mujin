// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.003.001
message AMTI_ActivityCommandType {
  // composed xsd extension base SharedRF_ApertureActivityCommandBaseType
  SharedRF_ApertureActivityCommandBaseType base = 1;
  // If specified, indicates the specific attempt of an activity to which this
  // command applies.
  optional uint32 attempt = 2;
  // Changes Activities that this Activity is dependent on. If the dependent
  // Activity's Resource Allocation is removed or never allocated, this
  // Activity's Resource Allocation will be removed or not fulfilled. This is
  // used to tie Activities within or across subsystems.
  optional DependentActivityType change_dependent_activity = 3;
  // Indicates the unique ID of a Shared Antenna and/or AntennaResources to be
  // used for the resulting Activity. This allows Mission Processing to direct
  // an specific antenna, antenna resource type, or antenna resource instance to
  // be used by the resulting Activity.
  repeated ResourceSelectionType resource_selection = 4;
  // Indicates the volume or specific Entity that defines the extents of the
  // spatial region covered by the command. For VOLUME AMTI Capabilities, the
  // entity is not an option. For CUED AMTI Capabilities, two instances of this
  // element are allowed to support an air volume that defines the extents of
  // the cue volume around the Entity. For CUED AMTI Capabilities, a single
  // instance is allowed if it is an Entity in which case the Entity location
  // uncertainty defines the extents of the cue volume or a sensor volume with a
  // cue velocity. For TRACK AMTI Capabilities it is expected that the Entity is
  // the only valid selection.
  repeated AirTargetVolumeCommandType target_volume = 5;
  // Indicates an air volume that should be "blanked"; the Capability should not
  // generate outputs associated with the volume because it is a known source of
  // clutter or other interference for the Capability. For example, a blanking
  // volume could be created around a wind farm that interferes with AMTI.
  repeated AirTargetVolumeType blanking_volume = 6;
  // Indicates the frequency to be used for the Command. If omitted, frequency
  // selection is left to the command recipient within constraints of
  // RF_Profiles imposed by RF_ControlCommand, MDF, etc.
  optional CapabilityCommandFrequencyType frequency = 7;
  // Indicates guidance regarding which aspect or aspects of collection to favor
  // if the command cannot be optimally scheduled as requested.
  optional RadarCollectionOptionsType collection_options = 8;
  // Indicates a set of bounding requirements for the particular collection
  // associated with this command. The subsystem should attempt to satisfy all
  // specified constraints.
  optional AMTI_CollectionConstraintsType collection_constraints = 9;
  // Indicates the range within which a track should be initiated and a
  // corresponding Entity message reported for detected moving targets. Beyond
  // this range tracks should not be initiated and Entity should not be reported
  // for detected moving targets. This element can be used to control track
  // loading for large and/or dense search volumes. If omitted tracking range
  // selection is left to discretion of the command recipient.
  // xsd type: DistanceType
  optional double tracking_range = 10;
  // Indicates the required repetition of the command. If omitted, the command
  // should be performed once.
  optional RepetitionType repetition = 11;
  // Indicates a required output Product of the Command. Only Products
  // consistent with AMTI and supported by the commanded AMTI Capability should
  // be requested. If omitted, no output Product should be produced. See
  // ProductTypeEnum for further details.
  repeated ProductOutputCommandBasicType product_output = 12;
}


// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_LeadershipMetricsMDT {
  // Indicates the leadership fitness metrics for the partners in the package.
  repeated MA_PartnerMetricsType package_partner_metrics = 1;
  // Specifies which election method/algorithm the package will utilize for
  // electing a Package Leader. Implementors are expected to set a default
  // election method. If blank, the default election method will be used.
  // Integer values and corresponding elections methods are as follows: 0 -
  // Bully Election Method. Supports Dynamic Fitness Scores and cases where
  // Leadership Fitness Scores need to be shared as part of an election process.
  // 1 - Static Fitness Score Election Method. Supports nomination of a leader
  // assuming leadership fitness scores remain static once they have been
  // defined by MP/C2. 2 - Maximum Consensus Election Method. Supports utilizing
  // consensus algortihms to reach team consensus on the leader while preserving
  // communication bandwidth. 3 - Raft Leader Election Method. Supports leader
  // election using the Raft consensus algorithm, which ensures a distributed
  // and fault-tolerant approach to electing a leader.
  int32 package_leader_election_method = 2;
}


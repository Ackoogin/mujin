  LOS_InertialB_Type los = 1;
  // Indicates angular width of the cone in the global horizontal plane at the
  // observation point.
  // xsd type: AnglePositiveType
  double azimuth_width = 2;
  // Indicates the angular width of the cone in the global vertical plane at the
  // observation point.
  // xsd type: AnglePositiveType
  double elevation_width = 3;
}

// Indicates the position or location to point the XX Subsystem to do a XX
// collection, track, or search as part of an XX Activity. If the XX Subsystem
// cannot point itself, then the TurretSlaved Type is used. If the system
// wants to allow the subsystem to control its own LOS then the
// ActivitySlavedID is used. FixedPointing is used to point to a predetermined
// location defined by its Enum values.
// uci_version: 002.001.002.001
message PO_TargetType {
  oneof choice {
    // Indicates the source of or explicit values for geospatial characteristics
    // of the target of the Command. When multiple points/targets are given, a
    // best-fit, multi-track or similar behavior is expected.
    PO_TargetType_Geospatial_List geospatial = 1;
    // Indicates body or inertially referenced pointing angles as the "target" of
    // the Command.
    TurretCommandPositionType pointed = 2;
    // Indicates body or inertially referenced line of sight pointing angles
    // and/or rates as the "target" of the Command.
    LOS_D_Type los_option = 3;
    // Indicates the volume or specific Entity that defines the extents of the
    // spatial region covered by the command. For non-cued Capabilities, one air
    // volume instance of this element is expected. For cued Capabilities, two
    // instances of this element are allowed: one with an Entity specified and a
    // second with an air volume that define the extents of the cue volume around
    // the Entity. For cued Capabilities, a single instance is allowed if it is an
    // Entity in which case the Entity location uncertainty defines the extents of
    // the cue volume.
    PO_TargetType_Volume_List volume = 4;
    // Indicates a PO_Command that has an accompanying TurretCommand that
    // determines the "target" of the Command. The PO Capability is then
    // pointed/targeted by the TurretCommand with other command details coming
    // from the PO_Command.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string turret_slaved = 5;
    // Indicates a Pointing Command that has a secondary/coupled Activity,
    // possibly of another Capability type such as AO or PO, that determines
    // pointing.
    ActivityID_Type activity_slaved_id = 6;
    // Indicates that a subsystem with point to a predetermined location defined
    // by its Enum values.
    FixedPointingEnum fixed_pointing = 7;
  }
}

// synthesized list wrapper for repeated choice member Geospatial in PO_TargetType (choice)
message PO_TargetType_Geospatial_List {
  repeated TargetType items = 1;
}

// See annotations in child elements and messages/elements that use this type

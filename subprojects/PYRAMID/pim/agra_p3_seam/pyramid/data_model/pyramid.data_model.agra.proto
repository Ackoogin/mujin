  // are associated with the same TrackOptions ID in TrackSettings will be
  // impacted the same in accordance to this settings command message. Any
  // PO_Commands received after this message has been processed will use these
  // new settings unless directly overridden by settings specified in the
  // PO_Command.
  repeated PO_TrackSettingsType track_settings = 3;
  // The component settings specified in this field are used to set the default
  // component settings used by the sensor. All capabilities that are associated
  // with the same ComponentID in ComponentSettings will be impacted the same in
  // accordance to this settings command message. Any PO_Commands received after
  // this message has been processed will use these new settings unless directly
  // overridden by settings specified in the PO_Command.
  repeated PO_ComponentSettingsType component_settings = 4;
  // The collection constraints settings specified in this field are used to set
  // the default collection settings used by the sensor. Any PO_Commands
  // received after this message has been processed will use these new settings
  // unless directly overridden by settings specified in the PO_Command.
  optional PO_CollectionConstraintsSettingsType collection_constraints_settings = 5;
  // Specifies which messages are to be output by the Capability as the result
  // of capability commands. Note: Only values advertised in the Capability
  // message are allowed. Any non-supported values should result in rejection of
  // the settings command. List size for this element is based on "Select All
  // That Apply" condition.
  repeated PO_MessageOutputsEnum message_output = 6;
  // FOR limits to limit the optical view of the sensor to what it can see from
  // its mounting position on the aircraft. These values override values defined
  // in the Capability message.
  optional FOR_Type for_settings = 7;
  // FOR limits to protect the sensor from being blinded by the sun or weapon
  // effects(i.e. missile leaving jet). These values override values defined in
  // the Capability message.
  optional FOR_Type thermal_blanking_for_settings = 8;
}

// Commanded values for track parameters that will be used to customize target
// detections.
// uci_version: 000.000.000.000
message PO_TrackSettingsType {
  // This ID is used in messages and capabilities to identify a particular track
  // option.
  TrackOptionsID_Type track_option_id = 1;
  // Sets the default target tracker setting to attempt to acquire a target,
  // lock onto the target, or release the target and stop tracking.
  optional PO_TrackCommandEnum mode = 2;
  // Set the default condition used in adjusting the size of the area in which
  // the target tracker tries to acquire a target. The increase and decrease
  // commands are dependent on the step sizes supported by the capability as
  // defined in the associated program related documentation.
  optional IncreaseDecreaseEnum track_area = 3;
  // When enabled the tracker will assume last known heading and rate for a time
  // period before breaking lock.
  optional PO_LockPersistenceEnum lock_persistence = 4;
  // The set of commanded ATR Filter parameters based on one or more available
  // identity types used to perform associated target track or search filtering.
  optional IdentityBasicType atr_filter = 5;
  // Sets the offset track value from the center of the LOS.
  optional LOS_VariableB_Type offset_track_setting = 6;
  // Commanded value that defines the number of seconds since the last update of
  // an Observed Entity before the data is considered to be stale.
  // xsd type: DurationType
  optional string observed_entity_threshold = 7;
  // The tracking range threshold commanded for the associated capability.
  // xsd type: DistanceType
  optional double tracking_range = 8;
  // Commanded value that defines the amount of time to coast a track before
  // dropping it. The value should fall in the set of valid range values
  // associated with the capability and associated environment setting. List
  // size is based on allowing one per environment option available.
  repeated PO_CoastSettingValueType coast_setting = 9;
  // The commanded blanking volume that constrains the LOS or track area from
  // regions that the PO sensor would not be desired for the current capability.
  optional PO_AirTargetVolumeType blanking_volume = 10;
}


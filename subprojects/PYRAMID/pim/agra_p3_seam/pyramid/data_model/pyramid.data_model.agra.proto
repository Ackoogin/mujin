// The base type for an Orbital Surveillance Task.
// uci_version: 003.000.001.000
message OrbitalSurveillanceTaskBaseType {
  // Indicates the Capability's first tier type in the Orbital Surveillance
  // taxonomy. For Orbital Surveillance, the first tier is the focus of the
  // collection, either based on one or more objects or for a defined volume.
  // See enumerated type annotations for further details.
  OrbitalSurveillanceCapabilityEnum capability_type = 1;
  // Indicates a SubCapability of the Orbital Surveillance Capability, the
  // second tier in the taxonomy of Orbital Surveillance. For Orbital
  // Surveillance, the second tier is the desired outcome of the collection. See
  // enumeration annotations for further details.
  OrbitalSurveillanceSubCapabilityDetailsChoiceType sub_capability_type = 2;
  // This provides additional context for the collection planner and (as
  // appropriate) the sensor units to inform the decisions on which sensors are
  // appropriate and how best to set up collections. This context can help to
  // compensate for shortfalls in the fidelity of the sensor models.
  optional OrbitalSurveillanceSubCapabilityEnum information_objective = 3;
  // This optional field indicates the smallest sized objects to look for in the
  // sensor Task.
  // xsd type: DistanceType
  optional double min_size = 4;
  // If TRUE, report whether the tasked object was acquired or not. In space
  // domain awareness (SDA) domain, this is referred to as "PosNeg".
  bool confirm_object_acquisition = 5;
  // Indicates the time by which the products are needed by the source which
  // created the Orbital Surveillance Task.
  optional ProductNeededByType product_needed_by = 6;
  // Indicates the required, allowed, or excluded sensors that the planner is
  // allowed to consider tasking for collection to acquire the desired data.
  optional AllowableSensorsType sensor_constraints = 7;
  // Indicates additional instructions associated with tasking for sensor
  // collections. When "All" is chosen, all of the special instructions must be
  // accomplished to satisfy the Task. When "Any" is chosen, that Task can be
  // satisfied by performing only one of the special instructions provided.
  repeated SDA_SpecialInstructionsConstraintType sda_special_instructions = 8;
}

// Indicates a SubCapability of the Orbital Surveillance Capability, the
// second tier in the taxonomy of Orbital Surveillance. For Orbital
// Surveillance, the second tier is the desired outcome of the collection. See
// enumeration annotations for further details.
// uci_version: 002.000.001.000
message OrbitalSurveillanceSubCapabilityDetailsChoiceType {
  oneof choice {
    // Indicates a task to search an a region of space or for a specific object.
    OrbitalSurveillanceSearchType search = 1;
    // Indicates a task to achieve/maintain specified orbit accuracy.
    OrbitAccuracyType orbit_accuracy = 2;
    // Indicates a Task to characterize an object.
    CharacterizationObjectiveType characterization = 3;
    // Indicates a task involving multiple objects.
    MultiObjectType multi_object = 4;
    // Indicates a task to detect maneuvers (may require more than one sensor) and
    // near real-time processing.
    ManeuverDetectionType maneuver_detection = 5;
    // Indicates a task that monitors primary target to detect deployment of
    // secondary object or objects.
    DeploymentDetectionType deployment_detection = 6;
  }
}

// Input parameters for an orbital surveillance search task type.
// uci_version: 000.000.000.000
message OrbitalSurveillanceSearchType {
  // Indicates the maximum speed of the target.
  // xsd type: SpeedType
  optional double max_target_speed = 1;
  // Indicates the minimum speed of the target.
  // xsd type: SpeedType
  optional double min_target_speed = 2;
}

// Input parameters for an orbital surveillance orbit accuracy task type.
// uci_version: 001.000.000.000
message OrbitAccuracyType {

  // network connection. Provides for the correlation of network link to a new
  // activity or to an existing activity that will be updated.
  optional NetworkLinkID_Type network_link_id = 1;
  // The ID communication capabilities which this is applicable to. If empty,
  // means all.
  optional CapabilityID_Type comm_capability_id = 2;
  // The ID of the Activity (Instances) of the communication capability which
  // this is applicable to. If empty, means all.
  optional ActivityID_Type comm_activity_id = 3;
  // Helps to map On-board IDs to data-link specific IDs.
  repeated MessageDestinationType data_destination = 4;
  // Provides a reflection of what port assignments (IO and RF) are associated
  // with this link. It is possible to have more than one to reflect multiple
  // simultaneous paths.
  optional CommLinkPortMapType link_port_assignments = 5;
  // Specifies whether this message is new or updated.
  optional CommConfigurationStateEnum configuration_state = 6;
}


  MA_SystemManagementRequestMDT message_data = 2;
}

// This message is used to request changes to a system's status or
// configurable settings.
// uci_version: 003.000.003.000
message MA_SystemManagementRequestMDT {
  // composed xsd extension base RequestBaseType
  RequestBaseType base = 1;
  // Indicates whether this SystemManagementRequest is a request to change data
  // or an order that must be followed. Defaults to REQUEST if not filled.
  optional EntityManagementRequestAuthorityEnum authority_type = 2;
  // This element indicates the type of service requesting the change. Defaults
  // to AUTOMATIC_INTERNAL if not filled.
  optional RequestSourceEnum request_source = 3;
  // Indicates the system to be acted upon by this message.
  SystemID_Type reference_system_id = 4;
  // Indicates the type of request to perform on a system.
  repeated MA_SystemManagementRequestType request_type = 5;
  // Indicates if this SystemManagementRequest came from the system controlling
  // the referenced system. This indicates a higher confidence in the new data.
  optional bool update_from_controlling_unit = 6;
  // Indicates the system initiating this request and allows the requesting
  // Service, Activity, or Network to be specified.
  optional SystemMessageIdentifierType source = 7;
}

// Indicates if EntityManagementRequest is a request or an order.
enum EntityManagementRequestAuthorityEnum {
  ENTITY_MANAGEMENT_REQUEST_AUTHORITY_ENUM_UNSPECIFIED = 0;
  ENTITY_MANAGEMENT_REQUEST_AUTHORITY_ENUM_REQUEST = 1;
  ENTITY_MANAGEMENT_REQUEST_AUTHORITY_ENUM_ORDER = 2;
}

// Enumeration listing the type of source sending an Entity Management Request.
enum RequestSourceEnum {
  REQUEST_SOURCE_ENUM_UNSPECIFIED = 0;
  REQUEST_SOURCE_ENUM_MANUAL_EXTERNAL = 1;
  REQUEST_SOURCE_ENUM_MANUAL_INTERNAL = 2;
  REQUEST_SOURCE_ENUM_AUTOMATIC_EXTERNAL = 3;
  REQUEST_SOURCE_ENUM_AUTOMATIC_INTERNAL = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message MA_SystemManagementRequestType {
  oneof choice {
    // Indicates a request to modify the mode of a system.
    MessageModeEnum set_mode = 1;
    // Indicates a request to set the identity of a system.
    SystemIdentityType set_identity = 2;
    // Indicates a request to modify the Link16Metadata of a system.
    Link16MetadataType set_link16_metadata = 3;
    // Set the voice control frequency of a system.
    VoiceControlType set_voice_control = 4;
    // When TRUE, indicates an order to report all locally derived sensor, signal,
    // track or Entity data. When FALSE, indicates an order to stop reporting.
    bool set_sensor_entity_reporting = 5;
    // Indicates a request to modify vehicle settings.
    MA_VehicleCommandDataType vehicle_settings = 6;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.001.000.001
message Link16MetadataType {
  // The network connection on which this metadata will be sent and received.
  optional NetworkLinkID_Type network_link_id = 1;
  // Track Number string of the Link 16 PPLI reporting this unit. Must be
  // reported on the network referenced in NetworkLinkID.
  // xsd type: Link16TrackNumberType (pattern [A-HJ-NP-Z0-7]{2}[0-7]{3})
  optional string source_track = 2;
  // SystemID of the Link 16 PPLI reporting this unit. Must be reported on the
  // network referenced in NetworkLinkID.
  optional SystemID_Type reporting_system_id = 3;
  // Indicates the associated vehicle is airborne per MIL-STD-6016 DFI 732 DUI
  // 002.
  optional bool airborne = 4;
  // Identifies the channel used to control this vehicle per MIL-STD-6016 DFI
  // 348 DUI 006.
  // xsd type: Link16_ControlChannelType
  optional uint32 control_channel = 5;
  // Indicates this vehicle is a flight lead per MIL-STD-6016 DFI 730 DUI 001.
  optional bool flight_lead_indicator = 6;
  // The UUID of this vehicle's flight lead per MIL-STD-6016 DFI 769 DUI 039 or
  // TN if there is no UUID for the TN. Can be a reference to the own vehicle.
  optional TrackNumberOrEntityType flight_lead = 7;
  // Indicates the type of link on which the vehicle is reporting per
  // MIL-STD-6016 DFI 1719 DUI 002.
  optional GenericUnitTypeEnum generic_unit_type = 8;
  // Indicates if this vehicle is the mission commander per MIL-STD-6016 DFI
  // 1901 DUI 001.
  optional bool mission_commander_indicator = 9;
  // Time when the precision position data was valid per MIL-STD-6016 DFI 792
  // DUI 008, 797/004, 380/001 and 380/008.
  // xsd type: DateTimeType (pattern .+Z)
  optional string precision_time = 10;
  // Quality of the PrecisionTime field per MIL-STD-6016 DFI 283 DUI 007.
  optional PositionTimeQualityEnum position_time_quality = 11;
  // Indicates the type of link unit being forwarded by the JTIDS/MIDS unit per
  // MIL-STD-6016 DFI 1719 DUI 001.
  optional SiteEnum site = 12;
  // Air and Land Operational Capability based on MIL-STD-6016 DFI 753 DUIs 002
  // and 003.
  optional OperationalCapabilityEnum operational_capability = 13;
  // Indicates the availability of Link 16.
  optional ConnectionStatusEnum link16_status = 14;
  // Status of installed RECCE systems.
  optional ReconnaissanceStatusType reconnaissance_status = 15;
  // Indicates to what degree the unit is participating in the Link 16 interface.
  optional NPSI_Enum network_participation_status_indicator = 16;
  // Indicates if the radar is operating in a single RF channel or an automatic
  // frequency agility channel group.
  optional RadarChannelIndicatorEnum radar_channel_indicator = 17;
  // Identifies the Radar RF Channel or Automatic Frequency Agility Group
  // selected. The frequency or frequencies associated with each radar channel
  // or group is unique to each air specific type (SpecificVehicle).
  // xsd type: Link16_RadarChannelType
  optional uint32 radar_channel = 18;
  // Specifies the missile channel selected for the first weapon reported in
  // StoreType.
  // xsd type: Link16_MissileChannelType
  optional uint32 missile_channel = 19;
  // Indicates the type and status of a defensive jammer.
  repeated DefensiveJammerSystemInfoType defensive_jammer_system_info = 20;
  // Indicates the type of an external offensive jammer. Multiplicity size of 10
  // based on MIL-STD-6016.
  repeated JammerStationType jammer_station = 21;
  // Indicates the type and status of the internal communication countermeasures
  // set.
  optional CommCountermeasureSetEnum comm_countermeasure_set = 22;
  // Indicates the status of a unit's re-control channel laying capability over
  // various channels/networks.
  optional Link16ActiveRelayIndicatorsType active_relay_indicators = 23;
  // The track number of the commander of a mission that the message originator
  // is a member of. This track number may be own unit track number.
  optional TrackNumberOrEntityType mission_commander = 24;
}


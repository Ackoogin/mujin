  // Indicates a SubCapability of the AMTI Capability; the second tier in the
  // taxonomy of AMTI. For AMTI, the second tier is waveform category. See
  // enumeration annotations for further details. List size for this element is
  // based on "Select All That Apply" condition. The selection of
  // AUTO_SUBCAPABILITY_SELECT still requires the evaluation of all sibling
  // attributes by the Capability.
  repeated AMTI_SubCapabilityEnum sub_capability_type = 3;
  // Indicates the Capability's support for select optional elements in its
  // accepted control interface messages. Support for these elements is expected
  // to vary across Capability implementations but must be known in order to
  // adapt and configure upstream Systems and Services which use the Capability.
  AMTI_CapabilityOptionsType capability_options = 4;
  // Indicates a frequency range used by the Capability.
  repeated FrequencyRangeType supported_frequencies = 5;
  // Indicates a message that is an output of the Capability. See enumerated
  // type annotations for details. List size for this element is based on
  // "Select All That Apply" condition.
  repeated AMTI_MessageOutputsEnum message_output = 6;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.001.000.002
message AMTI_CapabilityOptionsType {
  // Indicates whether (TRUE) or not (FALSE) the Capability supports the
  // InterruptOtherActivities element in the AMTI_Command message.
  bool interrupt_other_activities = 1;
  // Indicates whether (TRUE) or not (FALSE) the Capability supports the
  // CollectionPolicy element in the AMTI_Command message.

// uci_version: 000.000.000.000
message MA_OpCommandMDT {
  // Indicates an instance of an Op* command. An Op* command message can have
  // multiple command instances to allow a sequence of related commands in a
  // single coherent message. Each command instance reports status via a
  // separate, independent Op* CommandStatus message.
  repeated MA_OpCommandType command = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.002.000
message MA_OpCommandType {
  // composed xsd extension base CommandBaseType
  CommandBaseType base = 1;
  // Indicates the Op* being commanded. Leaving this blank makes the command
  // apply to all Op* IDs
  optional OpID_ChoiceType op_id = 2;
  // Indicates the desired state of the Op* instance listed in the OpID
  OpStateEnum commanded_state = 3;
  // Indicates the precedence and priority levels of the particular data
  // payloads being sent.
  ComparableRankingType rank = 4;
  // Indicates refined/overridden values of constraints for the Op*. Added to
  // allow similar override options in direct commanding as is available in Op*
  // planning.
  optional MA_OpConstraintsType constraint_override = 5;
  // Indicates that the Command shall be performed even though it was previously
  // rejected.
  optional bool override_rejection = 6;
  // C2 sources work at different levels of detail and abstraction, progressing
  // from what to do to how specifically to do it. This element provides
  // traceability to the external tasking from which this Op* command was
  // derived.
  optional TraceabilityType traceability = 7;
}

// A list of unique ID indicating the op type.
// uci_version: 000.000.000.000
message OpID_ChoiceType {
  oneof choice {
    // Indicates the unique identifier of the OpLine.
    OpLineID_Type op_line_id = 1;
    // Indicates the unique identifier of the OpPoint.
    OpPointID_Type op_point_id = 2;
    // Indicates the unique identifier of the OpZone.
    OpZoneID_Type op_zone_id = 3;
    // Indicates the unique identifier of the OpVolume.
    OpVolumeID_Type op_volume_id = 4;
    // Indicates the unique identifier of the OpRouting.
    OpRoutingID_Type op_routing_id = 5;
  }
}


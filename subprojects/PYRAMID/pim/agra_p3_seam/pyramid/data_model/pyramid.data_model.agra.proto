// Provides the State Vector Propagation Parameters.
// uci_version: 000.002.000.001
message OrbitalSingleVectorParametersType {
  // Area used in the propagation model. Units in m^2.
  // xsd type: AreaType
  optional double area = 1;
  // Mass used in the propagation model. Units in kg.
  optional double mass = 2;
  // The orbital model settings used.
  optional EphemerisOrbitalModelType orbital_model = 3;
}

// Indicates the USSF Astrodynamic Standards orbital model parameters.
// uci_version: 000.000.000.000
message EphemerisOrbitalModelType {
  // Indicates the orbital model used to create the ephemeris.
  optional OrbitalModelType orbital_model = 1;
  // Indicates the requested interval between ephemeris results.
  // xsd type: xs:duration (carried as string on the OMS wire)
  optional string step_size = 2;
  // Accounts for the effects imposed by the reflectivity of the satellite with
  // regard to the pressure exerted by solar radiation, measured in meters
  // squared per kilogram. May be omitted when the perturbation is not used for
  // the subject RSO.
  optional double solar_radiation_pressure_coefficient = 3;
  // Accounts for the effects imposed by the specific interaction of the
  // satellite's shape and material composition with regard to drag model for
  // the Earth's atmosphere, measured in meters squared per kilogram. May be
  // omitted when the perturbation is not used for the subject RSO.
  optional double ballistic_coefficient = 4;
}

// Indicates the orbital model used to create the ephemeris.
// uci_version: 000.000.000.000
message OrbitalModelType {
  // The name of the orbital model.
  OrbitalModelNameEnum name = 1;
  // This field should contain the version number (i.e. 1.2.2).
  // xsd type: VisibleString32Type (pattern [ -~]{0,32})
  string version = 2;
}

// Indicates orbital model propagators that are used for predicting satellite
// position and velocity.
enum OrbitalModelNameEnum {
  ORBITAL_MODEL_NAME_ENUM_UNSPECIFIED = 0;
  ORBITAL_MODEL_NAME_ENUM_SGP4 = 1;
  ORBITAL_MODEL_NAME_ENUM_GPS = 2;
  ORBITAL_MODEL_NAME_ENUM_HPOP = 3;
  ORBITAL_MODEL_NAME_ENUM_SPICE = 4;
  ORBITAL_MODEL_NAME_ENUM_SP3 = 5;
  ORBITAL_MODEL_NAME_ENUM_ELEVEN_PARAMETER = 6;
  ORBITAL_MODEL_NAME_ENUM_LOP = 7;
  ORBITAL_MODEL_NAME_ENUM_SP = 8;
}

// This type identifies an Entity that was not observed in the time frame
// and/or location expected. In Space operations, a Resident Space Object
// (RSO) entity is considered "lost" if it does not have any associated metric
// observations within the last 30 days.
// uci_version: 001.001.001.000
message EntityLostMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // See annotations in child elements and messages/elements that use this type
  // for details.
  EntityLostMDT message_data = 2;
}

// An Entity that was not observed in the time frame and location expected. In
// Space operations, a Resident Space Object (RSO) entity is considered "lost"
// if it does not have any associated metric observations within the last 30
// days.
// uci_version: 000.000.000.000
message EntityLostMDT {
  // This element represents the unique identifier of the entity.
  EntityID_Type entity_id = 1;
  // Time of the most recent correlated observation to the object.
  // xsd type: DateTimeType (pattern .+Z)
  string last_observation_time = 2;
  // Identifies the number of days the object has been lost.
  optional uint32 days_lost = 3;
  // Number of missing events since the most recent correlated observation.
  uint32 missing_count = 4;
  // A number from 0 to 1 with 1 representing complete confidence that the
  // object is not in its expected orbit. Note that the value should not reach
  // absolute 0 or absolute 1.
  double probability = 5;
  // The missing probability of the object prior to the update reflected in the
  // "probability" field.Intended to be used for comparison to the newly
  // reported missing probability.
  double previous_probability = 6;
  // Indicates the System, Service, and Capability that has reported that an
  // Entity has been lost.
  EntityLostSourceType source = 7;
}

// Indicates the System, Service, and Capability that has reported that an
// Entity has been lost.
// uci_version: 000.000.000.000
message EntityLostSourceType {
  // Indicates the unique identifier for the system.
  SystemID_Type system_id = 1;
  // Indicates the unique identifier for the service.
  optional ServiceID_Type service_id = 2;
  // Indicates the unique identifier for the capability.
  optional CapabilityID_Type capability_id = 3;
}

// See the annotation in the associated message for an overall description of
// the message and this type.
// uci_version: 001.000.002.000
message FileLocationMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // Indicates the state of the internal software object that the data in the
  // message is based upon. The state of the software object is determined by
  // the publisher. The publisher could be the original/master publisher or an
  // intermediary re-publisher such as a persistence/data manager. This element
  // is not a commanded CRUD operation. It is not an indication of the state of
  // an instance of a message. It is not a mechanism for partial, incremental,
  // or fragmentary publication of a message. It is a signal from a publisher to
  // subscribers. For REMOVED state, in particular, some subscribers will mirror
  // the publisher and treat the message as if the object no longer exists, but
  // others, such as mission recorders, might not (in order to support retaining
  // historical records of activity, for example).
  optional ObjectStateEnum object_state = 2;
  // This element represents the details regarding the network location for a
  // particular file.
  FileLocationMDT message_data = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.001.000.001
message FileLocationMDT {
  // composed xsd extension base DataRecordBaseType
  DataRecordBaseType base = 1;
  // Human readable identifier of the file location.
  FileLocationID_Type file_location_id = 2;
  // This element represents the unique identifier of the FileMetadata
  // associated with this message.
  FileMetadataID_Type file_metadata_id = 3;
  // Provides a rough indication of how long the file specified by the sibiling
  // FileMetatdataID will be available at the specified Location. All specified
  // locations are accesses for the same file.
  repeated LocationAndStatusBaseType location_and_status = 4;
  // Time reference for the life of the file.
  optional ArchiveRequestType archive_configuration = 5;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message FileMetadataID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// Specifies the location and the availability of the product/file.
// uci_version: 000.000.000.000
message LocationAndStatusBaseType {
  // Provides a rough indication of how long the product/file will be available
  // at the sibling NetworkLocation. See enumeration annotations for further
  // details.
  MediaLocationStatusEnum status = 1;
  // The network and system location of the product/file.
  ProductLocationType location = 2;
}

// Provides a rough indication of how long the media will be available.
enum MediaLocationStatusEnum {
  MEDIA_LOCATION_STATUS_ENUM_UNSPECIFIED = 0;
  MEDIA_LOCATION_STATUS_ENUM_TEMPORARY = 1;
  MEDIA_LOCATION_STATUS_ENUM_FINAL = 2;
  MEDIA_LOCATION_STATUS_ENUM_REMOVED = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message ProductLocationType {
  oneof choice {
    // Indicates the network location at which the file or product, whose data
    // format is not defined in the UCI schema, can be found.
    EndpointReferenceType network = 1;
    // Indicates that the File or Product is located in/on a System and is not
    // reachable via a network URI; however, it can possibly be made reachable via
    // a network URI if requested by a download request.
    ProductSystemLocationType system = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message EndpointReferenceType {
  // Specifies the Uniform Resource Identifier (URI) of the product.
  // xsd type: AttributedURI_Type (pattern [ -~]{1,256})
  string address = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message ProductSystemLocationType {
  // The System where the product or file is located.
  SystemID_Type system_id = 1;
  // Indicates the Capability that generated the product or file. This element

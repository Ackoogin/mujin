  optional double coscone_y_coscone_y_rate = 1;
  // The covariance between the inner product of the target pointing vector and
  // the Y-axis of the array face and the rate of change of the inner product of
  // the target pointing vector and the Z-axis of the array face. CosconeY and
  // CosconeZ represent the inner product of the target pointing vector and the
  // "Horizontal" (Y) and "Down" (Z) axes respectively. This term is only used
  // for two-dimensional arrays and has units of per second.
  optional double coscone_y_coscone_z_rate = 2;
  // The covariance between the inner product of the target pointing vector and
  // the Z-axis of the array face and the rate of change of the inner product of
  // the target pointing vector and the Y-axis of the array face. CosconeY and
  // CosconeZ represent the inner product of the target pointing vector and the
  // "Horizontal" (Y) and "Down" (Z) axes respectively. This term is only used
  // for two-dimensional arrays and has units of per second.
  optional double coscone_z_coscone_y_rate = 3;
  // The covariance between the inner product of the target pointing vector and
  // the Z-axis of the array face and the rate of change of the inner product of
  // the target pointing vector and the Z-axis of the array face. The Z-axis is
  // the "Down" axis of the array, perpendicular to both the X-axis (boresight)
  // and the Y-axis (horizontal). This term is only used for two-dimensional
  // arrays and has units of per second.
  optional double coscone_z_coscone_z_rate = 4;
  // The covariance between the rate of change of the inner product of the
  // target pointing vector and the Y-axis of the array face and the rate of
  // change of the inner product of the target pointing vector and the Z-axis of

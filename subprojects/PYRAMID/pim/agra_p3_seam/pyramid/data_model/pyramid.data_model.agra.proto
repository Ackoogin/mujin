  // xsd type: AltitudeType
  optional double reference_altitude = 2;
  // Indicates estimated remaining time of operation with current
  // fuel/charge/power plus the estimated time remaining until the endurance
  // footprint shrinks to its smallest size.
  // xsd type: DurationType
  optional string duration = 3;
}


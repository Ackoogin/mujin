  // an instance of a message. It is not a mechanism for partial, incremental,
  // or fragmentary publication of a message. It is a signal from a publisher to
  // subscribers.For REMOVED state, in particular, some subscribers will mirror
  // the publisher and treat the message as if the object no longer exists, but
  // others, such as mission recorders, might not (in order to support retaining
  // historical records of activity, for example).
  optional ObjectStateEnum object_state = 2;
  // See annotations in child elements and messages/elements that use this type
  // for details.
  MA_ActionPlanValidationMDT message_data = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_ActionPlanValidationMDT {
  // The ID of this ActionPlanValidation message.
  ActionPlanValidationID_Type action_plan_validation_id = 1;
  // The ID of the Plan this status pertains to.
  ActionPlanID_Type plan_id = 2;
  // The ID of the Validator responsible for this Status message.
  ValidatorType validator = 3;
  // Indicates the determined validation state of the plan. The variables a
  // given planning service, operator or system considers when validating a plan
  // varies. Different variables might be considered for a single given System
  // depending on the level of detail of the plan. The scope and meaning of
  // "valid" comes from context of the services, operator and systems creating
  // the plan. The value in this element can change during validation
  // processing. The final validity determination is given when the sibling
  // ValidationStatus element reaches an end state.
  PlanValidationStateEnum validation_state = 4;
  // Indicates actual and predicted metrics for completion of the validation
  // process.
  optional CompletionStatusType completion_status = 5;
  // Indicates items associated with command processing that failed to complete.
  // For example if a particular required Capability wasn't available, it could
  // be referenced here. This element/type is highly flexible. It can reference
  // almost any message/concept in UCI as a planning issue. The wide range of
  // messages/concepts it can reference makes it 1) difficult to use as a basis
  // for software/services to resolve the issue but 2) an excellent general
  // method for processing algorithms to convey issues to operators. This
  // element shouldn't be used to report processing issues/results that are more
  // directly indicated by other processing status elements. For example, for
  // planning processing, other elements focus specifically on per-Requirement
  // allocation results therefore this element shouldn't be used for
  // per-Requirement allocation results.
  repeated IncompleteProcessingType incomplete_item = 6;
  // Indicates an Action whose allocation was found to be invalid. If the
  // associated ActionPlanValidationCommand indicated "modify to validate",
  // results of attempts to modify the allocation can be found in sibling
  // elements.
  repeated ActionAllocationInvalidType invalid_allocation = 7;
  // Indicates allocation results per Action. This element is only expected when
  // the ActionPlan was found to be invalid and the associated
  // ActionPlanValidationCommand indicated "modify to validate" was allowed.
  repeated MA_ActionPlanningResultType allocation_result = 8;
  // Indicates a modified, valid version of the evaluated ActionPlan. This
  // element should only be given when the evaluated ActionPlan was found to be
  // invalid, the ActionPlanValidationCommand indicated "modify to validate" and
  // the modifications resulted in a valid ActionPlan.
  repeated ActionPlanID_Type modified_plan_id = 9;
}


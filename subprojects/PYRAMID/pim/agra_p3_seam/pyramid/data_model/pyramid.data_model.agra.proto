  // List.
  repeated MA_ExecutionPriorityListItemType list_item = 2;
}

// The ID type that refers to a specific Execution Priority List.
// uci_version: 000.000.000.000
message MA_ExecutionPriorityListID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_ExecutionPriorityListItemType {
  // Defines the specific task or action associated with the list item.
  MA_ExecutionPriorityTypeChoiceType subject = 1;
  // Used to compare different items (Tasks and Actions). This is accomplished
  // by first comparing two ComparableRankingTypes' priority values. In the
  // event of the items having equal priority values the precedence values are
  // then compared. For example, Task A has a (priority, precedence) value pair
  // of (4, 10), Task B has a (priority, precedence) value pair of (4, 23), Task
  // C has a (priority, precedence) value pair of (7, 2): the ranking order
  // would be first Task A, then Task B, then Task C. Since Task A and Task B
  // have the same relative priority value, Task A will be ranked before Task B
  // because Task A has a higher relative precedence value. Task C will be
  // ranked after Tasks A and B because it has a lower relative priority value
  // than Tasks A and B.
  ComparableRankingType rank = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_ExecutionPriorityTypeChoiceType {
  oneof choice {
    // Indicates the task type.

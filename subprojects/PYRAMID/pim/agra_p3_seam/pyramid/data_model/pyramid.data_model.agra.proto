// Container object for the different types of OpPoint*Enums. A separate enum
// applies to each of the choice types.
// uci_version: 000.000.000.000
message OpPointCategoriesUniqueDataType {
  oneof choice {
    // Emergency Point and associated reference types.
    EmergencyReferencePointType emergency = 1;
    // Hazard Point and associated reference types.
    Link16HazardType hazard = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.003.000
message EmergencyReferencePointType {
  // A reference to the original object that caused this OpPoint to be created.
  // Used to refer back to the original vehicle involved in an emergency. This
  // is used keep the values of the last known location of the object available
  // for the complete life cycle of the OpPoint instead of the life cycle of the
  // original object.
  OpPointReferenceType reference = 1;
  // Range of personnel involved as represented by MIL-STD-6016.
  optional StrengthRangeType personnel_count = 2;
  // If present, position accuracy equals last known position.
  // xsd type: EmptyType (pattern [A-Za-z]{0})
  optional string last_known_position = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message OpPointReferenceType {
  oneof choice {
    // The state of an object when an emergency is reported. This data is stored
    // to keep data about an object with an emergency after the object is dropped
    // in the event that the lifetime of the emergency extends past the lifetime
    // of the object.
    GeoLocatedStoredObjectType stored_object = 1;
    // The state of an object when an emergency is reported. This data is
    // referenced when the lifetime of the object will persist for the duration of
    // the emergency being reported.
    GeoLocatedObjectType stored_object_ref = 2;
    // Object used when not known in UCI.
    DataLinkIdentifierPET data_link_object = 3;
  }
}

// A choice between archived objects with a defined location.
// uci_version: 003.000.003.001
message GeoLocatedStoredObjectType {
  oneof choice {
    // The last Entity value reported before the emergency point was created.
    EntityDataType entity = 1;
    // The last System value reported before the emergency point was created.
    SystemDataType system = 2;
    // The last OpPoint value reported before the emergency point was created.
    EmergencyReferenceOpPointType op_point = 3;
    // The last OpLine value reported before the emergency point was created.
    OpLineMDT op_line = 4;
    // The last OpZone value reported before the emergency point was created.
    OpZoneMDT op_zone = 5;
    // The last OpVolume value reported before the emergency point was created.
    OpVolumeMDT op_volume = 6;
  }
}

// Provides the capability to pass an Entity and any associated metadata
// message in the same structure. This is typically used when there is a need
// to pass the entirety of the information about an Entity at a given time as
// a part of another message. For example, an OpPoint representing an
// emergency may include the associated Entity and EntityMetadata from the
// time the emergency was declared.
// uci_version: 003.000.003.000
message EntityDataType {
  // Referenced Entity message data.
  EntityMDT entity = 1;
  // Metadata associated with the referenced Entity.
  optional EntityMetadataMDT metadata = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message EntityMetadataMDT {
  // Unique identifier for this Metadata instance.
  MetadataID_Type metadata_id = 1;
  // Reference to the Entity this data extends.
  EntityID_Type entity_id = 2;
  // Extension point for Metadata content. There can be separate metadata for
  // each contributing source.
  repeated EntityMetadataPET metadata = 3;
}

// The ID type for UCI IDs that correspond to Metadata messages.
// uci_version: 000.000.000.000
message MetadataID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// An abstract base type for defining metadata content. There can be separate
// metadata for each contributing source. Available extension types include:
// Link16EntityMetadataType.
// uci_version: 000.000.000.000
message EntityMetadataPET {
}

// The complete data needed to represent a System.
// uci_version: 003.000.003.000
message SystemDataType {
  // Status of the given system.
  SystemStatusMDT system_status = 1;
  // Position of a given system.
  optional PositionReportMDT position = 2;
  // Navigation status of a given system.
  optional NavigationReportMDT navigation = 3;
  // Metadata associated with a given system.
  optional SystemMetadataMDT metadata = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.001
message SystemStatusMDT {
  // Identifier that refers to any level of control station or a vehicle.
  SystemID_Type system_id = 1;
  // This element represents the operational state of the system with respect to
  // active mission activities.
  SystemStateEnum system_state = 2;
  // Indicates the source of the data in sibling elements. See enumeration
  // annotations for further details.
  SystemSourceEnum source = 3;
  // Indicates the eligibility of this Entity for automated fusion operations by
  // the Entity's source System/Service and/or fusion tier. FULL indicates that
  // this Entity, and therefore its contributor Entity or Entities, is fully
  // eligible for future automated fusion operations. SELECTIVE_EXCLUSION
  // indicates that the Entity is eligible for future automated fusion
  // operations excluding merging with the Entity or Entities given in the
  // sibling CorrelatedEntity element. SELECTIVE_INCLUSION indicates that the
  // Entity is eligible for future automated fusion operations but only with the
  // Entity or Entities given in the sibling CorrelatedEntity element. NONE
  // indicates that this Entity is not eligible for future automated fusion
  // operations regardless of the associated Entity. This element does not
  // restrict operator initiated fusion operations via the
  // EntityManagementRequest.
  optional EntityFusionEligibilityEnum fusion_eligibility = 4;
  // Identifies resource manufacturer and model. This element can serve as means
  // to "look-up" a description or model of the System that is described
  // independent of UCI.
  // xsd type: VisibleString32Type (pattern [ -~]{0,32})
  optional string model = 5;
  // This element represents the mission/functional identity of the System. It
  // is left to applications using UCI to enforce compatibility with the
  // portions of MIL-STD-6016 or other standards referenced herein.
  optional SystemIdentityType identity = 6;
  // Indicates the communication state and usage information for this system.
  SystemCommunicationsType communications = 7;
  // The UUID of the operator associated with this system.
  repeated OperatorID_Type operator_id = 8;
  // Indicates a C2 relevant Subsystem of the System.
  repeated SubsystemID_Type subsystem_id = 9;
  // Indicates a C2 relevant Capability of the System.
  repeated CapabilityID_Type capability_id = 10;
  // Indicates a Service that is implemented by the System.
  repeated ServiceID_Type service_id = 11;
  // General status information about the asset.
  optional PlatformStatusType platform_status = 12;
  // This type contains the connection data needed to communicate with a vehicle
  // using voice radios.
  optional VoiceControlType voice_control = 13;
  // This element indicates an activity, that isn't otherwise represented by UCI
  // Tasks, Capability commands, etc. being performed by the Entity.
  repeated ActivityByType activity_by = 14;
  // The number of entities represented by a single track.
  optional StrengthType strength = 15;
}

// SystemIdentityType is an extension of IdentityType to include additional
// information specifically relevant to the identity of a system.
// uci_version: 003.001.003.001
message SystemIdentityType {
  // composed xsd extension base IdentityType
  IdentityType base = 1;
  // Provides identity qualifications to augment identification and associated
  // processing of the System.
  optional QualifyingTagsType qualifying_tags = 2;
  // Indicates time related events that are associated to the system such as
  // when operational or arriving at a destination. The multiplicity is limited
  // to N-1 options where NONE is an event that has no value, thus removed from
  // list of available options.
  repeated TimeFunctionType associated_time = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message SystemCommunicationsType {
  // This element specifies the state of communications between a system and its
  // controlling system. In the case of a vehicle, this would be the state of
  // communication between the vehicle and the ground station.
  MissionCommunicationsStateEnum mission_communications_state = 1;
  // Duration after which, if the position report has not been received, it is
  // assumed that communication has been lost.
  // xsd type: DurationType
  optional string comm_timeout = 2;
  // This element is used to indicate when a vehicle will regain communications
  // during a preplanned communications outage.
  // xsd type: DateTimeType (pattern .+Z)
  optional string pre_planned_comm_return_time = 3;
  // This element represents a specific communication system that this system
  // utilizes for operations. This information is used to ensure sufficient
  // communications have been acquired and are ready to be used in addition to
  // deconflicting with other systems which may utilize the same communications
  // system.
  repeated CommSystemUsageType comm_usage = 4;
}

// This element specifies the state of communications between a system and its
// controlling system.
enum MissionCommunicationsStateEnum {
  MISSION_COMMUNICATIONS_STATE_ENUM_UNSPECIFIED = 0;
  MISSION_COMMUNICATIONS_STATE_ENUM_ACTIVE = 1;
  MISSION_COMMUNICATIONS_STATE_ENUM_LOST = 2;
  MISSION_COMMUNICATIONS_STATE_ENUM_PLANNED_LOST = 3;
  MISSION_COMMUNICATIONS_STATE_ENUM_EMCON = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message CommSystemUsageType {
  // This is the specific communication system that is being used.
  CommSystemID_Type comm_system_id = 1;
  // The communication System UserID that this system uses to identify itself if
  // applicable. A system may have multiple users for the same types of
  // communications and would be reflected here with multiple elements if
  // applicable.
  // xsd type: VisibleString256Type (pattern [ -~]{0,256})
  repeated string user_identifier = 2;
  // This element represents the specific usage of a given mode of the
  // communications system that is being utilized.
  repeated CommModeUsageType usage = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message CommModeUsageType {
  // This element defines a specific mode for use in a communications system.
  // The meaning of the specific value is unique to the individual communication
  // system. See the specific communication provider documentation to identify
  // the valid modes for that system.
  CommAntennaModeType mode_identifier = 1;
  // Represents the dropout threshold (in dB) at which the communication system
  // mode becomes unusable.
  // xsd type: DecibelType
  optional double dropout_threshold = 2;
  // Indicates the number of users of the same type may share the same
  // communication system resource and mode. A negative or zero value indicates
  // there is no maximum limit. A value of 1 indicates that only a single system
  // may utilize this communication mode on a given resource. Any other number
  // specifies the maximum number of systems that can simultaneously utilize the
  // same communication resource in the given mode.
  int32 concurrent_user_limit = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.002.000
message PositionReportMDT {
  // The unique ID of the System corresponding to this PositionReport.
  SystemID_Type system_id = 1;
  // This is the free-text, generally human-readable, name of the System or
  // Resource corresponding to this PositionReport. This name isn't necessarily
  // unique.
  // xsd type: VisibleString256Type (pattern [ -~]{0,256})
  optional string display_name = 2;
  // Indicates the source of the data in sibling elements. See enumeration
  // annotations for further details.
  SystemSourceEnum source = 3;
  // This enumerated element represents the domain/environment in which the
  // system is currently operating.
  EnvironmentEnum current_operating_domain = 4;
  // This element represents the inertial state of the system or resource.
  InertialStateType inertial_state = 5;
  // The angle by which the Inertial Navigation System (INS) rotates the
  // geodetic frame about the vertical axis of the North-East-Down (NED)
  // coordinate frame to avoid the introduction of a singularity at the North
  // pole when it is calculating vehicle location. A rotation from true North
  // towards East is reported as a positive angle.
  // xsd type: AngleType
  optional double wander_angle = 6;
  // Indicates the heading in relationship to magnetic North.
  // xsd type: AngleType
  optional double magnetic_heading = 7;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message NavigationReportMDT {
  // Indicates the unique ID of the System corresponding to this
  // NavigationReport.
  SystemID_Type system_id = 1;
  // Indicates the source of the data in sibling elements. See enumeration
  // annotations for further details.
  SystemSourceEnum source = 2;
  // Designates the current contingency state of the System. Contingencies can
  // be an indication that the System will/has autonomously modified its means
  // of navigation.
  SystemContingencyLevelEnum contingency_level = 3;
  // Indicates the System's remaining endurance. It is expected that at least
  // one of the optional children are populated in this context.
  EnduranceType endurance = 4;
  // Vehicle navigation method currently employed.
  optional NavigationType navigation = 5;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.002.000
message NavigationType {
  // Which navigation mode the vehicle is currently traveling under.
  NavigationSourceType source = 1;
  // Cross track error of flight path measured in meters.
  // xsd type: DistanceType
  optional double track_error = 2;
  // Altitude error of flight path measured in meters.
  // xsd type: DistanceType
  optional double altitude_error = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.002.000
message NavigationSourceType {
  oneof choice {
    // Navigation mode where the System's route is following the route defined in
    // a previously published MissionPlan and the current navigation state is
    // given in MissionPlanStatus.
    MissionPlanNavigationType mission_plan_navigation = 1;
    // Navigation mode where the System's route is determined by a series of
    // waypoints and there is no published MissionPlan containing the
    // route/waypoint information. Indicates the next sequential waypoint in the
    // route. Estimated time of arrival should be included when known in the child
    // Timestamp element.
    Point3D_Type fixed_navigation = 2;
    // Navigation mode where the System's route is determined manually by a pilot
    // or operator utilizing a stick.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string manual_navigation = 3;
    // Navigation mode where the flight path is determined utilizing operator
    // generated autopilot commands such as heading and loiter commands.
    AutopilotModeEnum auto_pilot_navigation = 4;
    // Navigation mode where flight path is determined relative to a fixed point.
    RelativeNavigationType relative_navigation = 5;
    // Navigation mode where flight path is directed, via non-UCI interfaces, by
    // slaving System navigation to operation of a sensor Capability or other
    // real-time automated control algorithm/service other than a pilot/operator.
    SlavedNavigationType slaved_navigation = 6;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message MissionPlanNavigationType {
  // If this element is populated, the mission plan is being flown with an
  // operator override of the planned speed.
  // xsd type: SpeedType
  optional double speed_override = 1;
  // If this element is populated, the mission plan is being flown with an
  // operator override of the planned altitude.
  // xsd type: AltitudeType
  optional double altitude_override = 2;
}

// The autopilot mode and indicates the type of flight path the autopilot is
// following.
enum AutopilotModeEnum {
  AUTOPILOT_MODE_ENUM_UNSPECIFIED = 0;
  AUTOPILOT_MODE_ENUM_HEADING = 1;
  AUTOPILOT_MODE_ENUM_BANK = 2;
  AUTOPILOT_MODE_ENUM_CIRCLE = 3;
  AUTOPILOT_MODE_ENUM_OVAL = 4;
  AUTOPILOT_MODE_ENUM_FIGURE_EIGHT = 5;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.001.002.000
message RelativeNavigationType {
  // Reference point from which the offsets are determined.
  Point3D_Type reference_point = 1;
  // Vehicle location in meters in the north direction relative to the reference
  // point.
  // xsd type: DistanceOffsetType
  double offset_north = 2;
  // Vehicle location in meters in the east direction relative to the reference
  // point.
  // xsd type: DistanceOffsetType
  double offset_east = 3;
  // Vehicle location in meters in the vertical direction relative to the
  // reference point.
  // xsd type: DistanceOffsetType
  double offset_down = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message SlavedNavigationType {
  // Indicates the unique ID of the System which navigation is slaved to.
  // Required if navigation is slaved to a service and/or payload/Capability
  // other than the System which originated the NavigationReport.
  optional SystemID_Type slaved_to_system_id = 1;
  // Indicates the unique ID of the Service which navigation is slaved to.
  // Required if navigation is slaved to a service.
  optional ServiceID_Type slaved_to_service_id = 2;
  // Indicates the unique ID of the Capability which navigation is slaved to.
  // Required if navigation is slaved to a Capability.
  optional CapabilityID_Type slaved_to_capability_id = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message SystemMetadataMDT {
  // Unique identifier for this Metadata instance.
  MetadataID_Type metadata_id = 1;
  // Reference to the System this data extends.
  SystemID_Type system_id = 2;
  // Metadata content. There can be separate metadata for each contributing
  // source.
  repeated SystemMetadataPET metadata = 3;
}

// An abstract base type for defining metadata content. There can be separate
// metadata for each contributing source. Available extension types include:
// Link16SystemMetadataType.
// uci_version: 000.000.000.000
message SystemMetadataPET {
}

// Extends the OpPointBaseType and includes a Category that may not be an
// Emergency.
// uci_version: 002.000.003.001
message EmergencyReferenceOpPointType {
  // composed xsd extension base OpPointBaseType
  OpPointBaseType base = 1;
  // This element indicates the type of operational point.
  EmergencyReferenceOpPointCategoriesType emergency_reference_category = 2;
}

// Base Type for OpPointMDT, which does not include a Category.
// uci_version: 002.000.003.001
message OpPointBaseType {
  // composed xsd extension base OpBaseType
  OpBaseType base = 1;
  // This element represents the unique identifier of the point associated with
  // this message.
  OpPointID_Type op_point_id = 2;
  // Choice of either geospatial or relative position of the OpPoint.
  OpPointChoiceType point_choice = 3;
  // Indicates a System which the OpPoint is applicable for and its planned
  // configuration/state upon arriving at the OpPoint. If omitted, the OpPoint
  // applies to all Systems.
  repeated SystemConfigurationType system_configuration = 4;
  // This field provides the turn direction for orbit or extirpation points.
  optional RelativeDirectionEnum turn_direction = 5;
  // When present this field constrains the vehicle ingress path toward the
  // OpPoint. The allowable ingress range is defined clockwise from Min to Max.
  // Could be used with Extirpation point.
  optional AnglePairType ingress_constraint = 6;
  // This field specifies a set of safe minimum approach altitudes and an
  // emergency safe altitude. This field also specifies the cylindrical area,
  // defined by a center point and radius, where the altitudes apply. This field
  // defines minimum approach altitude and emergency safe altitude consistent
  // with standard FAA instrument approach chart definitions (using UCI standard
  // data types). Could be used with Extirpation point.
  optional SafeAltitudeType safe_altitude = 7;
}

// The base type containing information common to messages OpLine, OpPoint,
// and OpZone.
// uci_version: 001.000.001.001
message OpBaseType {
  // A human-readable descriptive name with free text remarks.
  optional OpDescriptionType op_description = 1;
  // Allows the creator of this operational item to specify what the source or
  // motivation for it originated from. This could be ATO, ACO, etc.
  optional MissionTraceabilityType mission_traceability = 2;
  // Indicates the source of the information.
  optional CreationSourceEnum source = 3;
  // This element represents a date/time interval associated with the
  // operational item during which the item is in effect.
  optional ScheduleType schedule = 4;
  // Indicates time related events that are associated to the Op data type such
  // as when activated or when operational. The multiplicity is limited to N-1
  // options where NONE is an event that has no value, thus removed from list of
  // available options.
  repeated TimeFunctionType associated_time = 5;
  // List of data link ID. Multiple data link IDs can be reported for the same
  // network type.
  repeated DataLinkIdentifierPET data_link_identifier = 6;
  // This field represents the priority to be considered when choosing between
  // multiple available points. Could be used with an Extirpation point.
  optional uint32 priority = 7;
  // Provides identity qualifications to augment identification and associated
  // processing of the OpPoint.
  optional QualifyingTagsType qualifying_tags = 8;
  // One or more systems to which this item applies. If omitted, item applies to
  // all systems (i.e., Link-16 J3.0 receipt is globally assigned).
  repeated SystemID_Type system_id = 9;
  // System-specific schedule that will override any part of the main schedule.
  // This allows for system-specific schedule different than main schedule. When
  // adding a SystemScheduleOverride, the child SystemID also must be added to
  // the sibling SystemID list if the sibling list is not empty. The
  // SystemScheduleOverride is independent of time planning. For the system,
  // this override can be done at execution.
  repeated SystemScheduleStateType system_schedule_override = 10;
}

// Markup for OpPoint and OpZone.
// uci_version: 000.000.000.000
message OpDescriptionType {
  // The name of this object in human-readable format.
  // xsd type: VisibleString256Type (pattern [ -~]{0,256})
  optional string name = 1;
  // General remarks.
  // xsd type: VisibleString1024Type (pattern [ -~]{0,1024})
  optional string remarks = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MissionTraceabilityType {
  // The source or motivation for this mission.
  MissionTraceabilityEnum mission_traceability = 1;
  // A human readable description of the source or motivation for this mission.
  // xsd type: VisibleString256Type (pattern [ -~]{0,256})
  optional string traceability_description = 2;
}

// Indicates the source or motivation for the associated item or action.
enum MissionTraceabilityEnum {
  MISSION_TRACEABILITY_ENUM_UNSPECIFIED = 0;
  MISSION_TRACEABILITY_ENUM_ATO = 1;
  MISSION_TRACEABILITY_ENUM_ACO = 2;
  MISSION_TRACEABILITY_ENUM_ROE = 3;
  MISSION_TRACEABILITY_ENUM_MISSION_BRIEFING = 4;
  MISSION_TRACEABILITY_ENUM_OTHER = 5;
}

// A type that specifies information about a system and its specific
// scheduling.
// uci_version: 000.000.000.000
message SystemScheduleStateType {
  // Identifies the System that this system schedule is appliable to, with the
  // operational type schedule in sibling ScheduleState element.
  SystemID_Type system_id = 1;
  // The state of the applicable operational type
  // (OpPoint/OpLine/OpVolume/Opzone): Active or Inactive. If ScheduleState is
  // provided, the State is applied to the System based on the identified
  // Schedule.
  OpStateEnum system_schedule_state = 2;
  // This element represents a date/time interval associated with the zone
  // during which the zone is in effect. This could be different than the
  // applicable operational type Schedule since it is system specific.
  repeated ScheduleStateType schedule_state = 3;
}

// The state of an Op Line/Point/Volume/Zone.
enum OpStateEnum {
  OP_STATE_ENUM_UNSPECIFIED = 0;
  OP_STATE_ENUM_ACTIVE = 1;
  OP_STATE_ENUM_INACTIVE = 2;
}

// The type defines a state and associated timelines for which the state is in
// effect.
// uci_version: 000.000.000.000
message ScheduleStateType {
  // The state of the schedule (active or inactive) for which the defined
  // schedule timeline applies.
  OpStateEnum state = 1;
  // Schedule timeline for which the indicated state is in effect.
  ScheduleType schedule = 2;
}

// Choice of either relative or geospatial position of the OpPoint.
// uci_version: 002.000.002.000
message OpPointChoiceType {
  oneof choice {
    // This element indicates the geospatial position of the OpPoint. Time data is
    // understood to be time of last position observation/measurement.
    OpPointPositionType point = 1;
    // The Relative position of the OpPoint. The reference frame this is relative
    // to is specified in a ReferenceFrames message.
    Point2D_RelativeType relative_point = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.002.002.001
message OpPointPositionType {
  // Indicates a geospatial position of a point with an optional estimate of
  // uncertainty.
  KinematicsFixedPositionType position = 1;
  // Indicates a velocity of a point with an optional estimate of uncertainty.
  optional Velocity2D_UncertaintyType velocity = 2;
  // Difference in meters between the MSL and HAE altitudes of an object. MSL +
  // HAE_Adjustment = HAE, per MIL-STD-6016.
  // xsd type: DistanceOffsetType
  optional double hae_adjustment = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.002.000
message KinematicsFixedPositionType {
  // For moving entities, it is highly recommended that the time data be
  // populated. Generally, services are encouraged to send altitude and/or time
  // data whenever it is known.
  Point2D_Type fixed_point = 1;
  // Provides an estimate of position uncertainty.
  optional UncertaintyType uncertainty = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message SystemConfigurationType {
  // Indicates the unique ID of the applicable System.
  SystemID_Type system_id = 1;
  // The predicted or required vehicle conditions upon reaching the OpPoint.
  // Applicable for INGRESS and EGRESS OpPoints and/or OpPoints associated with
  // specific SystemIDs. For endurance in an INGRESS OpPoint this element will
  // indicate endurance remaining upon reaching the point. For an EGRESS OpPoint
  // this endurance will indicate the predicted/planned endurance required to
  // egress from the point to the System's base.
  optional VehicleConfigurationType configuration = 2;
}

// Container object for the different types of OpPoint*Enums, excluding
// Emergency. A separate enum applies to each of the choice types.
// uci_version: 000.000.000.000
message EmergencyReferenceOpPointCategoriesType {
  oneof choice {
    // A set of commonly used point types.
    OpPointGeneralEnum general = 1;
    // A set of navigation or weapon hazard point types.
    OpPointHazardEnum hazard = 2;
    // A set of navigation destination point types.
    OpPointReferenceEnum reference = 3;
    // A set of navigation station point types.
    OpPointStationEnum station = 4;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.003.001
message OpLineMDT {
  // composed xsd extension base OpBaseType
  OpBaseType base = 1;
  // Indicates the unique ID of the OpLine.
  OpLineID_Type op_line_id = 2;
  // This element indicates the type of operational line. Includes amplification
  // field for LINK 16 J3.0 Reference: MIL-STD-6016.
  OpLineCategoryEnum category = 3;
  // Indicates the geometric description of the OpLine. In practice, operational
  // lines can be geometric lines, areas or in some cases volumes.
  OpLineType line = 4;
}

// The type of an operational line. Based on MIL-STD-6016 Point Type (DFI
// 363/DUI 003) and Point Amplification (DFI 379/DUI 002).
enum OpLineCategoryEnum {
  OP_LINE_CATEGORY_ENUM_UNSPECIFIED = 0;
  OP_LINE_CATEGORY_ENUM_GENERAL_LINE = 1;
  OP_LINE_CATEGORY_ENUM_FORWARD_EDGE_OF_BATTLE_AREA = 2;
  OP_LINE_CATEGORY_ENUM_GUN_TARGET_LINE = 3;
  OP_LINE_CATEGORY_ENUM_CORRIDOR = 4;
  OP_LINE_CATEGORY_ENUM_HOSTILE_BOUNDARY = 5;
  OP_LINE_CATEGORY_ENUM_BUFFER_ZONE_BOUNDARY = 6;
  OP_LINE_CATEGORY_ENUM_LOW_LEVEL_TRANSIT_ROUTE = 7;
  OP_LINE_CATEGORY_ENUM_TACTICAL_ACTION_LINE = 8;
  OP_LINE_CATEGORY_ENUM_FIRE_SUPPORT_COORDINATION_LINE = 9;
  OP_LINE_CATEGORY_ENUM_FORWARD_LINE_OF_OWN_TROOPS = 10;
  OP_LINE_CATEGORY_ENUM_LINE_OF_COMMUNICATIONS = 11;
  OP_LINE_CATEGORY_ENUM_JETWAY = 12;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.001
message OpLineType {
  // composed xsd extension base LineType
  LineType base = 1;
  // Indicates a velocity of a line segment.
  optional Velocity2D_Type velocity = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.001
message OpZoneMDT {
  // composed xsd extension base OpBaseType
  OpBaseType base = 1;
  // This element represents the unique identifier of the zone associated with
  // this message.
  OpZoneID_Type op_zone_id = 2;
  // This element indicates the type of zone.
  OpZoneCategoryEnum category = 3;
  // Contains parameters unique to certain OpZoneCategoryEnum values.
  optional OpZoneCategoryType category_unique_data = 4;
  // This element represents the geospatial and temporal characteristics of the
  // OpZone.
  OpZoneType zone = 5;
  // Zone used only for situational awareness. Not used for planning purposes.
  bool situational_awareness = 6;
}

// Container for parameters that are unique to a specific enumeration in
// OpZoneCategoryEnum. For example, KeepIn enumeration can have amplifying
// information such as entry and exit restrictions of the zone.
// uci_version: 003.000.003.000
message OpZoneCategoryType {
  oneof choice {
    // Defines boundaries which applicable Systems can only enter and exit through
    // defined edges.
    ConstrainedEntryExitType constrained_entry_exit = 1;
    // Indicates that the OpZone can be a zone filter type.
    OpZoneCategoryType_FilterArea_List filter_area = 2;
    // Indicates that the OpZone is a jamming control zone.
    OpZoneJammingType jamming = 3;
    // Defines boundaries to which applicable Systems must stay inside.
    IngressEgressType keep_in = 4;
    // Data defining a missile type, related track, and source of launch position.
    OpZoneMissileDataType missile_launch_point = 5;
    // Defines areas where strike impact is restricted. Does not restrict the
    // launch of weapons.
    OpZoneNoFireType no_fire = 6;
    // Defines area where flight is restricted. Equivalent to MIL-STD-6016
    // restricted zone.
    OpZoneNoFlyType no_fly = 7;
    // Defines vehicle configuration parameters that should change based on the
    // planned location of a vehicle.
    VehicleCommandDataType vehicle_configuration = 8;
    // Set of restricted weapons that cannot be used against a target type and or
    // in a zone.
    OpZoneWeaponRestrictionType weapon_restriction = 9;
    // Defines area of weather conditions with potential of mission impact.
    OpZoneWeatherType weather_conditions = 10;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message ConstrainedEntryExitType {
  // Turns an edge into a "gate" through which bi-directional passage of a
  // system is allowable. This is intended to be used with polygon zones only.
  // The index is 0 based, with the 0 index representing the edge between the
  // first and second points. The last index (number of points - 1) refers to
  // the edge between the last and first point.
  repeated uint32 gate_index = 1;
}

// This element represents the content of a filtered area. Current extensions
// include MTI_OpZoneFilterAreaType, TrackingOpZoneFilterAreaType.
// uci_version: 000.001.000.000
message OpZoneFilterAreaPET {
  // Determination of how the data is filtered in a geographic area. If the
  // enumeration is set to INCLUSION the contents are to be included for
  // processing or other utilization. If the enumeration is set to EXCLUSION the
  // contents are to be ignored or excluded from processing or other
  // utilization. If the enumeration is set to BOTH then the contents could have
  // both included and excluded data for processing or utilization as determined
  // by the extending filter.
  OpZoneFilterEnum filter_type = 1;
  // The ranking is used for overlapping exclusion and inclusion filter areas.
  // The zone with the highest precedence/priority combination is selected.
  optional ComparableRankingType ranking = 2;
}

// The determination of whether data is included or excluded.
enum OpZoneFilterEnum {
  OP_ZONE_FILTER_ENUM_UNSPECIFIED = 0;
  OP_ZONE_FILTER_ENUM_INCLUSION = 1;
  OP_ZONE_FILTER_ENUM_EXCLUSION = 2;
  OP_ZONE_FILTER_ENUM_BOTH = 3;
}

// synthesized list wrapper for repeated choice member FilterArea in OpZoneCategoryType (choice)
message OpZoneCategoryType_FilterArea_List {
  repeated OpZoneFilterAreaPET items = 1;
}

// Indicates an OpZone is a jamming control zone.
// uci_version: 001.000.000.000
message OpZoneJammingType {
  // Indicates whether (TRUE) or not (FALSE) jamming is allowed within the
  // OpZone.
  bool allowed = 1;
  // Indicates a specific frequency range where jamming is restricted. This
  // element is only applicable when the sibling Allowed element indicates
  // jamming is allowed.
  repeated FrequencyRangeType restricted_frequency_band = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.002.000
message IngressEgressType {
  // The required entry point for the OpZone. If omitted, the OpZone can be
  // entered from any point.
  optional Point3D_Type entry_point = 1;
  // The required exit point for the OpZone. If omitted, the OpZone can be
  // exited from any point.
  optional Point3D_Type exit_point = 2;
}

// Data defining a missile type, related track, and source of launch position.
// uci_version: 001.000.000.000
message OpZoneMissileDataType {
  // Indicates the type of space object related to this point.
  optional SpaceObjectEnum space_object = 1;
  // Measure of the confidence in the certainty of the SpaceObject
  // identification. Higher percents indicate greater confidence.
  optional PercentRangeType confidence = 2;
  // Reference to the track that will impact this zone or originated from this
  // zone.
  optional TrackNumberOrEntityType related_track = 3;
  // Specifies if the ballistic launch point was calculated using boost phase
  // data.
  optional LaunchPointCalculationEnum launch_point_calculation = 4;
}

// Indicates identification information about a reported space object.
enum SpaceObjectEnum {
  SPACE_OBJECT_ENUM_UNSPECIFIED = 0;
  SPACE_OBJECT_ENUM_UNITARY_HIGH_EXPLOSIVE = 1;
  SPACE_OBJECT_ENUM_NUCLEAR = 2;
  SPACE_OBJECT_ENUM_BULK_CHEMICAL = 3;
  SPACE_OBJECT_ENUM_BULK_BIOLOGICAL = 4;
  SPACE_OBJECT_ENUM_FUEL_AIR_EXPLOSIVE = 5;
  SPACE_OBJECT_ENUM_DEBRIS = 6;
  SPACE_OBJECT_ENUM_WARHEAD = 7;
  SPACE_OBJECT_ENUM_PENETRATION_AID = 8;
  SPACE_OBJECT_ENUM_HIGH_EXPLOSIVE_SUBMUNITION = 9;
  SPACE_OBJECT_ENUM_CHEMICAL_SUBMUNITION = 10;
  SPACE_OBJECT_ENUM_BIOLOGICAL_SUBMUNITION = 11;
  SPACE_OBJECT_ENUM_BOOSTER_TANK = 12;
  SPACE_OBJECT_ENUM_ATTITUDE_CONTROL_MODULE = 13;
  SPACE_OBJECT_ENUM_COMBINED_ACM_WARHEAD = 14;
  SPACE_OBJECT_ENUM_SINGLE_BODY_TARGET = 15;
  SPACE_OBJECT_ENUM_DECOY_BALLOON = 16;
  SPACE_OBJECT_ENUM_CHAFF = 17;
  SPACE_OBJECT_ENUM_POST_BOOST_VEHICLE = 18;
  SPACE_OBJECT_ENUM_LIGHTWEIGHT_REPLICA_DECOY = 19;
  SPACE_OBJECT_ENUM_KILL_VEHICLE = 20;
  SPACE_OBJECT_ENUM_JAMMER = 21;
  SPACE_OBJECT_ENUM_HIGH_BETA_DECOY = 22;
  SPACE_OBJECT_ENUM_FAMILY_TRACK = 23;
  SPACE_OBJECT_ENUM_RESET = 24;
}

// Choice between a Link 16 TN or UCI EntityID_Type value.
// uci_version: 000.000.000.000
message TrackNumberOrEntityType {
  oneof choice {
    // UUID of the referenced vehicle.
    EntityID_Type entity_id = 1;
    // Link 16 Track Number of the referenced vehicle. Used to reference TNs
    // without a matching UCI object.
    Link16TrackIdentifierType track_number = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message Link16TrackIdentifierType {
  // The Link 16 Track Number in string form. Limited to ZZ777.
  // xsd type: Link16TrackNumberType (pattern [A-HJ-NP-Z0-7]{2}[0-7]{3})
  string track_number = 1;
  // The external interface that is reporting the associated track number for
  // this entity.
  optional NetworkLinkID_Type external_interface_id = 2;
}

// Specifies whether a ballistic missile launch point was calculated using
// boost phase data.
enum LaunchPointCalculationEnum {
  LAUNCH_POINT_CALCULATION_ENUM_UNSPECIFIED = 0;
  LAUNCH_POINT_CALCULATION_ENUM_POST_BOOST = 1;
  LAUNCH_POINT_CALCULATION_ENUM_BOOST_PHASE = 2;
}

// Indicates an area where strike impact is restricted. Does not restrict the
// launch of weapons.
// uci_version: 003.000.003.000
message OpZoneNoFireType {
  // Indicates a class/identity of Entity which cannot be fired upon in the
  // OpZone. If omitted, the OpZone is fully restricted and nothing can be fired
  // upon within it. If included, Entities of a class/identity not given here
  // are not restricted by the OpZone. The Confidence value expresses the
  // minimum threshold at which the NoFire restriction applies for the
  // class/identity.
  repeated IdentityComparisonType entity_class = 1;
}

// Indicates an OpZone where flight is restricted.
// uci_version: 001.000.000.000
message OpZoneNoFlyType {
  // This element indicates the level of restriction that should be applied to a
  // zone. This value is utilized in many auto-routers. However, interpretation
  // of the values meaning is implementation specific. 100% defines the zone is
  // completely restricted.
  // xsd type: PercentType
  double percent_restricted = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message VehicleCommandDataType {
  // Defines vehicle actions that can be done along a path segment of a route.
  optional VehicleActionEnum vehicle_action = 1;
  // If present the IFF settings for this vehicle will be changed along this
  // path segment.
  optional IFF_Type iff_settings = 2;
  // Specifies that the vehicle should put itself into a more survivable mode.
  // Different vehicles will have specific behaviors that reduce the signature
  // of the vehicle (doors closed, minimal use of flaps, etc.) If this element
  // is not present then it is assumed that the aircraft being configured has no
  // survivability mode.
  optional VehicleSurvivabilityModeEnum survivability_mode = 3;
  // Defines the lost communication contingency timeout. When this timeout value
  // is exceeded, the AV considers that lost communication has occurred and
  // begins to perform contingency measures.
  // xsd type: DurationType
  optional string lost_comm_timeout = 4;
  // Use Line Of Sight (LOS) communication as backup contingency.
  optional bool los = 5;
  // Specifies whether the vehicle should invoke special Loss of Link
  // processing. This could be turned off if the vehicle is going to be in a
  // known and accepted lost communication situation.
  optional VehicleLossOfLinkProcessingEnum loss_of_link_processing = 6;
  // Indicates a change of communication allocation.
  optional CommAllocationActionType comm_allocation_action = 7;
}

// Defines vehicle actions that can be done along a path segment of a route.
enum VehicleActionEnum {
  VEHICLE_ACTION_ENUM_UNSPECIFIED = 0;
  VEHICLE_ACTION_ENUM_NAV_LIGHTS_ON = 1;
  VEHICLE_ACTION_ENUM_NAV_LIGHTS_OFF = 2;
  VEHICLE_ACTION_ENUM_LANDING_LIGHTS_ON = 3;
  VEHICLE_ACTION_ENUM_LANDING_LIGHTS_OFF = 4;
  VEHICLE_ACTION_ENUM_ANTI_COLLISION_LIGHTS_ON = 5;
  VEHICLE_ACTION_ENUM_ANTI_COLLISION_LIGHTS_OFF = 6;
  VEHICLE_ACTION_ENUM_LANDING_GEAR_RETRACT = 7;
  VEHICLE_ACTION_ENUM_LANDING_GEAR_EXTEND = 8;
  VEHICLE_ACTION_ENUM_SPOILERS_ENABLE = 9;
  VEHICLE_ACTION_ENUM_SPOILERS_DISABLE = 10;
  VEHICLE_ACTION_ENUM_ANTENNAS_RETRACT = 11;
  VEHICLE_ACTION_ENUM_ANTENNAS_EXTEND = 12;
  VEHICLE_ACTION_ENUM_TRANSPONDER_ON = 13;
  VEHICLE_ACTION_ENUM_TRANSPONDER_OFF = 14;
  VEHICLE_ACTION_ENUM_RADIO_CHANNEL_1 = 15;
  VEHICLE_ACTION_ENUM_RADIO_CHANNEL_2 = 16;
  VEHICLE_ACTION_ENUM_RADIO_CHANNEL_3 = 17;
  VEHICLE_ACTION_ENUM_RF_TRANSMIT_ON = 18;
  VEHICLE_ACTION_ENUM_RF_TRANSMIT_OFF = 19;
}

// Specifies whether the vehicle should put itself into a more survivable
// mode. Different vehicles will have specific behaviors that reduce the
// signature of the vehicle (doors closed, minimal use of flaps, etc.
enum VehicleSurvivabilityModeEnum {
  VEHICLE_SURVIVABILITY_MODE_ENUM_UNSPECIFIED = 0;
  VEHICLE_SURVIVABILITY_MODE_ENUM_ON = 1;
  VEHICLE_SURVIVABILITY_MODE_ENUM_OFF = 2;
}

// Specifies whether the vehicle should invoke special Loss of Link
// processing. This could be turned off if the vehicle is going to be in a

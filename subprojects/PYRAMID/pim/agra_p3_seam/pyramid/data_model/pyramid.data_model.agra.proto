  // xsd type: NIIRS_Type (pattern [0-9]\.[0-9])
  repeated string mt_iirs_level = 2;
  // Fields of Regard for each component in the capability.
  repeated ComponentFieldOfRegardType component_field_of_regard = 3;
}


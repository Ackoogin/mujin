// Status of current values used for track parameters to customize target
// detections.
// uci_version: 000.000.000.000
message PO_TrackStatusType {
  // A passive optical sensor will contain one or more subsystem track options.
  // Each subsystem track option is identified by a unique ID. This ID is used
  // in messages and capabilities to identify a particular track option. This
  // field is the ID of the track option whose status is being reported.
  TrackOptionsID_Type track_option_id = 1;
  // Indicates the current setting of the target tracker setting on whether to
  // attempt to acquire a target, lock onto the target, or release the target
  // and stop tracking.
  optional PO_TrackCommandEnum mode = 2;
  // Indicates the current setting for the size of the area in which the target
  // tracker tries to acquire a target. The increase and decrease commands are
  // dependent on the step sizes supported by the capability as defined in the
  // associated program related documentation.
  optional IncreaseDecreaseEnum track_area = 3;
  // When enabled the tracker will assume last known heading and rate for a time
  // period before breaking lock.
  optional PO_LockPersistenceEnum lock_persistence = 4;
  // The current valid ATR Filter parameter settings that were commanded based
  // on one or more available identity types used to perform associated target
  // track or search filtering.
  optional IdentityBasicType atr_filter_status = 5;
  // Current offset track value for the current capability as measured from the
  // center of the LOS.
  optional LOS_VariableB_Type offset_track_setting = 6;
  // The threshold value used by the current capability for the number of
  // seconds since the last update of an Observed Entity before the data is
  // considered to be stale.
  // xsd type: DurationType
  optional string observed_entity_threshold = 7;
  // The threshold value used by the current capability for tracks being
  // reported.
  // xsd type: DistanceType
  optional double tracking_range = 8;
  // Indicates the amount of time currently being used to coast a track before
  // dropping it based on the associated environment setting. List size is based
  // on allowing one per environment option available.
  repeated PO_CoastSettingValueType coast_setting = 9;
  // If blanking volume is supported by current capability, this status will
  // reflect changes to the blank volume settings as commanded by the settings
  // command.
  optional PO_AirTargetVolumeType blanking_volume_status = 10;
}


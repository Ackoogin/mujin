}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.003.001
message PO_ComponentType {
  // A passive optical sensor will contain one or more subsystem components,
  // e.g. focal plane arrays, processing stages, and product generators. Each
  // subsystem component is identified by a unique component ID. This ID is used
  // in messages and capabilities to identify a particular component. This field
  // specifies the ID of this component.
  ComponentID_Type component_id = 1;
  // One type of Passive Optical Subsystem component is the Focal Plane Array
  // (FPA). An FPA is an array of collection elements that are used to collect
  // and record the number of photons emitted by some surface, e.g. the surface
  // of the earth. FPAs are commonly configured as either linear or grid arrays.
  // A Passive Optical sensor can have any number of FPAs.
  repeated PO_ComponentFocalPlaneArrayType focal_plane_array = 2;
  // One type of Passive Optical Subsystem Component is the optical lens. A lens
  // is placed within the Passive Optical sensor's optical pathway and affects
  // (refract to a point or diverge outwards) the path of the photons passing
  // through the lens on their way to the sensor's various Focal Plane Arrays
  // (FPAs).
  repeated PO_ComponentLensAssemblyType lens = 3;
  // Indicates a space through which light passes in an optical or photographic
  // instrument, especially the variable opening by which light enters a camera.
  repeated PO_ComponentApertureType aperture = 4;
  // One type of Passive Optical Subsystem Component is the optical filter. A
  // filter is placed within the Passive Optical sensor's optical pathway and
  // stops photons of a certain frequency (possibly of all frequencies) from
  // passing through the filter on their way to the sensor's various Focal Plane
  // Arrays (FPAs).
  repeated PO_ComponentFilterType filter = 5;
  // Passive Optical sensors generally support a processing engine that takes
  // the raw data collected from the Focal Plane Arrays (FPAs) and processes
  // that data in various way in order to produce an image product or products.
  // Such engines can be viewed as pipelines in which each stage in the pipeline
  // takes the imagery data produced by one or more stages earlier in the
  // pipeline, processes that data in some fashion, and then sends the updated
  // imagery data to the one of more stages further down the pipeline. This
  // field specifies the stages that are available in this sensor's processing
  // pipeline and whether the stage can be manually configured.
  repeated PO_ComponentProcessingStageType processing_stage = 6;
  // Passive Optical sensors have the capability of producing one or more
  // products using the raw optical data collected by their focal plane arrays.
  // This field lists the products that can be generated by this sensor.
  repeated PO_ComponentProductGeneratorType product_generator = 7;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.001.001
message PO_ComponentFocalPlaneArrayType {
  // Each focal plane array (FPA) is identified by a unique ID. This field is
  // this FPA's ID.
  PO_FPA_ID_Type focal_plane_array_id = 1;
  // Focal plane arrays (FPAs) divide up the optical spectrum into one or more
  // channels, each channel being used to measure the number of photons that
  // fall within a fixed range of the optical spectrum. This fixed range is
  // known as the channel's optical band. The channel's optical band may or may
  // not overlapped with another channel's optical band and the combination of
  // the FPA's channel may or may not completely cover the optical spectrum,
  // i.e. there may be gaps. This field is used to specify what channels are
  // available. Included in this information is the channel's attributes, e.g.
  // the channel's optical band, and the channel's control settings.
  repeated PO_ComponentFocalPlaneArrayChannelType channel = 2;
  // A FPA can be a logical FPA that represents a "window" of a larger physical
  // FPA. This defines a sub-window in the FPA.
  repeated PO_ComponentWindowType window = 3;
  // Indicates the controllability of the FPA. Omission of this element
  // indicates the FPA is not dynamically controllable. Enabling/disabling a FPA
  // enables/disables collection and measurement of arriving photons in the
  // context of the associated Capability or Capabilities. Enabling or disabling
  // a FPA affects all of its channels.
  optional ComponentControllabilityB_Type controllability = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.001.001.000
message PO_ComponentFocalPlaneArrayChannelType {
  // Each channel is identified by a unique ID.
  PO_FPA_ChannelID_Type channel_id = 1;
  // Indicates the controllability of the channel. Omission of this element
  // indicates the channel is not dynamically controllable.
  optional ComponentControllabilityB_Type controllability = 2;
  // The OpticalBand is used to specify the band of frequencies in the optical
  // domain that the channel is used to measure. The number of photons whose
  // frequencies fall within this band will be measured by this channel. This
  // field identifies the band this focal plane is currently measuring.
  PO_ComponentFocalPlaneArrayOpticalBandType optical_band = 3;
  // Channels generally support a set of operations (actions) that the channel
  // can perform on the measured photons. This is the list of the operations
  // supported by this channel.
  repeated PO_ComponentFocalPlaneArrayOperationType operation = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message ComponentControllabilityB_Type {
  // Indicates whether and how the Component or related item can be dynamically
  // enabled and disabled. Omission of this element indicates the Component or
  // related item does not have dynamic enable and disable control. See
  // annotation enumerations for further details. List size for this element is
  // based on "Select All That Apply" condition.
  repeated ComponentControlInterfacesEnum enable_disable = 1;
  // Indicates whether and how the Component or related item can be dynamically
  // reset to it default/factory configuration. Omission of this element
  // indicates the Component or related item cannot be dynamically reset. See
  // annotation enumerations for further details. List size for this element is
  // based on "Select All That Apply" condition.
  repeated ComponentControlInterfacesEnum reset = 2;
}

// Indicates how the component or associated item is dynamically controlled,
// such as whether it's self-controlled or manually controlled via varying
// capability messages. See enumerated values for more details.
enum ComponentControlInterfacesEnum {
  COMPONENT_CONTROL_INTERFACES_ENUM_UNSPECIFIED = 0;
  COMPONENT_CONTROL_INTERFACES_ENUM_AUTO = 1;
  COMPONENT_CONTROL_INTERFACES_ENUM_CAPABILITY_COMMAND = 2;
  COMPONENT_CONTROL_INTERFACES_ENUM_ACTIVITY_COMMAND = 3;
  COMPONENT_CONTROL_INTERFACES_ENUM_SETTINGS_COMMAND = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message PO_ComponentFocalPlaneArrayOpticalBandType {
  // Indicates the optical frequency band that the channel can measure.
  FrequencyRangeType band = 1;
  // Indicates whether and how the Optical band of the channel can be
  // dynamically configured. Omission of this element indicates the Optical band
  // is not dynamically configurable. See annotation enumerations for further
  // details. Size is equivalent to maximum number of enumeration values
  // available. List size for this element is based on "Select All That Apply"
  // condition.

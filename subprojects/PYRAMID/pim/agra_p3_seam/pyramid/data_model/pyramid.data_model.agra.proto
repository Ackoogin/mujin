  }
}

// Indicates the level of emissions allowed.
enum EmconLevelEnum {
  EMCON_LEVEL_ENUM_UNSPECIFIED = 0;
  EMCON_LEVEL_ENUM_EMCON_LEVEL_1 = 1;
  EMCON_LEVEL_ENUM_EMCON_LEVEL_2 = 2;
  EMCON_LEVEL_ENUM_EMCON_LEVEL_3 = 3;
  EMCON_LEVEL_ENUM_EMCON_LEVEL_4 = 4;
  EMCON_LEVEL_ENUM_EMCON_LEVEL_5 = 5;
}

// This enum provides additional guidance to Subsystems with both active and

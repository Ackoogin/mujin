message OpZoneWeaponRestrictionType {
  // User may specify the restriction by either identifying the weapons that are
  // allowed to be used or the weapons that cannot be used.
  WeaponRestrictionType weapon = 1;
  // Indicates the type/identity of the target or targets that the op zone
  // restriction applies to.
  optional IdentityType identity = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message WeaponRestrictionType {
  oneof choice {
    // Only weapons of this type may be used against a target type and or within a
    // zone.
    WeaponRestrictionType_WeaponsAllowed_List weapons_allowed = 1;
    // Weapons of this type are restricted against a target type and or within a
    // zone.
    WeaponRestrictionType_WeaponsNotAllowed_List weapons_not_allowed = 2;
  }
}

// synthesized list wrapper for repeated choice member WeaponsAllowed in WeaponRestrictionType (choice)
message WeaponRestrictionType_WeaponsAllowed_List {
  repeated StoreType items = 1;
}

// synthesized list wrapper for repeated choice member WeaponsNotAllowed in WeaponRestrictionType (choice)
message WeaponRestrictionType_WeaponsNotAllowed_List {
  repeated StoreType items = 1;
}

// Defines an area of weather conditions with potential of mission impact.

  CHARACTERIZATION_PRODUCT_TYPE_ENUM_AVERAGE_VMAG = 6;
  CHARACTERIZATION_PRODUCT_TYPE_ENUM_AMPLITUDE_VS_TIME = 7;
  CHARACTERIZATION_PRODUCT_TYPE_ENUM_NARROWBAND_SOI = 8;
  CHARACTERIZATION_PRODUCT_TYPE_ENUM_HYPERSPECTRAL = 9;
  CHARACTERIZATION_PRODUCT_TYPE_ENUM_COLOR_PHOTOMETRY = 10;
  CHARACTERIZATION_PRODUCT_TYPE_ENUM_WIDEBAND_SOI = 11;
  CHARACTERIZATION_PRODUCT_TYPE_ENUM_RANGE_PROFILE = 12;
  CHARACTERIZATION_PRODUCT_TYPE_ENUM_RANGE_TIME_INTENSITY = 13;
  CHARACTERIZATION_PRODUCT_TYPE_ENUM_DOPPLER_TIME_INTENSITY = 14;
  CHARACTERIZATION_PRODUCT_TYPE_ENUM_OPTICAL_IMAGE = 15;
  CHARACTERIZATION_PRODUCT_TYPE_ENUM_RANGE_DOPPLER_IMAGE = 16;
  CHARACTERIZATION_PRODUCT_TYPE_ENUM_IMAGE = 17;
  CHARACTERIZATION_PRODUCT_TYPE_ENUM_IR_IMAGE = 18;
  CHARACTERIZATION_PRODUCT_TYPE_ENUM_IMAGE_3D = 19;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message StabilityCharacterizationType {
  // Indicates the minimum detectable rate of rotation desired to meet the
  // tasking objective.
  // xsd type: AngleRateType
  double min_detectable_angular_rate = 1;
  // The maximum rotational rate of the object to be characterized (i.e., don't
  // use sensors that can't assess objects that rotate beyond this rate).
  // xsd type: AngleRateType
  double max_possible_rate = 2;
  // The angular resolution threshold needed to achieve the characterization
  // objective.
  // xsd type: AngleType
  optional double angular_resolution = 3;
  // Indicates the required resolution threshold for the sensor to have on the
  // target.
  // xsd type: DistanceType
  optional double structural_resolution = 4;
}

// Indicates a task and requirements to enable characterization of or
// assessment of changes to the structure of a spacecraft.
// uci_version: 001.000.000.000
message StructureAssessmentType {
  oneof choice {
    // Task for collections to enable the estimation of the size of the object.
    SizeEstimationType size_estimation = 1;
    // Conduct collection (and appropriate processing) to support assessment of
    // length, width, height of a spacecraft as well as similar values and
    // relative positions/orientations of spacecraft components (e.g., solar
    // panels, telescopes, antennae).
    ResolvedCharacterizationType resolved = 2;
  }
}

// This identifies the desired type of data to be used for estimating target
// size.
// uci_version: 000.000.000.000
message SizeEstimationType {
  // Indicates the reporting requirements for size related data (e.g., RCS
  // variations, Visual Magnitude variations, Assessed Size variations).
  OrbitalSurveillanceSizeDataEnum size_data = 1;
  // Desired size or apparent size type to address the information need.
  OrbitalSurveillanceSizeTypeEnum size_type = 2;
}

// Indicates the reporting requirements for RCS and Visual Magnitude sensor
// collections used for size estimation characterization.
enum OrbitalSurveillanceSizeDataEnum {
  ORBITAL_SURVEILLANCE_SIZE_DATA_ENUM_UNSPECIFIED = 0;
  ORBITAL_SURVEILLANCE_SIZE_DATA_ENUM_AVERAGE = 1;
  ORBITAL_SURVEILLANCE_SIZE_DATA_ENUM_P05_50_95 = 2;
}

// Desired size or apparent size type to address information need.
enum OrbitalSurveillanceSizeTypeEnum {
  ORBITAL_SURVEILLANCE_SIZE_TYPE_ENUM_UNSPECIFIED = 0;
  ORBITAL_SURVEILLANCE_SIZE_TYPE_ENUM_ANY = 1;
  ORBITAL_SURVEILLANCE_SIZE_TYPE_ENUM_AREA = 2;
  ORBITAL_SURVEILLANCE_SIZE_TYPE_ENUM_RCS = 3;
  ORBITAL_SURVEILLANCE_SIZE_TYPE_ENUM_VISUAL_MAGNITUDE = 4;
  ORBITAL_SURVEILLANCE_SIZE_TYPE_ENUM_WATTS_PER_STERADIAN = 5;
}

// Indicates collection requirements to perform resolved characterization in
// support a structure change detection sensor task.
// uci_version: 001.000.000.000
message ResolvedCharacterizationType {
  // Desired physical resolution of structure. Dimensions will depend on
  // phenomenology.
  DistanceResolutionSpecificationType resolution = 1;
  // The minimum physical volume (or collapsed volume to one or two dimensions)
  // that must be covered as part of collection. This is needed in addition to
  // minimum target size to ensure appropriate coverage of targets long in one
  // dimension or in situations such as deployments.
  DistanceResolutionSpecificationType min_window = 2;
  // Specifies the desired aspects of the spacecraft to be characterized.
  ResolvedCharacterizationAspectCoverageType aspect_coverage = 3;
}

// This is used to specify the desired spatial resolution for
// characterization. A volume has three axes that can be resolved, but
// different phenomenologies resolve along different axes and different
// numbers of axes (e.g., Optical imaging typically resolves in the
// two-dimensional plane perpendicular to the line of site, while
// range-Doppler imaging resolves along the range direction and the projection
// of the target rotational axis on the perpendicular to the range vector.
// uci_version: 001.000.000.000
message DistanceResolutionSpecificationType {
  // First dimension of spatial resolution. For RF range-Doppler imaging, this
  // will be the range dimension. When the target cannot be resolved in Doppler,
  // this may be the only dimension of resolution. For optical imaging with
  // equal resolution in the two axes of the focal plane, the desired spatial
  // resolution. If resolution is equal in both dimensions and the target is
  // only resolved in two dimensions, then this will be the only resolution
  // dimension for optical imaging. If the optical imaging resolution is not
  // equivalent, then the desired resolution along the projection of the target
  // velocity vector to the plane normal to the line of sight.
  // xsd type: DistanceType
  double dimension1 = 1;
  // Second dimension of spatial resolution. For RF range-Doppler imaging this
  // is the projection of the target rotational axis on the perpendicular to the
  // range vector. For optical imaging with resolution equal in both, this
  // dimension is only used if the imaging also resolves in a third dimension
  // (e.g., for LADAR). For optical imaging with unequal resolution, this is the
  // desired resolution in the direction of the perpendicular to the target
  // velocity vector onto the plane normal to the line of sight.
  // xsd type: DistanceType
  optional double dimension2 = 2;
  // Third dimension of spatial resolution. This is range for a
  // three-dimensional optical imager.
  // xsd type: DistanceType
  optional double dimension3 = 3;
}

// Specifies the desired aspects of the spacecraft to be characterized.
// uci_version: 001.000.000.000
message ResolvedCharacterizationAspectCoverageType {
  oneof choice {
    // See Base Description. List size for this element is based on "Select All
    // That Apply" condition.
    ResolvedCharacterizationAspectCoverageType_BodyReference_List body_reference = 1;
    // Specifies set of spacecraft aspects to be covered in body coordinates.
    QuaternionType attitude = 2;
    // Specifies span of attitude angles over which structural characterization
    // data is required.
    // xsd type: AngleType
    double aspect_span = 3;
  }
}

// Identifier of the portion of the target for which characterization is
// desired.
enum BodyReferenceEnum {
  BODY_REFERENCE_ENUM_UNSPECIFIED = 0;
  BODY_REFERENCE_ENUM_ANY = 1;
  BODY_REFERENCE_ENUM_NADIR_DECK = 2;
  BODY_REFERENCE_ENUM_ZENITH_SURFACE = 3;
  BODY_REFERENCE_ENUM_VELOCITY_FORWARD = 4;
  BODY_REFERENCE_ENUM_VELOCITY_BACKWARD = 5;
  BODY_REFERENCE_ENUM_CROSS_ORBIT_POSITIVE = 6;
  BODY_REFERENCE_ENUM_CROSS_ORBIT_NEGATIVE = 7;
  BODY_REFERENCE_ENUM_FEATURE = 8;
}

// synthesized list wrapper for repeated choice member BodyReference in ResolvedCharacterizationAspectCoverageType (choice)
message ResolvedCharacterizationAspectCoverageType_BodyReference_List {
  repeated BodyReferenceEnum items = 1;
}

// Specification of the nature of the collections desired to confirm
// spacecraft identity.
// uci_version: 001.000.000.000
message IdentificationVerificationType {
  // Specifies the level of confidence that the collected data will provide
  // affirmation or denial that spacecraft is the expected target.
  // xsd type: PercentType
  optional double confidence_desired = 1;
  // When "Any" is chosen, Unit must provide at least one form of products on
  // this list as part of concerted collection (maintaining high-confidence
  // custody on object).
  CharacterizationProductTypeEnum any = 2;
  // When "All" is chosen, Unit must provide all forms of products on this list
  // as part of concerted collection (maintaining high-confidence custody on
  // object) to satisfy the Task.
  optional CharacterizationProductTypeEnum all = 3;
}

// Specifies a request to collect data to support assessment of a change to
// operational mode (or lack of change). Includes case of becoming completely
// non-operational.
// uci_version: 000.000.000.000
message SatelliteOperationsChangesCharacterizationType {
  // When "All" is chosen, all of the operations changes must be accomplished to
  // satisfy the Task.
  SatelliteOperationsChangesCharacterizationEnum all = 1;
  // When "Any" is chosen, the Task can be satisfied by performing only one of
  // the operations changes provided.
  SatelliteOperationsChangesCharacterizationEnum any = 2;
}

// Indicates the types of operations changes that can be detected using
// characterization data collected by sensors.
enum SatelliteOperationsChangesCharacterizationEnum {
  SATELLITE_OPERATIONS_CHANGES_CHARACTERIZATION_ENUM_UNSPECIFIED = 0;
  SATELLITE_OPERATIONS_CHANGES_CHARACTERIZATION_ENUM_ATTITUDE_PROFILE_CHANGE = 1;
  SATELLITE_OPERATIONS_CHANGES_CHARACTERIZATION_ENUM_STABILITY_CHANGE = 2;
  SATELLITE_OPERATIONS_CHANGES_CHARACTERIZATION_ENUM_STRUCTURAL_CHANGE = 3;
  SATELLITE_OPERATIONS_CHANGES_CHARACTERIZATION_ENUM_SIGNALS_CHANGE = 4;
}

// Input parameters for an orbital surveillance multi-object task type.
// uci_version: 001.000.000.000
message MultiObjectType {
  // Flag indicating if this Task is for closely spaced object clearing.
  bool cso_clearing = 1;
  // For multi-object scenarios, including a deployment, the minimum distance
  // between objects that needs to be resolved to address the need.
  // xsd type: DistanceType
  double min_separation = 2;
  // Flag indicating to collect data to characterize the spread of objects after
  // a breakup.
  bool breakup_characterization = 3;
  // Flag indicating to verify the existence of multiple objects and that the
  // object count matches the number specified in the combination of primary and
  // secondary targets.
  bool multi_object_verification = 4;
  // Flag to look for objects in the vicinity of the primary (if no secondaries
  // specified) and provide information on relative geometries between any
  // secondaries and the primary.
  bool cso_geometric_characterization = 5;
  // Flag to indicate requirement to provide distinct position (and velocity, as
  // possible) measurements on each object (with separate identifiers for each
  // object) when multiple objects are in close proximity.
  bool multi_object_metric = 6;
}

// Input parameters for an orbital surveillance maneuver detection task type.
// uci_version: 001.000.001.000
message ManeuverDetectionType {
  // Maneuver constraints in support of sensor collects for maneuver detection
  // of either a basic maneuver (where the maneuver size or direction cannot be
  // predicted) or a predicted maneuver.
  ManeuverConstraintsChoiceType maneuver_constraints = 1;
  // ExpectedManeuverWindow is used to define the window over which the maneuver
  // might occur. Note that this is required in addition to the
  // PredictedManeuverConstraints' StartEpoch and Duration, since those values
  // are for the nominal maneuver and the ExpectedManeuverWindow covers the
  // potential for variation from the predicted nominal.
  optional DateTimeRangeType expected_maneuver_window = 2;
  // VelocityMetricResolution relates to the desired ability for tasked sensors
  // to detect differences in velocity from a pre-maneuver orbit. This might be
  // used for real-time detection of maneuvers (in contrast to detection through
  // orbit-fitting).
  // xsd type: SpeedType
  optional double velocity_metric_resolution = 3;
}

// Indicates choices for sensor collection maneuver constraints.
// uci_version: 001.000.001.000
message ManeuverConstraintsChoiceType {
  oneof choice {
    // BasicManeuverConstraints are used for situations when looking for a
    // maneuver, but there is nothing to drive expectations on maneuver size or
    // direction. Max delta-V is required to bound search space and Min to bound
    // the sensor and processing resolution for maneuver detection.
    BasicManeuverConstraintsType basic_maneuver_constraints = 1;
    // PredictedManeuverConstraints is used when there is information on the
    // nominal parameters of an expected maneuver (such as a vector of delta-V
    // values, maneuver duration, and maneuver start time). Since the maneuver has
    // not happened, these are nominal and the actual maneuver may vary in start
    // time, duration, and velocity parameters.
    OrbitalManeuverDetailsType predicted_maneuver_constraints = 2;
  }
}

// Indicates constraints for basic maneuver sensor collects.
// uci_version: 000.000.000.000
message BasicManeuverConstraintsType {
  // The maximum delta-v capability of object being tracked (m/s). Used to
  // provide bounds on the required sensors and timing.
  // xsd type: SpeedType
  double max_capable_delta_velocity = 1;
  // Minimum delta-v of interest. For example, small station-keeping maneuvers
  // may not be of interest but a large drift maneuver or inclination change
  // would be of interest.
  // xsd type: SpeedType
  double min_delta_velocity_of_interest = 2;
}

// Defines the maneuver details for a spacecraft to transfer orbit.
// uci_version: 001.000.001.001
message OrbitalManeuverDetailsType {
  // composed xsd extension base OrbitalManeuverDetailsBaseType
  OrbitalManeuverDetailsBaseType base = 1;
  // The time at which the maneuver started. Formatted as UTC DateTime values.
  // xsd type: DateTimeType (pattern .+Z)
  string start_epoch = 2;
  // The reason why the maneuver was performed.
  optional OrbitalManeuverTypeEnum maneuver_type = 3;
}

// The type of orbital maneuver.
enum OrbitalManeuverTypeEnum {
  ORBITAL_MANEUVER_TYPE_ENUM_UNSPECIFIED = 0;
  ORBITAL_MANEUVER_TYPE_ENUM_ALTITUDE_CHANGE = 1;
  ORBITAL_MANEUVER_TYPE_ENUM_PLANE_CHANGE = 2;
  ORBITAL_MANEUVER_TYPE_ENUM_MAINTENANCE = 3;
  ORBITAL_MANEUVER_TYPE_ENUM_STATION_KEEPING = 4;
  ORBITAL_MANEUVER_TYPE_ENUM_RENDEZVOUS = 5;
  ORBITAL_MANEUVER_TYPE_ENUM_PROXIMITY_OPERATIONS = 6;
}


// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.001
message MA_ResponseMDT {
  // Indicates the unique ID of the Response. Minor updates to the Response can
  // be indicated by an update of the value in the child Version element. More
  // significant updates, replacements, etc. might warrant a new instance with a
  // different child UUID value.
  ResponseID_Type response_id = 1;
  // Indicates the types of Response options included in the message. List size
  // for this element is based on "Select All That Apply" condition.
  repeated ResponseTypeEnum response_type = 2;
  // Indicates monitoring constraints on the Response. The constraint type used
  // here is common to all Requirement types: Effect, Action, Task,
  // [Capability]Command, Response. Requirement constraints can be 1) given in a
  // [Requirement] message, 2) overridden as a planning input in a
  // [Requirement]PlanCommand message, 3) further refined/overridden during plan
  // creation and reported in a [Requirement]Plan message to inform subsequent
  // planning or execution. See sibling Option element annotation for an overall
  // description of Response structure. Constraints given here aren't conveyed
  // to instantiated Response options for a particular triggering event. The
  // constraints given here apply to Response management ( planning, allocation
  // and trigger monitoring prior to a triggering event). Constraints to apply
  // to instantiated Response options, if any, are given elsewhere in the
  // message.
  optional MA_RequirementConstraintsType response_management_constraints = 3;
  // Indicates guidance on planning and C2 of the Response.
  optional RequirementGuidanceType response_management_guidance = 4;
  // Indicates an Option of the Response. Responses are designed to be flexible.
  // A Response is a set of prioritized Options to address an anticipated
  // triggering event, events or event sequence in the battlespace. Responses
  // are allocated to Systems via a ResponsePlan. When a ResponsePlan is
  // activated, monitoring for the triggering events in the Options begins. When
  // a triggering event happens, the applicable Option(s) are evaluated.
  repeated MA_ResponseOptionDetailsType option = 5;
  // The sibling Option element associates triggering events with a desired
  // Response one of which is to use this element, a Requirements template, to
  // generate or change one or more Requirements messages/objects (Effect,
  // Action, Task, [Capability]Command). An instance of this element is a
  // RequirementsTemplate; it indicates the types of Requirements to generate or
  // update and their details. Each RequirementsTemplate has a unique ID and
  // therefore can be used for multiple Options.
  repeated RequirementsTemplateType requirements_template = 6;
  // Indicates traceability and other metadata associated with the Response.
  optional RequirementMetadataType metadata = 7;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message MA_ResponseOptionDetailsType {
  // Must be unique across Options. Supports intra-Response
  // ordering/prioritization of Option evaluations. Options are evaluated in
  // order of increasing index. In other words, the Option with the lowest value
  // in this element is evaluated first.
  uint32 option_index = 1;
  // Human readable text label with content meaningful to human operators.
  // xsd type: VisibleString256Type (pattern [ -~]{0,256})
  optional string descriptive_label = 2;
  // Indicates an overall purpose/objective for the Response. This element is
  // optional for systems/services whose prioritization and/or options don't
  // vary by Requirement.
  optional RequirementTaxonomyType objective = 3;
  // Indicates whether Response evaluation should continue (TRUE) or stop
  // (FALSE) after the conditions of the Option are met. For example, a Response
  // with escalating, concurrent Options might require evaluation to continue
  // (TRUE) after the an Option's conditions are met. A Response where one and
  // only one Option is desired (FALSE) stops evaluation after an Option's
  // conditions are met.
  bool continue_evaluation = 4;
  // Indicates whether the rule is enabled or disabled. Disabling allows a rule
  // to be communicated without the effect of an action being taken ; a superset
  // of rules can be created and exchanged and then selectively enabled.
  bool enabled = 5;
  // Indicates the trigger, decision point or other condition under which the
  // Option should be initiated/processed. Filters/preconditions for the trigger
  // are optionally given and must be satisfied before the associated Response
  // is initiated.
  MA_PlannedSequentialTriggerType trigger = 6;
  // Indicates the response to be taken when the triggering conditions of the
  // Option are satisfied.
  MA_RuleResponseType response = 7;
  // Indicates the time period when the Option is enabled; responses for the
  // Option should only be generated during this time period. This element does
  // not constrain when the resulting responses are planned or actually occur.
  // The schedule given in this element must be within the temporal constraints
  // of the Response as a whole (when given).
  optional ScheduleType schedule = 8;
}


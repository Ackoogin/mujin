// uci_version: 003.000.003.000
message ObservationMeasurementType {
  // Indicates the unique ID assigned to the group of measurements that are
  // associated together (e.g. local sensor track number or metric observation
  // track ID). For unassociated measurements, this field would not be populated.
  optional ObservationMeasurementID_Type observation_measurement_id = 1;
  // Indicates information about the source of the measurements.
  optional ObservationMeasurementSourceType measurement_source = 2;
  // Indicates the time of the first and last measurement of the measurement
  // observation. Indicates the time range within which all of the sibling
  // measurement data is applicable.
  optional DateTimeRangeType time_span = 3;
  // Indicates the set of measurements which are included in the Measurement

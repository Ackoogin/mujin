  repeated bytes aa_code = 1;
  // Used to acquire non-typical BDS Registers, such as 51, 52 or 53.
  // Interrogator will determine if requested information is available in
  // transponder and may reject the request or exclude the information.
  // xsd type: BDS_AddressType
  repeated bytes bds_address = 2;
}

// Indicates the max Probability of Reply for Mode S All Call interrogations.
enum MaxPOR_Enum {
  MAX_POR_ENUM_UNSPECIFIED = 0;
  MAX_POR_ENUM_N1_IN_1 = 1;
  MAX_POR_ENUM_N1_IN_2 = 2;
  MAX_POR_ENUM_N1_IN_4 = 3;
  MAX_POR_ENUM_N1_IN_8 = 4;
  MAX_POR_ENUM_N1_IN_16 = 5;
}


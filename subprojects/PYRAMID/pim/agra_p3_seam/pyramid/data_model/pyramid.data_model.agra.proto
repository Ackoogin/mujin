  optional double delta_velocity_magnitude = 2;
  // The covariance matrix along with its associated category that defines the
  // elements represented in the covariance matrix for the delta velocity.
  optional CovarianceMatrixType delta_velocity_covariance = 3;
  // Estimated rocket burn time to accomplish the maneuver.
  // xsd type: DurationType
  optional string duration = 4;
  // The change in mass including the propellant.
  // xsd type: MassType
  optional double delta_mass = 5;
}

// Indicates a difference in velocity, independent of frame.
// uci_version: 000.000.000.000

// uci_version: 002.000.001.001
message PO_ComponentLensAssemblyType {
  // Each lens is identified by a unique ID. This field is this lens's ID.
  PO_LensID_Type lens_id = 1;
  // Lens exist within the optical pathway that leads to one or more Focal Plane
  // Arrays (FPAs). This field specifies those FPAs that are associated with
  // this lens, i.e. those FPAs that record light that passes through this lens.
  repeated PO_FPA_ID_Type fpa_id = 2;
  // A Lens' Field Of View (FOV) specifies a cone or pyramid (depending on the
  // structure of the collection element) emanating the FPA's collection
  // elements out to the surface being imaged. The dimensions of this
  // cone/pyramid determine how much surface area is imaged by a single
  // collection element. This field provides information regarding the lens's
  // FOV.
  PO_ComponentLensAssemblyFieldOfViewType fov = 3;
  // Indicates the focus characteristics of the lens.
  optional PO_ComponentLensAssemblyFocusType focus = 4;
  // The new settings for the focus sweep generator.
  optional PO_ComponentSettingsFocusSweepSettingsType focus_sweep_settings = 5;
  // Indicates the controllability of the lens. Omission of this element
  // indicates the lens is not dynamically controllable. Enabling/disabling a
  // lens inserts/removes it from the optical pathway. Resetting a lens restores
  // it to default/factory configuration.
  optional ComponentControllabilityB_Type controllability = 6;
}


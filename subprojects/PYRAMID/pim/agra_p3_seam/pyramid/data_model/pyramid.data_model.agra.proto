// The state of the action for an autonomously triggered condition.
enum AutonomousActionStatusEnum {
  AUTONOMOUS_ACTION_STATUS_ENUM_UNSPECIFIED = 0;
  AUTONOMOUS_ACTION_STATUS_ENUM_DISALLOWED = 1;
  AUTONOMOUS_ACTION_STATUS_ENUM_IN_PROGRESS = 2;
  AUTONOMOUS_ACTION_STATUS_ENUM_FAILED = 3;
  AUTONOMOUS_ACTION_STATUS_ENUM_SUCCESSFUL = 4;
  AUTONOMOUS_ACTION_STATUS_ENUM_DETECTED = 5;
}

// synthesized list wrapper for repeated choice member AutonomousPlanningActionStatus in AutonomousActionStatusChoiceType (choice)

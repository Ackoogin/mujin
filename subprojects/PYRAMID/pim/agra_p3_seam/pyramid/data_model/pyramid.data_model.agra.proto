  ESM_CommandMDT message_data = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message ESM_CommandMDT {
  // Indicates an instance of an ESM Capability command. A Capability command
  // message can have multiple command instances to allow a sequence of related
  // commands in a single coherent message. Each command instance reports status
  // via a separate, independent Capability CommandStatus message.
  repeated ESM_CommandType command = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message ESM_CommandType {
  oneof choice {
    // Indicates a new invocation of an ESM Capability. Generally, if accepted,
    // the command will result in one or more new ESM Activities being created and
    // reported via the ESM_Activity message. The request/response interaction
    // terminates as soon as the command is accepted or rejected; this element is
    // not used to interact with an "active" command. Updates and/or additional
    // interaction with the resulting Activity (after the command is accepted) is
    // accomplished via the sibling Activity element.
    ESM_CapabilityCommandType capability = 1;
    // Indicates a command to modify an existing ESM Activity (which was
    // previously reported via the ESM_Activity message and was marked as
    // "interactive"). The request/response interaction terminates as soon as the
    // modification is accepted or rejected. The modifications are reflected in
    // subsequent ESM_Activity messages.
    ESM_ActivityCommandType activity = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.001
message ESM_CapabilityCommandType {
  // composed xsd extension base SharedRF_ApertureCapabilityCommandBaseType
  SharedRF_ApertureCapabilityCommandBaseType base = 1;
  // Indicates whether a command is for a resource manager or a subsystem. If
  // the element is present, the EWRM receives the command and treats it as
  // "directed" (CapabilityID selected by mission processing) or overridable,
  // according to the enum. The subsystem will ignore the command until the
  // resource manager sends a modified command without the
  // ResourceAllocatorCommandExtension. If field is not included, the command is
  // always interpreted to be for a subsystem (capability/activity).
  optional ResourceAllocatorCommandExtensionType resource_allocator_command_extension = 2;
  // Used to control an ESM scan scheduler by activating or de-activating a Bin
  // Profile Set (defined in the ESM Settings Command). If changing Bin
  // Profiles, ACTIVATE is selected for the new set; the previously selected
  // profile is implicitly deactivated. If DEACTIVATE is selected the scan
  // scheduler is terminated and all associated activities should be terminated.
  optional ESM_BinGroupActivationType scan_schedule_activation = 3;
  // This indicates the SubCapability and the SubCapabilityDetails being
  // commanded. It's assumed one or more activities are created for each
  // SubCapabilitySelection.
  repeated SubCapabilitySelectionType sub_capability_selection = 4;
  // Indicates a required output Product of the Command. Only Products
  // consistent with ESM and supported by the commanded ESM Capability should be
  // requested. If omitted, no output Product should be produced. See
  // ProductTypeEnum for further details.
  repeated ProductOutputCommandBasicType product_output = 5;
  // Indicates the frequency to be used for the Command. If omitted, frequency
  // selection is left to the command recipient within constraints of
  // RF_Profiles imposed by RF_ControlCommand, MDF, etc.
  optional CapabilityCommandFrequencyType frequency = 6;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message ESM_BinGroupActivationType {
  // Identifies a unique data set associated with Bin and emitters as identified
  // in an ESM_SettingsCommand.
  uint32 scan_schedule_profile_index = 1;
  // Enables or disables the scan schedule associated with the sibling Bin.
  ESM_ActivationEnum activation_state = 2;
}

// This type indicates how an ESM MDF Entry is activated. See enumeration
// annotations for further details.
enum ESM_ActivationEnum {
  ESM_ACTIVATION_ENUM_UNSPECIFIED = 0;
  ESM_ACTIVATION_ENUM_ACTIVATE = 1;
  ESM_ACTIVATION_ENUM_DEACTIVATE = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.003.000
message SubCapabilitySelectionType {
  // Indicates a specific ESM SubCapability being invoked by the command. If
  // omitted, all SubCapabilities of the CapabilityID are to be invoked. If
  // specified, only those SubCapabilities specified are required in order to
  // satisfy the command. See enumeration annotations for further details. This
  // element is required, in order to qualify the affected SubCapability for the
  // ResourceAccessPriority (and other antenna/resource attributes) in the
  // sibling SubCapabilityDetails. List size for this element is based on
  // "Select All That Apply" condition.
  repeated ESM_SubCapabilityEnum sub_capability = 1;
  // Indicates the details required for a subcapability. at least one of the
  // data sets need to be populated.
  SubCapabilityDetailsType sub_capability_details = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.003.001
message ESM_ActivityCommandType {
  // composed xsd extension base SharedRF_ApertureActivityCommandBaseType
  SharedRF_ApertureActivityCommandBaseType base = 1;
  // Identifies the specific dwell that ESM should enable, disable, deallocate,
  // or delete. The dwell's identity is originally defined in the optional
  // ReceiveDwell structure of the ESM_Activity message.
  repeated ESM_ChangeDwellType esm_change_dwell = 2;
  // Used to change the control state of an active geolocation.
  optional ESM_ChangeGeolocationType esm_change_geolocation = 3;
  // Changes Activities that this Activity is dependent on. If the dependent
  // Activity's Resource Allocation is removed or never allocated, this
  // Activity's Resource Allocation will be removed or not fulfilled. This is
  // used to tie Activities across subsystems.
  optional DependentActivityType change_dependent_activity = 4;
  // This indicates the details required for a SubCapability, at least one of
  // the data sets need to be populated.
  optional SubCapabilityDetailsType esm_change_sub_capability_details = 5;
  // Used to turn Spectral Density Reporting on and off for this Activity. TRUE
  // indicates a command for the Activity to produce Spectral Density Reports.
  optional bool spectral_density_reporting = 6;
  // Indicates the frequency to be used for the Command. If omitted, frequency
  // selection is left to the command recipient within constraints of
  // RF_Profiles imposed by RF_ControlCommand, MDF, etc.
  optional CapabilityCommandFrequencyType frequency = 7;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message ESM_ChangeDwellType {
  // Indicates the unique ID of the dwell commanded to change.
  DwellID_Type dwell_id = 1;
  // Indicates that the dwell state should be enabled, disabled, or reset.
  optional CapabilityCommandStateEnum change_state = 2;
  // Indicates that the specific dwell should be unallocated, which means
  // temporarily remove it from the dwell strategy without deleting it.
  optional bool unallocate = 3;
  // A deleted dwell can't be re-enabled, including by an automated Capability.
  optional bool delete_dwell = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message ESM_ChangeGeolocationType {
  // Indicates the geolocation control state which the Activity should change to.
  SignalGeolocationControlEnum geolocation_control_state = 1;
  // Indicates the unique ID of an Entity which the sibling
  // GeolocationControlState is addressed to.
  optional EntityID_Type entity_id = 2;
}


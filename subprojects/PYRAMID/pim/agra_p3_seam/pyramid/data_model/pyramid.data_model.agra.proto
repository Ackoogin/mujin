// for details.
// uci_version: 002.001.002.001
message ActivityBaseType {
  // Indicates the unique ID of the Activity.
  ActivityID_Type activity_id = 1;
  // Indicates a Capability which the Activity is an instance of. Generally an
  // Activity is an instance of a single Capability. An Activity can be
  // associated with multiple Capabilities when, for example, a Subsystem has
  // distinct Capabilities for automated and manual. In this case, if a manual
  // command is issued while an automated Activity that achieves the desired
  // result already exists, a single Activity represents both Capabilities.
  repeated CapabilityID_Type capability_id = 2;
  // Indicates whether or not the Activity can be edited/modified via a
  // [Capability]Command...Activity message.
  bool interactive = 3;
  // Indicates the current state of the Activity its state machine. See
  // enumeration annotations for further details.
  ActivityStateEnum activity_state = 4;
  // Indicates the basis of the Activity. See enumerated type annotations for
  // further details. If omitted, a basis of ACTUAL should be assumed.
  optional ActivityBasisEnum basis = 5;
  // Indicates the rank of the Activity amongst all other Activities of the
  // Capability and/or Subsystem. This isn't necessarily the same as the Rank
  // associated with the sibling ActivitySource. This element is meant to convey
  // the Subsystem determined relative ranking of all Activities of a Capability
  // category (ESM, EA, etc.). For Subsystems with multiple Capability
  // categories this element is meant to convey relative ranking across all
  // Capability categories. In addition to the rank of the ActivitySource, an
  // Activity's rank can be influenced by Capability priority (see
  // CapabilitySettings), RF_ControlCommands and other factors that influence
  // the Subsystem's internal scheduling and resource allocation.
  optional ComparableRankingType activity_rank = 6;
  // Indicates details regarding the reason for and/or a contributing factor to
  // the sibling ActivityState element. This element is only expected when the
  // Activity is in a potentially undesirable state such as constrained, failed
  // or completed with less than optimum results.
  optional CannotComplyType activity_reason = 7;
  // Indicates an originating "source" of the Activity; the command or other
  // item which invoked this specific Activity of a Capability. A single
  // Activity can fully or partially satisfy Activity sources.
  repeated ActivitySourceType source = 8;
  // Indicates the estimated time when the Activity started or is expected to
  // start.
  // xsd type: DateTimeType (pattern .+Z)
  optional string estimated_start_time = 9;
  // Indicates the estimated time when the Activity will complete.
  // xsd type: DateTimeType (pattern .+Z)
  optional string estimated_completion_time = 10;
  // Indicates the current estimated percent complete of the Activity.
  // xsd type: PercentType
  optional double estimated_percent_complete = 11;
}


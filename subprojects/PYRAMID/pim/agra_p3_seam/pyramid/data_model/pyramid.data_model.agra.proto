// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message ResponsePlanMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // Indicates the state of the internal software object that the data in the
  // message is based upon. The state of the software object is determined by
  // the publisher. The publisher could be the original/master publisher or an
  // intermediary re-publisher such as a persistence/data manager. This element
  // is not a commanded CRUD operation. It is not an indication of the state of
  // an instance of a message. It is not a mechanism for partial, incremental,
  // or fragmentary publication of a message. It is a signal from a publisher to
  // subscribers. For REMOVED state, in particular, some subscribers will mirror
  // the publisher and treat the message as if the object no longer exists, but
  // others, such as mission recorders, might not (in order to support retaining
  // historical records of activity, for example).
  optional ObjectStateEnum object_state = 2;
  // Indicates the data being conveyed by the message.
  ResponsePlanMDT message_data = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.003.000
message ResponsePlanMDT {
  // Indicates a unique ID assigned to the ResponsePlan. Minor updates to the
  // Plan can be indicated by an update of the value in the child Version
  // element. More significant updates, replacements, etc. might warrant a new
  // Plan with a different child UUID value.
  ResponsePlanID_Type response_plan_id = 1;
  // Indicates the unique ID of the *PlanCommand which the ResponsePlan
  // originated from.
  optional ResponsePlanCommandID_ChoiceType plan_command_id = 2;
  // Contains the details of the task allocation plan.
  ResponsePlanType plan = 3;
  // When TRUE, indicates the *Plan is to be used only for intermediate planning
  // purposes. It will eventually be replaced/superseded by another *Plan or be
  // discarded/abandoned. *Plans with this flag should only be used when
  // explicitly referenced by other messages. These *Plans should never: trigger
  // functionality, be subject to approvals, be activated, etc.
  bool for_planning_use_only = 4;
  // Indicates inputs that were given in the *PlanCommand (or equivalent
  // automated replan) to create the Plan.
  optional ResponsePlanInputsType plan_inputs = 5;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message ResponsePlanType {
  // Indicates the System or Systems which have a direct relationship with the
  // ResponsePlan. See annotations for the underlying type and its child
  // elements for details.
  PlanApplicabilityType applicability = 1;
  // The time window when the plan applies; the time window within which all the
  // effects of the plan would occur.
  optional DateTimeRangeType window = 2;
  // Indicates which part or parts are included in the Plan. Required when any
  // sibling AllocatedResponse elements are given.
  optional ResponsePlanPartsType parts = 3;
  // Indicates a Response allocated to the System which the ResponsePlan is
  // allocated/applicable to.
  repeated ResponseAllocationType allocated_response = 4;
}

// Indicates the System or Systems which have a direct relationship with the
// developed plan. Complex, dispersed, and/or hierarchical C2 systems require
// planning and plans at multiple levels with varying purpose and detail.
// Therefore, plan messages must give an indication of their level, purpose
// and detail. For instance, planning services at the operational level of
// warfare may have different details and control authorities compared to
// planning services at the tactical level of warfare. The
// PlanApplicabilityType helps clarify which systems have which roles and
// responsibilities with respect to the plan. See child elements for further
// details.
// uci_version: 000.000.000.000
message PlanApplicabilityType {
  // Indicates the System which is the intended user of the plan. This type can
  // have multiple meanings, but primarily enables multiple systems, possibly at
  // different levels of warfare or C2 hierarchy levels, to maintain independent
  // plans for the same System identified in the sibling ApplicableToID element.
  // For instance, during planning at the operational level of warfare, a
  // non-tactical planning service may create and simulate execution of plans
  // internally. Such plans would identify the operational level System as the
  // PlannedFor System; they would never be activated or executed by a real
  // world tactical System. Alternatively, the operational level System could
  // have a tactical planning service that is functionally capable and
  // responsible for creating fully detailed plans that can be activated and
  // executed by real world tactical Systems. Such a tactical planning service
  // could be used even if the operational level System does not have control
  // authority over the tactical System at the time the plan is created. Such
  // plans would identify the tactical level System as the PlannedFor System. As
  // a final example, a plan which is intended to be used by the same System
  // which produces its intended effects would have a common SystemID between
  // the sibling PlannedForID and ApplicableToID elements. This element does not
  // replace existing approval policies, authorization or control status and
  // therefore does not automatically imply that the PlannedFor System has any
  // kind of authority over the receiving system.
  optional SystemID_Type planned_for_id = 1;
  // Indicates the unique ID of the System (e.g. aircraft, ground-based sensor,
  // ship, satellite, site, etc.) whose Capabilities, performance, position,
  // etc. the plan is based on. If the plan is a fully detailed one that can be
  // activated and executed, this element indicates the System
  // intended/responsible for executing the plan and producing the intended
  // effects. See annotations in sibling element PlannedForID which provide
  // additional context.
  SystemID_Type applicable_to_id = 2;
}

// See annotations in child elements and messages/elements that use this type

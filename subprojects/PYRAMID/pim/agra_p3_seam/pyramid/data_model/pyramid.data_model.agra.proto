    OpZoneID_Type op_zone_id = 1;
    // Indicates a zone defined directly here.
    ZoneExternalType zone_target = 2;
  }
}

// Indicates any applicable volume this command is valid for.
// uci_version: 000.000.000.000
message ApplicableVolumeType {
  // If specified, indicates the Volume is applicable. If unspecified, then the
  // request is applicable to all areas. This element is logically ANDed with
  // its siblings.
  repeated VolumeChoiceType inclusion_volume = 1;
  // If specified, indicates the Volume not applicable. If unspecified, then the
  // request is applicable to all areas. This element is logically ANDed with
  // its siblings.
  repeated VolumeChoiceType exclusion_volume = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message VolumeChoiceType {
  oneof choice {
    // Indicates a volume defined by an existing OpVolume.
    OpVolumeID_Type op_volume_id = 1;
    // Indicates a volume defined directly here.
    OpVolumeType volume_target = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.001.000
message ESM_BinProfileType {
  // Required if the message is for the resource allocator function. Used by the
  // resource allocator to identify the applicable ESM subsystem. BM will
  // "hijack" the subsystem ID at the message level with the RA Support
  // Capability ID to indicate the message is for the RA.
  optional SubsystemID_Type requested_subsystem_id = 1;
  // Identifies a unique identifier for the data set associated with Bin and
  // emitters. This is the identifier used in the ESM command to ACTIVATE a
  // profile.
  uint32 scan_schedule_profile_index = 2;
  // Parent Capability associated with the Bin Data. Required when message is
  // for a subsystem.
  optional CapabilityID_Type capability_id = 3;
  // Emitter Priority Bin data.
  repeated ESM_BinType profile_data = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.001
message ESM_BinType {
  // Specifies the Emitter Priority Bin for the sibling EmitterEntry. These bins
  // are for a "binned" set of emitters without identifying them individually;
  // used to identify elements used in a scan schedule. The Sibling Precedence
  // gives the relative importance of each Bin/Subcapability pair. A value of 0
  // indicates the least important Bin.
  uint32 emitter_priority_bin = 1;
  // Precedence data for the Emitter Priority Bin. If multiplicity == 1:
  // optional child Subcapability of ESM_SubCapabilityEnum is not used;ranking
  // applies to all supported subcapabilities and only one access period is
  // allowed If multiplicity > 1 (value equals the number of subcapabilities);
  // child SubCapability of ESM_SubCapabilityEenum is required to set
  // subcapability/precedence pair for all supported subcapabilities.
  repeated ESM_BinPrecedenceType sub_capability_data = 2;
  // This element represents Electronic Intelligence (ELINT) Notation for
  // non-communications electronic emissions. Used to preserve original signal
  // identification in case of modification by subsequent processing.
  // xsd type: NotationType (pattern [A-Z0-9]{5}|UNKN|NONE)
  repeated string emitter_elnot_identifier = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message ESM_BinPrecedenceType {
  // This indicates the SubCapability and the SubCapabilityDetails being
  // commanded. It's assumed one or more activities are created for each
  // SubCapabilitySelection.
  optional ESM_SubCapabilityEnum sub_capability = 1;
  // Indicates a required output Product of the Command. Only Products
  // consistent with ESM and supported by the commanded ESM Capability should be
  // requested. If omitted, no output Product should be produced. See
  // ProductTypeEnum for further details.
  ComparableRankingType sub_capability_ranking = 2;
}


  repeated WeatherReportDataType weather_report = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message WeatherReportDataType {
  // This enumerated element indicates the type of the WeatherReport.
  WeatherReportTypeEnum weather_report_type = 1;
  // This element represents the time at which the WeatherReport was generated.
  // xsd type: DateTimeType (pattern .+Z)
  string created = 2;
  // Indicates the time interval over which the report applies.
  repeated DateTimeRangeType schedule = 3;
  // This element represents an area over which the Weather applies.
  ZoneType weather_area = 4;
  // This elements represents the barometric altimeter setting for correct MSL
  // reading, commonly known as QNH, in WeatherArea.
  optional float qnh = 5;
  // Weather data collected for this weather report.
  WeatherReportType weather_data = 6;
}

// An enumeration indicating if the weather report is current, forecast,
// historical, or manually input.
enum WeatherReportTypeEnum {
  WEATHER_REPORT_TYPE_ENUM_UNSPECIFIED = 0;
  WEATHER_REPORT_TYPE_ENUM_CURRENT_CONDITIONS = 1;
  WEATHER_REPORT_TYPE_ENUM_FORECAST = 2;
  WEATHER_REPORT_TYPE_ENUM_OPERATOR_ENTRY = 3;
  WEATHER_REPORT_TYPE_ENUM_HISTORICAL = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.003.000
message WeatherReportType {
  oneof choice {
    // This element represents a summary of the weather conditions across the
    // entire weather area.
    WeatherAreaDataType area_data = 1;
    // This element represents a point at which Weather applies. This allows
    // weather to be expressed as a grid of points across the weather area.
    WeatherReportType_GridData_List grid_data = 2;
  }
}

// synthesized list wrapper for repeated choice member GridData in WeatherReportType (choice)
message WeatherReportType_GridData_List {
  repeated WeatherReportGridDataType items = 1;
}

// See the annotation in the associated message for an overall description of
// the message and this type.
// uci_version: 003.000.003.000
message WeatherDatasetMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // Indicates the state of the internal software object that the data in the
  // message is based upon. The state of the software object is determined by
  // the publisher. The publisher could be the original/master publisher or an
  // intermediary re-publisher such as a persistence/data manager. This element
  // is not a commanded CRUD operation. It is not an indication of the state of
  // an instance of a message. It is not a mechanism for partial, incremental,
  // or fragmentary publication of a message. It is a signal from a publisher to
  // subscribers. For REMOVED state, in particular, some subscribers will mirror
  // the publisher and treat the message as if the object no longer exists, but
  // others, such as mission recorders, might not (in order to support retaining
  // historical records of activity, for example).
  optional ObjectStateEnum object_state = 2;
  // See annotations in child elements and messages/elements that use this type
  // for details.
  WeatherDatasetMDT message_data = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.001
message WeatherDatasetMDT {
  // composed xsd extension base DataRecordBaseType
  DataRecordBaseType base = 1;
  // The unique ID of the dataset.
  WeatherDatasetID_Type weather_dataset_id = 2;
  // The date and time the Dataset was created, separate from any dates
  // associated with the actual data creation or validity.
  // xsd type: DateTimeType (pattern .+Z)
  string created = 3;
  // The date and time the Dataset was last updated.
  // xsd type: DateTimeType (pattern .+Z)
  string updated = 4;
  // This element defines the area that is being described by this dataset of
  // weather data.
  ZoneType dataset_area = 5;
  // This element defines the latitude and longitude step value that was used to
  // generate the WeatherData elements contained in this dataset. For example,
  // the DatasetArea may define an area that goes from 35 latitude to 45 and
  // -120 to -110 longitude with a step value of 1.0 degrees.
  // xsd type: AnglePositiveType
  optional double degree_step = 6;
  // This element defines the altitude step value that was used to generate the
  // WeatherData elements contained in this dataset. For example, if the
  // DatasetArea defines a MinAltitude of 0 and a MaxAltitude of 20,000m, an
  // AltitudeStep value might be 5,000m such that WeatherData would exist for
  // every 500 meters from 0 to 20,000 meters.
  // xsd type: AltitudeType
  optional double altitude_step = 7;
  // This element contains weather data for the dataset that should be used for
  // planning purposes.
  repeated WeatherDataType weather_data = 8;
  // One or more Systems to which the weather dataset apply. If omitted, the
  // dataset applies to all Systems.
  repeated SystemID_Type system_id = 9;
  // This element defines the times that the dataset applies.
  optional ScheduleType schedule = 10;
}

// The ID type for UCI IDs that correspond to weather datasets.
// uci_version: 000.000.000.000
message WeatherDatasetID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message WeatherDataType {
  oneof choice {
    // This element represents a report of current or forecasted weather.
    WeatherReportDataType weather_report = 1;
    // This element represents a weather warning. The time period over which the
    // warning applies is given in the Zone element of the WeatherArea element.
    WeatherWarningDataType weather_warning = 2;
    // This element references a weather product that is defined by
    // ProductMetadata and ProductLocation messages. An example of this type of
    // product would be a GRIB file.
    ProductMetadataID_Type weather_product_id = 3;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message WeatherWarningDataType {
  // This enumerated element indicates the type of WeatherWarning.
  WeatherWarningEnum weather_warning_type = 1;
  // This element represents an area over which the Weather applies.
  ZoneType weather_area = 2;
  // Indicates the time interval over which the warning applies.
  repeated DateTimeRangeType schedule = 3;
  // This element represents additional, human readable, comments on the warning.
  // xsd type: VisibleString1024Type (pattern [ -~]{0,1024})
  optional string remarks = 4;
}


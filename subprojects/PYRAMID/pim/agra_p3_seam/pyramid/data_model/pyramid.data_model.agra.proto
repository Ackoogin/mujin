  // Indicates endurance in terms of maximum ground/surface distance that can be
  // reached given the current System state.
  optional EnduranceFootprintType footprint = 2;
}

// Indicates endurance in terms of maximum distance that can be reached given
// the current system state.
// uci_version: 001.000.000.000
message EnduranceBaseType {
  // Measure of current or planned fuel.
  // xsd type: MassType
  optional double fuel = 1;
  // Estimated time of operation with current or planned fuel/charge/power.
  // xsd type: DurationType
  optional string duration = 2;
  // Estimated time at which operation with current or planned fuel/charge/power
  // will end.
  // xsd type: DateTimeType (pattern .+Z)
  optional string duration_end = 3;
  // Percent of fuel/charge/power remaining or planned, expressed as a

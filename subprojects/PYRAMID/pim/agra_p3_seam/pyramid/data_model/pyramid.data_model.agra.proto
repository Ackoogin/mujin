// The enumerates reflect well-established, short-hand terminology. The
// guidance and enumerates functionally overlap with some UCI concepts such as
// Approval Policy but should be thought of as informing the creation of or
// tactical use of those other UCI concepts; the enumerates give up front
// guidance, prior to creation of Approval Policies, resource scheduling,
// timing constraints, etc.
enum TacticalPlanningAndExecutionEnum {
  TACTICAL_PLANNING_AND_EXECUTION_ENUM_UNSPECIFIED = 0;
  TACTICAL_PLANNING_AND_EXECUTION_ENUM_PRE_PLAN = 1;
  TACTICAL_PLANNING_AND_EXECUTION_ENUM_ON_ORDER = 2;
  TACTICAL_PLANNING_AND_EXECUTION_ENUM_BE_PREPARED_TO = 3;
}

// Indicates guidance for how to proceed when a failure occurs. See enumerated

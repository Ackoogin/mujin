// Indicates an identifier corresponding to a group of EA techniques based on
// the organization of EA Capability. The use of Nickname and MDF name is left
// to the external implementation to organize and identify.
// uci_version: 000.000.000.000
message EA_TechniqueGroupIdentifierType {
  // The short name assigned to the EA technique group by the external EA
  // capability planning and designing organization.
  // xsd type: VisibleString2_4Type (pattern [ -~]{2,4})
  string nickname = 1;
  // The MDF file name associated with the technique group.
  // xsd type: VisibleString256Type (pattern [ -~]{0,256})
  string mdf_name = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message EA_ComponentType {
  // Indicates an EA Component to which an Emission can be assigned.
  ComponentID_Type component_id = 1;
  // Indicates the Azimuth and/or Elevation field of regard of the Component
  // relative to its installation orientation/boresight.
  FieldOfRegardType field_of_regard = 2;
  // Time between frequency changes for the Component.
  // xsd type: DurationType
  string frequency_change_time = 3;
  // Maximum duty factor of the Component.
  // xsd type: PercentType
  double duty_factor_limit = 4;
  // Maximum number of beams for the Component.
  uint32 beam_limit = 5;
  // Maximum number of commutations per beam.
  uint32 commutations_limit = 6;
  // Indicates the bandwidth of the Component.
  repeated FrequencyRangeType band = 7;
  // Indicates the maximum instantaneous bandwidth of the EA component, This
  // field will only be valid when individual EA "channels" are reported as
  // components.
  // xsd type: FrequencyType
  optional double instantaneous_band = 8;
}

// This type identifies the physical limits of a sensor's Field of Regard
// (FOR).
// uci_version: 003.001.003.000
message FieldOfRegardType {
  // Indicates the field shape of the field of regard.
  SensorFieldOfRegardType field = 1;
  // The MAX is the advertised range (SPEC), and the MIN is the absolute edge of
  // the capability of the Radar. Taking a SAR between the MIN and MAX indicates
  // degraded quality.
  optional SlantRangeConstraintsType near_range = 2;
  // The MIN is the advertised range (SPEC), and the MAX is the absolute edge of
  // the capability of the Radar. Taking a SAR between the MIN and MAX indicates
  // degraded quality.
  optional SlantRangeConstraintsType far_range = 3;
  // Mnemonic representation of the Field of Regard.
  // xsd type: VisibleString256Type (pattern [ -~]{0,256})
  optional string mnemonic = 4;
  // The type this Field of Regard is for.
  optional FieldOfRegardTypeEnum type_of_for = 5;
}

// See the annotation in the associated message for an overall description of
// the message and this type.
// uci_version: 003.000.003.000
message SensorFieldOfRegardType {
  oneof choice {
    // Indicates the azimuth and elevation extents of the field of regard.
    FieldOfRegardExtentsType extents = 1;
    // Specified a geometric volume that defines the sensor field of regard.
    GeometricVolumeType volume = 2;
    // Indicates a longitude range corresponding to geocentric/geostationary
    // orbits. The Min value reflects the Western most extent and the Max value
    // represents the Eastern most extent. As such, the Min value may be a greater
    // number than the Max value. Pay special attention to the values when the
    // field crosses the Prime Meridian (0) and the 180th Meridian (-pi/pi).
    AnglePairType geo_longitude = 3;
  }
}

// Azimuth and elevation extents (ranges).
// uci_version: 001.000.000.000
message FieldOfRegardExtentsType {
  // Min and max azimuth extents.
  optional AnglePairType azimuth_extent = 1;
  // Min and max elevation extents.
  optional AnglePairType elevation_extent = 2;
}

// Indicates the type of the Field of Regard.
enum FieldOfRegardTypeEnum {
  FIELD_OF_REGARD_TYPE_ENUM_UNSPECIFIED = 0;
  FIELD_OF_REGARD_TYPE_ENUM_MAX_EXTENT = 1;
  FIELD_OF_REGARD_TYPE_ENUM_MIN_EXTENT = 2;
  FIELD_OF_REGARD_TYPE_ENUM_OPTIMAL = 3;
}


message PlansReferenceBaseType {
  // Indicates a reference to a TaskPlan.
  repeated TaskPlanID_Type task_plan_id = 1;
  // Indicates a reference to an OrbitPlan.
  repeated OrbitPlanID_Type orbit_plan_id = 2;
  // Indicates a reference to an OrbitActivityPlan.
  repeated OrbitActivityPlanID_Type orbit_activity_plan_id = 3;
  // Indicates a reference to a RoutePlan.
  repeated RoutePlanID_Type route_plan_id = 4;
  // Indicates a reference to a RouteActivityPlan.
  repeated RouteActivityPlanID_Type route_activity_plan_id = 5;
  // Indicates a reference to an ActivityPlan.
  repeated ActivityPlanID_Type activity_plan_id = 6;
  // Indicates a reference to an EffectPlan.

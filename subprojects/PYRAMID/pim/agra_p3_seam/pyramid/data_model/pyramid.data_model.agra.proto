// uci_version: 001.000.000.001
message CommTerminalPlanTriggerType {
  // Indicates a unique ID assigned to a triggering Mission.
  repeated MissionID_Type mission_id = 1;
  // Indicates a triggering *Plan.
  optional PlansReferenceType plan_identifier = 2;
  // Indicates time windows for which this communication plan should be active.
  repeated DateTimeRangeType effective_time_spans = 3;
  // This element represents a unique identifier of a zone for which this
  // CommTerminalPlan should be active.
  repeated OpZoneID_Type op_zone_id = 4;
  // This element represents a unique identifier of a volume for which this
  // CommTerminalPlan should be active.
  repeated OpVolumeID_Type op_volume_id = 5;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message PlansReferenceType {
  // composed xsd extension base PlansReferenceBaseType
  PlansReferenceBaseType base = 1;
  // Indicates a reference to a MissionPlan.
  repeated MissionPlanID_Type mission_plan_id = 2;
}

// See annotations in child elements and messages/elements that use this type

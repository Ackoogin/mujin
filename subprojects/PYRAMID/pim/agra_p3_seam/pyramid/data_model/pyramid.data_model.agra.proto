// This type represents a command to control a door that is relevant to
// mission operations.
// uci_version: 002.001.002.000
message TurretCommandType {
  // composed xsd extension base SupportCapabilityCommandBaseType
  SupportCapabilityCommandBaseType base = 1;
  // Represents the type of command to be sent to the turret.
  TurretCommandChoiceType turret_command = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.001.002.000
message TurretCommandChoiceType {
  oneof choice {
    // Enumeration defining the Gimbal Modes that must be explicitly commanded.
    // Other modes can be reached by generating an appropriate command (e.g.
    // sending a platform referenced Position command will put the turret in a
    // body fixed mode, while sending a PointTarget will put it into a
    // geo-referenced mode).
    FixedPointingEnum fixed_mode = 1;
    // Command to specify the look angle of the gimbal using Azimuth/Elevation and
    // Reference Frame (INERTIAL/BODY) specifications.
    TurretCommandPositionType position = 2;
    // Command to specify the look angle of the gimbal. The option provides two
    // choices: LOS which includes Reference Frame, Azimuth, Elevation, Roll and
    // associated LOS Rates or LOS_Rates which allows for Azimuth, Elevation and
    // Roll Rate settings.
    LOS_D_Type los_position = 3;
    // Indicates the volume or specific Entity that defines the extents of the
    // spatial region covered by the command. For non-cued Capabilities, one air
    // volume instance of this element is expected. For cued Capabilities, two
    // instances of this element are allowed: one with an Entity specified and a
    // second with an air volume that define the extents of the cue volume around
    // the Entity. For cued Capabilities, a single instance is allowed if it is an
    // Entity in which case the Entity location uncertainty defines the extents of
    // the cue volume.
    PO_AirTargetVolumeCommandType volume = 4;
    // Indicates the source of or explicit values for geospatial characteristics
    // of the target of the Command.
    TargetType geospatial = 5;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.001.003.000
message TurretCommandStatusMT {
  // composed xsd extension base MessageType
  MessageType base = 1;

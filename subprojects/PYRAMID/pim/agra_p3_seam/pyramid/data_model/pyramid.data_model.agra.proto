  repeated RequirementPlanningCandidateType planning_candidate = 2;
  // Indicates an existing ResponsePlan of the System superior to the sibling
  // PlanningCandidates that provides a proposed "response deck" to allocate
  // amongst the candidates. This element can be supplemented with additional

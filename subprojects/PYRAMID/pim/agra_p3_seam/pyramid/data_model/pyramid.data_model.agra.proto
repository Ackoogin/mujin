// This type is used to return the current settings of the set of constraints
// that constrain when a PO sensor can start collecting the requested image
// data.
// uci_version: 001.000.000.001
message PO_CollectionConstraintsStatusType {
  // True Map Angle. The true map angle is defined in the Northeast Down (NED)
  // coordinate system with the origin at the aircraft (aircraft local NED) as
  // the angle between the scene entry line of sight and the instantaneous
  // aircraft track heading vector. The aircraft track heading vector is
  // obtained by rotating the north unit vector of the aircraft local NED
  // coordinate system in the aircraft local NE plane through the aircraft track
  // heading angle. This angle is always positive. This field is the current
  // settings for this constraint.
  optional PO_AngleConstraintControlsStatusType map_angle_constraints = 1;
  // The angle at the target between the plane of the terrain and the line of
  // sight to the sensor. If the slope of the terrain is zero, this element is
  // equivalent to the sibling ElevationAngleConstraints. This field is the
  // current settings for this constraint.
  optional PO_AngleConstraintControlsStatusType grazing_angle_constraints = 2;
  // The angle from true north to the line-of-sight vector from the sensor to
  // the target tangent plane. This field is the current settings for this
  // constraint.
  optional PO_AngleConstraintControlsStatusType look_angle_constraints = 3;
  // The angle at the target between the flat surface (ellipsoid surface
  // ignoring terrain) and the line of sight to the sensor. If the slope of the
  // terrain is zero, this element is equivalent to the sibling
  // GrazingAngleConstraints. This field is the current settings for this
  // constraint.
  optional PO_AngleConstraintControlsStatusType elevation_angle_constraints = 4;
  // Distance from the sensor reference point (e.g. aperture reference point) to
  // the ground reference point. This field is the current settings for this
  // constraint.
  optional PO_SlantRangeConstraintControlsStatusType slant_range_constraints = 5;
  // This element defines the type of pattern that a vehicle should use to
  // collect over a large area. This can be specified when creating Tasks to
  // collect over OpZones, ZoneTargets, Entities (which have been specified as
  // zones), etc. This field is the current settings for this constraint.
  optional PO_ColorPatternConstraintControlsStatusType collection_pattern = 6;
  // The angle from the target plane at intersection of the optical line of
  // sight with the earth's surface at the time of the first image line. This
  // field is the current settings for this constraint.
  optional PO_AngleConstraintControlsStatusType sun_elev_angles = 7;
  // The angle from True North clockwise (as viewed from space) at the time of
  // the first image line. This field is the current settings for this
  // constraint.
  optional PO_AngleConstraintControlsStatusType sun_azimuth_angles = 8;
  // The rate at which the sensor look-point moves across the terrain. This is
  // only applicable to area or line targets. This field is the current settings
  // for this constraint.
  optional PO_SweepSpeedConstraintControlsStatusType sweep_speed = 9;
  // The current settings for the orientation of the gimbal with respect to its
  // reference frame.
  optional PO_GimbalOrientationConstraintControlsStatusType gimbal_orientation = 10;
}


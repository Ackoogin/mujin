  // for the Requirement.
  repeated TimingConstraintsType timing = 2;
}

// Indicates types of temporal/timing constraints for Requirements (Effect,
// Action, Task, etc.).
enum RequirementTimingEnum {
  REQUIREMENT_TIMING_ENUM_UNSPECIFIED = 0;
  REQUIREMENT_TIMING_ENUM_PLANNING = 1;
  REQUIREMENT_TIMING_ENUM_EXECUTION = 2;
  REQUIREMENT_TIMING_ENUM_RESULT = 3;
  REQUIREMENT_TIMING_ENUM_DISSEMINATION = 4;
}

// Provides a choice of timing constraints including repetitive timing and
// event based repetition.
// uci_version: 003.000.001.000
message TimingConstraintsType {
  oneof choice {
    // Indicates that the timing should be As Soon As Possible.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string as_soon_as_possible = 1;
    // Indicates the time window during which the Requirement should be initiated
    // and, once initiated, the duration.
    TimeWindowType time_window = 2;
    // Indicates a recurring time. For example, a recurring time as a constraint
    // on a Task may result in the need for a Task or other Requirement to be
    // broken down into multiple discrete children corresponding to each interval.
    WeekdayIntervalType weekday_interval = 3;
    // Indicates a repetition and defines the number and frequency of product
    // collection and generation such as start/stop/frequency or min # of
    // collections.
    RepetitionConstraintsType repetitive = 4;
  }
}

// Indicates the Time Window and the Repetition which can be Time-Based or
// Event-Based.
// uci_version: 003.000.001.000
message RepetitionConstraintsType {
  // Indicates the nature of the repetitions.
  RepetitionType repetition = 1;
  // The time window for which the sibling Repetition applies.
  optional TimeWindowType time_window = 2;
}

// See annotations in child elements and messages/elements that use this type

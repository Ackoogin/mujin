// uci_version: 000.000.000.000
message MA_RulesOfEngagementMDT {
  // The unique identifier for the message.
  MA_RulesOfEngagementID_Type rules_of_engagement_id = 1;
  // These markers are used to identify an Entity as a Friend, Neutral, or Enemy
  // and which enables or confirms the Entity's Standard Identity type to be set
  // to FRIEND, NEUTRAL, SUSPECT or HOSTILE.
  optional MA_IdMatrixCriteriaType id_matrix_criteria = 2;
  // This provides a list of criteria that when met can trigger a
  // MA_DesignationRequestMT to be sent to a Target Authority who can use the
  // info in this message to send a MA_DesignationMT that will designate an
  // Entity as a Target.
  repeated MA_TargetDesignationCriteriaType target_designation_criteria = 3;
  // This provides a list of Authorized Operators that are allowed to set an
  // Entity as a Target and to respond to a StrikeConsentRequestMT. An Entity
  // becomes a Target when a Designation message declares that entity to be a
  // Target. This can also be done by an Action or Task specifying an Entity as
  // a Target (TargetType). The associated Approval Policy will specify which
  // Actions or Tasks make an Entity a Target and who is authorized to command
  // them or approve a response that activates them. MA can send a
  // MA_DesignationRequestMT to Operators identified in the Approval Authority.
  // An Authorized operator can also directly send a MA_DesignationMT. An MA can
  // be an authorized approver if specified, but an MA cannot send a
  // MA_DesignationMT for itself. A Lead can send a MA_DesignationMT to a
  // follower if a C2 has already approved the Target.
  optional MA_AuthorityCriteriaType target_authority_criteria = 4;
  // This describes how the Custody of a Target is confirmed and must be held
  // through a Weapons Engagement with that Target.
  repeated MA_TargetCustodyCriteriaType target_custody_criteria = 5;
  // Indicates whether (TRUE) or not (FALSE) the Strike Activities requires
  // consent to transition from the ENABLED state to an ACTIVE state. If TRUE,
  // each Strike Activity would be required to send a StrikeConsentRequestMT to
  // an Authorized Operator (defined in the TargetAuthorityCriteria field) and
  // receive a StrikeConsentRequestStatusMT before each Strike Activity can
  // execute the Strike.
  bool strike_consent_required = 6;
}


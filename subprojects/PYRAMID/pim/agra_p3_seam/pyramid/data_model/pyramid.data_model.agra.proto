message AirfieldContaminationType {
  // Indicates nuclear contamination is present on Airfield when this field is
  // present.
  // xsd type: EmptyType (pattern [A-Za-z]{0})
  optional string nuclear = 1;
  // Indicates biological contamination is present on Airfield when this field
  // is present.
  // xsd type: EmptyType (pattern [A-Za-z]{0})
  optional string biological = 2;
  // Indicates chemical contamination is present on Airfield when this field is
  // present.
  // xsd type: EmptyType (pattern [A-Za-z]{0})
  optional string chemical = 3;
}

// Indicates which MIL-STD-6016 enumeration should be used to interpret the
// CrashService.
enum CrashServiceEnum {
  CRASH_SERVICE_ENUM_UNSPECIFIED = 0;
  CRASH_SERVICE_ENUM_FULL = 1;
  CRASH_SERVICE_ENUM_LIMITED = 2;
  CRASH_SERVICE_ENUM_NONE = 3;
}

// See the annotation in the associated message airfield runway data.
// uci_version: 001.000.002.000
message AirfieldRunwayType {
  // Indicates the unique ID for this Runway. Route paths may reference this
  // runway for takeoff or landing paths.
  RunwayID_Type runway_id = 1;
  // Indicates runway described is a secondary runway on Airfield.
  // xsd type: EmptyType (pattern [A-Za-z]{0})
  optional string secondary_indicator = 2;
  // Indicates status of runway according to MIL-STD-6016.
  optional RunwayStatusEnum status = 3;
  // Indicates direction of runway in radians.
  // xsd type: AnglePositiveType
  optional double direction = 4;
  // Indicates available length of runway in meters.
  // xsd type: DistanceType
  optional double available_length = 5;
  // Indicates Ground-Controlled Approach service is a available on runway when
  // field is present.
  // xsd type: EmptyType (pattern [A-Za-z]{0})
  optional string gca = 6;
  // Indicates Instrument Landing Systems service is a available on runway when
  // field is present.
  // xsd type: EmptyType (pattern [A-Za-z]{0})
  optional string ils = 7;
  // Indicates available approach lighting on runway according to MIL-STD-6016.
  optional ApproachLightingEnum approach_lighting = 8;
  // Indicates available arrester wires on runway according to MIL-STD-6016.
  optional ArresterWiresEnum arrester_wires = 9;
  // Indicates arrester barrier is present on runway when field is present.
  // xsd type: EmptyType (pattern [A-Za-z]{0})
  optional string arrester_barrier = 10;
  // Indicates status of breaking action on runway according to MIL-STD-6016.
  optional BrakingActionEnum braking_action = 11;
  // Indicates visual range of runway in meters.
  // xsd type: DistanceType
  optional double visual_range = 12;
  // Specifies the coordinates of the runway when used for takeoffs.
  optional RunwayCoordinatesType takeoff_coordinates = 13;
  // Specifies the coordinates of the runway when used for landings.
  optional RunwayCoordinatesType landing_coordinates = 14;
  // Specifies terms for using a runway. These details can be used in the
  // decision process when choosing a runway.
  optional RunwayUsageDetailsType default_runway_usage_details = 15;
  // This field specifies a set of safe minimum approach altitudes and an
  // emergency safe altitude. This field defines minimum approach altitude and
  // emergency safe altitude consistent with standard FAA instrument approach
  // chart definitions (using UCI standard data types).
  optional SafeAltitudeType safe_altitude = 16;
  // Specifies a unique reference into the DAFIF database record for this runway.
  optional ForeignKeyType dafif_runway_identifier = 17;
}

// Indicates which MIL-STD-6016 enumeration should be used to interpret the
// RunwayStatus.
enum RunwayStatusEnum {
  RUNWAY_STATUS_ENUM_UNSPECIFIED = 0;
  RUNWAY_STATUS_ENUM_BLACK_MAJOR_DAMAGE = 1;
  RUNWAY_STATUS_ENUM_CLEAR = 2;
  RUNWAY_STATUS_ENUM_BLACK_STRONG_CROSSWINDS = 3;
  RUNWAY_STATUS_ENUM_BLACK_SNOW_ICE = 4;
  RUNWAY_STATUS_ENUM_BLACK_CRASHED_AIRCRAFT = 5;
}

// Indicates which MIL-STD-6016 enumeration should be used to interpret the
// ApproachLighting (DFI 1873 DUI 005).
enum ApproachLightingEnum {
  APPROACH_LIGHTING_ENUM_UNSPECIFIED = 0;
  APPROACH_LIGHTING_ENUM_NONE = 1;
  APPROACH_LIGHTING_ENUM_LIMITED_EMERGENCY = 2;
  APPROACH_LIGHTING_ENUM_BAR_3 = 3;
  APPROACH_LIGHTING_ENUM_FULL_NATO = 4;
}

// Indicates which MIL-STD-6016 enumeration should be used to interpret the
// ArresterWires.
enum ArresterWiresEnum {
  ARRESTER_WIRES_ENUM_UNSPECIFIED = 0;
  ARRESTER_WIRES_ENUM_NOT_AVAILABLE = 1;
  ARRESTER_WIRES_ENUM_TOUCHDOWN_WIRE_RIGGED = 2;
  ARRESTER_WIRES_ENUM_OVERRUN_WIRE_RIGGED = 3;
  ARRESTER_WIRES_ENUM_BOTH_WIRES_RIGGED = 4;
}

// Indicates which MIL-STD-6016 enumeration should be used to interpret the
// BrakingAction.
enum BrakingActionEnum {
  BRAKING_ACTION_ENUM_UNSPECIFIED = 0;
  BRAKING_ACTION_ENUM_POOR = 1;
  BRAKING_ACTION_ENUM_MEDIUM_POOR = 2;
  BRAKING_ACTION_ENUM_MEDIUM = 3;
  BRAKING_ACTION_ENUM_MEDIUM_GOOD = 4;
  BRAKING_ACTION_ENUM_GOOD = 5;
}

// Specifies runway-specific coordinates. These coordinates are specific to
// either takeoffs or landings as identified in AirfieldReportMDT.
// uci_version: 001.000.002.000
message RunwayCoordinatesType {
  // The waypoint at the start of the runway.
  Point3D_Type start = 1;
  // The waypoint at the nearest point of the runway.
  optional Point3D_Type threshold = 2;
  // The waypoint at the furthest point of the runway.
  optional Point3D_Type limit = 3;
}

// Specifies terms for using a runway. These details can be used in the
// decision process when choosing a runway.
// uci_version: 000.000.000.000
message RunwayUsageDetailsType {
  // This field represents the runway priority to be considered when choosing
  // between multiple available runways.
  optional uint32 priority = 1;
  // This field indicates whether this runway is available for use in case of
  // emergency.
  optional bool available_for_emergency_use = 2;
}

// This field specifies a set of safe minimum approach altitudes and an
// emergency safe altitude. This field also specifies the cylindrical area,
// defined by a center point and radius, where the altitudes apply. This field
// defines minimum approach altitude and emergency safe altitude consistent
// with standard FAA instrument approach chart definitions (using UCI standard
// data types). This information can, for example, be used to eliminate
// runways or extirpation points when the required altitude is not achievable
// during an anomaly.
// uci_version: 001.000.002.000
message SafeAltitudeType {
  // This field specifies two pieces of information, the central point from
  // which safe altitudes are defined, and (optionally) the emergency safe
  // altitude. The emergency safe altitude (ESA) is out to a 100 nm range. ESA
  // is defined by U.S. Air Force Terminal Instrument Procedures Service,
  // document 8260.32.
  Point2D_Type center_point_and_esa = 1;
  // This field defines the minimum safe altitudes (MSA) as defined by the FAA
  // Instrument Procedures Handbook, Chapter 4 "Approaches", "Minimum
  // Safe/Sector Altitude" section. MSAs are published for emergency use on
  // instrument approach charts. MSAs provide 1,000 feet of clearance over all
  // obstacles but do not necessarily assure acceptable navigation signal
  // coverage. Altitudes provided here are valid to a 25 nm radius range. Each
  // array element defines the MSA between the specified radial and the next
  // element's radial. As a result elements in the array need to have a radial
  // greater than the preceding radial (i.e. in increasing radial order). If
  // only one element is provided, its radial is N/A as the MSA applies to the
  // full circle. Radials are measured inbounds to the center point, relative to
  // true north.
  repeated AltitudeRadialPairType minimum_safe_altitude = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message AltitudeRadialPairType {
  // This defines the altitude which provides 1,000 feet of clearance over all
  // obstacles but do not necessarily assure acceptable navigation signal
  // coverage. Note: even though this annotation references obstacle clearance
  // in feet (taken from the FAA Instrument Procedures Handbook), the altitude
  // specified here is in meters.
  // xsd type: AltitudeType
  double altitude = 1;
  // This defines the starting angle for the associated altitude.
  // xsd type: AngleType
  double radial = 2;
}

// The polymorphic extension type for airfield logistics information.
// uci_version: 000.000.000.000
message AirfieldStoresPET {
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.003.000
message COMINT_CapabilityMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // Indicates the state of the internal software object that the data in the
  // message is based upon. The state of the software object is determined by
  // the publisher. The publisher could be the original/master publisher or an
  // intermediary re-publisher such as a persistence/data manager. This element
  // is not a commanded CRUD operation. It is not an indication of the state of
  // an instance of a message. It is not a mechanism for partial, incremental,
  // or fragmentary publication of a message. It is a signal from a publisher to
  // subscribers. For REMOVED state, in particular, some subscribers will mirror
  // the publisher and treat the message as if the object no longer exists, but
  // others, such as mission recorders, might not (in order to support retaining
  // historical records of activity, for example).
  optional ObjectStateEnum object_state = 2;
  // See annotations in child elements and messages/elements that use this type
  // for details.
  COMINT_CapabilityMDT message_data = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.003.000
message COMINT_CapabilityMDT {
  // composed xsd extension base CapabilityBaseType
  CapabilityBaseType base = 1;
  // Indicates an installed Capability, its configurable characteristics and its
  // controllability.
  repeated COMINT_CapabilityType capability = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.001.003.001
message COMINT_CapabilityType {
  // composed xsd extension base CommandableCapabilityDeclarationType
  CommandableCapabilityDeclarationType base = 1;
  // Indicates the Capability's first tier type in the taxonomy. The first tier
  // is an indication of the means of initiation of the Capability. See
  // enumerate annotations for further details.
  CapabilityInitiationEnum capability_type = 2;
  // Indicates a SubCapability of the Capability, the second tier in the
  // taxonomy. The second tier is an indication of the specific collection
  // technique. See enumeration annotations for further details. List size for
  // this element is based on "Select All That Apply" condition.
  repeated COMINT_SubCapabilityEnum sub_capability_type = 3;
  // Indicates a geolocation type/technique supported by the Capability. This
  // element is only expected when the sibling SubCapabilityType indicates
  // geolocation. List size for this element is based on "Select All That Apply"
  // condition.
  repeated SignalGeolocationMethodEnum geolocation_type = 4;
  // Indicates the Capability's support for select optional elements in its
  // accepted control interface messages. Support for these elements is expected
  // to vary across Capability implementations but must be known in order to
  // adapt and configure upstream Systems and Services which use the Capability.
  COMINT_CapabilityOptionsType capability_options = 5;
  // Indicates a summary of the expected coverage of a dwell or dwells
  // associated with the Capability. This element does not indicate an actual
  // instantiated, scheduled dwell of the Capability. This element is an
  // abstraction of the MDF representation and/or design implementation of a
  // Dwell. Actual, instantiated, scheduled Dwells are reported via the Activity
  // message.
  repeated ESM_DwellCoverageType dwell_coverage = 6;
  // Indicates a message that is an output of the Capability. See enumerated
  // type annotations for details. List size for this element is based on
  // "Select All That Apply" condition.
  repeated ESM_MessageOutputsEnum message_output = 7;
  // This element is used when the capability represents a software defined
  // application that is referenced by an application ID index.
  optional ForeignKeyType application_key = 8;
}

// Indicates the method to be used for geolocation.
enum SignalGeolocationMethodEnum {
  SIGNAL_GEOLOCATION_METHOD_ENUM_UNSPECIFIED = 0;
  SIGNAL_GEOLOCATION_METHOD_ENUM_TDOA = 1;
  SIGNAL_GEOLOCATION_METHOD_ENUM_FDOA = 2;
  SIGNAL_GEOLOCATION_METHOD_ENUM_TRIANGULATION = 3;
  SIGNAL_GEOLOCATION_METHOD_ENUM_BEARINGS_ONLY = 4;
  SIGNAL_GEOLOCATION_METHOD_ENUM_AZ_EL = 5;
  SIGNAL_GEOLOCATION_METHOD_ENUM_AMPLITUDE = 6;
  SIGNAL_GEOLOCATION_METHOD_ENUM_ADVANCED = 7;
  SIGNAL_GEOLOCATION_METHOD_ENUM_OTHER = 8;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message COMINT_CapabilityOptionsType {
  // Indicates whether (TRUE) or not (FALSE) the Capability supports the
  // InterruptOtherActivities element in the Command message.
  bool interrupt_other_activities = 1;
  // Identifies how many hardware channels (components) are needed to run this
  // capability.
  optional int32 number_of_channels = 2;
  // Identifies whether the capability supports the subsystem managing its gain
  // via automated gain control.
  optional bool agc_supported = 3;
  // Identifies whether the capability supports an internal data archiving
  // function.
  optional bool archive_available = 4;
  // Identifies another capability that this capability is dependent upon.
  optional CapabilityID_Type capability_dependency_id = 5;
  // Identifies whether the capability supports a scanning function.
  optional bool scan_support = 6;
  // Lists the modes of the target signals that the capability will support. The
  // string data format of the key supports either numerical or text based
  // designations, as defined by the subsystem performance specification.
  optional ForeignKeyType supported_modes = 7;
  // This indicates what formats are used by the subsystem when outputting audio
  // data.
  // xsd type: MIME_Type
  repeated string audio_formats = 8;
  // This indicates what data compression types are used by the subsystem when
  // outputting audio data.
  repeated ForeignKeyType compression_type = 9;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.001.000
message ESM_DwellCoverageType {
  // Indicates the bandwidth of the Dwell.
  repeated FrequencyRangeType band = 1;
  // Indicates an EA Component the dwell can be assigned to.
  repeated ComponentID_Type component_id = 2;
  // Indicates an emitter type which the dwell might detect.
  repeated EmitterIdentityType emitter = 3;
  // Indicates a specific emitter type ***instance*** which the dwell might
  // detect.
  repeated SpecificEmitterIdentityType specific_emitter = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message FrequencyRangeType {
  // Indicates the minimum or lower frequency in the frequency range. This can
  // also indicate the frequency at the start of the pulse. If the frequency
  // range is actually a discrete single frequency, this element and the sibling
  // Max element should be equal.
  // xsd type: FrequencyType
  double min = 1;
  // Indicates the maximum or upper frequency in the frequency range. This can
  // also indicate the frequency at the end of the pulse. If the frequency range
  // is actually a discrete single frequency, this element and the sibling Min
  // element should be equal.
  // xsd type: FrequencyType
  double max = 2;
}


// Indicates parameters for both Entity and System notification messages. This
// includes the notification's ID, the notification's current state, the
// timestamp, the source of the notification, the severity of the
// notification, the asset that the notification applies to (if applicable),
// and a notification narrative for a human operator.
// uci_version: 001.000.001.000
message NotificationBaseType {
  // Indicates the unique ID of the Notification.
  NotificationID_Type notification_id = 1;
  // Indicates the current state within an enumerated state machine that
  // characterizes the life cycle of a notification.
  NotificationStateEnum notification_state = 2;
  // The time at which the Notification was originally triggered (ex: event
  // time).
  // xsd type: DateTimeType (pattern .+Z)
  string timestamp = 3;
  // Indicates the originating source of the Notification.
  NotificationSourceType source = 4;
  // Indicates the overall severity of the notification. Informational
  // notifications are meant to provide informational context of events.
  // Indicates the existence of a hazardous condition requiring immediate action
  // to prevent loss of life, equipment damage, or abortion of the mission.
  // Critical notifications indicate the need for immediate attention.
  NotificationSeverityEnum severity = 5;
  // Indicates an Asset that the Notification applies to and/or is affected by.
  // Optional when the Notification characterizes the Subject without regard for
  // Assets it might affect. Omission of this element doesn't necessarily mean
  // the Notification isn't applicable to an Asset.
  repeated SubjectType applies_to = 6;
  // Human readable message for display to an operator.
  // xsd type: VisibleString1024Type (pattern [ -~]{0,1024})
  optional string notification_narrative = 7;
}

// The ID type for UCI IDs that correspond to a notification.
// uci_version: 000.000.000.000

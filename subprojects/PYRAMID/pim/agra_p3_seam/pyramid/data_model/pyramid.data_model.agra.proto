// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message LAR_MDT {
  // This is an ID to uniquely identify the Launch Acceptability Region (LAR).
  LAR_ID_Type lar_id = 1;
  // This element is required when the message is generated in response to a
  // LAR_Request with ResultsInNativeMessage=TRUE; otherwise it is omitted.
  optional RequestID_Type request_id = 2;
  // Indicates the weapon Capability instance that this LAR is associated with.
  // Multiple instances of this element should only be given when each weapon
  // Capability is of the same homogeneous weapon type and multiple weapon
  // instances are being employed on a single DMPI.
  repeated CapabilityID_Type capability_id = 3;
  // Indicates the type of region that is being specified. See enumeration
  // annotations for further details.
  LAR_RelationEnum lar_type = 4;
  // This element describes the basis of the dataset used and/or being used for
  // the LAR. A LAR based on a static dataset (mission planned route, DMPIs,
  // winds, etc.) or a snapshot in time (data at the time of a LAR_Request) is
  // calculated once and results in a static LAR. A LAR calculated periodically
  // or upon changing conditions in a dynamic dataset (current vehicle position,
  // measured wind, etc.) results in a dynamic LAR.
  LAR_BasisEnum basis = 5;
  // This element indicates if the LAR was generated using payload algorithms.
  // An example where this would be used is when using PGMs on an aircraft that
  // generates in the LAR during flight and uses different algorithms than the
  // actual Capability uses to generate its LAR. There are cases where the
  // difference between the algorithms can prevent release of the weapon.
  bool generated_by_weapon = 6;
  // Indicates the actual geo-spatial launch acceptability region (LAR); a
  // region in space where the weapon can be launched and satisfy the given
  // constraints. LARs are generally calculated for a specific altitude (or
  // narrow altitude band) and release conditions; they are generally not a
  // three dimensional volume.
  ZoneType region = 7;
  // Indicates additional details describing the LAR. If the LAR is the result
  // of a LAR_Request, these details are an echo of it.
  LAR_DetailsType lar_details = 8;
}

// The ID type for UCI IDs that correspond to LARs.
// uci_version: 000.000.000.000
message LAR_ID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// Indicates the LAR relation of zone or range.
enum LAR_RelationEnum {
  LAR_RELATION_ENUM_UNSPECIFIED = 0;
  LAR_RELATION_ENUM_IN_RANGE = 1;
  LAR_RELATION_ENUM_IN_RANGE_MIN = 2;
  LAR_RELATION_ENUM_IN_ZONE = 3;
  LAR_RELATION_ENUM_IN_ZONE_MIN = 4;
}

// Indicates the LAR type of static or dynamic.
enum LAR_BasisEnum {
  LAR_BASIS_ENUM_UNSPECIFIED = 0;
  LAR_BASIS_ENUM_STATIC = 1;
  LAR_BASIS_ENUM_DYNAMIC = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.003.000
message LAR_DetailsType {
  // Indicates a composite LAR when TRUE. A composite LAR is a single LAR that
  // satisfies all of the weapon-target pairs in the sibling
  // WeaponTargetPairing. When FALSE, indicates a separate LAR for each
  // weapon-target pair; equivalent to a separate LAR_Request/LAR for each of
  // them.
  bool composite = 1;
  // Indicates the weapon-target pair or pairs of the LAR. Weapon-target pairs
  // can be expressed indirectly through references to DMPI* messages or
  // directly as a "weaponeering" solution.
  WeaponTargetPairingChoiceType weapon_target_pairing = 2;
  // Specifies the release conditions for the LAR.
  PlannedReleaseConditionsType planned_release_conditions = 3;
  // Indicates a preplanned RoutePlan for the weapon given in the sibling
  // WeaponTargetPairing element. When given, the sibling WeaponTargetPairing
  // element should only indicate a single weapon. This element is required when
  // the LAR_Type indicates IN_PLAN and vice-versa.
  optional RoutePlanReferenceType weapon_route = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.003.000
message WeaponTargetPairingChoiceType {
  oneof choice {
    // Indicates a weapon-target pair or pairs given in a DMPI_Designation.
    DMPI_DesignationID_Type dmpi_designation_id = 1;
    // Indicates a weapon-target pair or pairs given in a DMPI_Pattern.
    DMPI_PatternID_Type dmpi_pattern_id = 2;
    // Indicates a weapon-target pair given in a DMPI.
    WeaponTargetPairingChoiceType_DMPI_ID_List dmpi_id = 3;
    // Indicates a weapon-target pair expressed directly, independent of DMPIs.
    WeaponTargetPairingChoiceType_Weaponeering_List weaponeering = 4;
  }
}


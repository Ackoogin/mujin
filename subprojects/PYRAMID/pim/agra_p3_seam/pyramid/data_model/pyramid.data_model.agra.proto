enum VehicleLossOfLinkProcessingEnum {
  VEHICLE_LOSS_OF_LINK_PROCESSING_ENUM_UNSPECIFIED = 0;
  VEHICLE_LOSS_OF_LINK_PROCESSING_ENUM_DISABLED = 1;
  VEHICLE_LOSS_OF_LINK_PROCESSING_ENUM_ENABLED = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message CommAllocationActionType {
  // Indicates the CommAllocation which the sibling CommAllocationTransition is
  // applicable to.
  CommScheduleAllocationID_Type comm_allocation_id = 1;
  // Indicates whether the CommAllocation should be activated or deactivated for
  // the Action.
  CommAllocationTransitionEnum comm_allocation_transition = 2;
}

// Indicates the possible values with which to transition the communication

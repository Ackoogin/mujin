  // SubsystemBIT_Command and/or self-initiated by the Subsystem. Subsystem
  // self-initiated BIT examples include periodic BIT (PBIT), background BIT
  // (BBIT), startup BIT (SBIT), maintenance BIT (MBIT), etc.
  repeated SubsystemCompletedBIT_Type completed_bit = 3;
  // Indicates a current fault in the Subsystem. When omitted, the Subsystem has
  // no current faults. Faults aren't necessarily related to or exclusively
  // detected by BIT. This element is independent of the sibling CompletedBIT so
  // that faults can be reported regardless of how they were detected or
  // triggered.
  repeated SubsystemFaultType fault = 4;
}


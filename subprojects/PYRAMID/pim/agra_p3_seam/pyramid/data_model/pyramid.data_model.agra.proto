}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.001.002.000
message VehicleConfigurationType {
  // Planned/predicted/expected/future state (position, velocity, orientation
  // and time) from which planning should and/or did occur. Position data may be
  // specified as either a geospatial point or relative to a separately defined
  // reference frame.
  InertialStateRelativeType inertial_state = 1;
  // Indicates the planned/predicted/expected/future endurance available at the
  // position indicated by the sibling element.
  optional EnduranceType endurance = 2;
  // Indicates the planned/predicted/expected/future gross weight at the
  // position indicated by the sibling element.
  // xsd type: MassType
  optional double gross_weight = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.001.000
message InertialStateRelativeType {
  // Physical location of the referenced item in geospatial coordinates. The use
  // of the timestamp in this context represents the time the positional data
  // was last measured. Position data may be specified as either a geospatial
  // point or relative to a separately defined reference frame.
  PointChoice4D_Type position = 1;
  // Uncertainty of the physical location of the referenced item.
  optional UncertaintyType position_uncertainty = 2;
  // Vehicle's velocity in the current operating domain of the system. Air
  // vehicle components are in True Air Speed.
  optional Velocity3D_Type domain_velocity = 3;
  // Representation of the vehicle's ground velocity as directional speed
  // components.
  optional Velocity2D_Type ground_velocity = 4;
  // Represents the vehicle's velocity, in units of m/s, in the separately
  // defined reference frame referenced in the sibling Position element. This
  // element should only be used when the RelativePoint choice is selected and
  // the seperately defined reference frame is itself moving.
  optional Velocity3D_Type relative_velocity = 5;
  // The vehicle's acceleration in the current operating domain of the system.
  optional Acceleration3D_Type domain_acceleration = 6;
  // Euler Angle Sequence describing the orientation of the vehicle in the order
  // yaw, pitch, roll. The angles are given in a locally level, North-East-Down
  // coordinate system centered on the vehicle.

// for details.
// uci_version: 002.000.002.000
message RouteActivityType {
  // composed xsd extension base PlannedActivityTriggerType
  PlannedActivityTriggerType base = 1;
  // Indicates the specific kinematic portion of the RoutePlan that the Activity
  // and sibling transition, trigger and time elements are associated with. If
  // omitted, the Activity must be temporally triggered.
  optional RouteActivityKinematicReferenceType route_reference = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message PlannedActivityTriggerType {
  // composed xsd extension base PlannedActivityBaseType
  PlannedActivityBaseType base = 1;
  // Indicates the trigger for the planned Activity. If omitted, "capture" of
  // the endpoint of the associated kinematic sequence/segment/path is the
  // trigger, if applicable. Capture of an endpoint means kinematic behaviors
  // are transitioning to the next planned sequence/segment/path. Due to dynamic
  // kinematic adjustments for weather, threat avoidance, etc. the System might
  // not pass through/over the endpoint and might in fact be far from it at the
  // moment of capture.
  optional ActivityTriggerType activity_trigger = 2;
  // TRUE indicates the Activity should occur at the endpoint of the associated
  // kinematic sequence/segment/path even if the Trigger doesn't occur before
  // the EndPoint is captured. FALSE indicates that the Activity should occur
  // only if the Trigger occurs prior to capture of the EndPoint; if the Trigger
  // does not occur before the EndPoint is captured then the Activity will never
  // occur.
  bool end_point_trigger = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message ActivityTriggerType {
  oneof choice {
    // The time or time window when the planned Activity transition should occur.
    DateTimeRangeType transition_time = 1;
    // The inbound distance to the endpoint of the associated kinematic
    // sequence/segment/path where the planned Activity transition should occur.
    // xsd type: DistanceType
    double distance_to_end_point = 2;
  }
}


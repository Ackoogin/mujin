  PO_CommandMDT message_data = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message PO_CommandMDT {
  // Indicates an instance of a PO Capability command. A Capability command
  // message can have multiple command instances to allow a sequence of related
  // commands in a single coherent message. Each command instance reports status
  // via a separate, independent Capability CommandStatus message.
  repeated PO_CommandType command = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message PO_CommandType {
  oneof choice {
    // Indicates a new invocation of a PO Capability. Generally, if accepted, the
    // command will result in one or more new PO Activities being created and
    // reported via the PO_Activity message. The request/response interaction
    // terminates as soon as the command is accepted or rejected; this element is
    // not used to interact with an "active" command. Updates and/or additional
    // interaction with the resulting Activity (after the command is accepted) is
    // accomplished via the sibling Activity element.
    PO_CapabilityCommandType capability = 1;
    // Indicates a command to modify an existing PO Activity (which was previously
    // reported via the PO_Activity message and was marked as "interactive"). The
    // request/response interaction terminates as soon as the modification is
    // accepted or rejected. The modifications are reflected in subsequent
    // PO_Activity messages.
    PO_ActivityCommandType activity = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.003.001
message PO_CapabilityCommandType {
  // composed xsd extension base CapabilityCommandBaseType
  CapabilityCommandBaseType base = 1;
  // Indicates the position or location to point the PO Subsystem to do a PO
  // collection, search, or track. If the PO Subsystem cannot point itself, then
  // the TurretSlaved Type is used. If the system wants to allow the subsystem
  // to control its own LOS then the ActivitySlavedID is used. FixedPointing is
  // used to point to a predetermined location defined by its Enum values.
  optional PO_TargetType pointing = 2;
  // Indicates the Capability's first tier type in the Passive Optical taxonomy.
  // For PO, the first tier is an indication of the collection technique PO
  // spectrum. See enumerated type annotations for further details. Changes to a
  // Subsystem subcapability settings which associate to a specific capability
  // will only apply to the activity associated with this commanded condition.
  // The default settings for the associated subcapability will remain unchanged.
  repeated PO_SubCapabilitySettingsType sub_capability = 3;
  // Indicates override settings for Optical components to use for this command
  // instead of the current/default settings. Changes to a Subsystem component
  // settings which associate to a specific capability will only apply to the
  // activity associated with this commanded condition. The default settings for
  // the associated component will remain unchanged.
  repeated PO_ComponentSettingsType component_settings = 4;
  // Indicates override collection constraints to use for this command instead
  // of the current/default settings. Values can range from min to max as an
  // input. To send a specific value, set min and max the same.
  optional PO_CollectionConstraintsSettingsType collection_constraints = 5;
  // Indicates the settings that can be applied for track. Changes to a
  // Subsystem track settings which associate to a specific capability will only
  // apply to the activity associated with this commanded condition. The default
  // settings for the associated track settings will remain unchanged.
  optional PO_TrackDetailsType track_details = 6;
  // Indicates guidance regarding which aspect or aspects of collection to favor
  // if the command cannot be optimally scheduled as requested. See enumerated
  // type annotations for further details. Omitting this element is equivalent
  // to FLEXIBLE, that is deferring to the Command recipient.
  optional CollectionPolicyEnum collection_policy = 7;
  // Indicates the Command's role in a pair collection. See enumeration
  // annotations for further details.
  optional PairIdentifierEnum pair_identifier = 8;
  // Indicates the required repetition of the command via capability path in the
  // command message. If omitted, the command should be performed once.
  optional RepetitionType repetition = 9;
  // Indicates a required output Product of the Command. Only Products
  // consistent with Passive Optical and supported by the commanded Passive
  // Optical Capability should be requested. If omitted, no output Product
  // should be produced. See ProductTypeEnum for further details. If the
  // associated Capability supports product generators, this element should be
  // omitted and product output should be controlled via the sibling
  // ComponentSettings element.
  repeated PO_ProductOutputCommandImageryType product_output = 10;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.001
message PO_ComponentSettingsType {
  // A passive optical sensor will contain one or more subsystem components,
  // e.g. focal planes and lens. Each subsystem component is identified by a
  // unique component ID. This ID is used in messages and capabilities to
  // identify a particular component. This field is the ID of the component
  // whose status is being reported.
  ComponentID_Type component_id = 1;
  // One type of Passive Optical Subsystem Component is the Focal Plane Array
  // (FPA). An FPA is an array (either linear or grid) of collection elements
  // that are used to collect photons emitted by some surface, e.g. the surface
  // of the earth. A Passive Optical sensor can have any number of FPAs. This
  // field contains the current status of a focal plane array.
  repeated PO_ComponentSettingsFocalPlaneArrayType focal_plane_array = 2;
  // One type of Passive Optical Subsystem Component is the optical lens
  // assembly. This assembly is used to concentrate the photons entering the
  // Passive Optical sensor's optical pathway onto the sensor's various Focal
  // Plane Arrays (FPAs).
  repeated PO_ComponentSettingsLensAssemblyType lens = 3;
  // Indicates a space through which light passes in an optical or photographic
  // instrument, especially the variable opening by which light enters a camera.
  repeated PO_ComponentApertureSettingsType aperture = 4;
  // One type of Passive Optical Subsystem Component is the optical filter. A
  // filter is placed within the Passive Optical sensor's optical pathway and
  // stops photons of a certain frequency (possibly of all frequencies) from
  // passing through the filter on their way to the sensor's various Focal Plane
  // Arrays (FPAs).
  repeated PO_ComponentSettingsFilterType filter = 5;
  // Passive Optical sensors generally support a processing engine that takes
  // the raw data collected from the Focal Plane Arrays (FPAs) and processes
  // that data in various way in order to produce an image product or products.
  // Such engines can be viewed as pipelines in which each stage in the pipeline
  // takes the imagery data produced by one or more stages earlier in the
  // pipeline, processes that data in some fashion, and then sends the updated
  // imagery data to the one of more stages further down the pipeline. This
  // field specifies the stages that are available in this sensor's processing
  // pipeline and whether the stage can be manually configured. This field is
  // used to set the configuration of this processing stage.
  repeated PO_ComponentSettingsProcessingStageType processing_stage = 6;
  // Passive Optical sensors have the capability of producing one or more
  // products using the raw optical data collected by their focal plane arrays.
  // This field is used to set the current configuration and setting used by
  // this product generator to produce products.
  repeated PO_ComponentSettingsProductGeneratorType product_generator = 7;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.000.001
message PO_ComponentSettingsFocalPlaneArrayType {
  // A passive optical sensor will contain one or more focal plane arrays
  // (linear or grid) that are used to collect the photons that will form the
  // basis of the collected image. Each focal plane array (FPA) has an
  // associated ID that is used in various messages to identify that FPA. This
  // field contains the ID of the focal plane whose status is being reported.
  PO_FPA_ID_Type focal_plane_array_id = 1;
  // Indicates the id of a given subset or window of an FPA.
  repeated PO_WindowID_Type window_selection_id = 2;
  // If the focal plane is disabled, then all channels are disabled as well.
  optional ComponentControlsA_Type fpa_controls = 3;
  // A focal plane array (FPA) is composed of one or more channels that measure
  // the number of photons of a particular range of frequencies that hit the
  // FPA. Depending on the type of FPA, the operational characteristics of its
  // channels may be configurable. This field contains the current state of the
  // channel.
  repeated PO_ComponentSettingsFocalPlaneArrayChannelType channel = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.000.000
message PO_ComponentSettingsFocalPlaneArrayChannelType {
  // Each channel within an FPA has a unique ID that is used to identify the
  // channel. This field is a particular channel's ID.
  PO_FPA_ChannelID_Type channel_id = 1;
  // Indicates commanded controls for the Channel. Enabling allows the Channel
  // to collect and measure photons. Disabling prohibits photon collection and
  // measurement. Enabling auto enable/disable grants enable/disable decisions
  // to the Subsystem.
  optional ComponentControlsA_Type channel_controls = 2;
  // The OpticalBand is used to specify the band of frequencies in the optical
  // domain that the channel is used to measure. The number of photons whose
  // frequencies fall within this band will be measured by this channel. This
  // field can be used to set this channels optical band.
  optional PO_ComponentSettingsFocalPlaneArrayOpticalBandType optical_band = 3;
  // Channels measure the number of arriving photons by collecting the photon's
  // energy in buckets. Depending on the channel, a pixel in the resulting image
  // may correspond to the number of photons collected in a single bucket or in
  // an aggregation of buckets. This field contains the current setting of the
  // channel's aggregation.
  optional PO_ComponentSettingsFocalPlaneArrayPixelAggregationType pixel_aggregation = 4;
  // The sensitivity of a channel to arriving photons can be enhanced using the
  // Time Delay Integration (TDI) technique. This technique basically involves
  // adding a "time" dimension to the FPA and then moving the collection buckets
  // along that time dimension as the collection is performed. This field
  // indicates the current setting of this channel's TDI capability.
  optional PO_ComponentSettingsFocalPlaneArrayTimeDelayIntegrationType time_delay_integration = 5;
  // The image pixel that is returned by the channel is primarily a measurement
  // of the number of photons that were collected. Some channels provide the
  // capability to enhance this measurement by specifying a "offset" that is
  // applied to the measurement and a "gain" that is used to increase the
  // channels sensitivity. for such channels, the resulting pixel value is
  // computed as "offset + (gain * measuredValue)".
  optional PO_ComponentSettingsFocalPlaneArrayPixelScalingType pixel_scaling = 6;
  // Focal Plane Arrays (FPA) that measure photons in the Infrared Frequencies
  // may have a polarity setting that allows one to specify whether a zero value
  // represents "hot" or "cold" For such focal planes, this field indicates
  // whether 0 represents hot (false) or cold (true).
  optional PO_ComponentSettingsFocalPlaneArrayPixelPolarityType pixel_polarity = 7;
  // The channel will collect photons for a fixed amount of time. Once this time
  // has expired, the channel will report the number of photons collected. For
  // line array FPAs, this time is the inverse of the "line rate", i.e. the rate
  // at which lines of data are collected. This field is the channel's current
  // collection time (in nanoseconds).
  optional PO_ComponentSettingsFocalPlaneArrayCollectionType collection_time = 8;
  // Each collection element within a FPA should theoretically have the same
  // sensitivity as all other collection elements within the FPA. However due to
  // limits in the manufacturing process, this is never the case. To correct
  // this defect in the manufacturing process, FPAs may contain logic to adjust
  // this "non-uniformity" such that resulting measurements appear as if they
  // were made from a totally uniform FPA. This field is the channel's current
  // NUC setting. The interpretation of this setting is dependent on the channel
  // type but is generally used to specify a table of correction values that are
  // to be used when performing NUC.
  optional PO_ComponentSettingsFocalPlaneArrayNonUniformityCorrectionType non_uniformity_correction = 9;
  // Data from an FPA is generally read out as a line of data. For some FPAs,
  // the way this line is generated can be adjusted. Basically this means which
  // collection element in the line array is the first element to be read out,
  // i.e. the left or right most element. The ability to set which element is
  // reported first is especially useful in generating images having the correct
  // orientation. Specifying the scan direction, scanning to the right of left
  // side of the aircraft, allows the FPA to select the proper direction to read
  // the data out of the FPA. This field is the channel's current scan
  // direction. This interpretation of this value is dependent on the channel's
  // type but is generally used to specify scanning on the right side of the
  // aircraft (0) or the left side of the aircraft (1).
  optional PO_ComponentSettingsFocalPlaneArrayScanDirectionType scan_direction = 10;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message PO_ComponentSettingsFocalPlaneArrayOpticalBandType {
  oneof choice {
    // The new settings for this channel's frequency band. If a single frequency
    // is desired, then set min and max to the same value.
    FrequencyRangeType band_setting = 1;
    // Enabling auto band control defers control of the channel's optical band to
    // the Subsystem.
    ComponentControlsB_Type band_controls = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message ComponentControlsB_Type {
  // Setting this field to true will enable automatic control of the Component
  // and/or associated item. Setting to false will disable automatic control.
  optional bool auto_ = 1;
  // Indicates a command to reset to factory/default configuration.
  // xsd type: EmptyType (pattern [A-Za-z]{0})
  optional string reset = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message PO_ComponentSettingsFocalPlaneArrayPixelAggregationType {
  oneof choice {
    // The new settings for this channel's aggregation. For most channels, 0 and 1
    // indicates a 1-by-1 aggregation, 2 indicates a 2-by-2 aggregation, etc.
    uint32 aggregation_setting = 1;
    // Enabling auto pixel aggregation defers control of the channel's pixel
    // aggregation to the Subsystem.
    ComponentControlsB_Type aggregation_controls = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message PO_ComponentSettingsFocalPlaneArrayTimeDelayIntegrationType {
  oneof choice {
    // The new setting for this channel's TDI. For most types of FPAs, this will
    // be used to indicate the number of stages in the time dimension.
    double tdi_setting = 1;
    // Enabling autoTDI defers control of the channel's TDI to the Subsystem.
    ComponentControlsB_Type tdi_controls = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message PO_ComponentSettingsFocalPlaneArrayPixelScalingType {
  oneof choice {
    // The new settings for this channel's pixel scaling.
    PO_ComponentSettingsFocalPlaneArrayPixelScalingSettingsType scaling_settings = 1;
    // Enabling auto scaling defers control of the channel's gain and offset
    // setting to the Subsystem.
    ComponentControlsB_Type scaling_controls = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message PO_ComponentSettingsFocalPlaneArrayPixelScalingSettingsType {
  // The gain value used in scaling the raw data.
  optional double gain = 1;
  // The offset value used in scaling the raw data.
  optional double offset = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message PO_ComponentSettingsFocalPlaneArrayPixelPolarityType {
  oneof choice {

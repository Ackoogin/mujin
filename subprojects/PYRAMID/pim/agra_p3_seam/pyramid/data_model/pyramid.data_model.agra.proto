  WEATHER_WARNING_ENUM_UNSPECIFIED = 0;
  WEATHER_WARNING_ENUM_THUNDERSTORM = 1;
  WEATHER_WARNING_ENUM_TURBULENCE = 2;
  WEATHER_WARNING_ENUM_ICING = 3;
  WEATHER_WARNING_ENUM_WIND = 4;
  WEATHER_WARNING_ENUM_FREEZING_RAIN = 5;
  WEATHER_WARNING_ENUM_HAIL = 6;
  WEATHER_WARNING_ENUM_WINDSHEAR = 7;
  WEATHER_WARNING_ENUM_LIGHTNING = 8;
  WEATHER_WARNING_ENUM_DUST = 9;
  WEATHER_WARNING_ENUM_SAND = 10;
  WEATHER_WARNING_ENUM_ASH = 11;
  WEATHER_WARNING_ENUM_CBRNE_CLOUD = 12;
  WEATHER_WARNING_ENUM_CLOUDS = 13;
  WEATHER_WARNING_ENUM_RAIN = 14;
  WEATHER_WARNING_ENUM_SNOW = 15;
  WEATHER_WARNING_ENUM_VISIBILITY = 16;
}

// Contains zone location and geometry information.

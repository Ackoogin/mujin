// The common elements used to measure the impulse needed to perform a
// maneuver.
// uci_version: 001.000.000.001
message OrbitalManeuverDetailsBaseType {
  // The measure of the impulse needed to perform a maneuver. It is used to
  // determine the mass of propellant required for a given maneuver.
  OrbitalDeltaVelocity_B_Type delta_velocity = 1;
  // The magnitude of the velocity impulse needed to cause the spacecraft to
  // transfer orbit. This value is equal to the RSS of the above DeltaVelocity
  // X/Y/Z components.

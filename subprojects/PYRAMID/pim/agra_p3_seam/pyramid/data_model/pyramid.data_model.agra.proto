message CS_ObscuraType {
  // Azimuth angle from a deployment location for a CounterSpace force or
  // capability.
  // xsd type: AnglePositiveType
  double azimuth = 1;
  // Minimum elevation in the azimuth direction for a CounterSpace force or
  // capability.
  // xsd type: AngleQuarterType
  double elevation = 2;
}

// This type represents sub-capabilities for a CounterSpace capability. These
// typically represent individual receive and transmit capabilities.
// uci_version: 001.000.002.001
message CS_CapabilitiesType {
  // Indicates a name for a functional sub-capability.
  ForeignKeyType sub_capability_name = 1;
  // Identifies the component configuration that enables the sub-capability.
  optional int32 dependency = 2;
  // Transmit frequency range of this sub-capability.
  optional FrequencyRangeType tx_frequency = 3;
  // Transmit bandwidth of this sub-capability.
  // xsd type: FrequencyType
  optional double tx_bandwidth = 4;
  // Indicates the sub-capability's maximum power.
  // xsd type: PowerType
  optional double power = 5;
  // Receive frequency range of this sub-capability.
  optional FrequencyRangeType rx_frequency = 6;
  // Receive bandwidth of this sub-capability.
  // xsd type: FrequencyType
  optional double rx_bandwidth = 7;
  // Azimuth slew rate for this sub-capability.
  // xsd type: AngleRateType
  optional double az_slew_rate = 8;
  // Elevation slew rate for this sub-capability.
  // xsd type: AngleRateType
  optional double el_slew_rate = 9;
  // Minimum pointing elevation for this sub-capability.
  // xsd type: AngleHalfType
  optional double min_elevation = 10;
  // Maximum pointing elevation for this sub-capability.
  // xsd type: AngleHalfType
  optional double max_elevation = 11;
  // The maximum number of objects this sub-capability can engage at one time.
  optional uint32 capacity = 12;
  // Latitude, longitude, elevation for the sub-capability.
  optional Point3D_Type location = 13;
  // The modulations supported by this sub-capability. List size for this
  // element is based on "Select All That Apply" condition.
  repeated ModulationEnum modulation = 14;
  // The polarizations supported by this sub-capability. List size for this
  // element is based on "Select All That Apply" condition.
  repeated PolarizationEnum polarization = 15;
  // Indicates obscura (sky visibility limitations) data for this sub-capability.
  optional CS_ObscuraDataType obscura_data = 16;
  // Sensor description.
  optional CS_SensorDataType sensor_data = 17;
}

// Indicates the polarization of electromagnetic waves.
enum PolarizationEnum {
  POLARIZATION_ENUM_UNSPECIFIED = 0;
  POLARIZATION_ENUM_NONE = 1;
  POLARIZATION_ENUM_CIRCULAR = 2;
  POLARIZATION_ENUM_HORIZONTAL = 3;
  POLARIZATION_ENUM_ROTATING = 4;
  POLARIZATION_ENUM_VERTICAL = 5;
  POLARIZATION_ENUM_SLANT = 6;
  POLARIZATION_ENUM_LINEAR = 7;
  POLARIZATION_ENUM_LEFT_CIRCULAR = 8;
  POLARIZATION_ENUM_RIGHT_CIRCULAR = 9;
  POLARIZATION_ENUM_ORTHOGONAL = 10;
  POLARIZATION_ENUM_PRINCIPAL = 11;
  POLARIZATION_ENUM_UNPOLARIZED = 12;
}

// This type describes a receive sensor sub-capability.
// uci_version: 001.000.000.000
message CS_SensorDataType {
  // Type of sensor.
  CS_SensorTypeEnum sensor_type = 1;
  // Type of sensor pointing.
  CS_SensorPointingEnum sensor_pointing = 2;
  // Defines the inner cone angle. Only valid if SensorType=Conical.
  // xsd type: AnglePositiveType
  optional double inner_cone_angle = 3;
  // Defines the outer cone angle. Only valid if SensorType=Conical.
  // xsd type: AnglePositiveType
  optional double outer_cone_angle = 4;
  // Defines the minimum clock angle. Only valid if SensorType=Conical.
  // xsd type: AnglePositiveType
  optional double min_clock_angle = 5;
  // Defines the maximum clock angle. Only valid if SensorType=Conical.
  // xsd type: AnglePositiveType
  optional double max_clock_angle = 6;
  // Name of item being tracked.
  optional CS_SensorTargetingEnum sensor_targeting = 7;
  // The fixed pointing location in azimuth if this is not a tracking sensor.
  // xsd type: AnglePositiveType
  optional double bore_sight_azimuth = 8;
  // The fixed pointing location in elevation if this is not a tracking sensor.
  // xsd type: AngleQuarterType
  optional double bore_sight_elevation = 9;
  // Minimum altitude range of the sensor. Only valid if SensorPointing=Relative.
  // xsd type: AltitudeType
  optional double min_altitude = 10;
  // Maximum altitude range of the sensor. Only valid if SensorPointing=Relative.
  // xsd type: AltitudeType
  optional double max_altitude = 11;
  // Antenna diameter. Only valid if SensorType=HalfPower.
  optional double antenna_diameter = 12;
  // Operating frequency of the antenna. Only valid if SensorType=HalfPower.
  // xsd type: FrequencyType
  optional double antenna_freq = 13;
  // Number of sensor footprint circles to show on the map.
  optional int32 num_steps = 14;
}

// Type of sensor.
enum CS_SensorTypeEnum {
  CS_SENSOR_TYPE_ENUM_UNSPECIFIED = 0;
  CS_SENSOR_TYPE_ENUM_CONICAL = 1;
  CS_SENSOR_TYPE_ENUM_HALF_POWER = 2;
  CS_SENSOR_TYPE_ENUM_CUSTOM = 3;
}

// Type of antenna pointing.
enum CS_SensorPointingEnum {
  CS_SENSOR_POINTING_ENUM_UNSPECIFIED = 0;
  CS_SENSOR_POINTING_ENUM_NO_POINTING = 1;
  CS_SENSOR_POINTING_ENUM_RELATIVE = 2;
  CS_SENSOR_POINTING_ENUM_TARGET_TRACK = 3;
  CS_SENSOR_POINTING_ENUM_TARGET_FIX = 4;
}

// Name of the item being tracked. Only valid if SensorPointing=TargetTrack or
// TargetFix.
enum CS_SensorTargetingEnum {
  CS_SENSOR_TARGETING_ENUM_UNSPECIFIED = 0;
  CS_SENSOR_TARGETING_ENUM_AUTO_TRACKING = 1;
  CS_SENSOR_TARGETING_ENUM_FIXED = 2;
}

// Categories for CounterSpace forces.
enum CS_KindEnum {
  CS_KIND_ENUM_UNSPECIFIED = 0;
  CS_KIND_ENUM_EA = 1;
  CS_KIND_ENUM_ES = 2;
  CS_KIND_ENUM_SA = 3;
  CS_KIND_ENUM_OTHER = 4;
}


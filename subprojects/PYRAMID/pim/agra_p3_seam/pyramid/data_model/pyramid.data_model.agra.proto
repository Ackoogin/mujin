// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.001.002.001
message PO_ComponentStatusType {
  // A passive optical sensor will contain one or more subsystem components,
  // e.g. focal planes and lens. Each subsystem component is identified by a
  // unique component ID. This ID is used in messages and capabilities to
  // identify a particular component. This field is the ID of the component
  // whose status is being reported.
  ComponentID_Type component_id = 1;
  // One type of Passive Optical Subsystem Component is the Focal Plane Array
  // (FPA). An FPA is an array (either linear or grid) of collection elements
  // that are used to collect photons emitted by some surface, e.g. the surface
  // of the earth. A Passive Optical sensor can have any number of FPAs. This
  // field contains the current status of a focal plane array.
  repeated PO_ComponentStatusFocalPlaneArrayType focal_plane = 2;
  // One type of Passive Optical Subsystem Component is the optical lens
  // assembly. This assembly is used to concentrate the photons entering the
  // Passive Optical sensor's optical pathway onto the sensor's various Focal
  // Plane Arrays (FPAs).
  repeated PO_ComponentStatusLensAssemblyType lens = 3;
  // Indicates a space through which light passes in an optical or photographic
  // instrument, especially the variable opening by which light enters a camera.
  repeated PO_ComponentStatusApertureSettingsType aperture = 4;
  // One type of Passive Optical Subsystem Component is the optical filter. A
  // filter is placed within the Passive Optical sensor's optical pathway and
  // stops photons of a certain frequency (possibly of all frequencies) from
  // passing through the filter on their way to the sensor's various Focal Plane
  // Arrays (FPAs).
  repeated PO_ComponentStatusFilterType filter = 5;
  // Passive Optical sensors generally support a processing engine that takes
  // the raw data collected from the Focal Plane Arrays (FPAs) and processes
  // that data in various way in order to produce an image product or products.
  // Such engines can be viewed as pipelines in which each stage in the pipeline
  // takes the imagery data produced by one or more stages earlier in the
  // pipeline, processes that data in some fashion, and then sends the updated
  // imagery data to the one of more stages further down the pipeline. This
  // field specifies the stages that are available in this sensor's processing
  // pipeline and whether the stage can be manually configured. This field
  // contains the current configuration of each stage.
  repeated PO_ComponentStatusProcessingStageType processing_stage = 6;
  // Passive Optical sensors have the capability of producing one or more
  // products using the raw optical data collected by their focal plane arrays.
  // This field lists the current configuration and setting used by this product
  // generator to produce products.
  repeated PO_ComponentStatusProductGeneratorType product_generator = 7;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.000.001
message PO_ComponentStatusFocalPlaneArrayType {
  // A passive optical sensor will contain one or more focal plane arrays
  // (linear or grid) that are used to collect the photons that will form the
  // basis of the collected image. Each focal plane array (FPA) has an
  // associated ID that is used in various messages to identify that FPA. This
  // field contains the ID of the focal plane whose status is being reported.
  PO_FPA_ID_Type focal_plane_array_id = 1;
  // Indicates the status of the FPA's controls. If the FPA is disabled, all
  // channels are disabled as well.
  ComponentControlsStatusType fpa_controls_status = 2;
  // A focal plane array (FPA) is composed of one or more channels that measure
  // the number of photons of a particular range of frequencies that hit the
  // FPA. Depending on the type of FPA, the operational characteristics of its
  // channels may be configurable. This field contains the current state of the
  // channel.
  repeated PO_ComponentStatusFocalPlaneArrayChannelType channel = 3;
  // A FPA can be a logical FPA that represents a "window" of a larger physical
  // FPA. This defines a sub-window in the FPA.
  repeated PO_ComponentWindowType window = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message PO_FPA_ID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message ComponentControlsStatusType {
  // This field indicates whether the Component or associated item is enabled
  // (true) or disabled (false).
  bool enable_disable = 1;
  // This field indicates whether the Component or associated item is being
  // enabled/disabled automatically (true) or not (false) by the Subsystem.
  optional bool auto_enable_disable = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.000.000
message PO_ComponentStatusFocalPlaneArrayChannelType {
  // Each channel within an FPA has a unique ID that is used to identify the
  // channel. This field is a particular channel's ID.
  PO_FPA_ChannelID_Type channel_id = 1;
  // Indicates the status of the channel's controls. An enabled channel can
  // collect and process photons.
  ComponentControlsStatusType channel_controls_status = 2;
  // The OpticalBand is used to specify the band of frequencies in the optical
  // domain that the channel is used to measure. The number of photons whose
  // frequencies fall within this band will be measured by this channel. This
  // field identifies the band this focal plane is currently measuring.
  PO_ComponentStatusFocalPlaneArrayOpticalBandType optical_band = 3;
  // Channels measure the number of arriving photons by collecting the photon's
  // energy in buckets. Depending on the channel, a pixel in the resulting image
  // may correspond to the number of photons collected in a single bucket or in
  // an aggregation of buckets. This field contains the current setting of the
  // channel's aggregation.
  optional PO_ComponentStatusFocalPlaneArrayPixelAggregationType pixel_aggregation = 4;
  // The sensitivity of a channel to arriving photons can be enhanced using the
  // Time Delay Integration (TDI) technique. This technique basically involves
  // adding a "time" dimension to the FPA and then moving the collection buckets
  // along that time dimension as the collection is performed. This field
  // indicates the current setting of this channel's TDI capability.
  optional PO_ComponentStatusFocalPlaneArrayTimeDelayIntegrationType time_delay_integration = 5;
  // The image pixel that is returned by the channel is primarily a measurement
  // of the number of photons that were collected. Some channels provide the
  // capability to enhance this measurement by specifying a "offset" that is
  // applied to the measurement and a "gain" that is used to increase the
  // channels sensitivity. for such channels, the resulting pixel value is
  // computed as "offset + (gain * measuredValue)".
  optional PO_ComponentStatusFocalPlaneArrayPixelScalingType pixel_scaling = 6;
  // Focal Plane Arrays (FPA) that measure photons in the Infrared Frequencies
  // may have a polarity setting that allows one to specify whether a zero value
  // represents "hot" or "cold" For such focal planes, this field indicates
  // whether 0 represents hot (false) or cold (true).
  optional PO_ComponentStatusFocalPlaneArrayPixelPolarityType pixel_polarity = 7;
  // The channel will collect photons for a fixed amount of time. Once this time
  // has expired, the channel will report the number of photons collected. For
  // line array FPAs, this time is the inverse of the "line rate", i.e. the rate
  // at which lines of data are collected. This field is the channel's current
  // collection time (in nanoseconds).
  optional PO_ComponentStatusFocalPlaneArrayCollectionTimeType collection_time = 8;
  // Each collection element within a FPA should theoretically have the same
  // sensitivity as all other collection elements within the FPA. However due to
  // limits in the manufacturing process, this is never the case. To correct
  // this defect in the manufacturing process, FPAs may contain logic to adjust
  // this "non-uniformity" such that resulting measurements appear as if they
  // were made from a totally uniform FPA. This field is the channel's current
  // NUC setting. The interpretation of this setting is dependent on the channel
  // type but is generally used to specify a table of correction values that are
  // to be used when performing NUC.
  optional PO_ComponentStatusFocalPlaneArrayNonUniformityCorrectionType non_uniformity_correction = 9;
  // Data from an FPA is generally read out as a line of data. For some FPAs,
  // the way this line is generated can be adjusted. Basically this means which
  // collection element in the line array is the first element to be read out,
  // i.e. the left or right most element. The ability to set which element is
  // reported first is especially useful in generating images having the correct
  // orientation. Specifying the scan direction, scanning to the right of left
  // side of the aircraft, allows the FPA to select the proper direction to read
  // the data out of the FPA. This field is the channel's current scan
  // direction. This interpretation of this value is dependent on the channel's
  // type but is generally used to specify scanning on the right side of the
  // aircraft (0) or the left side of the aircraft (1).
  optional PO_ComponentStatusFocalPlaneArrayScanDirectionType scan_direction = 10;
}


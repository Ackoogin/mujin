}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.001.002
message SignalSummaryType {
  // Indicates detected modulation in the Signal. See enumeration annotations
  // for further details. List size for this element is based on "Select All
  // That Apply" condition.
  repeated ModulationEnum modulation = 1;
  // Indicates that the signal is being modulated with a vendor's unique
  // modulation technique.
  // xsd type: VisibleString64Type (pattern [ -~]{0,64})
  optional string vendor_specific_modulation = 2;
  // Indicates the variation of the modulation of the Signal's frequency.
  // Optional when identification of the modulation is not attempted and/or the
  // Signal is not frequency modulated. See enumerated type annotations for
  // further details.
  optional FrequencyModulationVariationEnum frequency_modulation_variation = 3;
  // Indicates the average measured frequency of the Signal.
  // xsd type: FrequencyType
  optional double frequency_average = 4;
  // Indicates the lowest measured frequency of the received Signal.
  // xsd type: FrequencyType
  optional double frequency_min = 5;
  // Indicates the maximum measured frequency of the received Signal.
  // xsd type: FrequencyType
  optional double frequency_max = 6;
  // Indicates to the RF Payload whether the entire sibling frequency range
  // (FrequencyMin to FrequencyMax) should be covered with their
  // RF_ResourceAllocationRequest or a best effort to cover as much of the
  // frequency range as possible.
  optional CoverageEffortEnum frequency_range_control_options = 7;
  // Indicates the PRI type of the signal. See enumerated type annotations for

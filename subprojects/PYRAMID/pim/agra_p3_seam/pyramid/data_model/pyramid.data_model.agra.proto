}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message SAR_CommandType {
  oneof choice {
    // Indicates a new invocation of a SAR Capability. Generally, if accepted, the
    // command will result in one or more new SAR Activities being created and
    // reported via the SAR_Activity message. The request/response interaction
    // terminates as soon as the command is accepted or rejected; this element is
    // not used to interact with an "active" command. Updates and/or additional
    // interaction with the resulting Activity (after the command is accepted) is
    // accomplished via the sibling Activity element.
    SAR_CapabilityCommandType capability = 1;
    // Indicates a command to modify an existing SAR Activity (which was
    // previously reported via the SAR_Activity message and was marked as
    // "interactive"). The request/response interaction terminates as soon as the
    // modification is accepted or rejected. The modifications are reflected in
    // subsequent SAR_Activity messages.
    SAR_ActivityCommandType activity = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.002
message SAR_CapabilityCommandType {
  // composed xsd extension base SharedRF_ApertureCapabilityCommandBaseType
  SharedRF_ApertureCapabilityCommandBaseType base = 1;

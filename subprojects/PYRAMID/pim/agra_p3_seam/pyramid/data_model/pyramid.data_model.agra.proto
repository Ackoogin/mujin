// See the annotation in the associated message for an overall description of
// the message and this type.
// uci_version: 002.000.002.000
message RelationshipDesignationMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // Indicates the state of the internal software object that the data in the
  // message is based upon. The state of the software object is determined by
  // the publisher. The publisher could be the original/master publisher or an
  // intermediary re-publisher such as a persistence/data manager. This element
  // is not a commanded CRUD operation. It is not an indication of the state of
  // an instance of a message. It is not a mechanism for partial, incremental,
  // or fragmentary publication of a message. It is a signal from a publisher to
  // subscribers. For REMOVED state, in particular, some subscribers will mirror
  // the publisher and treat the message as if the object no longer exists, but
  // others, such as mission recorders, might not (in order to support retaining
  // historical records of activity, for example).
  optional ObjectStateEnum object_state = 2;
  // See annotations in child elements and messages/elements that use this type
  // for details.
  RelationshipDesignationMDT message_data = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.002.002.002
message RelationshipDesignationMDT {
  // composed xsd extension base DataRecordBaseType
  DataRecordBaseType base = 1;
  // Indicates a unique ID assigned to the relationship designation.
  RelationshipDesignationID_Type relationship_designation_id = 2;
  // Reference to the system that 1) initially created this relationship or 2)
  // currently updating the relationship.
  optional SystemMessageIdentifierType reporting_system = 3;
  // The origin object of the relationship. This is the object that is the
  // source of an engagement, the source of a threat, or the start of a pairing.
  GeoLocatedObjectType source = 4;
  // The destination object of the relationship. This is the object that is the
  // target of an engagement, the target of a threat, or the end of a pairing.
  // This element is required for all use cases except one; for a general threat
  // broadcast, this structure should not be used.
  optional GeoLocatedObjectType destination = 5;
  // The type of relationship between two objects. This relationship is
  // directional, a pairing from A to B does not imply a pairing from B to A.
  optional RelationshipType relationship = 6;
  // List of data link ID. Multiple data link IDs can be reported for the same
  // network type.
  repeated DataLinkIdentifierPET data_link_identifier = 7;
}

// The ID type for UCI IDs that correspond to DisplayRelationships.
// uci_version: 000.000.000.000
message RelationshipDesignationID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// Describes the relationship between two identified objects.
// uci_version: 002.000.002.000
message RelationshipType {
  oneof choice {
    // Reports an active engagement between a friendly entity and a hostile.
    ExternalCommandExecutionStateEnum engagement_status = 1;
    // Reports a pairing, coupling, or association between two objects.
    PairingRelationshipEnum pairing = 2;
    // Reports an active threat between a hostile entity and a friendly.
    RelationshipThreatType threat = 3;
    // Reports a suspected association between two emitters.
    RelationshipElectronicWarfareType electronic_warfare = 4;
    // Reports a control relationship between the Source and Destination. This is
    // separate from the control status reported in a ControlStatus message. The
    // distinction is required to communicate control of vehicles that aren't UCI
    // Systems. This would occur if the vehicle is controlled by voice or a data
    // link that is not being received.
    RelationshipControllingUnitType controlling_unit = 5;
  }
}


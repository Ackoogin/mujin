    // The item or items should be kept until the Time given by this element.
    // xsd type: DateTimeType (pattern .+Z)
    string time = 1;
    // The item or items should be kept for the number of days specified by this
    // element.
    uint32 number_of_days = 2;
    // The item or items should be kept until storage capacity is reached and
    // "old" items must be deleted because space is needed for more recent items.
    bool space_needed = 3;
    // The item or items should be kept until manually deleted.

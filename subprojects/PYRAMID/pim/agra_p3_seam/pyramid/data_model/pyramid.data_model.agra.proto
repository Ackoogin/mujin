  MA_CANNOT_COMPLY_ENUM_CAPABILITY_FAULT = 26;
  MA_CANNOT_COMPLY_ENUM_CAPABILITY_PRECEDENCE = 27;
  MA_CANNOT_COMPLY_ENUM_CAPABILITY_UNAVAILABLE = 28;
  MA_CANNOT_COMPLY_ENUM_INSUFFICIENT_RESOURCES = 29;

}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message CapabilityBaseType {
  // Indicates a Mission Data File (MDF) that is available for use. All MDFs
  // currently available for use should be listed. An MDF is a collection of
  // data, organized into files, that is used to tailor, configure or otherwise
  // affect the behavior of a Capability. MDFs can vary from mission to mission
  // or even by phases of a single mission. They are generally developed in
  // pre-mission planning and are unique for each Subsystem model. Their content
  // is not standardized by UCI, but the mechanism for advertising their
  // availability and activating them is. Their content is abstracted by the UCI
  // concept of Capability.
  repeated MDF_Type available_mdf = 1;
}

// Indicates a Mission Data File (MDF) and its status. A MDF is a collection
// of data, organized into files, that is used to tailor, configure or
// otherwise affect the behavior of a Capability. MDFs can vary from mission
// to mission or even by phases of a single mission. They are generally
// developed in pre-mission planning and are unique for each Subsystem model.
// Their content is not standardized by UCI, but the mechanism for advertising
// their availability and activating them is. Their content is abstracted by
// the UCI concept of Capability.
// uci_version: 000.000.000.000
message MDF_Type {
  // Indicates the unique ID associated with the MDF. The child DescriptiveLabel
  // should indicate a human readable description of the MDF that distinguishes
  // it from others associated with the same Capability.
  MDF_ID_Type mdf_id = 1;
  // Indicates the overall status/state of the MDF.
  optional MDF_StatusEnum mdf_status = 2;
  // Indicates a subcategory of files that make up the MDF. When an MDF is
  // "active", at most one file from each subcategory can be active. The
  // subcategory concept allows a variety of MDF structures across Capability
  // types and manufacturers. For an ESM Capability, example subcategories could
  // be "scan files" and "emitter ID files". For an EA Capability, an example is
  // "jam files". This element is optional to support Capabilities or Subsystems
  // whose MDF isn't decomposed into individually selectable categories and
  // files.
  repeated MDF_SubCategoryType sub_category = 3;
}

// Indicates the overall status/state of the MDF. See enumeration annotations
// for further details.
enum MDF_StatusEnum {
  MDF_STATUS_ENUM_UNSPECIFIED = 0;
  MDF_STATUS_ENUM_ACTIVE = 1;
  MDF_STATUS_ENUM_INACTIVE = 2;
  MDF_STATUS_ENUM_WRONG_TYPE = 3;
  MDF_STATUS_ENUM_CONTENT_PROBLEM = 4;
  MDF_STATUS_ENUM_FAILED_CRC = 5;
  MDF_STATUS_ENUM_FAILED_TRANSFER = 6;
  MDF_STATUS_ENUM_NOT_FOUND = 7;
  MDF_STATUS_ENUM_UNKNOWN = 8;
  MDF_STATUS_ENUM_NOT_LOADED = 9;
}

// Indicates a subcategory of files that make up a Mission Data File ( MDF).
// uci_version: 000.000.000.000
message MDF_SubCategoryType {
  // Indicates the unique ID associated with the MDF subcategory. The child
  // DescriptiveLabel should indicate a human readable description of the
  // subcategory that distinguishes it from others in the same MDF.
  MDF_SubCategoryID_Type sub_category_id = 1;
  // Indicates the overall state/status of the MDF SubCategory.
  optional MDF_StatusEnum sub_category_status = 2;
  // Indicates the structure to define the file ID and status of the file or
  // files associated with the specified MDF Subcategory file or fileset.
  repeated MDF_FileType file = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MDF_FileType {
  // Indicates the unique ID of a file associated with the MDF subcategory. For
  // a given subcategory, only one file can be active or commanded at a time.
  // The child DescriptiveLabel should indicate a human readable description of
  // the file that distinguishes it from others in the same subcategory.
  MDF_SubCategoryFileID_Type file_id = 1;
  // Indicates the state/status of the MDF File.
  MDF_StatusEnum file_status = 2;
}


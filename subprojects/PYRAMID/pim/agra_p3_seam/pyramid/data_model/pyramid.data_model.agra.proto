  // Indicates a modified, valid version of the evaluated plan. This element
  // should only be given when the evaluated plan was found to be invalid, the
  // evaluation command indicated modification was allowed, and the
  // modifications resulted in a valid plan.
  optional RoutePlanID_Type modified_plan_id = 9;
  // Indicates the ID of the AnalysisRoute used for the validation.
  optional AnalysisRouteID_Type analysis_route_id = 10;
}


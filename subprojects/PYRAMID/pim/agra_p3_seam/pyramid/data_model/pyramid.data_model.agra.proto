  // OpZone being defined.
  repeated MA_GeoLocatedObjectFilterType reference_objects_filter = 1;
  // The area of the resulting OpZone is the area of the referenced object,
  // expanded by this horizontal buffer along the plane orthogonal to the NED
  // frame's down direction

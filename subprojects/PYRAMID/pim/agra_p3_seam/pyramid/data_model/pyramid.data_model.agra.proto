// Message type for a CounterSpaceCapability.
// uci_version: 001.000.002.000
message CounterSpaceCapabilityMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // Indicates the state of the internal software object that the data in the
  // message is based upon. The state of the software object is determined by
  // the publisher. The publisher could be the original/master publisher or an
  // intermediary re-publisher such as a persistence/data manager. This element
  // is not a commanded CRUD operation. It is not an indication of the state of
  // an instance of a message. It is not a mechanism for partial, incremental,
  // or fragmentary publication of a message. It is a signal from a publisher to
  // subscribers. For REMOVED state, in particular, some subscribers will mirror
  // the publisher and treat the message as if the object no longer exists, but
  // others, such as mission recorders, might not (in order to support retaining
  // historical records of activity, for example).
  optional ObjectStateEnum object_state = 2;
  // See annotations in child elements and messages/elements that use this type
  // for details.
  CounterSpaceCapabilityMDT message_data = 3;
}

// Capability data type for a CounterSpace asset.
// uci_version: 001.000.002.000
message CounterSpaceCapabilityMDT {
  // composed xsd extension base CapabilityBaseType
  CapabilityBaseType base = 1;
  // CounterSpace capability definition to include force characteristics.
  repeated CS_CapabilityType capability = 2;
}

// This type describes a CounterSpace capability (Force).
// uci_version: 001.001.002.001
message CS_CapabilityType {
  // composed xsd extension base CommandableCapabilityDeclarationType
  CommandableCapabilityDeclarationType base = 1;
  // How the capability is initiated.
  CapabilityInitiationEnum capability_type = 2;
  // A Force is a unit with a CounterSpace antenna.
  optional CS_ForceType force = 3;
  // Indicates a SubCapability of the CounterSpace Capability. List size for
  // this element is based on "Select All That Apply" condition.
  repeated CS_KindEnum sub_capability_type = 4;
}

// This type represent a CounterSpace capability (Force).
// uci_version: 001.000.002.000
message CS_ForceType {
  // Indicates a name for the CounterSpace force. This name is a reference to an
  // external non-UCI force's name.
  optional ForeignKeyType force_name = 1;
  // Name for a force deployment location. This name is a reference to an
  // external non-UCI location's name.
  // xsd type: VisibleString32Type (pattern [ -~]{0,32})
  optional string location_name = 2;
  // Indicates external (non-UCI) reference names for available CounterSpace
  // capability's effects/tactics.
  repeated ForeignKeyType tactics = 3;
  // Is record locked and non-editable.
  optional bool locked = 4;
  // Times related to attaining a posture level or maintaining a posture level.
  repeated CS_PostureType posture = 5;
  // Is this force transportable?.
  optional bool portable = 6;
  // The maximum range this force can be moved should it need to be redeployed.
  // xsd type: DistanceType
  optional double portable_radius = 7;
  // Whether the obscura defined for this force should also be used for all the
  // force's sub-capabilities.
  optional bool use_force_obscura = 8;
  // Links to threats, descriptions, performance, comment files.
  optional CS_FreeFormatType free_format = 9;
  // Indicates obscura (sky visibility limitations) for the force.
  optional CS_ObscuraDataType obscura_data = 10;
  // CounterSpace sub-capabilities. These sub-capabilities are individual
  // receive or transmit signal capabilities.
  repeated CS_CapabilitiesType force_capability = 11;
}

// This type describes the attainment, transition, or maintenance of a
// CounterSpace readiness posture.
// uci_version: 000.000.000.000
message CS_PostureType {
  // Transition to or maintain a level of posture.
  CS_PostureEnum posture = 1;
  // Duration the particular posture level can be reached or maintained.
  // xsd type: DurationType
  string time = 2;
}

// CounterSpace system postures.
enum CS_PostureEnum {
  CS_POSTURE_ENUM_UNSPECIFIED = 0;
  CS_POSTURE_ENUM_POSTURE_CONVERT_TIME_3_TO_2 = 1;
  CS_POSTURE_ENUM_POSTURE_CONVERT_TIME_3_TO_1 = 2;
  CS_POSTURE_ENUM_POSTURE_CONVERT_TIME_2_TO_1 = 3;
  CS_POSTURE_ENUM_POSTURE_MAINTAIN_TIME_1 = 4;
  CS_POSTURE_ENUM_POSTURE_MAINTAIN_TIME_2 = 5;
}

// This type represents background reference information for a CounterSpace
// capability.
// uci_version: 000.000.000.000
message CS_FreeFormatType {
  // Potential threats that could affect this force.
  optional FileLocationID_Type threats_id = 1;
  // Description of this force.
  optional FileLocationID_Type description_id = 2;
  // Performance characteristics of this force.
  optional FileLocationID_Type performance_id = 3;
  // Misc comments concerning this force.
  optional FileLocationID_Type comments_id = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message FileLocationID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// This type represents that site obscura data is a set of 360 value pairs.
// uci_version: 001.000.000.000
message CS_ObscuraDataType {
  // Set of data describing any obstruction to the view of the sky from a
  // deployed location.
  repeated CS_ObscuraType obscura = 1;
}

// Obscura data describing any sky view limitations for a CounterSpace force
// or capability.

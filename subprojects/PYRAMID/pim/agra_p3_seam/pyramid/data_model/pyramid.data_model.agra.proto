message PlannedCommActionExtendedType {
  // composed xsd extension base PlannedCommActionType
  PlannedCommActionType base = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message PlannedCommActionType {
  // Represents the ID for a specific configuration for a communication or
  // gateway configuration.
  CommConfigurationID_Type configuration_id = 1;
  // Indicates whether an instance of a Configuration is new or an update to an
  // existing configuration.
  CommConfigurationStateEnum configuration_state = 2;
  // Perform a command on the subsystem as a whole.
  optional PlannedSubsystemCommandType planned_subsystem_command = 3;
  // Indicates a command to deactivate the current Mission Data File and
  // activate the MDF given by this element. If the referenced MDF is already
  // active, then this element indicates a command to activate a new file within
  // one or more subcategories of the current MDF. An MDF is the primary source
  // of configurations.
  optional PlannedCommCapabilityType planned_comm_capability = 4;
}

// Represents the ID of a configuration for a communication C2 adapter or
// Gateway.
// uci_version: 000.000.000.000
message CommConfigurationID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// Indicates whether a comm configuration is new or an update to an existing
// comm configuration.
enum CommConfigurationStateEnum {
  COMM_CONFIGURATION_STATE_ENUM_UNSPECIFIED = 0;
  COMM_CONFIGURATION_STATE_ENUM_NEW = 1;
  COMM_CONFIGURATION_STATE_ENUM_UPDATE = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message PlannedSubsystemCommandType {
  // The Subsystem ID to which this command applies.
  SubsystemID_Type subsystem_id = 1;
  // Indicates a command to deactivate the current Mission Data File and
  // activate the MDF given by this element. If the referenced MDF is already
  // active, then this element indicates a command to activate a new file within
  // one or more subcategories of the current MDF. An MDF is the primary source
  // of configurations.
  optional MDF_CommandType activate_mdf = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message PlannedCommCapabilityType {
  // Indicates whether this is a new link to be created, or an existing one that
  // needs to be modified or deleted.
  NetworkLinkActionTypeEnum action = 1;
  // Indicates a Capability instance which the communication effectivity has
  // been allocated to.
  repeated CapabilityID_Type capability_id = 2;
  // The Subsystem ID. If specified this indicates that the capability may be
  // present on multiple subsystems and these settings must be applied to a
  // specific communication subsystem.
  optional SubsystemID_Type subsystem_id = 3;
  // Indicates the command's rank relative to other commands and rank-related
  // overrides and tailoring.
  optional CapabilityCommandRankingType ranking = 4;
  // This element provides the classification label that the Subsystem should
  // place on messages and other data resulting from the Command.
  optional SecurityInformationType classification = 5;
  // Indicates the desired state of the primary network connection for the link
  // being commanded.
  optional CommConnectionCommandEnum connection_request = 6;
  // The Profile to which this link should be associated to.
  optional CommProfileID_Type activate_profile_id = 7;
  // Indicates a unique identifier for the configuration of an individual
  // network connection. Provides for the correlation of network link to a new
  // activity or to an existing activity that will be updated.
  optional NetworkLinkID_Type network_link_id = 8;
  // Allows the Communication Planner to deviate from the MDF. These
  // configurations will be applied on top of the MDF therefore deviating from
  // it.
  optional CommControlType common_settings = 9;
  // Allows the Communication Planner to apply the key at a specified slot. Such
  // as selecting the appropriate VINSON Key.
  repeated CryptoLocationType crypto_key = 10;
  // Allows the Communication Planner to Zeroize crypto slots.
  repeated CryptoLocationType crypto_zeroize = 11;
  // Allows the Communication Planner to perform a crypto rollover to slots.
  optional CryptoRolloverCommandType crypto_rollover = 12;
  // Identifies the ports to assign to the connection to form the link.
  optional CommLinkPortMapType link_port_assignments = 13;
  // Provides means to control the generation of verbose Activity messages that
  // provide full field reporting.
  optional VerboseStatusType verbose_status = 14;
  // Allows the Communication Planner to deviate from the MDF in a waveform
  // specific manner applying configurations which are not common.
  optional CommWaveformCapabilityCommandPET waveform_specific_settings = 15;
  // Indicates a command to change the connection status of the individual data
  // links managed by the waveform. Generally, a link's connection status must
  // be CONNECTED for the waveform to transmit payload data over the
  // communication medium or for the waveform to receive transmissions from the
  // communication medium. Note that this parameter is not available until after
  // a CommActivity is created and may not be available until the waveform has
  // joined the network.
  repeated LinkConnectionRequestType link_connection_request = 16;
}

// Indicates whether this is a new link to be created, or an existing one that
// needs to be modified or deleted.
enum NetworkLinkActionTypeEnum {
  NETWORK_LINK_ACTION_TYPE_ENUM_UNSPECIFIED = 0;
  NETWORK_LINK_ACTION_TYPE_ENUM_CREATE_LINK = 1;
  NETWORK_LINK_ACTION_TYPE_ENUM_UPDATE_LINK = 2;
  NETWORK_LINK_ACTION_TYPE_ENUM_DESTROY_LINK = 3;
}

// This type represents the crypto location to perform a command on.
// uci_version: 000.000.000.000
message CryptoLocationType {
  // Indicates the crypto slot group to perform an action on.
  CryptoSlotGroupID_Type crypto_slot_group_id = 1;
  // Indicates the crypto slot or slots to perform an action on. If not present,
  // then the action will be applied to the whole group.
  // xsd type: CryptoSlotIdentifierType
  repeated string crypto_slot_identifier = 2;
}

// The ID type for UCI IDs that correspond to crypto slot groups.
// uci_version: 000.000.000.000
message CryptoSlotGroupID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// This type represents a crypto rollover command.
// uci_version: 000.000.000.000
message CryptoRolloverCommandType {
  // Indicates the crypto element or elements addressed by this rollover command.
  CryptoLocationType crypto_rollover_target = 1;
  // Indicates the rollover action to take. Action identifies either an
  // immediate rollover, a scheduled rollover, or to cancel a pending rollover.
  CryptoRolloverActionEnum crypto_rollover_action = 2;
  // Identifies the time at which to rollover. Only valid for Rollover action of
  // SCHEDULE.
  // xsd type: DateTimeType (pattern .+Z)
  optional string rollover_schedule_time = 3;
  // Optional element indicating whether to zeroize (True) the previous crypto
  // slot group.
  optional bool zeroize_previous_slot = 4;
}

// Options for a rollover action; immediate rollover, scheduled rollover, or
// cancel a pending rollover.
enum CryptoRolloverActionEnum {
  CRYPTO_ROLLOVER_ACTION_ENUM_UNSPECIFIED = 0;
  CRYPTO_ROLLOVER_ACTION_ENUM_IMMEDIATE = 1;
  CRYPTO_ROLLOVER_ACTION_ENUM_SCHEDULE = 2;
  CRYPTO_ROLLOVER_ACTION_ENUM_CANCEL = 3;
}

// See annotations in child elements and messages/elements that use this type

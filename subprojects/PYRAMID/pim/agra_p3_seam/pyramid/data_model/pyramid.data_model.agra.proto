}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message COMINT_CommandMDT {
  // Indicates an instance of a Capability command. A Capability command message
  // can have multiple command instances to allow a sequence of related commands
  // in a single coherent message. Each command instance reports status via a
  // separate, independent Capability CommandStatus message.
  repeated COMINT_CommandType command = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message COMINT_CommandType {
  oneof choice {
    // Indicates a new invocation of a COMINT Capability. Generally, if accepted,
    // the command will result in one or more new Activities being created and
    // reported via the COMINT_Activity message. The request/response interaction
    // terminates as soon as the command is accepted or rejected; this element is
    // not used to interact with an "active" command. Updates and/or additional
    // interaction with the resulting Activity (after the command is accepted) is
    // accomplished via the sibling Activity element.
    COMINT_CapabilityCommandType capability = 1;
    // Indicates a command to modify an existing Activity (which was previously
    // reported via the Activity message and was marked as "interactive"). The
    // request/response interaction terminates as soon as the modification is
    // accepted or rejected. The modifications are reflected in subsequent
    // Activity messages.
    COMINT_ActivityCommandType activity = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.001
message COMINT_CapabilityCommandType {
  // composed xsd extension base SharedRF_ApertureCapabilityCommandBaseType
  SharedRF_ApertureCapabilityCommandBaseType base = 1;
  // Indicates a specific SubCapability being invoked by the command. If
  // omitted, all SubCapabilities of the sibling CapabilityID are to be invoked.
  // If specified, only the specified SubCapabilities specified are required in
  // order to satisfy the command. Only SubCapabilities of the Capability
  // indicated by the sibling CapabilityID should be specified. List size for
  // this element is based on "Select All That Apply" condition.
  repeated COMINT_SubCapabilityEnum sub_capability = 2;
  // Indicates Command details for a Subcapability of the Capability indicated
  // by the sibling CapabilityID. One instance of this element for each
  // Subcapability category (acquisition, ID, geolocation, measurement or pulse
  // data collection) of that Capability is required. If multiple instances are
  // given, each must be of a different category in the descendant choice
  // statement.
  repeated COMINT_SubcapabilityChoiceType subcapability_details = 3;
  // Indicates a required output Product of the Command. Only Products
  // consistent with the Subsystem and supported by the commanded Capability
  // should be requested. If omitted, no output Product should be produced. See
  // ProductTypeEnum for further details.
  repeated ProductOutputCommandBasicType product_output = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message COMINT_SubcapabilityChoiceType {
  oneof choice {
    // Indicates details for a Command or Task that invokes an acquisition related
    // Subcapability of the associated Capability. This element is required when
    // an acquisition related Subcapability is being invoked.
    COMINT_SubcapabilityAcquisitionType acquisition = 1;
    // Indicates details for a Command or Task that invokes an identification
    // related Subcapability of the associated Capability. This element is
    // required when an identification related Subcapability is being invoked.
    COMINT_SubcapabilityIdentificationType identification = 2;
    // Indicates details for a Command or Task that invokes a geolocation related
    // Subcapability of the associated Capability. This element is required when a
    // geolocation related Subcapability is being invoked.
    COMINT_SubcapabilityGeolocationType geolocation = 3;
    // Indicates details for a Command or Task that invokes a measurement related
    // Subcapability of the associated Capability. This element is required when a
    // measurement related Subcapability is being invoked.
    COMINT_SubcapabilityMeasurementType measurement = 4;
    // Indicates details for a Command or Task that invokes a pulse data
    // collection related Subcapability of the associated Capability. This element
    // is required when a pulse data collection related Subcapability is being
    // invoked.
    COMINT_SubcapabilityDataCollectType data_collect = 5;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message COMINT_SubcapabilityAcquisitionType {
  // Indicates the source of or explicit values for emitter characteristics of
  // the target of the Acquisition command. If omitted, the command defers to
  // the active MDF.
  optional COMINT_AcquisitionTargetType target_emitter_data = 1;
  // Indicates the source of or explicit values for geospatial characteristics

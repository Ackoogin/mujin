  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.003.001
message ObservationMeasurementSourceType {
  // Indicates the details such as kinematics of the source of the elements. In
  // some cases, the source may be composed of multiple, kinematically dispersed
  // elements, such as a bi-static or multi-static radar.
  repeated ElementDetailsType element_details = 1;
  // Indicates cross-referencing IDs representing the source of the measurements.
  optional MeasurementSourceIdentityType source_identity = 2;
  // Indication of the category of sensor that generated the MeasurementReport.
  optional MeasurementReportSourceTypeEnum source_type = 3;
  // Source coverage characteristics. If corresponding source coverage values
  // are fixed for all measurements use these fields, otherwise use the same
  // element within each measurement.
  optional SourceCoverageType source_coverage = 4;
  // Source angular extent characteristics. If corresponding source angular
  // extent values are fixed for all measurements use these fields, otherwise
  // use the same element within each measurement.
  optional FOV_ExtentType source_angular_extent = 5;
  // Source resolution characteristics. If corresponding source resolution
  // values are fixed for all measurements use these fields, otherwise use the
  // same element within each measurement.
  optional SourceResolutionType source_resolution = 6;
  // Source specified characteristics. See elements for specific details.
  optional SourceCharacteristicsType source_specified_characteristics = 7;
  // The number of local tracks reported by the parent MeasurementSource in the
  // corresponding ObservationMeasurement.
  optional int32 number_of_local_tracks_reported = 8;
  // The number of independent measurements reported by the parent
  // MeasurementSource in the corresponding ObservationMeasurement.
  optional int32 number_of_independent_measurements = 9;
  // This element represents the unique identifier(s) of the ProductMetadata
  // message(s) associated with the parent MeasurementSource.
  repeated ProductMetadataID_Type product_metadata_id = 10;
  // Indicates a custom source parameter that is not covered by other elements.
  // These supplemental characteristics are source sensor specific and may not
  // be relevant to all producers. Reference the data providers interface
  // control document or service specification to determine if this data will be
  // provided.
  repeated NameValuePairType custom_characteristics = 11;
}

// See annotations in child elements and messages/elements that use this type

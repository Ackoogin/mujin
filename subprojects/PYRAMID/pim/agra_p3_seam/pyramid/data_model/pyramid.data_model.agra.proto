// The base type for all [Capability]SettingsCommand messages.
// uci_version: 001.000.001.000
message CapabilitySettingsCommandBaseType {
  // composed xsd extension base CommandBaseType
  CommandBaseType base = 1;
  // Indicates the unique ID of the Subsystem corresponding to this message.
  SubsystemID_Type subsystem_id = 2;
  // Indicates a command to deactivate the current Mission Data File and
  // activate the MDF given by this element. If the referenced MDF is already
  // active, then this element indicates a command to activate a new file within
  // one or more subcategories of the current MDF. The use of a list here is for
  // Capabilities, such as ESM, that require the activation of different
  // subcategories of dissimilar data sets and determining and creating all of
  // the possible combinations becomes unwieldy. This could be due to an MDF of
  // scan tables where each scan table is applicable to a particular region and
  // changing more often, where other MDFs such as an EOB cover a much larger
  // operating area and change much less frequently. For the case of
  // Capabilities requiring multiple active MDFs, deactivation of MDFs must be
  // controlled by the platform provider since activation of a new MDF
  // deactivates the other, i.e. overwrites with a new MDF.
  repeated MDF_CommandType activate_mdf = 3;
  // Indicates a command to set relative precedence of the Capabilities.
  repeated CapabilityPrecedenceType capability_precedence = 4;
  // Indicates a command to change the state of the Capability.
  repeated CapabilityStateType capability_state = 5;
  // The ID of the represented entity needed to express release authorization
  // for applicable capabilities. This applies to operator launches and mission
  // planned launches.
  optional ForeignKeyType representation_key = 6;
}


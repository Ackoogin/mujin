  CONTROL_INTERFACE_ENUM_PLAN_ACTIVATION = 2;
  CONTROL_INTERFACE_ENUM_APPROVAL_MANAGEMENT = 3;
  CONTROL_INTERFACE_ENUM_REQUIREMENT_CANCEL = 4;
}

// Indicates the state of in interface of a System. "Interface" in this

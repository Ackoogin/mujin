// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.002.001
message EffectPlanConstraintType {
  // Indicates the unique ID of the EffectPlan being referenced. When omitted,
  // the current/active EffectPlan for the System is implied.
  optional EffectPlanID_Type effect_plan_id = 1;
  // Indicates which kinds/categories of Effects in the EffectPlan indicated by
  // the sibling EffectPlanID are considered changeable. The exact definition of
  // "changeable" is left to particular Services and/or Systems to develop
  // according to their requirements. A lenient interpretation would equate
  // "changeable" with "removal allowed" thereby giving a System and/or planning
  // Service freedom to remove any changeable Effects from the constraining plan
  // in order to optimize a new *Plan for new and/or unchangeable Effects. Those
  // removed Effects would then be dealt with in subsequent planning
  // steps/iterations. With this definition, an "unchangeable" Effect item is
  // "System/vehicle constrained" and therefore the new *Plan being developed
  // should avoid changes that would cause the item to be removed. A stricter
  // interpretation might additionally require that any temporal constraints of
  // an unchangeable Effect from the constraining EffectPlan be unchanged as a
  // result of the new *Plan being developed. In a System of Systems with
  // inter-*Plan temporal dependencies, this stricter interpretation could
  // reduce automated replanning chain reactions.
  PlanChangeableConstraintsEnum changeable_allocations = 2;
  // Indicates a type of Effect in the EffectPlan referenced by the sibling
  // EffectPlanID element that constrains the new *Plan. If any are given, only
  // Effects of the specified type or types are constraints. If omitted, all
  // Effect types are constraints. List size for this element is based on
  // "Select All That Apply" condition.
  repeated EffectTypeEnum effect_type = 3;
}


enum CommAllocationTransitionEnum {
  COMM_ALLOCATION_TRANSITION_ENUM_UNSPECIFIED = 0;
  COMM_ALLOCATION_TRANSITION_ENUM_ACTIVATE = 1;
  COMM_ALLOCATION_TRANSITION_ENUM_DEACTIVATE = 2;
}

// Indicates a set of restricted weapons that cannot be used against specified
// target types. If no target types are specified, then the restrictions apply

  // existing configuration.
  CommConfigurationStateEnum configuration_state = 2;
  // Defines the necessary IDs which facilitate gatewaying the data.
  repeated GatewayLinkDestinationType gateway_link_destination = 3;
  // If specified, indicates the message topics, filters, and gateways.
  repeated MessageConfigurationType message_configuration = 4;
  // The remote System ID for which product data shall be ingressed.
  repeated SystemID_Type product_dissemination_ingress_system_id = 5;
  // The Product Dissemination Destinations which data should be sent to. This
  // is the method to specify Product Egress within the standard Product
  // Dissemination Workflow.
  repeated ProductDisseminationDestinationID_Type product_dissemination_egress_destination_id = 6;
  // Indicates Data Gateway Command information specific to a type of Data
  // Gateway.
  optional GatewayConfigurationPET gateway_specific_settings = 7;
}

// Forms the unique pair up to assist in the mapping of Links, Communications

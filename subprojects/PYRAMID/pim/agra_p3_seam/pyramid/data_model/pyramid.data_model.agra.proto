// This type is for the Header used by all messages in the UCI interface.
// uci_version: 001.000.001.000
message HeaderType {
  // This element represents the SystemID of the System that sent this message.
  SystemID_Type system_id = 1;
  // This element represents the time and date at which the message was created
  // and ready to be sent.
  // xsd type: DateTimeType (pattern .+Z)
  string timestamp = 2;
  // Indicates the schema version used to generate the message. UCI v2.0 would
  // be indicated as "002.0", UCI v1.9b would be indicated as "001.9b".
  // xsd type: UCI_SchemaVersionStringType (pattern [0-9]{3}\.[0-9]{1,2}([a-z]{1})?(\.[0-9A-Za-z_\-]{1,45})?)
  string schema_version = 3;
  // This enumerated element indicates the "message mode" of the message. See
  // enumeration values for details.
  MessageModeEnum mode = 4;
  // This element represents the ServiceID of the Service that sent this message.
  optional ServiceID_Type service_id = 5;
  // Defines the Mission that this message was generated for and applies to.
  // Required if the message is Mission unique. See the MissionDefinition
  // message which defines a Mission.
  optional MissionID_Type mission_id = 6;
}

// The ID type that refers to an aggregation of Subsystems.
// uci_version: 000.000.000.000
message SystemID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// The common base type for all UCI IDs. All extension types should end in
// "ID_Type".
// uci_version: 000.000.000.000
message ID_Type {
  // Universally Unique Identifier (UUID). A UUID is a 128-bit number (32
  // hexadecimal digits, 16 bytes) that is conformant to a version and variant
  // of IETF RFC 4122.
  // xsd type: UniversallyUniqueIdentifierType
  bytes uuid = 1;
  // Human readable text label with content meaningful to human operators.
  // xsd type: VisibleString256Type (pattern [ -~]{0,256})
  optional string descriptive_label = 2;
}

// Specifies the mode the system is currently operating in.
enum MessageModeEnum {
  MESSAGE_MODE_ENUM_UNSPECIFIED = 0;
  MESSAGE_MODE_ENUM_LIVE = 1;
  MESSAGE_MODE_ENUM_EXERCISE = 2;
  MESSAGE_MODE_ENUM_SIMULATION = 3;
  MESSAGE_MODE_ENUM_NONEXERCISE_SIMULATION = 4;
}

// The ID type for UCI IDs that correspond to services that communicate using
// the UCI protocol. Services have a digital network location which is
// represented by this ID.
// uci_version: 000.000.000.000
message ServiceID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
  // This field should contain the version number (i.e. 1.2.2) of this service.
  // The Descriptive Label contains the human readable service name.
  // xsd type: VisibleString256Type (pattern [ -~]{0,256})
  optional string service_version = 2;
}

// The ID type for UCI IDs that correspond to Missions.
// uci_version: 001.001.000.000
message MissionID_Type {
  // composed xsd extension base VersionedID_Type
  VersionedID_Type base = 1;
}

// The ID type for UCI IDs that use versioning.
// uci_version: 000.001.000.000
message VersionedID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
  // Indicates an incremental version of an item in which only minor changes
  // have been made. An example of a change that would require a new UUID and
  // not just a new version would be for changes that affect task allocations or
  // changes that require re-approval.
  optional uint32 version = 2;
}

// Indicates the state of the internal software object that the data in the
// message is based upon. The state of the software object is determined by
// the publisher. The publisher could be the original/master publisher or an
// intermediary re-publisher such as a persistence/data manager. This element
// is not a commanded CRUD operation. It is not an indication of the state of
// an instance of a message. It is not a mechanism for partial, incremental,
// or fragmentary publication of a message. It is a signal from a publisher to
// subscribers. For REMOVED state, in particular, some subscribers will mirror
// the publisher and treat the message as if the object no longer exists, but
// others, such as mission recorders, might not (in order to support retaining
// historical records of activity, for example).
enum ObjectStateEnum {
  OBJECT_STATE_ENUM_UNSPECIFIED = 0;
  OBJECT_STATE_ENUM_NEW = 1;
  OBJECT_STATE_ENUM_UPDATED = 2;
  OBJECT_STATE_ENUM_REMOVED = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message AMTI_ActivityMDT {
  // Indicates the Subsystem which hosts the AMTI Capabilities whose Activities
  // are given in this message.
  SubsystemID_Type subsystem_id = 1;
  // Indicates the dynamic operational characteristics of an Activity of an AMTI
  // Capability.
  repeated AMTI_ActivityType activity = 2;
}

// The ID type that refers to an aggregation of Capabilities.
// uci_version: 000.000.000.000
message SubsystemID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.003.002
message AMTI_ActivityType {
  // composed xsd extension base SharedRF_ApertureActivityBaseType
  SharedRF_ApertureActivityBaseType base = 1;
  // Indicates a specific SubCapability associated with the Activity. If
  // omitted, all SubCapabilities of the associated Capability are applicable
  // for the Activity. This element is required whenever a subset of
  // SubCapabilities of a Capability are used by the Activity. List size for
  // this element is based on "Select All That Apply" condition.
  repeated AMTI_SubCapabilityEnum sub_capability = 2;
  // Indicates the volume or specific Entity that defines the extents of the
  // spatial region covered by the command. For VOLUME AMTI Capabilities, the
  // entity is not an option. For CUED AMTI Capabilities, two instances of this
  // element are allowed to support an air volume that defines the extents of
  // the cue volume around the Entity. For CUED AMTI Capabilities, a single
  // instance is allowed if it is an Entity in which case the Entity location
  // uncertainty defines the extents of the cue volume or a sensor volume with a
  // cue velocity. For TRACK AMTI Capabilities it is expected that the Entity is
  // the only valid selection.
  repeated AirTargetVolumeCommandType target_volume = 3;
  // Indicates the repetition of the Activity. If omitted, the Activity is not
  // repetitive.
  optional RepetitionType repetition = 4;
  // Indicates performance metrics that provide the system insight regarding the
  // progress of an activity, description of the results of an activity and
  // related stats. This is a list to provide reporting for all revisits between
  // activity messages.
  repeated MTI_ActivityStatusDetailType metrics = 5;
  // When TRUE, indicates the Activity could not be scheduled as requested but
  // the radar was able to apply the command's CollectionPolicy and then
  // successfully schedule or complete the activity.
  optional bool policy_applied = 6;
  // Flag indicating whether or not all products (e.g., ProductLocation) and
  // messages (e.g., Entity) expected to be produced by this activity have been
  // output.
  bool all_products_and_messages_produced = 7;
  // C2 sources work at different levels of detail and abstraction, progressing
  // from what to do to how specifically to do it. Inputs from abstract tasking
  // sources and Tasks can be decomposed into discrete, actionable Tasks and/or
  // Capability commands. This element provides traceability to the external
  // tasking or Task from which this Capability command was derived.
  optional TraceabilityType traceability = 8;
  // Indicates which electronic protection IDs are in use for this activity.
  repeated ForeignKeyType electronic_protection_options_employed = 9;
  // Indicates which emitter IDs are in use for this activity and whether
  // Multistatic Mode is enabled or disabled.
  optional MultistaticModeOptionsEmployedType multistatic_mode_options_employed = 10;
}


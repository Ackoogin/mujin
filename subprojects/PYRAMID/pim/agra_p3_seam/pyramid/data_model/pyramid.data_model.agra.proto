  optional RequestID_Type assessment_request_id = 2;
  // This element indicates the AnalysisRoute that was used to perform the
  // assessment.
  optional AnalysisRouteID_Type analysis_route_id = 3;
  // This element indicates the results of the assessment.
  MA_AssessmentType assessment = 4;
}

// The ID type for UCI IDs that correspond to assessments.

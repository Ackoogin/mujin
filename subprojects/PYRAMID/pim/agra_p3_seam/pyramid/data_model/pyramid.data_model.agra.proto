message IFF_ModeControlType {
  // Repeats this sequence inside withn this commnad until commanded to stop.
  bool continuous_repetition = 1;
  // If a sequence is defined for selected modes (using ModeSequenceNumbers),
  // this field indicates the number of revisits for the entire sequence.
  optional int32 sequence_revisit_count = 2;
  // List of IFF Modes to be operated in sequence. Modes in the list can be
  // requested to be simultaneous if supported by the Capablity. Some modes may
  // not be able to operate in sequence with other modes, for example Mode 5,
  // Format 3 should not be selected with any other mode.
  repeated IFF_SimultaneousSelectionType sequential_mode_control = 3;
}

// See annotations in child elements and messages/elements that use this type

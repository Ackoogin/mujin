  // Indicates the types of sensor systems and specific systems that only can be
  // used to accomplish the Orbital Surveillance Task.
  optional SensorConstraintsType required = 2;
  // Indicates the types of sensor systems and specific systems that can be used
  // to accomplish the Orbital Surveillance Task.
  optional SensorConstraintsType allowed = 3;
  // Indicates the types of sensor systems and specific systems that must not be
  // used to accomplish the Orbital Surveillance Task.
  optional SensorConstraintsType excluded = 4;
  // Indicates the sensor has to be capable of operating at this classification
  // level or higher.

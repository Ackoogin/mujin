// uci_version: 000.000.001.002
message SAR_CapabilityOptionsType {
  // Indicates whether (TRUE) or not (FALSE) the Capability supports the
  // InterruptOtherActivities element in the SAR_Command message.
  bool interrupt_other_activities = 1;
  // Indicates whether (TRUE) or not (FALSE) the Capability supports the
  // CollectionPolicy element in the SAR_Command message.
  bool collection_policy = 2;
  // Indicates whether (TRUE) or not (FALSE) the Capability supports Automatic
  // Target Recognition (ATR) element in the SAR_Command.
  bool atr = 3;
  // Indicates whether (TRUE) or not (FALSE) the Capability can provide fixed
  // target indication processing and generate the associated products. This
  // processing can be initiated through the inclusion of the Fixed Target
  // Indicator (FTI) flag in the SMTI command.
  bool fti_supported = 4;
  // Indicates whether (TRUE) or not (FALSE) the Capability supports the
  // ForceTxRxTaper element in the SAR_Command.

  oneof choice {
    // This specifies the determination method as “Static”.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string static_fitness_score = 1;
    // This specifies the determination method as “User-Defined”.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string user_defined = 2;
    // This nested choice type specifies the determination method as “Dynamic”.

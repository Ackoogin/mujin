syntax = "proto3";

package pyramid.components.pim_osprey.sensor_data_interpretation.services.consumed;

import "google/protobuf/empty.proto";
import "pyramid/data_model/pyramid.data_model.base.proto";
import "pyramid/data_model/pyramid.data_model.common.proto";
import "pyramid/data_model/pyramid.data_model.common_pim_components.sensor_data_interpretation.proto";
import "pyramid/data_model/pyramid.data_model.generic_pim.generic.proto";
import "pyramid/data_model/pyramid.data_model.pim_osprey.sensor_data_interpretation.proto";

message SDIDataProvisionDependency_Service_Request {
  oneof payload {
    pyramid.data_model.common_pim_components.sensor_data_interpretation.SDIDataProvisionDependencyRequest sdidata_provision_dependency_request = 1;
    pyramid.data_model.pim_osprey.sensor_data_interpretation.RadarSingleTrackDataProvDependency radar_single_track_data_prov_dependency = 2;
    pyramid.data_model.pim_osprey.sensor_data_interpretation.RadarATITrackDataProvDependency radar_atitrack_data_prov_dependency = 3;
  }
}

message SDIDataProvisionDependency_Service_Requirement {
  oneof payload {
    pyramid.data_model.common_pim_components.sensor_data_interpretation.SDIDataProvisionDependencyRequirement sdidata_provision_dependency_requirement = 1;
    pyramid.data_model.pim_osprey.sensor_data_interpretation.RadarSingleTrackDataProcDependencyRequirement radar_single_track_data_proc_dependency_requirement = 2;
    pyramid.data_model.pim_osprey.sensor_data_interpretation.RadarATITrackDataProvDependencyRequirement radar_atitrack_data_prov_dependency_requirement = 3;
    pyramid.data_model.pim_osprey.sensor_data_interpretation.RadarAreaTrackDataProcDependencyRequirement radar_area_track_data_proc_dependency_requirement = 4;
    pyramid.data_model.pim_osprey.sensor_data_interpretation.RadarSingleTrackDataProvDependencyRequirement radar_single_track_data_prov_dependency_requirement = 5;
  }
}

// Request port 'pSDIDataProvisionDependency' (consumed) refining SDIDataProvisionDependency
service SDIDataProvisionDependency_Service {
  rpc Create(SDIDataProvisionDependency_Service_Request) returns (pyramid.data_model.common.Ack);
  rpc Read(pyramid.data_model.common.Query) returns (stream SDIDataProvisionDependency_Service_Requirement);
  rpc Update(SDIDataProvisionDependency_Service_Requirement) returns (pyramid.data_model.common.Ack);
  rpc Cancel(pyramid.data_model.base.Identifier) returns (pyramid.data_model.common.Ack);
}

message SDIDataProcessingDependency_Service_Request {
  oneof payload {
    pyramid.data_model.common_pim_components.sensor_data_interpretation.SDIDataProcessingDependencyRequest sdidata_processing_dependency_request = 1;
    pyramid.data_model.pim_osprey.sensor_data_interpretation.RadarSingleTrackDataProcDependency radar_single_track_data_proc_dependency = 2;
    pyramid.data_model.pim_osprey.sensor_data_interpretation.RadarAreaTrackDataProcDependency radar_area_track_data_proc_dependency = 3;
  }
}

// Request port 'pSDIDataProcessingDependency' (consumed) refining SDIDataProcessingDependency
service SDIDataProcessingDependency_Service {
  rpc Create(SDIDataProcessingDependency_Service_Request) returns (pyramid.data_model.common.Ack);
  rpc Read(pyramid.data_model.common.Query) returns (stream pyramid.data_model.common_pim_components.sensor_data_interpretation.SDIDataProcessingDependencyRequirement);
  rpc Update(pyramid.data_model.common_pim_components.sensor_data_interpretation.SDIDataProcessingDependencyRequirement) returns (pyramid.data_model.common.Ack);
  rpc Cancel(pyramid.data_model.base.Identifier) returns (pyramid.data_model.common.Ack);
}

// Information port 'pCapabilityEvidence' (consumed) refining Capability_Evidence
service Capability_Evidence_Service {
  rpc Read(google.protobuf.Empty) returns (stream pyramid.data_model.generic_pim.generic.Capabilities);
}


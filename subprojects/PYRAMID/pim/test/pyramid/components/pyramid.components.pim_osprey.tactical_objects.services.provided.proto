syntax = "proto3";

package pyramid.components.pim_osprey.tactical_objects.services.provided;

import "google/protobuf/empty.proto";
import "pyramid/data_model/pyramid.data_model.base.proto";
import "pyramid/data_model/pyramid.data_model.common.proto";
import "pyramid/data_model/pyramid.data_model.common_pim_components.authorisation.proto";
import "pyramid/data_model/pyramid.data_model.generic_pim.generic.proto";

// Information port 'pCapability' (provided) refining Capability
service Capability_Service {
  rpc Read(google.protobuf.Empty) returns (stream pyramid.data_model.generic_pim.generic.Capabilities);
}

message Authorisation_Dependency_Service_Request {
  oneof payload {
    pyramid.data_model.common.AUTDependencyRequest autdependency_request = 1;
    pyramid.data_model.common.AUTPredecessorDependencyRequest autpredecessor_dependency_request = 2;
    pyramid.data_model.common.AUTPositionalDependencyRequest autpositional_dependency_request = 3;
  }
}

message Authorisation_Dependency_Service_Requirement {
  oneof payload {
    pyramid.data_model.common_pim_components.authorisation.AUTRequirement autrequirement = 1;
    pyramid.data_model.common_pim_components.authorisation.AUTPredecessorRequirement autpredecessor_requirement = 2;
    pyramid.data_model.common_pim_components.authorisation.AUTPositionalRequirement autpositional_requirement = 3;
  }
}

// Request port 'pAuthorisationDependency' (provided) refining Authorisation_Dependency
service Authorisation_Dependency_Service {
  rpc Create(Authorisation_Dependency_Service_Request) returns (pyramid.data_model.common.Ack);
  rpc Read(pyramid.data_model.common.Query) returns (stream Authorisation_Dependency_Service_Requirement);
  rpc Update(Authorisation_Dependency_Service_Requirement) returns (pyramid.data_model.common.Ack);
  rpc Cancel(pyramid.data_model.base.Identifier) returns (pyramid.data_model.common.Ack);
}


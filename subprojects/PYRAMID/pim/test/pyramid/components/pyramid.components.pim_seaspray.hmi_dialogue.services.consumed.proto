syntax = "proto3";

package pyramid.components.pim_seaspray.hmi_dialogue.services.consumed;

import "google/protobuf/empty.proto";
import "pyramid/options/pyramid.options.proto";
import "pyramid/data_model/pyramid.data_model.base.proto";
import "pyramid/data_model/pyramid.data_model.common.proto";
import "pyramid/data_model/pyramid.data_model.common_pim_components.hmi_dialogue.proto";
import "pyramid/data_model/pyramid.data_model.generic_pim.generic.proto";
import "pyramid/data_model/pyramid.data_model.pim_seaspray.hmi_dialogue.proto";

message HDIDependency_Service_Request {
  oneof payload {
    pyramid.data_model.common_pim_components.hmi_dialogue.HDIDependencyRequest hdidependency_request = 1;
    pyramid.data_model.pim_seaspray.hmi_dialogue.HDIRadarModeChangeDependencyRequest hdiradar_mode_change_dependency_request = 2;
    pyramid.data_model.pim_seaspray.hmi_dialogue.HDIRadarDisplayDependencyRequest hdiradar_display_dependency_request = 3;
    pyramid.data_model.base.Identifier cancel = 4;
  }
}

// Request port 'pHDIDependency' (consumed) refining HDIDependency
service HDIDependency_Service {
  rpc Create(HDIDependency_Service_Request) returns (pyramid.data_model.common.Ack) {
    option (pyramid.options.pyramid_op) = {
      pattern: PUBLISH
      topic: "pim_seaspray.hdi_dependency.request"
      qos: { reliability: RELIABLE durability: VOLATILE depth: 10 }
    };
  }
  rpc Read(pyramid.data_model.common.Query) returns (stream pyramid.data_model.common_pim_components.hmi_dialogue.HDIDependencyRequirement) {
    option (pyramid.options.pyramid_op) = {
      pattern: SUBSCRIBE
      topic: "pim_seaspray.hdi_dependency.entity"
      qos: { reliability: RELIABLE durability: VOLATILE depth: 10 }
    };
  }
  rpc Update(pyramid.data_model.common_pim_components.hmi_dialogue.HDIDependencyRequirement) returns (pyramid.data_model.common.Ack) {
    option (pyramid.options.pyramid_op) = {
      pattern: PUBLISH
      topic: "pim_seaspray.hdi_dependency.request"
      qos: { reliability: RELIABLE durability: VOLATILE depth: 10 }
    };
  }
  rpc Cancel(pyramid.data_model.base.Identifier) returns (pyramid.data_model.common.Ack) {
    option (pyramid.options.pyramid_op) = {
      pattern: PUBLISH
      topic: "pim_seaspray.hdi_dependency.request"
      qos: { reliability: RELIABLE durability: VOLATILE depth: 10 }
    };
  }
}

// Information port 'pCapabilityEvidence' (consumed) refining Capability_Evidence
service Capability_Evidence_Service {
  rpc Read(google.protobuf.Empty) returns (stream pyramid.data_model.generic_pim.generic.Capabilities) {
    option (pyramid.options.pyramid_op) = {
      pattern: SUBSCRIBE
      topic: "pim_seaspray.capability_evidence.information"
      qos: { reliability: RELIABLE durability: VOLATILE depth: 10 }
    };
  }
}


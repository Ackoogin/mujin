syntax = "proto3";

package pyramid.components.pim_seaspray.information_presentation.services.provided;

import "google/protobuf/empty.proto";
import "pyramid/data_model/pyramid.data_model.base.proto";
import "pyramid/data_model/pyramid.data_model.common.proto";
import "pyramid/data_model/pyramid.data_model.common_pim_components.authorisation.proto";
import "pyramid/data_model/pyramid.data_model.common_pim_components.information_presentation.proto";
import "pyramid/data_model/pyramid.data_model.generic_pim.generic.proto";
import "pyramid/data_model/pyramid.data_model.pim_seaspray.information_presentation.proto";

message IPRRequirement_Service_Request {
  oneof payload {
    pyramid.data_model.common_pim_components.information_presentation.IPRRequest iprrequest = 1;
    pyramid.data_model.pim_seaspray.information_presentation.IPRRadarDisplayRequest iprradar_display_request = 2;
  }
}

message IPRRequirement_Service_Requirement {
  oneof payload {
    pyramid.data_model.common_pim_components.information_presentation.IPRRequirement iprrequirement = 1;
    pyramid.data_model.pim_seaspray.information_presentation.IPRRadarDisplayRequirement iprradar_display_requirement = 2;
  }
}

// Request port 'pIPRRequirement' (provided) refining IPRRequirement
service IPRRequirement_Service {
  rpc Create(IPRRequirement_Service_Request) returns (pyramid.data_model.common.Ack);
  rpc Read(pyramid.data_model.common.Query) returns (stream IPRRequirement_Service_Requirement);
  rpc Update(IPRRequirement_Service_Requirement) returns (pyramid.data_model.common.Ack);
  rpc Cancel(pyramid.data_model.base.Identifier) returns (pyramid.data_model.common.Ack);
}

message IPRInformation_Service_Information {
  oneof payload {
    pyramid.data_model.common_pim_components.information_presentation.IPRInformation iprinformation = 1;
    pyramid.data_model.common_pim_components.information_presentation.IPRDependencyInformation iprdependency_information = 2;
  }
}

// Information port 'pIPRInformation' (provided) refining IPRInformation
service IPRInformation_Service {
  rpc Read(google.protobuf.Empty) returns (stream IPRInformation_Service_Information);
}

// Information port 'pCapability' (provided) refining Capability
service Capability_Service {
  rpc Read(google.protobuf.Empty) returns (stream pyramid.data_model.generic_pim.generic.Capabilities);
}

message Authorisation_Dependency_Service_Request {
  oneof payload {
    pyramid.data_model.common.AUTDependencyRequest autdependency_request = 1;
    pyramid.data_model.common.AUTPredecessorDependencyRequest autpredecessor_dependency_request = 2;
    pyramid.data_model.common.AUTPositionalDependencyRequest autpositional_dependency_request = 3;
  }
}

message Authorisation_Dependency_Service_Requirement {
  oneof payload {
    pyramid.data_model.common_pim_components.authorisation.AUTRequirement autrequirement = 1;
    pyramid.data_model.common_pim_components.authorisation.AUTPredecessorRequirement autpredecessor_requirement = 2;
    pyramid.data_model.common_pim_components.authorisation.AUTPositionalRequirement autpositional_requirement = 3;
  }
}

// Request port 'pAuthorisationDependency' (provided) refining Authorisation_Dependency
service Authorisation_Dependency_Service {
  rpc Create(Authorisation_Dependency_Service_Request) returns (pyramid.data_model.common.Ack);
  rpc Read(pyramid.data_model.common.Query) returns (stream Authorisation_Dependency_Service_Requirement);
  rpc Update(Authorisation_Dependency_Service_Requirement) returns (pyramid.data_model.common.Ack);
  rpc Cancel(pyramid.data_model.base.Identifier) returns (pyramid.data_model.common.Ack);
}


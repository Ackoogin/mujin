syntax = "proto3";

package pyramid.components.pim_seaspray.sensor_products.services.consumed;

import "google/protobuf/empty.proto";
import "pyramid/options/pyramid.options.proto";
import "pyramid/data_model/pyramid.data_model.common_pim_components.sensor_products.proto";
import "pyramid/data_model/pyramid.data_model.generic_pim.generic.proto";
import "pyramid/data_model/pyramid.data_model.pim_seaspray.sensor_products.proto";

message SPRMeasuredInformation_Service_Information {
  oneof payload {
    pyramid.data_model.common_pim_components.sensor_products.SPRDependencyInformation sprdependency_information = 1;
    pyramid.data_model.pim_seaspray.sensor_products.RadarDisplayExternalInformationDependency radar_display_external_information_dependency = 2;
  }
}

// Information port 'pSPRMeasuredInformation' (consumed) refining SPRMeasuredInformation
service SPRMeasuredInformation_Service {
  rpc Read(google.protobuf.Empty) returns (stream SPRMeasuredInformation_Service_Information) {
    option (pyramid.options.pyramid_op) = {
      pattern: SUBSCRIBE
      topic: "pim_seaspray.spr_measured_information.information"
      qos: { reliability: RELIABLE durability: VOLATILE depth: 10 }
    };
  }
}

// Information port 'pCapabilityEvidence' (consumed) refining Capability_Evidence
service Capability_Evidence_Service {
  rpc Read(google.protobuf.Empty) returns (stream pyramid.data_model.generic_pim.generic.Capabilities) {
    option (pyramid.options.pyramid_op) = {
      pattern: SUBSCRIBE
      topic: "pim_seaspray.capability_evidence.information"
      qos: { reliability: RELIABLE durability: VOLATILE depth: 10 }
    };
  }
}


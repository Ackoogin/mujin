syntax = "proto3";

package pyramid.components.pim_seaspray.sensor_products.services.provided;

import "google/protobuf/empty.proto";
import "pyramid/options/pyramid.options.proto";
import "pyramid/data_model/pyramid.data_model.base.proto";
import "pyramid/data_model/pyramid.data_model.common.proto";
import "pyramid/data_model/pyramid.data_model.common_pim_components.authorisation.proto";
import "pyramid/data_model/pyramid.data_model.common_pim_components.sensor_products.proto";
import "pyramid/data_model/pyramid.data_model.generic_pim.generic.proto";
import "pyramid/data_model/pyramid.data_model.pim_seaspray.sensor_products.proto";

message SPRInformation_Service_Information {
  oneof payload {
    pyramid.data_model.common_pim_components.sensor_products.SPRInformation sprinformation = 1;
    pyramid.data_model.pim_seaspray.sensor_products.SPRRadarDisplayInformation sprradar_display_information = 2;
  }
}

// Information port 'pSPRInformation' (provided) refining SPRInformation
service SPRInformation_Service {
  rpc Read(google.protobuf.Empty) returns (stream SPRInformation_Service_Information) {
    option (pyramid.options.pyramid_op) = {
      pattern: PUBLISH
      topic: "pim_seaspray.spr_information.information"
      qos: { reliability: RELIABLE durability: VOLATILE depth: 10 }
    };
  }
}

message SPRRequirement_Service_Request {
  oneof payload {
    pyramid.data_model.common_pim_components.sensor_products.SPRRequest sprrequest = 1;
    pyramid.data_model.pim_seaspray.sensor_products.SPRRadarDisplayRequest sprradar_display_request = 2;
    pyramid.data_model.base.Identifier cancel = 3;
  }
}

message SPRRequirement_Service_Entity {
  oneof payload {
    pyramid.data_model.common_pim_components.sensor_products.SPRRequirement sprrequirement = 1;
    pyramid.data_model.pim_seaspray.sensor_products.SPRRadarDisplayRequirement sprradar_display_requirement = 2;
  }
}

// Request port 'pSPRRequirement' (provided) refining SPRRequirement
service SPRRequirement_Service {
  rpc Create(SPRRequirement_Service_Request) returns (pyramid.data_model.common.Ack) {
    option (pyramid.options.pyramid_op) = {
      pattern: SUBSCRIBE
      topic: "pim_seaspray.spr_requirement.request"
      qos: { reliability: RELIABLE durability: VOLATILE depth: 10 }
    };
  }
  rpc Read(pyramid.data_model.common.Query) returns (stream SPRRequirement_Service_Entity) {
    option (pyramid.options.pyramid_op) = {
      pattern: PUBLISH
      topic: "pim_seaspray.spr_requirement.entity"
      qos: { reliability: RELIABLE durability: VOLATILE depth: 10 }
    };
  }
  rpc Update(SPRRequirement_Service_Entity) returns (pyramid.data_model.common.Ack) {
    option (pyramid.options.pyramid_op) = {
      pattern: SUBSCRIBE
      topic: "pim_seaspray.spr_requirement.request"
      qos: { reliability: RELIABLE durability: VOLATILE depth: 10 }
    };
  }
  rpc Cancel(pyramid.data_model.base.Identifier) returns (pyramid.data_model.common.Ack) {
    option (pyramid.options.pyramid_op) = {
      pattern: SUBSCRIBE
      topic: "pim_seaspray.spr_requirement.request"
      qos: { reliability: RELIABLE durability: VOLATILE depth: 10 }
    };
  }
}

// Information port 'pCapability' (provided) refining Capability
service Capability_Service {
  rpc Read(google.protobuf.Empty) returns (stream pyramid.data_model.generic_pim.generic.Capabilities) {
    option (pyramid.options.pyramid_op) = {
      pattern: PUBLISH
      topic: "pim_seaspray.capability.information"
      qos: { reliability: RELIABLE durability: VOLATILE depth: 10 }
    };
  }
}

message Authorisation_Dependency_Service_Request {
  oneof payload {
    pyramid.data_model.common.AUTDependencyRequest autdependency_request = 1;
    pyramid.data_model.common.AUTPredecessorDependencyRequest autpredecessor_dependency_request = 2;
    pyramid.data_model.common.AUTPositionalDependencyRequest autpositional_dependency_request = 3;
    pyramid.data_model.base.Identifier cancel = 4;
  }
}

message Authorisation_Dependency_Service_Entity {
  oneof payload {
    pyramid.data_model.common_pim_components.authorisation.AUTRequirement autrequirement = 1;
    pyramid.data_model.common_pim_components.authorisation.AUTPredecessorRequirement autpredecessor_requirement = 2;
    pyramid.data_model.common_pim_components.authorisation.AUTPositionalRequirement autpositional_requirement = 3;
  }
}

// Request port 'pAuthorisationDependency' (provided) refining Authorisation_Dependency
service Authorisation_Dependency_Service {
  rpc Create(Authorisation_Dependency_Service_Request) returns (pyramid.data_model.common.Ack) {
    option (pyramid.options.pyramid_op) = {
      pattern: SUBSCRIBE
      topic: "pim_seaspray.authorisation_dependency.request"
      qos: { reliability: RELIABLE durability: VOLATILE depth: 10 }
    };
  }
  rpc Read(pyramid.data_model.common.Query) returns (stream Authorisation_Dependency_Service_Entity) {
    option (pyramid.options.pyramid_op) = {
      pattern: PUBLISH
      topic: "pim_seaspray.authorisation_dependency.entity"
      qos: { reliability: RELIABLE durability: VOLATILE depth: 10 }
    };
  }
  rpc Update(Authorisation_Dependency_Service_Entity) returns (pyramid.data_model.common.Ack) {
    option (pyramid.options.pyramid_op) = {
      pattern: SUBSCRIBE
      topic: "pim_seaspray.authorisation_dependency.request"
      qos: { reliability: RELIABLE durability: VOLATILE depth: 10 }
    };
  }
  rpc Cancel(pyramid.data_model.base.Identifier) returns (pyramid.data_model.common.Ack) {
    option (pyramid.options.pyramid_op) = {
      pattern: SUBSCRIBE
      topic: "pim_seaspray.authorisation_dependency.request"
      qos: { reliability: RELIABLE durability: VOLATILE depth: 10 }
    };
  }
}


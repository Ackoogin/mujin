syntax = "proto3";

package pyramid.data_model.common_pim_components.authorisation;

import "pyramid/data_model/pyramid.data_model.base.proto";
import "pyramid/data_model/pyramid.data_model.common.proto";
import "pyramid/data_model/pyramid.data_model.generic_pim.generic.proto";

message AUTRequest {
  pyramid.data_model.common.Request base = 1;  // Inherited from Request

  pyramid.data_model.base.Time time_frame = 2;
}

message AUTRequirement {
  pyramid.data_model.common.Requirement base = 1;  // Inherited from Requirement
}

message AUTDependencyInformation {
  pyramid.data_model.common.DependencyInformation base = 1;  // Inherited from DependencyInformation
}

message AUTPositionalRequest {
  AUTRequest base = 1;  // Inherited from AUTRequest
}

message AUTPredecessorRequest {
  AUTRequest base = 1;  // Inherited from AUTRequest

  pyramid.data_model.base.Identifier predecessor = 2;
}

message AUTPredecessorRequirement {
  AUTRequirement base = 1;  // Inherited from AUTRequirement
}

message AUTPositionalRequirement {
  AUTRequirement base = 1;  // Inherited from AUTRequirement
}

message Authorisation {
  pyramid.data_model.generic_pim.generic.GenericComponent base = 1;  // Inherited from GenericComponent
}


syntax = "proto3";

package pyramid.data_model.common_pim_components.tactical_objects;

import "pyramid/data_model/pyramid.data_model.base.proto";
import "pyramid/data_model/pyramid.data_model.common.proto";
import "pyramid/data_model/pyramid.data_model.generic_pim.generic.proto";

enum ObjectSource {
  OBJECT_SOURCE_UNSPECIFIED = 0;
  OBJECT_SOURCE_RADAR = 1;
  OBJECT_SOURCE_LOCAL = 2;
}

message TOBDependency {
  pyramid.data_model.common.DependencyRequest base = 1;  // Inherited from DependencyRequest
}

message TOBRequirement {
  pyramid.data_model.common.Requirement base = 1;  // Inherited from Requirement
}

// Standard properties of a Tactical Object
message ObjectDetail {
  pyramid.data_model.common.Entity base = 1;  // Inherited from Entity

  optional pyramid.data_model.base.Speed speed = 2;
  optional pyramid.data_model.base.Angle course = 3;
  pyramid.data_model.common.BattleDimension dimension = 4;
  pyramid.data_model.common.StandardIdentity standard_identifer = 5;
  repeated ObjectSource source = 6;
  pyramid.data_model.base.Timestamp creation_time = 7;
  optional pyramid.data_model.base.Percentage quality = 8;
  optional pyramid.data_model.base.Length length = 9;
}

// Reference
message ObjectMatch {
  pyramid.data_model.common.Entity base = 1;  // Inherited from Entity

  // Identifier for this Entity,
  pyramid.data_model.base.Identifier matching_object_id = 2;
}

message TOBRequest {
  pyramid.data_model.common.Request base = 1;  // Inherited from Request
}

message TOBDependencyRequirement {
  pyramid.data_model.common.DependencyRequirement base = 1;  // Inherited from DependencyRequirement
}

// Standard properties of a Tactical Object. All optional as these are the criteria used in a matching object request test matching objects against. Object must match all provided criteria to Match.
message ObjectDetailRequest {
  pyramid.data_model.common.Entity base = 1;  // Inherited from Entity
  TOBRequest base_2 = 2;  // Inherited from TOBRequest

  // Match must be of a given speed or between bounds given by 2 speeds.
  optional pyramid.data_model.base.Speed speed = 3;
  // Match must be of a given course or between bounds given by 2 courses.
  optional pyramid.data_model.base.Angle course = 4;
  // Any of the battle dimension specified. If none specified all battle dimensions are deemed to match.
  repeated pyramid.data_model.common.BattleDimension dimension = 5;
  // Any of the standard identities specified. If none specified all standard identities dimensions are deemed to match.
  repeated pyramid.data_model.common.StandardIdentity standard_identifer = 6;
  // Object must be on the given position if given.
  optional pyramid.data_model.common.GeodeticPosition position = 7;
  // Any of the sources specified. If none specified all sources are deemed to match.
  repeated ObjectSource source = 8;
  // Match must be of a given creation time or between bounds given by 2 creation times.
  optional pyramid.data_model.base.Timestamp creation_time = 9;
  // Match must be of a given quality or between bounds given by 2 qualities.
  optional pyramid.data_model.base.Percentage quality = 10;
  // Match must be of a given length or between bounds given by 2 lengths.
  optional pyramid.data_model.base.Length length = 11;
  // Match must be within the bounds of the given area
  optional pyramid.data_model.common.PolyArea poly_area = 12;
}

// Standard properties of a Tactical Object. All optional as these are the criteria used in a matching object request test matching objects against. Object must match all provided criteria to Match.
message ObjectDetailRequirement {
  TOBRequirement base = 1;  // Inherited from TOBRequirement

  // Match must be of a given speed or between bounds given by 2 speeds.
  optional pyramid.data_model.base.Speed speed = 2;
  // Match must be of a given course or between bounds given by 2 courses.
  optional pyramid.data_model.base.Angle course = 3;
  // Any of the battle dimension specified. If none specified all battle dimensions are deemed to match.
  repeated pyramid.data_model.common.BattleDimension dimension = 4;
  // Any of the standard identities specified. If none specified all standard identities dimensions are deemed to match.
  repeated pyramid.data_model.common.StandardIdentity standard_identifer = 5;
  // Object must be on the given position if given.
  optional pyramid.data_model.common.GeodeticPosition position = 6;
  // Any of the sources specified. If none specified all sources are deemed to match.
  repeated ObjectSource source = 7;
  // Match must be of a given creation time or between bounds given by 2 creation times.
  optional pyramid.data_model.base.Timestamp creation_time = 8;
  // Match must be of a given quality or between bounds given by 2 qualities.
  optional pyramid.data_model.base.Percentage quality = 9;
  // Match must be of a given length or between bounds given by 2 lengths.
  optional pyramid.data_model.base.Length length = 10;
  // Match must be within the bounds of the given area
  optional pyramid.data_model.common.PolyArea poly_area = 11;
}

message PolyAreaObject {
  ObjectDetail base = 1;  // Inherited from ObjectDetail

  pyramid.data_model.common.PolyArea area = 2;
}

message CircleAreaObject {
  ObjectDetail base = 1;  // Inherited from ObjectDetail

  pyramid.data_model.common.CircleArea area = 2;
}

message SinglePointObject {
  ObjectDetail base = 1;  // Inherited from ObjectDetail

  pyramid.data_model.common.GeodeticPosition position = 2;
}

message TacticalObjects {
  pyramid.data_model.generic_pim.generic.GenericComponent base = 1;  // Inherited from GenericComponent
}

message ObjectDatabase {
  repeated ObjectDetail element = 1;
}


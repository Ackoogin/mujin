}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message RadarCollectionOptionsType {
  // Indicates guidance regarding which aspect or aspects of collection to favor
  // if the command cannot be optimally scheduled as requested. See enumerated

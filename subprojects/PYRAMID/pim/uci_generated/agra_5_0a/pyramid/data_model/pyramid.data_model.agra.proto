// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message PO_AirVolumeSensorReferencedType {
  // Indicates the commanded azimuth width. It represents the angular width
  // between the two 3 dB extents of the scan volume.
  // xsd type: AnglePositiveType
  double azimuth_scan_width = 1;
  // Indicates the commanded azimuth center. For BODY stabilized volumes it is
  // referenced to the centerline of the platform. For INERTIAL stabilized
  // volumes it is referenced to true north; clockwise rotation is positive in
  // both cases.
  // xsd type: AngleType
  double azimuth_scan_center = 2;
  // Indicates the commanded elevation scan width. It represents the angular
  // width between the two 3 dB extents of the scan volume.
  // xsd type: AngleHalfType
  double elevation_scan_width = 3;
  // Indicates the commanded elevation center. For BODY stabilized volumes it is
  // referenced to the centerline of the platform. For CENTER_ALTITUDE
  // stabilized volumes it is referenced to the center altitude range pair.
  // xsd type: AngleHalfType

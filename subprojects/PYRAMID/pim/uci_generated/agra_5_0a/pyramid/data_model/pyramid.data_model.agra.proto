  // RoutePlan together with optional and unbounded RouteActivityPlans,
  // ActivityPlans, and CommScheduleAllocations. It's allowed for
  // RouteExecutionPlanSets that share the same RoutePlan if the combination of
  // other *Plans in the set are different. For example, depending on a specific
  // condition, the same RoutePlan may be flown but with a different
  // RouteActivityPlan.
  repeated RouteExecutionPlanSetType route_execution_plan_set = 1;
  // Indicates a orbit based execution plan set. It is defined by a single
  // OrbitPlan together with optional and unbounded RouteActivityPlans,
  // ActivityPlans, and CommScheduleAllocations. It's allowed for
  // OrbitExecutionPlanSets that share the same OrbitPlan if the combination of
  // other *Plans in the set are different. For example, depending on a specific
  // condition, the same OrbitPlan may be flown but with a different
  // OrbitActivityPlan.
  repeated OrbitExecutionPlanSetType orbit_execution_plan_set = 2;
  // Indicates an execution plan set that only contains ActivityPlans.
  repeated ExecutionPlanSetBaseType activity_execution_plan_set = 3;
}


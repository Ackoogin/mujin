// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message ConstrainedEntityType {
  // A surrogate allows a similar type that is known to the existing system to
  // take precedence over the reported or cross referenced ELNOT/DIEQP type. For
  // threat ambiguities, the surrogate information takes precedence over all of
  // the individual threat types.
  optional RadarEmitterIdentityType surrogate_identifier = 1;
  // This element defines a percentage that mission planning services should use
  // to decrease the effectiveness of a threat. A value of 100 percent means
  // that threat template data should be used for this threat exactly as defined
  // in configuration data. A value of 0 percent means that the threat should
  // not be considered at all. If this element is not populated then it is
  // assumed to be 100 percent.
  // xsd type: PercentType
  optional double mission_planning_weighting_factor = 2;
  // Consider this entity a valid entity for mission planning related services.
  // "false" indicates intentional ignore or lack of configuration parameters in
  // the system for this entity.
  optional bool mission_planning_candidate = 3;
  // This element indicates the unique identifier of the entity.
  EntityID_Type entity_id = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.003.001
message ConstrainedOpPointType {
  // This element indicates the type of operational point.
  OpPointCategoriesType category = 1;
  // This element contains any parameters specific to sibling Category. Not all
  // OpPoint Categories require unique parameters, only the ones that do are in
  // OpPointCategoriesUniqueDataType.
  optional OpPointCategoriesUniqueDataType category_unique_data = 2;
  // This element indicates the unique identifier of the operational point.
  OpPointID_Type op_point_id = 3;
}

// Container object for the different types of OpPoint*Enums. A separate enum
// applies to each of the choice types.
// uci_version: 000.000.000.000
message OpPointCategoriesUniqueDataType {
  oneof choice {
    // Emergency Point and associated reference types.
    EmergencyReferencePointType emergency = 1;
    // Hazard Point and associated reference types.
    Link16HazardType hazard = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.003.000
message EmergencyReferencePointType {
  // A reference to the original object that caused this OpPoint to be created.
  // Used to refer back to the original vehicle involved in an emergency. This
  // is used keep the values of the last known location of the object available
  // for the complete life cycle of the OpPoint instead of the life cycle of the
  // original object.
  OpPointReferenceType reference = 1;
  // Range of personnel involved as represented by MIL-STD-6016.
  optional StrengthRangeType personnel_count = 2;
  // If present, position accuracy equals last known position.
  // xsd type: EmptyType (pattern [A-Za-z]{0})
  optional string last_known_position = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message OpPointReferenceType {
  oneof choice {
    // The state of an object when an emergency is reported. This data is stored
    // to keep data about an object with an emergency after the object is dropped
    // in the event that the lifetime of the emergency extends past the lifetime
    // of the object.
    GeoLocatedStoredObjectType stored_object = 1;
    // The state of an object when an emergency is reported. This data is
    // referenced when the lifetime of the object will persist for the duration of
    // the emergency being reported.
    GeoLocatedObjectType stored_object_ref = 2;
    // Object used when not known in UCI.
    DataLinkIdentifierPET data_link_object = 3;
  }
}

// A choice between archived objects with a defined location.
// uci_version: 003.000.003.001
message GeoLocatedStoredObjectType {
  oneof choice {
    // The last Entity value reported before the emergency point was created.
    EntityDataType entity = 1;
    // The last System value reported before the emergency point was created.
    SystemDataType system = 2;
    // The last OpPoint value reported before the emergency point was created.
    EmergencyReferenceOpPointType op_point = 3;
    // The last OpLine value reported before the emergency point was created.
    OpLineMDT op_line = 4;
    // The last OpZone value reported before the emergency point was created.
    OpZoneMDT op_zone = 5;
    // The last OpVolume value reported before the emergency point was created.
    OpVolumeMDT op_volume = 6;
  }
}

// Provides the capability to pass an Entity and any associated metadata
// message in the same structure. This is typically used when there is a need
// to pass the entirety of the information about an Entity at a given time as
// a part of another message. For example, an OpPoint representing an
// emergency may include the associated Entity and EntityMetadata from the
// time the emergency was declared.
// uci_version: 003.000.003.000
message EntityDataType {
  // Referenced Entity message data.
  EntityMDT entity = 1;
  // Metadata associated with the referenced Entity.
  optional EntityMetadataMDT metadata = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.001
message EntityMDT {
  // This element represents the unique identifier of the entity.
  EntityID_Type entity_id = 1;
  // Indicates the time at which the Entity was initially detected and/or
  // created.
  DateTimeSigmaType creation_timestamp = 2;
  // Indicates the System and other details regarding the Source of the Entity.
  // Summarizes the creation and correlation ancestry of the Entity. A given
  // Entity has a single source but could be the result of fusion of multiple
  // Entity children.
  EntitySourceType source = 3;
  // Indicates the status of an Entity. This includes early status (POTENTIAL,
  // TENTATIVE), active status (CONFIRMED), inactive status (DROP_PENDING), end
  // status (DROPPED, DESTROYED), or unknown status (MISSING, UNKNOWN, GHOST).
  EntityStatusEnum entity_status = 4;
  // Indicates the degree to which the real world asset which the Entity
  // represents is ready to perform the overall operational mission or missions
  // for which it was organized and equipped. An Entity with this element
  // specified will generally have an xOB contributor reference which can used
  // to query for additional xOB data that isn't duplicated in Entity. Thus, for
  // example, when an enum value of "O" is used refer to available xOB
  // OperationalStatus elements.
  optional OB_OperationalStatusEnum operational_status = 5;
  // This element represents the identity of the Entity. In UCI, Entity and
  // therefore this element are abstracted to a level comparable to MIL-STD-6016
  // J3.X messages. In particular, the identity taxonomy used in this element is
  // derived directly from MIL-STD-6016. It is left to applications using UCI to
  // enforce compatibility with the portions of MIL-STD-6016 referenced herein.
  EntityIdentityType identity = 6;
  // Indicates the unique ID of an Entity that is a part of this Site Entity.
  // When omitted, the Entity is not a Site. When one or more are given, this
  // Entity is a Site.
  repeated EntityID_Type site_entity_id = 7;
  // Indicates the mobility of the Entity. Omission is equivalent to the
  // enumerate UNDETERMINED.
  optional MobilityEnum mobility = 8;
  // Indicates the current kinematic information for the Entity. "Current" is
  // subjective and varies widely by application. For example, some Service
  // might only consider directly sensed kinematic information as current and
  // always report extrapolated data in the sibling EstimatedKinematics element.
  // Another Service might have "staleness" criteria which allows current
  // kinematics to be extrapolated for some period of time before being
  // considered stale. When the staleness criteria are met, that Service might
  // then continue to extrapolate but report the continued extrapolation in the
  // sibling EstimatedKinematics element while freezing this element in a
  // "last-known-good" kinematic state.
  optional KinematicsType kinematics = 9;
  // This element indicates extrapolated or otherwise estimated kinematics for
  // the Entity.
  optional KinematicsType estimated_kinematics = 10;
  // When present, indicates the Entity is in a "down" state (damaged, broken or
  // otherwise not operating) and the last known location is given. The child
  // Timestamp element, when given, indicates the time at which the Entity
  // entered the down state.
  optional Point2D_Type down_location = 11;
  // General status information about the asset.
  optional PlatformStatusType platform_status = 12;
  // Indicates a summary of an RF Signal from the Entity.
  repeated EntitySignalSummaryType signal_summary = 13;
  // Indicates the unique ID of a PulseData collection associated with the
  // Entity.
  repeated PulseDataID_Type pulse_data_id = 14;
  // Indicates the unique ID of a Measurement within an Observation Measurement
  // Report associated with the Entity.
  repeated MeasurementID_Type measurement_id = 15;
  // Specifies the strength for the Entity. When omitted, a single object/entity
  // should be assumed.
  optional StrengthType strength = 16;
  // This element indicates an activity, that isn't otherwise represented by UCI
  // Tasks, Capability commands, etc. being performed on/against the Entity.
  repeated ActivityAgainstType activity_against = 17;
  // This element indicates an activity, that isn't otherwise represented by UCI
  // Tasks, Capability commands, etc. being performed by the Entity.
  repeated ActivityByType activity_by = 18;
  // Indicates the Entity's remaining endurance.
  optional EnduranceType endurance = 19;
  // This type contains the connection data needed to communicate with a vehicle
  // using voice radios.
  optional VoiceControlType voice_control = 20;
  // This element indicates an association (not a fusion or derivation
  // relationship) between this Entity and another UCI message or object. For
  // example, an Entity could be associated with an OpPoint. Data content of the
  // Entity and the associated message/object is maintained independently.
  repeated ID_Type associated_id = 21;
  // Indicates supplementary information regarding an Entity whose ObjectState
  // indicates REMOVED.
  optional EntityRemoveInfoType remove_info = 22;
  // Indicates a capability of the Entity.
  repeated CapabilityID_Type capability_id = 23;
  // Indicates the current single-position orbital kinematic information for the
  // Entity in the form of a single Cartesian state vector of position and
  // velocity that together with its time (epoch) uniquely determine the
  // trajectory of an orbiting body in space. Requires selection of the frame of
  // reference and should, in general, only be propagated using the same model
  // used for the orbit determination. Optionally includes a covariance matrix
  // that contains information about the uncertainties associated with the
  // solution of the element corrections. "Current" is subjective and varies
  // widely by application. For example, some Service might only consider
  // directly sensed kinematic information as current and always report
  // extrapolated data in the sibling EstimatedOrbitalKinematics element.
  // Another Service might have "staleness" criteria which allows current
  // kinematics to be extrapolated for some period of time before being
  // considered stale. When the staleness criteria are met, that Service might
  // then continue to extrapolate but report the continued extrapolation in the
  // sibling EstimatedOrbitalKinematics element while freezing this element in a
  // "last-known-good" kinematic state.
  optional OrbitalKinematicsChoiceType orbital_kinematics = 24;
  // Indicates the parameters used in the Propagation Model for the Entity. If
  // the OrbitalKinematics are relative to another object (Reference Object),
  // these parameters only relate to this entity. If it is necessary to capture
  // the parameters for the Reference Object, those parameters should be
  // captured in the Entity message for that Reference Object, and the Reference
  // Object's EntityID should be specified in the ReferenceAsset element of the
  // sibling OrbitalKinematics.
  optional OrbitalSingleVectorParametersType orbital_kinematics_parameters = 25;
  // This element indicates extrapolated or otherwise estimated single-position
  // orbital kinematics for the Entity.
  optional OrbitalKinematicsChoiceType estimated_orbital_kinematics = 26;
}


// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_InertialStateType {
  // Physical location of the referenced item in geospatial coordinates. The use
  // of the timestamp in this context represents the time the positional data
  // was last measured.
  Point4D_Type position = 1;
  // Uncertainty of the physical location of the referenced item.
  optional UncertaintyType position_uncertainty = 2;
  // Vehicle's velocity in the current operating domain of the system. Air
  // vehicle components are in True Air Speed.
  optional Velocity3D_Type domain_velocity = 3;
  // Indicates the air vehicle's calibrated airspeed as a scalar magnitude,
  // derived from pilot-static measurements and corrected for instrument and
  // position error.
  // xsd type: SpeedType
  optional double calibrated_airspeed = 4;
  // Indicates the unitless ratio of the air vehicle's true airspeed to the
  // speed of sound in the surrounding medium.
  // xsd type: MachType
  optional double mach = 5;
  // Representation of the vehicle's ground velocity as directional speed
  // components.
  optional Velocity2D_Type ground_velocity = 6;
  // The vehicle's acceleration in the current operating domain of the system.
  optional Acceleration3D_Type domain_acceleration = 7;
  // Euler Angle Sequence describing the orientation of the vehicle in the order
  // yaw, pitch, roll. The angles are given in a locally level, North-East-Down
  // coordinate system centered on the vehicle.
  optional OrientationType orientation = 8;
  // Euler Angle Sequence describing the rate of orientation change of the
  // vehicle in the order yaw, pitch, roll. The angles are given in a locally
  // level, North-East-Down coordinate system centered on the vehicle.
  optional OrientationRateType orientation_rate = 9;
  // The level of geodetic position uncertainty as estimated by the unit
  // reporting its position, where higher number indicates lower uncertainty and
  // better quality.
  // xsd type: Link16_PositionQualityType
  optional uint32 link16_position_quality = 10;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.003.001
message WeatherReportGridDataType {
  // composed xsd extension base Point3D_Type
  Point3D_Type base = 1;
  // Weather data gathered at or near the associated location.
  WeatherAreaDataType weather_data = 2;
}

// This element is used to specify a point in the route where no turning
// occurs. It is generally used for points associated with Actions such as
// task "transitions", changes in acceleration, changes in speed, changes in
// altitude, etc.
// uci_version: 002.000.002.000
message WayPointType {
  // Location associated with the specified waypoint.
  WayPointPointChoiceType point_choice = 1;
  // Indicates the action associated with the specified waypoint.
  WaypointTypeEnum waypoint_type = 2;
  // Indicates that this point is the final point in a weapon route with the
  // weapon expecting to impact at the DMPI specified. The last waypoint of a
  // weapon route may be the terminal guidance entry point. In this case, the
  // waypoint specified may not be the same as the DMPIs location. It is the
  // point of entrance into terminal guidance of the weapon.
  optional DMPI_ID_Type dmpi_point_id = 3;
}

// Location associated with the specified waypoint expressed as either a
// geospatial or relative point.
// uci_version: 002.000.002.000
message WayPointPointChoiceType {
  oneof choice {
    // Indicates the geospatial point corresponding to the waypoint. Generally,
    // services are encouraged to send altitude and/or time data whenever it is
    // known.
    Point2D_Type point2_d = 1;
    // Indicates the Relative point corresponding to the waypoint. Generally,
    // services are encouraged to send altitude data whenever it is known.
    Point2D_RelativeType relative_point = 2;
  }
}

// Indicates the action associated with the specified waypoint.
enum WaypointTypeEnum {
  WAYPOINT_TYPE_ENUM_UNSPECIFIED = 0;
  WAYPOINT_TYPE_ENUM_NAV_ONLY = 1;
  WAYPOINT_TYPE_ENUM_TAXI = 2;
  WAYPOINT_TYPE_ENUM_RUNWAY_START = 3;
  WAYPOINT_TYPE_ENUM_RUNWAY_THRESHOLD = 4;
  WAYPOINT_TYPE_ENUM_RUNWAY_LIMIT = 5;
  WAYPOINT_TYPE_ENUM_APPROACH = 6;
  WAYPOINT_TYPE_ENUM_APPROACH_INITIAL_POINT = 7;
  WAYPOINT_TYPE_ENUM_APPROACH_FINAL_POINT = 8;
  WAYPOINT_TYPE_ENUM_TAKEOFF = 9;
  WAYPOINT_TYPE_ENUM_TAKEOFF_INITIAL_POINT = 10;
  WAYPOINT_TYPE_ENUM_TAKEOFF_FINAL_POINT = 11;
  WAYPOINT_TYPE_ENUM_TOUCHDOWN = 12;
  WAYPOINT_TYPE_ENUM_PASSIVE = 13;
  WAYPOINT_TYPE_ENUM_HARD_DITCH = 14;
  WAYPOINT_TYPE_ENUM_END_OF_PATH = 15;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_MissionPlanningAutonomyResponseChoiceType {
  oneof choice {
    // This element indicates the allowed autonomous mission planning for the
    // ancestor Trigger. It also indicates the expected MissionContingencyAlert
    // for the ancestor Trigger; whenever autonomous mission planning is allowed
    // and triggered, a MissionContingencyAlert is expected.
    MA_MissionPlanningAutonomyResponseChoiceType_AutonomousPlanningAction_List autonomous_planning_action = 1;
    // This element indicates that autonomous mission planning isn't allowed for
    // the ancestor Trigger but a MissionContingencyAlert is expected.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string alert_only = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_PlanningAllowedEscalationType {
  // Assigns a unique ID to an allowed planning action. This ID can be reference
  // in *Plans, alerts, etc. that result when the planning action is triggered.
  AutonomousPlanningActionID_Type autonomous_planning_action_id = 1;
  // This element allows control of the escalation of the autonomous replanning.
  // If the autonomous function indicated by the sibling AllowedType leads to a
  // "by result" trigger described here, then additional autonomous planning is
  // allowed as described here. For example, if Tasks are dropped as a result of
  // initial autonomous replanning then this element can be used to
  // enable/disable a secondary "escalated" planning iteration that includes
  // global Task allocation. If omitted, the sibling AllowedType is allowed
  // regardless of result.
  repeated MA_MissionPlanningAutonomySettingByResultType by_result_setting = 2;
  // This element defines the mission planning type that is allowed to be
  // autonomously triggered.
  MA_PlanningAllowedType allowed_type = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_MissionPlanningAutonomySettingByResultType {
  // Indicates a trigger based on the results of a previously initiated
  // autonomous mission planning function.
  PlanningByResultTriggerType trigger = 1;
  // Indicates the action or actions allowed for the sibling trigger.
  MA_MissionPlanningByResultAutonomousActionType autonomous_action = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_MissionPlanningByResultAutonomousActionType {
  oneof choice {
    // This element defines the mission planning type to be triggered. If multiple
    // instances are given, each should be of a different planning type as
    // indicated by the child element.
    MA_MissionPlanningByResultAutonomousActionType_PlanningAllowed_List planning_allowed = 1;
    // This element indicates that autonomous mission planning isn't allowed for
    // the ancestor Trigger but a MissionContingencyAlert is expected.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string alert_only = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_PlanningAllowedType {
  // composed xsd extension base MA_AutonomousPlanCommandType
  MA_AutonomousPlanCommandType base = 1;
  // Required duration in the future when the Plan should start. Existing *Plan
  // will continue during this time. This duration should account for everything
  // that must happen from replan initiation to new plan activation.
  // xsd type: DurationType
  string plan_ahead_duration = 2;
}

// Indicates the settings/usage of a planning process for autonomous planning.
// uci_version: 000.000.000.000
message MA_AutonomousPlanCommandType {
  // Indicates the unique ID of the planning process whose autonomous invocation
  // is described the sibling elements. Planning process are declared in the
  // ControlStatus message.
  PlanningProcessID_Type planning_process_id = 1;
  // Indicates existing types of *Plans that can be used as constraints when
  // invoking the planning process indicated by the sibling PlanningProcessID.
  // The types of *Plans indicated here should be consistent with those
  // supported by the planning process as indicated in the ControlStatus message.
  optional AutonomousPlanningConstrainingPlansType constraining_plans = 2;
  // Indicates existing plans of another System that constrain planning. One for
  // each descendant ConstraintUsage.
  repeated AutonomousPlanningOtherSystemConstrainingPlansType other_system_constraining_plans = 3;
  // Indicates the specific Plan parts of the sibling PlanningType that the
  // System can produce and include in the output Plan. The child choice in this
  // element should match the sibling PlanningType. When omitted, the System can
  // produce all of the Plan parts for the sibling PlanningType.
  optional MA_PlanPartsType output_plan_parts = 4;
  // In some cases, the commanding service or HMI may not want to receive the
  // planning process summarized in a MissionPlan message. If TRUE, the results
  // will be published in individual *Plan messages and summarized in a
  // published MissionPlan message. If FALSE, the results will be published in
  // individual *Plan messages without a summary MissionPlan message.
  bool results_in_mission_plan = 5;
  // Indicates the state to use for the corresponding element in the
  // *PlanCommand when invoking the planning process.
  bool for_planning_use_only = 6;
}

// synthesized list wrapper for repeated choice member PlanningAllowed in MA_MissionPlanningByResultAutonomousActionType (choice)
message MA_MissionPlanningByResultAutonomousActionType_PlanningAllowed_List {
  repeated MA_PlanningAllowedType items = 1;
}

// synthesized list wrapper for repeated choice member AutonomousPlanningAction in MA_MissionPlanningAutonomyResponseChoiceType (choice)
message MA_MissionPlanningAutonomyResponseChoiceType_AutonomousPlanningAction_List {
  repeated MA_PlanningAllowedEscalationType items = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.001.000
message PlanActivationAutonomyType {
  oneof choice {
    // Indicates autonomous, simultaneous activation of all sub-*Plans (TaskPlan,
    // OrbitPlan and OrbitActivityPlan for example) of a MissionPlan into the same
    // activation state.
    MissionPlanActivationSettingType by_mission_plan = 1;
    // Indicates autonomous activation by sub-*Plan (RoutePlan and ActivityPlan
    // for example) of the MissionPlan, with potentially different states for each.
    PlanActivationAutonomyType_BySubPlan_List by_sub_plan = 2;
  }
}

// synthesized list wrapper for repeated choice member BySubPlan in PlanActivationAutonomyType (choice)
message PlanActivationAutonomyType_BySubPlan_List {
  repeated SubPlanActivationSettingType items = 1;
}


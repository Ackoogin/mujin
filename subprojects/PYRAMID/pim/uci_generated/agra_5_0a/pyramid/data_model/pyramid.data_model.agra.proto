    // Plan of the type given by this element. List size for this element is based
    // on "Select All That Apply" condition.
    PlanningByResultTriggerType_ReplanRequired_List replan_required = 1;
    // This result refers to a replan which results in vulnerability changes that
    // exceed the threshold or thresholds given in descendant elements.
    PlanVulnerabilityType vulnerability_changed = 2;
    // This result refers to a case where Requirements have been unallocated as a
    // result of triggered replanning.
    RequirementTriggerType requirement_unallocated = 3;
  }
}

// synthesized list wrapper for repeated choice member ReplanRequired in PlanningByResultTriggerType (choice)
message PlanningByResultTriggerType_ReplanRequired_List {
  repeated PlanTypeEnum items = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message PlanVulnerabilityType {
  // Indicates the threshold of vulnerability for a given capability of threat
  // which triggers a planning response. The specified threshold is compared to
  // the assessed/monitored battlespace condition using the sibling Comparator
  // element.
  repeated ThreatVulnerabilityByCapabilityType vulnerability_by_capability = 1;
  // Indicates the logical comparator to use when comparing the
  // assessed/monitored battlespace condition to the threshold given by the
  // sibling element.
  optional EqualityExpressionEnum comparator = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message ThreatVulnerabilityByCapabilityType {
  // Indicates the category of threat for the sibling vulnerability threshold.
  ThreatCapabilityEnum threat_capability = 1;
  // If the detection costs of a generated *Plan exceed these levels then
  // approval is required in all cases. This data is optionally associated to
  // the NEW_THREAT trigger.
  ThresholdVulnerabilityType threshold = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message ThresholdVulnerabilityType {
  // Specifies the threshold levels of vulnerability for the *Plan without
  // suppression.
  optional VulnerabilityLevelsCombinedType vulnerability_without_suppression = 1;
  // Specifies the threshold levels with suppression.
  optional VulnerabilityLevelsCombinedType vulnerability_with_suppression = 2;
  // Defines the probability of exposure that estimated exposure calculations
  // must exceed to be counted as an actual exposure event. The length of time
  // of exposure events are used to calculate Composite and Cumulative exposure
  // times.
  // xsd type: PercentType
  optional double exposure_event_probability_threshold = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message VulnerabilityLevelsCombinedType {
  // Specifies the threshold levels of detection by acquisition radars.
  optional VulnerabilityLevelsType acquisition_cost_levels = 1;
  // Specifies the threshold levels of exposure to track radars.
  optional VulnerabilityLevelsType track_cost_levels = 2;
  // Specifies the threshold levels of probably of intercept (impact) by a
  // threat.
  optional VulnerabilityLevelsType intercept_cost_levels = 3;
  // Specifies the threshold levels of probably of launch by a threat.
  optional VulnerabilityLevelsType launch_cost_levels = 4;
  // Specifies the threshold levels for overall survivability prediction.
  // xsd type: PercentType
  optional double probability_of_survival = 5;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message RequirementTriggerType {
  // Indicates a Rank required in order for the trigger to be satisfied. If
  // omitted, any Rank is/was a trigger.
  optional RankCompareType rank = 1;
  // Indicates a type of triggering Requirement. If omitted, all/any Requirement
  // types are/were triggers.
  optional RequirementTaxonomyDetailedType requirement_types = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.001.000.000
message RankCompareType {
  // Indicates the precedence and priority levels to compare with the comparison
  // target.
  ComparableRankingType rank_value = 1;
  // Indicates the logical comparator to use when comparing the sibling
  // RankValue element with the comparison target. The logical expression is:
  // (comparison target Rank) (Comparator) (sibling RankValue). When the logical
  // expression is TRUE then the comparison is TRUE.
  EqualityExpressionEnum comparator = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.003.001
message RequirementTaxonomyDetailedType {
  // composed xsd extension base RequirementTaxonomyType
  RequirementTaxonomyType base = 1;
  // Indicates specific Capability details/modes that are applicable.
  optional CapabilityTaxonomyType capability_taxonomy = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message ByTriggerPolicyType {
  // composed xsd extension base ApprovalPolicyBaseType
  ApprovalPolicyBaseType base = 1;
  // Indicates the initiator of the replan; the source that detected the sibling
  // Trigger (if applicable).
  PlanningTriggerSourceEnum trigger_source = 2;
  // Indicates an initial "by case" trigger for autonomous mission planning
  // functions. This element is required when the sibling TriggerSource
  // indicates an autonomous replanning trigger.
  optional PlanningByCaseTriggerType trigger = 3;
  // This element allows the trigger approval policy to be overridden based on
  // the planning activity result. If multiple instances are given, each should
  // be of a different result type as indicated by the child Result element.
  repeated ByResultPolicyType by_trigger_by_result_policy = 4;
}

// Indicates the category/type of trigger for planning or replanning.
enum PlanningTriggerSourceEnum {
  PLANNING_TRIGGER_SOURCE_ENUM_UNSPECIFIED = 0;
  PLANNING_TRIGGER_SOURCE_ENUM_AUTONOMOUS_TRIGGER = 1;
  PLANNING_TRIGGER_SOURCE_ENUM_OPERATOR_INVOKED_TRIGGER = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message PlanningByCaseTriggerType {
  oneof choice {
    // This trigger refers to a new Capability or SubCapability which becomes
    // available or a previously failed Capability which has been restored.
    CapabilityTaxonomyType capability_added = 1;
    // This trigger refers to a failure of a Capability and/or SubCapability
    // needed to perform a Requirement.
    CapabilityTaxonomyType capability_failure = 2;
    // This trigger refers to lost comms.
    CommsLostTriggerDataType comms_lost = 3;
    // This trigger refers to a situation where the designated DMPIs exceed those
    // initially reserved for the Task, if this creates a shortage for other
    // assigned Tasks.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string dmpi_over_designation = 4;
    // This trigger refers to a situation where the designated DMPIs are less than
    // those initially reserved for the task, and if weapons not designated can be
    // used to perform previous unallocated tasks.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string dmpi_under_designation = 5;
    // This trigger refers to a low remaining endurance condition such as low fuel
    // or battery power. This trigger can further be specialized by the definition
    // of the Endurance thresholds to define the trigger.
    EnduranceType endurance_low = 6;
    // This trigger refers to a vehicle that has deviated from the planned route
    // to such a degree that a replan is required.
    ThresholdOffRouteTriggerDataType off_route = 7;
    // This trigger refers to the proximity of two items (Systems, Entities or
    // other items) that exceeded a minimum geospatial separation limit as
    // specified in OpRouting messages.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string proximity_conflict = 8;
    // This trigger refers to the location of a DMPI, updated LAR calculations or
    // other changes that have resulted in the planned release point for a weapon
    // falling outside the weapon LAR.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string release_point_outside_lar = 9;
    // This trigger refers to a route that exceeded a minimum geospatial
    // separation limit with another item or items. The separation is between a
    // planned/navigated route and other routes or conflicting items as specified
    // in OpRouting messages.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string route_conflict = 10;
    // This trigger refers to vulnerability due to exposure along the route with
    // and without suppression.
    PlanVulnerabilityType route_vulnerability = 11;
    // This trigger refers to a system state transition, as indicated by the
    // SystemStatus message.
    SystemStateFilterType system_state_change = 12;
    // This trigger indicates a new Requirement.
    RequirementTriggerType requirement_added = 13;
    // This trigger indicates a Requirement that cannot be planned/performed
    // because a Requirement it is dependent on cannot be planned/performed.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string requirement_dependency_failed = 14;
    // This trigger refers to a Requirement execution state transition to DROPPED,
    // as indicated by execution status message for the Requirement (EffectStatus,
    // TaskStatus, etc.).
    RequirementTriggerType requirement_dropped = 15;
    // This trigger refers to a Requirement execution state transition to FAILED,
    // as indicated by execution status message for the Requirement (EffectStatus,
    // TaskStatus, etc.).
    RequirementFailedTriggerType requirement_failed = 16;
    // This trigger refers to a change to a Requirement that impacts an existing
    // plan. For example, a change of the position of the target of the
    // Requirement.
    RequirementTriggerType requirement_change = 17;
    // This trigger a Requirement that is not expected to meet its timing
    // constraints.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string requirement_timing = 18;
    // This trigger refers to an OpZone conflicts with the current plan.
    ZoneViolationTriggerDataType zone_violation = 19;
    // This trigger refers to the position along a future
    // planned/predicted/propagated orbit for a spacecraft exceeding a minimum
    // geospatial separation limit with another item or items.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string orbit_conflict = 20;
    // This trigger refers to a spacecraft that has deviated from its planned
    // orbit to such a degree that a replan is required.
    ThresholdOffOrbitTriggerDataType off_planned_orbit = 21;
    // This trigger refers to a low remaining endurance condition such as low fuel
    // or battery power. This trigger can further be specialized by setting
    // trigger thresholds in descendant elements.
    SatelliteEnduranceType spacecraft_endurance_low = 22;
    // This trigger refers to the proximity of two spacecraft (Systems, Entities
    // or other space items) that exceeded a minimum geospatial separation limit.
    // Monitoring for this trigger should be based on current position of live
    // items, not planned/predicted/propagated positions of Systems; see sibling
    // OrbitConflict element.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string spacecraft_proximity_conflict = 23;
    // This trigger indicates planning triggered by a Response and/or ResponsePlan.
    ResponseID_Type response_id = 24;
  }
}


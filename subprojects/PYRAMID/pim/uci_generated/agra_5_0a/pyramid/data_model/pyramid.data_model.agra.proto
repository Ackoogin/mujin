message PointingType {
  oneof choice {
    // Indicates the source of or explicit values for geospatial characteristics
    // of the target of the Command. When multiple points/targets are given, a
    // best-fit, multi-track or similar behavior is expected.
    PointingType_Geospatial_List geospatial = 1;
    // Indicates body or inertially referenced line of sight pointing angles

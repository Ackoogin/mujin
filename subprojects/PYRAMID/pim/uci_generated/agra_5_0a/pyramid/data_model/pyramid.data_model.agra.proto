  repeated CargoID_Type cargo_id = 1;
  // This element indicates the vehicle control strategy desired/required for
  // the cargo transition.
  VehicleControlStrategyEnum vehicle_control_strategy = 2;
  // Indicates the loading and/or unloading strategy for the cargo transition.
  CargoDeliverySubCapabilityEnum load_unload_strategy = 3;
  // Point of control and/or cargo transition (release, drop, pick-up, launch,
  // handover, etc.). For the case of independent hand-off and hand back points,

}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_AnalyticConstraintsType {
  // Indicates an operational constraint to achieve. The multiplicity is based
  // on the list of available OpConstraintEnums.
  repeated OpConstraintWeightingType op_constraint = 1;
  // Identifies the Risk Level constraint for each provided RiskPriortization
  // (max of 4).
  repeated SurvivabilityRiskSettingType risk_setting = 2;
  // Indicates access assessment analysis event thresholds.
  optional MA_AccessAssessmentFilterType access_assessment_threshold = 3;
  // Mission specific RF performance objective.
  optional RF_TaskPerformanceType rf_task_performance = 4;
}

// Indicates an operational constraint that is applied during the planning
// process.
// uci_version: 001.000.000.000
message OpConstraintWeightingType {
  // Specifies the type of operational constraint to use as a weighting/scoring
  // factor.
  OpConstraintEnum constraint = 1;
  // Indicates the extent to which the sibling Constraint influences the Plan.
  // See enumeration annotations for details.
  OpConstraintTypeEnum constraint_type = 2;
  // Indicates the range threshold or a discrete value that should be applied to
  // the constraint.
  OpConstraintWeightingValueType weighting = 3;
  // Justification for the constraint.
  optional FileLocationID_Type amplification_id = 4;
}

// Indicates operational constraints.
enum OpConstraintEnum {
  OP_CONSTRAINT_ENUM_UNSPECIFIED = 0;
  OP_CONSTRAINT_ENUM_ATTRIBUTION = 1;
  OP_CONSTRAINT_ENUM_COLLATERAL_DAMAGE = 2;
  OP_CONSTRAINT_ENUM_DEBRIS = 3;
  OP_CONSTRAINT_ENUM_DETECTION = 4;
  OP_CONSTRAINT_ENUM_DURATION = 5;
  OP_CONSTRAINT_ENUM_PREFERENCE = 6;
  OP_CONSTRAINT_ENUM_PRIORITY = 7;
  OP_CONSTRAINT_ENUM_PROBABILITY_OF_SUCCESS = 8;
  OP_CONSTRAINT_ENUM_PROTECTED_LOCATION = 9;
  OP_CONSTRAINT_ENUM_SENSOR_PROXIMITY = 10;
  OP_CONSTRAINT_ENUM_DEPLOYING_SYSTEM_FUEL = 11;
  OP_CONSTRAINT_ENUM_DEPLOYED_SYSTEM_FUEL = 12;
  OP_CONSTRAINT_ENUM_DEGRADATION = 13;
  OP_CONSTRAINT_ENUM_PROBABILITY_OF_HIT = 14;
  OP_CONSTRAINT_ENUM_PROBABILITY_OF_KILL = 15;
}

// Allows for a sibling operational constraint to be weighted by a discrete
// value or range threshold.
// uci_version: 001.000.000.000
message OpConstraintWeightingValueType {
  oneof choice {
    // Defines a specific percentage to which the operational constraint should be
    // taken into account.
    // xsd type: PercentType
    double discrete = 1;
    // Defines a threshold range to which the operational constraint should be
    // taken into account.
    PercentRangeType range = 2;
    // Defines high, medium, low values to which the operational constraint should
    // be taken into account.
    LikelihoodEnum likelihood = 3;
  }
}

// Defines a range of percentage values.
// uci_version: 001.000.000.000
message PercentRangeType {
  // Exclusive minimum value of the range (min, max]. Except for 0 which is
  // always inclusive [0, max].
  // xsd type: PercentType
  double minimum = 1;
  // Inclusive maximum value of the range (min, max].
  // xsd type: PercentType
  double maximum = 2;
}

// Indicates a high, medium, or low likelihood.
enum LikelihoodEnum {
  LIKELIHOOD_ENUM_UNSPECIFIED = 0;
  LIKELIHOOD_ENUM_LOW = 1;
  LIKELIHOOD_ENUM_MEDIUM = 2;
  LIKELIHOOD_ENUM_HIGH = 3;
}


  double max_separation_velocity = 3;
}

// Indicates when the product is needed by.
// uci_version: 000.000.000.000
message ProductNeededByType {
  oneof choice {
    // Indicates that the product or products is needed as soon as possible.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string as_soon_as_possible = 1;
    // Indicates that the product is needed by a particular Date/Time.
    // xsd type: DateTimeType (pattern .+Z)
    string absolute_time = 2;
    // Indicates that the product is needed no later by a particular time duration
    // after an observed event (e.g. Maneuver or Detection).
    // xsd type: DurationType
    string relative_to_event_time = 3;
  }
}

// Indicates the required, allowed, or excluded sensors. See parent element
// for additional context.
// uci_version: 002.000.000.000
message AllowableSensorsType {
  // Provides the minimum and maximum number of sensors used to accomplish the
  // task.
  optional SensorCountConstraintType sensor_count_constraint = 1;
  // Indicates the types of sensor systems and specific systems that only can be
  // used to accomplish the Orbital Surveillance Task.
  optional SensorConstraintsType required = 2;
  // Indicates the types of sensor systems and specific systems that can be used
  // to accomplish the Orbital Surveillance Task.
  optional SensorConstraintsType allowed = 3;
  // Indicates the types of sensor systems and specific systems that must not be
  // used to accomplish the Orbital Surveillance Task.
  optional SensorConstraintsType excluded = 4;
  // Indicates the sensor has to be capable of operating at this classification
  // level or higher.
  optional SecurityInformationType min_operating_classification_level = 5;
  // Indicates the service can generate and disseminate a product that doesn't
  // take an extensive amount of time (within a handful of minutes) between

    // characterizes unique emitter signatures that can be used for friendly or
    // enemy emitter identification and fingerprinting. A SEI and this
    // SpecificEmitter element refer to a specific physical instance of a type of
    // emitter as given in the sibling Emitter element.
    SpecificEmitterIdentityType specific_emitter = 6;
    // Indicates the specific, generally blue force, vehicle instance of the
    // Entity.
    VehicleIdentificationType specific_vehicle = 7;
    // Indicates the specific, generally blue force, vehicle instance of the
    // Entity.
    FacilityIdentificationType specific_facility = 8;
    // Indicates the EOB identity of the target.

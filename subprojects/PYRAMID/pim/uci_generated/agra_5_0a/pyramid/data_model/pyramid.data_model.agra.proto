  // xsd type: MilliwattPowerRatioType
  optional double gain = 4;
  // Define a center frequency or a list of center frequencies to be scanned.
  // xsd type: FrequencyType
  repeated double center_frequency = 5;
  // The list of frequency ranges that form the scan list.
  repeated FrequencyRangeType scan_range = 6;
  // The list of frequencies that the subsystem should not scan.
  repeated FrequencyRangeType scan_lockout = 7;
  // Defines the targets to be scanned for.
  optional COMINT_AcquisitionTargetType dwell_target = 8;
  // Defines targets to be ignored.

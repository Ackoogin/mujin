  // Indicates Assessed Objects of the AccessAssessment that are required to
  // match the filter. If omitted, any Assessed Object satisfies the filter.
  optional MA_AssetFilterType assessed_object = 4;
  // Indicates Access Event details necessary to match the filter. If omitted,
  // any Access Event satisfies the filter. Multiple instances are logically
  // ORed.
  repeated AccessEventFilterType access_event = 5;
}


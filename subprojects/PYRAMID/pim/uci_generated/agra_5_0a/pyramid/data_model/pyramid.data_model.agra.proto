}

// A zone comprises a two dimension region and an optional altitude band. If
// AltitudeReference is not specified, altitude is the WGS-84 height above the
// ellipsoid.
// uci_version: 002.000.002.001
message ZoneType {
  // Indicates the geometry used to define the zone area.
  AreaChoiceType shape = 1;
  // The lowest altitude boundary of this zone. If omitted the lower boundary is
  // the earth's surface. Altitude information found in the sibling Shape
  // element is invalid in all cases.
  // xsd type: AltitudeType
  optional double min_altitude = 2;
  // The highest altitude boundary of this zone. If omitted there isn't an upper
  // boundary. Altitude information found in the sibling Shape element is
  // invalid in all cases.
  // xsd type: AltitudeType
  optional double max_altitude = 3;
  // If specified, altitudes in MinAltitude and MaxAltitude will be dictated by
  // the measurement source enumeration.
  optional AltitudeReferenceEnum altitude_reference = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message AreaChoiceType {
  oneof choice {
    // Specifies the vertices of a polygon; three or more points and sides. These
    // can be absolute geospatial points or they can be geospatial points relative
    // to a specific reference frame.
    PolygonType polygon = 1;
    // An ellipse is defined by a center point and a circular or oval shape. An
    // ellipse can also be defined relative to a reference frame. Note that there
    // are two degrees of freedom for the ellipse orientation: 1. Using the
    // Orientation field within the ellipse the orientation of the ellipse within
    // the reference frame may be specified. 2. Using the orientation of the
    // reference frame specifies the orientation of every object relative to the
    // reference frame. As an example, two ellipses could be specified with
    // different orientations within the reference frame. When the reference frame
    // turns the orientation of the ellipses relative to each other would not
    // change but they both would rotate relative to true North.
    LocatedEllipseType ellipse = 2;
    // A rectangle is defined by a center point, a width, height, and orientation.
    LocatedRectangleType rectangle = 3;
    // An area defined by two ranges and two angles relative to a geospatial
    // point. The geospatial point can be stationary or it can be relative to a
    // moving object/location so its definition is an offset to a location defined
    // in ReferenceFrame.This allows for defining an area around a location/object
    // that is moving, i.e. the area moves along with a system or entity.
    SlantRangeAreaType slant_range_area = 4;
  }
}

// Specifies a polygon. The vertices of the polygon can be specified by
// geospatial locations or as locations relative to a separately defined
// reference frame. Simple polygons (including those in which interior
// polygons are defined within a bounding polygon) are supported.
// uci_version: 002.001.002.001
message PolygonType {
  // Indicates the type of lines that form the BoundingPolygon and any
  // InteriorPolygon definitions.
  LineProjectionEnum line_projection = 1;
  // Geospatial points defining the vertices of a simple polygon (i.e closed and
  // non-intersecting). These points are ordered and assumed to be unique.
  // Closure is assumed between the final point and the first point. Smaller
  // polygon areas within the BoundingPolygon can be excluded from its
  // functional/operational purpose using the sibling InteriorPolygon element.
  PolygonPointChoiceType bounding_polygon = 2;
  // Geospatial points defining the vertices of a simple polygon (i.e closed and
  // non-intersecting) whose vertices lie wholly inside the BoundingPolygon and
  // whose edges do not intersect with other InteriorPolygon definitions. These
  // points are ordered and assumed to be unique. Closure is assumed between the
  // final point and the first point. The area within an InteriorPolygon is
  // functionally/operationally equivalent to the area outside the sibling
  // Bounding Polygon.
  repeated PolygonPointChoiceType interior_polygon = 3;
}

// Indicates the method in which a line is created.
enum LineProjectionEnum {
  LINE_PROJECTION_ENUM_UNSPECIFIED = 0;
  LINE_PROJECTION_ENUM_GREAT_CIRCLE = 1;
  LINE_PROJECTION_ENUM_RHUMB = 2;
}


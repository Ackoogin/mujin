}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.001.000.000
message IFF_ModeS_Type {
  // The ICAO code containing a 24-bit value used to provide a unique identity
  // for a given aircraft. This is also called the Aircraft Address. See
  // MIL-STD-6016 for detailed definition.
  // xsd type: ICAO_AircraftAddressType
  uint32 icao = 1;
  // See simple type documentation.
  // xsd type: AircraftIdentifierType (pattern [A-Z0-9 ]{8})
  string aircraft_identifier = 2;
  // Indicates whether (TRUE) or not (FALSE) the corresponding IFF mode is
  // enabled.
  bool enabled = 3;
}

// Indicates an associated call sign. Multiple call signs are allowed for
// different communications systems, registries or other reasons. The use of
// ForeignKeyType is an indication that call signs aren't universally defined
// and come from multiple systems/sources but they are expected to be unique
// within the context of their source. For a call sign in UCI, the
// CallSignType.Key element indicates the call sign itself and the
// CallSignType.SystemName element indicates the system that assigned it and
// ensures it is unique. For example, a call sign that came from a Link-16
// system might have Key=Phantom01 and SystemName=Link16Voice.
// uci_version: 000.000.000.000
message CallSignType {
  // composed xsd extension base ForeignKeyType
  ForeignKeyType base = 1;
}


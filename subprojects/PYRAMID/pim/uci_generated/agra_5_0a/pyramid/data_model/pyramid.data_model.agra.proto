// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.001
message AMTI_TaskBaseType {
  // Indicates the Capability's first tier type in the AMTI taxonomy. For AMTI,
  // the first tier is an indication of the physical area covered. See
  // enumerated type annotations for further details.
  AMTI_CapabilityEnum capability_type = 1;
  // Indicates a SubCapability of the AMTI Capability; the second tier in the
  // taxonomy of AMTI. For AMTI, the second tier is waveform category. See
  // enumeration annotations for further details. List size for this element is
  // based on "Select All That Apply" condition.
  repeated AMTI_SubCapabilityEnum sub_capability_type = 2;
  // Indicates guidance regarding which aspect or aspects of collection to favor
  // if the command cannot be optimally scheduled as requested. See enumerated
  // type annotations for further details. Omitting this element is equivalent
  // to FLEXIBLE, that is deferring to the Command recipient.
  optional CollectionPolicyEnum collection_policy = 3;
  // Indicates constraints on the collection and/or processing.
  optional AMTI_CollectionConstraintsType collection_constraints = 4;
  // Indicates a desired output Product of the Task.
  repeated ProductOutputCommandBasicType output = 5;
}

// This type enumerates policies regarding which collection aspects should be
// favored for a collection Capability.
enum CollectionPolicyEnum {
  COLLECTION_POLICY_ENUM_UNSPECIFIED = 0;
  COLLECTION_POLICY_ENUM_COVERAGE = 1;
  COLLECTION_POLICY_ENUM_PERFORMANCE = 2;
  COLLECTION_POLICY_ENUM_COVERAGE_AND_PERFORMANCE = 3;
  COLLECTION_POLICY_ENUM_FLEXIBLE = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.002.000.001
message AMTI_CollectionConstraintsType {
  // composed xsd extension base CollectionConstraintsType
  CollectionConstraintsType base = 1;
  // Indicates the velocity below which moving targets should be assumed to be
  // surface moving targets despite being detected by AMTI, not initiated as
  // AMTI tracks and not reported as Entities.
  // xsd type: SpeedType
  optional double surface_mover_velocity_gate = 2;
  // Indicates the radar cross section (RCS) of targets which are of interest
  // for the Command. This element can be used to guide dwell times, inform
  // trackers, etc. If omitted RCS selection is left to discretion of the
  // command recipient.
  // xsd type: DecibelType
  optional double target_rcs = 3;
  // Indicates the acceptable false alarm level for outputs from the Command.
  // This element can be used to adjust the sensitivity of the Capability in
  // initiating tracks and reporting Entities. Lower numbers indicate a more
  // restrictive capability, i.e. fewer results. See FalseAlarmLevelUpperLimit
  // for further details. If omitted tracking range selection is left to the
  // discretion of the command recipient. A common range is [0,15].
  optional uint32 false_alarm_level = 4;
  // Used to control the RF emissions associated with this command. If this
  // field is not populated, the service determines all parameters.
  optional EmconConstraintType emcon = 5;
  // Indicates both closing and opening velocities. This is the Radial velocity
  // along the LOS to the sensor for each valid range of radial velocity i.e.,
  // Volume searches may have multiple radial velocities that are of interest.
  repeated SpeedRangeType target_radial_velocity = 6;
}

// Modeled after SensorSpecificData in the ACTDF standard.
// uci_version: 001.000.000.000
message CollectionConstraintsType {
  // True Map Angle. The true map angle is defined in the Northeast Down (NED)
  // coordinate system with the origin at the aircraft (aircraft local NED) as
  // the angle between the scene entry line of sight and the instantaneous
  // aircraft track heading vector. The aircraft track heading vector is
  // obtained by rotating the north unit vector of the aircraft local NED
  // coordinate system in the aircraft local NE plane through the aircraft track
  // heading angle. This angle is always positive.
  optional AngleHalfPairType map_angle_constraints = 1;
  // The angle at the target between the plane of the terrain and the line of
  // sight to the sensor. If the slope of the terrain is zero, this element is
  // equivalent to the sibling ElevationAngleConstraints.
  optional AngleQuarterPairType grazing_angle_constraints = 2;
  // The angle from true north to the line-of-sight vector from the sensor to
  // the target tangent plane.
  optional AnglePairType look_angle_constraints = 3;
  // The angle at the target between the flat surface (ellipsoid surface
  // ignoring terrain) and the line of sight to the sensor. If the slope of the
  // terrain is zero, this element is equivalent to the sibling
  // GrazingAngleConstraints.
  optional AngleHalfPairType elevation_angle_constraints = 4;
  // Distance from the sensor reference point (e.g. aperture reference point) to
  // the ground reference point.
  optional SlantRangeConstraintsType slant_range_constraints = 5;
  // This element defines the type of pattern that a vehicle should use to
  // collect over a large area. This can be specified when creating Tasks to
  // collect over OpZones, ZoneTargets, Entities (which have been specified as
  // zones), etc.
  optional CollectionPatternEnum collection_pattern = 6;
}

// Specifies a range of angles and will always go from the Min value to the
// Max value in the positive angle direction.
// uci_version: 001.000.000.000
message AngleQuarterPairType {
  // Minimum value of the quarter angle pair.
  // xsd type: AngleQuarterType
  double min = 1;
  // Maximum value of the quarter angle pair.
  // xsd type: AngleQuarterType
  double max = 2;
}

// Indicates the pattern to be used for the collection. It is generally
// applicable to non-CUED AMTI, especially when the search volume is large.
// See enumerated type annotations for further details.
enum CollectionPatternEnum {
  COLLECTION_PATTERN_ENUM_UNSPECIFIED = 0;
  COLLECTION_PATTERN_ENUM_ZAMBONI_HORIZONTAL = 1;
  COLLECTION_PATTERN_ENUM_ZAMBONI_VERTICAL = 2;
  COLLECTION_PATTERN_ENUM_RASTER_HORIZONTAL = 3;
  COLLECTION_PATTERN_ENUM_RASTER_VERTICAL = 4;
  COLLECTION_PATTERN_ENUM_BOXIN_HORIZONTAL = 5;
  COLLECTION_PATTERN_ENUM_BOXIN_VERTICAL = 6;
  COLLECTION_PATTERN_ENUM_BOXOUT_HORIZONTAL = 7;
  COLLECTION_PATTERN_ENUM_BOXOUT_VERTICAL = 8;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message EmconConstraintType {
  // Overrides the default emission control level in Capability settings to be
  // applied to this command.
  optional EmconOverrideType default_emcon_override = 1;
  // This field, if populated, is used to specify effective radiated power (ERP)
  // limitations applicable to this command.
  optional EmconERP_Type erp_selection = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message EmconOverrideType {
  oneof choice {
    // Specifies the emission control level to be used for this command.
    EmconLevelEnum emcon_level = 1;
    // If a service does not use a normative EmconLevel, foreign keys may be used
    // to specify the level.
    ForeignKeyType foreign_level = 2;
  }
}

// Indicates the level of emissions allowed.
enum EmconLevelEnum {
  EMCON_LEVEL_ENUM_UNSPECIFIED = 0;
  EMCON_LEVEL_ENUM_EMCON_LEVEL_1 = 1;
  EMCON_LEVEL_ENUM_EMCON_LEVEL_2 = 2;
  EMCON_LEVEL_ENUM_EMCON_LEVEL_3 = 3;
  EMCON_LEVEL_ENUM_EMCON_LEVEL_4 = 4;
  EMCON_LEVEL_ENUM_EMCON_LEVEL_5 = 5;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message EmconERP_Type {
  oneof choice {
    // This value determines the maximum absolute radiated effective radiated
    // power (ERP) at the face of the array to be used for this command. This
    // field can be used to limit output during testing to comply with RF
    // Licensing requirements.
    // xsd type: MilliwattPowerRatioType
    double maximum_radiated_erp = 1;
    // Specifies that the command should radiate at full power. Use of this flag
    // may cause degraded performance due to saturation of the receiver.
    bool radiate_full_power = 2;
  }
}


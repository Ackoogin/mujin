// See the annotation in the associated message for an overall description of
// the message and this type.
// uci_version: 000.000.000.000
message MA_PlanningFunctionMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // Indicates the state of the internal software object that the data in the
  // message is based upon. The state of the software object is determined by
  // the publisher. The publisher could be the original/master publisher or an
  // intermediary re-publisher such as a persistence/data manager. This element
  // is not a commanded CRUD operation. It is not an indication of the state of
  // an instance of a message. It is not a mechanism for partial, incremental,
  // or fragmentary publication of a message. It is a signal from a publisher to
  // subscribers. For REMOVED state, in particular, some subscribers will mirror
  // the publisher and treat the message as if the object no longer exists, but
  // others, such as mission recorders, might not (in order to support retaining
  // historical records of activity, for example).
  optional ObjectStateEnum object_state = 2;
  // Indicates the data being conveyed by the PlanningFunction message.
  MA_PlanningFunctionMDT message_data = 3;
}

// See the annotation in the associated message for an overall description of
// the message and this type.
// uci_version: 000.000.000.000
message MA_PlanningFunctionMDT {
  // Indicates a unique ID, assigned to this PlanningFunction.
  PlanningFunctionID_Type planning_function_id = 1;
  // Indicates the unique ID of the System whose planning functions are being
  // reported.
  SystemID_Type system_id = 2;
  // Indicates planning interfaces supported by the System. A supported
  // interface isn't necessarily enabled currently; see the PlanningStatus
  // message for current status/configuration of control interfaces advertised
  // here.
  repeated PlanningInterfacesType planning_interfaces = 3;
  // This element is used to describe the details of planning
  // interfaces/messages, specifically *PlanCommand interfaces of a System. It
  // provides discoverability of distinct planning process instances along with
  // the functional scope and output *Plan type or types. A planning
  // interface/process described here can only be invoked when the sibling
  // Interfaces element indicates it is enabled. Planning processes are
  // dynamically discoverable because Systems tend to have widely varying
  // planning functionality. Decomposing planning into discrete processes allows
  // planning functionality to be distributed across a service oriented system
  // of systems. Making planning processes discoverable encourages
  // planning-related services at multiple levels in a C2 hierarchy to adapt to
  // and simultaneously support Systems with different planning functionality
  // and processes.
  optional MA_PlanningInterfaceDetailsType planning_interface_details = 4;
  // Indicates capabilities of the System to perform plan activation
  // autonomously. Plan activations can be performed either at the MissionPlan
  // or SubPlan level.
  optional SupportedPlanActivationAutonomyType plan_activation_autonomy_details = 5;
  // This element is used to describe the details of scoring interfaces/messages
  // summarized in the sibling Interfaces element. It provides discoverability
  // of distinct scoring process instances along with the functional scope. A
  // scoring interface/process described here can only be invoked when the
  // sibling Interfaces ActivationState element indicates it is enabled. Plan
  // Scoring processes are dynamically discoverable because Systems tend to have
  // varying scoring algorithms. Decomposing plan scoring into discrete
  // processes allows scoring functionality to be distributed across a service
  // oriented system of systems.
  optional PlanScoringProcessType scoring_interface_details = 6;
}

// The ID type for UCI IDs that correspond to PlanningFunctions.
// uci_version: 000.000.000.000
message PlanningFunctionID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message PlanningInterfacesType {
  // composed xsd extension base PlanningInterfaceType
  PlanningInterfaceType base = 1;
  // Indicates how many of the *Plan indicated by the sibling PlanType can be
  // planned simultaneously by the System. For example, a System that supports
  // development of multiple "what-if" RouteActivityPlans for the same Mission
  // would indicate MULTIPLE_PARALLEL. A System supporting development of
  // current and future sequential RoutePlans for the same Mission would
  // indicate MULTIPLE_SERIAL. A System supporting development of only one
  // RoutePlan for a Mission would indicate SINGLE.
  PlanSimultaneityEnum plan_simultaneity = 2;
}

// See annotations in child elements and messages/elements that use this type

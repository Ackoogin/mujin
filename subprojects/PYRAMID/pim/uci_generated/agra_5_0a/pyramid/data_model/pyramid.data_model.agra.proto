enum OpConstraintTypeEnum {
  OP_CONSTRAINT_TYPE_ENUM_UNSPECIFIED = 0;
  OP_CONSTRAINT_TYPE_ENUM_SOFT = 1;
  OP_CONSTRAINT_TYPE_ENUM_HARD = 2;
}


// uci_version: 002.000.002.000
message PlanningGuidelineType {
  // Denotes the origin for planning. If omitted, the origin should be
  // determined by context. For example, during dynamic planning during live
  // operations the current position of the System could be used.
  optional PlanningPointType origin = 1;
  // Denotes the destination for planning. If there are multiple then it is up
  // to the planner to choose. Multiple destinations can give planning
  // algorithms the option to choose the safest/best end point (such as
  // alternate Egress points). If omitted, the destination should be determined
  // by context. For example, the planner could obtain all egress OpPoints
  // associated with the subject System and Mission and determine the best
  // egress destination.
  repeated PlanningPointPriorityType destination = 2;
  // Indicates that the System will vary its speed autonomously according to the
  // specified optimization algorithm. If omitted, it is N/A.
  optional SpeedOptimizationEnum speed_optimization = 3;
  // Indicates that the system will climb or descend at an autonomously chosen
  // rate according to the specified optimization algorithm. If omitted, it is
  // N/A.
  optional ClimbOptimizationEnum climb_optimization = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message PlanningPointType {
  oneof choice {
    // Specifies a specific location to use for planning. This choice is intended
    // for users/services, such as allocators or route planners, which have and
    // care to specify detailed vehicle routes and position data.
    PlanningLocationType specific = 1;
    // Specifies an OpPoint to use for planning. This choice is intended for cases
    // including pre-mission planning initiated at an ingress OpPoint, the first
    // cycle of dynamic mission planning prior to the vehicle reaching its ingress
    // OpPoint, etc.
    OpPointID_Type op_point_id = 2;
    // Specifies a future time to use to establish/calculate/determine the point
    // to use for planning. This choice is intended for users/services which don't
    // necessarily have, or care to specify, detailed vehicle position data.
    // Allocation and planning services would then be expected to determine a
    // location corresponding to this Time, based on the current/previous *Plan or
    // other information.
    // xsd type: DateTimeType (pattern .+Z)
    string time = 3;
  }
}


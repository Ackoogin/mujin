  ActionID_Type action_id = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_RequirementExecutionStatusDetailsType {
  // Indicates the ID of the System or package executing the Requirement; the
  // System or package whose status on execution of the Requirement is reported
  // in sibling elements. *Plans and Requirements must be managed such that only
  // a single System or package executes a given Requirement.
  MA_PackageSystemType executing_system_or_package = 1;
  // Identifies the state of the Requirement.
  RequirementExecutionStateEnum execution_state = 2;
  // Indicates details regarding the reason for and/or a contributing factor to
  // the sibling State element. This element is only expected when the State is
  // in a potentially undesirable state such as failed or completed with less
  // than optimum results. It is strongly encouraged for transitions to failed
  // or dropped.
  optional CannotComplyType execution_state_reason = 3;
  // Indicates actual timing status for the Requirement. Allows for defining for
  // each timing type (RequirementTimingEnum).
  repeated RequirementTimingType actual_timing = 4;
  // Percentage of assigned Requirement completion. The percentage increments
  // until the Requirement has COMPLETED or FAILED. A percent complete of 0
  // indicates the Requirement has not yet begun execution, and a failed
  // Requirement may have any percentage between 1 - 99.
  // xsd type: PercentType
  optional double percent_completed = 5;
  // Indicates traceability to the sources and implementation of the
  // Requirement. During the life cycle of execution of a Requirement, the
  // traceability can change/update. Traceability can vary depending on a given
  // System's architecture. For example, traceability to only a CommandID is
  // reasonable if the architecture includes [Capability]Commands without *Plans
  // or [Capability]Activities. Both CommandID and ActivityID are reasonable for
  // architectures where a single [Capability]Command could generate one or
  // multiple [Capability]Activities, e.g. a SAR command could result in
  // multiple activities to cover the area. ActivityID only is reasonable for
  // architectures where [Capability]Activities can originate automatically
  // without *Plans or [Capability]Commands.
  optional MA_RequirementStatusTraceabilityType traceability = 6;
  // Specifies the actual metrics associated with the Requirements.
  optional MetricsType metrics = 7;
}


  oneof choice {
    // A list of azimuth angle, elevation angle and (if desired) range distance
    // pairs/triplets desired for a sensor collection.
    SensorPointListType_AzimuthElevationRangePointList_List azimuth_elevation_range_point_list = 1;
    // A list of right ascension angle and declination angle pairs desired for a
    // sensor collection.
    SensorPointListType_RightAscensionDeclinationPointList_List right_ascension_declination_point_list = 2;
    // A list of latitudes, longitudes, altitudes, and optional times desired for
    // a sensor collection.
    SensorPointListType_Point3DList_List point3_d_list = 3;
  }
}

// The Range, Azimuth, and Elevation point.
// uci_version: 001.000.000.000
message AzimuthElevationRangePointType {
  // Indicates the time the point was defined, or a future time the point will
  // be at.
  // xsd type: DateTimeType (pattern .+Z)
  string time = 1;
  // Indicates the azimuth from an observation point to a point of interest.
  // Azimuth is defined as the angle between two lines in a global horizontal
  // plane at the observation point. The first line is from the observation
  // point to true north. The second line is from the observation point to the
  // point of interest projected onto the global horizontal plane. An azimuth of
  // zero indicates true north with values increasing clockwise. The terms
  // azimuth and bearing are often used interchangeably but they are technically
  // different. Azimuth values are angles between 0 and 2*Pi radians (0 and 360
  // degrees) relative to north, in this case true north. Bearing values are a
  // combination of a reference direction (north or south) and an angle between
  // 0 and Pi radians (0 and 180 degrees) towards the east or west direction.
  // For example, an azimuth of Pi/2 radians (90 degrees) is equivalent to a
  // bearing of "North 90 East" or "South 90 East". UCI uses azimuth because it
  // is easier for machine/software use.
  // xsd type: AnglePositiveType
  double azimuth = 2;
  // Indicates the elevation from an observation point to a point of interest.
  // Elevation is defined as the angle between two lines in a global vertical
  // plane at the observation point. The first line originates from the
  // observation point and extends along the azimuth. The second line is from
  // the observation point to the point of interest. An elevation of zero
  // indicates the point of interest is in the observation point's horizontal
  // plane. Elevation values are positive when the point of interest is above
  // the horizontal plane, negative when below.
  // xsd type: AngleType
  double elevation = 3;
  // Indicates the line-of-sight distance between the observation point and
  // point of interest.
  // xsd type: DistanceType
  double range = 4;
}

// synthesized list wrapper for repeated choice member AzimuthElevationRangePointList in SensorPointListType (choice)
message SensorPointListType_AzimuthElevationRangePointList_List {
  repeated AzimuthElevationRangePointType items = 1;
}

// The Right Ascension and Declination point.
// uci_version: 001.000.000.000
message RightAscensionDeclinationPointType {
  // Indicates the time the point was defined, or a future time the point will
  // be at.
  // xsd type: DateTimeType (pattern .+Z)
  string time = 1;
  // RightAscension is the angular distance measured only eastward along the
  // celestial equator from the Sun at the March equinox to the (hour circle of
  // the) point above the earth in question. When paired with declination, these
  // astronomical coordinates specify the direction of a point on the celestial
  // sphere in the equatorial coordinate system.
  // xsd type: AnglePositiveType
  double right_ascension = 2;
  // Declination is one of the two angles that locate a point on the celestial
  // sphere in the equatorial coordinate system, the other being hour angle.
  // Declination's angle is measured north or south of the celestial equator,
  // along the hour circle passing through the point in question.
  // xsd type: AngleType
  double declination = 3;
}

// synthesized list wrapper for repeated choice member RightAscensionDeclinationPointList in SensorPointListType (choice)
message SensorPointListType_RightAscensionDeclinationPointList_List {
  repeated RightAscensionDeclinationPointType items = 1;
}

// synthesized list wrapper for repeated choice member Point3DList in SensorPointListType (choice)
message SensorPointListType_Point3DList_List {
  repeated Point3D_Type items = 1;
}


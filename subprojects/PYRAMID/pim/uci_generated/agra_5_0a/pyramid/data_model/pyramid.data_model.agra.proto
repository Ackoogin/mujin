// Indicates the common status information for all *PlanCommands.
// uci_version: 002.000.002.000
message PlanCommandStatusType {
  // Indicates the status of the command.
  CommandProcessingStateEnum command_processing_state = 1;
  // Indicates details regarding the reason for and/or a contributing factor to
  // the sibling CommandProcessingState element. This element is only expected
  // when the Command is in a potentially undesirable state such as rejected,
  // canceled or accepted with less than optimum results expected.
  optional CannotComplyType command_processing_state_reason = 2;
  // Indicates the status of the command.
  ProcessingStatusEnum command_status = 3;
  // Indicates actual and predicted metrics for completion of the command.
  optional CompletionStatusType completion_status = 4;
  // Indicates items associated with command processing that failed to complete.
  // For example if a particular required Capability wasn't available, it could
  // be referenced here. This element/type is highly flexible. It can reference
  // almost any message/concept in UCI as a planning issue. The wide range of
  // messages/concepts it can reference makes it 1) difficult to use as a basis
  // for software/services to resolve the issue but 2) an excellent general
  // method for processing algorithms to convey issues to operators. This
  // element shouldn't be used to report processing issues/results that are more
  // directly indicated by other processing status elements. For example, for
  // planning processing, other elements focus specifically on per-Requirement
  // allocation results therefore this element shouldn't be used for
  // per-Requirement allocation results.
  repeated IncompleteProcessingType incomplete_item = 5;
}

// Indicates the state of the associated command.
enum CommandProcessingStateEnum {
  COMMAND_PROCESSING_STATE_ENUM_UNSPECIFIED = 0;
  COMMAND_PROCESSING_STATE_ENUM_RECEIVED = 1;
  COMMAND_PROCESSING_STATE_ENUM_ACCEPTED = 2;
  COMMAND_PROCESSING_STATE_ENUM_REJECTED = 3;
  COMMAND_PROCESSING_STATE_ENUM_CANCELED = 4;
}

// Indicates the processing status of a request or command.
enum ProcessingStatusEnum {
  PROCESSING_STATUS_ENUM_UNSPECIFIED = 0;
  PROCESSING_STATUS_ENUM_QUEUED = 1;
  PROCESSING_STATUS_ENUM_PROCESSING = 2;
  PROCESSING_STATUS_ENUM_COMPLETED = 3;
  PROCESSING_STATUS_ENUM_FAILED = 4;
}

// A generic type that allows the specification of incremental status. Usually
// populated when reporting a status of "Processing".
// uci_version: 001.000.000.000
message CompletionStatusType {
  // Estimated time that the process will be completed.
  // xsd type: DateTimeType (pattern .+Z)
  optional string estimated_time_complete = 1;
  // Estimated percentage of the process that has been completed.
  // xsd type: PercentType
  optional double estimated_percent_complete = 2;
  // Record of the actual time that the operation started.
  // xsd type: DateTimeType (pattern .+Z)
  optional string actual_time_started = 3;
  // Record of the actual time that operation completed.
  // xsd type: DateTimeType (pattern .+Z)
  optional string actual_time_complete = 4;
  // Text field to communicate a description of the status to the operator.
  // xsd type: VisibleString1024Type (pattern [ -~]{0,1024})
  optional string description = 5;
}

// When processing multiple items (e.g. vehicle mission plans, route
// vulnerability assessments), this represents an item that failed to process
// successfully.
// uci_version: 001.000.002.000
message IncompleteProcessingType {
  // Indicates the unique ID of the item (message, System, Task, etc.) that
  // failed to process. For example, if information for a particular vehicle was
  // incomplete then the vehicle's SystemID might be given here to indicated
  // planning/processing for that vehicle is/was incomplete.
  ID_Type incomplete_item_id = 1;
  // Indicates the reason why the processing on the item failed and/or generally
  // cannot be completed satisfactorily. See enumeration annotations for further
  // details.
  CannotComplyEnum reason = 2;
  // A human-readable text description of the reason the processing can not
  // complete satisfactorily.
  // xsd type: VisibleString1024Type (pattern [ -~]{0,1024})
  optional string description = 3;
}


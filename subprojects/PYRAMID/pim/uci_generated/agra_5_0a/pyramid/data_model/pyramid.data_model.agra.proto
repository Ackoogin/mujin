// Defines the approval policy and timeout approval policy for an activity.
// uci_version: 000.000.000.000
message ApprovalPolicyBaseType {
  // Indicates the approval policy for the applicable activity. See enumeration
  // annotations for further details.
  ApprovalRequirementEnum policy = 1;
  // Indicates the "timeout" approval policy, used when approval authorities
  // don't respond in a timely fashion. This element is required when the
  // sibling Policy element indicates APPROVAL_REQUIRED and is ignored otherwise.
  optional DefaultResponseType timeout_policy = 2;
}

// This enumerated type represents the types of approval.
enum ApprovalRequirementEnum {
  APPROVAL_REQUIREMENT_ENUM_UNSPECIFIED = 0;
  APPROVAL_REQUIREMENT_ENUM_APPROVAL_REQUIRED = 1;
  APPROVAL_REQUIREMENT_ENUM_AUTO_APPROVE = 2;
  APPROVAL_REQUIREMENT_ENUM_AUTO_REJECT = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message DefaultResponseType {
  // This field identifies how the tasked system should behave if the authority
  // does not respond in a timely fashion. It can be viewed as setting the
  // system's level of autonomy. If the default response is Rejected, the system
  // is "managed by consent." If the default response is Approved, it is
  // "managed by exception.".
  ApprovalResponseEnum approval_type = 1;
  // The time interval after which the default response will occur if an
  // explicit approval response has not been received for a given approval
  // request. For example, if a request for task allocation approval is sent,
  // the sender will perform the default response if a corresponding approval
  // response is not received within this time interval after the request is
  // sent.
  // xsd type: DurationType
  string timeout = 2;
}

// This enumerated type represents the approval response.
enum ApprovalResponseEnum {
  APPROVAL_RESPONSE_ENUM_UNSPECIFIED = 0;
  APPROVAL_RESPONSE_ENUM_APPROVED = 1;
  APPROVAL_RESPONSE_ENUM_REJECTED = 2;
}


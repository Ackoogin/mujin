// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message IdentityConfidenceType {
  // Indicates a possible "standard identity" of the Entity. The value of the
  // child Confidence element of all instances of this element should sum to
  // 100%. If multiple instances are given, each must be of a different standard
  // identity as indicated by the child element.
  repeated StandardIdentityConfidenceType standard = 1;
  // Indicates a possible "environment" of the Entity. The value of the child
  // Confidence element of all instances of this element should sum to 100%. If
  // multiple instances are given, each must be of a different environment type
  // as indicated by the child element.
  repeated EnvironmentIdentityConfidenceType environment = 2;
  // Indicates a possible "platform identity" of the Entity. The value of the
  // child Confidence element of all instances of this element should sum to
  // 100%.
  repeated PlatformIdentityConfidenceType platform = 3;
  // Indicates a possible "specific identity" of the Entity. The value of the
  // child Confidence element of all instances of this element should sum to
  // 100%.
  repeated SpecificIdentityConfidenceType specific = 4;
  // Indicates an emitter that has been identified in association with the
  // Entity. An Entity can have multiple emitters each of which are represented
  // by one instance of this element. Each emitter can in turn have an ambiguity
  // list of emitter types indicated by descendant elements.
  repeated EmitterMultipleType emitter = 5;
  // Indicates a specific emitter instance that has been identified in
  // association with the Entity. An Entity can have multiple emitters and
  // therefore multiple specific emitters. Each specific emitter can in turn
  // have an ambiguity list of specific emitter instance possibilities as
  // indicated by descendant elements.
  repeated SpecificEmitterMultipleType specific_emitter = 6;
  // Indicates a possible specific vehicle instance, generally a blue forces
  // vehicle, that has been identified in association with the Entity. The value
  // of the child Confidence element of all instances of this element should sum
  // to 100%.
  repeated SpecificVehicleIdentityConfidenceType specific_vehicle = 7;
  // Indicates a possible specific facility instance, generally a blue forces
  // facility, that has been identified in association with the Entity. The
  // value of the child Confidence element of all instances of this element
  // should sum to 100%.
  repeated SpecificFacilityIdentityConfidenceType specific_facility = 8;
  // Indicates a possible identity of the Entity in the taxonomy/nomenclature of
  // the Electronic Order of Battle (EOB). The value of the child Confidence
  // element of all instances of this element should sum to 100%.
  repeated EOB_IdentityConfidenceType eob = 9;
  // Indicates a specific weapon instance that has been identified in
  // association with the Entity. An Entity can have multiple weapons. Each
  // weapon can in turn have an ambiguity list of specific weapon instance
  // possibilities as indicated by descendant elements.
  repeated StoreMultipleType weapon = 10;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.001.001.001
message StandardIdentityConfidenceType {
  // composed xsd extension base StandardIdentityType
  StandardIdentityType base = 1;
  // Indicates the confidence of the StandardIdentity declaration.
  // xsd type: PercentType
  double confidence = 2;
  // The entity's exercise identity and allegiance. The sibling StandardIdentity
  // is expected to be FRIEND and the sibling Confidence element is expected to
  // be 100% when this optional element is used. Derived from MIL-STD-6016; see
  // MIL-STD-6016 DFI/DUI 376/001 for additional details.
  optional ExerciseIdentityType exercise_identity_data = 3;
  // Indicates a type of special interest track like KILO, ZOMBIE, TRAVELER, etc.
  optional SpecialIdentityEnum special_identity = 4;
}

// Contains identity information specific to a military exercise.
// uci_version: 000.001.001.000
message ExerciseIdentityType {
  // A descriptor adding to the Exercise identity of a track.
  optional ExerciseIdentityEnum exercise_identity = 1;
  // DOD standard country code designator to which an entity exercise
  // representation owes its allegiance.
  optional CountryCodeType allegiance = 2;
}

// A descriptor adding to the standard identity of a track.
enum ExerciseIdentityEnum {
  EXERCISE_IDENTITY_ENUM_UNSPECIFIED = 0;
  EXERCISE_IDENTITY_ENUM_PENDING = 1;
  EXERCISE_IDENTITY_ENUM_UNKNOWN = 2;
  EXERCISE_IDENTITY_ENUM_ASSUMED_FRIEND = 3;
  EXERCISE_IDENTITY_ENUM_FRIEND = 4;
  EXERCISE_IDENTITY_ENUM_NEUTRAL = 5;
  EXERCISE_IDENTITY_ENUM_JOKER = 6;
  EXERCISE_IDENTITY_ENUM_FAKER = 7;
  EXERCISE_IDENTITY_ENUM_UNDEFINED = 8;
}

// Indicates a type of special interest track like KILO, ZOMBIE, TRAVELER, etc
enum SpecialIdentityEnum {
  SPECIAL_IDENTITY_ENUM_UNSPECIFIED = 0;
  SPECIAL_IDENTITY_ENUM_KILO = 1;
  SPECIAL_IDENTITY_ENUM_ZOMBIE = 2;
  SPECIAL_IDENTITY_ENUM_TRAVELER = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.001
message EnvironmentIdentityConfidenceType {
  // Indicates the environment or "domain" in which the Entity is operating.
  // Derived from MIL-STD-6016; see MIL-STD-6016 DFI/DUI 275/004 for additional
  // details. Each environment has a corresponding set of specific types.
  EnvironmentEnum environment = 1;
  // Indicates the predominant orbital regime of the Entity, which is not always
  // the current orbital regime. This element is a supplemental, more detailed
  // description of the orbit when the environment is SPACE.
  optional OrbitRegimeType orbit_regime = 2;
  // Indicates if a Ground entity is a point or a track.
  optional PointTrackEnum point_track = 3;
  // Indicates the confidence of the declaration of the Entity's environment.
  // xsd type: PercentType
  double confidence = 4;
}

// The enumeration defining if a ground entity is a point or a track.
enum PointTrackEnum {
  POINT_TRACK_ENUM_UNSPECIFIED = 0;
  POINT_TRACK_ENUM_POINT = 1;
  POINT_TRACK_ENUM_TRACK = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.002.001
message PlatformIdentityConfidenceType {
  // composed xsd extension base PlatformIdentityType
  PlatformIdentityType base = 1;
  // Indicates the confidence of the declaration of the Entity's PlatformType.
  // xsd type: PercentType
  double confidence = 2;
}

// Indicates the confidence of the declaration of the Entity's Identity.
// uci_version: 001.000.001.000
message SpecificIdentityConfidenceType {
  // composed xsd extension base SpecificIdentityType
  SpecificIdentityType base = 1;
  // Indicates the confidence of the declaration of the Entity's SpecificType.
  // xsd type: PercentType
  double confidence = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.001.000
message EmitterMultipleType {
  // Indicates a possible emitter type that has been identified/observed for the
  // parent Emitter. The value of the child Confidence element of all instances
  // of this element should sum to 100%.
  repeated EmitterIdentityConfidenceType emitter_type = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.001.001.000
message EmitterIdentityConfidenceType {
  // Indicates the emitter identification based on its category choice of radar
  // or communications subsystem.
  EmitterIdentityType emitter_category = 1;
  // Indicates the confidence of the declaration of the Entity's ELNOT.
  // xsd type: PercentType
  double confidence = 2;
  // Number of emitter parameters detected, measured, and successfully compared
  // with intelligence files.

    // Indicates that the target of the Orbital Surveillance Sensor Task is
    // defined by an element set cloud. This method is used currently to set up
    // searches when limited information on a recently found object leads to
    // non-trivial uncertainty in the estimate of the orbital parameters (target
    // has a high likelihood of not being in the acquisition basket of a sensor
    // receiving an orbital state estimate in a hand-off). A tested approach for
    // defining a search to be used by a sensor tasked for follow-up is to create
    // a set of candidate orbital states that span the uncertainty in such a way
    // that a sensor that attempts to acquire on each element set during a defined
    // time window will have a high likelihood of acquiring the object.
    ElementSetCloudType element_set_cloud = 2;
    // Indicates that the target of the Orbital Surveillance Sensor Task is a
    // specified object or objects or relative to a specified object.
    OrbitalSurveillanceObjectsType object_based = 3;
    // Indicates that the target of the Orbital Surveillance Sensor Task is

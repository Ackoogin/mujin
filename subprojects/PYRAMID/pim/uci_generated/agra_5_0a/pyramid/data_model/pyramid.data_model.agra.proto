    // Indicates the target is a geospatial point.
    PointTargetType point_target = 9;
    // Indicates the target is a geospatial zone.
    ZoneExternalType zone_target = 10;
    // Indicates the target is a geospatial volume.
    OpVolumeType volume_target = 11;

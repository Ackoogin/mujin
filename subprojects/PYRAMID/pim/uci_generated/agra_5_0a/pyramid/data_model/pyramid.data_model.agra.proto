  // point to the weapon release point. Because of wrap-around Max value can be
  // smaller than Min value.
  optional AnglePairType ingress_constraint = 3;
  // The Min and Max Egress Angle defines the acceptable range of
  // bearing-from-target values that the strike vehicle must satisfy after
  // weapon release. Bearing from target is defined as the true heading from the
  // target point to the weapon release point. Because of wrap-around Max value
  // can be smaller than Min value.
  optional AnglePairType egress_constraint = 4;
  // This element defines the point from which to ingress. This element can be
  // provided in an ATO. Otherwise, the IP can be left to the tasked system.
  optional Point3D_Type initial_point = 5;
  // Specifies constraints on the release conditions of the weapon.
  optional StrikeTaskReleaseConstraintsType release_constraints = 6;
  // Indicates weapon or weapons for the Strike.
  optional StrikeTaskWeaponListType weapon_list = 7;
  // If element is present, indicates this task should be planned as if it does
  // not expend a weapon. It still requires that the needed store types still be
  // available at time of execution. It is intended that this task will only be
  // executed if the primary task was unable to be completed for any reason. In
  // the off nominal case where this task is required to execute, the ability to
  // execute tasks after this will have to be reevaluated.
  // xsd type: EmptyType (pattern [A-Za-z]{0})
  optional string no_strike = 8;

// uci_version: 002.000.002.000
message SlantRangeAreaType {
  // The Radius about a point.
  SlantRangeConstraintsType radius = 1;
  // The angle measured clockwise with True North at 0. This is used to
  // calculate the azimuth extent for a tracking area around a designated point,
  // entity, ownship, or system.
  AnglePairType azimuth_extent = 2;
  // This element represents the orientation as the angle between the area and
  // the orientation of the reference frame.
  // xsd type: AngleHalfType
  double orientation = 3;
  // The location of the slant range area.
  PointChoiceType point_choice = 4;
}

// See annotations in child elements and messages/elements that use this type

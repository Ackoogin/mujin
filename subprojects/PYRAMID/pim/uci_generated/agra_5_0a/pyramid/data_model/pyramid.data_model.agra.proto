  // Indicates the state of the command. The command state machine assumes that
  // the Command and CommandStatus messaging interaction is only used to
  // communicate the desired Command to the Subsystem or Service. The state
  // machine and messaging terminates as soon as the host accepts or rejects the
  // Command. See enumeration annotations for further details.
  CommandProcessingStateEnum command_processing_state = 2;
  // Indicates details regarding the reason for and/or a contributing factor to
  // the sibling CommandProcessingState element. This element is only expected
  // when the Command is in a potentially undesirable state such as rejected,
  // canceled or accepted with less than optimum results expected.

    WeaponRestrictionType_WeaponsAllowed_List weapons_allowed = 1;
    // Weapons of this type are restricted against a target type and or within a
    // zone.
    WeaponRestrictionType_WeaponsNotAllowed_List weapons_not_allowed = 2;
  }
}

// synthesized list wrapper for repeated choice member WeaponsAllowed in WeaponRestrictionType (choice)
message WeaponRestrictionType_WeaponsAllowed_List {

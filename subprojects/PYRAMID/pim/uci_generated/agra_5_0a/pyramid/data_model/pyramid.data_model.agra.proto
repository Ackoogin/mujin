// uci_version: 002.000.002.000
message COMINT_InteractiveType {
  // Indicates the detection threshold level.
  // xsd type: MilliwattPowerRatioType
  optional double threshold = 1;
  // Enables and disables the noise adaptive threshold.
  optional NoiseAdaptiveThresholdStatusEnum noise_adaptive_threshold_status = 2;
  // Allows an external controller to enable or disable the Automatic Gain

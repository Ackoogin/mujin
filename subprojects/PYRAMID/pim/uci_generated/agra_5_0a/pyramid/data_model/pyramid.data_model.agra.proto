  ENVIRONMENT_ENUM_SEA_SUBSURFACE = 5;
  ENVIRONMENT_ENUM_UNKNOWN = 6;
}

// Indicates the orbit characteristics of a space object.
// uci_version: 000.000.000.000
message OrbitRegimeType {
  // Orbit regime of a space object.
  OrbitRegimeEnum orbit_regime = 1;
  // Orbit class of space object, a space object can have multiple orbit
  // classes. List size for this element is based on "Select All That Apply"
  // condition.
  repeated OrbitClassEnum orbit_class = 2;

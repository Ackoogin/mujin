// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_MissionPlanMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // Indicates the state of the internal software object that the data in the
  // message is based upon. The state of the software object is determined by
  // the publisher. The publisher could be the original/master publisher or an
  // intermediary re-publisher such as a persistence/data manager. This element
  // is not a commanded CRUD operation. It is not an indication of the state of
  // an instance of a message. It is not a mechanism for partial, incremental,
  // or fragmentary publication of a message. It is a signal from a publisher to
  // subscribers. For REMOVED state, in particular, some subscribers will mirror
  // the publisher and treat the message as if the object no longer exists, but
  // others, such as mission recorders, might not (in order to support retaining
  // historical records of activity, for example).
  optional ObjectStateEnum object_state = 2;
  // Indicates the data being conveyed by the message.
  MA_MissionPlanMDT message_data = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_MissionPlanMDT {
  // Indicates a unique ID assigned to the MissionPlan. Minor updates to the
  // Plan can be indicated by an update of the value in the child Version
  // element. More significant updates, replacements, etc. might warrant a new
  // Plan with a different child UUID value.
  MissionPlanID_Type mission_plan_id = 1;
  // Indicates the unique ID of the *PlanCommand which this MissionPlan
  // originated from.
  optional MissionPlanCommandID_ChoiceType mission_plan_command_id = 2;
  // Indicates the System or Systems which have a direct relationship with the
  // Mission Plan. See annotations for the underlying type and its child
  // elements for details.
  MA_PlanApplicabilityType applicability = 3;
  // The time window for which the Plan is applicable.
  optional DateTimeRangeType window = 4;
  // Indicates the set of *Plans which are included as part of the MissionPlan.
  // The included SubPlans share the same Applicability as the MissionPlan.
  optional MA_PlansReferenceBaseType sub_plans = 5;
  // Indicates the MissionPlan's flow of execution when there are multiple
  // kinematic and action plans. The kinematic and action plans are combined
  // into sets and given unique IDs. An execution flow may be created by linking
  // *ExecutionPlanSets of different types (e.g. OrbitExecutionPlanSet and
  // RouteExecutionPlanSet).
  optional ExecutionSequenceType execution_sequence = 6;
  // Indicates a MissionPlan that is the parent of this MissionPlan.
  repeated MissionPlanID_Type parent_mission_plan_id = 7;
  // Indicates a MissionPlan that is subordinate to this MissionPlan.
  repeated MissionPlanID_Type subordinate_mission_plan_id = 8;
  // When TRUE, indicates the *Plan is to be used only for intermediate planning
  // purposes. It will eventually be replaced/superseded by another *Plan or be
  // discarded/abandoned. *Plans with this flag should only be used when
  // explicitly referenced by other messages. These *Plans should never: trigger
  // functionality, be subject to approvals, be activated, etc.
  bool for_planning_use_only = 9;
  // Indicates inputs that were given in the *PlanCommand (or equivalent
  // automated replan) to create the Plan.
  optional MA_MissionPlanInputsType plan_inputs = 10;
  // Indicates information about the mission plan from an operator intended for
  // display. Both short and longer detailed information can be provided.
  optional RemarksType remarks = 11;
}


// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.001.000.000
message CloudsType {
  // Indicates the extent of cloud cover in the sky: CLEAR 0/8, FEW 1/8-2/8,
  // SCATTERED 3/8-4/8, BROKEN 5/8-7/8, OVERCAST 8/8.
  optional WeatherCloudCoverEnum cloud_cover = 1;
  // Human observation has been the traditional method of measuring cloud cover,
  // and there is a specific measurement, the okta, that is used to describe the
  // presence of clouds in the sky. To use oktas, the observer should look
  // straight up at the sky and imagine it is split into eight equal wedges, or
  // oktas, radiating out from a central point directly overhead. If one okta is
  // fully covered and the rest are clear, the sky can be described as having
  // one okta of cloud cover.
  // xsd type: OktaType
  optional uint32 cloud_cover_amplification = 2;
  // Indicates the altitude of the cloud floor/base.
  // xsd type: AltitudeType
  optional double cloud_floor = 3;
  // Indicates the altitude of the cloud ceiling/tops.
  // xsd type: AltitudeType
  optional double cloud_ceiling = 4;
}


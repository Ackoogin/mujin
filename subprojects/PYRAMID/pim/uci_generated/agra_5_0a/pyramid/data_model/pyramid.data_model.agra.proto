  repeated DMPI_AllocationType required_dmpi = 1;
  // Indicates the AO/laser PRF and/or PIM code to be used with the Requirement.
  // This element is applicable for laser designation or laser guided weapon
  // Requirements.
  optional AO_CodeType required_ao_code = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.001
message DMPI_AllocationType {
  // Indicates the ID of a DMPI associated with the Requirement. This element is
  // only applicable for kinetic weapon Requirements. This element allows
  // preliminary/estimated DMPIs to be associated with a Requirement and planned
  // prior to formal/final DMPIs and DMPI_Designations being created.
  DMPI_ID_Type dmpi_id = 1;
  // Indicates the relative ranking of DMPIs being associated to a Requirement.
  optional ComparableRankingType dmpi_ranking = 2;
  // Indicates a kinetic weapon Capability instance associated with the sibling
  // DMPI. Optional when any instance of Capability (of the Capability type
  // inferred by the Requirement) on the allocated System will suffice. Multiple
  // instances of this element can be used for Requirements with multiple
  // kinetic weapons assigned to a single DMPI.
  repeated CapabilityID_Type capability_id = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message AO_CodeType {
  // Joint Pub 3-09.1 indicates the following regarding PRF Code values:
  // "...Depending on the laser equipment, either a three or four-digit code can
  // be set. Three digit code equipment settings range from 111 to 788.
  // Four-digit code equipment settings range from 1111 to 1788.".
  // xsd type: AO_PRF_CodeType (pattern 1?[1-7][1-8]{2})
  optional string prf_code = 1;
  // 4 digit PIM (Pulse Internal Modulation) Code.
  // xsd type: AO_PIM_CodeType (pattern [0-9]{4})
  optional string pim_code = 2;
}


    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string cd_course_to_dme_distance = 3;
    // Course to Fix Civil Path Terminator Type. This path terminates at a fixed
    // point with a specified course at that fix.
    CF_CourseToFixType cf_course_to_fix = 4;
    // Course to Intercept Civil Path Terminator Type. This element's children
    // elements are subject to change over the course of development.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string ci_course_to_intercept = 5;
    // Course to Radial Civil Path Terminator Type. This element's children

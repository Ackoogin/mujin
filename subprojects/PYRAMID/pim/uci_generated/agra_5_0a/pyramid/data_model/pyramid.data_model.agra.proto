  oneof choice {
    // Indicates the footprint boundary as a ground/surface polygon, any part of
    // which can be reached given the remaining endurance.
    PolygonType polygon = 1;
    // Indicates the footprint boundary as a ground/surface polygon, any part of
    // which can be reached given the remaining endurance.
    LocatedEllipseType ellipse = 2;
  }
}


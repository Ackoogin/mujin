  RISK_PRIORITIZATION_ENUM_UNSPECIFIED = 0;
  RISK_PRIORITIZATION_ENUM_HIGH = 1;
  RISK_PRIORITIZATION_ENUM_MEDIUM = 2;
  RISK_PRIORITIZATION_ENUM_LOW = 3;
  RISK_PRIORITIZATION_ENUM_NONE = 4;

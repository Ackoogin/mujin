  // Indicates the state of the internal software object that the data in the
  // message is based upon. The state of the software object is determined by
  // the publisher. The publisher could be the original/master publisher or an
  // intermediary re-publisher such as a persistence/data manager. This element
  // is not a commanded CRUD operation. It is not an indication of the state of
  // an instance of a message. It is not a mechanism for partial, incremental,
  // or fragmentary publication of a message. It is a signal from a publisher to
  // subscribers. For REMOVED state, in particular, some subscribers will mirror
  // the publisher and treat the message as if the object no longer exists, but
  // others, such as mission recorders, might not (in order to support retaining
  // historical records of activity, for example).
  optional ObjectStateEnum object_state = 2;
  // See annotations in child elements and messages/elements that use this type
  // for details.
  MissionContingencyAlertMDT message_data = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message MissionContingencyAlertMDT {
  // The unique identifier for this mission contingency alert.
  MissionContingencyAlertID_Type mission_contingency_alert_id = 1;
  // This is the ID of the system that detects the contingency and is generating
  // the alert. In a hierarchy of systems, not all children systems may have
  // Contingency Management service functionality. As a result, the Source
  // System may be a parent of the system that has the contingency condition.
  SystemID_Type source_system_id = 2;
  // This element is intended to capture contingency conditions identified by
  // the impacted system. The ID references and elements herein are intended to
  // complete the following statement: ConflictedSystem S1 has a conflict
  // (contingency) caused by ConflictingObject X at ConflictLocation Y. As a
  // result, AffectedTaskID Z can no longer be performed. The Contingency
  // Management function has identified this as AutonomyCase AC1 and either: 1.
  // Autonomy is allowed and the system is addressing the contingency. 2.
  // Autonomy is not allowed and the Contingency Management function recommends
  // that the operator perform certain actions to resolve the condition.
  repeated MissionContingencyConditionType contingency_condition = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message MissionContingencyConditionType {
  // This is the ID of the system that has the contingency condition. In most
  // route related conflicts, this will be populated with a vehicle's SystemID.
  // In task allocation conditions, this may be a System or control node
  // SystemID.
  SystemID_Type conflicted_system_id = 1;
  // Indicates whether the conflict is still affecting the conflicted system or
  // has been resolved (either autonomously or by the operator) or OBE.
  ConflictStateEnum conflict_state = 2;
  // This element provides details of the contingency condition. Most elements
  // within are optional because of the many different cases that this element
  // is intended to represent. However, the requirements for describing a
  // conflict are the following: 1. ConflictingObject is required if known. 2.
  // AffectedRequirements are required if and only if it is known that a task
  // can no longer be performed. 3. ConflictLocation primarily applies to route
  // conflicts. This data is primarily for operator SA.
  repeated ConflictType conflict = 3;
  // Indicates the autonomy trigger (from PlanningFunction*) which triggered the
  // alert.
  optional PlanningTriggerType trigger = 4;
  // Indicates the status of the autonomous planning action or actions
  // addressing the conflict.
  optional AutonomousActionStatusChoiceType autonomous_action_status = 5;
  // This element can be provided when autonomy settings dictate that autonomous
  // correction of a problem is not allowed or when a system does not have
  // autonomous contingency correction capability. Multiple instances allow a
  // series of actions to be specified to address the contingency condition.
  // Order is implied by the order in which elements are included in the
  // message. For example, to resolve a contingency associated with a failed
  // Capability, the series of actions might be: 0. Drop Tasks 1. Reallocate
  // Dropped Tasks.
  repeated OperatorRecommendationType operator_recommendation = 6;
}

// Indicates whether a conflict is still affecting the conflicted system or
// has been resolved.
enum ConflictStateEnum {
  CONFLICT_STATE_ENUM_UNSPECIFIED = 0;
  CONFLICT_STATE_ENUM_CONFLICTED = 1;
  CONFLICT_STATE_ENUM_CLEARED = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.002.000
message ConflictType {
  // Unique ID for this conflict.
  ID_Type conflict_id = 1;
  // The object that is causing the conflicted system to be in a contingency
  // state. This item is optional if and only if the conflicting object is not
  // known. For example, when a FAILED Task is received by a parent system
  // (FAILED task state is used to escalate the issue to the parent node). This
  // may generate a contingency alert at the parent node where the conflicting
  // object is unknown. In other words, a parent system receives a FAILED Task,
  // but doesn't necessarily know why the Task has failed. This could cause the
  // parent system to generate an alert with a sibling AffectedRequirement
  // without a ConflictingObject.
  optional ID_Type conflicting_object_id = 2;
  // This is the first location along the planned route where the conflict will
  // occur. This data is optional and primarily applies to conflicts with pop-up
  // threats or zones where the conflict occurs at a future point along the
  // route. It is not expected that this data will be populated for Capability
  // and other System failures which affect a System's ability to perform its
  // assigned Tasking. The primary intent of this data is for display purposes
  // to provide operator SA.
  optional ConflictLocationType conflict_location = 3;
  // Indicates the time window in which the conflict is expected to occur.
  optional DateTimeRangeType conflict_time = 4;
  // Indicates the ID of Requirement or Requirements which can no longer be
  // performed due to the effect of the conflicting object. IDs are given if and
  // only if they can no longer be accomplished with the current mission plans.
  // As a result, a contingency generated by a pop-up threat (or other
  // environment change) might be handled via a simple reroute which does not
  // affect any Requirements. Alternatively, if a Capability fails, affected
  // Requirements are more likely known and should be included in this element.
  // A Service would only list the Requirements if the Service KNOWS there is a
  // problem with it. For example, a Service should not populate this value with
  // all Tasks in an affected MissionPlan simply because it is uncertain as to
  // the effect of a reroute on the associated Tasks.
  optional RequirementsReferenceType affected_requirements = 5;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.002.000
message ConflictLocationType {
  // The point along the route where the first intersection occurs with the
  // conflicting object.
  Point2D_Type conflict_point = 1;
  // The first route segment in the route where the intersection occurs with the
  // conflicting object.
  optional RoutePlanSegmentReferenceType conflicted_route_segment = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message RoutePlanSegmentReferenceType {
  // The unique ID of the referenced RoutePlan.
  RoutePlanID_Type route_plan_id = 1;
  // The unique ID of the referenced Path.
  PathID_Type path_id = 2;
  // The unique ID of the referenced PathSegment.
  SegmentID_Type path_segment_id = 3;
  // Indicates the unique ID of the MissionPlan associated with the RoutePlan.
  // If the referenced RoutePlan is part of multiple MissionPlans, this element
  // indicates the specific MissionPlan context desired.
  optional MissionPlanID_Type mission_plan_id = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message RequirementsReferenceType {
  // composed xsd extension base RequirementsReferenceLockableType
  RequirementsReferenceLockableType base = 1;
  // Indicates a reference to an instance of a [Capability]Command.
  repeated CommandID_Type capability_command_id = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message RequirementsReferenceLockableType {
  // Indicates a reference to an instance of an Effect.
  repeated EffectID_Type effect_id = 1;
  // Indicates a reference to an instance of an Action.
  repeated ActionID_Type action_id = 2;
  // Indicates a reference to an instance of a Task.
  repeated TaskID_Type task_id = 3;
  // Indicates a reference to an instance of a Response.
  repeated ResponseID_Type response_id = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message AutonomousActionStatusChoiceType {
  oneof choice {
    // Indicates the status of the autonomous planning action or actions
    // addressing the conflict.
    AutonomousActionStatusChoiceType_AutonomousPlanningActionStatus_List autonomous_planning_action_status = 1;
    // Indicates the triggering condition for an autonomous action has occurred
    // but no action will be initiated because the PlanningFunction* indicates
    // "Alert Only".
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string alert_only = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message AutonomousPlanningActionStatusType {
  // Indicates the UUID of the AutonomousPlanningAction defined in
  // PlanningFunction*.
  AutonomousPlanningActionID_Type autonomous_planning_action_id = 1;
  // Indicates the status of the autonomous planning action addressing the
  // conflict. See enumeration annotations for further details.
  AutonomousActionStatusEnum status = 2;
}

// The state of the action for an autonomously triggered condition.
enum AutonomousActionStatusEnum {
  AUTONOMOUS_ACTION_STATUS_ENUM_UNSPECIFIED = 0;
  AUTONOMOUS_ACTION_STATUS_ENUM_DISALLOWED = 1;
  AUTONOMOUS_ACTION_STATUS_ENUM_IN_PROGRESS = 2;
  AUTONOMOUS_ACTION_STATUS_ENUM_FAILED = 3;
  AUTONOMOUS_ACTION_STATUS_ENUM_SUCCESSFUL = 4;
  AUTONOMOUS_ACTION_STATUS_ENUM_DETECTED = 5;
}

// synthesized list wrapper for repeated choice member AutonomousPlanningActionStatus in AutonomousActionStatusChoiceType (choice)
message AutonomousActionStatusChoiceType_AutonomousPlanningActionStatus_List {
  repeated AutonomousPlanningActionStatusType items = 1;
}

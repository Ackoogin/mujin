}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message OperatorRecommendationType {
  // This field is used to indicate which system's operators should take the
  // recommended action to resolve the conflict.
  SystemID_Type operator_system_id = 1;
  // This is intended to be a recommendation to the operator to perform an
  // action. The action must be taken in context of the rest of this message.
  // For example, the action to FailTasks has to be taken in context of the
  // tasks provided in the AffectedTaskID element given elsewhere in the message.
  OperatorContingencyActionEnum recommended_operator_action = 2;
}

// Indicates the recommendation to the operator of an action to perform.
enum OperatorContingencyActionEnum {
  OPERATOR_CONTINGENCY_ACTION_ENUM_UNSPECIFIED = 0;
  OPERATOR_CONTINGENCY_ACTION_ENUM_REPLAN_KINEMATICS_CONFLICTED_SYSTEMS = 1;
  OPERATOR_CONTINGENCY_ACTION_ENUM_REPLAN_KINEMATICS_ALL_SYSTEMS = 2;
  OPERATOR_CONTINGENCY_ACTION_ENUM_REPLAN_ACTIONS_CONFLICTED_SYSTEMS = 3;
  OPERATOR_CONTINGENCY_ACTION_ENUM_REPLAN_ACTIONS_ALL_SYSTEMS = 4;
  OPERATOR_CONTINGENCY_ACTION_ENUM_REALLOCATE_DROPPED_TASKS = 5;
  OPERATOR_CONTINGENCY_ACTION_ENUM_REALLOCATE_FAILED_TASKS = 6;
  OPERATOR_CONTINGENCY_ACTION_ENUM_REALLOCATE_ALL_TASKS = 7;
  OPERATOR_CONTINGENCY_ACTION_ENUM_ESCALATE_TO_PARENT_SYSTEM = 8;
  OPERATOR_CONTINGENCY_ACTION_ENUM_REPLAN_COMM = 9;
  OPERATOR_CONTINGENCY_ACTION_ENUM_DROP_TASKS = 10;
  OPERATOR_CONTINGENCY_ACTION_ENUM_FAIL_TASKS = 11;
  OPERATOR_CONTINGENCY_ACTION_ENUM_EXECUTE_RESPONSE = 12;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message RequirementsTemplateType {
  // The unique identifier for a Requirements template.
  RequirementsTemplateID_Type requirement_template_id = 1;
  // Indicates a Requirement to be updated or generated. When multiple
  // Requirements are listed, all should be updated/generated.
  repeated RequirementTemplateOptionsType requirement = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message RequirementTemplateOptionsType {
  // Must be unique amongst all Requirements in the template. Allows the
  // response to be referenced in the sibling DependentRequirement to establish
  // temporal relationships amongst Requirements.
  uint32 requirement_index = 1;
  // Human readable text label with content meaningful to human operators.
  // xsd type: VisibleString256Type (pattern [ -~]{0,256})
  optional string descriptive_label = 2;
  // Indicates a potential Requirement to update or generate. When multiple
  // Requirements are given, only one should be updated/generated. It could be
  // chosen based on 1) the child RequirementOptionIndex (indicating relative
  // priority between options), 2) The Capabilities of the System or Systems
  // available to execute the Requirement or other considerations.
  repeated RequirementTemplateOptionType requirement_option = 3;
  // Indicates a temporal dependency to include when generating or updating the
  // Requirement selected from the sibling RequirementOption.
  repeated RequirementGenerationDependencyType dependent_requirement = 4;
  // The objective of the collection created as part of this response. List size
  // for this element is based on "Select All That Apply" condition.
  repeated CollectionObjectiveEnum collection_objective = 5;
  // Maximum allowed product staleness for the product used for Collection
  // Objective.
  // xsd type: DurationType
  optional string product_staleness = 6;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message RequirementTemplateOptionType {
  // Must be unique across options of a Response. When multiple options are
  // possible, the executable option with the lowest OptionIndex should be
  // chosen.
  uint32 requirement_option_index = 1;
  // Indicates details for a Requirement to generate for this option. Note that
  // some of the data necessary to generate a Requirement (Effect, Action, Task
  // or [Capability]Command message) isn't given by this element or sibling
  // element or elements; it must be inferred/derived from the associated
  // Option, its triggering event, battlespace context, etc.
  ResponseOptionType requirement = 2;
  // Indicates constraints to apply when generating the sibling Requirement.
  // Note that some of the data necessary to generate a Requirement's
  // constraints isn't given by this element or sibling element or elements; it
  // must be inferred/derived from the associated Response Option and/or its
  // triggering event, battlespace context, etc. If the sibling Requirement
  // includes constraints, they override constraints given by this element.
  optional RequirementConstraintsType requirement_constraints = 3;
  // Indicates additional, complex timing constraints to apply when generating
  // the sibling Requirement.
  optional CapabilityCommandTemporalConstraintsType timing_constraints = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message ResponseOptionType {
  oneof choice {
    // Indicates the Effect type to generate for use in Planned C2. This option
    // leaves nearly all details of the Effect to be determined by an operator or
    // Response management service based on trigger and/or battlespace context.
    EffectTypeEnum effect = 1;
    // Indicates an Effect to use as a template for generating a Response option
    // for use in Planned C2. The Effect indicated by this element should have a
    // RESPONSE_C2 constraint and be used as template to copy to create a new
    // PLANNED_C2 or DIRECT_C2 Effect with a new EffectID.
    EffectID_Type effect_id = 2;
    // Indicates the Action type to generate for use in Planned C2. This option
    // leaves nearly all details of the Action to be determined by an operator or
    // Response management service based on trigger and/or battlespace context.
    ActionTypeEnum action = 3;
    // Indicates an Action to use as a template for generating a Response option
    // for use in Planned C2. The Action indicated by this element should have a
    // RESPONSE_C2 constraint and be used as template to copy to create a new
    // PLANNED_C2 or DIRECT_C2 Action with a new ActionID.
    ActionID_Type action_id = 4;
    // Indicates the Task type to generate for use in Planned C2. This option
    // leaves many details of the Task to be determined by an operator or Response
    // management service based on trigger and/or battlespace context. Note: When
    // new Task types are added to TaskTypeEnum, they should also be added to this
    // choice statement.
    TaskResponseType task = 5;
    // Indicates a Task to use as a template for generating a Response option for
    // use in Planned C2. The Task indicated by this element should have a
    // RESPONSE_C2 constraint and be used as template to copy to create a new
    // PLANNED_C2 or DIRECT_C2 Task with a new TaskID.
    TaskID_Type task_id = 6;
    // Indicates the [Capability]Command type to generate along with type specific
    // details for use in Direct C2. This option leaves many details of the
    // [Capability]Command to be determined by an operator or Response management
    // service based on trigger and/or battlespace context. Note: When new
    // Capability types are added to CapabilityTypeEnum, they should also be added
    // to this choice statement if they have a corresponding [Capability]Command
    // message.
    CommandResponseType capability_command = 7;
    // Indicates a [Capability]Command to use as a template for generating a new
    // [Capability]Command (with new CapabilityCommandID) for use in Direct C2.
    CommandID_Type capability_command_id = 8;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.003.000
message TaskResponseType {
  oneof choice {
    // Indicates a desire to create an AirSample Task as a mission response. If

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.003.000
message MA_PlannedSequentialTriggerType {
  // Indicates the response to be taken when the triggering conditions of the
  // Option are satisfied.
  ResponseID_Type response_id = 1;
  // Indicates a trigger based on an Entity with filters/preconditions that must
  // be met before the Option is triggered. All immediate child element filters
  // must be met before the Option is triggered; child elements are logically
  // ANDed. If a child element is omitted then any Entity matches that element's
  // filter..
  optional EntityFilterType entity = 2;
  // Indicates a trigger based on a System with filters/preconditions that must
  // be met before the Option is triggered. All immediate child element filters
  // must be met before the Option is triggered; child elements are logically
  // ANDed. If a child element is omitted then any System matches that element's
  // filter.
  optional SystemFilterType system = 3;
  // Indicates a trigger based on a Requirement with filter/preconditions that
  // must be met before the Option is triggered. All immediate child element
  // filters must be met before the Option is triggered; child elements are
  // logically ANDed. If a child element is omitted then any Requirement matches
  // that element's filter.
  optional RequirementFilterType requirement = 4;
  // Indicates a trigger based on a Requirement with filters/preconditions that
  // must be met before the Option is triggered. All immediate child element
  // filters must be met before the Option is triggered; child elements are
  // logically ANDed. If a child element is omitted then any Requirement matches
  // that element's filter.
  optional AccessAssessmentFilterType access_assessment = 5;
  // Indicates a trigger based on an OperatorLocationOfInterest (OLOI) with
  // filters/preconditions that must be met before the Option is triggered. All
  // immediate child element filters must be met before the Option is triggered;
  // child elements are logically ANDed. If a child element is omitted then any
  // OLOI matches that element's filter.
  optional OperatorLocationOfInterestClauseType oloi = 6;
  // Indicates a ResponseCommand message as the trigger.
  optional ResponseID_Type response_command_id = 7;
  // Indicates a trigger based on any UCI message, filtered/constrained by a
  // query filter. Filter elements with cardinality greater than 1 are logically
  // ORed. Sibling filter elements are logically ANDed.
  optional QueryMessageType any_message = 8;
  // This trigger refers to a new Capability or SubCapability which becomes
  // available or a previously failed Capability which has been restored.
  optional CapabilityTaxonomyType capability_added = 9;
  // This trigger refers to a failure of a Capability and/or SubCapability
  // needed to perform a Requirement.
  optional CapabilityTaxonomyType capability_failure = 10;
  // This trigger refers to lost comms.
  optional CommsLostTriggerDataType comms_lost = 11;
  // This trigger refers to a low remaining endurance condition such as low fuel
  // or battery power. This trigger can further be specialized by the definition
  // of the Endurance thresholds to define the trigger.
  optional EnduranceType endurance_low = 12;
  // This trigger refers to a vehicle that has deviated from the planned route
  // to such a degree that a replan is required.
  optional ThresholdOffRouteTriggerDataType off_route = 13;
  // This trigger refers to the proximity of two items (Systems, Entities or
  // other items) that exceeded a minimum geospatial separation limit as
  // specified in OpRouting messages.
  optional EntityFilterType proximity_conflict = 14;
  // This trigger refers to a route that exceeded a minimum geospatial
  // separation limit with another item or items. The separation is between a
  // planned/navigated route and other routes or conflicting items as specified
  // in OpRouting messages.
  optional RoutePlanID_Type route_conflict_id = 15;
  // This trigger refers to vulnerability due to exposure along the route with
  // and without suppression.
  optional PlanVulnerabilityType route_vulnerability = 16;
  // This trigger refers to a system state transition, as indicated by the
  // SystemStatus message.
  optional SystemStateFilterType system_state_change = 17;
  // This trigger indicates a new Requirement.
  optional RequirementTriggerType requirement_added = 18;
  // This trigger refers to a Requirement execution state transition to DROPPED,
  // as indicated by execution status message for the Requirement (EffectStatus,
  // TaskStatus, etc.).
  optional RequirementTriggerType requirement_dropped = 19;
  // This trigger refers to a Requirement execution state transition to FAILED,
  // as indicated by execution status message for the Requirement (EffectStatus,
  // TaskStatus, etc.).
  optional RequirementFailedTriggerType requirement_failed = 20;
  // This trigger refers to a change to a Requirement that impacts an existing
  // plan. For example, a change of the position of the target of the
  // Requirement.
  optional RequirementTriggerType requirement_change = 21;
  // This trigger refers to an OpZone conflicts with the current plan.
  optional ZoneViolationTriggerDataType zone_violation = 22;
  // This trigger refers to the position along a future
  // planned/predicted/propagated orbit for a spacecraft exceeding a minimum
  // geospatial separation limit with another item or items.
  optional OrbitPlanID_Type orbit_conflict_id = 23;
  // This trigger refers to a spacecraft that has deviated from its planned
  // orbit to such a degree that a replan is required.
  optional ThresholdOffOrbitTriggerDataType off_planned_orbit = 24;
  // Indicates a trigger based on a weather condition present (i.e. temperature,
  // precipitation amount) with filters/preconditions that must be met before
  // the Option is triggered. All immediate child element filters must be met
  // before the Option is triggered; child elements are logically ANDed. If a
  // child element is omitted, then that field need not be considered as a
  // condition to be met/checked.
  optional MA_InertialStateType vehicle_state = 25;
  // Indicates a trigger based on an vehicle parameter with
  // filters/preconditions that must be met before the Option is triggered. All
  // immediate child element filters must be met before the Option is triggered;
  // child elements are logically ANDed. If a child element is omitted, then
  // that field need not be considered as a condition to be met/checked.
  optional WeatherReportGridDataType weather = 26;
  // Indicates a trigger based on a designated waypoint in the route. It is
  // generally used for points associated with Actions such as task
  // "transitions", changes in acceleration, changes in speed, changes in
  // altitude, etc.
  optional WayPointType way_point = 27;
  // Indicates a trigger based on a time value where a trigger will occur.
  // xsd type: TimeType (pattern .+Z)
  optional string time = 28;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message RequirementFilterType {
  // Indicates a type of Requirement or Requirements that satisfies the filter.
  // If omitted, any target satisfies the Requirement filter.
  optional RequirementTaxonomyType requirement_type = 1;
  // Indicates targets of the Requirement that are required to match the filter.
  // If omitted, any target satisfies the Requirement filter.
  optional AssetFilterType requirement_target = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.003.000
message OperatorLocationOfInterestClauseType {
  // Indicates a type of OLOI designation, established by the Designation
  // message, required to satisfy the clause.
  optional DesignationFilterType designation = 1;
  // This element indicates an OperatorLocationOfInterest related clause
  // (requiring a comparative test between a value in the
  // OperatorLocationOfInterest associated with the Trigger and a value given
  // here) that must be met before the clause is satisfied. Multiple instances
  // are logically ANDed.
  repeated OperatorLocationOfInterestComparativeType characteristics_clause = 2;
  // Indicates the unique ID of a specific OLOI instance that the Rule applies
  // to.
  repeated OperatorLocationOfInterestID_Type operator_location_of_interest_id = 3;
  // Indicates a zone the OLOI associated must fall within to satisfy the
  // clause. Multiple instances are logically ORed.
  repeated ZoneType applicable_zone = 4;
  // Indicates a zone the OLOI must fall within to satisfy the clause. Multiple
  // instances are logically ORed.
  repeated OrbitalFiltersQueryType orbital_filter = 5;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message OperatorLocationOfInterestComparativeType {
  // Indicates a value priority/rank to be compared to the priority/rank in
  // PrioritizationList referencing the System.
  PrioritizationListValueType prioritization_list = 1;
  // Indicates the logical comparator to use when comparing the target
  // (OperatorLocationOfInterest or related message) Characteristic to the
  // Response Characteristic. The logical expression is: (target Characteristic)
  // (Comparator) (Response Characteristic). When the logical expression is TRUE
  // then the parent TargetClause instance is TRUE.
  EqualityExpressionEnum comparator = 2;
}

// A data request for the messages matching the specified Message types and
// Query. The Message types evaluated by the Query is restricted to only the
// ones specified by the MessageType field. If neither MessageType nor Query
// is specified, then this query will yield all messages retained by the
// responder.
// uci_version: 001.000.001.000
message QueryMessageType {
  // The Message types that the Query should be performed for. If not present,
  // then the Query should be performed for all Message types.
  repeated MessageTypeEnum message_type = 1;
  // The query used to select the messages or IDs that are returned by the
  // corresponding status. If not present, then the operation should return the
  // Message types specified by the MessageType field, or all messages if no
  // MessageType is specified.
  optional QueryPET query = 2;
}


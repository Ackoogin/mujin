  // Indicates velocity-velocity covariance in the NED coordinate system.
  // Required when the sibling Position-Velocity covariance is given.
  optional VelocityVelocityCovarianceType velocity_velocity = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message PositionPositionCovarianceType {
  // North-North position covariance with units of meters squared.
  double pn_pn = 1;
  // North-East position covariance with units of meters squared.
  double pn_pe = 2;
  // North-Down position covariance with units of meters squared. Required when
  // the Position includes a down component.
  optional double pn_pd = 3;
  // East-East position covariance with units of meters squared.
  double pe_pe = 4;
  // East-Down position covariance with units of meters squared. Required when

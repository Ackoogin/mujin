    // tactic.
    MA_CAPSynchronizationTypeEnum strategy = 1;
    // Relative offset assignments at point(s) on the CAP path that can be used by
    // assets performing a decentralized synchronization method.
    MA_SynchronizationChoiceType_RelativePositioning_List relative_positioning = 2;
  }
}

// Indicates overall CAP synchronization offset options.
enum MA_CAPSynchronizationTypeEnum {
  MA_CAP_SYNCHRONIZATION_TYPE_ENUM_UNSPECIFIED = 0;
  MA_CAP_SYNCHRONIZATION_TYPE_ENUM_LINE_ABREAST = 1;
  MA_CAP_SYNCHRONIZATION_TYPE_ENUM_COUNTER_ROTATING = 2;
  MA_CAP_SYNCHRONIZATION_TYPE_ENUM_COUNTER_OPPOSE = 3;
}

// Defines relative positions used for CAP synchronization when a
// decentralized synchronization method is used.
// uci_version: 000.000.000.000
message MA_CAPRelativePositionType {
  // Defines asset the reference points apply to.
  SystemID_Type asset_id = 1;
  // Defines reference system the positions are relative to.
  SystemID_Type reference_id = 2;
  // Defines Reference points and desired offsets.
  repeated MA_CAPReferencePointType reference_point = 3;
}

// Defines ArrivalOffsets that each apply when the reference system is at the
// corresponding specified LegIndex point in the CAP pattern.
// uci_version: 000.000.000.000
message MA_CAPReferencePointType {
  // Defines a reference point.
  MA_CAP_LegIndexEnum leg_index = 1;
  // Defines an offset from the reference point, in terms of delay (time,
  // distance, or percent behind the reference system).
  MA_CAPOffsetType arrival_offset = 2;
}

// Indicates defined points in the CAP route.
enum MA_CAP_LegIndexEnum {
  MA_CAP_LEG_INDEX_ENUM_UNSPECIFIED = 0;
  MA_CAP_LEG_INDEX_ENUM_HOT_LEG_START = 1;
  MA_CAP_LEG_INDEX_ENUM_HOT_LEG_END = 2;
  MA_CAP_LEG_INDEX_ENUM_COLD_LEG_START = 3;
  MA_CAP_LEG_INDEX_ENUM_COLD_LEG_END = 4;
}

// Defines the type and value of the offset (delay relative to the reference
// system) used for CAP synchronization.
// uci_version: 000.000.000.000
message MA_CAPOffsetType {
  oneof choice {
    // Offset is TOA based.
    DurationRangeType time = 1;
    // Offset is relative distance based.
    // xsd type: DistanceType
    double distance = 2;
    // Offset is a percentage of the CAP pattern.
    // xsd type: PercentType
    double percentof_pattern = 3;
  }
}

// synthesized list wrapper for repeated choice member RelativePositioning in MA_SynchronizationChoiceType (choice)
message MA_SynchronizationChoiceType_RelativePositioning_List {
  repeated MA_CAPRelativePositionType items = 1;
}


// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message AccessAssessmentFilterType {
  // Indicates a name/type of AccessAssessment algorithm required to match the
  // filter. If omitted, any name/type of AccessAssessment algorithm satisfies
  // the filter.
  // xsd type: VisibleString32Type (pattern [ -~]{0,32})
  repeated string assessment_name = 1;
  // Indicates assessed Capabilities of the AccessAssessment that are required
  // to match the filter. If omitted, any assessed Capability satisfies the
  // filter.
  optional CapabilityTaxonomyUniversalType assessed_capabilities = 2;
  // Indicates Subjects of the AccessAssessment that are required to match the
  // filter. If omitted, any Subject satisfies the filter.
  optional AssetFilterType subject = 3;
  // Indicates Assessed Objects of the AccessAssessment that are required to
  // match the filter. If omitted, any Assessed Object satisfies the filter.

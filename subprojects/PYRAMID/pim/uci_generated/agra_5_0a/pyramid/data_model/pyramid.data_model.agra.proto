  // the collection deck.
  // xsd type: AlphanumericString7OnlyType (pattern [A-Za-z0-9]{7})
  string collection_deck_mission_identifier = 1;
  // This element is the unique ID of the collection deck task.
  // xsd type: AlphanumericDashSpaceUnderscoreString12OnlyType (pattern [A-Za-z0-9 \-_]{12})
  string collection_deck_task_identifier = 2;
}

// The ID type for the UCI IDs that correspond to the ACO IDs.
// uci_version: 000.000.000.000
message ACTDF_TraceabilityType {
  // Encompasses all Mission Identifiers: alpha, numeric, and alphanumeric. The
  // preferred format conforms to the CCJSI 3250.01d.
  // xsd type: AlphanumericString54Type (pattern [a-zA-Z0-9]{1,54})
  string actdf_mission_identifier = 1;
  // Indicates the ACTDF collection plan associated with this task.
  ACTDF_CollectionPlanType actdf_collection_plan_identifier = 2;
  // Indicates the ACTDF collection event within the associated ACTDF collection
  // plan that this task is associated with. The format of this field is a UUID.
  ACTDF_TaskID_Type actdf_task_id = 3;
}

// The ID type for UCI IDs that correspond to an ACTDF collection plan.

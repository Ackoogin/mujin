  // This element represents Mode 5 beacon reply information. See MIL-STD-6016
  // for detailed definition.
  optional InterrogationStatusEnum mode5_indicator = 3;
  // See simple type documentation.
  // xsd type: Mode1FourCharacterCodeType (pattern [0-7]{4})

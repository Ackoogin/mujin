// Utilized to define Course to Fix Civil Path Terminator Leg Type. This path
// terminates at a fix with a specified course at that fix.
// uci_version: 000.000.000.000
message CF_CourseToFixType {
  // Indicates the Civil Path Terminator associated with the specified waypoint.
  // xsd type: AnglePositiveType
  double course = 1;
}

// Utilized to define Radius to Fix Civil Path Terminator Leg Type. This path
// is a constant radius circular path around a defined turn center that
// terminates at a fix.
// uci_version: 000.000.000.000
message RF_RadiusToFixType {
  // Indicates the center point of the radius-to-fix turn.
  Point2D_Type radius_center_point = 1;
  // Indicates the radius distance for the radius-to-fix turn.
  // xsd type: DistanceType
  double turn_radius = 2;
  // Indicates the course associated with the RF leg type start point.
  // xsd type: AnglePositiveType
  double course_in = 3;
  // Indicates the course associated with the RF leg type end point.
  // xsd type: AnglePositiveType
  double course_out = 4;
  // Indicates the initial point at which the arc turn starts.
  Point2D_Type arc_initial_point = 5;
  // Indicates the end point at which the arc turn terminates.
  Point2D_Type arc_end_point = 6;
  // Indicates the distance along the arc turn.
  // xsd type: DistanceType
  double arc_distance = 7;
  // Indicates the direct distance between the start of the arc turn and the end
  // of the arc turn.
  // xsd type: DistanceType
  double arc_direct_distance = 8;
  // Indicates the starting direction of turn commencement.
  RelativeDirectionEnum turn_direction = 9;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message ClimbType {
  // Indicates the climb rate during this PathSegment.
  // xsd type: SpeedType
  optional double climb_rate = 1;
  // Indicates that the system will climb or descend at an autonomously chosen
  // rate according to the specified optimization algorithm.
  optional ClimbOptimizationEnum climb_type = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message NextPathSegmentType {
  // Indicates the PathID of the Path containing the next PathSegment. It is
  // only required when branching to a PathSegment in a Path other than the
  // parent Path of the current PathSegment.
  optional PathID_Type path_id = 1;
  // This element indicates the PathSegmentID of the next PathSegment in the
  // Path.
  SegmentID_Type path_segment_id = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message ConditionalPathSegmentType {
  // The PathID is included only if branching to a PathSegment defined in an
  // alternate or contingency path (deviation from primary path).
  optional PathID_Type path_id = 1;
  // This element indicates the SegmentID of the next PathSegment in the Path.
  // Any PathSegment of the current Path or other Paths can be referenced.
  SegmentID_Type path_segment_id = 2;
  // This element specifies the condition that will result in this
  // ConditionalPathSegment being used chosen. A segment shall be chosen as the
  // next segment when a logical AND of all fields present (except
  // OperatorInput) equate to TRUE.
  optional PathSegmentConditionType condition = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message PathSegmentConditionType {
  // Choose this segment if current altitude (at end of current segment) is in
  // the specified altitude range.
  optional AltitudeRangeType altitude_range = 1;
  // Choose this segment if current time (at end of current segment) is in the
  // specified time window.
  optional DateTimeRangeType time_window = 2;
  // Choose this segment if the current segment has been captured the specified
  // number of times.
  optional SegmentCaptureType segment_capture = 3;
  // If true, only choose this segment if commanded by the operator.
  optional bool operator_input = 4;
  // Endurance remaining.
  optional EnduranceRemainingType endurance = 5;
  // Choose this segment if operating in the contingency state specified by this
  // element.
  optional SystemContingencyLevelEnum contingency_level = 6;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message SegmentCaptureType {
  // Capture count to be used to compare to the current capture count.
  uint32 capture_count = 1;
  // Logical comparator to use when comparing the current capture count to the
  // sibling CaptureCount element. The logical expression is (current capture
  // count) (LogicalOperator) (sibling CaptureCount). When the logical
  // expression is TRUE then the parent SegmentCapture Condition is TRUE.
  EqualityExpressionEnum logical_operator = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message EnduranceRemainingType {
  // Endurance remaining to be used to compare to the current endurance
  // remaining.
  EnduranceType endurance_remaining = 1;
  // Logical comparator to use when comparing the current endurance remaining to
  // the sibling EnduranceRemaining element. The logical expression is (current
  // endurance remaining) (LogicalOperator) (sibling EnduranceRemaining). When
  // the logical expression is TRUE then the parent Endurance Condition is TRUE.
  EqualityExpressionEnum logical_operator = 2;
}

// The ID type that refers to an airfield report.
// uci_version: 000.000.000.000
message AirfieldID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// The ID type for UCI IDs that correspond to runways.
// uci_version: 000.000.000.000
message RunwayID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// Defines the curve control elements including the curve segments, whether to
// append the curve, and end of curve behavior.
// uci_version: 000.000.000.000
message MA_CurveControlType {
  // Specifies the curve segments as a set of NURBS points.
  repeated MA_NURBS_PointType curve_segments = 1;
  // Specifies this curve will be appended to a previous curve command. This is
  // only valid if the vehicle is currently executing a curve.
  // xsd type: EmptyType (pattern [A-Za-z]{0})
  optional string append_curve = 2;
  // Specifies the vehicle behavior at the completion of the curve.
  optional MA_EndOfCurveBehaviorEnum end_of_curve_behavior = 3;
}

// Specifies a Non-Uniform Rational Basis Spline (NURBS) representation of the
// platform trajectory to this endpoint. The following constraints should be
// observed when specifying the trajectory: A) A third-order curve should be
// sufficient for accurate description and higher orders add complexity
// without significant benefit, B) The curve description should be terminated
// at both endpoints and C) the curve should be continuous to first and second
// order across the path segments for the active route.
// uci_version: 000.000.000.000
message MA_NURBS_PointType {
  // Indicates the reference point from which the control points for the
  // trajectory curve are defined. The frame of reference for the control points
  // is specified as Azimuthal Equidistant Projection (AEP) to prevent
  // discontinuties that a LLA (latitude, longitude, altitude) frame of
  // reference may experience at the antipodes.
  WayPointPointChoiceType center_reference = 1;
  // Contains the collection of control points that with the knot vector
  // describe the desired trajectory for this endpoint. Minimum size value is
  // defined to ensure this endpoint is continuous with the rest of the route
  // path. Maximum size value is defined for a third-order curve.
  repeated MA_NURBS_ControlPointType control_points = 2;
  // Contains the collection of knots that with the control points describe the
  // desired trajectory for this endpoint. The number of knots is directly
  // related to the number of control points and the order of the curve. The
  // minimum size value is defined to ensure this endpoint is continuous with
  // the rest of the route path. The maximum size value is defined for a
  // third-order curve.
  // xsd type: DoubleNonNegativeType
  repeated double knot_vector = 3;
  // Choice of Speed or Duration contraints to apply to curve following
  optional MA_CurveTraversingType curve_traversing_parameters = 4;
  // Indicates the curvature value for the desired trajectory. This is an
  // indication of the smoothness of the trajectory.
  // xsd type: DoublePositiveType
  optional double curvature = 5;
  // Index into the ControlPoints array that indicates the initial control point
  // for this path segment trajectory description. To ensure a continous route
  // path, this value should be identical to the endpoint of the previous
  // segment in this path.
  optional uint32 initial_control_point_index = 6;
  // Index into the ControlPoints array that indicates the final control point
  // for this path segment trajectory description. To ensure a continous route
  // path, this value should be identical to the endpoint of this path segment.
  optional uint32 final_control_point_index = 7;
}

// Specifies a single point and weighting factor in a Non-Uniform Rational
// Basis Spline (NURBS) trajectory description.
// uci_version: 000.000.000.000
message MA_NURBS_ControlPointType {
  // Indicates the value of a single control point for the trajectory curve. To
  // reduce the chance of discontinuities in the curve description, the frame of
  // reference for each point is an Azimuthal Equidistant Projection (AEP)
  // offset from a center reference point.
  Point2D_RelativeType control_point = 1;
  // Indicates the weight factor used for this control point.
  double weight = 2;
}

// Contains speed or time contraints to applied for a curve following command
// uci_version: 000.000.000.000
message MA_CurveTraversingType {
  oneof choice {
    // Speed constraint to be applied to commanded curve traversal
    SpeedRangeType speed_range = 1;
    // Time contraint to inform intended duration of the commanded curve traversal
    // xsd type: xs:duration (carried as string on the OMS wire)
    string duration = 2;
  }
}

// Specifies the type of behavior at the completion of curve following.
enum MA_EndOfCurveBehaviorEnum {
  MA_END_OF_CURVE_BEHAVIOR_ENUM_UNSPECIFIED = 0;
  MA_END_OF_CURVE_BEHAVIOR_ENUM_CSA = 1;
  MA_END_OF_CURVE_BEHAVIOR_ENUM_CIRCULAR_LOITER = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_LaunchType {
  oneof choice {
    // This element defines the parameters for a carrier launch task.
    MA_CarrierLaunchType carrier_launch = 1;
    // This element defines the parameters for an airfield takeoff task.
    MA_AirfieldTakeoffType airfield_takeoff = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_CarrierLaunchType {
  // This is the CASE desingation which indicates visibility level which impacts
  // the departure and recovery routing
  optional MA_CaseTypeEnum case_designation = 1;
  // This ID of the OpLine that represents the Departure Radial
  OpLineID_Type departure_radial_line_id = 2;
  // The SystemID of the carrier
  SystemID_Type carrier_id = 3;
  // The ID of the catapult
  MA_CatapultID_Type catapult_id = 4;
}

// This enumeration is for the CASE desingation which indicates visibility
// level. Is an integer between 1 and 3.
enum MA_CaseTypeEnum {
  MA_CASE_TYPE_ENUM_UNSPECIFIED = 0;
  MA_CASE_TYPE_ENUM_CASE_I = 1;
  MA_CASE_TYPE_ENUM_CASE_II = 2;
  MA_CASE_TYPE_ENUM_CASE_III = 3;
  MA_CASE_TYPE_ENUM_CASE_ACP = 4;
}

// The ID type for UCI IDs that correspond to carrier catapults.
// uci_version: 000.000.000.000
message MA_CatapultID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_AirfieldTakeoffType {
  // Indicates a unique ID, assigned to this airfield report message.
  AirfieldID_Type airfield_id = 1;
  // Indicates the unique ID for this Runway.
  RunwayID_Type runway_id = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_RecoveryType {
  oneof choice {
    // This element defines the tasks used in carrier recoveries.
    MA_CarrierRecoveryChoiceType carrier_recovery = 1;
    // This element defines the parameters for an airfield land task.
    MA_AirfieldLandType airfield_land = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_CarrierRecoveryChoiceType {
  oneof choice {
    // This element defines the parameters for a carrier recovery task.
    MA_CarrierRecoveryType recovery = 1;
    // This element defines the parameters for a "Delta" command that will command
    // recovering aircraft to hold a certain amount of time if feasible
    MA_DeltaType delta = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_CarrierRecoveryType {
  // This is the CASE desingation which indicates visibility level which impacts
  // the departure and recovery routing
  optional MA_CaseTypeEnum case_designation = 1;
  // The bearing for the final approach
  // xsd type: AngleType
  double final_bearing = 2;
  // The descent angle of the final approach
  // xsd type: AngleType
  double glideslope = 3;
  // The relative touch down point is defined as an offset of the location from
  // the origin of the separately defined reference frame which is a location on
  // the carrier.
  Point3D_RelativeType relative_touch_down_point = 4;
  // The SystemID of the carrier
  SystemID_Type carrier_id = 5;
  // The ID of the OpZone that represents the playbox area for the carrier
  optional OpZoneID_Type carrier_playbox_id = 6;
  // Expected arrival time (EAT) for the aircraft to land on the carrier deck
  // xsd type: DateTimeType (pattern .+Z)
  optional string expected_arrival_time = 7;
}

// Command to order recovering aircraft to hold if feasible when on approach
// or in recovery marshal
// uci_version: 000.000.000.000
message MA_DeltaType {
  // The amount of time a recovering aircraft will hold in seconds
  // xsd type: DurationType
  string time_delta_seconds = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_AirfieldLandType {
  // Indicates a unique ID, assigned to this airfield report message.
  AirfieldID_Type airfield_id = 1;
  // Indicates the unique ID for this Runway.
  RunwayID_Type runway_id = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_JettisonTaskType {
  // Indicates which capability weapon mission stores are to jettisoned.
  MA_JettisonStoreSelectionType jettison_store_selection = 1;
  // Indicates if and in which situations a store can be jettisoned.
  MA_StoreJettisonTypeEnum store_jettison_type = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_JettisonStoreSelectionType {
  oneof choice {
    // Jettison all weapon capabilities that are capable of being jettisoned.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string jettison_all_capable_weapons = 1;
    // Indicates weapon stores selected for jettison by CapabilityID. CapabilityID
    // should be in reference to the Strike Capability.
    MA_JettisonStoreSelectionType_CapabilityID_List capability_id = 2;
  }
}

// synthesized list wrapper for repeated choice member CapabilityID in MA_JettisonStoreSelectionType (choice)
message MA_JettisonStoreSelectionType_CapabilityID_List {
  repeated CapabilityID_Type items = 1;
}

// Type of Jettison to be performed.
enum MA_StoreJettisonTypeEnum {
  MA_STORE_JETTISON_TYPE_ENUM_UNSPECIFIED = 0;
  MA_STORE_JETTISON_TYPE_ENUM_STANDARD = 1;
  MA_STORE_JETTISON_TYPE_ENUM_EMERGENCY = 2;
}

// Defines a task type that supports orbit changes.
// uci_version: 003.000.001.000
message OrbitChangeTaskType {
  // composed xsd extension base OrbitChangeTaskBaseType
  OrbitChangeTaskBaseType base = 1;
  // Indicates the type of Orbit Change desired. See annotations for the sibling
  // CapabilityType element and those of the child choices for full details.
  OrbitChangeChoiceType change_type = 2;
  // Indicates the orbit change task is for the purpose of disposal.
  optional DisposalOrbitType disposal_orbit = 3;
}

// Indicates a number of specific maneuvers to reach a new orbit.
// uci_version: 002.001.001.001
message OrbitChangeChoiceType {
  oneof choice {
    // Indicates a specific new orbit, described in classic orbital elements
    // (COE), to change to. The maneuver to reach the new orbit isn't specified;
    // the orbit specified here is the steady-state post maneuver orbit.
    COE_OrbitType specific_orbit = 1;
    // Indicates a specific orbital position to move to, expressed as a spherical
    // volume. The maneuver to reach the volume and the resulting orbit after
    // reaching the volume aren't specified.
    OrbitalVolumeType specific_position = 2;
    // Indicates a specific resident space object (RSO) to rendezvous with.
    // Rendezvous doesn't imply proximity operations, docking, etc. The maneuver
    // to achieve rendezvous and the resulting orbit after achieving it aren't
    // specified.
    RSO_ApproachType rendezvous = 3;
    // Indicates a specific resident space object (RSO) to initiate proximity
    // operations around. Specific objectives, specific desired maneuvers, etc.
    // after entering proximity operations aren't specified. The
    // maneuver/rendezvous necessary to initiate proximity operations isn't
    // specified. Proximity operations means that two "neighboring" vehicles
    // maneuver to affect their relative states. It requires a precise match of
    // orbital velocities and position vectors allowing them to remain at a
    // constant distance through orbital station-keeping.
    ProximityOperationsType proximity_operations = 4;
    // Indicates the orbital line of longitude to change to. This choice is only
    // applicable for geo-stationary and some geo-synchronous orbits. The maneuver
    // to reach the longitude and the resulting orbit after reaching it aren't
    // specified.
    // xsd type: AngleType
    double longitude = 5;
    // Indicates the orbital semi-major axis to change to. For a circular orbit,
    // this is equivalent to orbital altitude. The maneuver to reach the new
    // semi-major axis and the resulting orbit after reaching it aren't specified.
    // xsd type: DistanceType
    double semimajor_axis = 6;
    // Indicates the orbital inclination or tilt to change to. The maneuver to
    // reach the inclination and the resulting orbit after reaching it aren't
    // specified.
    // xsd type: AngleHalfPositiveType
    double inclination = 7;
    // Indicates the orbital shape or eccentricity to change to. The maneuver to
    // reach the eccentricity and the resulting orbit after reaching it aren't
    // specified.
    double eccentricity = 8;
    // Indicates a specific new orbit, described in racetrack parameters, to
    // change to. This choice is only applicable for geo-stationary and some
    // geo-synchronous orbits. The manuerver to reach the racetrack orbit isn't
    // specified.
    RaceTrackOrbitType race_track = 9;
  }
}

// Indicates the set of classic orbital elements (COE) describing an orbit.
// Elements describing the position of a satellite on the orbit are often
// considered part of COE but are omitted from this type which is only
// intended to describe the orbit.
// uci_version: 002.001.001.000
message COE_OrbitType {
  // composed xsd extension base COE_OrbitBaseType
  COE_OrbitBaseType base = 1;
  // Indicates the orbit's size expressed as the semi-major axis; one half the
  // distance across the long axis of the orbit ellipse.
  // xsd type: DistanceType
  double semimajor_axis = 2;
}

// Describes a spherical volume centered on an orbital position.
// uci_version: 002.000.000.000
message OrbitalVolumeType {
  // Indicates the center of a spherical volume with sibling Radius.
  OrbitalKinematicsChoiceType position = 1;
  // Indicates the radius of a spherical volume around the sibling Position
  // element.
  // xsd type: DistanceType
  double radius = 2;
}

// Indicates a specific resident space object (RSO) around which a maneuver
// will take place.
// uci_version: 001.000.000.000
message RSO_ApproachType {
  // Indicates the RSO that is the target.
  AssetType rso = 1;
  // Indicates the desired range from the RSO.
  optional DistanceConstraintsType range = 2;
}

// This complex type allows for differentiating the type of proximity
// operation to perform.
// uci_version: 001.000.000.000
message ProximityOperationsType {
  // composed xsd extension base RSO_ApproachType
  RSO_ApproachType base = 1;
  // Indicates the type of proximity operation desired.
  optional ProximityOrbitChoiceType proximity_orbit = 2;
}

// This complex type provides the different types of proximity operations.
// uci_version: 001.000.000.000
message ProximityOrbitChoiceType {
  oneof choice {
    // Indicates the proximity operation is a natural motion type. Natural motion
    // circumnavigation where the orbital parameters are such that minimal
    // stationkeeping is required to maintain proximity operations.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string natural_motion = 1;
    // Indicates the proximity operation is a forced motion type. Forced motion
    // requires consistent maneuvers to maintain proximity operations.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string forced_motion = 2;
    // Indicates the proximity operation is an R-Bar Perch type. This means the
    // proximity operation is along the radial vector of the target.
    R_BarApproachEnum r_bar_perch = 3;
    // Indicates the proximity operation is a V-Bar Perch type. This means the
    // proximity operation is along the velocity vector of the target.
    V_BarApproachEnum v_bar_perch = 4;
    // Indicates the proximity operation's orbital solution must be within the
    // defined relative plane angles min and max.
    AngleHalfPairType delta_orbital_plane_tolerance = 5;
  }
}

// The R-bar approach consists of the chaser approaching the target vehicle
// from the positive or negative radial direction of the target spacecraft.
// This occurs along the radial vector of the target vehicle.
enum R_BarApproachEnum {
  R_BAR_APPROACH_ENUM_UNSPECIFIED = 0;
  R_BAR_APPROACH_ENUM_NEGATIVE_RADIAL = 1;
  R_BAR_APPROACH_ENUM_POSITIVE_RADIAL = 2;
}

// The V-bar approach consists of the chaser vehicle approaching the target
// vehicle from the positive or negative in track velocity direction of the
// target spacecraft. This occurs along the velocity vector of the target
// spacecraft.
enum V_BarApproachEnum {
  V_BAR_APPROACH_ENUM_UNSPECIFIED = 0;
  V_BAR_APPROACH_ENUM_NEGATIVE_INTRACK = 1;
  V_BAR_APPROACH_ENUM_POSITIVE_INTRACK = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message RaceTrackOrbitType {
  // The duration to maintain the racetrack orbit. If this is not provided, the
  // intent is to maintain the orbit until commanded otherwise.
  // xsd type: DurationType
  optional string duration = 1;
  // Indicates the orbital line of longitude of the start of the racetrack
  // measured in radians. Valid values range from -Pi to Pi.
  // xsd type: AngleType
  double start_longitude = 2;
  // Indicates the orbital line of longitude of the end of the racetrack
  // measured in radians. Valid values range from -Pi to Pi.
  // xsd type: AngleType
  double end_longitude = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message DisposalOrbitType {
  // Identifies whether the space vehicle is to be passivated upon disposal.
  bool passivate = 1;
}

// Indicates an Orbital Surveillance Task type.
// uci_version: 003.000.001.000
message OrbitalSurveillanceTaskType {
  // composed xsd extension base OrbitalSurveillanceTaskBaseType
  OrbitalSurveillanceTaskBaseType base = 1;
  // The target for which this task applies.
  OrbitalSurveillanceTargetType target = 2;
}

// Indicates the target of the Orbital Surveillance Task as either object
// based, location based, or zone based.
// uci_version: 003.000.001.000
message OrbitalSurveillanceTargetType {
  oneof choice {
    // Indicates that the target of the Orbital Surveillance Task is a specified
    // object or objects or relative to a specified object.
    OrbitalSurveillanceObjectsType object_based = 1;
    // Indicates that the target of the Orbital Surveillance Task is defined by
    // orbit kinematic data.
    OrbitalSurveillanceLocationTargetType location_based = 2;
    // Indicates that the target of the Orbital Surveillance Task is defined by a
    // geocentric zone.
    OrbitalSurveillanceZoneTargetType zone_based = 3;
  }
}

// Indicates the primary object or search space of the orbital surveillance
// task with the option to specific one or more secondary objects or search
// spaces.
// uci_version: 003.000.001.000
message OrbitalSurveillanceObjectsType {
  // The object, coordinates, or search space to be collected on. If there are
  // multiple objects that are part of the task, additional objects will be
  // specified as secondary objects. If information is required to be specified
  // relative to an object or coordinate, this is the reference point.
  OrbitalSurveillanceObjectType primary_object = 1;
  // Additional objects for related collections. This is used in cases where it
  // is important that collections on multiple objects be conducted in a
  // coordinated fashion, particularly when the information of interest is on
  // one object relative to another.
  repeated OrbitalSurveillanceObjectType secondary_objects = 2;
}

// The object, coordinates, or search space to be collected on.
// uci_version: 003.000.001.000
message OrbitalSurveillanceObjectType {
  // composed xsd extension base OrbitalSurveillanceObjectBaseType
  OrbitalSurveillanceObjectBaseType base = 1;
  // Indicates a search volume around the reference object's position.
  optional Shape3D_ChoiceType relative_search_volume = 2;
}

// Indicate the object of the orbital surveillance task with the option to
// specify the kinematics source to use (ex: element set or single position
// state vector) and the kinematic data itself.
// uci_version: 003.000.001.000
message OrbitalSurveillanceObjectBaseType {
  // Indicates the identity of the object that is a target of the Orbital
  // Surveillance Task.
  SatelliteIdentityChoiceType satellite_identity = 1;
  // Indicates the kinematics source to use for the surveillance of the object
  // indicated by the sibling SatelliteIdentity.
  optional OrbitalKinematicsSourceEnum kinematics_source = 2;
  // Use this type when the cataloged orbit is different than the orbit you
  // have. Use this for lost items, items that have maneuvered, and items that
  // have changed orbital states between the last cataloging and the current
  // orbital state. If searching in the expected or last reported orbit, omit
  // this value.
  optional OrbitKinematicsType orbit_kinematics_override = 3;
}

// Indicates the identity of an asset either by type or instance.
// uci_version: 003.000.001.000
message SatelliteIdentityChoiceType {
  oneof choice {
    // Identifies the object as being a 1st-person self-reporting asset or a
    // 3rd-person tracked asset. This option differs from the sibling "ByType"
    // element in that "ByInstance" references UCI defined IDs.
    AssetType by_instance = 1;
    // Identifies an orbiting object via non-UCI ID designators, such as satellite
    // numbers.
    SatelliteIdentityType by_type = 2;
  }
}

// Indicates the identity of the asset.
// uci_version: 003.000.001.000
message SatelliteIdentityType {
  // Indicates the "standard identity" of the asset.
  optional StandardIdentityType standard = 1;
  // The Satellite Identifier used to identify a Satellite. See type annotations
  // for further details.
  optional SatelliteIdentifierType satellite = 2;
}

// Indicates the target of an Orbital Surveillance Task as defined by orbit
// kinematic data.
// uci_version: 003.000.001.000
message OrbitalSurveillanceLocationTargetType {
  // The orbital kinematics of the search volume. May be used to specify the
  // center point of the sibling RelativeSearchVolume.
  OrbitKinematicsType orbital_kinematics = 1;
  // Indicates a search volume around the kinematics point or points.
  optional Shape3D_ChoiceType relative_search_volume = 2;
}

// Indicates the target of an Orbital Surveillance Task is defined by a
// zone/volume.
// uci_version: 001.000.000.000
message OrbitalSurveillanceZoneTargetType {
  // Indicates that the target of the Orbital Surveillance Task is defined by
  // geocentric zone.
  GeocentricVolumeType geocentric_zone = 1;
}

// Indicates an Orbital Surveillance Sensor Task type.
// uci_version: 003.000.003.001
message OrbitalSurveillanceSensorTaskType {
  // composed xsd extension base OrbitalSurveillanceSensorTaskBaseType
  OrbitalSurveillanceSensorTaskBaseType base = 1;
  // The target for which this task applies.
  OrbitalSurveillanceSensorTargetType target = 2;
}

// The base type for an Orbital Surveillance Sensor Task.
// uci_version: 002.000.001.001
message OrbitalSurveillanceSensorTaskBaseType {
  // Indicates the Capability's first tier type in the Orbital Surveillance
  // Sensor taxonomy. For Orbital Surveillance Sensor, the first tier is the
  // trajectory nature of the target. See enumerated type annotations for
  // further details.
  OrbitalSurveillanceSensorCapabilityEnum capability_type = 1;
  // Provides Capability-specific instructions and information to the sensor to
  // enable appropriate sensor set-up and data collection to meet the orbital
  // surveillance collection need. Examples include minimum and maximum number
  // of metric observations per collection interval for a metric collection
  // task, requirement for an imagery collection and desired imagery resolution
  // for a characterization task, and minimum separation distance for a
  // multi-object task.
  repeated OrbitalSurveillanceCollectionRequirementsType collection_requirements = 2;
  // If TRUE, report whether the tasked object was acquired or not. In space
  // domain awareness (SDA) domain, this is referred to as "PosNeg".
  bool confirm_object_acquisition = 3;
  // This provides additional context for the sensor units to inform the
  // decisions on which sensors are appropriate and how best to set up
  // collections. This context can help to compensate for shortfalls in the
  // fidelity of the sensor models. List size for this element is based on
  // "Select All That Apply" condition.
  repeated OrbitalSurveillanceSubCapabilityEnum information_objective = 4;
  // Indicates the SDA special reporting requirements, to include the product,
  // priority, need by date, and/or entity for which the product or products are
  // to be reported.
  repeated OrbitalSurveillanceSensorReportingCategoriesType reporting_requirements = 5;
  // Time estimated by the collection planner required for the sensor to
  // transition from completion of the previous task to initiate collection for
  // the current task. This may include sensor-slewing/attitude-change, mode
  // change, or sensor position change.
  // xsd type: DurationType
  optional string set_up_start_time = 6;
  // Time estimated by the collection planner required for the sensor to
  // transition from completion of collection for a task until sensor has
  // completed the task. One example is the time to read out the data from an
  // optical sensor focal plane.
  // xsd type: DurationType
  optional string post_collection_wrap_up = 7;
  // Provides information on the expected size or apparent phenomenology-based
  // size of the smallest target of interest for the task OR signal strength for
  // targets emitting radio frequency information.
  optional OrbitalSurveillanceSensorSensitivityConstraintType sensitivity_constraints = 8;
}

// Indicates orbital surveillance instructions and information to the sensor
// to enable appropriate sensor set-up and data collection to meet the orbital
// surveillance collection need.
// uci_version: 002.000.001.000
message OrbitalSurveillanceCollectionRequirementsType {
  oneof choice {
    // Indicates collection requirements to perform a metric collection sensor
    // task.
    MetricCollectionType metric_collection = 1;
    // Indicates collection requirements to perform a search sensor task, to
    // include the minimum and maximum speed of the target.
    SpeedRangeType search = 2;
    // Indicates collection requirements to perform an orbit determination sensor
    // task.
    OrbitAccuracyType orbit_determination = 3;
    // Indicates collection requirements to perform a sensor characterization task.
    SensorCharacterizationChoiceType characterization = 4;
    // Indicates collection requirements to perform a multi-object sensor task.
    MultiObjectType multi_object = 5;
    // Indicates collection requirements to perform a maneuver detection sensor
    // task.
    ManeuverDetectionType maneuver_detection = 6;
    // Indicates collection requirements to perform a deployment detection sensor
    // task.
    DeploymentDetectionType deployment_detection = 7;
  }
}

// Input parameters for an orbital surveillance metric collection task type.
// uci_version: 000.000.000.000
message MetricCollectionType {
  // Collect metric observations on all passes.
  bool use_all_passes = 1;
  // Minimum and Maximum number of observations required.
  optional ObservationsPerTrackLimitsType number_of_observations = 2;
  // If possible, collect when centered at maximum predicted
  // signal-to-noise-ratio.
  optional bool centered_at_max_predicted_snr = 3;
  // Time between observation collection (in seconds).
  optional int32 spacing_of_observations = 4;
  // Report the visual magnitude for each point of observation. Omitted
  // indicates no preference for reporting.
  optional bool report_point_soi = 5;
  // Specify the need for a hi-quality collection vs low-quality.
  optional QualityOfObsEnum quality_of_obs = 6;
}

// Indicates the minimum and maximum number of observations required per track.
// uci_version: 000.000.000.000
message ObservationsPerTrackLimitsType {
  // The maximum number of metric observations to collect per track.
  int32 max = 1;
  // The minimum number of metric observations to collect per track.
  optional int32 min = 2;
}

// Indicates the quality of observations.
enum QualityOfObsEnum {
  QUALITY_OF_OBS_ENUM_UNSPECIFIED = 0;
  QUALITY_OF_OBS_ENUM_HI_QUAL = 1;
  QUALITY_OF_OBS_ENUM_LO_QUAL = 2;
  QUALITY_OF_OBS_ENUM_ANY = 3;
}

// Indicates collection requirements for each sensor characterization choice.
// uci_version: 002.000.000.000
message SensorCharacterizationChoiceType {
  oneof choice {
    // Indicates phenomenology specific collection requirements for a sensor task.
    CharacterizationChoiceType phemonemology_specific = 1;
    // Indicates collection requirements to perform a stability orientation
    // assessment sensor task.
    StabilityCharacterizationType stability_and_orientation_assessment = 2;
    // Indicates collection requirements to perform a structure change detection
    // sensor task.
    StructureAssessmentCharacterizationType structure_assessment = 3;
    // Indicates collection requirements to perform an identification verification
    // sensor task.
    IdentificationVerificationCharacterizationType identification_verification = 4;
    // Indicates collection requirements to perform an operations changes sensor
    // task.
    SatelliteOperationsChangesCharacterizationType operations_changes = 5;
  }
}

// Conduct collection to support assessment of spacecraft structure to provide
// baseline or foundational characterization or to enable change detection.
// uci_version: 001.000.000.000
message StructureAssessmentCharacterizationType {
  // Conduct collection to enable estimation of size of object.
  SizeEstimationCharacterizationType size_estimation = 1;
  // Conduct collection (and appropriate processing) to support assessment of
  // length, width, height of a spacecraft as well as similar values and
  // relative positions/orientations of spacecraft components (e.g., solar
  // panels, telescopes, antennae).
  ResolvedCharacterizationType resolved = 2;
}

// Indicates collection requirements to perform size estimation
// characterization in support a structure change detection sensor task.
// uci_version: 000.000.000.000
message SizeEstimationCharacterizationType {
  oneof choice {
    // Specifies span of time for individual collection based on duration or
    // rotational periods of target.
    OrbitalSurveillanceSensorMinimumCollectionRequirementsType min_collection = 1;
    // Indicates the reporting requirements for RCS and Visual Magnitude sensor
    // collections used for size estimation characterization.
    OrbitalSurveillanceSizeDataEnum size_data = 2;
  }
}

// Specifies span of time for individual collection based on duration or
// rotational periods of target.
// uci_version: 000.000.000.000
message OrbitalSurveillanceSensorMinimumCollectionRequirementsType {
  oneof choice {
    // Collection duration (in number of rotations).
    int32 target_rotational_periods = 1;
    // Collection duration (in seconds).
    // xsd type: DurationType
    string time = 2;
  }
}

// Collect data to support confirmation of object found according to kinematic
// specification as being the specified object of interest.
// uci_version: 000.000.000.000
message IdentificationVerificationCharacterizationType {
  // When "All" is chosen, Unit must provide all forms of products on this list
  // as part of concerted collection (maintaining high-confidence custody on
  // object) to satisfy the Task.
  CharacterizationProductTypeEnum all = 1;
  // When "Any" is chosen, Unit must provide at least one form of products on
  // this list as part of concerted collection (maintaining high-confidence
  // custody on object).
  CharacterizationProductTypeEnum any = 2;
}

// Indicates the SDA special reporting requirements, to include the product,
// priority, need by date, and/or entity for which the product or products are
// to be reported.
// uci_version: 000.001.000.000
message OrbitalSurveillanceSensorReportingCategoriesType {
  // Indicates additional instructions associated with tasking for sensor
  // collections. When "All" is chosen, all of the special instructions must be
  // accomplished to satisfy the Task. When "Any" is chosen, that Task can be
  // satisfied by performing only one of the special instructions provided.
  SDA_SpecialInstructionsConstraintType sda_special_instructions = 1;
  // The priority of this reporting requirement relative to others.
  ComparableRankingType relative_priority = 2;
  // Indicates the time by which the products are needed by the source which
  // created the Task.
  optional ProductNeededByType product_needed_by = 3;
  // Indicates the persons/services/Systems/Units for which the product is to be
  // reported.

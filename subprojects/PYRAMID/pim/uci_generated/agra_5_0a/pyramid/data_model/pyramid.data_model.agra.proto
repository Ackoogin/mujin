  oneof choice {
    // Indicates a kind of Effect Requirement.
    EffectTypeEnum effect = 1;
    // Indicates a kind of Action Requirement.
    ActionTypeEnum action = 2;
    // Indicates a kind of Task Requirement.
    TaskTypeEnum task = 3;

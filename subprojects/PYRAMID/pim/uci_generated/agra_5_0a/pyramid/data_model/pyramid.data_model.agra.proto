// uci_version: 002.001.001.001
message WeaponeeringType {
  // Indicates Store Type and Quantity.
  optional WeaponeeringStoreType store_information = 1;
  // Indicates weaponeering information related to the target type.
  optional WeaponeeringTargetInfoType target_information = 2;
  // Indicates the desired approach conditions as the weapon approaches the
  // target.
  optional ApproachConditionsType approach_conditions = 3;
  // Indicates the desired impact conditions including weapon impact angle and
  // velocity.
  optional ImpactConditionsType impact_conditions = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message WeaponeeringStoreType {
  // composed xsd extension base StoreType
  StoreType base = 1;

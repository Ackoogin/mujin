// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message MA_ResponseMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // Indicates the state of the internal software object that the data in the
  // message is based upon. The state of the software object is determined by
  // the publisher. The publisher could be the original/master publisher or an
  // intermediary re-publisher such as a persistence/data manager. This element
  // is not a commanded CRUD operation. It is not an indication of the state of
  // an instance of a message. It is not a mechanism for partial, incremental,
  // or fragmentary publication of a message. It is a signal from a publisher to
  // subscribers. For REMOVED state, in particular, some subscribers will mirror
  // the publisher and treat the message as if the object no longer exists, but
  // others, such as mission recorders, might not (in order to support retaining
  // historical records of activity, for example).
  optional ObjectStateEnum object_state = 2;
  // See annotations in child elements and messages/elements that use this type
  // for details.
  MA_ResponseMDT message_data = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.001
message MA_ResponseMDT {
  // Indicates the unique ID of the Response. Minor updates to the Response can
  // be indicated by an update of the value in the child Version element. More
  // significant updates, replacements, etc. might warrant a new instance with a
  // different child UUID value.
  ResponseID_Type response_id = 1;
  // Indicates the types of Response options included in the message. List size
  // for this element is based on "Select All That Apply" condition.
  repeated ResponseTypeEnum response_type = 2;
  // Indicates monitoring constraints on the Response. The constraint type used
  // here is common to all Requirement types: Effect, Action, Task,
  // [Capability]Command, Response. Requirement constraints can be 1) given in a
  // [Requirement] message, 2) overridden as a planning input in a
  // [Requirement]PlanCommand message, 3) further refined/overridden during plan
  // creation and reported in a [Requirement]Plan message to inform subsequent
  // planning or execution. See sibling Option element annotation for an overall
  // description of Response structure. Constraints given here aren't conveyed
  // to instantiated Response options for a particular triggering event. The
  // constraints given here apply to Response management ( planning, allocation
  // and trigger monitoring prior to a triggering event). Constraints to apply
  // to instantiated Response options, if any, are given elsewhere in the
  // message.
  optional MA_RequirementConstraintsType response_management_constraints = 3;
  // Indicates guidance on planning and C2 of the Response.
  optional RequirementGuidanceType response_management_guidance = 4;
  // Indicates an Option of the Response. Responses are designed to be flexible.
  // A Response is a set of prioritized Options to address an anticipated
  // triggering event, events or event sequence in the battlespace. Responses
  // are allocated to Systems via a ResponsePlan. When a ResponsePlan is
  // activated, monitoring for the triggering events in the Options begins. When
  // a triggering event happens, the applicable Option(s) are evaluated.
  repeated MA_ResponseOptionDetailsType option = 5;
  // The sibling Option element associates triggering events with a desired
  // Response one of which is to use this element, a Requirements template, to
  // generate or change one or more Requirements messages/objects (Effect,
  // Action, Task, [Capability]Command). An instance of this element is a
  // RequirementsTemplate; it indicates the types of Requirements to generate or
  // update and their details. Each RequirementsTemplate has a unique ID and
  // therefore can be used for multiple Options.
  repeated RequirementsTemplateType requirements_template = 6;
  // Indicates traceability and other metadata associated with the Response.
  optional RequirementMetadataType metadata = 7;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message MA_ResponseOptionDetailsType {
  // Must be unique across Options. Supports intra-Response
  // ordering/prioritization of Option evaluations. Options are evaluated in
  // order of increasing index. In other words, the Option with the lowest value
  // in this element is evaluated first.
  uint32 option_index = 1;
  // Human readable text label with content meaningful to human operators.
  // xsd type: VisibleString256Type (pattern [ -~]{0,256})
  optional string descriptive_label = 2;
  // Indicates an overall purpose/objective for the Response. This element is
  // optional for systems/services whose prioritization and/or options don't
  // vary by Requirement.
  optional RequirementTaxonomyType objective = 3;
  // Indicates whether Response evaluation should continue (TRUE) or stop
  // (FALSE) after the conditions of the Option are met. For example, a Response
  // with escalating, concurrent Options might require evaluation to continue
  // (TRUE) after the an Option's conditions are met. A Response where one and
  // only one Option is desired (FALSE) stops evaluation after an Option's
  // conditions are met.
  bool continue_evaluation = 4;
  // Indicates whether the rule is enabled or disabled. Disabling allows a rule
  // to be communicated without the effect of an action being taken ; a superset
  // of rules can be created and exchanged and then selectively enabled.
  bool enabled = 5;
  // Indicates the trigger, decision point or other condition under which the
  // Option should be initiated/processed. Filters/preconditions for the trigger
  // are optionally given and must be satisfied before the associated Response
  // is initiated.
  MA_PlannedSequentialTriggerType trigger = 6;
  // Indicates the response to be taken when the triggering conditions of the
  // Option are satisfied.
  MA_RuleResponseType response = 7;
  // Indicates the time period when the Option is enabled; responses for the
  // Option should only be generated during this time period. This element does
  // not constrain when the resulting responses are planned or actually occur.
  // The schedule given in this element must be within the temporal constraints
  // of the Response as a whole (when given).
  optional ScheduleType schedule = 8;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message MA_RuleResponseType {
  oneof choice {
    // Indicates a Response of processing a Requirements template.
    ResponseTemplateType requirements_template = 1;
    // Indicates a Response of activating a specific, previously created
    // MissionPlan or other sub-*Plan.
    MA_MissionPlanActivationCommandType activate_plan = 2;
    // Indicates a Response of generating a MissionContingencyAlert.
    ResponseAlertType generate_alert = 3;
    // Indicates an explicit desire for no response when Option Rule is triggered.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string do_nothing = 4;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message ResponseTemplateType {
  // Indicates a Response of processing a Requirements template.
  RequirementsTemplateID_Type requirements_template_id = 1;
  // Indicates a specific planning process and select inputs to initiate
  // planning after processing the Requirements template. Other planning inputs
  // must be determined from trigger/option context and/or the Requirements
  // template. If omitted, any Requirements generated by the template might need
  // to be planned via other mechanisms; the Requirements could be planned by an
  // operator manually invoking planning, contingency-triggered automated
  // planning (see PlanningFunctionStatus message), etc.
  optional PlanInputsCoreType planning_inputs = 2;
}

// The ID type for UCI IDs that correspond to a RequirementsTemplate.
// uci_version: 000.000.000.000
message RequirementsTemplateID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// Indicates input data used to create different types of *Plans.
// uci_version: 003.000.003.000
message PlanInputsCoreType {
  // Indicates the unique ID of the planning process invoked by the *PlanCommand.
  PlanningProcessID_Type planning_process_id = 1;
  // This element indicates whether the Plan was initiated autonomously from a
  // planning service, was operator initiated or edited, or was created
  // externally.
  PlanInitiationSourceEnum plan_initiation = 2;
  // Indicates the category of messages to use as the source for System
  // position, Capability, status, etc. data to use as the basis for the plan.
  PlanningDataSourceEnum planning_data_source = 3;
  // Indicates the reason for the replan. This element is used during live
  // operations and/or operation with autonomous planning, contingency
  // management, etc.
  optional ReplanReasonType replan_reason = 4;
  // Indicates a selective override of an item in the mission environment world
  // state to use/used in the Plan.
  repeated MissionEnvironmentConstraintType environment_override = 5;
  // Further constrain a Mission Plan to an operational constraint that
  // indicates how much the constraint should play a role in the planning
  // process. The multiplicity is based on the list of available
  // OpConstraintEnums.
  repeated OpConstraintWeightingType op_constraint = 6;
  // Free-text explanation of any extraordinary instructions at the plan level.
  optional FileLocationID_Type special_instructions_id = 7;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message ReplanReasonType {
  // Indicates the trigger that initiated the replan. Autonomous triggers are
  // enabled/disabled via the PlanningFunction* message.
  PlanningTriggerType trigger = 1;
  // Indicates autonomous planning action (referenced by UUID) that was
  // triggered by the sibling Trigger. The parameters of the autonomous planning
  // actions are defined in the PlanningFunction* message.
  optional AutonomousPlanningActionID_Type autonomous_planning_action_id = 2;
  // Indicates the unique ID of a MissionContingencyAlert associated with the
  // replan. The alert can provide additional context for the replan such as the
  // ID of a failed Task, a LAR that couldn't be met, etc.
  optional MissionContingencyAlertID_Type mission_contingency_alert_id = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message PlanningTriggerType {
  // Indicates the initiator of the replan; whether the planning was
  // autonomously triggered by the sibling Trigger elements or Operator invoked.
  PlanningTriggerSourceEnum source = 1;
  // Indicates an initial "by case" trigger for autonomous mission planning
  // functions. This element is only optional if the sibling Source element has
  // a value of OPERATOR_INVOKED_TRIGGER.
  optional PlanningByCaseTriggerType by_case_trigger = 2;
  // Indicates a "by result" trigger that must occur, as a result of the initial
  // trigger described in the sibling ByCase element, in order for the parent
  // autonomous trigger to occur. If omitted, the parent autonomous trigger
  // occurs purely based on the sibling ByCase element, regardless of the
  // results of the mission planning functions it triggers.
  optional PlanningByResultTriggerType by_result_trigger = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.001
message MissionEnvironmentConstraintType {
  oneof choice {
    // Constraint Override on an Entity.

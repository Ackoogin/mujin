  // Identifies the satellite transponder for the engagement.
  ForeignKeyType transponder = 4;
  // Indicates an external (non-UCI) reference name for a CounterSpace
  // tactic/effect.
  ForeignKeyType tactic = 5;
  // Free text comments for the engagement.
  optional FileLocationID_Type comment_id = 6;
  // Signal data details for the signal being engaged.
  CS_DetailDataType detail_data = 7;
  // Observed signals of interest.
  repeated CS_SignalType signals = 8;
}

// This type represents lower level signal details for a CounterSpace
// task/engagement.
// uci_version: 001.000.001.000
message CS_DetailDataType {
  // Name for CounterSpace engagement relevant data.
  // xsd type: VisibleString32Type (pattern [ -~]{0,32})
  string name = 1;
  // Comments. Free text.
  optional FileLocationID_Type details_id = 2;
  // The signal identifier for which a CounterSpace force is tasked to engage.
  // This is an external (non-UCI) identifier for the signal.
  optional ForeignKeyType signal = 3;
  // Uplink center frequency.
  // xsd type: FrequencyType
  optional double uplink_frequency = 4;
  // Uplink polarization.
  optional PolarizationEnum uplink_polarization = 5;
  // Downlink center frequency.
  // xsd type: FrequencyType
  optional double downlink_frequency = 6;
  // Downlink polarization.
  optional PolarizationEnum downlink_polarization = 7;
  // Modulation for signal.
  optional ModulationEnum modulation = 8;
  // Bandwidth of signal.
  // xsd type: FrequencyType
  optional double bandwidth = 9;
  // Additional attributes for the signal.
  optional FileLocationID_Type attributes_id = 10;
  // Signal data additional parameters.
  repeated CS_SubDetailDataType sub_detail_data = 11;
}

// Indicates the polarization of electromagnetic waves.
enum PolarizationEnum {
  POLARIZATION_ENUM_UNSPECIFIED = 0;
  POLARIZATION_ENUM_NONE = 1;
  POLARIZATION_ENUM_CIRCULAR = 2;
  POLARIZATION_ENUM_HORIZONTAL = 3;
  POLARIZATION_ENUM_ROTATING = 4;
  POLARIZATION_ENUM_VERTICAL = 5;
  POLARIZATION_ENUM_SLANT = 6;
  POLARIZATION_ENUM_LINEAR = 7;
  POLARIZATION_ENUM_LEFT_CIRCULAR = 8;
  POLARIZATION_ENUM_RIGHT_CIRCULAR = 9;
  POLARIZATION_ENUM_ORTHOGONAL = 10;
  POLARIZATION_ENUM_PRINCIPAL = 11;
  POLARIZATION_ENUM_UNPOLARIZED = 12;
}

// This type represents low level signal parameters and values for
// CounterSpace.
// uci_version: 000.000.000.000
message CS_SubDetailDataType {
  // SubDetail identifier from an external, non-UCI source.
  ForeignKeyType sub_detail_identifier = 1;
  // UCI ID for a file with sub-detail (lower level) signal parameters and
  // attributes.
  FileLocationID_Type sub_detail_data_file_id = 2;
}

// This type represents an associated or reference signal for a CounterSpace
// engagement.
// uci_version: 001.000.000.000
message CS_SignalType {
  // Indicates an external reference signal name.
  ForeignKeyType signal = 1;
  // Low end of uplink frequency range.
  FrequencyRangeType uplink_frequency = 2;
  // Uplink polarization.
  PolarizationEnum uplink_polarization = 3;
  // Low end of downlink frequency range.
  FrequencyRangeType downlink_frequency = 4;
  // Downlink polarization.
  PolarizationEnum downlink_polarization = 5;
  // Additional signals IDs overserved within or associated with the tasked
  // signal.
  repeated ForeignKeyType existing_signal = 6;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_EscortTaskType {
  // Indicates the Entity or System to be escorted by this Task
  MA_EscortAssetType escort_asset = 1;
  // Indicates the positional reference of the escorting entity to the escorted
  // entity.
  MA_EscortReferenceType reference = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_EscortAssetType {
  oneof choice {
    // The unique ID of an Entity to be escorted.
    EntityID_Type entity_id = 1;
    // The unique ID of a System to be escorted.
    SystemID_Type system_id = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_EscortReferenceType {
  oneof choice {
    // Indicates that the escorting entity should follow the path of the escorted
    // entity.
    MA_EscortFollowPathType follow_path = 1;
    // Indicates the position of the escorting entity in reference to the escorted
    // entity. A bearing of 0 would indicate that the escorting entity should
    // always remain north of the escorted entity.
    LOS_Type geographic_reference = 2;
    // Indicates the position of the escorting entity in reference to the escorted
    // entity. A bearing of 0 would indicate that the escorting entity should
    // always remain in front of the escorted entity.
    LOS_Type body_reference = 3;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_EscortFollowPathType {
  // Indicates the separation distance between the escorted entity and the
  // escorting entity.
  // xsd type: DistanceType
  double separation = 1;
  // Indicates the planned route of the entity to be escorted.
  optional RoutePlanID_Type route_plan_id = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message EA_TaskType {
  // This element defines requirements that must be executed for this electronic
  // attack tasking. This element is optional because the flight path of that a
  // vehicle uses for an Electronic Attack task does not have to be specified in
  // the tasking. In many cases the vehicle will want to create its own route
  // for survivability purposes.
  optional EA_TaskRouteRequirementsType route_requirements = 1;
  // This element provides a list of friendly assets which should be protected
  // in addition to those who are being escorted, if any.
  EA_TaskProtectedAssetsType protected_assets = 2;
  // Indicates the threats that are the target of the electronic attack, from
  // which the sibling ProtectedAssets will be protected.
  EA_TaskThreatsType threats = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.001.002.001
message EA_TaskRouteRequirementsType {
  oneof choice {
    // This element specifies specific waypoints that the vehicle being tasked
    // should fly.
    PathType path = 1;
    // This element defines the loiter location and pattern from which the tasked
    // vehicle should provide protection.
    LoiterType loiter = 2;
    // This element specifies a task to escort an asset. The tasked vehicle shall
    // provide protection for the escorted asset. Additional protected assets can
    // be specified in the ProtectedAssets element.
    EA_TaskEscortType escort = 3;
    // This specifies the geospatial location zone for the vehicle to execute the
    // EA Task.
    ZoneChoiceType zone_constraints = 4;
    // This specifies the geospatial location volume for the vehicle to execute
    // the EA Task.
    VolumeChoiceType volume_constraints = 5;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message ZoneChoiceType {
  oneof choice {
    // Indicates a zone defined by an existing OpZone.
    OpZoneID_Type op_zone_id = 1;
    // Indicates a zone defined directly here.
    ZoneExternalType zone_target = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message VolumeChoiceType {
  oneof choice {
    // Indicates a volume defined by an existing OpVolume.
    OpVolumeID_Type op_volume_id = 1;
    // Indicates a volume defined directly here.
    OpVolumeType volume_target = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.003.000
message ESM_TaskType {
  // composed xsd extension base ESM_TaskBaseType
  ESM_TaskBaseType base = 1;
  // Indicates Command details for a Subcapability of the ESM_Capability
  // indicated by the sibling CapabilityID. One instance of this element for
  // each Subcapability category (acquisition, ID, geolocaiton, measurement or
  // pulse data collection) of that ESM_Capability is required. If multiple
  // instances are given, each must be of a different category in the descendant
  // choice statement.
  SubCapabilityDetailsType sub_capability_details = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message SubCapabilityDetailsType {
  // Indicates the unique ID of a Shared Antenna and/or AntennaResources to be
  // used for the EA activity.
  optional SelectAntennaType select_antenna = 1;
  // Indicates a specific frequency to be used for the Acquisition command. If
  // omitted, the command defers to the active MDF.
  repeated FrequencyRangeType frequency_restriction = 2;
  // Indicates the source of or explicit values for emitter characteristics of
  // the target. If omitted, the emitter characteristics should be determined
  // from the active MDF.
  repeated ESM_TargetType target_emitter_data = 3;
  // Indicates the source of or explicit values for the kinematic location of
  // the target or search volume. When specified, the kinematic location
  // overrides any given in the sibling TargetEmitterData element.
  optional ESM_LocationType esm_location = 4;
  // Defines the parameters used to collect pulses.
  optional PulseDataCollectCommandType pulse_data_collection = 5;
  // This indicates the commanded geolocation type/technique to use.
  optional ESM_SubcapabilityGeolocationType geolocation = 6;
}

// Indicates the unique ID of a Shared Antenna and/or AntennaResources to be
// used for the EA activity.
// uci_version: 002.001.001.001
message SelectAntennaType {
  // Indicates the unique ID of a Shared Antenna. Shared Antennas are not
  // taxonomically described in UCI. It is left to external actors to organize,
  // uniquely describe and identify them. AntennaID may only be blank if the
  // "AntennaResourceTypeIndex" is present in the AntennaResourceChoice sibling.
  // For example, a "Transmit Half Sub Array" may be required for the EA
  // activity without identifying which AESA must be selected. AntennaID is the
  // same as the Antenna SupportCapabilityID.
  optional SupportCapabilityID_Type support_capability_id = 1;
  // Select a specific antenna resource (i.e. antenna resource instance) or a
  // category of antenna resources (i.e. antenna resource type).
  optional AntennaResourceChoiceType antenna_resource_choice = 2;
}

// The ID type that refers to a commandable and/or autonomous supporting
// element of a Capability.
// uci_version: 000.000.000.000
message SupportCapabilityID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.002.000.001
message AntennaResourceChoiceType {
  oneof choice {
    // Indicates the unique ID of a Resource Type (such a "Transmit, Quarter
    // Sub-Array ") on a Shared Antenna. Defined in Shared Aperture Information
    // Files.
    AntennaResourceID_Type antenna_resource_type_id = 1;
    // Indicates the unique ID of a specific resource (such a "Transmit, Quarter
    // Sub-Array Number Three") on a Shared Antenna. Defined in Shared Aperture
    // Information Files.
    AntennaResourceID_Type antenna_resource_instance_id = 2;
  }
}

// Unique ID type that identifies Antenna Resources.
// uci_version: 000.000.000.000
message AntennaResourceID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message ESM_TargetType {
  oneof choice {
    // Indicates the unique ID of a specific Entity that is a target of ESM
    // acquisition.
    EntityID_Type entity_id = 1;
    // Indicates a type of emitter that is a target of ESM acquisition.
    EmitterIdentityType emitter_type = 2;
    // Indicates a specific emitter type ***instance*** that is a target of ESM
    // acquisition.
    SpecificEmitterIdentityType specific_emitter = 3;
    // Indicates summary signal characteristics that are a target of ESM
    // acquisition.
    SignalSummaryType signal_description = 4;
    // Indicates the unique ID of a specific Signal that is a target of ESM
    // acquisition.
    SignalID_Type signal_id = 5;
    // Indicates the Emitter Priority Bin for grouping ESM emitters in the ESM
    // profile (to set Activation and ResourceAccessPriority). These bins are used
    // to set ResourceAccessPriority for a "binned" set of emitters without
    // identifying them individually every time their ResourceAccessPriority needs
    // to change.
    uint32 emitter_priority_bin = 6;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message ESM_LocationType {
  oneof choice {
    // Indicates the source of or explicit values for the kinematic location of
    // the target.
    ESM_SubcapabilityTargetLocationDataType target_location_data = 1;
    // Indicates the volume to search within.
    AirVolumeSensorReferencedType esm_air_volume = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.001.002.000
message ESM_SubcapabilityTargetLocationDataType {
  oneof choice {
    // Indicates the EntityID associated with the pulse data collection.
    EntityID_Type entity_id = 1;
    // Indicates the dwell's Field of View details associated with the pulse data
    // collection.
    NED_ConeType dwell_fov = 2;
    // Indicates the Point Target details associated with the pulse data
    // collection.
    PointTargetType point_target = 3;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.001.000
message PulseDataCollectCommandType {
  // Defines the single frequency for the Pulse Data collection to be used for
  // all dwells defined in the collection.
  CollectionFrequencyType collection_frequency = 1;
  // The requested start time for the subsystem to begin the commanded pulse
  // data collection.
  // xsd type: DateTimeType (pattern .+Z)
  string start_time = 2;
  // Defines the length of each dwell.
  // xsd type: DurationType
  string dwell_duration = 3;
  // Total number of collect dwells, to include the initial dwell and any
  // repetitions.
  optional uint32 dwells = 4;
  // Time (start-to-start) between dwells.
  // xsd type: DurationType
  optional string repetition_interval = 5;
  // Indicates the expected PulseWidth of the desired Pulse.
  // xsd type: DurationType
  optional string pulse_width = 6;
  // Indicates the expected PRI of the desired Pulse.
  // xsd type: DurationType
  optional string pri = 7;
  // This indicates the estimated bandwidth of the signal being processed.
  optional FrequencyRangeType signal_bandwidth = 8;
  // This indicates the modulation type to be used for the collection.
  optional ModulationEnum modulation = 9;
  // Indicates the type of geolocation to be processed.
  optional SignalTypeEnum data_collect_type = 10;
  // Set the sample rate for the collection, in Hz.
  optional float sample_rate = 11;
  // Set the number of points per sample that will be used in the Fast Fourier
  // Transform processing on the collection.
  optional int32 fft_points_per_sample = 12;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message ESM_SubcapabilityGeolocationType {
  // Indicates the current state of the ESM_Command for Geolocation.
  SignalGeolocationControlEnum geolocation_state = 1;
  // Indicates a commanded geolocation type/technique to use. List size for this
  // element is based on "Select All That Apply" condition.
  repeated SignalGeolocationMethodEnum geolocation_type = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_FlightTaskType {
  // composed xsd extension base MA_FlightTaskBaseType
  MA_FlightTaskBaseType base = 1;
  // This element defines the parameters for a loiter.
  optional MA_LoiterType loiter = 2;
  // This element identifies the parameters for a must fly task.
  optional MustFlyType must_fly = 3;
  // Indicates the relative positions for the entities in the formation.
  repeated MA_FormationType formation = 4;
  // this element identifies the parameters for an altitude stacked marshall
  // task.
  optional MA_AltitudeStackedMarshallType altitude_stacked_marshall = 5;
  // This element defines the parameters for a flight control mode type.
  optional MA_FlightControlModesChoiceType flight_control_mode = 6;
  // this element identifies the parameters for a launch/take-off task.
  optional MA_LaunchType launch = 7;
  // this element identifies the parameters for a recovery/land task.
  optional MA_RecoveryType recovery = 8;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_FlightTaskBaseType {
  // Indicates a type of capability to be used. List size for this element is
  // based on "Select All That Apply" condition.
  repeated MA_FlightCapabilityEnum capability_type = 1;
}

// Indicates the types of Flight capability.
enum MA_FlightCapabilityEnum {
  MA_FLIGHT_CAPABILITY_ENUM_UNSPECIFIED = 0;
  MA_FLIGHT_CAPABILITY_ENUM_MUST_FLY = 1;
  MA_FLIGHT_CAPABILITY_ENUM_LOITER = 2;
  MA_FLIGHT_CAPABILITY_ENUM_FORMATION = 3;
  MA_FLIGHT_CAPABILITY_ENUM_WAYPOINT_FOLLOWING = 4;
  MA_FLIGHT_CAPABILITY_ENUM_CURVE_FOLLOWING = 5;
  MA_FLIGHT_CAPABILITY_ENUM_HSA_CSA = 6;
  MA_FLIGHT_CAPABILITY_ENUM_ALTITUDE_STACKED_MARSHALL = 7;
  MA_FLIGHT_CAPABILITY_ENUM_LAUNCH = 8;
  MA_FLIGHT_CAPABILITY_ENUM_RECOVERY = 9;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_LoiterType {
  oneof choice {
    // The details of an orbit loiter.
    MA_OrbitType orbit = 1;
    // The details of a hover loiter.
    HoverType hover = 2;
    // The details of a hold loiter.
    MA_HoldType hold = 3;
  }
}

// Defines details of orbit loiter
// uci_version: 000.000.000.000
message MA_HoldType {
  // Point at which inbound leg of hold ends.
  Point2D_Type anchor_point = 1;
  // Operational context for the hold used to determine the appropriate default
  // parameters necessary to define the hold.
  optional MA_HoldContextEnum hold_context = 2;
  // Indicates the speed to maintain during the hold pattern.
  optional PathSegmentSpeedType speed = 3;
  // Orientation of the hold, defined as the course along the inbound leg.
  // xsd type: AngleType
  optional double orientation = 4;
  // Direction of turn when rounding the first loiter point.
  optional RelativeDirectionEnum turn_direction = 5;
  // Specifies the length of the hold based on the inbound leg.
  MA_HoldLegSpecificationType leg_specification = 6;
  // Specifies the turns of the hold.
  MA_HoldTurnSpecificationType turn_specification = 7;
  // Specifies the duration of the hold.
  MA_OrbitDurationType duration = 8;
  // Specified method for entering the hold.
  MA_HoldEntryTypeEnum entry_type = 9;
}

// Operational context for the hold used to determine the appropriate default
// parameters necessary to define hold.
enum MA_HoldContextEnum {
  MA_HOLD_CONTEXT_ENUM_UNSPECIFIED = 0;
  MA_HOLD_CONTEXT_ENUM_ADMIN = 1;
  MA_HOLD_CONTEXT_ENUM_TACTICAL = 2;
  MA_HOLD_CONTEXT_ENUM_ATC = 3;
}

// Defines details of orbit loiter
// uci_version: 000.000.200.000
message MA_HoldLegSpecificationType {
  oneof choice {
    // Duration to fly the inbound leg in seconds.
    // xsd type: DurationType
    string leg_time = 1;
    // Length to fly the inbound leg in meters.
    // xsd type: DistanceType
    double leg_length = 2;
  }
}

// Specifies the turns of the hold.
// uci_version: 000.000.000.000
message MA_HoldTurnSpecificationType {
  oneof choice {
    // Radius of the hold turns in meters.
    // xsd type: DistanceType
    double turn_radius = 1;
    // Turn rate at which the hold turns are to be executed in radians per second.
    // xsd type: AngleRateType
    double turn_rate = 2;
    // Specification of the type of turn to be executed during the hold.
    MA_HoldTurnTypeEnum turn_type = 3;
  }
}

// Used to denote the context for the hold to enable MA to fill in the
// appropriate default parameters.
enum MA_HoldTurnTypeEnum {
  MA_HOLD_TURN_TYPE_ENUM_UNSPECIFIED = 0;
  MA_HOLD_TURN_TYPE_ENUM_STANDARD = 1;
  MA_HOLD_TURN_TYPE_ENUM_MIL_POWER = 2;
  MA_HOLD_TURN_TYPE_ENUM_RELAX = 3;
}

// Specifies the turns of the hold.
// uci_version: 000.000.000.000
message MA_OrbitDurationType {
  oneof choice {
    // Radius of the hold turns in meters.
    // xsd type: DurationType
    string time = 1;
    // Turn rate at which the hold turns are to be executed in radians per second.
    uint32 number_of_orbits = 2;
    // Required time(s) to enter and/or exit the hold.
    DateTimeRangeType entry_exit_time = 3;
  }
}

// Specified method for entering the hold.
enum MA_HoldEntryTypeEnum {
  MA_HOLD_ENTRY_TYPE_ENUM_UNSPECIFIED = 0;
  MA_HOLD_ENTRY_TYPE_ENUM_DIRECT = 1;
  MA_HOLD_ENTRY_TYPE_ENUM_ANCHOR = 2;
  MA_HOLD_ENTRY_TYPE_ENUM_INBOUND = 3;
  MA_HOLD_ENTRY_TYPE_ENUM_OUTBOUND = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message MustFlyType {
  // Indicates the location that must be flown.
  MustFlyLocationType location = 1;
  // Indicates constraints on approach/ingress angles for the must fly location.
  // The child Min and Max elements define the acceptable range of bearing
  // values at the sibling Location that the System must approach from. Bearing
  // from is defined as the true heading from the sibling Location to the
  // System. Because of wrap-around Max value can be smaller than Min value.
  optional AnglePairType ingress_constraint = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.001
message MustFlyLocationType {
  oneof choice {
    // Indicates the must-fly location is an Entity, This is typically an
    // overflight location with the desired altitude determined by the service
    // design.
    EntityID_Type entity_id = 1;
    // Indicates the must-fly location is an OpPoint.
    OpPointID_Type op_point_id = 2;
    // Indicates the must-fly location is an OpLine.
    OpLineID_Type op_line_id = 3;
    // Indicates the must-fly location is an OpZone.
    OpZoneID_Type op_zone_id = 4;
    // Indicates the must-fly location is an OpVolume.
    OpVolumeID_Type op_volume_id = 5;
    // Indicates the must-fly location is a geospatial point.
    Point3D_Type point = 6;
    // Use of the Zone Target implies that a vehicle must enter the zone.
    ZoneExternalType zone_target = 7;
    // Use of the Line Target implies that a vehicle must fly through a corridor.
    LineTargetType line_target = 8;
    // Use of the Volume Target implies that a vehicle must enter the volume.
    OpVolumeType volume_target = 9;
  }
}

// Indicates the formation configuration.
// uci_version: 000.000.000.000
message MA_FormationType {
  // Indicates the different variations of formation flight.
  MA_FormationTemplateEnum formation_template = 1;
  // The designated anchor point for calculation of positions of all other
  // formation members.
  MA_FormationAnchorType formation_anchor = 2;
  // Slot identifier for system's formation position.
  // xsd type: MA_FormationSlotType
  int32 formation_slot = 3;
  // Attribute-defined keep-in zones.
  ZoneExternalType zone_target = 4;
}

// Indicates the different variations of formation flight.
enum MA_FormationTemplateEnum {
  MA_FORMATION_TEMPLATE_ENUM_UNSPECIFIED = 0;
  MA_FORMATION_TEMPLATE_ENUM_AGILE = 1;
  MA_FORMATION_TEMPLATE_ENUM_CONTAINER = 2;
  MA_FORMATION_TEMPLATE_ENUM_TRAIL = 3;
}

// The designated anchor point for calculation of positions of all other
// formation members.
// uci_version: 000.000.000.000
message MA_FormationAnchorType {
  // Platform ID used for relative peer positioning.
  ReferenceFrameID_Type reference_frame_id = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_AltitudeStackedMarshallType {
  // This element defines the parameters for a loiter.
  LoiterType loiter_kinematics = 1;
  // The minimum altitude of the stacked marshall in meters.
  // xsd type: AltitudeType
  double minimum_altitude = 2;
  // The maximum altitude of the stacked marshall in meters.
  // xsd type: AltitudeType
  optional double maximum_altitude = 3;
  // The altitude separation for the vehicles in the marshall in meters.
  // xsd type: DistanceType
  optional double minimum_altitude_separation = 4;
}

// Provides a choice among available flight control mode types.
// uci_version: 000.000.000.000
message MA_FlightControlModesChoiceType {
  oneof choice {
    // This message shall be used to provide the ability to command a new flight
    // vector to the Platform.
    MA_HSA_CSA_Type hsa_csa = 1;
    // This message shall be used to provide the ability to send a new waypoint
    // path or segment for the Platform to follow.
    MA_WaypointFollowingType waypoint_following = 2;
    // Indicates the parameters for curve following control.
    MA_CurveControlType curve_following = 3;
  }
}

// This message shall be used to provide the ability to command a new flight
// vector to the Platform.
// uci_version: 000.000.000.000
message MA_HSA_CSA_Type {
  // Altitude hold value to be achieved and reference to altitude measurement
  // source.
  optional AltitudeReferenceType altitude = 1;
  // Defines speed type (reference frame) for all speed related fields in this
  // message.
  optional PathSegmentSpeedType speed = 2;
  // Defines heading or course type and reference to hold.
  optional MA_DirectionChoiceType direction = 3;
}

// This message shall be used to provide the ability to send a new waypoint
// path or segment for the Platform to follow.
// uci_version: 000.000.000.000
message MA_WaypointFollowingType {
  // Indicates the Paths and Segments that make up the Route to be flown.
  MA_RouteType route = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_RouteType {
  // Indicates whether the route is the result of detailed mission planning
  // (TRUE), or is a simple stick route (FALSE).
  bool detailed = 1;
  // Indicates the unique ID of the first Path of the Route. The first Path of
  // the Route would generally be of PRIMARY PathType.
  PathID_Type first_in_route_path_id = 2;
  // Indicates which line/curve generation type was used to define the route.
  LineProjectionEnum route_projection = 3;
  // A series of path segments. A route can contain many paths. Some paths
  // provide alternate routes and contingency routes which branch from the
  // primary path. Other paths can be standalone, disconnected paths. Elements
  // given here are not necessarily in mission/flight order; it is necessary to
  // follow the linkages provided in NextPathSegment and/or
  // ConditionalPathSegment to traverse the segments in mission/flight order.
  repeated MA_RoutePathType path = 4;
  // Indicates information about the route from an operator that is intended for
  // display. Both short and longer detailed information can be provided.
  optional RemarksType remarks = 5;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_RoutePathType {
  // Indicates the unique ID for this Path. Other Paths or PathSegments may
  // branch to this path by referring to this ID.
  PathID_Type path_id = 1;
  // Indicates which path type is defined in this path object.
  MA_PathTypeEnum path_type = 2;
  // Indicates the unique ID of the first PathSegment of the Path.
  SegmentID_Type first_in_path_segment_id = 3;
  // A PathSegment is defined from the previous path segment EndPoint (or
  // current vehicle state if no previous path segment) to the current path
  // segment EndPoint. Elements given here are not necessarily in mission/flight
  // order; it is necessary to follow the linkages provided in NextPathSegment
  // and/or ConditionalPathSegment to traverse the segments in mission/flight
  // order.
  repeated MA_PathSegmentType path_segment = 4;
  // Indicates planned or assessed initial conditions of the vehicle at the
  // beginning of the Path.
  optional PlanningLocationType initial_conditions = 5;
  // Indicates the Airfield message containing the Runway information.
  optional AirfieldID_Type airfield_id = 6;
  // Indicates the runway at which this path is either taking off or landing.
  optional RunwayID_Type runway_id = 7;
  // Indicates information about the path from an operator that is intended for
  // display. Both short and longer detailed information can be provided.
  optional RemarksType remarks = 8;
}

// Indicates the action to be performed while on the associated path.
enum MA_PathTypeEnum {
  MA_PATH_TYPE_ENUM_UNSPECIFIED = 0;
  MA_PATH_TYPE_ENUM_PRIMARY = 1;
  MA_PATH_TYPE_ENUM_ALTERNATE = 2;
  MA_PATH_TYPE_ENUM_LOSS_OF_COMM = 3;
  MA_PATH_TYPE_ENUM_RETURN_TO_BASE = 4;
  MA_PATH_TYPE_ENUM_SOFT_DITCH = 5;
  MA_PATH_TYPE_ENUM_HARD_DITCH = 6;
  MA_PATH_TYPE_ENUM_INGRESS = 7;
  MA_PATH_TYPE_ENUM_EGRESS = 8;
  MA_PATH_TYPE_ENUM_TAKEOFF = 9;
  MA_PATH_TYPE_ENUM_LANDING = 10;
  MA_PATH_TYPE_ENUM_EMERGENCY_LANDING = 11;
  MA_PATH_TYPE_ENUM_TAXI = 12;
  MA_PATH_TYPE_ENUM_AIRBORNE = 13;
  MA_PATH_TYPE_ENUM_ARCING = 14;
  MA_PATH_TYPE_ENUM_BREAKING = 15;
  MA_PATH_TYPE_ENUM_ON_DEP_RADIAL = 16;
  MA_PATH_TYPE_ENUM_INITIAL_APPROACH = 17;
  MA_PATH_TYPE_ENUM_INTERMEDIATE_APPROACH = 18;
  MA_PATH_TYPE_ENUM_FINAL_APPROACH = 19;
  MA_PATH_TYPE_ENUM_BOLTER_WAVEOFF = 20;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_PathSegmentType {
  // Indicates the unique ID for this PathSegment. Other Paths or PathSegments
  // may branch to this path segment by referring to this ID.
  SegmentID_Type path_segment_id = 1;
  // Defines whether the path segment was manually defined or if it was defined
  // by an operator. This element can be used for many reasons including, but
  // not limited to, operator display.
  PathSegmentSourceEnum source = 2;
  // Indicates the end point of the PathSegment. The start point is the end
  // point of the previous PathSegment.
  MA_EndPointType end_point = 3;
  // This flag is used to determine whether the segment can be modified/removed
  // or was driven by an operator and therefore cannot be modified.
  optional bool locked = 4;
  // If this element is present and set to TRUE, this PathSegment has been
  // modified as part of a MODIFIED_ROUTE MissionPlan. This data is valuable to
  // some planning algorithms to support validation of a user modified route.
  optional bool modified = 5;
  // Indicates the speed or speed optimization of the System along the
  // PathSegment at the EndPoint.
  optional PathSegmentSpeedType speed = 6;
  // Defines the Civil Path Terminator information associated with the End Point.
  optional CivilPathTerminatorType civil_path_terminator = 7;
  // Indicates whether the vehicle shall climb/descend and at what rate while
  // traversing the path segment.
  optional ClimbType climb = 8;
  // Indicates the maximum roll allowed along the PathSegment. Angle in radians
  // representing vehicle's rotation about the longitudinal axis (the axis
  // through the body of the vehicle from tail to nose) in a locally level,
  // North-East-Down coordinate system centered on the vehicle. Roll is zero
  // when the aircraft is wing-tip to wing-tip level in the North-East plane.
  // xsd type: AngleType
  optional double maximum_roll = 9;
  // Indicates the acceleration of the System along the PathSegment at the
  // EndPoint.
  // xsd type: AccelerationType
  optional double acceleration = 10;
  // This element is used to specify the next non-conditional PathSegment. This
  // path segment can be the next segment in the current path or can be a
  // transitional segment to another Path defined by the PathID. If the PathID
  // is specified and differs from the current PathID, then this signals the end
  // of the current Path and a transition to another Path. If no NextPathSegment
  // is given then this is the end of the Route.
  optional NextPathSegmentType next_path_segment = 11;
  // This element is used to specify one or more conditional PathSegment.
  repeated ConditionalPathSegmentType conditional_path_segment = 12;
  // This element is intended to provide detailed inertial state information at
  // user defined increments within a path segment. This element provides data
  // which may be required for pre-mission analysis of a Route. Position data
  // may be specified as either a geospatial point or relative to a separately
  // defined reference frame.
  repeated InertialStateRelativeType inertial_state = 13;
  // Describes the mission planned required time of arrival. This message allows
  // the operator to see a delta between the required and estimated arrival
  // times that would allow for speed up/slow down determinations. This field is
  // used as a constraint on the timing of the waypoint.
  optional TimeWindowType required_time_of_arrival = 14;
  // Indicates information about the path segment from an operator that is
  // intended for display. Both short and longer detailed information can be
  // provided.
  optional RemarksType remarks = 15;
  // Specifies the navigation performance accuracy required in an airspace. This
  // value is in meters rather than the RNP standard of nautical miles.
  // xsd type: DistanceType
  optional double required_navigation_performance_in_meters = 16;
  // Specifies a geographical position determined by visual reference to the
  // surface, by reference to one or more radio NAVAIDs, by celestial plotting
  // or another navigational device.
  optional ForeignKeyType fix_identifier = 17;
}

// An enumeration specifying if the path segment was routed by the system or
// the operator.
enum PathSegmentSourceEnum {
  PATH_SEGMENT_SOURCE_ENUM_UNSPECIFIED = 0;
  PATH_SEGMENT_SOURCE_ENUM_AUTO_ROUTED = 1;
  PATH_SEGMENT_SOURCE_ENUM_OPERATOR_DEFINED = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_EndPointType {
  oneof choice {
    // This element is used to specify a point in the route where no turning
    // occurs. It is generally used for points associated with Actions such as
    // task "transitions", changes in acceleration, changes in speed, changes in
    // altitude, etc.
    WayPointType way_point = 1;
    // This element is used to specify all cases of turns in a segment including
    // fly-through and turn-short. It can additionally be associated with
    // tasks/actions that require or are coincident with turns. TurnPoints will
    // generally come in groups of at least two in linked PathSegments. All but
    // the last in a group will include a TurnRadius.
    TurnPointType turn_point = 2;
    // This element specifies a Loiter. Currently specifying a task/action
    // associated with a LoiterPoint when the task/action occurs only during a
    // portion of the Loiter is not supported.
    MA_LoiterPointType loiter_point = 3;
  }
}

// This element is used to specify all cases of turns in a segment including
// fly-through and turn-short. TurnPoints will generally come in groups of at
// least two in linked PathSegments. All but the last in a group will include
// a TurnRadius.
// uci_version: 002.001.002.001
message TurnPointType {
  // This element indicates the location and time of arrival of the end of the
  // path segment.
  WayPointPointChoiceType waypoint = 1;
  // Represents the desired behavior at the associated way point.
  TurnPointTypeEnum turn_point_type = 2;
  // Indicates the course at the Waypoint of this TurnPoint.
  // xsd type: AngleType
  optional double course = 3;
  // Indicates the bank angle or radius of the turn. When Turn Geometry is not
  // specified, indicates that the TurnPoint is in the end of a turn.
  optional TurnGeometryChoiceType turn_geometry = 4;
}

// Indicates the desired behavior at the associated turn point.
enum TurnPointTypeEnum {
  TURN_POINT_TYPE_ENUM_UNSPECIFIED = 0;
  TURN_POINT_TYPE_ENUM_TURN_SHORT = 1;
  TURN_POINT_TYPE_ENUM_FLY_OVER = 2;
  TURN_POINT_TYPE_ENUM_CAPTURE_OUTBOUND_COURSE = 3;
  TURN_POINT_TYPE_ENUM_START_TURN = 4;
  TURN_POINT_TYPE_ENUM_END_TURN = 5;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_LoiterPointType {
  // The geospatial loiter details.
  MA_LoiterType loiter = 1;
  // Indicates the time at which the loiter will end.
  // xsd type: DateTimeType (pattern .+Z)
  optional string end_time = 2;
}

// Used to specify the choice Civil Path Terminator Type associated with the

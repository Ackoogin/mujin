  repeated SensorCategoryEnum sensor_category = 4;
  // The unique identifier for the sensor system.
  repeated uint32 sensor_system_identity = 5;
  // Indicates the geographic/orbital domain of operations of a sensor system.
  // List size for this element is based on "Select All That Apply" condition.
  repeated EntityBasingEnum sensor_basing = 6;
  // DoD standard country code designator to which a sensor owes its allegiance.
  optional CountryCodeType owner_operator_country = 7;
}


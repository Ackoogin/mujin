// for details.
// uci_version: 000.000.000.000
message PO_ProductOutputCommandImageryType {
  // composed xsd extension base ProductOutputCommandBasicType
  ProductOutputCommandBasicType base = 1;
  // This ID is associated with the Capability message.
  PO_ProductGeneratorOutputID_Type product_output_id = 2;
  // This element specifies settings for JPEG files generated by the Command.
  // This element should be omitted when the sibling ProductFormat doesn't
  // indicate JPEG, settings are left to the discretion of the Command recipient
  // and/or default settings are acceptable.
  optional JPEG_SettingsType jpeg_settings = 3;
  // This element defines data to be placed into the header of the resulting
  // NITF product, commonly referred to at the NITF header "packing plan". This
  // element should be omitted when the sibling ProductFormat doesn't indicate
  // NITF, settings are left to the discretion of the Command recipient and/or
  // default settings are acceptable.
  optional NITF_PackingPlanPET nitf_packing_plan = 4;
  // Defined as the number of bytes in the input image divided by the number of
  // bytes in the output image.
  optional float compression_ratio = 5;
  // Indicates settings for imagery product defined in industry standard MISP.
  optional MISP_PackingPlanType misp_settings = 6;
  // Indicates the imagery product rate in frames/second on the service.
  optional uint32 product_rate = 7;
  // Indicates that an imagery product scan pattern is interlaced when true and
  // non-interlaced or progressive when false.
  optional bool interlaced = 8;
  // Indicates the imagery product size in bytes.
  optional uint32 product_size = 9;
  // Indicates an imagery product dimensions in horizontal and vertical pixels
  // and color depth.
  optional ProductResolutionType product_resolution = 10;
  // Settings for the video encoder for generating video streams.
  repeated VideoOutputSettingsType video_output = 11;

}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.001.000.000
message WeaponeeringTargetInfoType {
  // This element specifies whether the target requires a weapon type that has a
  // penetrating warhead.
  optional TargetHardnessEnum target_hardness = 1;
  // Target class specified by an external source or indicated in the program
  // related documentation. This information is typically used to support
  // refinement of the target impact point, improve lethality for a range of
  // target types, and to optimize fuze settings. A common range is [0,63].
  optional uint32 target_class = 2;
}

// Indicates the vulnerability of the target.
enum TargetHardnessEnum {
  TARGET_HARDNESS_ENUM_UNSPECIFIED = 0;
  TARGET_HARDNESS_ENUM_HARD_TARGET = 1;
  TARGET_HARDNESS_ENUM_MEDIUM_TARGET = 2;
  TARGET_HARDNESS_ENUM_SOFT_TARGET = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message ApproachConditionsType {
  // Indicates the flight mode an allocated store must use to achieve desired
  // endgame effects.
  optional StoreFlightModeEnum flight_mode = 1;
  // The distance the weapon needs to travel at the impact angle and the impact
  // azimuth before hitting the target.
  // xsd type: DistanceType
  optional double range_on_heading = 2;
  // Indicates the Approach Angle to the target in either Az/El or a unit vector
  // relative to the target body coordinate frame.
  optional ApproachAngleType approach_angle = 3;
  // The final approach to target parameters.
  optional TargetFinalApproachType target_final_approach = 4;
}

// Indicates the flight mode an allocated store must use to achieve desired
// endgame effects.
enum StoreFlightModeEnum {
  STORE_FLIGHT_MODE_ENUM_UNSPECIFIED = 0;
  STORE_FLIGHT_MODE_ENUM_DEFAULT = 1;
  STORE_FLIGHT_MODE_ENUM_DIRECT_TRAJECTORY = 2;
  STORE_FLIGHT_MODE_ENUM_USE_IMPACT_AZIMUTH = 3;
  STORE_FLIGHT_MODE_ENUM_RANGE_ON_BEARING = 4;
}

// Indicates the Approach Angle either in Azimuth / Elevation or a unit vector
// relative to the body coordinate system of the target.
// uci_version: 001.000.000.000
message ApproachAngleType {
  oneof choice {
    // Indicates the Azimuth and Elevation of the approach angle.
    AzElReferenceType az_el = 1;
    // Indicates a unit vector relative to the coordinate system of the target.
    UnitVectorType relative = 2;
  }
}

// Defines a line of sight ray in a world inertial or body frame or reference.
// uci_version: 001.000.000.000
message AzElReferenceType {
  // Specifies reference frame for which the sibling Azimuth and Elevation
  // elements apply.
  LOS_ReferenceEnum reference = 1;
  // Indicates the angle from the x-axis towards the y-axis as measured on the
  // xy plane. When the sibling Reference element indicates INERTIAL, azimuth is
  // defined as the angle between two lines in a global horizontal plane at the
  // observation point. The first line is from the observation point to true
  // north. The second line is from the observation point to the point of
  // interest projected onto the global horizontal plane. An azimuth of zero
  // indicates true north with values increasing clockwise. When the sibling
  // Reference element indicates BODY, azimuth is defined as the angle between
  // two lines in the plane containing the observer's roll and pitch axis (the
  // "RP" plane). The first line is from the observation point along the
  // observer's roll axis or "down the nose" in aircraft terminology. The second
  // line is from the observation point to the point of interest projected onto
  // the RP plane. An azimuth of zero indicates directly ahead of the observer
  // ("down the nose") with values increasing clockwise. An azimuth of Pi/2
  // indicates directly right of the observer.
  // xsd type: AngleType
  optional double azimuth = 2;
  // Indicates the angle from the xy-plane towards the z-axis. When the sibling
  // Reference element indicates INERTIAL, elevation is defined as the angle
  // between two lines in a global vertical plane at the observation point. The
  // first line originates from the observation point and extends along the
  // azimuth. The second line is from the observation point to the point of
  // interest. An elevation of zero indicates the point of interest is in the
  // observation point's horizontal plane. Elevation values are positive when
  // the point of interest is above the horizontal plane, negative when below.
  // When the sibling Reference element indicates BODY, elevation is defined as
  // the angle between two lines in a plane containing the observer's yaw axis.
  // The first line originates from the observation point and extends along the
  // azimuth. The second line is from the observation point to the point of
  // interest. An elevation of zero indicates the point of interest is in the
  // observer's roll-pitch (RP) plane. Elevation values are positive when the
  // point of interest is above the RP plane, negative when below.
  // xsd type: AngleHalfType
  optional double elevation = 3;
}

// Target Final Approach: Altitude defines an altitude relative to the target
// altitude that the store is commanded to fly at store target final approach
// range from the target to where it begins terminal maneuvers. Range is a
// distance from the target location that is determined by the store.
// uci_version: 001.000.000.000
message TargetFinalApproachType {
  // Altitude of store at target final approach.
  // xsd type: AltitudeType
  optional double altitude = 1;
  // Distance of store at target final approach.
  // xsd type: DistanceType
  optional double range = 2;
}

// The desired weapon impact conditions. Provided together with store/store
// variant type and quantity as part of a weaponeered DMPI.
// uci_version: 001.001.000.001
message ImpactConditionsType {
  // Indicates mode and settings for a fuze of the weapon.
  repeated FuzeType fuze = 1;
  // The desired weapon impact speed.
  // xsd type: SpeedType
  optional double impact_speed = 2;
  // Indicates the desired impact point on the body.
  optional ImpactPointType impact_point = 3;
  // Indicates the desired weapon impact angle.
  optional AzElReferenceType impact_angle = 4;
  // The rate of store rotation in RPM that the store is commanded to achieve at
  // endgame.
  optional uint32 spin_rate = 5;
}

// Weapon fuze mode and setting. See operational handbooks and TTP manuals for
// allowable fuze modes and settings.
// uci_version: 001.000.000.000
message FuzeType {
  // Indicates information for fuze height of burst and fuze delay time.
  FuzeTriggerType fuze_trigger = 1;
  // Fuze modes defined here are derived from operational handbooks and TTP
  // manuals. Impact is a type of fuze designed to function upon impact or after
  // delay. The time delay (if any) is measured from the instant of impact. The
  // proximity fuze is a miniature Doppler radar set. The lag time between
  // transmission and reception is precomputed and translated into selectable
  // burst height values in altitude above the target. In a time fuze, the delay
  // is initiated at bomb release from the aircraft and not at the instant of
  // impact. The hydrostatic type of fuze is employed in depth bombs for
  // underwater demolition work.
  optional WeaponFuzeModeEnum fuze_mode = 2;
  // For weapons with multiple fuzes, indicates which fuze the sibling elements
  // apply to. Optional for weapons with a single fuze.
  optional WeaponFuzePositionEnum fuze_position = 3;
  // The name of the fuze.
  // xsd type: VisibleString1024Type (pattern [ -~]{0,1024})
  optional string mnemonic = 4;
  // This indicates the time at which the fuze will arm after separating from
  // the aircraft. Prior to that time, the fuze will not detonate, even if a
  // fuze trigger is hit. This prevents fragmenting the vehicle if the weapon
  // blows back into the aircraft or if it is flying very low. Once the fuze
  // separation arm time elapses, the fuze is armed and the weapon is hot, it
  // will detonate when the fuze trigger hits.
  // xsd type: DurationType
  optional string fuze_separation_arm_time = 5;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message FuzeTriggerType {
  oneof choice {
    // Weapon fuze distance setting applies to proximity and hydrostatic fuze
    // modes. Hydrostatic values will be negative to denote subsurface. Proximity
    // values will be positive to denote height of burst above ground or distance
    // to the target depending on the fuze's sensing.
    // xsd type: DistanceType
    double fuze_distance = 1;
    // Weapon fuze delay time setting; applies to impact and time fuze modes.
    // xsd type: DurationType
    string fuze_delay_time = 2;
  }
}

// Indicates a weapon's fuze type.
enum WeaponFuzeModeEnum {
  WEAPON_FUZE_MODE_ENUM_UNSPECIFIED = 0;
  WEAPON_FUZE_MODE_ENUM_IMPACT = 1;
  WEAPON_FUZE_MODE_ENUM_PROXIMITY = 2;
  WEAPON_FUZE_MODE_ENUM_TIME = 3;
  WEAPON_FUZE_MODE_ENUM_HYDROSTATIC = 4;
}

// Indicates which of the weapon's fuzes the associated data applies to. This
// is used while specifying the weapon fuze modes and settings.
enum WeaponFuzePositionEnum {
  WEAPON_FUZE_POSITION_ENUM_UNSPECIFIED = 0;
  WEAPON_FUZE_POSITION_ENUM_NOSE = 1;
  WEAPON_FUZE_POSITION_ENUM_TAIL = 2;
  WEAPON_FUZE_POSITION_ENUM_OTHER = 3;
}

// Indicates the point of impact.
// uci_version: 001.000.000.000
message ImpactPointType {
  oneof choice {
    // Indicates a body location as an X,Y,Z offset relative to the body
    // coordinate system.
    OffsetLocationErrorType body_location = 1;
    // Indicates a body face and radial offset.
    BodyFaceType body_face = 2;
  }
}

// Indicates the offset of the component's location as well as the error
// probability.
// uci_version: 001.000.000.000
message OffsetLocationErrorType {
  // composed xsd extension base OffsetLocationType
  OffsetLocationType base = 1;
  // CEP indicates the Circular Error Probable. CEP defines the radius of a
  // circle of which 50% of the rounds would be expected to land.
  // xsd type: DistanceType
  optional double cep = 2;
  // Indicates the confidence of the CEP.
  // xsd type: PercentType
  optional double confidence = 3;
}

// Specifies an offset vector and an optional location key. See field
// annotations for more details.
// uci_version: 000.000.000.000
message OffsetLocationType {
  // Offset from the navigational center of the System to the Component in the
  // forward direction of the System (along the nose of the aircraft for
  // example), in meters.
  float offset_x = 1;
  // Offset from the navigational center of the System to the Component in the
  // right direction (perpendicular to the OffsetX axis when viewed from above
  // the System, with positive values to the right of the OffsetX axis), in
  // meters.
  float offset_y = 2;
  // Offset from the navigational center of the System to the Component in the
  // down direction (perpendicular to the OffsetX-OffsetY plane, with positive
  // values toward the bottom of the System), in meters.
  float offset_z = 3;
  // The Key of the pylon, bay, or other logical location where the Component is
  // mounted to the host System.
  optional ForeignKeyType location_key = 4;
}

// Indicates a body face and radial offset.
// uci_version: 001.000.000.000
message BodyFaceType {
  // Indicates the desired face of the body.
  BodyFaceEnum desired_face = 1;
  // Indicates a radial offset distance from the center of the face.
  // xsd type: DistanceType
  optional double radial_offset = 2;
  // Indicates the angular offset. 0 degrees is aligned with the X axis of the
  // body face.
  // xsd type: AnglePositiveType
  optional double theta = 3;
}

// Indicates the faces of a body.
enum BodyFaceEnum {
  BODY_FACE_ENUM_UNSPECIFIED = 0;
  BODY_FACE_ENUM_NORTH = 1;
  BODY_FACE_ENUM_EAST = 2;
  BODY_FACE_ENUM_SOUTH = 3;
  BODY_FACE_ENUM_WEST = 4;
  BODY_FACE_ENUM_ZENITH = 5;
  BODY_FACE_ENUM_NADIR = 6;
}


// See the annotation in the associated message for an overall description of
// the message and this type.
// uci_version: 000.000.000.000
message MA_ApprovalPolicyMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // Indicates the state of the internal software object that the data in the
  // message is based upon. The state of the software object is determined by
  // the publisher. The publisher could be the original/master publisher or an
  // intermediary re-publisher such as a persistence/data manager. This element
  // is not a commanded CRUD operation. It is not an indication of the state of
  // an instance of a message. It is not a mechanism for partial, incremental,
  // or fragmentary publication of a message. It is a signal from a publisher to
  // subscribers. For REMOVED state, in particular, some subscribers will mirror
  // the publisher and treat the message as if the object no longer exists, but
  // others, such as mission recorders, might not (in order to support retaining
  // historical records of activity, for example).
  optional ObjectStateEnum object_state = 2;
  // See annotations in child elements and messages/elements that use this type
  // for details.
  MA_ApprovalPolicyMDT message_data = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_ApprovalPolicyMDT {
  // composed xsd extension base DataRecordBaseType
  DataRecordBaseType base = 1;
  // Indicates the unique ID of the approval policy.
  ApprovalPolicyID_Type approval_policy_id = 2;
  // Indicates a set of approval policies for the results of planning activities.
  repeated MA_PlanPolicyType plans = 3;
  // Indicates approval policies which govern Plan Activation commands.
  repeated MA_PlanActivationPolicyType plan_activation = 4;
  // Indicates which Requirement (Effect, Action, Task, [Capability]Command,
  // Response) execution/performance related activities require approval.
  optional RequirementExecutionPolicyType requirement_execution = 5;
  // Indicates the geospatial zone and optionally time/date span or spans when
  // the policy is active. For task allocation, the policy is applicable to
  // allocations that 1) complete within the time/date span and 2) include Task
  // or Tasks whose target falls within the zone, regardless of when the Task
  // will be executed. For route planning, the policy is applicable to route
  // plans with segments that fall within the zone during the time/date span,
  // regardless of when the route plan was completed or the target of Tasks
  // associated with the segments. For task execution, the policy is applicable
  // to Tasks that 1) are scheduled to complete within the time/date span and 2)
  // have a target which falls within the zone. This element supersedes the
  // sibling Expires element.
  optional TimedZoneType timed_zone = 6;
  // Indicates the time and date when the policy expires. The policy is
  // applicable to task allocation and route planning activities completed prior
  // to this time. The policy is applicable to task execution activities
  // initiated prior to this time. When the sibling TimedZone element is used,
  // the time spans specified there supersede this element.
  // xsd type: DateTimeType (pattern .+Z)
  optional string expires = 7;
  // Allows the creator of the approval policy to specify the source or
  // motivation for this ApprovalPolicy such as ATO, ACO, etc.
  optional MissionTraceabilityType mission_traceability = 8;
}


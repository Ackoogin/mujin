// Indicates the satellite's endurance specified by the indicated elements.
// uci_version: 001.000.001.000
message SatelliteEnduranceType {
  // Indicates the satellite's propulsion endurance. It is expected that at
  // least one of the optional children is populated, corresponding to the
  // propulsion energy source of the satellite.
  optional EnduranceBaseType propulsion = 1;
  // Indicates the maneuverability endurance, expressed as the largest single
  // velocity change that could be achieved with the satellite's remaining or
  // planned propulsion endurance.
  optional OrbitalManeuverDetailsBaseType maneuver = 2;
  // Indicates the satellite's remaining or planned operational endurance. It is
  // expected that at least one of the optional children is populated,
  // corresponding to the operational energy source of the satellite.
  optional EnduranceBaseType operational = 3;
}

// The common elements used to measure the impulse needed to perform a
// maneuver.
// uci_version: 001.000.000.001
message OrbitalManeuverDetailsBaseType {
  // The measure of the impulse needed to perform a maneuver. It is used to
  // determine the mass of propellant required for a given maneuver.
  OrbitalDeltaVelocity_B_Type delta_velocity = 1;
  // The magnitude of the velocity impulse needed to cause the spacecraft to
  // transfer orbit. This value is equal to the RSS of the above DeltaVelocity
  // X/Y/Z components.
  // xsd type: SpeedType
  optional double delta_velocity_magnitude = 2;
  // The covariance matrix along with its associated category that defines the
  // elements represented in the covariance matrix for the delta velocity.
  optional CovarianceMatrixType delta_velocity_covariance = 3;
  // Estimated rocket burn time to accomplish the maneuver.
  // xsd type: DurationType
  optional string duration = 4;
  // The change in mass including the propellant.
  // xsd type: MassType
  optional double delta_mass = 5;
}

// Indicates a difference in velocity, independent of frame.
// uci_version: 000.000.000.000
message OrbitalDeltaVelocity_B_Type {
  // Indicates the difference in the x value of velocity, in the frame of the
  // values being compared.
  // xsd type: SpeedType
  double x = 1;
  // Indicates the difference in the y value of velocity, in the frame of the
  // values being compared.
  // xsd type: SpeedType
  double y = 2;
  // Indicates the difference in the z value of velocity, in the frame of the
  // values being compared.
  // xsd type: SpeedType
  double z = 3;
}


  VEHICLE_ACTION_ENUM_NAV_LIGHTS_OFF = 2;
  VEHICLE_ACTION_ENUM_LANDING_LIGHTS_ON = 3;
  VEHICLE_ACTION_ENUM_LANDING_LIGHTS_OFF = 4;
  VEHICLE_ACTION_ENUM_ANTI_COLLISION_LIGHTS_ON = 5;
  VEHICLE_ACTION_ENUM_ANTI_COLLISION_LIGHTS_OFF = 6;
  VEHICLE_ACTION_ENUM_LANDING_GEAR_RETRACT = 7;
  VEHICLE_ACTION_ENUM_LANDING_GEAR_EXTEND = 8;
  VEHICLE_ACTION_ENUM_SPOILERS_ENABLE = 9;
  VEHICLE_ACTION_ENUM_SPOILERS_DISABLE = 10;
  VEHICLE_ACTION_ENUM_ANTENNAS_RETRACT = 11;
  VEHICLE_ACTION_ENUM_ANTENNAS_EXTEND = 12;
  VEHICLE_ACTION_ENUM_TRANSPONDER_ON = 13;
  VEHICLE_ACTION_ENUM_TRANSPONDER_OFF = 14;
  VEHICLE_ACTION_ENUM_RADIO_CHANNEL_1 = 15;
  VEHICLE_ACTION_ENUM_RADIO_CHANNEL_2 = 16;
  VEHICLE_ACTION_ENUM_RADIO_CHANNEL_3 = 17;
  VEHICLE_ACTION_ENUM_RF_TRANSMIT_ON = 18;
  VEHICLE_ACTION_ENUM_RF_TRANSMIT_OFF = 19;
}

// Specifies whether the vehicle should put itself into a more survivable
// mode. Different vehicles will have specific behaviors that reduce the
// signature of the vehicle (doors closed, minimal use of flaps, etc.
enum VehicleSurvivabilityModeEnum {
  VEHICLE_SURVIVABILITY_MODE_ENUM_UNSPECIFIED = 0;
  VEHICLE_SURVIVABILITY_MODE_ENUM_ON = 1;
  VEHICLE_SURVIVABILITY_MODE_ENUM_OFF = 2;

    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string fc_track_from_fix_to_distance_along_track = 9;
    // Track From a Fix to a DME Distance Civil Path Terminator Type. This
    // element's children elements are subject to change over the course of
    // development.
    // xsd type: EmptyType (pattern [A-Za-z]{0})
    string fd_track_from_fix_to_dme_distance = 10;
    // Fix to Manual Termination Civil Path Terminator Type. This element's

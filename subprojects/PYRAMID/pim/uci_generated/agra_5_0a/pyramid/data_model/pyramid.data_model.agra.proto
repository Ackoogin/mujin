// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.001.001
message PlatformIdentityType {
  // Indicates the "platform type" of the Entity. Derived from MIL-STD-6016; see
  // MIL-STD-6016 DFI/DUIs 1797/001, 1797/002, 1797/003, 1797/004 and 1797/005
  // for additional details. In MIL-STD-6016, platform type indexes/values vary
  // by environment and therefore this element is only meaningful when paired
  // with the sibling PlatformTypeCategory element.
  uint32 platform_type = 1;
  // Indicates the MIL-STD-6016 list/category of the sibling PlatformType.
  // Derived from MIL-STD-6016; see MIL-STD-6016 DFI/DUI 275/004 for additional
  // details. Each environment has a corresponding set of specific types.
  EnvironmentEnum platform_type_category = 2;
  // This element represents the threat type of the entity. Threat type is
  // simply a high-level categorization of threats to be used when ELNOT is
  // unknown or not applicable. Derived from MIL-STD-6016.
  optional ThreatEnum threat_type = 3;
  // The basic type of unit based on MIL-STD-6016 DFI/DUI 288/001.
  optional UnitTypeEnum unit_type = 4;
  // Indicates how a submarine launches its missiles.
  optional LaunchCapabilityEnum launch_capability = 5;
  // Expresses an assessment as to whether contacts are of submarine origin with
  // added assessment of the confidence level.
  optional SubmarineConfidenceLevelEnum submarine_confidence_level = 6;
}


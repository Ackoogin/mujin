  // Foreign key is an identifier that references a type convention from another
  // system. i.e., a non-UCI unique identifier representing a track type.
  optional ForeignKeyType foreign_specific_track_type = 1;
  // Foreign key is an identifier that references an ID from another system.
  // i.e., a non-UCI unique identifier representing a track number.
  optional ForeignKeyType foreign_track_number = 2;
}

// Contains the fusion source information for an entity. Indicates the Entity
// is an output of a fusion service and provides references to a fusion input
// that fused/contributed to it.
// uci_version: 003.001.003.001
message EntityFusionSourceType {
  // Indicates the ID of a fusion input that is a contributor to this fusion
  // output Entity. The ID could be of a non-Entity object if a fusion service
  // supports this functionality.
  EntityContributorID_ChoiceType contributor = 1;
  // Indicates whether the Entity referred to by the sibling ContributorID
  // element is contributing to this Entity as a result of a fusion algorithm
  // calculation (TRUE) or as a result of an explicit command to the fusion
  // algorithm to merge them (FALSE).
  bool fusion_contributor = 2;
  // Indicates the probability of the correct association of this contributor
  // entity to the higher level correlated entity (in this post-fusion
  // correlated entity).
  // xsd type: PercentType
  double probability_of_correct_association = 3;
  // Indicates the Capability that generated the Entity that is a contributor to
  // this fused Entity.
  optional CapabilityID_Type contributor_capability_id = 4;
  // Indicates the Identity contribution from this contributor Entity.
  optional IdentityConfidenceType identity = 5;
  // Indicates the type, from an Entity reporting perspective, of System and/or
  // Service which created the contributing Entity. See enumerated type
  // annotations for further details.
  optional EntitySourceEnum source_type = 6;
  // Indicates the ID of the system which created the contributing Entity. This
  // is not the same as a system ID reported in sibling EntityContributorID. For
  // example, if the contributor is a Signal, and that Signal was received from
  // an offboard System, then their SystemID would go here in this element.
  optional SystemID_Type system_id = 7;
  // This element represents the latest time and date of the Source that
  // contributed to the ancestry of the Entity. This timestamp could be from the
  // Kinematics, Position, Identity, or other elements in the original Source
  // message.
  // xsd type: DateTimeType (pattern .+Z)
  optional string timestamp = 8;
}

// Indicates the contributors to the fused entity. This type allows specifying
// non-Entity contributors if a fusion service supports this functionality.
// uci_version: 000.000.000.000
message EntityContributorID_ChoiceType {
  oneof choice {
    // Indicates the ID of a fusion input Entity that is a contributor to this
    // fusion output Entity.
    EntityID_Type entity_id = 1;
    // Indicates the ID of a fusion input EOB emitter that is a contributor to
    // this fusion output Entity.
    EOB_EmitterID_Type eob_emitter_id = 2;
    // Indicates the ID of a fusion input System that is a contributor to this
    // fusion output Entity. The use case would be when PPLI data is received as a
    // J2.0, the translation of that to UCI results in a set of messages that can
    // be referenced by a SystemID_Type. This System can be a contributor to a
    // Fused Entity. The entity originator could be System (especially since PPLI
    // is usually self-reported), in which case the Fusion.SystemID would be the
    // same as this element, or they could be different if another platform was
    // reporting on the System's behalf.
    SystemID_Type system_id = 3;
    // Indicates the ID of a fusion input Signal that is a contributor to this
    // fusion output Entity.
    SignalID_Type signal_id = 4;
    // Indicates the ID of a fusion input SOB C2 record that is a contributor to
    // this fusion output Entity.
    SOB_C2_RecordID_Type sob_c2_record_id = 5;
    // Indicates the ID of a fusion input SOB Satellite record that is a
    // contributor to this fusion output Entity.
    SOB_SatelliteRecordID_Type sob_satellite_record_id = 6;
    // Indicates the ID of a fusion input Measurement that is a contributor to
    // this fusion output Entity.
    MeasurementID_Type measurement_id = 7;
  }
}


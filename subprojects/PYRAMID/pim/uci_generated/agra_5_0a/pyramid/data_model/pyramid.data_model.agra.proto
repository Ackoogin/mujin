  optional AO_CodeType supported_code = 2;
  // Describes the various emission constraints for the AO components.
  optional OpticalCollectionConstraintsType emission_constraints = 3;
}

// This type is used to specify a set of constraints that constrain when a PO
// or AO sensor can start collecting the requested image data.
// uci_version: 001.000.000.001
message OpticalCollectionConstraintsType {
  // composed xsd extension base CollectionConstraintsType
  CollectionConstraintsType base = 1;
  // The angle from the target plane at intersection of the optical line of
  // sight with the earth's surface at the time of the first image line.
  optional AngleHalfPairType sun_elev_angles = 2;
  // The angle from True North clockwise (as viewed from space) at the time of
  // the first image line.
  optional AnglePairType sun_azimuth_angles = 3;
  // The rate at which the sensor look-point moves across the terrain. This is
  // only applicable to area or line targets.
  // xsd type: SpeedType
  optional double sweep_speed = 4;
  // The orientation of the gimbal with respect to its reference frame.
  optional GimbalOrientationPairType gimbal_orientation = 5;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message GimbalOrientationPairType {
  // The reference frame the specified orientation constraints are with respect
  // to.
  PO_GimbalOrientationReferenceFrameEnum reference_frame = 1;
  // Identification of the constrained gimbal component.
  optional ComponentID_Type component_id = 2;
  // Specifies the pitch collection angle constraint.
  optional AnglePairType pitch = 3;
  // Specifies the roll collection angle constraint.
  optional AnglePairType roll = 4;
  // Specifies the yaw collection angle constraint.
  optional AnglePairType yaw = 5;
  // The constraint controls on individual axis for gimbals with more than three
  // degrees of freedom.
  repeated GimbalAxisPairType axis = 6;
}

// The enumeration of all reference frames that the gimbal's orientation may
// be in referenced to.
enum PO_GimbalOrientationReferenceFrameEnum {
  PO_GIMBAL_ORIENTATION_REFERENCE_FRAME_ENUM_UNSPECIFIED = 0;
  PO_GIMBAL_ORIENTATION_REFERENCE_FRAME_ENUM_REFERENCE_FRAME_GIMBAL = 1;
  PO_GIMBAL_ORIENTATION_REFERENCE_FRAME_ENUM_REFERENCE_FRAME_PLATFORM = 2;
}

// The ID type for UCI IDs that correspond to resource capabilities.
// uci_version: 000.000.000.000
message ComponentID_Type {

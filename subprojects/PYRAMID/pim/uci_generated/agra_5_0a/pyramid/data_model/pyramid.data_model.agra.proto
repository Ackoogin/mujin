// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_ShotDoctrineParametersType {
  // Use Launch range at which the weapon will intercept the target with high
  // energy, assuming no platform guidance or weapon guidance errors for:
  // 1.Current steering 2.Current shooter kinematic conditions (e.g.,
  // altitude/airspeed) 3.Target turn-and-run maneuver RangeTurnAndRun is not
  // applicable to ballistic trajectory targets.
  optional bool use_range_turn_and_run = 1;
  // The magnitude of the maximum angle the target can turn away from the
  // platform which results in weapon intercept of the target with nominal
  // energy, assuming an immediate employment command. This field is valid only
  // if RangeMaxGuidance >= TargetRange >= RangeTurnandRun. This field is never
  // greater than the magnitude of the target aspect angle. For air platforms,
  // this turn is in the horizontal plane defined by the north and east axes.
  // xsd type: AngleHalfPositiveType
  optional double digital_maneuvering_cue_angle = 2;
  // This field describes the number of shots to be allocated per target.
  optional int32 missiles_per_contact = 3;
  // The minimum distance between a platform and a track that a shot will be
  // released at. Works together with ShootNET to form a shot window
  // xsd type: DistanceType
  optional double shoot_nlt = 4;
  // The maximum distance between a platform and a track that a shot will be
  // released at. Works together with ShootNLT to form a shot window
  // xsd type: DistanceType
  optional double shoot_net = 5;
  // This field specifies that MA should recalculate optimal targets during the
  // engagement
  optional bool enable_target_recalculation = 6;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message RequirementGuidanceType {
  // Indicates an intended form of Mission C2 for the Requirement. In a System
  // with multiple forms of Mission C2 and multiple operators, this element can
  // be used to control which services, operators, etc. consider the Requirement
  // as an input. List size for this element is based on "Select All That Apply"
  // condition.
  repeated RequirementUsageEnum usage = 1;
  // Indicates resource allocation, timeliness and approval guidance constraints
  // on the planning and execution of the Requirement by tactical nodes/Systems.
  // This guidance is generally given by operational C2 nodes to tactical C2
  // nodes per Requirement (per "tasking"). See enumerate annotations for
  // further details. The enumerates reflect well-established, short-hand
  // terminology. The guidance and enumerates functionally overlap with some UCI
  // concepts such as Approval Policy but should be thought of as informing the
  // creation of or tactical use of those other UCI concepts; the enumerates
  // give up front guidance, prior to creation of Approval Policies, resource
  // scheduling, timing constraints, etc. This element can result in approval
  // being required, in addition to what is required by the ApprovalPolicy of
  // the System, but it cannot disable an approval required by an applicable
  // ApprovalPolicy.
  optional TacticalPlanningAndExecutionEnum tactical_planning_and_execution = 2;
  // Indicates guidance on how to react to a failure to complete the
  // Requirement. For example, if a Strike Task failed and this element
  // indicated RETRY then a tactical node would be expected to re-strike the
  // target subject to other constraints. See enumeration annotations for
  // further details.
  optional FailureGuidanceEnum failure = 3;
}

// Indicates intended/allowed usage of a Requirement.
enum RequirementUsageEnum {
  REQUIREMENT_USAGE_ENUM_UNSPECIFIED = 0;
  REQUIREMENT_USAGE_ENUM_PLANNED_C2 = 1;
  REQUIREMENT_USAGE_ENUM_DIRECT_C2 = 2;
  REQUIREMENT_USAGE_ENUM_RESPONSE_C2 = 3;
}

// Indicates resource allocation, timeliness and approval guidance on planning
// and execution of tactical Requirements. This guidance is generally given by
// operational C2 nodes to tactical C2 nodes per Requirement (per "tasking").
// The enumerates reflect well-established, short-hand terminology. The
// guidance and enumerates functionally overlap with some UCI concepts such as
// Approval Policy but should be thought of as informing the creation of or
// tactical use of those other UCI concepts; the enumerates give up front
// guidance, prior to creation of Approval Policies, resource scheduling,
// timing constraints, etc.
enum TacticalPlanningAndExecutionEnum {
  TACTICAL_PLANNING_AND_EXECUTION_ENUM_UNSPECIFIED = 0;
  TACTICAL_PLANNING_AND_EXECUTION_ENUM_PRE_PLAN = 1;
  TACTICAL_PLANNING_AND_EXECUTION_ENUM_ON_ORDER = 2;
  TACTICAL_PLANNING_AND_EXECUTION_ENUM_BE_PREPARED_TO = 3;
}

// Indicates guidance for how to proceed when a failure occurs. See enumerated

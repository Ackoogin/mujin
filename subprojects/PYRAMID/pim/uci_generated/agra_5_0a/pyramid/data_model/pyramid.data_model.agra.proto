  // Indicates the boundary of the endurance footprint.
  BoundaryType boundary = 1;
  // Indicates the Height Above Ellipsoid (HAE) reference for the footprint.
  // This element is required when the footprint is based on a smooth earth
  // model and the sibling Boundary element doesn't specify Altitude. It should
  // be omitted otherwise.
  // xsd type: AltitudeType
  optional double reference_altitude = 2;
  // Indicates estimated remaining time of operation with current
  // fuel/charge/power plus the estimated time remaining until the endurance
  // footprint shrinks to its smallest size.
  // xsd type: DurationType
  optional string duration = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000

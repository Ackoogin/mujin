// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message MA_PlanPolicyType {
  // Indicates the set of planning activities whose generated plans are subject
  // to the sibling *Policy elements.
  repeated MA_PlanPolicyApplicablePlanType applicable_planning_activity = 1;
  // Indicates the default approval policy for the sibling
  // ApplicablePlanningActivity. The default policy can be overridden in
  // specific conditions as indicated by the ByResultPolicy or ByTriggerPolicy
  // siblings of this element. For example, this element could indicate that
  // approval is required by default for all TaskPlans and then use
  // ByResultPolicy or ByTriggerPolicy siblings to specify conditions when task
  // allocation approval is not required. Alternately, this element could
  // indicate that approval is not required by default and then use
  // ByResultPolicy or ByTriggerPolicy siblings to specify conditions when task
  // allocation approval is required. Creators of this message are expected to
  // carefully avoid creating logically inconsistent ByResultPolicy and
  // ByTriggerPolicy instances and therefore no guidance is given on
  // deconflicting illogical instances. For example, an ApprovalPolicy that
  // indicates approval is not required by default with conflicting
  // ByResultPolicy or ByTriggerPolicy overrides of 1) AUTO_REJECT for
  // DROPPED_TASKS and 2) AUTO_APPROVE for operator triggered DROPPED_TASKS
  // would be considered illogical.
  optional ApprovalPolicyBaseType default_policy = 2;
  // Indicates approval policies when planning activity results match certain
  // conditions. Conditions specified here are considered to be overrides to the
  // default planning activity approval policy given in the sibling Default
  // element. For example, if the default policy indicates task allocation
  // approval is never required, this element could override the default and
  // require approval whenever a task allocation results in previously allocated
  // Task or Tasks being dropped. See the annotations in the sibling
  // DefaultPolicy element for an overview of how the siblings relate to each
  // other. If multiple instances are given, each should be a different Result
  // instance as indicated by the child Result element.
  repeated ByResultPolicyType by_result_policy = 3;
  // Indicates approval policies for re-plan activities initiated by triggered
  // events, overriding the default approval policy for the planning activity
  // given in the sibling DefaultPolicy element. Additionally, this element
  // allows trigger-specific policies for a specific planning activities. For
  // example, if the default policy indicates route planning approval is never
  // required, this element could override, requiring approval for route plans
  // affecting all Systems triggered by new threats if the route re-plan results
  // in dropped tasks. If multiple instances are given, each should be of a
  // different trigger type as indicated by the child EventTrigger element.
  repeated ByTriggerPolicyType by_trigger_policy = 4;
}


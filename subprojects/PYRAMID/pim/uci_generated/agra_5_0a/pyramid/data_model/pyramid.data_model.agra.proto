}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message MA_SystemCharacteristicType {
  oneof choice {
    // Indicates an identity to be compared to the identity of the System.
    EntityIdentityChoiceType identity = 1;
    // Indicates the position uncertainty to be compared to the position
    // uncertainty of the System's kinematics. This element represents the
    // positional accuracy of the target. It is the area, in square data miles,
    // within which it is assessed that there is a 95% probability that the target
    // lies. The value given in this element can be compared to either the Quality
    // element of the target or a calculated uncertainty area for the target based
    // on its uncertainty ellipse.
    float position_uncertainty = 2;
    // Indicates the position staleness to be compared to the kinematic staleness
    // of the System's kinematics.
    // xsd type: DurationType
    string position_staleness = 3;
    // Indicates a value priority/rank to be compared to the priority/rank in
    // PrioritizationList referencing the System.
    MA_PrioritizationListValueType prioritization_list = 4;
    // Indicates behaviors, activities, use of capabilities, etc. to be compared
    // to those of the battlespace object associated with the System.
    BehaviorType behavior = 5;
  }
}


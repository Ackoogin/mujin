  SIGNAL_TYPE_ENUM_FINE = 2;
  SIGNAL_TYPE_ENUM_LPI_CUED = 3;
  SIGNAL_TYPE_ENUM_LPI_UNCUED = 4;
  SIGNAL_TYPE_ENUM_NETMAPPING = 5;
}

// See annotations in child elements and messages/elements that use this type

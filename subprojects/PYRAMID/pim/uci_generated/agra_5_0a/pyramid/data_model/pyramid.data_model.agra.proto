}

// Two Line Element (TLE) is a standard format for conveying the orbital
// elements of an Earth orbiting object at a point in time. Prediction models
// may be used to determine past and future positions of the object based on
// the TLE content.
// uci_version: 003.001.001.000
message TLE_Type {
  // composed xsd extension base TLE_BaseType
  TLE_BaseType base = 1;
  // Indicates the identity of the asset.
  SatelliteIdentifierType satellite_identity = 2;
  // The classification of the TLE.
  ClassificationEnum classification = 3;
  // Represents the orbital model used to generate the data. 1=SGP, 2=SGP4,
  // 3=SDP4, 4=SGP8, 5=SDP8, 0=SGP4/SDP4 as appropriate. Distributed element
  // sets are typically marked 0.
  uint32 ephemeris_type = 4;
}

// Characterizes the size of the sensor measurement extent.
// uci_version: 001.001.000.001
message SourceCoverageType {
  // Identifies the reference frame source limits.
  optional LOS_MeasurementEnum fov_reference_frame = 1;
  // Minimum/Maximum instrumented range of sensor.
  optional SlantRangeConstraintsType range_limits = 2;
  // Minimum/Maximum instrumented range rate of sensor.
  optional SpeedRangeType range_rate_limits = 3;
  // Minimum/Maximum Azimuth limits of the sensor.
  optional AnglePairType azimuth_limits = 4;
  // Minimum/Maximum Elevation limits of the sensor.
  optional AngleHalfPairType elevation_limits = 5;
  // Minimum/Maximum Azimuth Angle Rate limits of the sensor.
  optional AngleRateRangeType azimuth_angle_rate_limits = 6;
  // Minimum/Maximum Elevation Angle Rate limits of the sensor.
  optional AngleRateRangeType elevation_angle_rate_limits = 7;
  // The Minimum/Maximum limits of the sensor for the measurement of the inner
  // product of the target pointing vector with the sensor Y-axis. In the case
  // of linear arrays, the Y-axis is the same as the orientation of the linear
  // array. In the case of two-dimensional arrays, the Y-axis is the
  // "Horizontal" axis, coarsely equivalent to Azimuth.
  optional DoubleMinMaxType coscone_y_range_limits = 8;
  // The Minimum/Maximum limits of the sensor for the measurement of the inner
  // product of the target pointing with the sensor Z-axis. This term is only
  // used for two-dimensional arrays. The Z-axis is the "Down" axis of the
  // array, perpendicular to both the X-axis (boresight) and the Y-axis
  // (horizontal), coarsely equivalent to Elevation.
  optional DoubleMinMaxType coscone_z_range_limits = 9;
  // The Minimum/Maximum limits of the sensor for the measurement of the rate of
  // change of the inner product of the target pointing vector with the sensor
  // Y-axis. In the case of linear arrays, the Y-axis is the same as the
  // orientation of the linear array. In the case of two-dimensional arrays, the
  // Y-axis is the "Horizontal" axis, making it coarsely equivalent to the
  // Azimuth rate with units of per second.
  optional DoubleMinMaxType coscone_y_rate_range_limits = 10;
  // The Minimum/Maximum limits of the sensor for the measurement of the rate of
  // change of the inner product of the target pointing vector with the sensor Z
  // axis. This term is only used for two-dimensional arrays. The Z-axis is the
  // "Down" axis of the array, perpendicular to both the X-axis (boresight) and
  // the Y-axis (horizontal), making it coarsely equivalent to the Elevation
  // rate with units of per second.
  optional DoubleMinMaxType coscone_z_rate_range_limits = 11;
  // Identifies the unique ID of a Capability Coverage Area that is the source
  // of an item.
  repeated CapabilityCoverageAreaID_Type capability_coverage_area_id = 12;
}


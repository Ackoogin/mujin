// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message SMTI_CommandResponseType {
  // Indicates what type of target and / or processing is associated with this
  // collection.
  SMTI_CapabilityEnum capability = 1;
  // Provides additional processing information for this capability.
  optional SMTI_SubCapabilityEnum sub_capability = 2;
  // Indicates constraints on the collection and/or processing.
  optional SMTI_CollectionConstraintsType collection_constraints = 3;
  // Indicates a required output Product of the Command. Only Products
  // consistent with SMTI and supported by the commanded SMTI Capability should
  // be requested. If omitted, no output Product should be produced. See
  // ProductTypeEnum for further details.
  repeated ProductOutputCommandSMTI_Type product_output = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.001.001.001
message StrikeWeaponCommandType {
  oneof choice {
    // If true, this store will be commanded into a state where it is ready to
    // receive cryptographic keys.
    bool select_for_key_load = 1;
    // The identifier used to uniquely address the target.
    GeoLocatedObjectType assign_target = 2;
    // When true, the weapon is commanded to the armed state.
    bool weapon_arm = 3;
    // If true, this store will be selected for ejection from the host platform
    // without being armed or otherwise prepared for launch. The next time all
    // release conditions are met and release consent is provided this store will
    // be jettisoned.
    bool select_for_jettison = 4;
    // Indicates the weapon will calculate the LAR information.
    bool generate_dynamic_lar = 5;
    // If true, the next time all release conditions are met and release consent
    // is provided this store will be released.
    bool select_for_release = 6;
    // Indicates a PRF and/or PIM code supported by this store.
    AO_CodeType select_ao_code = 7;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.002.003.001
message RequirementConstraintsType {
  // Indicates a constraint in the form of the Rank of the associated
  // Requirement (Effect, Action, Task, [Capability]Command or Response).
  optional ComparableRankingType rank = 1;
  // Indicates whether a) an in-work/planned item or items of a lower rank
  // should be interrupted/replanned in order to address this item (TRUE) or b)
  // this item should be simply queued/planned according to rank without
  // interrupting in-work/planned items (FALSE). For example, a Task being added
  // to an existing TaskPlan (TaskPlanCommand constrained by an existing
  // TaskPlan) would potentially cause unlocked Tasks of lower rank in the
  // existing TaskPlan to be unallocated if 1) this element indicated TRUE and
  // 2) the lower ranked Tasks prevented the higher ranked Task from being
  // allocated.
  optional bool interrupt_lower_rank = 2;
  // Indicates allocation related constraints which can vary by Requirement at
  // the discretion of the creator.
  optional RequirementAllocationParametersType allocation = 3;
  // Indicates a temporal constraint on the Requirement. Allows for defining for
  // each timing type (RequirementTimingEnum).
  repeated RequirementTimingType timing = 4;
  // Indicates a constraint in the form of kinematic position of Requirement
  // actor or actors. When more than one is given they are logically ANDed.
  repeated RequirementKinematicConstraintsType kinematic = 5;
  // Indicates a constraint in the form of a temporal dependency between
  // Requirements; between Effect, Action, Task, [Capability]Command or Commands
  // or Response. If more than one is given, they are logically ANDed. For
  // example, a pre-strike image collection (PO Task) might be required several
  // minutes prior to a strike (Strike Task) to determine combat ID and target
  // coordinates. A post-strike image collection (PO Task) might be required
  // several minutes after the strike to inform battle damage assessment. The
  // dependency between the three Tasks can be established with this element.
  // Assuming the Strike Task is the most difficult to plan/coordinate, the
  // other two Tasks would likely each have dependencies on the Strike Task in
  // order to orchestrate the desired "look-shoot-look" sequence.
  repeated RequirementDependencyType dependency = 6;
  // Indicates the maximum allowed classification level of the networks that the
  // allocated system can disseminate products to for this task. The allocated
  // system must have a dissemination route for data at this classification or
  // lower. For example, when trying to collect data to hand-off to an
  // unclassified system or network, the allocated system has to be able to
  // generate products at no higher than the specified level and have the
  // authority to disseminate on a network at no higher than the specified
  // classification level.
  optional DataProductClassificationLevelType max_product_dissemination_classification_level = 7;
  // Indicates a constraint in the form of an analytic measure that the
  // Requirement must satisfy when planned/executed.
  optional AnalyticConstraintsType analytic = 8;
  // Indicates a constraint on the highest acceptable classification level at
  // which the Response can be planned and executed.
  optional SecurityInformationType acceptable_classification_level = 9;
  // Indicates whether or not communications are required when executing the
  // Requirement. In this context, "required" means the creator or a Requirement
  // considers communications as necessary for C2 and/or Product dissemination
  // related to this Requirement, independent of the type of vehicle that it is
  // allocated to. This element may result in consideration of communications
  // allocations during Requirement allocation.
  optional bool comms_required = 10;
  // Indicates other types of Requirements that can be decomposed from, used to
  // plan, used to implement, inherited from traced parents or otherwise
  // associated with the subject Requirement.
  optional RequirementTaxonomyType allowed_requirement_types = 11;
  // Indicates other types of Requirements that cannot be decomposed from, used
  // to plan, used to implement, inherited from traced parents or otherwise be
  // associated with the subject Requirement.
  optional RequirementTaxonomyType excluded_requirement_types = 12;
  // Free-text explanation of sibling constraints, additional extraordinary
  // constraints, etc.
  // xsd type: VisibleString1024Type (pattern [ -~]{0,1024})
  optional string constraints_narrative = 13;
  // Indicates an allowed domain/environment which the Requirement can be
  // employed from and and allowed "target" domain/environment. See enumerated
  // type annotations for further details. List size for this element is based
  // on "Select All That Apply" condition.
  repeated EnvironmentPairingEnum allowed_domain_pairing = 14;
  // Indicates an excluded domain/environment which the Requirement can't be
  // employed from an excluded "target" domain/environment. See enumerated type
  // annotations for further details. List size for this element is based on
  // "Select All That Apply" condition.
  repeated EnvironmentPairingEnum excluded_domain_pairing = 15;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message RequirementAllocationParametersType {
  // Indicates the system and optionally Capability that the Requirement
  // (Effect, Action, Task, [Capability]Command, Response) MUST be allocated to
  // during the allocation process. The system can be an explicit UCI System or
  // implied UCI System (by Identity, hosted Capability, kinematics, etc.) in
  // which case the associated UCI System must be determined as part of the
  // allocation process. If multiple child elements are given: 1) allocation to
  // any one of the associated Systems is the minimum expectation, 2)
  // decomposition of the Requirement into multiple child Requirements allocated
  // across the associated Systems is acceptable, 3) there is no expectation
  // that each associated System must perform the Requirement. This element
  // allows the Requirement creator to force an allocation to a specific system
  // at the risk of 1) a less than optimal overall solution or 2) failure of the
  // Requirement being allocated despite availability of another suitable system.
  optional RequirementAllocationConstraintType required_allocation = 1;
  // Indicates the system and optionally Capability that the Requirement
  // (Effect, Action, Task, [Capability]Command, Response) should be allocated
  // to during the allocation process. The system can be an explicit UCI System
  // or implied UCI System (by Identity, hosted Capability, kinematics, etc.) in
  // which case the associated UCI System must be determined as part of the
  // allocation process. If multiple child elements are given: 1) allocation to
  // any one of the associated Systems is the minimum expectation, 2)
  // decomposition of the Requirement into multiple child Requirements allocated
  // across the associated Systems is acceptable, 3) there is no expectation
  // that each associated System must perform the Requirement. This element
  // allows the Requirement creator to suggest an allocation to a specific
  // system at the risk of 1) a less than optimal overall solution or 2) failure
  // of the Requirement being allocated despite availability of another suitable
  // system.
  optional RequirementAllocationConstraintType preferred_allocation = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message RequirementAllocationConstraintType {
  // Indicates the SystemID of the System that is the target of the allocation
  // constraint.
  repeated SystemID_Type system_id = 1;
  // Indicates a kind/type or instance of platform/system that is the target of
  // the allocation constraint. For example, this element could be used to
  // allocate a Requirement to any fighter aircraft platform, or a specific kind
  // of fighter aircraft, or a specific tail number of aircraft, or an aircraft
  // with an aircrew member with a certain voice call sign.
  repeated IdentityType identity = 2;
  // Indicates the CapabilityID of the Capability that is the target of the
  // allocation constraint. If multiple required Capabilities are given: 1)
  // allocation to any one of the Capabilities is the minimum expectation, 2)
  // decomposition of the Requirement into multiple child Requirements allocated
  // across the multiple required Capabilities is acceptable, 3) there is no
  // expectation that each Capability must perform the Requirement.
  repeated CapabilityID_Type capability_id = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.003.000
message RequirementKinematicConstraintsType {
  // Indicates which Requirement actor the sibling kinematic constraints are
  // applicable to.
  RequirementObjectEnum applicable_object = 1;
  // This element gives a geographical filter to the query.
  repeated GeoFiltersQueryType geo = 2;
  // This element gives an orbital filter to the query.
  repeated OrbitalFiltersQueryType orbital = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message CapabilityCommandTemporalConstraintsType {
  // Indicates temporal scheduling of the Command is critical in order for the
  // Command's results to be useful. This element amplifies the sibling elements
  // by explicitly stating which *must* be met. If omitted, scheduling the
  // command to satisfy the sibling elements isn't critical; the sibling element
  // can be used as guidance if given but the command should still be scheduled
  // even if they aren't all satisfied.
  optional SchedulingCriticalityEnum temporal_criticality = 1;
  // Indicates the start time window for the command, including repetition. The
  // beginning of the range represents a start-no-earlier-than time. The end of
  // the range represents a start-no-later-than time. If omitted, the command
  // should be scheduled for immediate start within other scheduling constraints.
  optional DateTimeRangeType start_time_window = 2;
  // Indicates whether the sibling StartTimeWindow applies to only the first
  // command of a repeating series (TRUE) or all (first and all subsequent)
  // commands in a repeating series (FALSE). Optional for non-repeating
  // commands. Equivalent to TRUE when omitted for repeating commands.
  optional bool window_on_first_only = 3;
  // Indicates the end time window for the command, including repetition. The
  // beginning of the range represents an end-no-earlier-than time. The end of
  // the range represents an end-no-later-than time. If omitted, end time is
  // left to the discretion of the command recipient.
  optional DateTimeRangeType end_time_window = 4;
}

// This type describes scheduling criticality from a temporal perspective.
enum SchedulingCriticalityEnum {
  SCHEDULING_CRITICALITY_ENUM_UNSPECIFIED = 0;
  SCHEDULING_CRITICALITY_ENUM_START_TIME_CRITICAL = 1;
  SCHEDULING_CRITICALITY_ENUM_END_TIME_CRITICAL = 2;
  SCHEDULING_CRITICALITY_ENUM_START_AND_END_TIME_CRITICAL = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message RequirementGenerationDependencyType {
  // composed xsd extension base RequirementDependencyBaseType
  RequirementDependencyBaseType base = 1;
  // Identifies the RequirementIndex of the Requirement which the sibling
  // elements are relative to.
  uint32 reference_requirement_index = 2;
}

// The possible objectives of a collection activity.
enum CollectionObjectiveEnum {
  COLLECTION_OBJECTIVE_ENUM_UNSPECIFIED = 0;
  COLLECTION_OBJECTIVE_ENUM_COLLATERAL_DAMAGE_ESTIMATE = 1;
  COLLECTION_OBJECTIVE_ENUM_BATTLE_DAMAGE_ESTIMATE = 2;
  COLLECTION_OBJECTIVE_ENUM_DMPI_PLACEMENT = 3;
  COLLECTION_OBJECTIVE_ENUM_BATTLE_DAMAGE_ASSESSMENT = 4;
  COLLECTION_OBJECTIVE_ENUM_COLLATERAL_DAMAGE_ASSESSMENT = 5;
}

// See the annotation in the associated message for an overall description of
// the message and this type.
// uci_version: 000.000.000.000
message MA_TaskMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // Indicates the state of the internal software object that the data in the
  // message is based upon. The state of the software object is determined by
  // the publisher. The publisher could be the original/master publisher or an
  // intermediary re-publisher such as a persistence/data manager. This element
  // is not a commanded CRUD operation. It is not an indication of the state of
  // an instance of a message. It is not a mechanism for partial, incremental,
  // or fragmentary publication of a message. It is a signal from a publisher to
  // subscribers. For REMOVED state, in particular, some subscribers will mirror
  // the publisher and treat the message as if the object no longer exists, but
  // others, such as mission recorders, might not (in order to support retaining
  // historical records of activity, for example).
  optional ObjectStateEnum object_state = 2;
  // See annotations in child elements and messages/elements that use this type
  // for details.
  MA_TaskMDT message_data = 3;
}

// See the annotation in the associated message for an overall description of
// the message and this type.
// uci_version: 000.000.000.000
message MA_TaskMDT {
  // Unique identifier for a task. Minor updates to the Task can be indicated by
  // an update of the value in the child Version element. More significant
  // updates, replacements, etc. might warrant a new instance with a different
  // child UUID value.
  TaskID_Type task_id = 1;
  // Identifies the type of this Task instance.
  MA_TaskType task_type = 2;
  // Indicates whether the task is meant to be executed by a single entity or as
  // a joint operation. A join operation implies forming a group prior to
  // execution. A single entity could be a single system or a single pre-formed
  // group.
  MA_TaskPluralityEnum task_plurality = 3;
  // Indicates any Constraints that apply to the Task.
  repeated MA_ConstraintID_Type constraint_id = 4;
  // Indicates constraints on the Task. The constraint type used here is common
  // to all Requirement types: Effect, Action, Task, [Capability]Command,
  // Response. Requirement constraints can be 1) given in a [Requirement]
  // message, 2) overridden as a planning input in a [Requirement]PlanCommand
  // message, 3) further refined/overridden during plan creation and reported in
  // a [Requirement]Plan message to inform subsequent planning or execution.
  optional MA_RequirementConstraintsType task_constraints = 5;
  // Indicates guidance on planning and C2 of the Task.
  optional RequirementGuidanceType task_guidance = 6;
  // Indicates traceability and other metadata associated with the Task.
  optional RequirementMetadataType metadata = 7;
}

// Identifies the type of this Task instance. Note: When modifying this
// complexType (whether adding or removing choices), there are equivalent
// complexTypes that require the same modifications. Changes to this type may
// necessitate a modification to CapabilityTaxonomyType.
// uci_version: 000.000.000.000
message MA_TaskType {
  oneof choice {
    // Air sample includes direct sampling of the air (SAMPLE) and remote sensing
    // with spectral analysis (SPECTROMETER) with the intent of detecting NBC
    // events.
    AirSampleTaskType air_sample = 1;
    // Indicates a Task to collect Air Moving Target Indicator (AMTI) data.
    AMTI_TaskType amti = 2;
    // Indicates a Task to perform an optical emission such as laser designation.
    AO_TaskType ao = 3;
    // Indicates a Task to perform Combat Air Patrol.
    MA_CAP_TaskType cap = 4;
    // Indicates a Task to transfer cargo between locations.
    CargoDeliveryTaskType cargo_delivery = 5;
    // Indicates a Task to provide COMINT.
    COMINT_TaskType comint = 6;
    // Indicates a Task to provide communications relay support.
    CommRelayTaskType comm_relay = 7;
    // Indicates a Task to employ a CounterSpace capability.
    CounterSpaceTaskType counter_space = 8;
    // Indicates a Task to escort another Entity or System.
    MA_EscortTaskType escort = 9;
    // Indicates a Task to provide electronic attack support to another System. It
    // guides/constrains the EA System by specifying where it should fly, what it
    // should protect and what the threat is.
    EA_TaskType ea = 10;
    // Indicates a Task to collect ESM data.
    ESM_TaskType esm = 11;
    // Indicates a Task to effect the flight path/plan of the System.
    MA_FlightTaskType flight = 12;
    // Indicates a Task to a jettisonable weapon from the system.
    MA_JettisonTaskType jettison = 13;
    // Indicates a task to perform an orbit change via a spacecraft maneuver.
    OrbitChangeTaskType orbit_change = 14;
    // Indicates an Orbital Surveillance Task.
    OrbitalSurveillanceTaskType orbital_surveillance = 15;
    // Indicates a task to perform orbital surveillance sensor tasking.
    OrbitalSurveillanceSensorTaskType orbital_surveillance_sensor = 16;
    // Indicates a Task to collect Passive Optical data, imagery and video as well
    // as perform PO search and track capabilities.
    PO_TaskType po = 17;
    // Indicates a Task for one System to refuel another.
    RefuelTaskType refuel = 18;
    // Indicates a Task to collect a Synthetic Aperture Radar (SAR) image.
    SAR_TaskType sar = 19;
    // Indicates a Task to collect Moving Target Indicator (MTI) data.
    SMTI_TaskType smti = 20;
    // Indicates a Task to kinetically attack/strike, with a weapon that can be
    // released from the System.
    StrikeTaskType strike = 21;
    // Indicates a task to perform a deployment or release of a system at a
    // specified location.
    SystemDeploymentTaskType system_deployment = 22;
    // Indicates a task to perform a tactical order.
    TacticalOrderTaskType tactical_order = 23;
    // Indicates a task to collect weather radar data.
    WeatherRadarTaskType weather_radar = 24;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message AirSampleTaskType {
  // composed xsd extension base AirSampleTaskBaseType
  AirSampleTaskBaseType base = 1;
  // Indicates the source of or explicit values for geospatial characteristics
  // of the target of the OpticalCommand.
  TargetType target = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.001
message AMTI_TaskType {
  // composed xsd extension base AMTI_TaskBaseType
  AMTI_TaskBaseType base = 1;
  // Indicates the volume or specific Entity that defines the extents of the
  // spatial region covered by the command. For VOLUME AMTI Capabilities, the
  // Entity is not an option. For CUED AMTI Capabilities, two instances of this
  // element are allowed to support an air volume that defines the extents of
  // the cue volume around the Entity. For CUED AMTI Capabilities, a single
  // instance is allowed if it is an Entity in which case the Entity location
  // uncertainty defines the extents of the cue volume. For TRACK AMTI
  // Capabilities it is expected that the Entity is the only valid selection.
  repeated AMTI_TargetType target = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.001
message AMTI_TargetType {
  oneof choice {
    // Indicates a 3D sensor referenced volume that an air volume capability is
    // directed against. This will define the volume in terms of azimuth and
    // elevation angles.
    AirVolumeSensorReferencedType air_volume_sensor_referenced = 1;
    // Indicates a 3D area that an A2A capability is directed against. This should
    // define the latitude/longitude extents of the volume along with any guidance
    // regarding the height of the volume.
    ZoneType air_volume_location = 2;
    // Indicates the unique ID of an Entity that is the target of a cued AMTI
    // search. This element can be used as the full specification of the target
    // volume for the cued search. It can also be used in combination with the
    // sibling AirVolume element to define extents of the cue volume around the
    // Entity.
    EntityID_Type entity_id = 3;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.003.000
message AO_TaskType {
  // composed xsd extension base AO_TaskBaseType
  AO_TaskBaseType base = 1;
  // Indicates the source of or explicit values for geospatial characteristics
  // of the target of the AO Task.
  TargetType target = 2;
}

// Contains parameters for defining a CAP task
// uci_version: 000.000.000.000
message MA_CAP_TaskType {
  // Defines orbits to be used for CAP task.
  repeated MA_OrbitType orbits = 1;
  // How many assets are to be assigned to each CAP pattern.
  optional uint32 assets_per_orbit = 2;
  // Desired priority for MA execution of CAP.
  optional MA_CAPOptimizationEnum optimization_strategy = 3;
  // Define synchronization scheme across multiple orbits/assets.
  optional MA_SynchronizationChoiceType synchronization_strategy = 4;
  // References target zone for Keep In boundary for CAP execution.
  repeated OpZoneID_Type keepin_zone_id = 5;
  // References zone that provides threat region of interest information.
  repeated OpZoneID_Type hostile_zone_id = 6;
  // Speed at which CAP should be flown.
  optional PathSegmentSpeedType cap_speed = 7;
}

// Defines details of orbit loiter
// uci_version: 000.000.000.000
message MA_OrbitType {
  // Defines shape of orbit
  MA_OrbitShapeType orbit_shape = 1;
  // Duration for the orbit as either a required time spent in the orbit pattern
  // or the number of orbits to make around the pattern. Leaving the field
  // unspecified indicates an indefinite orbit.
  optional OrbitDurationType duration = 2;
  // Desired CAP point for entry along pattern used for routing.
  optional PointChoiceType entry_point = 3;
  // Desired CAP point for exiting along pattern used for routing.
  optional PointChoiceType exit_point = 4;
}

// Defines shape of orbit
// uci_version: 000.000.000.000
message MA_OrbitShapeType {
  oneof choice {
    // Defines an orbit by its fix point and inbound course.
    MA_FixOrbitType fix_point = 1;
    // A single point will be provided if and only if OrbitType is Circle. See
    // annotations of each OrbitType (OrbitEnum) value for further details.
    MA_CircleOrbitType circle = 2;
  }
}

// Defines a racetrack orbit using a fix point, inbound course, leg length,
// and turn constraints.
// uci_version: 000.000.000.000
message MA_FixOrbitType {
  // Relative or absolute point in space to act as fix point for orbit
  // construction
  PointChoiceType point = 1;
  // Defines inbound direction course toward the fix point.
  MA_DirectionChoiceType inbound_direction = 2;
  // Distance between turn points.
  IntervalChoiceType leg_length = 3;
  // Defines the turn via bank angle or radius.
  TurnGeometryChoiceType turn_geometry = 4;
  // Direction of turn when rounding the first loiter point. For a figure 8,
  // this direction applies to the first of the two Circle elements.
  RelativeDirectionEnum turn_direction = 5;
}

// Enables the specification of a heading or course type with an associated
// reference.
// uci_version: 000.000.000.000
message MA_DirectionChoiceType {
  oneof choice {
    // Defines heading type and reference to hold.
    MA_DirectionReferenceType heading = 1;
    // Defines course type and reference to hold.
    MA_DirectionReferenceType course = 2;
  }
}

// Defines heading or course type and reference to hold.
// uci_version: 000.000.000.000
message MA_DirectionReferenceType {
  // Indicates the heading or course value to hold.
  // xsd type: AngleType
  double value = 1;
  // Reference to type of heading or course given.
  MA_HeadingReferenceEnum reference = 2;
}

// Reference to type of heading given.
enum MA_HeadingReferenceEnum {
  MA_HEADING_REFERENCE_ENUM_UNSPECIFIED = 0;
  MA_HEADING_REFERENCE_ENUM_TRUE_NORTH = 1;
  MA_HEADING_REFERENCE_ENUM_MAGNETIC_NORTH = 2;
}

// The type used to specify a distance or duration type for an interval.
// uci_version: 001.000.000.000
message IntervalChoiceType {
  oneof choice {
    // Indicates the interval amount is a distance.
    // xsd type: DistanceType
    double distance = 1;
    // Indicates the interval amount is a duration.
    // xsd type: DurationType
    string duration = 2;
  }
}

// This element is used to specify whether a turn is a bank angle or turn
// radius.
// uci_version: 001.000.000.000
message TurnGeometryChoiceType {
  oneof choice {
    // Indicates the radius of the turn. When neither BankAngle nor TurnRadius are
    // specified, indicates that the TurnPoint is in the end of a turn.
    // xsd type: DistanceType
    double turn_radius = 1;
    // Indicates bank angle of the turn. When neither BankAngle nor TurnRadius are
    // specified, indicates that the TurnPoint is in the end of a turn.
    // xsd type: AngleHalfType
    double bank_angle = 2;
  }
}

// Defines an orbit by specifying two circles
// uci_version: 000.000.000.000
message MA_CircleOrbitType {
  // What flight pattern this orbit will take.
  OrbitEnum orbit_type = 1;
  // A single point will be provided if and only if OrbitType is Circle. See
  // annotations of each OrbitType (OrbitEnum) value for further details.
  repeated CircleType circle = 2;
  // Direction of turn when rounding the first loiter point. For a figure 8,
  // this direction applies to the first of the two Circle elements.
  RelativeDirectionEnum turn_direction = 3;
}

// An enumeration specifying the type of orbit.
enum OrbitEnum {
  ORBIT_ENUM_UNSPECIFIED = 0;
  ORBIT_ENUM_CIRCLE = 1;
  ORBIT_ENUM_RACETRACK = 2;
  ORBIT_ENUM_FIGURE_EIGHT = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message CircleType {
  // The center point or relative focus for a circle.
  PointChoiceType point_choice = 1;
  // The radius of a circle in meters.
  // xsd type: DistanceType
  double radius = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message OrbitDurationType {
  oneof choice {
    // Required amount of time to be spent in the loiter pattern.
    // xsd type: DurationType
    string time = 1;
    // Required number of laps to be spent in the loiter patter.
    uint32 number_of_orbits = 2;
  }
}

// Indicates CAP optimization strategy.
enum MA_CAPOptimizationEnum {
  MA_CAP_OPTIMIZATION_ENUM_UNSPECIFIED = 0;

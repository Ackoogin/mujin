  // Indicates frequency or frequencies, expressed by either a single frequency,
  // frequency range, or any multiple and combination of the two.
  repeated FrequencyRangeType frequency_range = 1;
  // Indicates the signal modulation. List size for this element is based on
  // "Select All That Apply" condition.
  repeated ModulationEnum modulation = 2;
  // Identifies whether or not the signals are encrypted.
  optional bool encrypted = 3;
  // This element indicates a multiple channel signal. If this optional field is
  // omitted, the signal is single channel.
  optional FrequencyMultiChannelType multi_channel = 4;
  // Indicates the signal content.
  optional RF_SignalContentEnum content = 5;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message FrequencyMultiChannelType {
  // Indicates the number of channels in the signal.
  uint32 num_channels = 1;
  // Indicates the frequency spacing between channels in the signal.
  // xsd type: FrequencyType
  double spacing = 2;
}

// Fundamental content of RF communications signal.
enum RF_SignalContentEnum {
  RF_SIGNAL_CONTENT_ENUM_UNSPECIFIED = 0;
  RF_SIGNAL_CONTENT_ENUM_VOICE = 1;
  RF_SIGNAL_CONTENT_ENUM_DATA = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message EA_ResponseType {
  // This element specifies a task to escort an asset. The tasked vehicle shall
  // provide protection for the escorted asset. Additional protected assets can
  // be specified in the ProtectedAssets element.
  optional EA_TaskEscortType route_requirements = 1;
  // This element provides a list of friendly assets which should be protected
  // in addition to those who are being escorted, if any.
  optional EA_TaskProtectedAssetsType protected_assets = 2;
  // Indicates the threats that are the target of the electronic attack.
  optional EA_TaskThreatsType threats = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.002.000
message EA_TaskEscortType {
  // Indicates the identity and priority of escorted assets.
  repeated ProtectedAssetType escorted_asset = 1;
  // This element indicates the minimum distance the tasked vehicle should fly
  // relative to the escorted asset position.
  // xsd type: DistanceType
  optional double min_distance_offset = 2;
  // This element indicates the max distance the tasked vehicle should fly
  // relative to the escorted asset position.
  // xsd type: DistanceType
  optional double max_distance_offset = 3;
  // Angle Relative to the heading of the escorted asset measured clockwise.
  optional AnglePairType relative_angle_offset = 4;
  // Indicates the location and time for a rendezvous.
  optional Point4D_Type rendezvous_point = 5;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message ProtectedAssetType {
  // Relative priority of asset being protected. 1 through 3 with 1 being
  // highest priority.
  uint32 priority = 1;
  // The asset identifier.
  AssetType asset = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.001.000.000
message EA_TaskProtectedAssetsType {
  // If this element is "TRUE", all known friendly assets should be protected to
  // the extent EA resources are available. If this element is "FALSE", either:
  // 1.) A subset of protected assets shall be specified. This is a requirement
  // if the mission is to loiter and protect. It is optional if an escort. 2.)
  // The mission is an escort and only the escorted vehicle or entity should be
  // protected. In this case, NO protected assets shall be specified.
  bool protect_all = 1;
  // If this element is set to TRUE, the jamming asset should utilize resources
  // for self protection.
  bool self_protect = 2;
  // Indicates the identity and priority of protected assets.
  repeated ProtectedAssetAndThreatType protected_asset = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message ProtectedAssetAndThreatType {
  // Relative priority of asset being protected. 1 through 3 with 1 being
  // highest priority.
  uint32 priority = 1;
  // The asset identifier.
  AssetType asset = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.001
message EA_TaskThreatsType {
  oneof choice {
    // If true this element implies that all known threats should be jammed to the
    // extent resources are available.
    bool suppress_all = 1;
    // This element defines specific constraints on the entities or frequencies to
    // suppress.
    EA_TaskThreatsType_SuppressionConstraints_List suppression_constraints = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.003.001
message EA_TaskSuppressionConstraintsType {
  // This element contains the ID of the entity which should be jammed.
  EA_TargetType ea_target = 1;
  // This element contains the prioritization of the specified entity.
  // Priorities are relative to other entities specified in the task. Absence of
  // this element indicates that the tasked system should determine priorities
  // based on entity type.
  optional uint32 priority = 2;
  // Indicates the EA technique to be used for this target.
  optional EA_TechniqueIdentifierType technique_identifier = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.003.000
message EA_TargetType {
  // Indicates the source of the emitter/signal characteristics that are being
  // used to determine how to electronically attack the emitter target.
  optional EA_EmitterDataType emitter_data = 1;
  // Indicates where to point for EA beams.
  optional EA_TargetPointingType pointing = 2;
  // Indicates power level for EA beams.
  optional EA_PowerType power = 3;
  // Indicates the time at which the target emitter is last known to have
  // transmitted a signal, either by direct receipt by an ESM Capability of the
  // EA Subsystem or via an indication from a messaging input to the EA
  // Subsystem.
  // xsd type: DateTimeType (pattern .+Z)
  optional string last_signal_timestamp = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message EA_EmitterDataType {
  oneof choice {
    // Indicates the target is being attacked according to Signal/emitter data
    // from a corresponding Entity.
    EntityID_Type entity_id = 1;
    // Indicates the target is being attacked according to Signal/emitter data
    // associated with its emitter type.
    EmitterIdentityType emitter_type = 2;
    // Indicates the target is being attacked according to specifically commanded
    // Signal data.
    SignalSummaryType signal_description = 3;
    // Indicates the target is being attacked according to a previously detected
    // Signal.
    SignalID_Type signal_id = 4;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.002.000
message EA_TargetPointingType {
  oneof choice {
    // Indicates the source of or explicit values for geospatial characteristics
    // of the EA target.
    TargetType location_data = 1;
    // Indicates the pointing volume for the EA transmission.
    AirVolumeSensorReferencedType air_volume = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message AirVolumeSensorReferencedType {
  // Indicates the commanded azimuth width. It represents the angular width
  // between the two 3 dB extents of the scan volume.
  // xsd type: AnglePositiveType
  double azimuth_scan_width = 1;
  // Indicates the commanded azimuth center. For BODY stabilized volumes it is
  // referenced to the centerline of the platform. For INERTIAL stabilized
  // volumes it is referenced to true north; clockwise rotation is positive in
  // both cases.
  // xsd type: AngleType
  double azimuth_scan_center = 2;
  // Indicates the commanded elevation scan width. It represents the angular
  // width between the two 3 dB extents of the scan volume.
  // xsd type: AngleHalfType
  double elevation_scan_width = 3;
  // Indicates the commanded elevation center. For BODY stabilized volumes it is
  // referenced to the centerline of the platform. For CENTER_ALTITUDE
  // stabilized volumes it is referenced to the center altitude range pair.
  // xsd type: AngleHalfType
  double elevation_scan_center = 4;
  // Indicates the maximum range of interest. This will potential affect dwell
  // times, scan rates, reported Entities, etc.
  // xsd type: DistanceType
  double max_range_of_interest = 5;
  // Indicates the minimum range of interest. This will potential affect dwell
  // times, scan rates, reported Entities, etc.
  // xsd type: DistanceType
  double min_range_of_interest = 6;
  // Center of volume can be stabilized either relative to the centerline of the
  // aircraft (BODY) or relative to true north (INERTIAL). In either case the
  // radar will position volume either aligned with the aircraft's current
  // direction or a particular line of bearing.
  LOS_ReferenceEnum azimuth_scan_stabilization = 7;
  // Center of volume can be stabilized either relative to the boresight of the
  // antenna installation on the aircraft (BODY) or relative to a location
  // defined by the Elevation Scan Center Altitude Range Pair (CENTER_ALTITUDE).
  // In either case the radar will position volume either aligned with the
  // aircraft's current pitch.
  ElevationScanStabilizationEnum elevation_scan_stabilization = 8;
  // For a center altitude stabilized elevation volumes, this is the center
  // point around which the volume is stabilized.
  optional AltitudeRangePairType elevation_scan_center_altitude_range_pair = 9;
  // Indicates whether (TRUE) or not (FALSE) the volume should be stabilized
  // parallel to the horizon.
  bool roll_stabilized = 10;
}

// For an A2A search volume; this enum defines how to interpret the elevation
// volume center.
enum ElevationScanStabilizationEnum {
  ELEVATION_SCAN_STABILIZATION_ENUM_UNSPECIFIED = 0;
  ELEVATION_SCAN_STABILIZATION_ENUM_BODY = 1;
  ELEVATION_SCAN_STABILIZATION_ENUM_CENTER_ALTITUDE = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message AltitudeRangePairType {
  // This defines the altitude around which the volume is stabilized.
  // xsd type: AltitudeType
  double altitude = 1;
  // This defines the range at which the associated altitude is calculated to
  // define a particular geospatial point.
  // xsd type: DistanceType
  double range = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message EA_PowerType {
  oneof choice {
    // Power at target In dBW. This will use the center point for calculation if
    // an area or line is selected.
    // xsd type: DecibelType
    double power_at_target = 1;
    // Effective Radiate Power in dBW. It is an IEEE standardized definition of
    // directional radio frequency (RF) power transmitted from a theoretical
    // half-wave dipole antenna.
    // xsd type: DecibelType
    double erp = 2;
    // Jam to Signal ratio In dB. The ratio of the signal strength of the jamming
    // signal (J) to the signal strength of the target return signal (S).
    // xsd type: DecibelType
    double jto_s = 3;
  }
}

// Indicates an ID corresponding to an EA technique. The use of ForeignKeyType
// is an indication that EA techniques aren't universally defined and come
// from multiple systems/sources but they are expected to be unique within the
// context of their source. For an EA technique in UCI, the
// EA_TechniqueIdentifierType.Key element indicates the technique ID and the
// EA_TechniqueIdentifierType.SystemName element indicates the system that
// assigned the ID and ensures it is unique.
// uci_version: 000.000.000.000
message EA_TechniqueIdentifierType {
  // composed xsd extension base ForeignKeyType
  ForeignKeyType base = 1;
}

// synthesized list wrapper for repeated choice member SuppressionConstraints in EA_TaskThreatsType (choice)
message EA_TaskThreatsType_SuppressionConstraints_List {
  repeated EA_TaskSuppressionConstraintsType items = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.001.002.000
message ESM_TaskBaseType {
  // Indicates a specific ESM SubCapability being requested by the Task. List
  // size for this element is based on "Select All That Apply" condition.
  repeated ESM_SubCapabilityEnum sub_capability_type = 1;
  // Indicates a required output Product of the Task. See ProductTypeEnum for
  // further details.
  repeated ProductOutputCommandBasicType output = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message FlightTaskBaseType {
  // Indicates a type of capability to be used. List size for this element is
  // based on "Select All That Apply" condition.
  repeated FlightCapabilityEnum capability_type = 1;
}

// Defines a common base task type that supports orbit changes.
// uci_version: 000.000.001.000
message OrbitChangeTaskBaseType {
  // Indicates the type of capability to be used.
  OrbitChangeCapabilityEnum capability_type = 1;
}

// The base type for an Orbital Surveillance Task.
// uci_version: 003.000.001.000
message OrbitalSurveillanceTaskBaseType {
  // Indicates the Capability's first tier type in the Orbital Surveillance
  // taxonomy. For Orbital Surveillance, the first tier is the focus of the
  // collection, either based on one or more objects or for a defined volume.
  // See enumerated type annotations for further details.
  OrbitalSurveillanceCapabilityEnum capability_type = 1;
  // Indicates a SubCapability of the Orbital Surveillance Capability, the
  // second tier in the taxonomy of Orbital Surveillance. For Orbital
  // Surveillance, the second tier is the desired outcome of the collection. See
  // enumeration annotations for further details.
  OrbitalSurveillanceSubCapabilityDetailsChoiceType sub_capability_type = 2;
  // This provides additional context for the collection planner and (as
  // appropriate) the sensor units to inform the decisions on which sensors are
  // appropriate and how best to set up collections. This context can help to
  // compensate for shortfalls in the fidelity of the sensor models.
  optional OrbitalSurveillanceSubCapabilityEnum information_objective = 3;
  // This optional field indicates the smallest sized objects to look for in the
  // sensor Task.
  // xsd type: DistanceType
  optional double min_size = 4;
  // If TRUE, report whether the tasked object was acquired or not. In space
  // domain awareness (SDA) domain, this is referred to as "PosNeg".
  bool confirm_object_acquisition = 5;
  // Indicates the time by which the products are needed by the source which
  // created the Orbital Surveillance Task.
  optional ProductNeededByType product_needed_by = 6;
  // Indicates the required, allowed, or excluded sensors that the planner is
  // allowed to consider tasking for collection to acquire the desired data.
  optional AllowableSensorsType sensor_constraints = 7;
  // Indicates additional instructions associated with tasking for sensor
  // collections. When "All" is chosen, all of the special instructions must be
  // accomplished to satisfy the Task. When "Any" is chosen, that Task can be
  // satisfied by performing only one of the special instructions provided.
  repeated SDA_SpecialInstructionsConstraintType sda_special_instructions = 8;
}

// Indicates a SubCapability of the Orbital Surveillance Capability, the
// second tier in the taxonomy of Orbital Surveillance. For Orbital
// Surveillance, the second tier is the desired outcome of the collection. See
// enumeration annotations for further details.
// uci_version: 002.000.001.000
message OrbitalSurveillanceSubCapabilityDetailsChoiceType {
  oneof choice {
    // Indicates a task to search an a region of space or for a specific object.
    OrbitalSurveillanceSearchType search = 1;
    // Indicates a task to achieve/maintain specified orbit accuracy.
    OrbitAccuracyType orbit_accuracy = 2;
    // Indicates a Task to characterize an object.
    CharacterizationObjectiveType characterization = 3;
    // Indicates a task involving multiple objects.
    MultiObjectType multi_object = 4;
    // Indicates a task to detect maneuvers (may require more than one sensor) and
    // near real-time processing.
    ManeuverDetectionType maneuver_detection = 5;
    // Indicates a task that monitors primary target to detect deployment of
    // secondary object or objects.
    DeploymentDetectionType deployment_detection = 6;
  }
}

// Input parameters for an orbital surveillance search task type.
// uci_version: 000.000.000.000
message OrbitalSurveillanceSearchType {
  // Indicates the maximum speed of the target.
  // xsd type: SpeedType
  optional double max_target_speed = 1;
  // Indicates the minimum speed of the target.
  // xsd type: SpeedType
  optional double min_target_speed = 2;
}

// Input parameters for an orbital surveillance orbit accuracy task type.
// uci_version: 001.000.000.000
message OrbitAccuracyType {
  // Desired maximum position uncertainty in Radial-Transverse-Normal coordinate
  // frame.
  RTN_PositionSigmaType position_sigma = 1;
  // Desired maximum velocity uncertainty in Radial-Transverse-Normal coordinate
  // frame.
  RTN_VelocitySigmaType velocity_sigma = 2;
  // Indicates the time window for which the Orbit Accuracy needs to be valid.
  optional DateTimeRangeType time_valid = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.000.000
message CharacterizationObjectiveType {
  oneof choice {
    // Indicates a task to characterize an object using one or more specified
    // phenomenologies.
    CharacterizationOptionsType phenomenology_collection = 1;
    // Indicates a task to assess the stability and orientation of an object.
    StabilityCharacterizationType stability_and_orientation_assessment = 2;
    // Indicates a task to characterize or assess changes to the structure of a
    // spacecraft.
    StructureAssessmentType structure_assessment = 3;
    // Indicates a task to verify that the target on the designated orbit is the
    // expected spacecraft.
    IdentificationVerificationType identification_verification = 4;
    // Indicates a task to perform collections to detect operations changes of the
    // target object.
    SatelliteOperationsChangesCharacterizationType operations_changes = 5;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.000.000
message CharacterizationOptionsType {
  // Indicates the type of characterization to be performed as part of this
  // task. Multiple options (one per available choice) may be selected to
  // address the Information Objective. Refer to the sibling Logical Operator
  // element to understand the relationships.
  repeated CharacterizationChoiceType characterization_type = 1;
  // Indicates whether all (AND), any (OR), or only one (XOR) of the sibling
  // CharacterizationTypes must be performed.
  LogicalOperatorEnum logical_operator = 2;
  // Indicates the desired characterization product to be returned/reported.
  optional CharacterizationProductTypeEnum characterization_product = 3;
}

// The CharacterizationChoiceType is a choice type that allows the user to
// select a specific type of characterization of the object.
// uci_version: 002.000.000.000
message CharacterizationChoiceType {
  oneof choice {
    // The Frequency parameters are in regards to the RF Frequencies to measure.
    // The min signal strength indicates the lowest threshold of collection. The
    // RF Frequency resolution indicates the granularity of the collection. The
    // frequency range indicates the specific RF band to collect. The optional
    // product resolution time parameter is the minimum amount of time needed to
    // get the desired level of resolution for the product.
    FrequencyParamsType frequency = 1;
    // The Infra-Red Image parameters describe the desired images to collect. The
    // spectral frequency resolution parameter indicates the size of the
    // wavelength to collect. The temperature resolution parameter indicates the
    // amount of temperature variance to measure. The optional IR image setting
    // parameter indicates the range of the IR frequency to measure. The optional
    // product resolution time parameter is the minimum amount of time needed to
    // get the desired level of resolution for the product.
    IR_ImageParamsType ir_image = 2;
    // The metric observation parameters consist of the desired distance
    // resolution. The optional product resolution time parameter indicates the
    // minimum amount of time needed to get the desired level of resolution for
    // the product.
    MetricParamsType metric_observations = 3;
    // The Narrowband Space Object of Interest (NB_SOI) parameters consists of the
    // amplitude in decibels of the desired Resolution. The optional product
    // resolution time parameter is the minimum amount of time needed to get the
    // desired level of resolution for the product.
    Narrowband_SOI_ParamsType narrowband_soi = 4;
    // The optical Image parameters consist of the overall desired image
    // resolution. The optional product resolution parameter provides guidance on
    // the color depth and horizontal and vertical pixel counts. The optional
    // product resolution time parameter is the minimum amount of time needed to
    // get the desired level of resolution for the product.
    OpticalImageParamsType optical_image = 5;
    // The radar cross section (RCS) parameters include: the desired amplitude
    // resolution measure in decibels per square meter, the optional product
    // resolution time parameter is the minimum amount of time needed to get the
    // desired level of resolution for the product.
    RCS_ParamsType rcs = 6;
    // The Visual Magnitude (VisMag) parameters consists of the amplitude
    // resolution (measured in meters per pixel) and the optional product
    // resolution time parameter (the minimum amount of time needed to get the
    // desired level of resolution for the product).
    VisMagParamsType vis_mag = 7;
    // The Wideband Space Object of Interest (WB SOI) parameters consist of the
    // range resolution of both the range and cross range. The optional product
    // resolution time parameter is the minimum amount of time needed to get the
    // desired level of resolution for the product.
    Wideband_SOI_ParamsType wideband_soi = 8;
    // The Photometry parameters consist of the amplitude in decibels of the
    // desired resolution. The optional product resolution time parameter is the
    // minimum amount of time needed to get the desired level of resolution for
    // the product.
    PhotometryParamsType photometry = 9;
    // The Color Photometry parameters consist of the desired sensor spectrum to
    // use for the collection. The optional product resolution time parameter is
    // the minimum amount of time needed to get the desired level of resolution
    // for the product.
    ColorPhotometryParamsType color_photometry = 10;
  }
}

// The Frequency parameters are in regards to the RF Frequencies to measure.
// The min signal strength indicates the lowest threshold of collection. The
// RF Frequency resolution indicates the granularity of the collection. The
// frequency range indicates the specific RF band to collect. The optional
// product resolution time parameter is the minimum amount of time needed to
// get the desired level of resolution for the product.
// uci_version: 001.001.000.000
message FrequencyParamsType {
  // This is the minimum and maximum frequencies to collect.
  optional FrequencyRangeType frequency_range = 1;
  // This is the threshold level of the collection. It is the power referenced
  // to one milliwatt in units dBm.
  // xsd type: MilliwattPowerRatioType
  optional double min_signal_strength = 2;
  // This is the desired resolution of the signal in the band of the expressed
  // frequency.
  optional double rf_frequency_resolution = 3;
  // The optional product resolution time parameter is the minimum amount of
  // time needed to get the desired level of resolution for the product.
  // xsd type: DurationType
  optional string product_resolution_time = 4;
}

// The Infra-red Image parameters describe the desired images to collect. The
// spectral frequency indicates the size of the wavelength to collect. The
// temperature resolution is amount of temperature variance to measure. The
// optional Ir Image setting indicates the range of the IR frequency to
// measure. The optional product resolution time parameter is the minimum
// amount of time needed to get the desired level of resolution for the
// product.
// uci_version: 001.001.000.000
message IR_ImageParamsType {
  // The spectral frequency resolution is the desired resolution of the size of
  // the light wavelengths to collect. Note: The spectral frequency resolution
  // is traditionally measured in angstroms (10-10 m). The DistanceType is in
  // meters: Visible light wavelengths are in the range of 4000-7000 Angstroms
  // (4.0*10-7 - 7.0*10-7 m). Normal values for this parameter would be between
  // 0.0000004 and 0.0000007.
  // xsd type: DistanceType
  optional double spectral_frequency_resolution = 1;
  // This is the desired resolution on the temperature of the collection.
  // xsd type: TemperatureType
  optional double temperature_resolution = 2;
  // This is an optional parameter of the minimum and maximum of the infrared
  // spectrum to collect if it indicated. Without this parameter the entire IR
  // spectrum is collected.
  optional FrequencyRangeType ir_image_setting = 3;
  // The optional product resolution time parameter is the minimum amount of
  // time needed to get the desired level of resolution for the product.
  // xsd type: DurationType
  optional string product_resolution_time = 4;
}

// The metric obs parameters consist of the desired distance resolution and
// the optional product resolution time.
// uci_version: 001.001.000.000
message MetricParamsType {
  // This indicates the allowable deviation from the actual location.
  // xsd type: DistanceType
  optional double pos_metric_resolution = 1;
  // The optional product resolution time parameter is the minimum amount of
  // time needed to get the desired level of resolution for the product.
  // xsd type: DurationType
  optional string product_resolution_time = 2;
}

// The Narrowband Space Object of Interest (NB_SOI) consists of the amplitude
// in decibels of the desired Resolution. The optional product resolution time
// parameter is the minimum amount of time needed to get the desired level of
// resolution for the product.
// uci_version: 000.001.000.000
message Narrowband_SOI_ParamsType {
  // This is the desired resolution of the radar amplitude measured in decibels.
  // xsd type: DecibelType
  optional double amplitude_resolution = 1;
  // The optional product resolution time parameter is the minimum amount of
  // time needed to get the desired level of resolution for the product.
  // xsd type: DurationType
  optional string product_resolution_time = 2;
}

// The optical image parameters consist of the overall desired image
// resolution. The optional ProductResolution provides guidance on the color
// depth and horizontal and vertical pixel counts. The optional product
// resolution time parameter is the minimum amount of time needed to get the
// desired level of resolution for the product.
// uci_version: 000.002.000.000
message OpticalImageParamsType {
  // This is the meters per pixel of the image.
  // xsd type: ResolutionMetersPerPixelType
  optional double image_resolution = 1;
  // This indicates the imagery product resolution in horizontal and vertical
  // pixels and color depth on the service.
  optional ProductResolutionType product_resolution = 2;
  // The optional product resolution time parameter is the minimum amount of
  // time needed to get the desired level of resolution for the product.
  // xsd type: DurationType
  optional string product_resolution_time = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message ProductResolutionType {
  // Indicates the horizontal number of pixels in an image file.
  uint32 horizontal_pixel_count = 1;
  // Indicates the vertical number of pixels in an image file.
  uint32 vertical_pixel_count = 2;
  // Indicates the number of discrete color values in each band, e.g. 8-bit
  // color representation will require a value of 256.
  repeated uint32 color_depth = 3;
}

// The radar cross section (RCS) parameters include: the desired amplitude
// resolution measure in decibels per square meter, the optional product
// resolution time parameter is the minimum amount of time needed to get the
// desired level of resolution for the product.
// uci_version: 000.001.000.000
message RCS_ParamsType {
  // Indicates the Radar Cross Section (RCS) of targets which are of interest
  // for the command.
  // xsd type: DecibelType
  optional double amplitude_resolution = 1;
  // The optional product resolution time parameter is the minimum amount of
  // time needed to get the desired level of resolution for the product.
  // xsd type: DurationType
  optional string product_resolution_time = 2;
}

// The Visual Magnitude (vis_mag) parameters consists of the amplitude
// Resolution (measured in meters per pixel) and the optional product
// resolution time parameter (the minimum amount of time needed to get the
// desired level of resolution for the product).
// uci_version: 000.002.000.000
message VisMagParamsType {

  // and longer detailed explanation can be provided.
  optional RemarksType narrative = 3;
}

// Tasking sources work at different levels of detail and abstraction,
// progressing from what to do to how specifically to do it. Inputs from
// abstract tasking sources and Tasks can be decomposed into discrete,
// actionable Tasks. This type provides traceability to the external tasking
// or Task from which this Task was derived.
// uci_version: 002.000.000.000
message TraceabilityType {
  // Indicates a Requirement (Effect, Action, Task, [Capability]Command or
  // Response) which the subject traces/originates from.
  repeated RequirementInstanceID_ChoiceType requirement = 1;
  // Indicates a reference to an external (non-UCI) tasking source, the
  // collection deck, which the subject traces/originates from.
  repeated CollectionDeckTraceabilityType collection_deck_traceability = 2;
  // Indicates a reference to an external (non-UCI) tasking source, Airborne
  // Collection Tasking Message, the subject traces/originates from.
  repeated ACTDF_TraceabilityType actdf_traceability = 3;
  // Indicates a reference to an external (non-UCI) tasking source, Essential
  // Element of Information, the subject traces/originates from.
  repeated EEI_ID_Type eei_id = 4;
  // Indicates a reference to an external (non-UCI) tasking source, the Air
  // Tasking Order, the subject traces/originates from.
  repeated ATO_TraceabilityType ato_traceability = 5;
  // Indicates a reference to an external (non-UCI) tasking source, Airborne
  // Overhead Cooperative Operations, the subject traces/originates from.
  optional AOCO_TraceabilityType aoco_traceability = 6;
  // Indicates a reference to an external (non-UCI) tasking source: Space
  // Tasking Order.
  optional CS_STO_TraceabilityType sto_traceability = 7;
}


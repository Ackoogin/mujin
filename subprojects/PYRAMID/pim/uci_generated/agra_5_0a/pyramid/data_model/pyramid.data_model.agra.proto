// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.003.000
message IdentityType {
  // Indicates the "standard identity" of the asset.
  optional StandardIdentityType standard = 1;
  // Indicates the "environment identity" or "domain" in which the asset
  // operates. Derived from MIL-STD-6016; see MIL-STD-6016 DFI/DUI 275/004 for
  // additional details. Each environment has a corresponding set of specific
  // types.
  optional EnvironmentIdentityType environment = 2;
  // Indicates the "platform identity" of the asset.
  optional PlatformIdentityType platform = 3;
  // Indicates a "specific identity" of the asset.
  optional SpecificIdentityType specific = 4;
  // Indicates an emitter type that has been identified in association with the
  // asset.
  repeated EmitterIdentityType emitter = 5;
  // Indicates a specific emitter type ***instance*** that has been identified
  // in association with the asset. Specific Emitter Identification (SEI)
  // technology passively measures emitters, and characterizes unique emitter
  // signatures that can be used for friendly or enemy emitter identification
  // and fingerprinting. A SEI and this SpecificEmitter element refer to a
  // specific physical instance of a type of emitter as given in the sibling
  // EmitterType element.
  repeated SpecificEmitterIdentityType specific_emitter = 6;
  // Indicates the specific, generally blue force, facility ***instance*** that
  // has been identified in association with the asset.
  optional FacilityIdentificationType specific_facility = 7;
  // Indicates the specific, generally blue force, vehicle ***instance*** that
  // has been identified in association with the asset.
  optional VehicleIdentificationType specific_vehicle = 8;
  // Indicates the identity of the asset in the taxonomy/nomenclature of the
  // Electronic Order of Battle (EOB).
  optional EOB_IdentityType eob = 9;
  // Indicates a type of weapon available. This element represents the
  // MIL-STD-6016 specific type of the store. See MIL-STD-6016 for details; this
  // schema will not redefine the enumerations. It is left to applications using
  // this schema to enforce compatibility with MIL-STD-6016.
  optional StoreType weapon = 10;
}


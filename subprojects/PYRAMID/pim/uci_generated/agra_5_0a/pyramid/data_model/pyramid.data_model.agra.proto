// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.001.002
message SignalSummaryType {
  // Indicates detected modulation in the Signal. See enumeration annotations
  // for further details. List size for this element is based on "Select All
  // That Apply" condition.
  repeated ModulationEnum modulation = 1;
  // Indicates that the signal is being modulated with a vendor's unique
  // modulation technique.
  // xsd type: VisibleString64Type (pattern [ -~]{0,64})
  optional string vendor_specific_modulation = 2;
  // Indicates the variation of the modulation of the Signal's frequency.
  // Optional when identification of the modulation is not attempted and/or the
  // Signal is not frequency modulated. See enumerated type annotations for
  // further details.
  optional FrequencyModulationVariationEnum frequency_modulation_variation = 3;
  // Indicates the average measured frequency of the Signal.
  // xsd type: FrequencyType
  optional double frequency_average = 4;
  // Indicates the lowest measured frequency of the received Signal.
  // xsd type: FrequencyType
  optional double frequency_min = 5;
  // Indicates the maximum measured frequency of the received Signal.
  // xsd type: FrequencyType
  optional double frequency_max = 6;
  // Indicates to the RF Payload whether the entire sibling frequency range
  // (FrequencyMin to FrequencyMax) should be covered with their
  // RF_ResourceAllocationRequest or a best effort to cover as much of the
  // frequency range as possible.
  optional CoverageEffortEnum frequency_range_control_options = 7;
  // Indicates the PRI type of the signal. See enumerated type annotations for
  // details.
  optional PRI_TypeEnum pri_type = 8;
  // Indicates the average pulse repetition interval (PRI) of the Signal.
  // xsd type: DurationType
  optional string pri_average = 9;
  // Indicates the lowest value of the measured pulse repetition interval for
  // the associated emitter beam.
  // xsd type: DurationType
  optional string pri_min = 10;
  // Indicates the highest value of the measured pulse repetition interval for
  // the associated emitter beam.
  // xsd type: DurationType
  optional string pri_max = 11;
  // Indicates the average measured value of the Signal's pulse width.
  // xsd type: DurationType
  optional string pulse_width_average = 12;
  // Indicates the minimum measured value of the Signal's pulse width.
  // xsd type: DurationType
  optional string pulse_width_min = 13;
  // Indicates the maximum measured value of the Signal's pulse width.
  // xsd type: DurationType
  optional string pulse_width_max = 14;
  // Parameter indicates modulation bandwidth of targeted signal (3dB or 90%)
  // for detection within transmission format bandwidth.
  optional FrequencyRangeType signal_bandwidth = 15;
  // Indicates the average measured power level of the Signal.
  // xsd type: MilliwattPowerRatioType
  optional double amplitude_average = 16;
  // For a Signal/Emitter that can track, indicates the tracking mode inferred
  // from the Signal. See enumerated type annotations for further details.
  optional TrackModeEnum track_mode = 17;
  // Indicates the urgency of the Entity. See enumeration annotations for
  // further details.
  optional EmitterUrgencyEnum urgency = 18;
  // Indicates the emitter is function in its wartime reserve mode. An
  // intentional change in observable electro-magnetic emitter parameter or
  // operational procedure intended to reduce the effectiveness of EW equipment
  // of opposing forces.
  // xsd type: EmptyType (pattern [A-Za-z]{0})
  optional string wartime_reserve = 19;
  // Indicates if this signal is located by bearing, area of probability, or a
  // fixed position.
  optional SignalLocationEnum location_category = 20;
  // Indicates if the beam is persistently looking in the sensor direction. This
  // would be set if the sibling TypeOfBeam was set over a period of time.
  optional RadarBeamTypeEnum type_of_beam = 21;
  // Indicates if the beam if persistently looking in the sensor direction. This
  // would be set if the sibling TypeOfBeam was set over a period of time.
  optional RadarBeamPersistenceEnum beam_persistence = 22;
  // Indicates a specific frequency to be used for the signal description.
  repeated FrequencyControlType frequency_coverage = 23;
}


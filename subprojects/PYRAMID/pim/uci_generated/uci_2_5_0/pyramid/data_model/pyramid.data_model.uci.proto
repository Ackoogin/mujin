  EmitterIdentityCategoryType emitter_category = 1;
  // The octal digits representing the NATO spot number. The NATO spot number is
  // used in specific emitter identification. It is used in Link 16 and other
  // standards which may have differing range limits between versions. The user
  // is responsible for adhering to the allowed range on their implementation.
  // xsd type: OctalValueType (pattern [0-7]+)
  optional string nato_spot_number = 2;
}

// Indicates the emitter identification based on its category.
// uci_version: 001.000.000.000
message EmitterIdentityCategoryType {
  oneof choice {
    // Used for emitters identified as a Radar subsystem.
    RadarEmitterIdentityType radar = 1;
    // Used for emitters identified as a communications subsystem.
    CommunicationsEmitterIdentityType communications = 2;
    // Used for emitters identified as an Electronic Attack subsystem.
    JammerEmitterIdentityType jammer = 3;
    // Used for emitters identified as a Missile subsystem.
    MissileEmitterIdentityType missile = 4;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message RadarEmitterIdentityType {
  // This element represents Electronic Intelligence (ELINT) Notation (ELNOT)
  // for non-communications electronic emissions. Used to preserve original
  // signal identification in case of modification by subsequent processing.
  // xsd type: NotationType (pattern [A-Z0-9]{5}|UNKN|NONE)
  optional string elnot_identifier = 1;
  // This element (Defense Intelligence Equipment Index) further refines the
  // ELNOT type.
  optional ForeignKeyType dieqp_key = 2;
  // Indicates the general purpose of the detected RADAR.
  optional RadarModeEnum radar_mode = 3;
  // For a Signal/Emitter that can track, indicates the tracking mode inferred
  // from the Signal. See enumerate annotations for further details.
  optional TrackModeEnum track_mode = 4;
  // Indicates the emitter index associated with the emitter. Emitter index is
  // an index into a table/database of emitters. The table/database is generally
  // created in pre-mission planning and included in one or more MDFs. This
  // element is only useful/meaningful to subscribers who are aware of the
  // table/database/MDF used by the publisher. For inter-System
  // interoperability, the sibling ELNOT_ID and DIEQP_ID elements are preferred
  // and likely required.
  optional ForeignKeyType emitter_index = 5;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message ForeignKeyType {
  // This element contains the value of the ForeignKey.
  // xsd type: VisibleString256Type (pattern [ -~]{1,256})
  string key = 1;
  // This element refers to the "system" where the ForeignKey is managed. That
  // system could be another message standard/protocol, network, database,
  // shared table, etc. UCI leaves it to implementers to choose and coordinate
  // use of the foreign "system".
  // xsd type: VisibleString256Type (pattern [ -~]{1,256})
  string system_name = 2;
}

// Indicates the operational mode of the Radar. Based on MIL-STD-6016 DFI/DUI
// 425/003 and 426/003.
enum RadarModeEnum {
  RADAR_MODE_ENUM_UNSPECIFIED = 0;
  RADAR_MODE_ENUM_UNKNOWN = 1;
  RADAR_MODE_ENUM_SEARCH_2D = 2;
  RADAR_MODE_ENUM_SEARCH_3D = 3;
  RADAR_MODE_ENUM_FIRE_CONTROL = 4;
  RADAR_MODE_ENUM_FIRE_CONTROL_LASER = 5;
  RADAR_MODE_ENUM_DOPPLER = 6;
  RADAR_MODE_ENUM_CW = 7;
  RADAR_MODE_ENUM_TARGETING = 8;
  RADAR_MODE_ENUM_ASM_UNKNOWN = 9;
}

// Weapon system mode of operation in nominal order of progression. Newer
// weapon systems may exhibit multiple modes of operation simultaneously.
enum TrackModeEnum {
  TRACK_MODE_ENUM_UNSPECIFIED = 0;
  TRACK_MODE_ENUM_UNKNOWN = 1;
  TRACK_MODE_ENUM_SEARCH = 2;
  TRACK_MODE_ENUM_TRACK = 3;
  TRACK_MODE_ENUM_GUIDANCE = 4;
  TRACK_MODE_ENUM_ILLUM = 5;
  TRACK_MODE_ENUM_ACQUISITION = 6;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message CommunicationsEmitterIdentityType {
  // This element represents Communications Emitter Notation (CENOT) for
  // communications electronic emissions. Used to preserve original signal
  // identification in case of modification by subsequent processing.
  // xsd type: NotationType (pattern [A-Z0-9]{5}|UNKN|NONE)
  optional string cenot_identifier = 1;
  // The general purpose of the detected emitter.
  optional CommModeEnum comm_mode = 2;
  // Indicates the emitter index associated with the emitter. Emitter index is

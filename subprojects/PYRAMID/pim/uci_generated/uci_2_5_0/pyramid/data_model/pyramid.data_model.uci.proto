  optional FrequencyModulationVariationEnum frequency_modulation_variation = 7;
  // Indicates whether the signal exhibits frequency agility.
  // xsd type: EmptyType (pattern [a-zA-Z]{0})
  optional string agile_emitter = 8;
  // Indicates the nature of the frequency values driving the pattern used in a
  // Signal with agile frequency modulation. See enumerated type annotations for
  // further details. Optional when identification of the agility values is not
  // attempted.
  optional FrequencySwitchingEnum agility_values = 9;
  // Indicates the repeating nature of the agility pattern of an agile Signal.

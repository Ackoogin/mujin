// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.001.001.003
message WeatherAreaDataType {
  // Indicates the source of the weather information.
  WeatherSourceEnum source = 1;
  // Identifies the Station reporting this weather data point (i.e. ground
  // station or air vehicle).
  // xsd type: VisibleString32Type (pattern [ -~]{1,32})
  optional string station_code = 2;
  // Indicates air temperature.
  // xsd type: TemperatureType
  optional double temperature = 3;
  // Indicates the percent chance of precipitation.
  // xsd type: PercentType
  optional double precipitation_potential = 4;
  // Indicates the amount of precipitation.
  // xsd type: PrecipitationAmountType
  optional double precipitation_amount = 5;
  // Indicates the type of precipitation.
  optional WeatherPrecipitationEnum type_of_precipitation = 6;
  // Indicates an additional refinement of the type or rate of precipitation.
  optional WeatherPrecipitationAmplificationEnum precipitation_amplification = 7;
  // Indicates unaided visual sighting distance.
  // xsd type: DistanceType
  optional double visibility = 8;
  // Indicates the general airfield weather description according to
  // MIL-STD-6016.
  optional WeatherVisibilityEnum visibility_status = 9;
  // The dew point is the temperature to which a given parcel of humid air must
  // be cooled, at constant barometric pressure, for water vapor to condense
  // into liquid water.
  // xsd type: TemperatureType
  optional double dew_point = 10;
  // Indicates existence and characteristics of clouds.
  repeated CloudsType clouds = 11;
  // Indicates the effects of weather on the surrounding environment.
  optional WeatherEffectsType weather_effects = 12;
  // This element represents the barometric pressure. Units: Pascal (Pa).
  optional float barometric_pressure = 13;
  // This element represents the Kollsman setting to be used for indicated
  // altitude. Units: Inches of mercury (Hg).
  optional float kollsman_setting = 14;
  // Indicates that icing conditions are occurring or are expected.
  optional WeatherSeverityEnum icing = 15;
  // Indicates that air turbulence is occurring or is expected.
  optional WeatherSeverityEnum turbulence = 16;
  // Indicates the percent chance of a thunderstorm.
  // xsd type: PercentType
  optional double thunderstorm_potential = 17;
  // This element represents additional, human readable, comments on the weather.
  // xsd type: VisibleString1024Type (pattern [ -~]{1,1024})
  optional string remarks = 18;
  // Describes the actual weather at a base or target position.
  optional WeatherKindEnum kind = 19;
  // Used to add additional details to actual weather.
  optional WeatherDescriptionEnum description = 20;
  // Used to add intensity details to actual weather.
  optional WeatherSeverityEnum qualifier = 21;
  // Information to characterize wind at a location.
  optional WindDataType wind_data = 22;
  // Indicates the relative humidity as a percentage. Relative humidity is the
  // ratio of the vapor pressure of water in air to saturation vapor pressure of
  // water in air at a given temperature. This value can be greater than 100%.
  // xsd type: PercentType
  optional double relative_humidity = 23;
}


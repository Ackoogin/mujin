// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.001
message PRI_DataBaseType {
  // Indicates the PRI type of the signal. See enumerated type annotations for
  // details.
  optional PRI_TypeEnum pri_type = 1;
  // Indicates the average pulse repetition interval (PRI) of the Signal. Not
  // applicable when PRI_Type is CW.
  // xsd type: DurationType
  optional string pri_average = 2;
  // Indicates the lowest value of the pulse repetition interval for the
  // associated emitter beam. Not applicable when PRI_Type is CW.
  // xsd type: DurationType
  optional string pri_min = 3;
  // Indicates the highest value of the pulse repetition interval for the
  // associated emitter beam. Not applicable when PRI_Type is CW.
  // xsd type: DurationType
  optional string pri_max = 4;
  // Indicates the last pulse repetition interval for this emitter. Not
  // applicable when PRI_Type is CW.
  // xsd type: DurationType
  optional string pri_last = 5;
  // Arbitrary third pulse repetition interval for the associated emitter beam.
  // PRI is computed from exactly four pulses. This is the PRI that was not the
  // smallest or the largest. Not applicable when PRI_Type is CW.
  // xsd type: DurationType
  optional string pri_third = 6;
  // Indicates the PRI pattern period; the time duration from the beginning of a
  // pattern to the end of the pattern. This element is expected only for
  // sibling PRI_DataTypes that are patterned including STAGGER and AGILE.
  // xsd type: DurationType
  optional string pri_pattern_period = 7;
  // Indicates the total number of PRI levels within the PRI pattern.
  optional uint32 pri_pattern_levels = 8;
  // Indicates a PRI pattern interval. The intervals are generally reported in
  // order to preserve the pattern sequence.
  // xsd type: DurationType
  repeated string pri_pattern_interval = 9;
  // This element amplifies the PRI_Type. See enumerated type annotations for
  // details.
  optional PRI_SwitchingPatternEnum pri_switching_pattern = 10;
  // This element amplifies the PRI_Type. See enumerated type annotations for
  // details.
  optional PRI_AgilePatternEnum pri_agile_pattern = 11;
  // Indicates whether jitter is present on the reported signal.
  // xsd type: EmptyType (pattern [a-zA-Z]{0})
  optional string pri_jitter_detected = 12;
  // Indicates the total variation of PRI values (full span).
  // xsd type: DurationType
  optional string pri_jitter_deviation = 13;
  // Indicates whether (TRUE) or not (FALSE) the PRI pattern contains special
  // pulse groups indicating missile guidance. Omitted when unknown.

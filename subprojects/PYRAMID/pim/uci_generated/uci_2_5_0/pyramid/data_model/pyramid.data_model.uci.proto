  // Indicates the modulation characteristics of this signal.
  repeated ModulationOnPulseDataBaseType modulation_on_pulse = 6;
  // Indicates the amplitude characteristics of this signal.
  optional SignalAmplitudeType amplitude = 7;
  // Indicates the emitter function of this signal. See type annotations for

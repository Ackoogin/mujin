// This type is for the Header used by all messages in the UCI interface.
// uci_version: 003.000.001.000
message HeaderType {
  // This element represents the SystemID of the System that sent this message.
  SystemID_Type system_id = 1;
  // This element represents the time and date at which the message was created
  // and ready to be sent.
  // xsd type: DateTimeType (pattern .+Z)
  string timestamp = 2;
  // Indicates the schema version used to generate the message. UCI v2.0 would
  // be indicated as "002.0", UCI v1.9b would be indicated as "001.9b".
  // xsd type: UCI_SchemaVersionStringType (pattern [0-9]{3}\.[0-9]{1,2}(\.[0-9]{1,2})([a-z]{1,2})?(_[a-zA-Z0-9\-]{1,45})?)
  string schema_version = 3;
  // This enumerated element indicates the "message mode" of the message. See
  // enumeration values for details.
  MessageModeEnum mode = 4;
  // This element represents the ServiceID of the Service that sent this message.
  optional ServiceID_Type service_id = 5;
  // Defines the Mission that this message was generated for and applies to.
  // Required if the message is Mission unique. See the Mission message which
  // defines a Mission.
  optional MissionID_Type mission_id = 6;
}

// The ID type that refers to an aggregation of Subsystems.
// uci_version: 002.000.000.000
message SystemID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// The common base type for all UCI IDs. All extension types should end in
// "ID_Type".
// uci_version: 002.000.000.000
message ID_Type {
  // Universally Unique Identifier (UUID). A UUID is a 128-bit number (32
  // hexadecimal digits, 16 bytes) that is conformant to a version and variant
  // of IETF RFC 4122.
  // xsd type: UniversallyUniqueIdentifierType (pattern (0{8}(-0{4}){3}-0{12})|([a-fA-F0-9]{8}-[a-fA-F0-9]{4}-[1-5][a-fA-F0-9]{3}-[89abAB][a-fA-F0-9]{3}-[a-fA-F0-9]{12}))
  string uuid = 1;
  // Human readable text label with content meaningful to human operators.
  // xsd type: VisibleString256Type (pattern [ -~]{1,256})
  optional string descriptive_label = 2;
}

// Specifies the mode the system is currently operating in.
enum MessageModeEnum {
  MESSAGE_MODE_ENUM_UNSPECIFIED = 0;
  MESSAGE_MODE_ENUM_LIVE = 1;
  MESSAGE_MODE_ENUM_EXERCISE = 2;
  MESSAGE_MODE_ENUM_SIMULATION = 3;
  MESSAGE_MODE_ENUM_NONEXERCISE_SIMULATION = 4;
}

// The ID type for UCI IDs that correspond to services that communicate using
// the UCI protocol. Services have a digital network location which is
// represented by this ID.
// uci_version: 002.000.000.000
message ServiceID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
  // This field should contain the version number (i.e. 1.2.2) of this service.
  // The Descriptive Label contains the human readable service name.
  // xsd type: VisibleString256Type (pattern [ -~]{1,256})
  optional string service_version = 2;
}

// The ID type for UCI IDs that correspond to a mission.
// uci_version: 003.001.000.000
message MissionID_Type {
  // composed xsd extension base VersionedID_Type
  VersionedID_Type base = 1;
}

// The ID type for UCI IDs that use versioning.
// uci_version: 000.001.000.000
message VersionedID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
  // Indicates an incremental version of an item in which only minor changes
  // have been made. An example of a change that would require a new UUID and
  // not just a new version would be for changes that affect task allocations or
  // changes that require re-approval.
  optional uint32 version = 2;
}

// See annotations in child elements and associated global element (message)
// for further details.
// uci_version: 005.000.004.000
message ActionCommandMDT {
  // Indicates an instance of an Action Capability command. A Capability command
  // message can have multiple command instances to allow a sequence of related
  // commands in a single coherent message. Each command instance reports status
  // via a separate, independent Capability CommandStatus message.
  repeated ActionCommandType command = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 005.000.004.000
message ActionCommandType {
  oneof choice {
    // Indicates a new invocation of an Action Capability. Generally, if accepted,
    // the command will result in one or more new Action Activities being created
    // and reported via the ActionActivity message. The request/response
    // interaction terminates as soon as the command is accepted or rejected; this
    // element is not used to interact with an "active" command. Updates and/or
    // additional interaction with the resulting Activity (after the command is
    // accepted) is accomplished via the sibling Activity element.
    ActionCapabilityCommandType capability = 1;
    // Indicates a command to modify an existing Action Activity (which was
    // previously reported via the ActionActivity message and was marked as
    // "interactive"). The request/response interaction terminates as soon as the
    // modification is accepted or rejected. The modifications are reflected in
    // subsequent ActionActivity messages.
    ActivityCommandBaseType activity = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 005.001.004.001
message ActionCapabilityCommandType {
  // composed xsd extension base CapabilityCommandBaseType
  CapabilityCommandBaseType base = 1;
  // Indicates the Action being commanded.
  ActionID_Type action_id = 2;
  // Indicates refined/overridden values of constraints for the Action. Added to
  // allow similar override options in direct commanding as is available in
  // planning.
  optional RequirementConstraintsType constraint_override = 3;
}

// The base type for all [Capability]Command messages.
// uci_version: 004.001.003.000
message CapabilityCommandBaseType {
  // composed xsd extension base CommandBaseType
  CommandBaseType base = 1;
  // Indicates the Capability instance being commanded.
  CapabilityID_Type capability_id = 2;
  // Indicates the command's rank relative to other commands and rank-related
  // overrides and tailoring.
  CapabilityCommandRankingType ranking = 3;
  // Indicates temporal constraints for the command. If omitted, the command
  // should be scheduled immediately while satisfying other applicable
  // constraints.
  optional CapabilityCommandTemporalConstraintsType temporal_constraints = 4;
  // If present, indicates that the Command shall be performed even though it
  // was previously rejected.
  // xsd type: EmptyType (pattern [a-zA-Z]{0})
  optional string override_rejection = 5;
  // C2 sources work at different levels of detail and abstraction, progressing
  // from what to do to how specifically to do it. Inputs from abstract tasking
  // sources and Tasks can be decomposed into discrete, actionable Tasks and/or
  // Capability commands. This element provides traceability to the external
  // tasking or Task from which this Capability command was derived.
  optional TraceabilityType traceability = 6;
  // This element provides the classification label that the Subsystem should
  // place on messages and other data resulting from the Command.
  optional SecurityInformationType classification = 7;
}

// The base type for all *Command messages.
// uci_version: 003.000.003.000
message CommandBaseType {
  // Indicates the unique ID of the Command corresponding to this message. Used
  // to reference the command when providing status.
  CommandID_Type command_id = 1;
  // The state of the command message data. Indicates if a command message is a
  // NEW command, an UPDATE to an existing command, or a CANCEL of an existing
  // command.
  CommandStateEnum command_state = 2;
}

// The ID type for UCI IDs that correspond to command messages.
// uci_version: 000.000.000.000
message CommandID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// Indicates whether an instance of a message is new, an update to an existing
// message/object or a request/command to remove the message/object from the
// network.
enum CommandStateEnum {
  COMMAND_STATE_ENUM_UNSPECIFIED = 0;
  COMMAND_STATE_ENUM_NEW = 1;
  COMMAND_STATE_ENUM_UPDATE = 2;
  COMMAND_STATE_ENUM_CANCEL = 3;
}

// The ID type that refers to a commandable and/or autonomous Capability of a
// Subsystem.
// uci_version: 002.000.000.000
message CapabilityID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.001.000.001
message CapabilityCommandRankingType {
  // Indicates the rank of the Command amongst other Commands and Tasks. For a
  // given "network" or family of Services, it is assumed that all creators of
  // Commands and Tasks will use Rank in a consistent and coordinated fashion.
  // Then, implementers can use Rank to determine the relative importance of all
  // their Command and Task inputs. Rank does not dictate temporal ordering; it
  // gives guidance on which Commands and Tasks to favor when resources are
  // limited.
  ComparableRankingType rank = 1;
  // Indicates whether (TRUE) or not (FALSE) this command should interrupt other
  // scheduled (currently executing, inevitable or future) activities in order
  // to satisfy this command, regardless of consequences such as loss of the
  // interrupted activity's output products. This element is interpreted
  // depending on whether the command source is a primary or secondary
  // controller. Secondary controllers can only interrupt activities of lower
  // Rank; when this element is FALSE the command is "nice" in that it allows
  // activities of lower Rank to complete. Primary controllers interrupt
  // activities of any Rank from any controller when this element is TRUE and
  // defer to Rank when FALSE. Omission of this optional element is equivalent
  // to FALSE.
  optional bool interrupt_other_activities = 2;
  // Indicates a temporary override value for Capability rank for the Capability
  // associated with the command. The temporary override applies for this
  // command instance only. Capability rank is generally controlled via the
  // associated [Capability]SettingsCommand message. Only primary controllers
  // are allowed to change or override Capability rank. This element follows the
  // priority ranking approach where lower values are higher priority and higher
  // values are lower priority.
  optional ComparableRankingType capability_rank_override = 3;
}

// Used to compare different items (Task, Capability Command, Capability
// Activity, etc.). This is accomplished by first comparing two
// ComparableRankingTypes' priority values. In the event of the items having
// equal priority values the precedence values are then compared. For example,
// Task A has a (priority, precedence) value pair of (4, 10), Task B has a
// (priority, precedence) value pair of (4, 23), Task C has a (priority,
// precedence) value pair of (7, 2): the ranking order would be first Task A,
// then Task B, then Task C. Since Task A and Task B have the same relative
// priority value, Task A will be ranked before Task B because Task A has a
// higher relative precedence value. Task C will be ranked after Tasks A and B
// because it has a lower relative priority value than Tasks A and B.
// uci_version: 000.001.000.000
message ComparableRankingType {
  // Priority value of an item (Task, Capability Command, Capability Activity,
  // etc.). Any item with a numerically lower priority value must be considered
  // prior to any items with a numerically higher priority value. Priority
  // doesn't necessarily dictate temporal ordering. A value of zero is highest
  // priority, next highest is one, etc. Priority changes monotonically. For
  // example, given values A=6, B=4, C=3, the order should be first C, then B,
  // then A, with C being the highest relative priority. This element follows
  // the priority ranking approach where lower values are higher priority and
  // higher values are lower priority.
  // xsd type: PriorityRankType
  uint32 priority = 1;
  // Precedence value of an item (Task, Capability Command, Capability Activity,
  // etc.). Any item with a numerically lower precedence value must be
  // considered prior to any items with a numerically higher precedence value.
  // Precedence doesn't necessarily dictate temporal ordering. A value of zero
  // is highest precedence, next highest is one, etc. Precedence changes
  // monotonically. For example, given values A=6, B=4, C=3, the order should be
  // first C, then B, then A, with C being the highest relative precedence. This
  // element follows the priority ranking approach where lower values are higher
  // priority and higher values are lower priority.
  // xsd type: PriorityRankType
  optional uint32 precedence_within_priority = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.001.000.000
message CapabilityCommandTemporalConstraintsType {
  // Indicates temporal scheduling of the Command is critical in order for the
  // Command's results to be useful. This element amplifies the sibling elements
  // by explicitly stating which *must* be met. If omitted, scheduling the
  // command to satisfy the sibling elements isn't critical; the sibling element
  // can be used as guidance if given but the command should still be scheduled
  // even if they aren't all satisfied.
  optional SchedulingCriticalityEnum temporal_criticality = 1;
  // Indicates the start time window for the command, including repetition. The
  // beginning of the range represents a start-no-earlier-than time. The end of
  // the range represents a start-no-later-than time. If omitted, the command
  // should be scheduled for immediate start within other scheduling constraints.
  optional DateTimeRangeType start_time_window = 2;
  // If present, indicates the sibling StartTimeWindow applies to only the first
  // command of a repeating series. If not present, indicates the sibling
  // StartTimeWindow applies to only all (first and all subsequent) commands in
  // a repeating series if element is not present. Optional for non-repeating
  // commands.
  // xsd type: EmptyType (pattern [a-zA-Z]{0})
  optional string window_on_first_only = 3;
  // Indicates the end time window for the command, including repetition. The
  // beginning of the range represents an end-no-earlier-than time. The end of
  // the range represents an end-no-later-than time. If omitted, end time is
  // left to the discretion of the command recipient.
  optional DateTimeRangeType end_time_window = 4;
}

// This type describes scheduling criticality from a temporal perspective.
enum SchedulingCriticalityEnum {
  SCHEDULING_CRITICALITY_ENUM_UNSPECIFIED = 0;
  SCHEDULING_CRITICALITY_ENUM_START_TIME_CRITICAL = 1;
  SCHEDULING_CRITICALITY_ENUM_END_TIME_CRITICAL = 2;
  SCHEDULING_CRITICALITY_ENUM_START_AND_END_TIME_CRITICAL = 3;
}

// Indicates a time range with beginning and ending dates and times. A range
// with a Begin and no End is understood to continue indefinitely or until
// context implies an end. A range with an End and no Begin is understood to
// start "now". A range with no Begin or End is understood to start "now" and
// continue indefinitely or until context implies an end.
// uci_version: 000.000.000.000
message DateTimeRangeType {
  // This element represents the absolute begin/start time and date for the time
  // range.
  // xsd type: DateTimeType (pattern .+Z)
  optional string begin = 1;
  // This element represents the absolute End time and date for the time range.
  // xsd type: DateTimeType (pattern .+Z)
  optional string end = 2;
}

// Tasking sources work at different levels of detail and abstraction,
// progressing from what to do to how specifically to do it. Inputs from
// abstract tasking sources and Tasks can be decomposed into discrete,
// actionable Tasks. This type provides traceability to the external tasking
// or Task from which this Task was derived.
// uci_version: 004.001.001.002
message TraceabilityType {
  // Indicates the ID of OrdersMetadata that summarizes the orders that the
  // subject traces to.
  repeated OrdersMetadataID_Type orders_metadata_id = 1;
  // Indicates a Requirement (Effect, Action, Task, [Capability]Command or
  // Response) which the subject traces/originates from.
  repeated RequirementInstanceID_ChoiceType requirement = 2;
  // Indicates the unique ID of the request for traceability.
  repeated RequestID_Type request_id = 3;
  // Indicates a reference to an external (non-UCI) tasking source, Essential
  // Element of Information, the subject traces/originates from.
  repeated EEI_ID_Type eei_id = 4;
}

// The ID type for UCI IDs that correspond to OrdersMetadata.
// uci_version: 000.000.000.000
message OrdersMetadataID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.000.001
message RequirementInstanceID_ChoiceType {
  oneof choice {
    // Indicates an instance of an Effect Requirement.
    EffectID_Type effect_id = 1;
    // Indicates an instance of an Action Requirement.
    ActionID_Type action_id = 2;
    // Indicates an instance of a Task Requirement.
    TaskID_Type task_id = 3;
    // Indicates an instance of a [Capability]Command Requirement.
    CommandID_Type capability_command_id = 4;
    // Indicates an instance of a Response Requirement.
    ResponseID_Type response_id = 5;
    // Indicates an instance of a CommSupport Requirement.
    CommSupportID_Type comm_support_id = 6;
  }
}

// The ID type for UCI IDs that correspond to Effects.
// uci_version: 001.001.000.000
message EffectID_Type {
  // composed xsd extension base VersionedID_Type
  VersionedID_Type base = 1;
}

// The ID type for UCI IDs that correspond to Actions.
// uci_version: 001.001.000.000
message ActionID_Type {
  // composed xsd extension base VersionedID_Type

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message FeatureMeasurementDataType {
  // The type name for this feature. Since the identity of features used in
  // deployed non-cooperative target identification systems is often classified,
  // this is represented as a foreign key associated with a foreign system
  // defined by the user. See documentation for the producer and/or consumer
  // systems for valid values.
  ForeignKeyType feature_type = 1;
  // The feature data for this observation of the sibling FeatureType element
  // captured in FeatureValue as represented by one or more values.
  repeated double feature_value = 2;
  // One or more numeric indications of the quality of a given feature value,
  // where higher numbers indicate better feature quality. The number and
  // definition of the quality values is dependent on the feature type. Each
  // quality value is associated with the entirety of FeatureValue (rather than
  // specifying the quality of individual elements of a FeatureValue vector).
  // When possible, quality values will be specified as a unitless quantity
  // given in decibels, like a signal to noise ratio.
  repeated double feature_quality = 3;
  // A measure of the expected error of a feature measurement whose precise
  // definition is specific to the feature type. It has the same units as the
  // feature value and is often given as a standard deviation of the feature
  // estimate. This uncertainty relates to the entirety of FeatureValue rather
  // than individual elements of a FeatureValue vector.
  // xsd type: DoubleNonNegativeType
  optional double feature_uncertainty = 4;
  // Identifier shared by features from this measurement that indicates they are
  // related to one another in some way. If not provided, this feature is
  // assumed to be independent of other features. FeatureAssociationNumber is
  // scoped to sibling MeasurementFeatureDataType nodes and can only associate
  // features within the same message or array.
  optional uint32 feature_association_number = 5;
}


}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message LOS_CovariancesRatesType {
  // Covariance of azimuth angle and azimuth angle rate measurement with units
  // of radians * radians per sec.
  optional double azimuth_azimuth_rate = 1;
  // Covariance of elevation angle and elevation angle rate measurement with
  // units of radians * radians per sec.
  optional double elevation_elevation_rate = 2;
  // Covariance of the Azimuth and ElevationRate measurements with units of
  // radian squared per second.
  optional double azimuth_elevation_rate = 3;
  // Covariance of the Elevation and AzimuthRate measurements with units of
  // radian squared per second.
  optional double elevation_azimuth_rate = 4;
  // Covariance of azimuth angle rate and elevation angle rate measurement with
  // units of radians squared per sec squared.
  optional double azimuth_rate_elevation_rate = 5;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message ConeAngleUncertaintyType {
  // Indicates the variance associated with the collected Cone Angle
  // measurements.
  ConeAngleVarianceType variance = 1;
  // Indicates the covariance associated with the collected Cone Angle
  // measurements.
  optional ConeAngleCovarianceType covariance = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message ConeAngleVarianceType {
  // The variance of the inner product of the target pointing vector and the
  // Y-axis of the face of the array. In the case of linear arrays, the Y-axis
  // is the same as the orientation of the linear array. In the case of
  // two-dimensional arrays, the Y-axis is the "Horizontal" axis, coarsely
  // equivalent to Azimuth. This term is unitless.

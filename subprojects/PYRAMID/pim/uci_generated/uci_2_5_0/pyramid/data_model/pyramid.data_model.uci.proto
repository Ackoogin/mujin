// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 004.000.002.000
message OrbitType {
  // What flight pattern this orbit will take.
  OrbitEnum orbit_type = 1;
  // A single point will be provided if and only if OrbitType is Circle. See
  // annotations of each OrbitType (OrbitEnum) value for further details.
  repeated CircleType circle = 2;
  // Direction of turn when rounding the first loiter point. For a figure 8,
  // this direction applies to the first of the two Circle elements.
  RelativeDirectionEnum turn_direction = 3;
  // Duration for the orbit as either a required time spent in the orbit pattern
  // or the number of orbits to make around the pattern.
  OrbitDurationType duration = 4;
}

// An enumeration specifying the type of orbit.
enum OrbitEnum {
  ORBIT_ENUM_UNSPECIFIED = 0;
  ORBIT_ENUM_CIRCLE = 1;
  ORBIT_ENUM_RACETRACK = 2;
  ORBIT_ENUM_FIGURE_EIGHT = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 004.000.002.000
message CircleType {
  // The center point or relative focus for a circle.
  PointChoiceType point_choice = 1;
  // The radius of a circle in meters.
  // xsd type: DistanceType
  double radius = 2;
}

// Indicates a direction relative to the front of the vehicle.
enum RelativeDirectionEnum {
  RELATIVE_DIRECTION_ENUM_UNSPECIFIED = 0;
  RELATIVE_DIRECTION_ENUM_LEFT = 1;
  RELATIVE_DIRECTION_ENUM_RIGHT = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message OrbitDurationType {
  oneof choice {
    // Required amount of time to be spent in the loiter pattern.
    // xsd type: DurationType
    string time = 1;
    // Required number of laps to be spent in the loiter patter.
    uint32 number_of_orbits = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.002.000
message HoverType {
  // The geolocation to perform the hover loiter. Position data may be specified

  EMITTER_URGENCY_ENUM_IMMEDIATE = 1;
  EMITTER_URGENCY_ENUM_IMMINENT = 2;
  EMITTER_URGENCY_ENUM_WARNING = 3;
  EMITTER_URGENCY_ENUM_OTHER = 4;
}

// Indicates whether the subject is capable of movement, regardless of any

  // Source coverage characteristics. If corresponding source coverage values
  // are fixed for all measurements use the ObservationMeasurementSourceType
  // fields, otherwise use this element within each measurement.
  optional SourceCoverageType source_coverage = 4;
  // Altitude reference as reported by an external source.
  optional AltitudeReferenceUncertaintyType altitude_reported = 5;
  // Source angular extent characteristics. If corresponding source angular
  // extent values are fixed for all measurements use the
  // ObservationMeasurementSourceType fields, otherwise use this element within
  // each measurement.
  optional FOV_ExtentType source_angular_extent = 6;
  // Source resolution characteristics. If corresponding source resolution
  // values are fixed for all measurements use the
  // ObservationMeasurementSourceType fields, otherwise use this element within
  // each measurement.
  optional SourceResolutionType source_resolution = 7;
  // Center frequency of collection for measurement.
  // xsd type: FrequencyType
  optional double center_frequency = 8;
  // Bandwidth of collection for measurement.
  optional FrequencyRangeType bandwidth = 9;
  // Specified values of source characteristics for corresponding measurement.
  optional SourceCharacteristicsType source_specified_characteristics = 10;
  // Target irradiance measured detection range in Watts/meter/meter. Specific
  // to IR sensors.
  // xsd type: IrradianceType
  optional double target_irradiance = 11;
  // Probably of detection for measurement, overrides value in Sensor
  // Characteristics.
  // xsd type: PercentType
  optional double probability_of_detection = 12;
  // Probability of false alarm for measurement, overrides value in Sensor
  // Characteristics.
  // xsd type: PercentType
  optional double probability_of_false_alarm = 13;
  // Signal-to-Noise ratio for measurement.
  // xsd type: DecibelType
  optional double snr = 14;
  // Signal-to-Background ratio for measurement.
  // xsd type: DecibelType
  optional double sbr = 15;
  // Indicates the measured radar cross section of the object being observed
  // which is the median of the RCS hits that participated in the formation of
  // the observation. If sensor supports dual polarizations, then collection can
  // provide output for two RCS median values, one per polarization.
  repeated RCS_MedianType radar_cross_section = 16;
  // Indicates supplemental data for visual measurements of space objects.
  optional SpaceObjectVisualDataType space_object_visual_data = 17;
  // Estimated pose angles for the given target, which describe the orientation
  // of the target relative to the sensor. The pose angle describes which part
  // or "face" of the target the sensor is currently viewing. The enum value for
  // the Reference element of this AzElReferenceType must be set to BODY. Note
  // that when using AzElReferenceType to describe a target's pose angles, the

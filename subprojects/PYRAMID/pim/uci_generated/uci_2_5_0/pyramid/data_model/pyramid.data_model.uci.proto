// Utilized for tasking Capabilities that utilize RF_Shared apertures,
// providing the PerformanceConstraints and associated NormalizationMetrics
// for the Resource Allocator to use in selecting resources to satisfy the
// objectives of the task.
// uci_version: 002.000.000.000
message RF_TaskPerformanceType {
  // Set of performance constraints and their order of importance for a
  // capability defined in the Service Contract.
  repeated RF_TaskPerformanceConstraintType performance_constraints = 1;
  // Set of normalization tables to be used to normalize performance feedback
  // received while executing this task.
  repeated RF_TaskNormalizedMetricsType normalized_metrics = 2;
}

// Type to provide values for performance metrics for a capability defined in
// a service contract.
// uci_version: 002.000.000.000
message RF_TaskPerformanceConstraintType {
  // Set of performance constraints metrics, negotiable options, order of
  // importance, and ID assigned to that performance constraint for a defined
  // capability in its service contract documentation.
  repeated PerformanceMetricSetType performance_constraint = 1;
  // Indicates the CapabilityID of the Capability that is the target of the
  // TaskPerformanceConstraint. The CapabilityID is filled in when there are
  // multiple metrics for a given Capability (e.g: POI and Range for ESM).
  optional CapabilityID_Type capability_id = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message PerformanceMetricSetType {
  // Index to the metric that is the target of the PerformanceConstraint,
  // assigned at command or task time in an incrementing number, for
  // cross-referencing assigned constraints.
  uint32 performance_constraint_index = 1;
  // Set to inform the order of importance. Highest number should be the minimum
  // acceptable performance metric set.
  int32 merit = 2;
  // Indicates the extent for the specified Performance Metric is either Upper
  // Range (upper negotiated range), Lower Range (lower negotiated range),
  // Nominal (nominal desired value), or Discrete (get as close as possible).
  optional NegotiableOptionsEnum negotiable_options = 3;
  // Indicates a set of performance metrics for valid IDs. ID and valid value
  // ranges can be found in the service contract.
  repeated MetricValueType performance_metric_set = 4;
}

// Enumerated type for negotiated and non-negotiated RF Capability performance
// metrics.
enum NegotiableOptionsEnum {
  NEGOTIABLE_OPTIONS_ENUM_UNSPECIFIED = 0;
  NEGOTIABLE_OPTIONS_ENUM_UPPER_RANGE = 1;
  NEGOTIABLE_OPTIONS_ENUM_NOMINAL = 2;
  NEGOTIABLE_OPTIONS_ENUM_LOWER_RANGE = 3;
  NEGOTIABLE_OPTIONS_ENUM_DISCRETE = 4;
}

// Value of the performance metric for this ID. ID and valid value ranges can
// be found in the service contract.
// uci_version: 001.000.000.000
message MetricValueType {
  // ID of the performance metric. Valid IDs can be found in the service
  // contract.
  ForeignKeyType metric_identifier = 1;
  // Indicates the name of the performance metric for this ID (e.g: Probability
  // of Intercept, Probability of Detect, or Angle Accuracy). This element
  // provides supplementary information to the MetricIdentifier.
  // xsd type: VisibleString256Type (pattern [ -~]{1,256})
  optional string description_of_metric = 2;
  // Indicates the extent for the specified Performance Metric is either Upper
  // Range (upper negotiated range), Lower Range (lower negotiated range),
  // Nominal (nominal desired value), or Discrete (get as close as possible).
  optional NegotiableOptionsEnum negotiable_options = 3;
  // Value should be between zero and one. Indicates the weight multiplier for
  // this performance metric. Higher weight indicates more important. The sum of
  // all weighs within a performance metric set should not exceed 1.0.
  // xsd type: UnitIntervalFloatType
  float weight = 4;
  // Value of the performance metric for this ID. Valid value ranges can be
  // found in the service contract.
  float value = 5;
}

// Utilized to provide the metric ID and elements to normalize, along with
// interpolation method, for the tasked capability.
// uci_version: 002.000.000.000
message RF_TaskNormalizedMetricsType {
  // Indicates the CapabilityID of the Capability that is the target of the
  // allocation constraint. If multiple required Capabilities are given: 1)
  // allocation to any one of the Capabilities is the minimum expectation, 2)
  // decomposition of the Task into multiple child Tasks allocated across the
  // multiple required Capabilities is acceptable, 3) there is no expectation
  // that each Capability must perform the Task.
  repeated CapabilityID_Type capability_id = 1;
  // ID of the performance metric. Valid IDs can be found in the service
  // contract.
  ForeignKeyType metric_identifier = 2;
  // How the received performance feedback should be interpolated using the
  // sibling NormalizationElements.
  NormalizationInterpolationEnum interpolation_enum = 3;
  // Actual performance values with their corresponding normalized value using
  // the sibling interpolation type. Provides a mapping of actual performance
  // metric values to their normalized versions.
  repeated NormalizationTableType normalization_elements = 4;
}

// Mathematical curve type to be used in interpolation calculations.
enum NormalizationInterpolationEnum {
  NORMALIZATION_INTERPOLATION_ENUM_UNSPECIFIED = 0;
  NORMALIZATION_INTERPOLATION_ENUM_PIECEWISE_CONSTANT = 1;
  NORMALIZATION_INTERPOLATION_ENUM_LINEAR = 2;
  NORMALIZATION_INTERPOLATION_ENUM_EXPONENTIAL = 3;
  NORMALIZATION_INTERPOLATION_ENUM_LOGARITHMIC = 4;
  NORMALIZATION_INTERPOLATION_ENUM_POLYNOMIAL = 5;
  NORMALIZATION_INTERPOLATION_ENUM_CUBIC_SPLINE = 6;
}

// Used for associating an actual metric with its normalized value.
// uci_version: 000.000.000.000
message NormalizationTableType {
  // Actual performance value (i.e. 100nm for range). X-axis of interpolation
  // table.
  float actual_metric_value = 1;
  // Normalized values for the sibling Actual metric value normalized to a 0 to
  // 1 range. Y-axis of interpolation table.
  // xsd type: UnitIntervalFloatType
  float normalized_metric_value = 2;
}


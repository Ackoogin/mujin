  optional double illumination_rate_deviation = 13;
  // Indicates the number of pulses in the Signal.
  optional uint32 pulse_count = 14;
  // Indicates the number of pulses per group.
  optional uint32 pulses_per_group = 15;
  // Indicates the beam's width in azimuth.
  // xsd type: AnglePositiveType
  optional double beam_width = 16;
  // Number of reports used to calculate the average pilot frequency.
  optional uint32 pilot_frequency_average_report_count = 17;
  // Indicates the electrical phases and phase rates to support Long Baseline
  // Interferometer (LBI) measurement technique across Subsystems.

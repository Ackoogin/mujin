  // frame.
  PointChoice3D_Type point3_d = 1;
  // The duration to perform the hover loiter.
  // xsd type: DurationType
  string duration = 2;
}

// Specifies a location either as a geospatial location or a location relative
// to a separately defined reference frame.
// uci_version: 003.000.001.000
message PointChoice3D_Type {
  oneof choice {
    // Contains a geospatial location.
    Point3D_Type absolute_point = 1;
    // The offset of the location from the origin of the separately defined
    // reference frame.
    Point3D_RelativeType relative_point = 2;
  }
}

// This type represents positional data. The latitude and longitude, relative
// to the WGS-84 ellipsoid, are mandatory entries along with altitude. If
// AltitudeReference is not specified, altitude is the WGS-84 height above the
// ellipsoid.
// uci_version: 001.000.002.001
message Point3D_Type {
  // Geospatial latitude measured in radians.
  // xsd type: AngleHalfType
  double latitude = 1;
  // Geospatial longitude measured in radians.
  // xsd type: AngleType
  double longitude = 2;
  // Height measured in meters using the reference specified by the
  // AltitudeReference field. If AltitudeReference is not specified, then the
  // reference is to be taken as WGS-84 ellipsoid.
  // xsd type: AltitudeType
  double altitude = 3;
  // Reference to altitude measurement source.
  optional AltitudeReferenceEnum altitude_reference = 4;
  // Indicates the time when the positional data was measured or last known to
  // be correct. The element can also indicate the time at which a future
  // position of a System, Entity, etc. will be achieved.
  // xsd type: DateTimeType (pattern .+Z)
  optional string timestamp = 5;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.001.000
message Point3D_RelativeType {
  // UUID of the reference frame object that this offset applies to.
  ReferenceFrameID_Type reference_frame_id = 1;
  // Positional data relative to the reference frame origin.
  optional RelativeOffset3D_Type relative_offset = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.001.001.000
message RelativeOffset3D_Type {
  // Indicates frame rotation. See annotations of individual enumerations for
  // additional details.
  RotationEnum rotation = 1;
  // Indicates how the X and Y Offsets are to be interpreted. See annotations of
  // individual enumerations for additional details.
  OffsetXY_Enum xy_offsets = 2;
  // Offset in the X direction from the reference frame origin.
  // xsd type: DistanceOffsetType
  double x = 3;
  // Offset in the Y direction from the reference frame origin.
  // xsd type: DistanceOffsetType
  double y = 4;
  // Offset in the Z direction from the reference frame origin.
  Z_ChoiceType z = 5;
}

// Specifies a Non-Uniform Rational Basis Spline (NURBS) representation of the
// platform trajectory to this endpoint. The following constraints should be
// observed when specifying the trajectory: A) A third-order curve should be
// sufficient for accurate description and higher orders add complexity
// without significant benefit, B) The curve description should be terminated
// at both endpoints and C) the curve should be continuous to first and second
// order across the path segments for the active route.
// uci_version: 001.000.000.000
message NURBS_PointType {
  // Indicates the reference point from which the control points for the
  // trajectory curve are defined. The frame of reference for the control points
  // is specified as Azimuthal Equidistant Projection (AEP) to prevent
  // discontinuties that a LLA (latitude, longitude, altitude) frame of
  // reference may experience at the antipodes.
  WayPointPointChoiceType center_reference = 1;
  // Contains the collection of control points that with the knot vector
  // describe the desired trajectory for this endpoint. Minimum size value is
  // defined to ensure this endpoint is continuous with the rest of the route
  // path. Maximum size value is defined for a third-order curve.
  repeated NURBS_ControlPointType control_points = 2;
  // Contains the collection of knots that with the control points describe the
  // desired trajectory for this endpoint. The number of knots is directly
  // related to the number of control points and the order of the curve. The
  // minimum size value is defined to ensure this endpoint is continuous with
  // the rest of the route path. The maximum size value is defined for a
  // third-order curve.
  // xsd type: DoubleNonNegativeType
  repeated double knot_vector = 3;
  // Indicates the curvature value for the desired trajectory. This is an
  // indication of the smoothness of the trajectory.
  // xsd type: DoublePositiveType
  optional double curvature = 4;
  // Index into the ControlPoints array that indicates the initial control point
  // for this path segment trajectory description. To ensure a continous route
  // path, this value should be identical to the endpoint of the previous
  // segment in this path.
  optional uint32 initial_control_point_index = 5;
  // Index into the ControlPoints array that indicates the final control point
  // for this path segment trajectory description. To ensure a continous route
  // path, this value should be identical to the endpoint of this path segment.
  optional uint32 final_control_point_index = 6;
}

// Specifies a single point and weighting factor in a Non-Uniform Rational
// Basis Spline (NURBS) trajectory description.
// uci_version: 001.000.000.000
message NURBS_ControlPointType {
  // Indicates the value of a single control point for the trajectory curve. To
  // reduce the chance of discontinuities in the curve description, the frame of
  // reference for each point is an Azimuthal Equidistant Projection (AEP)
  // offset from a center reference point.
  Point2D_RelativeType control_point = 1;
  // Indicates the weight factor used for this control point.
  double weight = 2;
}


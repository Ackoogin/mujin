  // Indicates the primary directionality of the Scan. See enumerated type
  // annotations for further details. There is a relationship between this
  // element and the sibling ScanType; not all directionalities are possible for
  // a given scan type.
  optional ScanDirectionalityEnum scan_directionality = 7;
  // Indicates how the Signal's scan is performed. See enumerated type
  // annotations for further details.
  optional ScanMechanicsEnum scan_mechanics = 8;
  // Indicates the measured time duration of a single scan of a scanning Signal.
  // This element is unbounded to allow reporting of a series of scan periods.
  // xsd type: DurationType
  repeated string scan_period = 9;
  // Indicates whether (TRUE) or not (FALSE) on-off keying was detected in the

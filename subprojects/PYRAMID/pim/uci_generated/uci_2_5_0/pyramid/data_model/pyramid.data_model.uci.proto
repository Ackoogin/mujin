  DEPENDENT_REQUIREMENT_OBJECT_ENUM_ALLOCATED_SYSTEM_TO_DEPENDENT_ALLOCATED_SYSTEM = 6;
  DEPENDENT_REQUIREMENT_OBJECT_ENUM_SECONDARY_OBJECT_TO_TARGET_OBJECT = 7;
  DEPENDENT_REQUIREMENT_OBJECT_ENUM_SECONDARY_OBJECT_TO_ALLOCATED_SYSTEM = 8;

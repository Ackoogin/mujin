// Provides kinematic information in the Earth-Centered-Earth-Fixed (ECEF)
// coordinate system. ECEF is a cartesian coordinate system with an origin
// located at the center of mass of the Earth, a Z-axis aligned with the
// rotational axis of the Earth (positive Z in the direction of the North
// pole), the X-Y plane passing through the equator (positive X in the
// direction of the Prime meridian, and positive Y in a direction
// perpendicular to both X and Z to form a right-handed coordinate system).
// See the WGS84C_3D world model for details and precise definitions.
// uci_version: 002.000.000.000
message ECEF_KinematicsType {
  // The Date/Time stamp of the sibling data elements.
  // xsd type: DateTimeType (pattern .+Z)
  string time_valid = 1;
  // Indicates the position in the Earth-Centered-Earth-Fixed (ECEF) coordinate
  // system.
  ECEF_PositionType position = 2;
  // Indicates the velocity in the Earth-Centered-Earth-Fixed (ECEF) coordinate
  // system.
  optional ECEF_VelocityType velocity = 3;
  // Indicates the acceleration in the Earth-Centered-Earth-Fixed (ECEF)
  // coordinate system.
  optional ECEF_AccelerationType acceleration = 4;
  // Euler Angle Sequence describing the orientation of the vehicle in the order
  // yaw, pitch, roll. The angles are given in the Earth-Centered-Earth-Fixed
  // (ECEF) coordinate system.
  optional OrientationType orientation = 5;
  // Indicates the covariance terms of the sibling elements in the
  // Earth-Centered-Earth-Fixed (ECEF) coordinate system.
  optional ECEF_StateCovarianceType state_covariance = 6;
}

// The position vector in the Earth-Centered-Earth-Fixed (ECEF) coordinate

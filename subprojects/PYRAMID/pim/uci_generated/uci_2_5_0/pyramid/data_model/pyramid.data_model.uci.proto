    // A long value.
    int64 long_value = 8;
    // A float value.
    float float_value = 9;
    // A double value.
    double double_value = 10;
    // A string value. A string value can be used to represent all non-primitive
    // data types.
    // xsd type: VisibleString256Type (pattern [ -~]{1,256})
    string string_value = 11;

  // interoperability, the sibling ELNOT_ID and DIEQP_ID elements are preferred
  // and likely required.
  optional ForeignKeyType emitter_index = 3;
}

// Describes the mode of the communications type emitter. Based on
// MIL-STD-6016 DFI/DUI 425/003 and 426/003.
enum CommModeEnum {
  COMM_MODE_ENUM_UNSPECIFIED = 0;
  COMM_MODE_ENUM_UNKNOWN = 1;
  COMM_MODE_ENUM_VOICE = 2;
  COMM_MODE_ENUM_TELEGRAPH = 3;
  COMM_MODE_ENUM_TELETYPE = 4;
  COMM_MODE_ENUM_DATALINK = 5;
  COMM_MODE_ENUM_TV_IMAGERY = 6;
  COMM_MODE_ENUM_MULTIPLEX = 7;
  COMM_MODE_ENUM_TARGETING_LINK = 8;
  COMM_MODE_ENUM_BEACON = 9;
  COMM_MODE_ENUM_COMMAND_GUIDANCE = 10;
  COMM_MODE_ENUM_TERMINAL_GUIDANCE = 11;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message JammerEmitterIdentityType {
  // This element represents Electronic Intelligence (ELINT) Notation (ELNOT)

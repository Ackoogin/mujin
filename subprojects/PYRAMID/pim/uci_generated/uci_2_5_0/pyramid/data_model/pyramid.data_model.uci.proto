// uci_version: 004.000.002.000
message PolygonRelativeType {
  // UUID of the reference frame object that this offset applies to.
  ReferenceFrameID_Type reference_frame_id = 1;
  // A relative polygon has a minimum of 3 vertices relative to the reference
  // frame origin. All points in the list are relative to the reference frame
  // origin, i.e. none of the points is assumed to be the reference point or
  // origin of the reference frame.
  repeated RelativeOffset2D_Type vertex = 2;
}

// The ID type for UCI IDs that correspond to reference frames.
// uci_version: 000.000.000.000
message ReferenceFrameID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.002.002.000
message RelativeOffset2D_Type {
  // Indicates frame rotation. See annotations of individual enumerations for
  // additional details.
  RotationEnum rotation = 1;
  // Indicates how the X and Y Offsets are to be interpreted. See annotations of
  // individual enumerations for additional details.
  OffsetXY_Enum xy_offsets = 2;
  // Offset in the X direction from the reference frame origin.
  // xsd type: DistanceOffsetType
  double x = 3;
  // Offset in the Y direction from the reference frame origin.
  // xsd type: DistanceOffsetType
  double y = 4;
  // Offset in the Z direction from the reference frame origin.
  optional Z_ChoiceType z = 5;
}

// Indicates how the X and Y Offsets are to be interpreted. See annotations of
// individual enumerations for additional details.
enum RotationEnum {
  ROTATION_ENUM_UNSPECIFIED = 0;
  ROTATION_ENUM_UNROTATED = 1;
  ROTATION_ENUM_ROTATION_2D = 2;
  ROTATION_ENUM_ROTATION_3D = 3;
  ROTATION_ENUM_HEADING = 4;
}

// Indicates how the X and Y Offsets are to be interpreted. See annotations of
// individual enumerations for additional details.
enum OffsetXY_Enum {
  OFFSET_XY_ENUM_UNSPECIFIED = 0;
  OFFSET_XY_ENUM_CARTESIAN = 1;
  OFFSET_XY_ENUM_GEODETIC_GREAT_CIRCLE = 2;
  OFFSET_XY_ENUM_GEODETIC_RHUMB = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.001.001.000
message Z_ChoiceType {
  oneof choice {
    // Offset in the Z direction from the reference frame origin. Down is positive.
    // xsd type: DistanceOffsetType
    double z = 1;
    // Offset in the Z direction is considered an altitude difference with
    // positive values corresponding to increases in altitude.
    AltitudeOffsetReferenceType altitude_offset = 2;
    // Optional choice to use Absolute Altitude per altitude reference instead of
    // a vertical offset from the reference frame origin.
    AltitudeReferenceType absolute_altitude = 3;
  }
}

// See annotations in child elements and messages/elements for more details.
// uci_version: 001.001.001.000
message AltitudeOffsetReferenceType {
  // Reference to altitude offset measurement source.
  AltitudeReferenceEnum altitude_offset_reference = 1;
  // Altitude offset as measured from reference type in units of meters.
  // xsd type: DistanceOffsetType
  double altitude_offset = 2;
}

// See annotations in child elements and messages/elements for more details.
// uci_version: 001.000.001.000
message AltitudeReferenceType {
  // Reference to altitude measurement source.
  AltitudeReferenceEnum altitude_reference = 1;
  // Altitude as measured from reference type in units of meters.
  // xsd type: AltitudeType
  double altitude = 2;
}

// Specifies an ellipse that has a location.
// uci_version: 004.000.002.000
message LocatedEllipseType {
  // composed xsd extension base EllipseType
  EllipseType base = 1;
  // Point of intersection of the two axes. This can be an absolute location or
  // be specified relative to a separately defined reference frame.
  PointChoiceType center_point_choice = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message EllipseType {
  // This element represents the length of the semi-major axis.
  // xsd type: DistanceType
  double semi_major_axis_length = 1;
  // This element represents the length of the semi-minor axis.
  // xsd type: DistanceType
  double semi_minor_axis_length = 2;
  // This element represents the orientation as the angle between the semi-major
  // axis and true north.
  // xsd type: AngleHalfType
  double orientation = 3;
}

// Specifies a location either as a geospatial location or a location relative
// to a separately defined reference frame.
// uci_version: 004.000.002.000
message PointChoiceType {
  oneof choice {
    // Contains a geospatial location.
    Point2D_Type absolute_point = 1;
    // The offset of the area from the origin of the reference frame specified by
    // the sibling field.
    Point2D_RelativeType relative_point = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 004.000.002.000
message Point2D_RelativeType {
  // UUID of the reference frame object that this offset applies to.
  ReferenceFrameID_Type reference_frame_id = 1;
  // Positional data relative to the reference frame origin.
  optional RelativeOffset2D_Type relative_offset = 2;
}

// Defines a rectangle that is relative to a geospatial location. The
// geospatial location can be stationary or moving. The moving location is
// relative to a reference specified in ReferenceFrame.
// uci_version: 004.000.002.000
message LocatedRectangleType {
  // composed xsd extension base RectangleType
  RectangleType base = 1;
  // The center point of the rectangle is the point of intersection of the two
  // diagonals of the rectangle.
  PointChoiceType center_point_choice = 2;
}

// Dimensions and orientation of a rectangular or square shape.
// uci_version: 001.000.000.000
message RectangleType {
  // Size of the rectangle perpendicular to the orientation.
  // xsd type: DistanceType
  double width = 1;
  // Size of the rectangle parallel to the orientation.
  // xsd type: DistanceType
  double height = 2;
  // This element represents the orientation as the angle between the height
  // axis and true north.
  // xsd type: AngleHalfType
  double orientation = 3;
}

// An area defined by two ranges and two angles relative to a geospatial
// point. The geospatial point can be stationary or it can be relative to a
// moving object/location so its definition is an offset to a location defined
// in ReferenceFrame.
// uci_version: 004.000.002.000
message SlantRangeAreaType {
  // The Radius about a point.
  SlantRangeConstraintsType radius = 1;
  // The angle measured clockwise with True North at 0. This is used to
  // calculate the azimuth extent for a tracking area around a designated point,
  // entity, ownship, or system.
  AnglePairType azimuth_extent = 2;
  // This element represents the orientation as the angle between the area and
  // the orientation of the reference frame.
  // xsd type: AngleHalfType
  double orientation = 3;
  // The location of the slant range area.
  PointChoiceType point_choice = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.001.000.000
message SlantRangeConstraintsType {
  // Indicates the minimum distance for this slant range.
  // xsd type: DistanceType
  double min = 1;
  // Indicates the maximum distance for this slant range.
  // xsd type: DistanceType
  double max = 2;
  // If present, indicates the defined ranges are absolute distances.
  // xsd type: EmptyType (pattern [a-zA-Z]{0})
  optional string absolute = 3;
}

// Specifies a range of angles that will always go from the Min value to the
// Max value in the positive angle direction.
// uci_version: 001.000.000.000
message AnglePairType {
  // Minimum value of the angle pair.
  // xsd type: AngleType
  double min = 1;
  // Maximum value of the angle pair.
  // xsd type: AngleType
  double max = 2;
}

// An enumeration indicating an item's location with relation to a volume or
// zone.
enum SpatialRelationEnum {
  SPATIAL_RELATION_ENUM_UNSPECIFIED = 0;
  SPATIAL_RELATION_ENUM_INSIDE = 1;
  SPATIAL_RELATION_ENUM_OUTSIDE = 2;
  SPATIAL_RELATION_ENUM_EXPLICIT = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.002.000
message OrbitalFiltersQueryType {
  // composed xsd extension base QueryPET
  QueryPET base = 1;
  // Indicates the volume to be filtered on.
  VolumeChoiceType volume_choice = 2;
  // Indicates whether the desired item is to be in relation to the associated
  // volume.
  SpatialRelationEnum relation_to_volume = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.001.001
message VolumeChoiceType {
  oneof choice {
    // Indicates a volume defined by an existing OpVolume.
    OpVolumeID_Type op_volume_id = 1;
    // Indicates a volume defined directly here.
    OpVolumeType volume_definition = 2;
  }
}

// The ID type for UCI IDs that correspond to an OpVolume.
// uci_version: 000.000.000.000
message OpVolumeID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// An operational volume comprises a three dimensional region of space.
// uci_version: 005.001.004.001
message OpVolumeType {
  oneof choice {
    // This element describes a 3-dimensional geometric volume (e.g. sphere, cone,
    // etc.) using kinematics to describe the zone's position in space.
    GeometricVolumeType geometric_volume = 1;
    // Describes a 3-dimensional WGS-84 ellipsoid. For example, geocentric volumes
    // can be used to include space objects in keep-in zones or to exclude space
    // objects in keep-out zones.
    GeocentricVolumeType geocentric_volume = 2;
    // Indicates an orbital regime which are mostly altitude-based in which the
    // space object will reside including optional indication of the class of
    // orbits as secondary descriptions.
    OrbitRegimeType orbit_regime = 3;
    // Indicates an orbit altitude range that describes a region in space.
    OrbitAltitudeEnum orbit_altitude = 4;
    // This element includes other qualitative types of regions in space such as
    // space weather related zones.
    OrbitQualitativeEnum qualitative = 5;
  }
}

// This type describes a 3-dimensional geometric volume (e.g. sphere, cone,
// etc.) which uses kinematics to describe the volume's position in space.
// uci_version: 005.000.004.000
message GeometricVolumeType {
  // This element provides a choice for the kind of geometry the zone describes.
  Shape3D_ChoiceType shape = 1;
  // This element defines the kinematics of the sibling shape. Each shape within
  // the sibling Shape element determines the unique meaning of this element.
  KinematicsChoiceType kinematics_choice = 2;
}

// This generic type provides a choice for 3-dimensional shapes (e.g. spheres,
// cones, etc.).
// uci_version: 001.000.000.001
message Shape3D_ChoiceType {
  oneof choice {
    // This element describes the geometric parameters of a sphere via a radius.
    // The location of the sphere is referenced by its center (see sibling
    // Kinematics element for position of the center).
    SphereType sphere = 1;
    // This element describes the geometric parameters of a dome via a radius. The
    // location of the dome is referenced by the point representing the center of
    // a sphere of the same radius; in other words, the center of the circle which
    // is the base of the dome (see sibling Kinematics element for position of
    // this point). The X'-Y'-axes define a plane perpendicular to the Z' axes
    // aligned to the center line of the dome. The attitude of the X', Y' and Z'
    // axes are expressed in terms of a quaternion rotation in the reference frame
    // of choice. As an example, domes are a convenient way to represent an
    // OpVolume relating to the ranges of ground based sites, such as SAM sites.
    DomeType dome = 2;
    // This element describes the geometric parameters of an ellipsoid along three
    // axes: (1)semi-major length A, (2)semi-minor length B, and (3)semi-minor
    // length C (the third axis perpendicular to the plane containing A and B).
    // The location of an ellipsoid is referenced by its center (see sibling
    // Kinematics element for position of the center). The attitude of an
    // ellipsoid in a reference frame is represented by the body frame axes X',
    // Y', and Z' where X is the access of the longest element of the ellipsoid
    // (semi-major length A), and Y and Z are aligned with the semi-minor length B
    // and semi-minor length C axes respectively. For example, an ellipsoid can
    // express a keep out zone relative to a space based object.
    EllipsoidType ellipsoid = 3;
    // This element describes the geometric parameters of a cylinder via a radius
    // and a length. If the cylinder has a length, it is finite in length;
    // otherwise, it is infinite. The location of a cylinder is in reference to
    // its center point (see sibling Kinematics element for position of the
    // center) and the attitude is represented by the body frame axis Z' that is
    // aligned to the center line of the cylinder, and the X' and Y' axes that are
    // in the plane of the radius. For example, a cylinder can represent a region
    // around a space object or a region of space in which it can operate or
    // communicate with other space objects. COMM lines between two satellites.
    CylinderType cylinder = 4;
    // This element describes the geometric parameters of a cone via its vertex,
    // cone half-angle, range (optional), and attitude. If the cone has a range,
    // it is finite in length; otherwise, it is infinite. The location of a cone
    // is in reference to the cone's vertex (see sibling Kinematics element for
    // position of the cone's vertex). The attitude of a cone in a reference frame
    // is represented by the Z' body axis that is aligned to the centerline of the
    // cone, and the X' and Y' axes that are in the plane of the radius. In the
    // case of a sensor on a mobile platform, the cone's position may be expressed
    // relative to the body frame of the object. A cone may represent the spatial
    // coverage of a sensor with a conical field of view. For example, a cone can
    // express a keep out zone relative to a sensor on Earth or a space-based
    // sensor.
    ConeType cone = 5;
    // This element describes the geometric parameters of a complex cone via its
    // vertex, inner cone half-angle, outer cone half-angle, minimum clock angle,
    // maximum clock angle, range (optional), and attitude. If the cone has a
    // range, it is finite in length; otherwise, it is infinite. The location of a
    // cone is in reference to the cone's vertex (see sibling Kinematics element
    // for position of the cone's vertex). The attitude of a cone in a reference
    // frame is represented by the Z' body axis that is aligned to the centerline
    // (boresight) of the cone, and the X' and Y' axes that are in the plane of
    // the radius. In the case of a sensor on a mobile platform, the cone's
    // position may be expressed relative to the body frame of the object. A
    // complex cone may represent the spatial coverage of a sensor with a
    // partially-conical field of view, such as a wedge. For example, a complex
    // cone can express a wedge-shaped keep out zone relative to a sensor on Earth
    // or a space-based sensor.
    ComplexConeType complex_cone = 6;
    // This element describes the geometric parameters of a rectangular cone via
    // its vertex, length half-angle, width half-angle, range (optional), and
    // attitude. The size of the half-angles is determined by the length and width
    // half-angles relative to the cone's centerline defined by the attitude. If
    // the rectangular cone has a range, it is finite in length; otherwise, it is
    // infinite. The location of a rectangular cone is in reference to the
    // rectangular cone's vertex (see sibling Kinematics element for position of
    // the rectangular cone's vertex). The attitude of a cone in a reference frame
    // is represented by the Z' body axis that is aligned to the centerline of the
    // cone, and the X' and Y' axes that are in the plane perpendicular to the
    // centerline of the cone. In the case of a sensor on a mobile platform, the
    // cone's position may be expressed relative to the body frame of the object.
    // A rectangular cone may represent the spatial coverage of a sensor with a
    // conical field of view. For example, a rectangular cone can express a keep
    // out zone relative to a sensor on Earth or a space-based sensor.
    RectangularConeType rectangular_cone = 7;
    // This element describes the geometric parameters of a volumetric arc as
    // defined by the Radial, Along Orbit, and Cross-Track deltas from the
    // reference object (see sibling Kinematics element for position of the
    // center). An arch volume may represent a volume in space along circular,
    // near-circular, or elliptical orbits. Arc volumes can be used to include
    // space objects in keep-in zones or to exclude space objects in keep-out
    // zones.
    ArcVolumeType arc_volume = 8;
    // Indicates a volume defined by Inclination, Period, and Right Ascension
    // deltas from the reference object.
    IncRaPeriodVolumeType inc_ra_period_volume = 9;
  }
}

// This type describes the geometric parameters of a sphere.
// uci_version: 001.000.000.000
message SphereType {
  // Indicates the radius of the sphere.
  // xsd type: DistanceType
  double radius = 1;
}

// This element describes the geometric parameters of a dome via a radius. The
// location of the dome is referenced by the point representing the center of
// a sphere of the same radius; in other words, the center of the circle which
// is the base of the dome (see sibling Kinematics element for position of
// this point).
// uci_version: 001.000.000.000
message DomeType {
  // Indicates the radius of the dome.
  // xsd type: DistanceType
  double radius = 1;
}

// This type describes the geometric parameters of an ellipsoid.
// uci_version: 001.000.000.000
message EllipsoidType {
  // One of the principal semi-axis. This element represents the length of the
  // semi-major axis.
  // xsd type: DistanceType
  double semi_major_axis_length_a = 1;
  // 2nd principal semi-axis. This element represents the length of the
  // semi-minor axis.
  // xsd type: DistanceType
  double semi_minor_axis_length_b = 2;
  // 3rd principal semi-axis. This element represents the length of the
  // semi-minor axis.
  // xsd type: DistanceType
  double semi_minor_axis_length_c = 3;
  // Indicates the quaternion attitude in the reference system of the sibling
  // kinematics element which defines the location of its center.
  QuaternionType attitude = 4;
}

// This type describes the geometric parameters of a cylinder.
// uci_version: 001.000.000.000
message CylinderType {
  // Indicates the length from the vertex to the end of the cylinder.
  // xsd type: DistanceType
  optional double length = 1;
  // Indicates the radius of the cone.
  // xsd type: DistanceType
  double radius = 2;
}

// This type describes the geometric parameters of a cone.
// uci_version: 001.000.000.000
message ConeType {
  // Angle in radians from the Attitude projection acting as the cone's
  // centerline to the edge of the cone.
  // xsd type: AngleHalfType
  double half_angle = 1;
  // Indicates the range from the vertex to the end of the cone.
  // xsd type: DistanceType
  optional double range = 2;
}

// This type describes the geometric parameters of a complex cone.
// uci_version: 000.000.000.000
message ComplexConeType {
  // Defines the inner cone half-angle. The half-angle is the angle from the
  // centerline of the cone to the edge of the inner cone.
  // xsd type: AngleHalfType
  double inner_cone_half_angle = 1;
  // Defines the outer cone half-angle. The half-angle is the angle from the
  // centerline of the cone to the edge of the outer cone.
  // xsd type: AngleHalfType
  double outer_cone_half_angle = 2;
  // Defines the minimum clock angle.
  // xsd type: AnglePositiveType
  double min_clock_angle = 3;
  // Defines the maximum clock angle.
  // xsd type: AnglePositiveType
  double max_clock_angle = 4;
  // Indicates the range from the vertex to the end of the cone.
  // xsd type: DistanceType
  optional double range = 5;
}

// This type describes the geometric parameters of a rectangular cone.
// uci_version: 001.000.000.000
message RectangularConeType {
  // Angle in radians from the boresight to the longer edge of the rectangular
  // cone.
  // xsd type: AngleHalfType
  double length = 1;
  // Angle in radians from the boresight to the shorter edge of the rectangular
  // cone.
  // xsd type: AngleHalfType
  double width = 2;
  // Indicates the range from the vertex to the end of the cone.
  // xsd type: DistanceType
  optional double range = 3;
}

// Indicates a volume defined by the Radial, Along Orbit, and Cross-Track
// deltas from the reference object.
// uci_version: 001.000.000.000
message ArcVolumeType {
  // Orbital difference in the radial direction (along a vector pointing out
  // from Earth's center).
  // xsd type: DistanceType
  double radial_delta = 1;
  // Distance along the orbital arc expressed in radians difference in mean
  // anomaly or the time to transit that distance along that portion of orbital
  // arc. Related to "transverse", but transverse is a Cartesian vector in the
  // plane of the orbit and perpendicular to the radial vector, rather than
  // following the orbital ellipse.
  AlongOrbitalArcDeltaType along_orbital_arc_delta = 2;
  // Orbital difference in the direction normal to the plane of the orbit.
  // xsd type: DistanceType
  double cross_track_delta = 3;
}

// The AlongOrbitalDelta is based on the mean anomaly along the orbit of the
// primary target.
// uci_version: 001.000.000.000
message AlongOrbitalArcDeltaType {
  // The MeanAnomaly is an optional angular measurement for how far along the
  // orbit to search.
  // xsd type: AngleType
  optional double mean_anomaly = 1;
  // The TimeDelta specifies the distance from the primary target based upon the
  // time of the orbit.
  // xsd type: DurationType
  string time_delta = 2;
}

// Indicates a volume defined by Inclination, Period, and Right Ascension
// deltas from the reference object.
// uci_version: 001.000.000.000
message IncRaPeriodVolumeType {
  // The delta inclination of the search volume measured in radians.
  // xsd type: AngleType
  double delta_inclination = 1;
  // The delta inclination of the search volume measured in radians.
  // xsd type: AngleType
  double delta_right_ascension = 2;
  // The delta period of the search volume measured in seconds.
  // xsd type: DurationType
  string delta_period = 3;
}

// Indicates the kinematics expressed in one of several different kinematics
// standards.
// uci_version: 004.001.002.001
message KinematicsChoiceType {
  oneof choice {
    // Indicates kinematics expressed in one of several kinematics
    // frames/standards.
    OpVolumeKinematicsType volume_kinematics = 1;
    // Indicates kinematics expressed in one of several orbital kinematics
    // frames/standards.
    OrbitalKinematicsChoiceType orbital_kinematics = 2;
    // Describes the kinematics position and orientation in the
    // Radial-Transverse-Normal reference frame with respect to an asset. For
    // example the position and attitude of a sensor relative to a host
    // satellite's body frame.
    RTN_LocalPositionType local_body_position = 3;
  }
}

// Indicates the reference point kinematics for an OpVolume expressed in one
// of several kinematics frames/standards.
// uci_version: 004.000.002.000
message OpVolumeKinematicsType {
  // Specifies a location either as a geospatial location or a location relative
  // to a separately defined reference frame.
  PointChoiceType point_choice = 1;
  // Indicates a velocity of a zone/region.
  optional Velocity2D_Type velocity = 2;
}

// Velocity relative to WGS-84 ellipsoid.
// uci_version: 000.000.000.000
message Velocity2D_Type {
  // The speed component along the true north vector in meters/sec.
  // xsd type: SpeedType
  double north_speed = 1;
  // The speed component along the true east vector in meters/sec.
  // xsd type: SpeedType
  double east_speed = 2;
  // Inertial vertical speed component pointing down measured in meters/sec.
  // xsd type: SpeedType
  optional double down_speed = 3;
  // Indicates the time when the velocity data was measured or last known to be
  // correct. The element can also indicate the time at which a future velocity
  // of a System, Entity, etc. will be achieved.
  // xsd type: DateTimeType (pattern .+Z)
  optional string timestamp = 4;
}

// Indicates the kinematics expressed in one of several orbital kinematics
// standards.
// uci_version: 004.000.000.000
message OrbitalKinematicsChoiceType {
  oneof choice {
    // Indicates kinematics expressed in terms of a standard frame centered on a
    // celestial object.
    OrbitalKinematicsStandardFrameChoiceType standard_frame = 1;
    // Indicates kinematics expressed relative to a reference object that is in
    // orbit around a celestial object.
    OrbitalKinematicsObjectRelativeType orbiting_object_relative = 2;
  }
}

// Indicates kinematics for an orbital object, expressed in the
// Radial-Transverse-Normal Reference System, relative to another orbital
// object whose kinematics are relative to a celestial object.
// uci_version: 004.000.000.000
message OrbitalKinematicsObjectRelativeType {
  // Indicates kinematic vectors for an orbital object, expressed in the
  // Radial-Transverse-Normal Reference System, relative to the orbital object
  // indicated by the sibling ReferenceObjectKinematics element.
  RTN_KinematicsType relative_object_kinematics = 1;
  // Indicates kinematic vectors for an orbital object that serves as the
  // reference for the relative kinematics given in the sibling
  // RelativeObjectKinematics element.
  OrbitalKinematicsStandardFrameChoiceType reference_object_kinematics = 2;
  // Indicates the unique ID of the object whose kinematics are described in the
  // sibling ReferenceObjectKinematics element.
  optional AssetType reference_asset = 3;
}

// Describes the kinematics position and orientation in the
// Radial-Transverse-Normal reference frame with respect to an asset. For
// example the position and attitude of a sensor relative to a host
// satellite's body frame.
// uci_version: 004.001.002.000
message RTN_LocalPositionType {
  // composed xsd extension base RTN_LocalPositionBaseType
  RTN_LocalPositionBaseType base = 1;
  // Indicates the kinematics of the object for which the reference frame of the
  // sibling elements are referenced.
  KinematicsOptionsType relative_kinematics = 2;
}

// Describes the kinematics (position and orientation) in the
// Radial-Transverse-Normal, or RTN, reference frame with respect to an asset.
// Also known as the RIC (Radial, In-Track, Cross-Track) frame. The Radial
// basis vector is aligned with the position vector. The Normal basis vector
// is aligned with the angular momentum direction (which is the orbit normal
// direction). The Transverse basis vector is in the direction of N x R to
// complete the right-handed triad.
// uci_version: 000.000.000.000
message RTN_LocalPositionBaseType {
  // Indicates a position vector in the RTN reference frame.
  RTN_PositionType position = 1;
  // Indicates the attitude in the RTN reference frame.
  optional QuaternionType attitude = 2;
}

// Option to implicitly or explicitly provide the kinematics of an Entity or
// System. This allows the option to override kinematics information for a
// known system/entity when there is no known kinematics information or the
// information is not appropriate (e.g. outdated) by the time of use.
// uci_version: 004.000.002.000
message KinematicsOptionsType {
  oneof choice {
    // Indicates the ID of the object for which the reference frame of the sibling
    // elements are referenced.
    AssetType reference_asset = 1;
    // Indicates the kinematics of the object for which the reference frame of the
    // sibling elements are referenced.
    KinematicsMultiStandardType kinematics_override = 2;
  }
}

// Provides a choice of ways to express kinematics in one of several orbital
// kinematics frames/standards.
// uci_version: 004.000.002.000
message KinematicsMultiStandardType {
  oneof choice {
    // Indicates kinematics expressed in one of several orbital kinematics
    // frames/standards.
    OrbitalKinematicsChoiceType orbital = 1;
    // Indicates kinematics expressed according to the World Geodetic System (WGS)
    // frame/standard.
    KinematicsType wgs = 2;
    // Indicates the orbital solution to achieve the task must be within the
    // defined relative plane angles min and max.
    AngleHalfPairType delta_orbital_plane_tolerance = 3;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 004.000.002.000
message KinematicsType {
  // Indicates the time when the kinematic data is valid.
  // xsd type: DateTimeType (pattern .+Z)
  optional string kinematics_time_stamp = 1;
  // This element indicates the current or last known location of the Entity.
  EntityPositionType position = 2;
  // A vector indicating the current or last known velocity of the Entity.
  // Generally, services are encouraged to send down velocity whenever it is
  // known.
  optional Velocity2D_UncertaintyType velocity = 3;
  // Indicates the current or last known velocity of the Entity. Services are
  // encouraged to provide acceleration whenever it is known.
  optional Acceleration3D_Type acceleration = 4;
  // Indicates the 1-sigma covariance of position and optionally velocity.
  // Position and velocity covariance are symmetric and therefore the covariance
  // values expressed here are the minimum set.
  optional StateCovarianceNED_Type state_covariance = 5;
  // Euler Angle Sequence describing the orientation of the vehicle in the order
  // yaw, pitch, roll. The angles are given in a locally level, North-East-Down
  // coordinate system centered on the vehicle.
  optional OrientationType orientation = 6;
  // Indicates the 1-sigma covariance of orientation angle. Radian covariance is
  // symmetric and therefore the covariance values expressed here are the
  // minimum set.
  optional OrientationCovarianceType orientation_covariance = 7;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 004.000.002.000
message EntityPositionType {
  // The actual position measurement of this entity.
  optional FixedPositionType fixed_position_type = 1;
  // Relative position is reported with respect to a point of reference. The
  // relative point may be defined in several different ways. If the optional
  // LOS field is not provided, then the ReferencePoint option of the
  // PointChoice must be chosen. The position is then reported as an X,Y,Z
  // offset to the origin of the reference frame associated with the
  // ReferenceFrameID referenced by the RelativePoint field. If the optional LOS
  // field is included, then the relative position is reported as a LOS from the
  // sibling ReferencePoint. The LOS can be defined by either a Line of Bearing
  // or a 3D pointing vector.
  optional RelativePositionType relative_position = 2;
  // This is intended to represent an entity with large boundaries, such as a
  // power plant.
  optional ZoneType zone = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.002.001
message FixedPositionType {
  // For moving entities, it is highly recommended that the time data be
  // populated. Generally, services are encouraged to include altitude and/or
  // time data whenever it is known.
  Point2D_ReportedType fixed_point = 1;
  // Provides an estimate of position uncertainty.
  optional UncertaintyType uncertainty = 2;
  // The magnitude of the datum position error in meters.
  optional double datum_error = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.001.002.002
message Point2D_ReportedType {
  // composed xsd extension base Point2D_Type
  Point2D_Type base = 1;
  // Difference in meters between the MSL and HAE altitudes of an object. MSL +
  // HAE_Adjustment = HAE, per MIL-STD-6016.
  // xsd type: DistanceOffsetType
  optional double hae_adjustment = 2;
  // Source of the reported altitude.
  optional AltitudeSourceEnum altitude_source = 3;
  // Expresses track depth by description of horizontal planes at or below Mean
  // Sea Level (MSL)
  optional DepthContactEnum depth_contact = 4;
}

// Source of reported altitude data.
enum AltitudeSourceEnum {
  ALTITUDE_SOURCE_ENUM_UNSPECIFIED = 0;
  ALTITUDE_SOURCE_ENUM_ESTIMATED = 1;
  ALTITUDE_SOURCE_ENUM_SENSOR = 2;
  ALTITUDE_SOURCE_ENUM_MANUAL_AIRCRAFT_REPORT = 3;
  ALTITUDE_SOURCE_ENUM_AUTOMATIC_AIRCRAFT_REPORT = 4;
}

// Expresses depth by description of horizontal planes at or below Mean Sea
// Level (MSL).
enum DepthContactEnum {
  DEPTH_CONTACT_ENUM_UNSPECIFIED = 0;
  DEPTH_CONTACT_ENUM_NO_STATEMENT = 1;
  DEPTH_CONTACT_ENUM_ESTIMATED_SHALLOW = 2;
  DEPTH_CONTACT_ENUM_ABOVE_LAYER = 3;
  DEPTH_CONTACT_ENUM_BELOW_LAYER = 4;
  DEPTH_CONTACT_ENUM_ESTIMATED_DEEP = 5;
  DEPTH_CONTACT_ENUM_BOTTOMED = 6;
  DEPTH_CONTACT_ENUM_UNKNOWN = 7;
  DEPTH_CONTACT_ENUM_PERISCOPE_DEPTH = 8;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message UncertaintyType {
  // This element represents an ellipse describing the 1-sigma position
  // uncertainty. The ellipse is defined by the length of its semi-major and
  // semi-minor axes. The orientation of the ellipse defines the angle between
  // the semi-major axis and true north.
  EllipseType uncertainty_ellipse = 1;
  // This element represents 1-sigma position uncertainty perpendicular to the
  // sibling UncertaintyEllipse surface (in the up-down direction). Combined
  // with the sibling UncertaintyEllipse this results in an uncertainty
  // ellipsoid with "height".
  // xsd type: DistanceType
  optional double uncertainty_vertical = 2;
  // Measured as the angle between the projection of the slant range position
  // uncertainty axis onto the level plane and the slant range position
  // uncertainty axis. Positive angle is measured counter-clockwise from local
  // level.
  // xsd type: AngleHalfType
  optional double uncertainty_tilt = 3;
}

// Indicates a relative position with respect to a point of reference.
// uci_version: 004.001.002.000
message RelativePositionType {
  // This element is the point of reference from which the relative azimuth,
  // range and elevation are specified. Generally, services are encouraged to
  // include altitude and/or time data whenever it is known.
  Point2D_ReferenceType reference_point = 1;
  // This element defines the optional LOS portion to the point of reference. If
  // the LOS element is not included, then the RelativePosition must be defined
  // as an offset to the origin of the ReferenceFrameID referenced by the
  // ReferencePoint. If the LOS element is included, then the position is
  // defined by a LOS from the sibling ReferencePoint. The LOS can be defined
  // with respect to one of two choices: a Line of Sight (absolute frame) or a
  // 3D LOS pointing vector (relative frame). See the associated annotations for
  // details.
  optional LOS_ChoiceType los = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 004.000.002.000
message Point2D_ReferenceType {
  // Indicates the reference point as defined as a 2D Point.
  PointChoiceType point_choice = 1;
  // Indicates that the sibling reference point is associated with a specified
  // object. If the associated reference point choice is a ReferenceFrameID, the
  // ReferenceObject should not be populated.
  optional ReferenceObjectType reference_object = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.000.000
message ReferenceObjectType {
  oneof choice {
    // Indicates the reference object is an Entity.
    EntityID_Type entity_id = 1;
    // Indicates the reference object is an OpPoint.
    OpPointID_Type op_point_id = 2;
    // Indicates the reference object is a System UUID.
    SystemID_Type system_id = 3;
  }
}

// The ID type for UCI IDs that correspond to op lines.
// uci_version: 000.000.000.000
message OpPointID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// Provides a choice of line of sight vector definitions.
// uci_version: 000.000.000.000
message LOS_ChoiceType {
  oneof choice {
    // LOS data provided in alternate spaces to preserve relevant data in order to
    // propagate the track. All data should be provided in the NED reference frame.
    LOS_MeasurementAndUncertaintyType los_az_el = 1;
    // Indicates the line of sight vector and associated uncertainty relative to a
    // reference point in terms of slant range and a unit vector.
    LOS_3D_KinematicsType los3_d_kinematics = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message LOS_MeasurementAndUncertaintyType {
  // Indicates the values of the collected measurements.
  LOS_MeasurementType measurement = 1;
  // Indicates the variance and covariance associated with the collected
  // measurements. The error source type allows for specifying values for three
  // types: Root Mean Square, Random or Bias.
  optional LOS_MeasurementUncertaintyErrorSourcesType covariance = 2;
  // One-sigma uncertainty for Line of Sight.
  optional LOS_UncertaintyType los_uncertainty = 3;
}

// The Line of Sight (LOS) measurements. See annotations in child elements and
// messages/elements that use this type for more details.
// uci_version: 001.002.000.002
message LOS_MeasurementType {
  // Indicates the values of the collected Line of Sight Measurements
  optional LOS_AzElType line_of_sight = 1;
  // Indicates the values of the collected Cone Angle Measurements
  optional ConeAngleType cone_angle = 2;
  // Indicates the values of the collected Arrival Data Measurements
  optional ArrivalDataType arrival_data = 3;
  // Indicates the values of the collected Slant Range Measurements
  optional SlantRangeType slant_range = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message LOS_AzElType {
  // Indicates the azimuth from an observation point to a point of interest.
  // Azimuth is defined as the angle between two lines in a global horizontal
  // plane at the observation point. The first line is from the observation
  // point to true north. The second line is from the observation point to the
  // point of interest projected onto the global horizontal plane. An azimuth of
  // zero indicates true north with values increasing clockwise. The terms
  // azimuth and bearing are often used interchangeably but they are technically
  // different. Azimuth values are angles between 0 and 2*Pi radians (0 and 360
  // degrees) relative to north, in this case true north. Bearing values are a
  // combination of a reference direction (north or south) and an angle between
  // 0 and Pi radians (0 and 180 degrees) towards the east or west direction.
  // For example, an azimuth of Pi/2 radians (90 degrees) is equivalent to a
  // bearing of "North 90 East" or "South 90 East". UCI uses azimuth because it
  // is easier for machine/software use.
  // xsd type: AnglePositiveType
  optional double azimuth = 1;
  // Indicates the elevation from an observation point to a point of interest.
  // Elevation is defined as the angle between two lines in a global vertical
  // plane at the observation point. The first line originates from the
  // observation point and extends along the azimuth. The second line is from
  // the observation point to the point of interest. An elevation of zero
  // indicates the point of interest is in the observation point's horizontal
  // plane. Elevation values are positive when the point of interest is above
  // the horizontal plane, negative when below.
  // xsd type: AngleType
  optional double elevation = 2;
  // Indicates the rates of the collected Azimuth and/or Elevation Measurements
  optional LOS_AzElRatesType rates = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message LOS_AzElRatesType {
  // Azimuth rate of measurement with units of radians per sec.
  // xsd type: AngleRateType
  optional double azimuth_rate = 1;
  // Elevation rate of measurement with units of radians per sec.
  // xsd type: AngleRateType
  optional double elevation_rate = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message ConeAngleType {
  // The inner product of the target pointing vector with the sensor Y-axis. In
  // the case of linear arrays, the Y-axis is the same as the orientation of the
  // linear array. In the case of two-dimensional arrays, the Y-axis is the
  // "Horizontal" axis, coarsely equivalent to Azimuth. Values of the inner
  // product are unitless and bounded [-1,1].
  optional double coscone_y = 1;
  // The inner product of the target pointing vector with the sensor Z axis.
  // This term is only used for two-dimensional arrays. The Z-axis is the "Down"
  // axis of the array, perpendicular to both the X-axis (boresight) and the
  // Y-axis (horizontal), coarsely equivalent to Elevation. Values of the inner
  // product are unitless and bounded [-1,1].
  optional double coscone_z = 2;
  // Indicates the rates of the collected Cone Angle Measurements
  optional ConeAngleRatesType rates = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message ConeAngleRatesType {
  // The rate of change of the inner product of the target pointing vector with
  // the sensor Y-axis. In the case of linear arrays, the Y-axis is the same as
  // the orientation of the linear array. In the case of two-dimensional arrays,
  // the Y-axis is the "Horizontal" axis, making it coarsely equivalent to the
  // Azimuth rate with units of per second.
  optional double coscone_y_rate = 1;
  // The rate of change of the inner product of the target pointing vector with
  // the sensor Z axis. This term is only used for two-dimensional arrays. The
  // Z-axis is the "Down" axis of the array, perpendicular to both the X-axis
  // (boresight) and the Y-axis (horizontal), making it coarsely equivalent to
  // the Elevation rate with units of per second.
  optional double coscone_z_rate = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.001.000.000
message ArrivalDataType {
  // Signal time of arrival(e.g. pulse-edge) of measurement relative to the
  // measurement time stamp. Units are in nanoseconds.
  // xsd type: DurationType
  optional string time_of_arrival = 1;
  // Time difference of arrival for two receiver measurements. For use with
  // unambiguous associations of TOAs only. Units are in nanoseconds.
  // xsd type: DurationType
  optional string time_difference_of_arrival = 2;
  // Frequency of arrival of measurement. Units are in hertz.
  // xsd type: FrequencyType
  optional double frequency_of_arrival = 3;
  // Frequency difference of arrival for two receiver measurements. For use with
  // unambiguous associations of frequencies only.
  // xsd type: FrequencyOffsetType
  optional double frequency_difference_of_arrival = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message SlantRangeType {
  // Indicates the line-of-sight distance between the observation point and
  // point of interest.
  // xsd type: DistanceType
  optional double slant_range = 1;
  // Slant range difference for two received measurements, with units of meters.
  // xsd type: DistanceType
  optional double delta_slant_range = 2;
  // Indicates the rates and/or acceleration of the collected Slant Range
  // Measurements
  optional SlantRangeRatesAndAccelerationType rates_and_acceleration = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message SlantRangeRatesAndAccelerationType {
  // Slant range rate of measurement with units of meters per sec.
  // xsd type: SpeedType
  optional double slant_range_rate = 1;
  // Slant range-rate difference of arrival for two received measurements, with
  // units of meters per sec.
  // xsd type: SpeedType
  optional double delta_slant_range_rate = 2;
  // An observed slant range acceleration value with units of meters per sec
  // squared.
  // xsd type: AccelerationType
  optional double slant_range_acceleration = 3;
}

// The error sources available to describe the uncertainty in the Line of
// Sight (LOS) measurements. See annotations in child elements and
// messages/elements for more details.
// uci_version: 002.000.002.000
message LOS_MeasurementUncertaintyErrorSourcesType {
  // Specifies the uncertainty term values provided are of Root Mean Square
  // basis.
  optional LOS_MeasurementUncertaintyType root_mean_square = 1;
  // Specifies the uncertainty term values provided are of Bias basis.
  optional LOS_MeasurementUncertaintyType bias = 2;
  // Specifies the uncertainty term values provided are of Random basis.
  optional LOS_MeasurementUncertaintyType random = 3;
}

// The uncertainty in the Line of Sight (LOS) measurements. See annotations in
// child elements and messages/elements for more details.
// uci_version: 000.002.000.002
message LOS_MeasurementUncertaintyType {
  // Indicates the variance and covariance associated with the collected Line of
  // Sight measurements.
  optional LOS_VarianceAndCovarianceType los_uncertainty = 1;
  // Indicates the uncertainty associated with the collected Cone Angle
  // measurements.
  optional ConeAngleUncertaintyType cone_angle_uncertainty = 2;
  // Indicates the uncertainty associated with the collected Arrival Data
  // measurements.
  optional ArrivalDataUncertaintyType arrival_data_uncertainty = 3;
  // Indicates the uncertainty associated with the collected Slant Range
  // measurements.
  optional SlantRangeUncertaintyType slant_range_uncertainty = 4;
  // Indicates the uncertainty associated with the collected Cone Angle and
  // Slant Range measurements.
  optional ConeAngleSlantRangeUncertaintyType cone_angle_slant_range_uncertainty = 5;
  // Indicates the uncertainty associated with the collected Line of Sight and
  // Slant Range measurements.
  optional LOS_SlantRangeUncertaintyType los_slant_range_uncertainty = 6;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message LOS_VarianceAndCovarianceType {
  // Indicates the variance associated with the collected LOS measurements.
  LOS_VarianceType variance = 1;
  // Indicates the covariance associated with the collected LOS measurements

  // Indicates the 1-sigma covariance of position and optionally velocity.
  // Position and velocity covariance are symmetric and therefore the covariance
  // values expressed here are the minimum set.
  optional PositionAndVelocityCovarianceType position_and_velocity_covariance = 4;
  // Standard deviation of velocity/speed in m/s.
  // xsd type: DoubleNonNegativeType
  optional double velocity_deviation = 5;
  // Standard deviation of the heading represented by the velocity vector, in
  // radians.
  // xsd type: DoubleNonNegativeType
  optional double heading_deviation = 6;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 004.001.002.000
message SignalEmitterKinematicsPositionType {
  // Indicates the geospatial position of the emitter associated with the
  // SignalReport.
  optional SignalEmitterKinematicsFixedType fixed_position = 1;
  // Indicates an instance of a "AOA", "LOS", "DF", "LOB", etc. measurement of
  // the geospatial location of the emitter associated with the SignalReport,
  // relative to the ESM collector's position. Relative position is reported
  // with respect to a point of reference. The relative point is fully defined
  // when a Azimuth, Elevation and SlantRange are given. It can be partially
  // defined as an angle-only position when Azimuth and/or Elevation are given.
  // It can be partially defined as a range-only position when only SlantRange
  // is given.
  repeated SignalRelativeType relative = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.001.002.000
message SignalEmitterKinematicsFixedType {
  // composed xsd extension base EmitterFixedPositionType
  EmitterFixedPositionType base = 1;
  // Indicates the status of a method of geolocation used to determine the
  // emitter position. Multiple instances allows the last state of multiple
  // methods to be reported. If multiple instances are given, each should be of
  // a different geolocation method as indicated by the child element.
  repeated SignalEmitterKinematicsFixedGeolocationStatusType geolocation_status = 2;
  // Indicates if the emitter position is a fixed position or the center point
  // of an area of probability.
  optional EW_FixEnum ew_fix_type = 3;
}

// Indicates an emitter fixed position.
// uci_version: 001.000.002.000
message EmitterFixedPositionType {
  // For moving entities, it is highly recommended that the time data be
  // populated. Generally, services are encouraged to include altitude and/or
  // time data whenever it is known.
  Point2D_ReportedType fixed_point = 1;
  // Provides an estimate of position uncertainty.
  optional EmitterUncertaintyType uncertainty = 2;
}

// Geometry describing 1-sigma position uncertainty in two or three dimensions.
// uci_version: 001.000.000.000
message EmitterUncertaintyType {
  // This element represents an ellipse describing the 1-sigma position
  // uncertainty. The uncertainty can be defined as either an ellipse or
  // rectangle centered on a point.
  EmitterUncertaintyChoiceType uncertainty = 1;
  // This element represents 1-sigma position uncertainty perpendicular to the
  // sibling UncertaintyEllipse surface (in the up-down direction). Combined
  // with the sibling UncertaintyEllipse this results in an uncertainty
  // ellipsoid with "height".
  // xsd type: DistanceType
  optional double uncertainty_vertical = 2;
  // Measured as the angle between the projection of the slant range position
  // uncertainty axis onto the level plane and the slant range position
  // uncertainty axis. Positive angle is measured counter-clockwise from local
  // level.
  // xsd type: AngleHalfType
  optional double uncertainty_tilt = 3;
}

// An ellipse or rectangle shape describing 1-sigma position uncertainty.
// uci_version: 001.000.000.000
message EmitterUncertaintyChoiceType {
  oneof choice {
    // This element represents an ellipse describing the 1-sigma position
    // uncertainty. The ellipse is defined by the length of its semi-major and
    // semi-minor axes. The orientation of the ellipse defines the angle between
    // the semi-major axis and true north.
    EllipseType uncertainty_ellipse = 1;
    // This element represents a rectangle describing the 1-sigma position
    // uncertainty. The rectangle is defined by the height parallel to the
    // orientation axis and width of the rectangle perpendicular to the
    // orientation angle.
    RectangleType uncertainty_rectangle = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message SignalEmitterKinematicsFixedGeolocationStatusType {
  // Indicates a geolocation method used to determine the emitter position. See
  // enumerated type annotations for further details.
  optional SignalGeolocationMethodEnum geolocation_method = 1;
  // Indicates the control state of the sibling GeolocationMethod.
  optional SignalGeolocationControlEnum geolocation_control_state = 2;
}

// Indicates the method to be used for geolocation.
enum SignalGeolocationMethodEnum {
  SIGNAL_GEOLOCATION_METHOD_ENUM_UNSPECIFIED = 0;
  SIGNAL_GEOLOCATION_METHOD_ENUM_TDOA = 1;
  SIGNAL_GEOLOCATION_METHOD_ENUM_FDOA = 2;
  SIGNAL_GEOLOCATION_METHOD_ENUM_TRIANGULATION = 3;
  SIGNAL_GEOLOCATION_METHOD_ENUM_BEARINGS_ONLY = 4;
  SIGNAL_GEOLOCATION_METHOD_ENUM_AZ_EL = 5;
  SIGNAL_GEOLOCATION_METHOD_ENUM_AMPLITUDE = 6;
  SIGNAL_GEOLOCATION_METHOD_ENUM_ADVANCED = 7;
  SIGNAL_GEOLOCATION_METHOD_ENUM_OTHER = 8;
}

// Indicates the geolocation control state.
enum SignalGeolocationControlEnum {
  SIGNAL_GEOLOCATION_CONTROL_ENUM_UNSPECIFIED = 0;
  SIGNAL_GEOLOCATION_CONTROL_ENUM_INITIATE = 1;
  SIGNAL_GEOLOCATION_CONTROL_ENUM_INITIATE_WITH_CLEAR = 2;
  SIGNAL_GEOLOCATION_CONTROL_ENUM_INITIATE_ONE_TIME = 3;
  SIGNAL_GEOLOCATION_CONTROL_ENUM_INITIATE_UNTIL_STOP = 4;
  SIGNAL_GEOLOCATION_CONTROL_ENUM_STOP = 5;
}

// Type of bearing described by the fixed position. Based on MIL-STD-6016
// DFI/DUI 382/004.
enum EW_FixEnum {
  EW_FIX_ENUM_UNSPECIFIED = 0;
  EW_FIX_ENUM_FIX = 1;
  EW_FIX_ENUM_AREA_OF_PROBABILITY = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.001.000.000
message SignalRelativeType {
  // composed xsd extension base LOS_MeasurementWithUncertaintyType
  LOS_MeasurementWithUncertaintyType base = 1;
  // Indicates the unique ID of an external object, such as a Link 16 TN, that
  // is associated with the Relative LOS measurement.
  optional ReferenceObjectType reference_identifier = 2;
  // Indicates the method/technique used to determine the Relative LOS. See
  // enumeration annotations for further details.
  optional SignalMeasurementMethodEnum measurement_method = 3;
  // Indicates the status of the Relative LOS measurement. See enumeration
  // annotations for further details.
  optional MeasurementStatusEnum measurement_status = 4;
  // Indicates a "flag" or characteristic of the Relative LOS measurement and/or
  // the conditions under which it was made. See enumeration annotations for
  // further details.
  optional SignalMeasurementFlagEnum measurement_flag = 5;
  // Indicates, when TRUE, that the sibling Relative LOS Measurement values are
  // suspected to be erroneous, possibly even more so than indicated in the
  // sibling Relative LOS Measurement Uncertainty element.
  optional bool suspect = 6;
  // Indicates that the platform was experiencing excessive attitude during the
  // line of sight measurement, contributing to the measurement being Suspect.
  // This element should only be used when the sibling Suspect element is TRUE.
  optional bool excessive_attitude = 7;
  // If present, indicates that the signal/emitter LOS was measured near the
  // edge of the field of view of the antenna component, in its fringe region,
  // and therefore might be detected by another antenna component.
  // xsd type: EmptyType (pattern [a-zA-Z]{0})
  optional string fringe_detection = 8;
  // Indicates whether the azimuth (relative position) is derived from EA, RDF,
  // or a non-RDF electronic surveillance source.
  optional EW_MeasurementEnum ew_measurement_type = 9;
}

// Indicates different techniques/methods to measure the Line of Sight (LOS)
// of an RF signal.
enum SignalMeasurementMethodEnum {
  SIGNAL_MEASUREMENT_METHOD_ENUM_UNSPECIFIED = 0;
  SIGNAL_MEASUREMENT_METHOD_ENUM_AMPLITUDE = 1;
  SIGNAL_MEASUREMENT_METHOD_ENUM_AMPLITUDE_RESOLVED_PHASE = 2;
  SIGNAL_MEASUREMENT_METHOD_ENUM_SBI = 3;
  SIGNAL_MEASUREMENT_METHOD_ENUM_LBI = 4;
  SIGNAL_MEASUREMENT_METHOD_ENUM_GEO_CALCULATED = 5;
  SIGNAL_MEASUREMENT_METHOD_ENUM_MONOPULSE = 6;
  SIGNAL_MEASUREMENT_METHOD_ENUM_OTHER = 7;
  SIGNAL_MEASUREMENT_METHOD_ENUM_DUAL_SBI = 8;
  SIGNAL_MEASUREMENT_METHOD_ENUM_ACDF = 9;
  SIGNAL_MEASUREMENT_METHOD_ENUM_ACDF_SBI = 10;
}

// Indicates characteristics of the LOS measurement that give insight into its
// quality and/or the conditions under which it was measured.
enum SignalMeasurementFlagEnum {
  SIGNAL_MEASUREMENT_FLAG_ENUM_UNSPECIFIED = 0;
  SIGNAL_MEASUREMENT_FLAG_ENUM_AZ_EL_RESOLVED = 1;
  SIGNAL_MEASUREMENT_FLAG_ENUM_CONIC = 2;
  SIGNAL_MEASUREMENT_FLAG_ENUM_RESOLVED = 3;
  SIGNAL_MEASUREMENT_FLAG_ENUM_FORCED = 4;
  SIGNAL_MEASUREMENT_FLAG_ENUM_SINGLE_CHANNEL = 5;
  SIGNAL_MEASUREMENT_FLAG_ENUM_NON_QUADRANT = 6;
}

// Type of bearing described by the relative position. Based on MIL-STD-6016
// DFI/DUI 382/004.
enum EW_MeasurementEnum {
  EW_MEASUREMENT_ENUM_UNSPECIFIED = 0;
  EW_MEASUREMENT_ENUM_ELECTRONIC_ATTACK = 1;
  EW_MEASUREMENT_ENUM_ELECTRONIC_SURVEILLANCE = 2;
  EW_MEASUREMENT_ENUM_RADIO_DIRECTION_FINDING = 3;
}

// Indicator for whether an emitter is locked onto a target or in surveillance
// mode.
enum LockIndicatorEnum {
  LOCK_INDICATOR_ENUM_UNSPECIFIED = 0;
  LOCK_INDICATOR_ENUM_LOCK = 1;
  LOCK_INDICATOR_ENUM_SPY = 2;
}

// See annotations in child elements and messages/elements that use this type

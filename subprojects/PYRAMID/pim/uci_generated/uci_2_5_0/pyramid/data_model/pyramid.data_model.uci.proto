}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.001.000.001
message FrequencyDataBaseType {
  // Indicates the average frequency of the Signal.
  // xsd type: FrequencyType
  optional double frequency_average = 1;
  // Indicates the frequency band(s) of the Signal. List size for this element
  // is based on "Select All That Apply" condition.
  repeated IEEE_FrequencyBandEnum frequency_band = 2;
  // Indicates the lowest frequency of the Signal.
  // xsd type: FrequencyType
  optional double frequency_min = 3;
  // Indicates the maximum frequency of the Signal.
  // xsd type: FrequencyType
  optional double frequency_max = 4;
  // Indicates the last measured frequency of the Signal.
  // xsd type: FrequencyType
  optional double frequency_last = 5;
  // Indicates the standard deviation of the frequency of the data type.
  // Estimate (weighted or unweighted) of standard deviation of operating RF.
  // (Values greater than or equal to 0.0.).
  // xsd type: DoubleNonNegativeType
  optional double frequency_deviation = 6;
  // Indicates the variation of the modulation of the Signal's frequency. See

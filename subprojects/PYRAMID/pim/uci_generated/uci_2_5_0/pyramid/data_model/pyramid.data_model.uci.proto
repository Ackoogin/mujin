  MOBILITY_ENUM_UNDETERMINED = 1;
  MOBILITY_ENUM_MOVER = 2;
  MOBILITY_ENUM_NON_MOVER = 3;
  MOBILITY_ENUM_NON_MOVER_CLUTTER = 4;
  MOBILITY_ENUM_NON_MOVER_ROTATOR = 5;

  optional double azimuth_rate = 1;
  // Variance of elevation angle rate measurement with units of radians squared
  // per sec squared.
  optional double elevation_rate = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message LOS_CovarianceType {
  // Covariance of azimuth angle and elevation angle measurement with units of
  // radians squared.
  optional double azimuth_elevation = 1;
  // Indicates the covariance of the rates associated with the collected Azimuth

message SignalParametricsType {
  // composed xsd extension base SignalSummaryBaseType
  SignalSummaryBaseType base = 1;
  // Indicates additional frequency characteristics for the signal.
  optional FrequencySupplementalInfoType supplemental_frequency_data = 2;
  // Indicates additional pulse repetition interval (PRI) characteristics for
  // the Signal.
  optional PRI_SupplementalInfoType supplemental_pri_data = 3;
  // Indicates additional pulse width data for the Signal.
  optional PulseWidthSupplementalInfoType supplemental_pulse_width_data = 4;
  // Indicates additional scan data for the Signal.
  optional ScanSupplmentalInfoType supplemental_scan_data = 5;
  // Indicates the polarization of the Signal.
  optional PolarizationType polarization = 6;
  // Indicates the signal to noise ratio of the Pulse.
  // xsd type: DecibelType
  optional double signal_noise_ratio = 7;
  // Pulse Repetition Frequency (PRF) in pulses/second.
  optional double pulse_repetition_frequency = 8;
  // Flag indicating whether the PRF was calculated from the PRI.
  optional bool pulse_repetition_frequency_calculated = 9;
  // Indicates the standard deviation of the pulse, typically with microsecond
  // precision. Note that this is not the standard deviation of the pulse
  // width/duration.
  // xsd type: DurationType
  optional string pulse_deviation = 10;
  // Indicates the standard deviation of a burst of data transmission.
  // xsd type: DurationType
  optional string burst_deviation = 11;
  // Indicates the rate of transmission of the signal's radio waves in hertz.
  // xsd type: FrequencyType
  optional double illumination_rate = 12;
  // Standard Deviation of the Illumination Rate in Hertz.

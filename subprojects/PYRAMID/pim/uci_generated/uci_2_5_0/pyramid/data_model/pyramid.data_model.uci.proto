  // xsd type: NotationType (pattern [A-Z0-9]{5}|UNKN|NONE)
  optional string elnot_identifier = 1;
  // Indicates the general purpose of the detected missile.
  optional MissileEmitterModeEnum missile_mode = 2;
  // Indicates the emitter index associated with the emitter. Emitter index is
  // an index into a table/database of emitters. The table/database is generally
  // created in pre-mission planning and included in one or more MDFs. This
  // element is only useful/meaningful to subscribers who are aware of the
  // table/database/MDF used by the publisher. For inter-System
  // interoperability, the sibling ELNOT_ID and DIEQP_ID elements are preferred
  // and likely required.
  optional ForeignKeyType emitter_index = 3;
}

// Describes the general purpose of the missile emitter signal. Based on
// MIL-STD-6016 DFI/DUI 425/003 and 426/003.
enum MissileEmitterModeEnum {
  MISSILE_EMITTER_MODE_ENUM_UNSPECIFIED = 0;
  MISSILE_EMITTER_MODE_ENUM_UNKNOWN = 1;
  MISSILE_EMITTER_MODE_ENUM_TARGETING_RADAR = 2;
  MISSILE_EMITTER_MODE_ENUM_TARGETING_LINK = 3;
  MISSILE_EMITTER_MODE_ENUM_BEACON = 4;
  MISSILE_EMITTER_MODE_ENUM_COMMAND_GUIDANCE = 5;
  MISSILE_EMITTER_MODE_ENUM_TERMINAL_GUIDANCE = 6;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message SpecificEmitterIdentityType {
  // Indicates the specific emitter instance ID of the Entity.
  ForeignKeyType specific_emitter_key = 1;
}

// Provides identification of an object associated with the Air Force Space
// Command.
// uci_version: 001.001.000.001
message FacilityIdentificationType {
  oneof choice {
    // Indicates the site ID.
    uint32 site_identifier = 1;
    // Indicates the ID of the sensor.
    uint32 sensor_identifier = 2;
    // Indicates the code for an airfield that is the facility or where the
    // facility is based.
    // xsd type: ICAO_AirfieldIdentifierType (pattern [A-Z]{4})
    string icao_code = 3;
    // The ID for this facility is associated with a key that exists in another
    // system, protocol, or network.
    ForeignKeyType foreign_facility_key = 4;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 005.001.002.003
message VehicleIdentificationType {
  // Indicates the UCI SystemID of the asset.
  optional SystemID_Type system_id = 1;
  // Unique identifier for the vehicle. This will differ depending on the type
  // of vehicle. Air platforms will have a Tail Number. Space assets will have a
  // Sat ID. Maritime (ships and subs) will have Hull Numbers.
  optional VehicleUniqueIdentifierType vehicle_unique_identifier = 2;
  // Indicates Identification, Friend or Foe (IFF) modes and settings for the
  // asset.
  optional IFF_Type iff = 3;
  // Indicates a call sign for the asset. Multiple call signs are allowed for
  // different communications systems, registries, or other reasons. The use of
  // ForeignKeyType is an indication that call signs aren't universally defined
  // and come from multiple systems/sources but they are expected to be unique
  // within the context of their source. The child Key element indicates the
  // call sign itself while the child SystemName element indicates the system
  // that assigned it and ensures it is unique. Call signs from ubiquitous
  // systems/sources such as AIS, datalinks, and the ATO are given in sibling
  // elements and shouldn't be repeated here.
  repeated CallSignType call_sign = 4;
  // The specific Radar Cross Section identification for this system. This will
  // typically be a system-specific and service-specific identifier for
  // pre-configured Radar Cross Sectional data. Services should have coordinated
  // this data ahead of time.
  repeated ForeignKeyType radar_cross_section = 5;
  // List of data link ID. Multiple data link IDs can be reported for the same
  // network type.
  repeated DataLinkIdentifierPET data_link_identifier = 6;
  // Sortie number for the system within the deployed unit.
  // xsd type: VisibleString32Type (pattern [ -~]{1,32})
  optional string sortie_number = 7;
  // Indicates an ATO call sign associated with the vehicle.
  repeated USMTF_AircraftCallSignPairType ato_call_sign = 8;
}

// Unique identifier for a vehicle. This will differ depending on the type of
// vehicle. Air platforms will have a Tail Number. Space assets will have a
// Sat ID. Ships and Subs will have AIS Numbers.
// uci_version: 004.000.001.000
message VehicleUniqueIdentifierType {
  oneof choice {
    // Indicates select maritime Automatic Identification System (AIS) settings
    // for the asset/vessel.
    AIS_Type ais = 1;
    // Unique identifier for air platforms. See type annotations for further
    // details.
    // xsd type: TailNumberType (pattern [A-Z0-9\-]{2,10})
    string tail_number = 2;
    // The Satellite Identifier used to identify a Satellite. See type annotations
    // for further details.
    SatelliteIdentifierType satellite = 3;
    // Unique identifier that does not fall into any of the other categories. e.g.
    // A Land based vehicle.
    // xsd type: AlphanumericDashSpaceUnderscoreString20Type (pattern [a-zA-Z0-9 \-_]{1,20})
    string alternate_identifier = 4;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.001.000.000
message AIS_Type {
  // Indicates the Maritime Mobile Service Identity (MMSI) number of the
  // vehicle/vessel. In AIS, MMSI numbers are part of the unique ID of a track
  // and serve as a form of identification. Therefore, AIS MMSI numbers are
  // directly represented in UCI instead of being considered a "foreign" or
  // external type of ID.
  // xsd type: MMSI_NumberType (pattern [0-9]{9})
  optional string mmsi_number = 1;
  // Indicates the International Maritime Organization (IMO) identifier number
  // of the vehicle/vessel. In AIS, IMO numbers are part of the unique ID of a
  // track and serve as a form of identification. Therefore, AIS IMO numbers are
  // directly represented in UCI instead of being considered a "foreign" or
  // external type of ID.
  // xsd type: IMO_NumberType (pattern IMO[0-9]{7})
  optional string imo_number = 2;
  // Indicates the AIS vessel name. In AIS, vessel name is part of the unique ID
  // of a track and serves as a form of identification. Therefore, AIS vessel
  // name is directly represented in UCI instead of being considered a "foreign"
  // or external type of ID.
  // xsd type: AlphanumericDashSpaceUnderscoreStringLength20Type (pattern [a-zA-Z0-9 \-_]{20})
  optional string vessel_name = 3;
  // Indicates the AIS radio call sign.
  // xsd type: AlphanumericDashSpaceUnderscoreString20Type (pattern [a-zA-Z0-9 \-_]{1,20})
  optional string call_sign = 4;
}

// The fields used for Satellite identification, e.g. NORAD Catalog Number,
// Name, and International Designator. Mission information is also included
// for additional characterization because not all satellites are guaranteed
// to be assigned all of these identifiers.
// uci_version: 002.002.000.001
message SatelliteIdentifierType {
  // The satellite number or, more specifically, the NORAD Catalog Number.
  // xsd type: IntPositiveType
  uint32 satellite_number = 1;
  // Indicates the known name associated with the satellite. Optional field as
  // each TLE line has a unique satellite number included.
  // xsd type: VisibleString128Type (pattern [ -~]{1,128})
  optional string satellite_name = 2;
  // Unique designation assigned by the World Data Center-A for Rockets and
  // Satellites.
  optional InternationalDesignatorType international_designator = 3;
  // Indicates the mission information associated with a satellite. May be
  // different from the common name, and a satellite may have multiple missions.
  repeated MissionInformationType mission_information = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.001.000.000
message InternationalDesignatorType {
  // Indicates a two-digit unsigned integer capable of representing the year of
  // an event, such as when an Earth-orbiting object was launched. A common
  // range is [0,99].
  uint32 year = 1;
  // Indicates the launch number of the year that the object was a part of. A
  // common range is [1,999]. This is part of the unique designation for an
  // Earth orbiting object assigned by the World Data Center-A for Rockets and
  // Satellites (WDC-A-RS).
  uint32 number = 2;
  // Identifier for the specific piece of a launch for the object. This is
  // typically an A-Z value.
  // xsd type: LaunchPieceType (pattern [A-Z]{1,3})
  string piece = 3;
}

// Describes mission information, such as name.
// uci_version: 001.000.000.000
message MissionInformationType {
  // Indicates the associated mission name e.g., EUTELSAT-3.
  // xsd type: VisibleString32Type (pattern [ -~]{1,32})
  string mission_name = 1;
  // Indicates in more detail the associated mission. Can include type and
  // generation information, e.g. Third Generation European Telecommunications
  // Satellite.
  // xsd type: VisibleString128Type (pattern [ -~]{1,128})
  optional string mission_description = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.001.001.000
message IFF_Type {
  // This element represents Mode 1 beacon reply information. See annotations in
  // child elements for details.
  optional IFF_ModeType mode1 = 1;
  // Mode 2 code. Used by the military, and traditionally is used to identify a
  // particular aircraft. See DoD AIMS 17-1000 for details.
  optional IFF_ModeType mode2 = 2;
  // Mode3A code. This code is assigned by Air Traffic Control and set in the
  // cockpit. ICAO Annex X, Volumes 3 and 4 Defines Civilian Mode 3/A.
  repeated IFF_ModeType mode3_a = 3;
  // Mode3A Lost Communication code. This code is assigned by Air Traffic
  // Control and set in the cockpit. This will be utilized by the System during
  // lost comm. ICAO Annex X, Volumes 3 and 4 Defines Civilian Mode 3/A.
  optional IFF_ModeType mode3_lc = 4;
  // This element represents military Mode 4 beacon reply information.
  optional IFF_Mode4Type mode4 = 5;
  // This element represents military Mode 5 beacon reply information.
  optional IFF_Mode5Type mode5 = 6;
  // This element represents civilian Mode S beacon reply information.
  optional IFF_ModeS_Type mode_s = 7;
  // This element represents Mode C barometric altitude reporting in 4-digit
  // octal format. ICAO Annex X, Volumes 3 and 4 Define Civilian Mode C.
  optional IFF_ModeC_Type mode_c = 8;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message IFF_ModeType {
  // This element represents an IFF code of 12 bits maximum.
  // xsd type: IFF_ModeCodeType
  uint32 code = 1;
  // Indicates whether (TRUE) or not (FALSE) the corresponding IFF mode is
  // enabled.
  bool enabled = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.001.000.000
message IFF_Mode4Type {
  // This element represents Mode 4 beacon reply information. See MIL-STD-6016
  // for detailed definition.
  optional InterrogationStatusEnum mode4_indicator = 1;
  // This element represents Mode 4 beacon reply information.
  optional IFF_Mode4CodeEnum mode4_code = 2;
}

// Indicates the status of a Mode 4 interrogation against the track in
// question.
enum InterrogationStatusEnum {
  INTERROGATION_STATUS_ENUM_UNSPECIFIED = 0;
  INTERROGATION_STATUS_ENUM_NOT_INTERROGATED = 1;
  INTERROGATION_STATUS_ENUM_INTERROGATED_NO_RESPONSE = 2;
  INTERROGATION_STATUS_ENUM_INTERROGATED_INVALID_RESPONSE = 3;
  INTERROGATION_STATUS_ENUM_INTERROGATED_VALID_RESPONSE = 4;
}

// Indicates the Mode 4 beacon reply information.
enum IFF_Mode4CodeEnum {
  IFF_MODE4_CODE_ENUM_UNSPECIFIED = 0;
  IFF_MODE4_CODE_ENUM_ON_CODE_A = 1;
  IFF_MODE4_CODE_ENUM_ON_CODE_B = 2;
  IFF_MODE4_CODE_ENUM_OFF = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.001.000.001
message IFF_Mode5Type {
  // Code for the country of origin for the platform using the GENC Standard.
  // The Geopolitical Entities, Names, and Codes (GENC) Standard is the US
  // Government-approved profile of names of countries and country subdivisions.
  CountryCodeType country_code = 1;
  // IFF Mode 5 Platform Identification Number (PIN) code.
  // xsd type: IFF_Mode5PinType
  uint32 pin = 2;
  // This element represents Mode 5 beacon reply status.
  optional InterrogationStatusEnum interrogation_status = 3;
  // Mode 1 code used in military air traffic control to determine aircraft type
  // or mission type. See DoD AIMS 17-1000 for details.
  // xsd type: IFF_ModeCodeType
  optional uint32 mode1_code = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.001.000.000
message IFF_ModeS_Type {
  // The ICAO code containing a 24-bit value used to provide a unique identity
  // for a given aircraft. This is also called the Aircraft Address. See
  // MIL-STD-6016 for detailed definition.
  // xsd type: ICAO_AircraftAddressType
  uint32 icao = 1;
  // See simple type documentation.
  // xsd type: AircraftIdentifierType (pattern [A-Z0-9 ]{8})
  string aircraft_identifier = 2;
  // Indicates whether (TRUE) or not (FALSE) the corresponding IFF mode is
  // enabled.
  bool enabled = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message IFF_ModeC_Type {
  // This element represents Mode C barometric altitude with 4 octal digits.
  // xsd type: OctalStringLength4Type (pattern [0-7]{4})
  string code = 1;
  // Indicates whether (TRUE) or not (FALSE) the corresponding IFF mode is
  // enabled.
  bool enabled = 2;
}

// Indicates an associated call sign. Multiple call signs are allowed for
// different communications systems, registries or other reasons. The use of
// ForeignKeyType is an indication that call signs aren't universally defined
// and come from multiple systems/sources but they are expected to be unique
// within the context of their source. For a call sign in UCI, the
// CallSignType.Key element indicates the call sign itself and the
// CallSignType.SystemName element indicates the system that assigned it and
// ensures it is unique. For example, a call sign that came from a Link-16
// system might have Key=Phantom01 and SystemName=Link16Voice.
// uci_version: 000.000.000.000
message CallSignType {
  // composed xsd extension base ForeignKeyType
  ForeignKeyType base = 1;
}

// Polymorphic Extension Type for defining data link identifiers for the track
// number for a specific vehicle, point, line, zone, or other object.
// Available extension types include: DiscreteDataLinkIdentifierType,
// EW_CoordinationDataLinkIdentifierType,
// EW_IndexNumberDataLinkIdentifierType, IJMS_DataLinkIdentifierType,
// Link11_DataLinkIdentifierType, Link16_DataLinkIdentifierType,
// NATO_Link1_DataLinkIdentifierType, SpecialCodeDataLinkIdentifierType.
// uci_version: 002.000.000.000
message DataLinkIdentifierPET {
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message USMTF_AircraftCallSignPairType {
  // The call sign of one or more aircraft assigned to a mission. Derived from
  // MIL-STD-6040.
  // xsd type: USMTF_AircraftCallSignType (pattern [\-\.,\(\)\?A-Z0-9 ]{1,38})
  optional string call_sign = 1;
  // Indicates the abbreviated form of the sibling CallSign element (normally
  // first and last letter and the last two numbers) of the call sign assigned
  // to the Link 16 participant. Derived from MIL-STD-6040.
  // xsd type: Link16_VoiceCallSignType (pattern [A-Z0-9 ]{4})
  optional string abbreviated_call_sign = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.000.001.001
message EOB_IdentityType {
  oneof choice {
    // Indicates the uniquely identifying information of an EOB Facility.
    EOB_FacilityIdentityType facility = 1;
    // Indicates the uniquely identifying information of EOB Equipment.
    EOB_EquipmentIdentityType equipment = 2;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message EOB_FacilityIdentityType {
  // composed xsd extension base EOB_IdentityBaseType
  EOB_IdentityBaseType base = 1;
  // Basic Encyclopedia Number, this identifies the specific location of
  // interest to an analyst. It consists of two parts: World Area Code (WAC) and
  // installation number. The installation identifier is broken into two parts.
  optional BasicEncyclopediaNumberType be_number = 2;
  // Uniquely identifies a facility or demographic area in conjunction with a
  // BE_Number.
  // xsd type: OB_O_SuffixType (pattern [A-Z]{2}[0-9]{3})
  optional string o_suffix = 3;
  // The category for this type of site.
  // xsd type: AlphanumericString6Type (pattern [a-zA-Z0-9]{1,6})
  optional string category = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 002.001.000.001
message EOB_IdentityBaseType {
  // The Facility number of a specific electronic site or its associated
  // equipment that is related to this signal.
  optional EOB_FacilityPIN_Type facility_pin = 1;
  // Name of facility or populated area.
  // xsd type: OB_FacilityNameType (pattern [a-zA-Z0-9_\-]{1,54})
  optional string facility_name = 2;
  // Indicates the source EOB's internal ID for the corresponding EOB record.
  optional ID_Type internal_id = 3;
}

// See annotations in child elements and messages/elements that use this type

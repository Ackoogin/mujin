enum OrbitQualitativeEnum {
  ORBIT_QUALITATIVE_ENUM_UNSPECIFIED = 0;
  ORBIT_QUALITATIVE_ENUM_AURORAL_REGIONS = 1;
  ORBIT_QUALITATIVE_ENUM_POLAR_REGIONS = 2;
  ORBIT_QUALITATIVE_ENUM_SUN_LIT_HEMISPHERE = 3;
}

// See annotations in child elements and messages/elements that use this type

  optional ForeignKeyType emitter_index = 4;
}

// General operational mode of a jammer signal. Based on MIL-STD-6016 DFI/DUI
// 425/003 and 426/003.
enum EA_ModeEnum {
  EA_MODE_ENUM_UNSPECIFIED = 0;
  EA_MODE_ENUM_UNKNOWN = 1;
  EA_MODE_ENUM_DISRUPTIVE = 2;
  EA_MODE_ENUM_DECEPTIVE = 3;
  EA_MODE_ENUM_IRCM = 4;
  EA_MODE_ENUM_LASER_CM = 5;
  EA_MODE_ENUM_SIDELOBE = 6;
  EA_MODE_ENUM_CHAFF = 7;
  EA_MODE_ENUM_MULTIPLE = 8;
  EA_MODE_ENUM_IFF_UNKNOWN = 9;
  EA_MODE_ENUM_IFF_DISRUPTIVE_TRANSPONDER = 10;
  EA_MODE_ENUM_IFF_DECEPTIVE_TRANSPONDER = 11;
  EA_MODE_ENUM_IFF_DISRUPTIVE_INTERROGATOR = 12;
  EA_MODE_ENUM_IFF_DECEPTIVE_INTERROGATOR = 13;
  EA_MODE_ENUM_IFF_MULTIPLE = 14;
  EA_MODE_ENUM_COMMUNICATION = 15;
  EA_MODE_ENUM_UNKNOWN_DEFENSIVE = 16;
  EA_MODE_ENUM_DISRUPTIVE_DEFENSIVE = 17;
  EA_MODE_ENUM_DECEPTIVE_DEFENSIVE = 18;
  EA_MODE_ENUM_IRCM_DEFENSIVE = 19;
  EA_MODE_ENUM_LASER_CM_DEFENSIVE = 20;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message MissileEmitterIdentityType {
  // This element represents Electronic Intelligence (ELINT) Notation (ELNOT)

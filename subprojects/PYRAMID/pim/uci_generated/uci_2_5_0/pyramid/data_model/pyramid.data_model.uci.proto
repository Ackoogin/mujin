  // xsd type: AlphanumericStringLength4Type (pattern [a-zA-Z0-9]{4})
  string world_area_code = 1;
  // Identifying agency code.
  // xsd type: RecordOriginatorType (pattern [A-Z][A-Z]|[E]|[\-])

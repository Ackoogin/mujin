// See the associated global element (message) annotation for further details.
// uci_version: 005.000.005.000
message ObservationMeasurementReportMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // Indicates the state of the internal software object that the data in the
  // message is based upon. The state of the software object is determined by
  // the publisher. The publisher could be the original/master publisher or an
  // intermediary re-publisher such as a persistence/data manager. This element
  // is not a commanded CRUD operation. It is not an indication of the state of
  // an instance of a message. It is not a mechanism for partial, incremental,
  // or fragmentary publication of a message. It is a signal from a publisher to
  // subscribers. For REMOVED state, in particular, some subscribers will mirror
  // the publisher and treat the message as if the object no longer exists, but
  // others, such as mission recorders, might not (in order to support retaining
  // historical records of activity, for example).
  optional ObjectStateEnum object_state = 2;
  // See annotations in child elements for details.
  ObservationMeasurementReportMDT message_data = 3;
}

// Indicates the state of the internal software object that the data in the
// message is based upon. The state of the software object is determined by
// the publisher. The publisher could be the original/master publisher or an
// intermediary re-publisher such as a persistence/data manager. This element
// is not a commanded CRUD operation. It is not an indication of the state of
// an instance of a message. It is not a mechanism for partial, incremental,
// or fragmentary publication of a message. It is a signal from a publisher to
// subscribers. For REMOVED state, in particular, some subscribers will mirror
// the publisher and treat the message as if the object no longer exists, but
// others, such as mission recorders, might not (in order to support retaining
// historical records of activity, for example).
enum ObjectStateEnum {
  OBJECT_STATE_ENUM_UNSPECIFIED = 0;
  OBJECT_STATE_ENUM_NEW = 1;
  OBJECT_STATE_ENUM_UPDATED = 2;
  OBJECT_STATE_ENUM_REMOVED = 3;
}

// See annotations in child elements and associated global element (message)
// for further details.
// uci_version: 005.000.005.000
message ObservationMeasurementReportMDT {
  // Indicates the unique ID assigned to the ObservationMeasurementReport.
  ObservationMeasurementReportID_Type observation_measurement_report_id = 1;
  // An observation of measurements of an object. An example of an observation
  // would be a set of measurements that are grouped with common local sensor
  // track ID.
  repeated ObservationMeasurementType observation_measurement = 2;
}

// The ID type for UCI IDs that correspond to ObservationMeasurementReport
// messages.
// uci_version: 000.000.000.000
message ObservationMeasurementReportID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 005.000.005.000
message ObservationMeasurementType {
  // Indicates the unique ID assigned to the group of measurements that are
  // associated together (e.g. local sensor track number or metric observation
  // track ID). For unassociated measurements, this field would not be populated.
  optional ObservationMeasurementID_Type observation_measurement_id = 1;
  // Indicates information about the source of the measurements.
  optional ObservationMeasurementSourceType measurement_source = 2;
  // Indicates the time of the first and last measurement of the measurement
  // observation. Indicates the time range within which all of the sibling
  // measurement data is applicable.
  optional DateTimeRangeType time_span = 3;
  // Indicates the set of measurements which are included in the Measurement
  // Observation.
  repeated MeasurementType measurements = 4;
  // Indicates a custom characteristic of the observation that is not covered by
  // other elements. These supplemental characteristics are observation
  // specific. Reference the data providers interface control document or
  // service specification to determine if this data will be provided.
  repeated NameValuePairType custom_characteristics = 5;
}

// The ID type for UCI IDs that correspond to the ID of the observation
// measurement.
// uci_version: 000.000.000.000
message ObservationMeasurementID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 005.001.004.001
message ObservationMeasurementSourceType {
  // Indicates the details such as kinematics of the source of the elements. In
  // some cases, the source may be composed of multiple, kinematically dispersed
  // elements, such as a bi-static or multi-static radar.
  repeated ElementDetailsType element_details = 1;
  // Indicates cross-referencing IDs representing the source of the measurements.
  optional MeasurementSourceIdentityType source_identity = 2;
  // Indication of the category of sensor that generated the MeasurementReport.
  optional MeasurementReportSourceTypeEnum source_type = 3;
  // Source coverage characteristics. If corresponding source coverage values
  // are fixed for all measurements use these fields, otherwise use the same
  // element within each measurement.
  optional SourceCoverageType source_coverage = 4;
  // Source angular extent characteristics. If corresponding source angular
  // extent values are fixed for all measurements use these fields, otherwise
  // use the same element within each measurement.
  optional FOV_ExtentType source_angular_extent = 5;
  // Source resolution characteristics. If corresponding source resolution
  // values are fixed for all measurements use these fields, otherwise use the
  // same element within each measurement.
  optional SourceResolutionType source_resolution = 6;
  // Source specified characteristics. See elements for specific details.
  optional SourceCharacteristicsType source_specified_characteristics = 7;
  // The number of local tracks reported by the parent MeasurementSource in the
  // corresponding ObservationMeasurement.
  optional int32 number_of_local_tracks_reported = 8;
  // The number of independent measurements reported by the parent
  // MeasurementSource in the corresponding ObservationMeasurement.
  optional int32 number_of_independent_measurements = 9;
  // This element represents the unique identifier(s) of the ProductMetadata
  // message(s) associated with the parent MeasurementSource.
  repeated ProductMetadataID_Type product_metadata_id = 10;
  // Indicates a custom source parameter that is not covered by other elements.
  // These supplemental characteristics are source sensor specific and may not
  // be relevant to all producers. Reference the data providers interface
  // control document or service specification to determine if this data will be
  // provided.
  repeated NameValuePairType custom_characteristics = 11;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 005.001.004.000
message ElementDetailsType {
  // Indicates the kinematics of the sensor source element.
  repeated SensorKinematicsChoiceType kinematics = 1;
  // If present, indicates that the sibling kinematics should be used as the
  // reference location for the relative measurements (e.g. LOS
  // Azimuth/Elevation).
  // xsd type: EmptyType (pattern [a-zA-Z]{0})
  optional string relative_measurement_reference = 2;
  // Indicates the ID of the element which is associated with the sibling
  // Kinematics.
  optional SourceKinematicsElementIdentityType source_element_identifier = 3;
  // Indicates the PulseDataID(s) which are associated with the sibling
  // Kinematics.
  repeated PulseDataID_Type pulse_data_id = 4;
  // Indicates the SignalID(s) which are associated with the sibling Kinematics.
  repeated SignalID_Type signal_id = 5;
  // Indicates whether the source element is a transmitter, receiver, or both.
  optional RF_TypeEnum rx_tx_type = 6;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 004.000.003.001
message SensorKinematicsChoiceType {
  oneof choice {
    // Indicates the kinematics of the sensor system (or geographically disperse
    // component of a sensor system) in LLA coordinates. Each sibling element
    // represents the kinematics at a different time which would be used to
    // correlate to the timestamps of the measurements. If a sensor is stationary,
    // only one element would need to be populated.
    SignalNavDataType kinematics = 1;
    // Indicates the kinematics of the sensor system (or geographically disperse
    // component of a sensor system) in space-based coordinates. Each sibling
    // element represents the kinematics at a different time that would be used to
    // correlate to the timestamps of the measurements.
    SensorKinematicsOrbitalType orbital_kinematics = 2;
    // Indicates the kinematics of the sensor system (or geographically disperse
    // component of a sensor system) in ECEF coordinates. Each sibling element
    // represents the kinematics at a different time that would be used to
    // correlate to the timestamps of the measurements.
    ECEF_SensorKinematicsType ecef_kinematics = 3;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.002.000
message SignalNavDataType {
  // Date/Time stamp of the sibling navigation data elements. Date/Time stamps
  // on individual elements of the sibling navigation data take precedence over
  // this element when they are given.
  // xsd type: DateTimeType (pattern .+Z)
  string timestamp = 1;
  // Data describing the position, velocity and orientation of the platform and
  // the associated covariance matrices.
  KinematicsFixedType platform_kinematics = 2;
  // Data describing the orientation of the sensor/antenna and the velocity
  // vector of the sensor/antenna face.
  repeated SensorKinematicsType sensor_kinematics = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.002.000
message KinematicsFixedType {
  // Indicates a geospatial kinematic position.
  KinematicsFixedPositionType position = 1;
  // A vector indicating the current or last known velocity of the Entity. Since
  // Velocity3D_Type is an extension of Velocity2D_Type, it can optionally be
  // used here. Generally, services are encouraged to send 3D velocity whenever
  // it is known.
  optional Velocity2D_Type velocity = 2;
  // Indicates the 1-sigma covariance of position and optionally velocity.
  // Position and velocity covariance are symmetric and therefore the covariance
  // values expressed here are the minimum set.
  optional PositionAndVelocityCovarianceType position_and_velocity_covariance = 3;
  // Euler Angle Sequence describing the orientation of the vehicle in the order
  // yaw, pitch, roll. The angles are given in a locally level, North-East-Down
  // coordinate system centered on the vehicle.
  optional OrientationType orientation = 4;
  // Indicates the 1-sigma covariance of orientation angle. Radian covariance is
  // symmetric and therefore the covariance values expressed here are the
  // minimum set.
  optional OrientationCovarianceType orientation_covariance = 5;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.002.000
message KinematicsFixedPositionType {
  // For moving entities, it is highly recommended that the time data be
  // populated. Generally, services are encouraged to send altitude and/or time
  // data whenever it is known.
  Point2D_Type fixed_point = 1;
  // Provides an estimate of position uncertainty.
  optional UncertaintyType uncertainty = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.000.000
message SensorKinematicsType {
  // Indicates the ID of the sensor/antenna component.
  ComponentID_Type component_id = 1;
  // Euler Angle Sequence describing the orientation of the sensor/antenna in
  // the order yaw, pitch, roll. The angles are given in a locally level,
  // North-East-Down coordinate system centered on the vehicle. For signal
  // reports, must have sufficient accuracy to show changes from pulse to pulse.
  optional OrientationType orientation = 2;
  // Euler Angle Sequence describing the error of the orientation of the
  // sensor/antenna in the order yaw, pitch, roll. The angles are given in a
  // locally level, North-East-Down coordinate system, relative to the angle of
  // sensor/antenna orientation.
  optional OrientationType orientation_sigma = 3;
  // Linear velocity vector indicating the motion of the sensor/antenna face
  // based on the sensor/antenna local body coordinate fame. This field
  // indicates the movement of the sensor/antenna face at nanosecond resolution
  // to ensure high accuracy of the measurement. Sensor/antenna face movement
  // may be based on effects such as sensor/antenna scanning, sensor/antenna
  // installation location flexing compared to the vehicle body center, vehicle
  // crabbing maneuvers, etc.
  optional BoresightVelocityType sensor_boresight_velocity = 4;
  // Indicates the sensor/antenna boresight 1-sigma velocity-velocity covariance
  // in the sensor/antenna local body coordinate system. Velocity covariance is
  // symmetric and therefore the covariance values expressed here are the
  // minimum set.
  optional VelocityVelocityCovarianceCartesianType sensor_boresight_covariance = 5;
}

// The ID type for UCI IDs that correspond to resource capabilities.
// uci_version: 000.000.000.000
message ComponentID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message BoresightVelocityType {
  // The X direction is in the plane of the sensor/antenna face in the platform
  // direction of motion. Units are meters/second.
  // xsd type: SpeedType
  double x = 1;
  // The Y direction is normal to the sensor/antenna face. The positive
  // direction is left of the platform direction of motion. Units are
  // meters/second.
  // xsd type: SpeedType
  double y = 2;
  // The Z direction is X cross Y. Units are meters/second.
  // xsd type: SpeedType
  double z = 3;
}

// Indicates the velocity-velocity covariance matrix for a Cartesian
// coordinate system. Velocity covariance is symmetric and therefore the
// covariance values expressed here are the minimum set.
// uci_version: 000.000.000.000
message VelocityVelocityCovarianceCartesianType {
  // Row 1 Column 1 term of the result matrix. X-X velocity-velocity covariance
  // with units of meters squared per second squared.
  double vx_vx = 1;
  // Row 1 Column 2 term of the result matrix. X-Y velocity-velocity covariance
  // with units of meters squared per second squared.
  double vx_vy = 2;
  // Row 1 Column 3 term of the result matrix. X-Z velocity-velocity covariance
  // with units of meters squared per second squared.
  double vx_vz = 3;
  // Row 2 Column 2 term of the result matrix. Y-Y velocity-velocity covariance
  // with units of meters squared per second squared.
  double vy_vy = 4;
  // Row 2 Column 3 term of the result matrix. Y-Z velocity-velocity covariance
  // with units of meters squared per second squared.
  double vy_vz = 5;
  // Row 3 Column 3 term of the result matrix. Z-Z velocity-velocity covariance
  // with units of meters squared per second squared.
  double vz_vz = 6;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 003.000.002.000
message SensorKinematicsOrbitalType {
  // Date/Time stamp of the sibling data elements. Date/Time stamps on
  // individual elements of the sibling data take precedence over this element
  // when they are given.
  // xsd type: DateTimeType (pattern .+Z)
  string timestamp = 1;
  // The kinematics of a space-based sensor platform. If the sibling
  // SensorRelativeAttitude element is populated, then the child Attitude
  // element describes the host platform, rather than the sensor itself.
  OrbitalKinematicsFrameChoiceType sensor_kinematics = 2;
  // Indicates the attitude of the sensor relative to its platform. Only
  // populated if the relative attitude between the sensor and its host platform
  // is known.
  optional QuaternionAttitudeType sensor_relative_attitude = 3;
}

// Provides the choice of orbital kinematics reference frames.
// uci_version: 003.000.002.000
message OrbitalKinematicsFrameChoiceType {
  oneof choice {
    // Indicates the orbital element set for the satellite.
    TLE_WithParametersType orbital_elements = 1;
    // Indicates kinematic vector or vectors in the Earth-Centered Inertial (ECI)
    // J2000 (ECI-J2K) Reference System.
    J2K_KinematicsType j2_k = 2;
    // Indicates kinematic vector or vectors in the Geocentric Celestial Reference
    // System (GCRS).
    GCRS_KinematicsType gcrs = 3;
    // Indicates kinematic vector or vectors in the Barycentric Celestial
    // Reference System (BCRS).
    BCRS_KinematicsType bcrs = 4;
  }
}

// Indicates the default or "catalog" orbital element set (also known as two
// line element or TLE) for the satellite.
// uci_version: 003.001.002.000
message TLE_WithParametersType {
  // composed xsd extension base TLE_BaseType
  TLE_BaseType base = 1;
  // Indicates the parameters for an orbital element set.
  optional OrbitalElementSetParametersType model_parameters = 2;
}

// Indicates the parameters for requesting an orbital element set. This
// information includes the time at which the element set is created and the
// orbital model used.
// uci_version: 001.000.001.000
message OrbitalElementSetParametersType {
  // Indicates the time at which the orbital element set was created.
  // xsd type: DateTimeType (pattern .+Z)
  string creation_time = 1;
  // Indicates the orbital model used to create the element set.
  optional OrbitalModelType orbital_model = 2;
}

// Indicates the orbital model used to create the ephemeris.
// uci_version: 001.000.001.000
message OrbitalModelType {
  // The name of the orbital model.
  OrbitalModelNameEnum name = 1;
  // This field should contain the version number (i.e. 1.2.2).
  // xsd type: VisibleString32Type (pattern [ -~]{1,32})
  string version = 2;
}

// Indicates orbital model propagators that are used for predicting satellite
// position and velocity.
enum OrbitalModelNameEnum {
  ORBITAL_MODEL_NAME_ENUM_UNSPECIFIED = 0;
  ORBITAL_MODEL_NAME_ENUM_SGP4 = 1;
  ORBITAL_MODEL_NAME_ENUM_SGP4DC = 2;
  ORBITAL_MODEL_NAME_ENUM_GPS = 3;
  ORBITAL_MODEL_NAME_ENUM_SPDC = 4;
  ORBITAL_MODEL_NAME_ENUM_HPOP = 5;
  ORBITAL_MODEL_NAME_ENUM_SPICE = 6;
  ORBITAL_MODEL_NAME_ENUM_SP3 = 7;
  ORBITAL_MODEL_NAME_ENUM_ELEVEN_PARAMETER = 8;
  ORBITAL_MODEL_NAME_ENUM_LOP = 9;

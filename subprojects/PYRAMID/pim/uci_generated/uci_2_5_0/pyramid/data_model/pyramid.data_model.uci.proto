// uci_version: 002.000.002.001
message InertialStateType {
  // Physical location of the referenced item in geospatial coordinates. The use
  // of the timestamp in this context represents the time the positional data
  // was last measured.
  Point4D_Type position = 1;
  // Uncertainty of the physical location of the referenced item.
  optional UncertaintyType position_uncertainty = 2;
  // Vehicle's velocity in the current operating domain of the system. Air
  // vehicle components are in True Air Speed.
  optional Velocity3D_Type domain_velocity = 3;
  // Representation of the vehicle's ground velocity as directional speed
  // components.
  optional Velocity2D_Type ground_velocity = 4;
  // The vehicle's acceleration in the current operating domain of the system.
  optional Acceleration3D_Type domain_acceleration = 5;
  // Euler Angle Sequence describing the orientation of the vehicle in the order
  // yaw, pitch, roll. The angles are given in a locally level, North-East-Down
  // coordinate system centered on the vehicle.
  optional OrientationType orientation = 6;
  // Euler Angle Sequence describing the rate of orientation change of the
  // vehicle in the order yaw, pitch, roll. The angles are given in a locally
  // level, North-East-Down coordinate system centered on the vehicle.
  optional OrientationRateType orientation_rate = 7;
  // The level of geodetic position uncertainty as estimated by the unit
  // reporting its position via Link 16, where higher number indicates lower
  // uncertainty and better quality. Values range from 0 to 15. (Based on
  // MIL-STD-6016 DFI: 283 DUI: 001).
  // xsd type: Link16_PositionQualityType
  optional uint32 link16_position_quality = 8;
}

// This type represents positional data. The latitude and longitude, relative
// to the WGS-84 ellipsoid, are mandatory entries along with altitude and
// time. If AltitudeReference is not specified, altitude is the WGS-84 height
// above the ellipsoid.
// uci_version: 001.001.002.002
message Point4D_Type {
  // Geospatial latitude measured in radians.
  // xsd type: AngleHalfType
  double latitude = 1;
  // Geospatial longitude measured in radians.
  // xsd type: AngleType
  double longitude = 2;
  // Height measured in meters using the reference specified by the
  // AltitudeReference field. If AltitudeReference is not specified, then the
  // reference is to be taken as WGS-84 ellipsoid.
  // xsd type: AltitudeType
  double altitude = 3;
  // Reference to altitude measurement source.
  optional AltitudeReferenceEnum altitude_reference = 4;
  // Indicates the time when the positional data was measured or last known to
  // be correct. The element can also indicate the time at which a future
  // position of a System, Entity, etc. will be achieved.
  // xsd type: DateTimeType (pattern .+Z)
  string timestamp = 5;
  // Expresses source PPLI depth by description of horizontal planes at or below
  // Mean Sea Level (MSL)
  optional Link16_DepthEnum depth_category = 6;
  // Difference in meters between the MSL and HAE altitudes of an object. MSL +
  // HAE_Adjustment = HAE, per MIL-STD-6016.
  // xsd type: DistanceOffsetType
  optional double hae_adjustment = 7;
}

// Expresses depth by description of horizontal planes at or below Mean Sea
// Level (MSL).
enum Link16_DepthEnum {
  LINK16_DEPTH_ENUM_UNSPECIFIED = 0;
  LINK16_DEPTH_ENUM_NO_STATEMENT = 1;
  LINK16_DEPTH_ENUM_SURFACED = 2;
  LINK16_DEPTH_ENUM_ESTIMATED_SHALLOW = 3;
  LINK16_DEPTH_ENUM_PERISCOPE_DEPTH = 4;
  LINK16_DEPTH_ENUM_ABOVE_FIRST_LAYER = 5;
  LINK16_DEPTH_ENUM_BELOW_FIRST_LAYER = 6;
  LINK16_DEPTH_ENUM_BETWEEN_FIRST_AND_SECOND_LAYERS = 7;
  LINK16_DEPTH_ENUM_BETWEEN_SECOND_AND_THIRD_LAYERS = 8;
  LINK16_DEPTH_ENUM_BELOW_BOTTOM_LAYER = 9;
  LINK16_DEPTH_ENUM_ESTIMATED_DEEP = 10;
  LINK16_DEPTH_ENUM_BOTTOMED = 11;
  LINK16_DEPTH_ENUM_UNDEFINED = 12;
  LINK16_DEPTH_ENUM_UNKNOWN = 13;
}


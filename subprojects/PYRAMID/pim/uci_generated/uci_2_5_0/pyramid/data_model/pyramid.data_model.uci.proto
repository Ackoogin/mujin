  // kinematic representations in sibling MeasurementData take precedence over
  // this element when they are given.
  // xsd type: DateTimeType (pattern .+Z)
  string timestamp = 4;
  // Indicates which measurements correspond to same object(s) (multipath
  // processing).
  repeated MeasurementGroupID_Type measurement_group_id = 5;
  // Indicates local track identifier which measurements correspond to same
  // object.
  optional ForeignKeyType local_track_identifier = 6;
  // Indicates an EntityID that's associated with the Observation Measurement.
  optional EntityID_Type entity_id = 7;
  // This element represents the unique identifier(s) of the PulseData
  // message(s) associated with the sibling MeasurementID.
  repeated PulseDataID_Type pulse_data_id = 8;
  // This element represents the unique identifier(s) associated with the
  // sibling MeasurementID.
  repeated SignalID_Type signal_id = 9;
  // Indicates the identity and confidence of the object being measured.
  optional IdentityConfidenceType object_identity = 10;
  // Indicates kinematic data about the object known/predicted prior to
  // collecting the measurements.
  optional ObjectKinematicsChoiceType predicted_object_kinematics = 11;
  // Indicates the characteristics associated with the measurement.
  optional MeasurementCharacteristicsType measurement_characteristics = 12;
  // Indicates the measurement kinematics data with a choice of how its
  // represented. If this does not exist, it indicates that no measurement was
  // made with respect to the object identifying sibling elements (e.g.,
  // EntityID, local track identifier, etc.).

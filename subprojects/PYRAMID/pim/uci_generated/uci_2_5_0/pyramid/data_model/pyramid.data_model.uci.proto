// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 005.000.003.002
message MeasurementCharacteristicsType {
  // Indicates whether the measurement is the result of passive or active
  // sensing.
  optional PassiveActiveEnum passive_active_indicator = 1;
  // Indicates the duration of the measurement collection.
  optional MeasurementDurationType measurement_duration = 2;
  // Indicator for multipath path of measurement.

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 005.000.005.000
message AssetFilterType {
  // Indicates a filter on characteristics of a System asset. The asset filter
  // is satisfied if a match is found in this element OR the sibling Entity
  // element.
  optional SystemFilterType system = 1;
  // Indicates a filter on characteristics of an Entity asset. The asset filter
  // is satisfied if a match is found in this element OR the sibling System
  // element.
  optional EntityFilterType entity = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 005.001.005.000
message SystemFilterType {
  // This element indicates a System filter requiring a variable logical
  // comparator test between a value in a System-associated message and the
  // value given here. Multiple instances are logically ANDed.
  repeated SystemComparativeType characteristics = 1;
  // Indicates a specific SystemID that is required to match the filter. If
  // omitted, any SystemID satisfies the filter. Multiple instances are
  // logically ORed.
  repeated SystemID_Type system_id = 2;
  // Indicates a zone the System must fall within to satisfy the clause.
  // Multiple instances are logically ORed.
  repeated GeoFiltersQueryType geo_filter = 3;
  // Indicates a zone the System must fall within to satisfy the clause.
  // Multiple instances are logically ORed.
  repeated OrbitalFiltersQueryType orbital_filter = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 005.000.005.000
message SystemComparativeType {
  // Indicates a characteristic/element value to be used to compare to the
  // corresponding value in a System related message.
  SystemCharacteristicType characteristic = 1;
  // Indicates the logical comparator to use when comparing the target (Entity
  // or related message) Characteristic to the Response Characteristic. The

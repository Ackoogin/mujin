// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.001.000.000
message RCS_MedianType {
  // The measured value of RCS in dBsm (decibels per square meters).
  // xsd type: DoubleNonNegativeType
  double rcs_value = 1;
  // The variance of the reported measurement value (decibels per meters to the
  // fourth).
  // xsd type: DoubleNonNegativeType
  double rcs_variance = 2;
  // The spectral width of an object, measured in Hertz, produced a result of
  // performing coherent integration. This information can help determine if an
  // object is stable or tumbling which is often useful to distinguish a rocket
  // body from an active stabilized payload or to deduce the rotational period
  // of slowly tumbling objects at GEO. A null value implies this information is
  // not available as it was not produced by the sensor source. This measurement
  // can only be expected for radars that use long coherent processing intervals.
  // xsd type: FrequencyType
  optional double spectral_width = 3;
  // The polarization of the received electromagnetic waves.
  PolarizationEnum receiver_polarization = 4;
  // The polarization of the transmitted electromagnetic waves.
  optional PolarizationEnum transmitter_polarization = 5;
}

// Indicates the polarization of electromagnetic waves.
enum PolarizationEnum {
  POLARIZATION_ENUM_UNSPECIFIED = 0;

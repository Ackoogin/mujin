// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 005.004.005.003
message RequirementConstraintsType {
  // composed xsd extension base RequirementConstraintsBaseType
  RequirementConstraintsBaseType base = 1;
  // Indicates the minimum and/or maximum allowed classification level of the
  // networks that the allocated system can disseminate products or files to for
  // this task. The allocated system must have a dissemination route for data at
  // this constrained classification level. For example, when trying to collect
  // data to hand-off to a system or network, the allocated system has to be
  // able to generate products or files at no higher than the specified maximum
  // level and have the authority to disseminate on a network at no higher than
  // the specified maximum classification level and no lower than the minimum
  // classification level.
  optional DataProductOrFileClassificationLevelType product_or_file_dissemination_classification_level = 2;
  // Indicates a constraint in the form of an analytic measure that the
  // Requirement must satisfy when planned/executed.
  optional AnalyticConstraintsType analytic = 3;
  // Indicates a constraint on the highest acceptable classification level at
  // which the Response can be planned and executed.
  optional SecurityInformationType acceptable_classification_level = 4;
  // If present, indicates communications are required when executing the
  // Requirement. In this context, "required" means the creator or a Requirement
  // considers communications as necessary for C2 and/or Product dissemination
  // related to this Requirement, independent of the type of vehicle that it is
  // allocated to. This element may result in consideration of communications
  // allocations during Requirement allocation.
  // xsd type: EmptyType (pattern [a-zA-Z]{0})
  optional string comms_required = 5;
  // Indicates other types of Requirements that can be decomposed from, used to
  // plan, used to implement, inherited from traced parents or otherwise
  // associated with the subject Requirement.
  optional RequirementTaxonomyType allowed_requirement_types = 6;
  // Indicates other types of Requirements that cannot be decomposed from, used
  // to plan, used to implement, inherited from traced parents or otherwise be
  // associated with the subject Requirement.
  optional RequirementTaxonomyType excluded_requirement_types = 7;
  // Indicates an allowed domain/environment which the Requirement can be
  // employed from and and allowed "target" domain/environment. See enumerated
  // type annotations for further details. List size for this element is based
  // on "Select All That Apply" condition.
  repeated EnvironmentPairingEnum allowed_domain_pairing = 8;
  // Indicates an excluded domain/environment which the Requirement can't be
  // employed from an excluded "target" domain/environment. See enumerated type
  // annotations for further details. List size for this element is based on
  // "Select All That Apply" condition.
  repeated EnvironmentPairingEnum excluded_domain_pairing = 9;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.001.001
message RequirementConstraintsBaseType {
  // Indicates a constraint in the form of the Rank of the associated
  // Requirement (Effect, Action, Task, [Capability]Command or Response).
  optional ComparableRankingType rank = 1;
  // Indicates whether a) an in-work/planned item or items of a lower rank
  // should be interrupted/replanned in order to address this item (TRUE) or b)
  // this item should be simply queued/planned according to rank without
  // interrupting in-work/planned items (FALSE). For example, a Task being added
  // to an existing TaskPlan (TaskPlanCommand constrained by an existing
  // TaskPlan) would potentially cause unlocked Tasks of lower rank in the
  // existing TaskPlan to be unallocated if 1) this element indicated TRUE and
  // 2) the lower ranked Tasks prevented the higher ranked Task from being
  // allocated.
  optional bool interrupt_lower_rank = 2;
  // Indicates allocation related constraints which can vary by Requirement at
  // the discretion of the creator.
  optional RequirementAllocationParametersType allocation = 3;
  // Indicates a temporal constraint on the Requirement. Allows for defining for
  // each timing type (RequirementTimingEnum).
  repeated RequirementTimingType timing = 4;
  // Indicates an area-based constraint on the kinematic position for an actor
  // associated with the Requirement. When more than one is given they are
  // logically ANDed. This element can be used in many ways. For example, if the
  // associated Requirement has "by instance" actors that can move, this element
  // can be used as a rule of engagement to be evaluated at planning, approval
  // and execution time. In another example, if the associated Requirement has
  // "by type" actors this element can be used to instantiate the Requirement on
  // actors the match the type and satisfy the kinematic constraint.
  repeated RequirementKinematicConstraintsType kinematic = 5;
  // Indicates a constraint on the kinematic path for an actor associated with
  // the Requirement. This element can be used when kinematic constraints are
  // more prescriptive than supported by the sibling KinematicPosition element.
  // When more than one is given they are logically ANDed. Note that the
  // kinematics specified here are intentionally different than those in Flight
  // and OrbitChange Tasks. To give a kinematic constraint as described in those
  // Tasks, create a Task of those types and create a START_TO_START dependency
  // between it and Requirement to be constrained.
  repeated RequirementKinematicPathConstraintType kinematic_path = 6;
  // Indicates a relative kinematic constraint between objects associated with
  // the Requirement.
  repeated RelativeKinematicConstraintType relative_kinematic = 7;
  // Indicates orbital kinematic constraints. When more than one is given they
  // are logically ANDed.
  repeated OrbitalKinematicConstraintType orbital_kinematic = 8;
  // Indicates the unique ID of an existing RequirementOption that constrains
  // the Requirement. The RequirementOption could be for for the Requirement
  // that was "chosen" and therefore constrains the Requirement.
  repeated RequirementAllocationWindowID_Type option_id = 9;
  // Indicates the unique ID of an existing *Plan or portion of a *Plan that
  // constrains the Requirement.
  repeated ConstrainingPlansRequirementType plan = 10;
  // Indicates a constraint in the form of a temporal dependency between
  // Requirements; between Effect, Action, Task, [Capability]Command or Commands
  // or Response. If more than one is given, they are logically ANDed. For
  // example, a pre-strike image collection (PO Task) might be required several
  // minutes prior to a strike (Strike Task) to determine combat ID and target
  // coordinates. A post-strike image collection (PO Task) might be required
  // several minutes after the strike to inform battle damage assessment. The
  // dependency between the three Tasks can be established with this element.
  // Assuming the Strike Task is the most difficult to plan/coordinate, the
  // other two Tasks would likely each have dependencies on the Strike Task in
  // order to orchestrate the desired "look-shoot-look" sequence.
  repeated RequirementDependencyType dependency = 11;
  // Free-text explanation of sibling constraints, additional extraordinary
  // constraints, etc.
  // xsd type: VisibleString1024Type (pattern [ -~]{1,1024})
  optional string constraints_narrative = 12;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 005.000.005.000
message RequirementAllocationParametersType {
  // Indicates the System that the Requirement (Effect, Action, Task,
  // [Capability]Command, Response) MUST be allocated to during the allocation
  // process. The System can be explicit or implied by Identity, hosted
  // Capability, or Package membership. If multiple child elements are given: 1)
  // allocation to any one of the associated Systems is the minimum expectation,
  // 2) decomposition of the Requirement into multiple child Requirements
  // allocated across the associated Systems is acceptable, 3) there is no
  // expectation that each associated System must perform the Requirement. This
  // element allows the Requirement creator to force an allocation to a specific
  // System at the risk of 1) a less than optimal overall solution or 2) failure
  // of the Requirement being allocated despite availability of another suitable
  // System.
  optional RequirementAllocationConstraintType required_allocation = 1;
  // Indicates the System that the Requirement (Effect, Action, Task,
  // [Capability]Command, Response) SHOULD be allocated to during the allocation
  // process. The System can be explicit or implied by Identity, hosted
  // Capability, or Package membership. If multiple child elements are given: 1)
  // allocation to any one of the associated Systems is the minimum expectation,
  // 2) decomposition of the Requirement into multiple child Requirements
  // allocated across the associated Systems is acceptable, 3) there is no
  // expectation that each associated System must perform the Requirement. This
  // element allows the Requirement creator to suggest an allocation to a
  // specific System at the risk of 1) a less than optimal overall solution or
  // 2) failure of the Requirement being allocated despite availability of
  // another suitable System.
  optional RequirementAllocationConstraintType preferred_allocation = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 005.000.005.001
message RequirementAllocationConstraintType {
  // Indicates the SystemID of the System that is the target of the allocation
  // constraint.
  repeated SystemID_Type system_id = 1;
  // Indicates a kind/type or instance of platform/system that is the target of
  // the allocation constraint. For example, this element could be used to
  // allocate a Requirement to any fighter aircraft platform, or a specific kind
  // of fighter aircraft, or a specific tail number of aircraft, or an aircraft
  // with an aircrew member with a certain voice call sign.
  repeated IdentityType identity = 2;
  // Indicates the CapabilityID of the Capability that is the target of the
  // allocation constraint. If multiple required Capabilities are given: 1)
  // allocation to any one of the Capabilities is the minimum expectation, 2)
  // decomposition of the Requirement into multiple child Requirements allocated
  // across the multiple required Capabilities is acceptable, 3) there is no
  // expectation that each Capability must perform the Requirement.
  repeated CapabilityID_Type capability_id = 3;
  // Indicates the PackageID of the Package that is the target of the allocation
  // constraint.
  repeated PackageID_Type package_id = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 005.001.005.000
message IdentityType {
  // Indicates the "standard identity" of the asset.
  optional StandardIdentityType standard = 1;
  // Indicates the "environment identity" or "domain" in which the asset
  // operates. Derived from MIL-STD-6016; see MIL-STD-6016 DFI/DUI 275/004 for
  // additional details. Each environment has a corresponding set of specific
  // types.
  optional EnvironmentIdentityType environment = 2;
  // Indicates the "platform identity" of the asset.
  optional PlatformIdentityType platform = 3;
  // Indicates a "specific identity" of the asset.
  optional SpecificIdentityType specific = 4;
  // Indicates an emitter type that has been identified in association with the
  // asset.
  repeated EmitterIdentityType emitter = 5;
  // Indicates a specific emitter type ***instance*** that has been identified
  // in association with the asset. Specific Emitter Identification (SEI)
  // technology passively measures emitters, and characterizes unique emitter
  // signatures that can be used for friendly or enemy emitter identification
  // and fingerprinting. A SEI and this SpecificEmitter element refer to a
  // specific physical instance of a type of emitter as given in the sibling
  // EmitterType element.
  repeated SpecificEmitterIdentityType specific_emitter = 6;
  // Indicates the specific, generally blue force, facility ***instance*** that
  // has been identified in association with the asset.
  optional FacilityIdentificationType specific_facility = 7;
  // Indicates the specific, generally blue force, vehicle ***instance*** that
  // has been identified in association with the asset.
  optional VehicleIdentificationType specific_vehicle = 8;
  // Indicates the identity of the asset in the taxonomy/nomenclature of the
  // Electronic Order of Battle (EOB).
  optional EOB_IdentityType eob = 9;
  // Indicates a type of weapon available. This element represents the
  // MIL-STD-6016 specific type of the store. See MIL-STD-6016 for details; this
  // schema will not redefine the enumerations. It is left to applications using
  // this schema to enforce compatibility with MIL-STD-6016.
  optional StoreType weapon = 10;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.001.000.000
message StandardIdentityType {
  // Indicates the "standard identity" of the Entity. Derived from MIL-STD-6016;
  // see MIL-STD-6016 DFI/DUI 376/007 for additional details.
  StandardIdentityEnum standard_identity = 1;
  // DOD standard country code designator to which an entity owes its allegiance.
  optional CountryCodeType allegiance = 2;
}

// Indicates the standard identity of a track.
enum StandardIdentityEnum {
  STANDARD_IDENTITY_ENUM_UNSPECIFIED = 0;
  STANDARD_IDENTITY_ENUM_PENDING = 1;
  STANDARD_IDENTITY_ENUM_UNKNOWN = 2;
  STANDARD_IDENTITY_ENUM_ASSUMED_FRIEND = 3;
  STANDARD_IDENTITY_ENUM_FRIEND = 4;
  STANDARD_IDENTITY_ENUM_NEUTRAL = 5;
  STANDARD_IDENTITY_ENUM_SUSPECT = 6;
  STANDARD_IDENTITY_ENUM_HOSTILE = 7;
  STANDARD_IDENTITY_ENUM_UNDEFINED = 8;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message CountryCodeType {
  oneof choice {
    // Indicates the actual Country name from the GENC Standard. It is important
    // to note that FIPS PUB 10-4 and GEC are not explicitly supported; there will
    // be no Country names that conform to either FIPS PUB 10-4 or GEC legacy
    // standards.
    GENC_CountryNameEnum country_name = 1;
    // Indicates a name for an affiliated asset reported by the Operator(s) that
    // is outside the scope of the GENC Standard.
    OperatorUniqueNameEnum operator_unique_asset_name = 2;
  }
}


  string modulation_parameter_index = 1;
  // Indicates the data element of the index/value pair.
  // xsd type: VisibleString64Type (pattern [ -~]{1,64})
  string modulation_parameter_value = 2;
}

// Indicates the urgency of the Entity. See enumeration annotations for

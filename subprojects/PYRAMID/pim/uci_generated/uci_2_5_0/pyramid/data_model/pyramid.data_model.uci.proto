  // Indicates the kinematics to be used as a reference location for the sibling
  // values. If omitted, the SourceKinematics in the ancestor Source element
  // should be used as the reference location.
  optional SensorKinematicsChoiceType reference_kinematics = 14;
  // This element indicates the simulated target's truth data. This element can
  // only be used if the MessageHeader.Mode is not LIVE.
  optional int64 simulation_target_number = 15;
}


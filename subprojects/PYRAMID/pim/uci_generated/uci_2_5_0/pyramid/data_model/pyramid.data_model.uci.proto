  // composed xsd extension base ForeignKeyType
  ForeignKeyType base = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message StoreType {
  // Indicates the "store type" or weapon type. Derived from MIL-STD-6016; For
  // StoreCategory=AIR use DFI=1623 DUI=001. For SEA_SURFACE use DFI= 399
  // DUI=004. For SEA_SURFACE_SAMSSM use DFI=1622 DUI=001. For SEA_SUBSURFACE
  // use DFI=399 DUI=004. For GROUND use DFI=399 DUI=004. For GUN StoreType
  // indicates that there is a gun present. This schema will not redefine the
  // enumerations. It is left to applications using this schema to enforce
  // compatibility with MIL-STD-6016.
  uint32 store_type = 1;
  // Indicates which MIL-STD-6016 enumeration should be used to interpret the
  // StoreType field.
  StoreCategoryEnum store_category = 2;
  // Variant is used to declare a specific sub-type of the weapon called out in
  // the StoreType element. The MIL-STD-6016 weapon type list does not include
  // all possible differences in warhead fusing, store configuration, and other
  // small details. This field allows an option addition of information to cover
  // this gap.
  optional ForeignKeyType store_type_variant = 3;
}

// Indicates which MIL-STD-6016 enumeration should be used to interpret the
// StoreType field.
enum StoreCategoryEnum {
  STORE_CATEGORY_ENUM_UNSPECIFIED = 0;
  STORE_CATEGORY_ENUM_AIR = 1;
  STORE_CATEGORY_ENUM_SEA_SURFACE = 2;
  STORE_CATEGORY_ENUM_SEA_SURFACE_SAMSSM = 3;
  STORE_CATEGORY_ENUM_SEA_SUBSURFACE = 4;
  STORE_CATEGORY_ENUM_GROUND = 5;
  STORE_CATEGORY_ENUM_GUN = 6;
}

// The ID type for UCI IDs that correspond to Packages.
// uci_version: 000.000.000.000
message PackageID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 005.000.003.000
message RequirementTimingType {
  // Indicates the type of timing constraint or status.
  RequirementTimingEnum timing_type = 1;
  // Indicates timing, of the type indicated by the sibling TimingType element,
  // for the Requirement.
  repeated TimingConstraintsType timing = 2;
}

// Indicates types of temporal/timing constraints for Requirements (Effect,
// Action, Task, etc.).
enum RequirementTimingEnum {
  REQUIREMENT_TIMING_ENUM_UNSPECIFIED = 0;
  REQUIREMENT_TIMING_ENUM_PLANNING_INITIATE = 1;
  REQUIREMENT_TIMING_ENUM_PLANNING_COMPLETE = 2;
  REQUIREMENT_TIMING_ENUM_EXECUTION = 3;
  REQUIREMENT_TIMING_ENUM_PRE_EXECUTION_SET_UP = 4;
  REQUIREMENT_TIMING_ENUM_RECONSTITUTION = 5;
  REQUIREMENT_TIMING_ENUM_RESULT = 6;
  REQUIREMENT_TIMING_ENUM_DISSEMINATION = 7;
  REQUIREMENT_TIMING_ENUM_UPLINK = 8;
  REQUIREMENT_TIMING_ENUM_DOWNLINK = 9;
}

// Provides a choice of timing constraints including repetitive timing and
// event based repetition.
// uci_version: 005.000.002.000
message TimingConstraintsType {
  oneof choice {
    // Indicates that the timing should be As Soon As Possible.
    // xsd type: EmptyType (pattern [a-zA-Z]{0})
    string as_soon_as_possible = 1;
    // Indicates the time window during which the Requirement should be initiated
    // and, once initiated, the duration.
    TimeWindowType time_window = 2;
    // Indicates a recurring time. For example, a recurring time as a constraint
    // on a Task may result in the need for a Task or other Requirement to be
    // broken down into multiple discrete children corresponding to each interval.
    WeekdayIntervalType weekday_interval = 3;
    // Indicates a repetition and defines the number and frequency of product
    // collection and generation such as start/stop/frequency or min # of
    // collections.
    RepetitionConstraintsType repetitive = 4;
  }
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message TimeWindowType {
  // Indicates the begin and end times for the time window.
  optional DateTimeRangeType range = 1;
  // Indicates the duration or active/execution time for the time window.
  // xsd type: DurationType
  optional string duration = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message WeekdayIntervalType {
  // Indicates the period of time during which the weekday interval is valid. In
  // other words, this sets the number of weeks/months during which the
  // WeekdayInterval is active.
  DateTimeRangeType time_span = 1;
  // Indicates the days of the week in which the interval is valid. List size
  // for this element is based on "Select All That Apply" condition.
  repeated WeekdayEnum weekday = 2;
  // Indicates the number of weeks between occurrences. 1 = weekly, 2 = every
  // other week, etc.
  uint32 weekly_interval_period = 3;
  // Indicates the time of day, on a day given by the Weekday element, at which
  // the interval starts.
  // xsd type: TimeType (pattern .+Z)
  optional string start_time = 4;
  // Indicates the duration of each occurrence.
  // xsd type: DurationType
  optional string duration = 5;
}

// An enumeration indicating the day of the week.
enum WeekdayEnum {
  WEEKDAY_ENUM_UNSPECIFIED = 0;
  WEEKDAY_ENUM_SUNDAY = 1;
  WEEKDAY_ENUM_MONDAY = 2;
  WEEKDAY_ENUM_TUESDAY = 3;
  WEEKDAY_ENUM_WEDNESDAY = 4;
  WEEKDAY_ENUM_THURSDAY = 5;
  WEEKDAY_ENUM_FRIDAY = 6;
  WEEKDAY_ENUM_SATURDAY = 7;
}

// Indicates the Time Window and the Repetition which can be Time-Based or
// Event-Based.
// uci_version: 005.000.002.000
message RepetitionConstraintsType {
  // Indicates the nature of the repetitions.
  RepetitionType repetition = 1;
  // The time window for which the sibling Repetition applies.
  optional TimeWindowType time_window = 2;
}

// Provides a choice between Time-Based and Event-Based Repetition.
// uci_version: 005.000.002.000
message RepetitionType {
  oneof choice {
    // Indicates when the Requirement should be repeated on a Time basis.
    RepetitionTimeBasedType time_based = 1;
    // Since it may be difficult to predict the exact time of an event, this
    // element allows for the same input to be used in planning as the cycle moves
    // from week-ahead planning to day-ahead planning.
    RepetitionEventBasedType event_based = 2;
  }
}

// Represents a Time-Based repetition.
// uci_version: 000.000.000.000
message RepetitionTimeBasedType {
  oneof choice {
    // Indicates the Requirement should be done continuously, within other
    // temporal constraints of the Requirement. This element is oriented towards
    // Capabilities that are continuous in nature and interruptible. This element
    // generally shouldn't be used for Capabilities that are discrete and/or
    // single shot in nature with a physics- and/or design-driven duration.
    RepetitionContinuousType continuous = 1;
    // Indicates the Requirement should be repeated a specific number of times
    // within the overall temporal constraints of the Requirement. This element is
    // oriented towards capabilities that are discrete and/or single shot in
    // nature.
    RepetitionFiniteType finite = 2;
    // Indicates the Requirement should be repeated periodically within the
    // overall temporal constraints of the Requirement. Depending on perspective
    // and/or Capability type, this element indicates the time duration between
    // starts of successive repetitions of the Requirement, time between revisits
    // to a target or area in a search volume or other meanings. A periodic
    // command with no end time continues until canceled. This element is oriented
    // towards Capabilities that are discrete and/or single shot in nature.
    RepetitionPeriodicType periodic = 3;
  }
}

// Indicates a Continuous Repetition with an optional maximum interrupt
// duration.
// uci_version: 000.000.000.000
message RepetitionContinuousType {
  // Indicates the maximum acceptable duration of interrupts in output products
  // during the "active" time for the Requirement. Formerly known as
  // MaxContiguousDropoutAllowed. If omitted, maximum interrupt duration is left
  // to the discretion of the recipient.
  // xsd type: DurationType
  optional string maximum_interrupt_duration = 1;
}

// Indicates a finite repetition type with a set number of repetition attempts
// and an optional interval.
// uci_version: 000.000.000.000
message RepetitionFiniteType {
  // Indicates the number of times the Requirement should be repeated before
  // being considered complete. This element can be used, for example, to
  // perform just a single scan of an area or to limit the number of attempts to
  // acquire a cue.
  uint32 repetition_attempts = 1;
  // Indicates the duration between repetitions of the Requirement. If omitted
  // the interval is left to the discretion of the recipient within other
  // overall temporal constraints.
  // xsd type: DurationType
  optional string repetition_interval = 2;
}

// Indicates a periodic repetition with a specified interval.
// uci_version: 000.000.000.000
message RepetitionPeriodicType {
  // Indicates the duration between repetitions of the Requirement.
  // xsd type: DurationType
  string repetition_interval = 1;
}

// Provides a set of elements to describe an event-based repetition.
// uci_version: 005.000.002.000
message RepetitionEventBasedType {
  // Indicates the event upon which the repetitions should be based.
  RepetitionEventType event = 1;
  // This is optionally used to offset the location/time of the sibling
  // EventWindow that is in reference to the Event. This Offset defines the
  // center of the sibling EventWindow.
  optional EventOffsetChoiceType event_offset = 2;
  // The desired window around the specified Event combined with any specified
  // EventOffset. The value is intended as +/- around the specified Event as
  // adjusted by any offset defined by the sibling EventOffset field. For
  // example: to specify a collection window of 100 seconds after Engine Cutoff,
  // one would specify an EventOffset of +50 seconds and an EventWindow of 50
  // seconds.
  optional EventWindowChoiceType event_window = 3;
  // If this option is populated schedule the repetition times based on the
  // Event of this object rather than the object in the Requirement.
  optional ReferenceAssetKinematicsType alternate_reference_object = 4;
  // Indicates the number of times the sibling Event element should trigger
  // repetition of the Requirement.
  uint32 repetition_attempts = 5;
}

// Provides a choice between event types to act as a trigger for an
// event-based repetition.
// uci_version: 002.000.000.000
message RepetitionEventType {
  oneof choice {
    // PositionChange is a way to specify a time based on an object change in
    // position.
    RepetitionPositionChangeType position_change = 1;
    // RouteEvent is a way to specify a time based on when the system/asset
    // reaches a specific event in the life cycle of the route.
    RouteEventEnum route_event = 2;
    // OrbitalEvent is a way to specify a time based on when a space object
    // reaches a specific point in orbit or in life cycle.
    OrbitalEventEnum orbital_event = 3;
  }
}

// Provides a choice of position delta types.
// uci_version: 002.000.000.000
message RepetitionPositionChangeType {
  oneof choice {
    // Indicates the change in LOS from commanded System to target, which triggers
    // repetition of the Requirement.
    LOS_Type los_bearing_elevation = 1;
    // Indicates the change in LOS from commanded System to target, which triggers
    // repetition of the Requirement.
    LOS_InertialA_Type los_az_el = 2;
    // Indicates the change in orbital RTN kinematics from the commanded System to
    // target, which triggers repetition of the Requirement.
    ThresholdOffOrbitTriggerDataType orbital_rtn = 3;
  }
}

// This type describes the line of sight (LOS) between two points.
// uci_version: 001.000.000.000
message LOS_Type {
  // Indicates the line-of-sight distance between two points.
  // xsd type: DistanceType
  optional double slant_range = 1;
  // Indicates the angle from true north to target point measured from a
  // reference point to a second point.
  // xsd type: AnglePositiveType
  optional double bearing = 2;
  // Indicates the angle between a level plane in the global frame and the line
  // between the two points. Angles above the plane are positive.
  // xsd type: AngleType
  optional double elevation = 3;
}

// Defines a line of sight ray in a world inertial frame of reference.
// uci_version: 001.000.000.000
message LOS_InertialA_Type {
  // Indicates the azimuth from an observation point to a point of interest.
  // Azimuth is defined as the angle between two lines in a global horizontal
  // plane at the observation point. The first line is from the observation
  // point to true north. The second line is from the observation point to the
  // point of interest projected onto the global horizontal plane. An azimuth of
  // zero indicates true north with values increasing clockwise. The terms
  // azimuth and bearing are often used interchangeably but they are technically
  // different. Azimuth values are angles between 0 and 2*Pi radians (0 and 360
  // degrees) relative to north, in this case true north. Bearing values are a
  // combination of a reference direction (north or south) and an angle between
  // 0 and Pi radians (0 and 180 degrees) towards the east or west direction.
  // For example, an azimuth of Pi/2 radians (90 degrees) is equivalent to a
  // bearing of "North 90 East" or "South 90 East". UCI uses azimuth because it
  // is easier for machine/software use.
  // xsd type: AnglePositiveType
  optional double azimuth = 1;
  // Indicates the elevation from an observation point to a point of interest.
  // Elevation is defined as the angle between two lines in a global vertical
  // plane at the observation point. The first line originates from the
  // observation point and extends along the azimuth. The second line is from
  // the observation point to the point of interest. An elevation of zero
  // indicates the point of interest is in the observation point's horizontal
  // plane. Elevation values are positive when the point of interest is above
  // the horizontal plane, negative when below.
  // xsd type: AngleType
  optional double elevation = 2;
  // Indicates the line-of-sight distance between the observation point and
  // point of interest.
  // xsd type: DistanceType
  optional double slant_range = 3;
}

// A trigger that refers to a spacecraft that has deviated from its planned
// orbit to such a degree that a replan is required.
// uci_version: 002.000.000.000
message ThresholdOffOrbitTriggerDataType {
  // Indicates the threshold for position error of the spacecraft's orbit
  // expressed in Radial-Transverse-Normal coordinates.
  optional RTN_PositionDeltaType position_error_threshold = 1;
  // Indicates the threshold velocity error of the spacecraft's orbit expressed
  // in Radial-Transverse-Normal coordinates.
  optional RTN_VelocityDeltaType velocity_error_threshold = 2;
  // Indicates the time difference threshold between the planned time and the
  // current time which would demonstrate a spacecraft has deviated from the
  // planned route to such a degree that a replan is required.
  optional TimeErrorType time_threshold = 3;
}

// Indicates a delta position vector in the Radial-Transverse-Normal Reference
// System.
// uci_version: 000.002.000.000
message RTN_PositionDeltaType {
  // Indicates the delta radial component of position in the
  // Radial-Transverse-Normal Reference System.
  // xsd type: DistanceOffsetType
  optional double radial_delta = 1;
  // Indicates the delta transverse component of position in the
  // Radial-Transverse-Normal Reference System.
  // xsd type: DistanceOffsetType
  optional double transverse_delta = 2;
  // Indicates the delta normal component of position in the
  // Radial-Transverse-Normal Reference System.
  // xsd type: DistanceOffsetType
  optional double normal_delta = 3;
}

// Indicates a delta velocity vector in the Radial-Transverse-Normal Reference
// System.
// uci_version: 000.000.000.000
message RTN_VelocityDeltaType {
  // Indicates the delta radial component of velocity in the
  // Radial-Transverse-Normal Reference System.
  // xsd type: SpeedType
  optional double radial_delta = 1;
  // Indicates the delta transverse component of velocity in the
  // Radial-Transverse-Normal Reference System.
  // xsd type: SpeedType
  optional double transverse_delta = 2;
  // Indicates the delta normal component of velocity in the
  // Radial-Transverse-Normal Reference System.
  // xsd type: SpeedType
  optional double normal_delta = 3;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message TimeErrorType {
  // The difference between the planned time and the current time.
  // xsd type: DurationType
  optional string early = 1;
  // The difference between the planned time and the current time.
  // xsd type: DurationType
  optional string late = 2;
}

// Indicates the events of a Mission.
enum RouteEventEnum {
  ROUTE_EVENT_ENUM_UNSPECIFIED = 0;
  ROUTE_EVENT_ENUM_TAKEOFF = 1;
  ROUTE_EVENT_ENUM_LANDING = 2;
  ROUTE_EVENT_ENUM_INGRESS = 3;
  ROUTE_EVENT_ENUM_EGRESS = 4;
}

// Indicates a list of orbital events.
enum OrbitalEventEnum {
  ORBITAL_EVENT_ENUM_UNSPECIFIED = 0;
  ORBITAL_EVENT_ENUM_APOGEE = 1;
  ORBITAL_EVENT_ENUM_ASCENDING_NODE = 2;
  ORBITAL_EVENT_ENUM_DESCENDING_NODE = 3;
  ORBITAL_EVENT_ENUM_ENGINE_CUTOFF = 4;
  ORBITAL_EVENT_ENUM_ENGINE_START = 5;
  ORBITAL_EVENT_ENUM_LAUNCH = 6;
  ORBITAL_EVENT_ENUM_LOCAL_SOLAR_TIME = 7;
  ORBITAL_EVENT_ENUM_ORBIT_INJECTION = 8;
  ORBITAL_EVENT_ENUM_PERIGEE = 9;
  ORBITAL_EVENT_ENUM_WITHIN_EARTH_FIXED_VOLUME = 10;
}

// Provides a choice of event offset types.
// uci_version: 001.000.000.000
message EventOffsetChoiceType {
  oneof choice {
    // The offset time from the associated OrbitalEvent.
    // xsd type: DurationType
    string offset_time = 1;
    // The offset angle from the associated Event.
    // xsd type: AngleType
    double offset_angle = 2;
    // The Azimuth, Elevation, and Range of the Offset from the Event.
    LOS_InertialB_Type az_el = 3;
  }
}

// Defines a line of sight ray in a world inertial frame of reference.
// uci_version: 001.000.000.000
message LOS_InertialB_Type {
  // Indicates the azimuth from an observation point to a point of interest.
  // Azimuth is defined as the angle between two lines in a global horizontal
  // plane at the observation point. The first line is from the observation
  // point to true north. The second line is from the observation point to the
  // point of interest projected onto the global horizontal plane. An azimuth of
  // zero indicates true north with values increasing clockwise. The terms
  // azimuth and bearing are often used interchangeably but they are technically
  // different. Azimuth values are angles between 0 and 2*Pi radians (0 and 360
  // degrees) relative to north, in this case true north. Bearing values are a
  // combination of a reference direction (north or south) and an angle between
  // 0 and Pi radians (0 and 180 degrees) towards the east or west direction.
  // For example, an azimuth of Pi/2 radians (90 degrees) is equivalent to a
  // bearing of "North 90 East" or "South 90 East". UCI uses azimuth because it
  // is easier for machine/software use.
  // xsd type: AnglePositiveType
  double azimuth = 1;
  // Indicates the elevation from an observation point to a point of interest.
  // Elevation is defined as the angle between two lines in a global vertical
  // plane at the observation point. The first line originates from the
  // observation point and extends along the azimuth. The second line is from
  // the observation point to the point of interest. An elevation of zero
  // indicates the point of interest is in the observation point's horizontal
  // plane. Elevation values are positive when the point of interest is above
  // the horizontal plane, negative when below.
  // xsd type: AngleType
  double elevation = 2;
  // Indicates the line-of-sight distance between the observation point and
  // point of interest.
  // xsd type: DistanceType
  optional double slant_range = 3;
}

// Provides a choice of event window size definitions.
// uci_version: 001.000.000.000
message EventWindowChoiceType {
  oneof choice {
    // Indicates a boundary for an Event described as an angle.
    // xsd type: AnglePositiveType
    double window_angle = 1;
    // Indicates a boundary for an OrbitalEvent described as a time-based offset.
    // xsd type: DurationType
    string window_duration = 2;
    // Indicates a boundary for an Event described as a radius.
    // xsd type: DistanceType
    double window_radius = 3;
  }
}

// Indicates a reference asset and associated kinematics.
// uci_version: 005.000.002.000
message ReferenceAssetKinematicsType {
  // Indicates the identity of the object that is to be used as the basis for
  // the Event.
  AssetType reference_asset = 1;
  // Indicates the kinematics source to use for the sibling Object.
  optional OrbitalKinematicsSourceEnum orbit_kinematics_source = 2;
  // Use this type when the cataloged orbit is different than the orbit you
  // have. Use this for lost items, items that have maneuvered, and items that
  // have changed orbital states between the last cataloging and the current
  // orbital state. If the expected or last reported orbit is valid, omit this
  // value.
  optional OrbitKinematicsType orbit_kinematics_override = 3;
}

// Provides a choice between a System and an Entity.
// uci_version: 002.000.000.000
message AssetType {
  oneof choice {
    // This element contains the ID of a UCI compliant vehicle which is
    // "discoverable" via published of PositionReports and/or SystemStatus
    // messages.
    SystemID_Type system_id = 1;
    // This element contains the ID of a protected asset which is not reporting
    // PositionReports and/or SystemStatus messages. The asset is being tracked
    // and reported as a friendly Entity.
    EntityID_Type entity_id = 2;
  }
}

// The ID type for UCI IDs that correspond to entities.
// uci_version: 000.000.000.000
message EntityID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// Indicates the kinematics source as defined below.
enum OrbitalKinematicsSourceEnum {
  ORBITAL_KINEMATICS_SOURCE_ENUM_UNSPECIFIED = 0;
  ORBITAL_KINEMATICS_SOURCE_ENUM_ELEMENT_SET = 1;
  ORBITAL_KINEMATICS_SOURCE_ENUM_EPHEMERIS = 2;
  ORBITAL_KINEMATICS_SOURCE_ENUM_SINGLE_POSITION = 3;
  ORBITAL_KINEMATICS_SOURCE_ENUM_PLAN = 4;
}

// The measured orbit determined by spacecraft ranging.
// uci_version: 004.001.001.001
message OrbitKinematicsType {
  // Indicates the default or "catalog" orbital element set (also known as two
  // line element or TLE) for the satellite.
  optional TLE_BaseType element_set = 1;
  // Describes a satellite's orbit at various date and time intervals. Ephemeris
  // kinematics are composed of one or more state vectors.
  optional OrbitalEphemerisChoiceType ephemeris = 2;
  // Describes the orbit in terms of a state vector along with covariance data.
  optional OrbitalVCM_Type vcm = 3;
}

// Indicates the default or "catalog" orbital element set (also known as two
// line element or TLE) for the satellite.
// uci_version: 002.001.001.000
message TLE_BaseType {
  // composed xsd extension base COE_OrbitBaseType
  COE_OrbitBaseType base = 1;
  // Time at which the orbital elements are valid. Formatted as UTC DateTime
  // values.
  // xsd type: DateTimeType (pattern .+Z)
  string epoch = 2;
  // The element set number is a carryover from the legacy Two Line Element set
  // (TLE) format, and is provided to support processes that transform to/from
  // that format. Element Set Number increments with each newly generated
  // element set. A common range is [0,999].
  optional uint32 element_set_number = 3;
  // First time derivative of the mean motion, in units of revolutions per day.
  // This field is only used with the SGP orbital model (ephemeris type = 1).
  optional double first_time_derivative_of_mean_motion = 4;
  // Second time derivative of the mean motion, in units of revolutions per day.
  // This field is only used with the SGP orbital model (ephemeris type = 1).
  optional double second_time_derivative_of_mean_motion = 5;
  // Ballistic drag coefficient.
  optional double bstar_drag = 6;
  // Position of the spacecraft at the time indicated by the sibling Epoch
  // element.
  COE_PositionType position = 7;
  // The number of revolutions per day.
  double mean_motion = 8;
  // Represents the revolution number (Revs) at the Epoch.
  optional uint32 revolution_number = 9;
}

// Indicates the set of classic orbital elements (COE) describing an orbit.
// Elements describing the position of a satellite on the orbit are often
// considered part of COE but are omitted from this type which is only
// intended to describe the orbit.
// uci_version: 002.001.001.000
message COE_OrbitBaseType {
  // Indicates the orbit's shape expressed as eccentricity. Eccentricity is a
  // quantity describing the shape of the satellite's orbit. In mathematics the
  // eccentricity of a conic section is a measure of how much the shape deviates
  // from being circular. A value of zero represents a perfect circle. As the
  // eccentricity varies from zero to 1 the ellipse becomes more "stretched". An
  // eccentricity of 1 is a parabolic rather than elliptical, and values greater
  // than 1 are hyperbolas.
  // xsd type: DoubleNonNegativeType
  double eccentricity = 1;
  // Indicates the tilt of the orbit with respect to the equatorial plane. Units
  // in radians. Valid values range from zero to PI.
  // xsd type: AngleHalfPositiveType
  double inclination = 2;
  // Indicates the orientation of the orbital plane in space and of the orbit
  // within its plane. Equatorial orbits are a special case that result in some
  // classical orbital elements (COE) for orientation being undefined;
  // equatorial orbits use alternate elements to define orientation.
  COE_OrientationType orientation = 3;
}

// Indicates the orientation of the orbital plane in space and of the orbit
// within its plane.
// uci_version: 001.001.000.001
message COE_OrientationType {
  oneof choice {
    // Indicates that the orbit is non-equatorial. A non-equatorial orbit is an
    // orbit with a non-zero inclination.
    COE_NonEquatorialOrientationType non_equatorial_orbit = 1;
    // Indicates the angle measured from the principal direction to perigee in the
    // direction of the spacecraft's motion. Used for equatorial orbit where RAAN
    // and argument of perigee are undefined. Units in radians. Valid values range
    // from zero to 2*PI.
    COE_EquatorialOrientationType equatorial_orbit = 2;
  }
}

// Elements to describe orbits that go from south to north.
// uci_version: 001.000.000.000
message COE_NonEquatorialOrientationType {
  // Right ascension of the ascending node (RAAN). Units in radians. Valid
  // values range from zero to 2*PI(). This element describes the orbital
  // plane's orientation with respect to the principal direction (vernal equinox
  // direction); how the orbital plane is rotated in space. RAAN is measured
  // from the principal direction eastward along the equator to the ascending
  // node. Thus, the right ascension of the ascending node is the angle from the
  // principal direction to the ascending node. The ascending node is the point
  // of intersection of the orbit with the equatorial plane, crossing from the
  // southern hemisphere to the northern hemisphere.
  // xsd type: AnglePositiveType
  double right_ascension_of_ascending_node = 1;
  // Argument of perigee is the angle from the body's ascending node to its
  // periapsis, measured in the direction of motion. Perigee indicates this is
  // an Earth-centered orbit. Generically, this is the Argument of Periapsis.
  // Units in radians. Valid values range from zero to 2*PI().
  // xsd type: AnglePositiveType
  double argument_of_perigee = 2;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 001.000.000.000
message COE_EquatorialOrientationType {
  // Indicates the angle measured from the principal direction to perigee in the
  // direction of the spacecraft's motion. Used for equatorial orbits with no
  // Ascending Node. Required when Eccentricity is non-zero. Units in radians.
  // Valid values range from zero to 2*PI().
  // xsd type: AnglePositiveType
  optional double longitude_of_perigee = 1;
}

// Indicates the set of classic orbital elements (COE) describing a
// spacecraft's position in an orbit. Elements describing the size, shape and
// other characteristics of the orbit are in other types.
// uci_version: 001.000.000.000
message COE_PositionType {
  oneof choice {
    // Indicates position of the spacecraft expressed as the angular distance from
    // the pericenter which a fictitious body would have if it moved in a circular
    // orbit, with constant speed, in the same orbital period as the actual body
    // in its elliptical orbit. This means of expressing position is used for
    // non-circular orbits. Units in radians. Valid values range from zero to
    // 2*PI().
    // xsd type: AnglePositiveType
    double mean_anomaly = 1;
    // Indicates the position of the spacecraft expressed as the angle along the
    // orbital path from the ascending node to the spacecraft's position in the
    // direction of the spacecraft's motion. This means of expressing position is
    // used for circular orbits where mean anomaly is undefined. Units in radians.
    // Valid values range from zero to 2*PI().
    // xsd type: AnglePositiveType
    double argument_of_latitude = 2;
    // Indicates the position expressed as the angle from the principal direction
    // (vernal equinox direction) to the spacecraft's position vector in the
    // direction of the spacecraft's motion. This means of expressing position is
    // used for circular equatorial orbits where mean anomaly and argument of
    // perigee are undefined. Units in radians. Valid values range from zero to
    // 2*PI().
    // xsd type: AnglePositiveType
    double true_longitude = 3;
  }
}


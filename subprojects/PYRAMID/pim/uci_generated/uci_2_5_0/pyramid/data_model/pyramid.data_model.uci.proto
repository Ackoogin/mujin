// Euler Angle Sequence describing the orientation of the vehicle in the order
// yaw, pitch, roll. The angles are given in a locally level, North-East-Down
// coordinate system centered on the vehicle.
// uci_version: 001.000.000.000
message OrientationType {
  // Angle in radians representing the vehicle's rotation about the vertical
  // axis (the axis from top to bottom through the aircraft) in a locally level,
  // North-East-Down coordinate system centered on the vehicle. By this
  // definition, Yaw is zero when the aircraft is oriented toward true North and
  // is equivalent to true North referenced heading.
  // xsd type: AngleType
  double yaw = 1;
  // Angle in radians representing the vehicle's rotation about the lateral axis
  // (the axis parallel to the wings) in a locally level, North-East-Down
  // coordinate system centered on the vehicle. Pitch is zero when the aircraft
  // is nose to tail level in the North-East plane.
  // xsd type: AngleHalfType
  double pitch = 2;
  // Angle in radians representing vehicle's rotation about the longitudinal
  // axis (the axis through the body of the vehicle from tail to nose) in a
  // locally level, North-East-Down coordinate system centered on the vehicle.
  // Roll is zero when the aircraft is wing-tip to wing-tip level in the
  // North-East plane.
  // xsd type: AngleType
  double roll = 3;
  // Indicates the date and time, in Zulu format, at which the orientation data
  // was measured, last known to be correct and/or predicted to occur.
  // xsd type: DateTimeType (pattern .+Z)
  optional string timestamp = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message OrientationCovarianceType {
  // Row 1 Column 1 term of the result matrix. Roll Roll angle-angle covariance.
  // As radian is unitless result is unitless.
  double rr_rr = 1;
  // Row 1 Column 2 term of the result matrix. Roll Pitch angle-angle
  // covariance. As radian is unitless result is unitless.
  double rr_rp = 2;
  // Row 1 Column 3 term of the result matrix. Roll Yaw angle-angle covariance.
  // As radian is unitless result is unitless.
  double rr_ry = 3;
  // Row 2 Column 2 term of the result matrix. Pitch Pitch angle-angle
  // covariance. As radian is unitless result is unitless.
  double rp_rp = 4;
  // Row 2 Column 3 term of the result matrix. Pitch Yaw angle-angle covariance.
  // As radian is unitless result is unitless.
  double rp_ry = 5;
  // Row 3 Column 3 term of the result matrix. Yaw Yaw angle-angle covariance.
  // As radian is unitless result is unitless.
  double ry_ry = 6;
}

// Specifies a range of angles and will always go from the Min value to the
// Max value in the positive angle direction.
// uci_version: 001.000.000.000
message AngleHalfPairType {
  // Minimum value of the half angle pair.
  // xsd type: AngleHalfType
  double min = 1;
  // Maximum value of the half angle pair.
  // xsd type: AngleHalfType
  double max = 2;
}

// Indicates a geocentric zone referenced to the WGS-84 ellipsoid.
// uci_version: 001.000.000.000
message GeocentricVolumeType {
  // Indicates an altitude band that bounds the zone. Altitude is represented as
  // the height above the WGS-84 ellipsoid (HAE) measured in meters.
  AltitudeRangeType altitude_range = 1;
  // Indicates a WGS-84 longitude band that bounds the zone.
  AnglePairType longitude_range = 2;
  // Indicates a WGS-84 latitude band that bounds the zone.
  AngleHalfPairType latitude_range = 3;
}

// Indicates the name of an orbit altitude range.
enum OrbitAltitudeEnum {
  ORBIT_ALTITUDE_ENUM_UNSPECIFIED = 0;
  ORBIT_ALTITUDE_ENUM_LOW = 1;
  ORBIT_ALTITUDE_ENUM_MED = 2;
  ORBIT_ALTITUDE_ENUM_HIGH = 3;
  ORBIT_ALTITUDE_ENUM_NON_EARTH = 4;
}

// This element includes other qualitative types of regions in space such as

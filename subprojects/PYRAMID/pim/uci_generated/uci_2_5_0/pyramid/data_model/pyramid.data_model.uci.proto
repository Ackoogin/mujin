// See the associated global element (message) annotation for further details.
// uci_version: 005.000.005.000
message SignalReportMT {
  // composed xsd extension base MessageType
  MessageType base = 1;
  // Indicates the state of the internal software object that the data in the
  // message is based upon. The state of the software object is determined by
  // the publisher. The publisher could be the original/master publisher or an
  // intermediary re-publisher such as a persistence/data manager. This element
  // is not a commanded CRUD operation. It is not an indication of the state of
  // an instance of a message. It is not a mechanism for partial, incremental,
  // or fragmentary publication of a message. It is a signal from a publisher to
  // subscribers. For REMOVED state, in particular, some subscribers will mirror
  // the publisher and treat the message as if the object no longer exists, but
  // others, such as mission recorders, might not (in order to support retaining
  // historical records of activity, for example).
  optional ObjectStateEnum object_state = 2;
  // See annotations in child elements for details.
  SignalReportMDT message_data = 3;
}

// See annotations in child elements and associated global element (message)
// for further details.
// uci_version: 005.000.005.000
message SignalReportMDT {
  // Indicates the unique ID assigned to the SignalReport.
  SignalReportID_Type signal_report_id = 1;
  // ID of the System that created the SignalReport.
  optional SystemID_Type system_id = 2;
  // ID of the Subsystem that created the SignalReport.
  optional SubsystemID_Type subsystem_id = 3;
  // Indicates a collection of pulses with similar characteristics (frequency,
  // pulse width, PRI, etc.) that are grouped together, analyzed, and
  // summarized. Signal characteristics can build up over time; additional
  // characteristics may be added to the initial report of the Signal, such as
  // identity, activity, collection time, collection method, scan data. and
  // location.
  repeated SignalType signal = 4;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 000.000.000.000
message SignalReportID_Type {
  // composed xsd extension base ID_Type
  ID_Type base = 1;
}

// See annotations in child elements and messages/elements that use this type
// for details.
// uci_version: 005.001.005.004
message SignalType {
  // Indicates the unique ID assigned to the Signal. A given signal's ID shall
  // be constant over time.
  SignalID_Type signal_id = 1;
  // Indicates the "reporting" state of the Signal.
  SignalReportStateEnum signal_state = 2;
  // Indicates cross-referencing IDs for the Capability that is the source of
  // the SignalReport; the Capability that detected the Signal.
  optional SignalSourceType source = 3;
  // Indicates a local track identifier assigned by the detecting sensor.
  optional ForeignKeyType local_track_identifier = 4;
  // Indicates the unique ID of a PulseData collection associated with the
  // Signal.
  repeated PulseDataID_Type associated_pulse_data_id = 5;
  // Indicates the time at which the Signal was first detected.
  // xsd type: DateTimeType (pattern .+Z)
  optional string initial_detection_timestamp = 6;
  // Indicates the time at which the Signal was last detected.
  // xsd type: DateTimeType (pattern .+Z)
  optional string latest_detection_timestamp = 7;
  // Indicates the quality of the LatestDetectionTimestamp.
  optional MeasurementQualityEnum timestamp_quality = 8;
  // The parametric data for the Signal.
  optional SignalParametricsType parametrics = 9;
  // Indicates the emitter function inferred from the Signal.
  optional EmitterFunctionType emitter_function = 10;
  // Indicates the Identity of the Emitter associated with the Signal.
  optional SignalIdentityType emitter_identity = 11;
  // Indicates the geospatial position of the emitter of the Signal.
  optional SignalEmitterKinematicsType emitter_kinematics = 12;
  // Indicates the kinematic state of the collecting system and antenna at the
  // time of collection of the Signal.
  repeated SignalNavDataType collector_kinematics = 13;
  // Indicates the emitter is functioning in its wartime reserve mode. An
  // intentional change in observable electro-magnetic emitter parameter or
  // operational procedure intended to reduce the effectiveness of EW equipment
  // of opposing forces.
  // xsd type: EmptyType (pattern [a-zA-Z]{0})
  optional string wartime_reserve_mode = 14;
  // Indicates if an emitter is locked on or in surveillance mode.
  optional LockIndicatorEnum lock_indicator = 15;
  // This element indicates an activity being performed by an emitter that is
  // not otherwise represented by UCI Tasks, Capability commands, etc.
  optional ActivityByType activity_by = 16;
  // Indicates supplementary information regarding a SignalReport whose sibling
  // SignalState indicates REMOVE.
  optional SignalRemoveInfoType remove_info = 17;
  // Indicates the modulation of the signal. List size for this element is based
  // on "Select All That Apply" condition.
  repeated ModulationEnum modulation = 18;
  // Indicates a custom modulation parameter that is not covered by other
  // elements in the Signal data structure. This will typically be used to fully
  // cover the fields defined in other interoperability standards such as the
  // JICD.
  repeated ModulationParameterType modulation_parameter = 19;
  // Indicates the urgency of the emitter of the signal. See enumeration
  // annotations for further details.
  optional EmitterUrgencyEnum urgency = 20;
  // Indicates the mobility of the Signal. Omission is equivalent to the
  // enumerate UNDETERMINED.
  optional MobilityEnum mobility = 21;
  // This element indicates the simulated target's truth data. This element can
  // only be used if the MessageHeader.Mode is not LIVE.
  optional int64 simulation_target_number = 22;
}


syntax = "proto3";

package pyramid.components.uci.c2_station.services.consumed;

import "pyramid/options/pyramid.options.proto";
import "pyramid/data_model/pyramid.data_model.uci.proto";
import "pyramid/data_model/pyramid.data_model.uci.port_grammar.proto";

message ActionCommand_Service_Request {
  oneof payload {
    pyramid.data_model.uci.ActionCommandMT action_command = 1;
    pyramid.data_model.uci.ActionCommandStatusMT update = 2;
  }
}

message ActionCommand_Service_Entity {
  oneof payload {
    pyramid.data_model.uci.ActionCommandStatusMT action_command_status = 1;
  }
}

service ActionCommand_Service {
  rpc Create(ActionCommand_Service_Request) returns (pyramid.data_model.uci_port_grammar.Ack) {
    option (pyramid.options.pyramid_op) = { pattern: PUBLISH topic: "mission.action_command.request" qos: { reliability: RELIABLE durability: VOLATILE depth: 10 } };
  }
  rpc Read(pyramid.data_model.uci_port_grammar.Query) returns (stream ActionCommand_Service_Entity) {
    option (pyramid.options.pyramid_op) = { pattern: SUBSCRIBE topic: "mission.action_command.entity" qos: { reliability: RELIABLE durability: VOLATILE depth: 10 } };
  }
  rpc Update(ActionCommand_Service_Entity) returns (pyramid.data_model.uci_port_grammar.Ack) {
    option (pyramid.options.pyramid_op) = { pattern: PUBLISH topic: "mission.action_command.request" qos: { reliability: RELIABLE durability: VOLATILE depth: 10 } };
  }
  rpc Cancel(pyramid.data_model.uci_port_grammar.Identifier) returns (pyramid.data_model.uci_port_grammar.Ack) {
    option (pyramid.options.pyramid_op) = { pattern: PUBLISH topic: "mission.action_command.request" qos: { reliability: RELIABLE durability: VOLATILE depth: 10 } };
  }
}

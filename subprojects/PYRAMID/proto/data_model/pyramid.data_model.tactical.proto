syntax = "proto3";

package pyramid.data_model.tactical;

import "google/protobuf/timestamp.proto";
import "pyramid/data_model/base.proto";
import "pyramid/data_model/common.proto";

enum ObjectSource {
  OBJECT_SOURCE_UNSPECIFIED = 0;
  OBJECT_SOURCE_RADAR = 1;
  OBJECT_SOURCE_LOCAL = 2;
}

// Standard properties of a Tactical Object
message ObjectDetail {
  pyramid.data_model.common.Entity base = 1;  // Inherited from Entity
  repeated ObjectSource source = 2;
  pyramid.data_model.common.GeodeticPosition position = 3;
  pyramid.data_model.base.Timestamp creation_time = 4;
  optional pyramid.data_model.base.Percentage quality = 5;
  optional pyramid.data_model.base.Angle course = 6;
  optional pyramid.data_model.base.Speed speed = 7;
  optional pyramid.data_model.base.Length length = 8;
  pyramid.data_model.common.StandardIdentity identity = 9;
  pyramid.data_model.common.BattleDimension dimension = 10;
}

message ObjectEvidenceRequirement {
  pyramid.data_model.common.Requirement base = 1;  // Inherited from Requirement
  oneof location {
    pyramid.data_model.common.PolyArea poly_area = 2;
    pyramid.data_model.common.CircleArea circle_area = 3;
    pyramid.data_model.common.Point point = 4;
  }
  pyramid.data_model.common.DataPolicy policy = 5;
  repeated pyramid.data_model.common.BattleDimension dimension = 6;
}

// Requirement to provide references to Tactical Objects which match the specification
message ObjectInterestRequirement {
  pyramid.data_model.common.Requirement base = 1;  // Inherited from Requirement
  optional ObjectSource source = 2;
  pyramid.data_model.common.DataPolicy policy = 3;
  oneof location {
    pyramid.data_model.common.PolyArea poly_area = 4;
    pyramid.data_model.common.CircleArea circle_area = 5;
    pyramid.data_model.common.Point point = 6;
  }
  repeated pyramid.data_model.common.BattleDimension dimension = 7;
}

// Reference
message ObjectMatch {
  pyramid.data_model.common.Entity base = 1;  // Inherited from Entity
  // Identifier for this Entity,
  pyramid.data_model.base.Identifier matching_object_id = 2;
}

syntax = "proto3";

package pyramid.components.autonomy_backend.services.provided;

import "pyramid/data_model/base.proto";
import "pyramid/data_model/common.proto";
import "pyramid/data_model/autonomy.proto";

// =============================================================================
// AME Autonomy Service Interface - EntityActions CRUD Style
// =============================================================================
// Objectives, Tasks, or another coordinator delegate planning/execution to AME
// by placing PlanningExecutionRequirement entities. AME exposes plans,
// execution runs, and typed requirement-placement traceability products.
// =============================================================================

// -----------------------------------------------------------------------------
// Capabilities Service (out - Read only)
// -----------------------------------------------------------------------------
// EntityActions Service for AME Capabilities.
// Service Type: PROVIDED
service Capabilities_Service {
  // Read capabilities (output only)
  rpc ReadCapabilities(pyramid.data_model.common.Query)
      returns (stream pyramid.data_model.autonomy.Capabilities);
}

// -----------------------------------------------------------------------------
// PlanningExecutionRequirement Service (inout - full CRUD)
// -----------------------------------------------------------------------------
// EntityActions Service for AME delegated planning/execution requirements.
// Service Type: PROVIDED
service Planning_Execution_Service {
  // Create requirement (delegate planning/execution to AME)
  rpc CreateRequirement(pyramid.data_model.autonomy.PlanningExecutionRequirement)
      returns (pyramid.data_model.base.Identifier);

  // Read requirement (inspect delegated planning/execution requirements)
  rpc ReadRequirement(pyramid.data_model.common.Query)
      returns (stream pyramid.data_model.autonomy.PlanningExecutionRequirement);

  // Update requirement (refine, progress, or attach an approved plan)
  rpc UpdateRequirement(pyramid.data_model.autonomy.PlanningExecutionRequirement)
      returns (pyramid.data_model.common.Ack);

  // Delete requirement (cancel delegated planning/execution)
  rpc DeleteRequirement(pyramid.data_model.base.Identifier)
      returns (pyramid.data_model.common.Ack);
}

// -----------------------------------------------------------------------------
// State Service (in - Create/Update/Delete, no Read)
// -----------------------------------------------------------------------------
// EntityActions Service for AME state ingress.
// Service Type: PROVIDED
service State_Service {
  // Create state (push new world facts)
  rpc CreateState(pyramid.data_model.autonomy.StateUpdate)
      returns (pyramid.data_model.base.Identifier);

  // Update state (push world fact changes)
  rpc UpdateState(pyramid.data_model.autonomy.StateUpdate)
      returns (pyramid.data_model.common.Ack);

  // Delete state (remove state by ID)
  rpc DeleteState(pyramid.data_model.base.Identifier)
      returns (pyramid.data_model.common.Ack);
}

// -----------------------------------------------------------------------------
// Plan Service (out - Read only)
// -----------------------------------------------------------------------------
// EntityActions Service for AME plan products.
// Service Type: PROVIDED
service Plan_Service {
  // Read plan products generated for planning/execution requirements
  rpc ReadPlan(pyramid.data_model.common.Query)
      returns (stream pyramid.data_model.autonomy.Plan);
}

// -----------------------------------------------------------------------------
// ExecutionRun Service (out - Read only)
// -----------------------------------------------------------------------------
// EntityActions Service for AME execution run products.
// Service Type: PROVIDED
service Execution_Run_Service {
  // Read execution run products for delegated requirements
  rpc ReadRun(pyramid.data_model.common.Query)
      returns (stream pyramid.data_model.autonomy.ExecutionRun);
}

// -----------------------------------------------------------------------------
// RequirementPlacement Service (out - Read only)
// -----------------------------------------------------------------------------
// EntityActions Service for typed component requirement placements and reads.
// Service Type: PROVIDED
service Requirement_Placement_Service {
  // Read typed requirement placements and related component read operations
  rpc ReadPlacement(pyramid.data_model.common.Query)
      returns (stream pyramid.data_model.autonomy.RequirementPlacement);
}

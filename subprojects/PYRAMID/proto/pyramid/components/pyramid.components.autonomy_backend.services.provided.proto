syntax = "proto3";

package pyramid.components.autonomy_backend.services.provided;

import "pyramid/data_model/pyramid.data_model.base.proto";
import "pyramid/data_model/pyramid.data_model.common.proto";
import "pyramid/data_model/pyramid.data_model.autonomy.proto";

// =============================================================================
// AME Autonomy Service Interface - EntityActions CRUD Style
// =============================================================================
// Objectives, Tasks, or another coordinator delegate planning to AME by placing
// PlanningRequirement entities, then delegate execution by placing
// ExecutionRequirement entities. AME exposes plans as addressable resources and
// execution runs / requirement-placement traceability as read-only products.
// =============================================================================

// -----------------------------------------------------------------------------
// Capabilities Service (out - Read only)
// -----------------------------------------------------------------------------
// EntityActions Service for AME Capabilities.
// Service Type: PROVIDED
service Capabilities_Service {
  // Read capabilities (output only)
  rpc ReadCapabilities(pyramid.data_model.common.Query)
      returns (stream pyramid.data_model.autonomy.Capabilities);
}

// -----------------------------------------------------------------------------
// PlanningRequirement Service (inout - full CRUD)
// -----------------------------------------------------------------------------
// EntityActions Service for AME delegated planning requirements.
// Service Type: PROVIDED
service Planning_Requirement_Service {
  // Create planning requirement (delegate planning to AME)
  rpc CreatePlanningRequirement(pyramid.data_model.autonomy.PlanningRequirement)
      returns (pyramid.data_model.base.Identifier);

  // Read planning requirement
  rpc ReadPlanningRequirement(pyramid.data_model.common.Query)
      returns (stream pyramid.data_model.autonomy.PlanningRequirement);

  // Update planning requirement
  rpc UpdatePlanningRequirement(pyramid.data_model.autonomy.PlanningRequirement)
      returns (pyramid.data_model.common.Ack);

  // Delete planning requirement
  rpc DeletePlanningRequirement(pyramid.data_model.base.Identifier)
      returns (pyramid.data_model.common.Ack);
}

// -----------------------------------------------------------------------------
// ExecutionRequirement Service (inout - full CRUD)
// -----------------------------------------------------------------------------
// EntityActions Service for AME delegated execution requirements.
// Service Type: PROVIDED
service Execution_Requirement_Service {
  // Create execution requirement (execute an approved plan)
  rpc CreateExecutionRequirement(pyramid.data_model.autonomy.ExecutionRequirement)
      returns (pyramid.data_model.base.Identifier);

  // Read execution requirement
  rpc ReadExecutionRequirement(pyramid.data_model.common.Query)
      returns (stream pyramid.data_model.autonomy.ExecutionRequirement);

  // Update execution requirement
  rpc UpdateExecutionRequirement(pyramid.data_model.autonomy.ExecutionRequirement)
      returns (pyramid.data_model.common.Ack);

  // Delete execution requirement
  rpc DeleteExecutionRequirement(pyramid.data_model.base.Identifier)
      returns (pyramid.data_model.common.Ack);
}

// -----------------------------------------------------------------------------
// State Service (in - Create/Update/Delete, no Read)
// -----------------------------------------------------------------------------
// EntityActions Service for AME state ingress.
// Service Type: PROVIDED
service State_Service {
  // Create state (push new world facts)
  rpc CreateState(pyramid.data_model.autonomy.StateUpdate)
      returns (pyramid.data_model.base.Identifier);

  // Update state (push world fact changes)
  rpc UpdateState(pyramid.data_model.autonomy.StateUpdate)
      returns (pyramid.data_model.common.Ack);

  // Delete state (remove state by ID)
  rpc DeleteState(pyramid.data_model.base.Identifier)
      returns (pyramid.data_model.common.Ack);
}

// -----------------------------------------------------------------------------
// Plan Service (inout - full CRUD)
// -----------------------------------------------------------------------------
// EntityActions Service for AME plan resources.
// Service Type: PROVIDED
service Plan_Service {
  // Create plan resource (for externally approved or imported plans)
  rpc CreatePlan(pyramid.data_model.autonomy.Plan)
      returns (pyramid.data_model.base.Identifier);

  // Read plan resources generated for planning requirements or explicitly
  // created by coordinators
  rpc ReadPlan(pyramid.data_model.common.Query)
      returns (stream pyramid.data_model.autonomy.Plan);

  // Update plan resource
  rpc UpdatePlan(pyramid.data_model.autonomy.Plan)
      returns (pyramid.data_model.common.Ack);

  // Delete plan resource
  rpc DeletePlan(pyramid.data_model.base.Identifier)
      returns (pyramid.data_model.common.Ack);
}

// -----------------------------------------------------------------------------
// ExecutionRun Service (out - Read only)
// -----------------------------------------------------------------------------
// EntityActions Service for AME execution run products.
// Service Type: PROVIDED
service Execution_Run_Service {
  // Read execution run products for delegated execution requirements
  rpc ReadRun(pyramid.data_model.common.Query)
      returns (stream pyramid.data_model.autonomy.ExecutionRun);
}

// -----------------------------------------------------------------------------
// RequirementPlacement Service (out - Read only)
// -----------------------------------------------------------------------------
// EntityActions Service for typed component requirement placements and reads.
// Service Type: PROVIDED
service Requirement_Placement_Service {
  // Read typed requirement placements and related component read operations
  rpc ReadPlacement(pyramid.data_model.common.Query)
      returns (stream pyramid.data_model.autonomy.RequirementPlacement);
}

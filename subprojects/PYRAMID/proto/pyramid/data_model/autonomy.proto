syntax = "proto3";

package pyramid.data_model.autonomy;

import "pyramid/data_model/base.proto";
import "pyramid/data_model/common.proto";

// =============================================================================
// Autonomy Backend Data Model
// =============================================================================
// This proto file defines messages and enums for the unified autonomy backend
// surface, structured to follow PYRAMID EntityActions CRUD conventions.
//
// Source of truth: subprojects/AME/include/ame/autonomy_backend.h
//
// NOTE: This proto uses full EntityActions semantics. The current AME backend
// implementation uses a session-based push/pull model. See ALIGNMENT.md for
// required backend changes to support this CRUD interface.
// =============================================================================

// -----------------------------------------------------------------------------
// Enums
// -----------------------------------------------------------------------------

// Lifecycle state of a whole-system autonomy backend session.
enum AutonomyBackendState {
  AUTONOMY_BACKEND_STATE_UNSPECIFIED = 0;
  AUTONOMY_BACKEND_STATE_IDLE = 1;
  AUTONOMY_BACKEND_STATE_READY = 2;
  AUTONOMY_BACKEND_STATE_WAITING_FOR_RESULTS = 3;
  AUTONOMY_BACKEND_STATE_COMPLETE = 4;
  AUTONOMY_BACKEND_STATE_FAILED = 5;
  AUTONOMY_BACKEND_STATE_STOPPED = 6;
}

// Reported outcome status for an externally dispatched command.
enum CommandStatus {
  COMMAND_STATUS_UNSPECIFIED = 0;
  COMMAND_STATUS_PENDING = 1;
  COMMAND_STATUS_RUNNING = 2;
  COMMAND_STATUS_SUCCEEDED = 3;
  COMMAND_STATUS_FAILED_TRANSIENT = 4;
  COMMAND_STATUS_FAILED_PERMANENT = 5;
  COMMAND_STATUS_CANCELLED = 6;
}

// Requested stop mode for an autonomy backend session.
enum StopMode {
  STOP_MODE_UNSPECIFIED = 0;
  STOP_MODE_DRAIN = 1;
  STOP_MODE_IMMEDIATE = 2;
}

// Backend-neutral authority tag for a fact update crossing the shell boundary.
enum FactAuthorityLevel {
  FACT_AUTHORITY_LEVEL_UNSPECIFIED = 0;
  FACT_AUTHORITY_LEVEL_BELIEVED = 1;
  FACT_AUTHORITY_LEVEL_CONFIRMED = 2;
}

// -----------------------------------------------------------------------------
// Core Entity Messages
// -----------------------------------------------------------------------------
// Following PYRAMID EntityActions conventions, entity messages include an
// Entity base for CRUD addressability (id, source, update_time).
// -----------------------------------------------------------------------------

// Single fact update applied through the backend ingress surface.
message FactUpdate {
  string key = 1;
  bool value = 2;
  string source = 3;
  FactAuthorityLevel authority = 4;
}

// State ingress payload for authoritative world updates.
// EntityActions: in (Create/Update/Delete)
message StateUpdate {
  pyramid.data_model.common.Entity base = 1;  // For CRUD addressability
  repeated FactUpdate fact_updates = 2;
}

// Mission intent passed to the backend shell.
// EntityActions: in (Create/Update/Delete)
message MissionIntent {
  pyramid.data_model.common.Entity base = 1;  // For CRUD addressability
  repeated string goal_fluents = 2;
}

// Backend-neutral view of an agent/resource that can accept delegated work.
message AgentState {
  string agent_id = 1;
  string agent_type = 2;
  bool available = 3;
}

// Policy knobs exposed at the whole-system wrapper boundary.
message PolicyEnvelope {
  uint32 max_replans = 1;
  bool enable_goal_dispatch = 2;
}

// Session bootstrap parameters for a backend run.
// EntityActions: inout (full CRUD)
message Session {
  pyramid.data_model.common.Entity base = 1;  // For CRUD addressability
  MissionIntent intent = 2;
  PolicyEnvelope policy = 3;
  repeated AgentState available_agents = 4;
}

// Declared top-level capabilities of an autonomy backend.
// EntityActions: out (Read only)
message Capabilities {
  pyramid.data_model.common.Entity base = 1;  // For CRUD addressability
  string backend_id = 2;
  bool supports_batch_planning = 3;
  bool supports_external_command_dispatch = 4;
  bool supports_replanning = 5;
}

// Key-value pair for request field maps.
// Used instead of proto map<K,V> for broader PYRAMID backend compatibility.
message StringKeyValue {
  string key = 1;
  string value = 2;
}

// Command emitted by the backend egress surface for external dispatch.
// EntityActions: out (Read only)
message Command {
  pyramid.data_model.common.Entity base = 1;  // For CRUD addressability
  string command_id = 2;
  string action_name = 3;
  string signature = 4;
  string service_name = 5;
  string operation = 6;
  // Request fields as key-value pairs (semantically a map<string,string>).
  repeated StringKeyValue request_fields = 7;
}

// Goal/task dispatch emitted to an assigned agent or subordinate backend.
// EntityActions: out (Read only)
message GoalDispatch {
  pyramid.data_model.common.Entity base = 1;  // For CRUD addressability
  string dispatch_id = 2;
  string agent_id = 3;
  repeated string goals = 4;
}

// Decision/audit record emitted when the backend forms a new plan.
// EntityActions: out (Read only)
message DecisionRecord {
  pyramid.data_model.common.Entity base = 1;  // For CRUD addressability
  string session_id = 2;
  string backend_id = 3;
  uint64 world_version = 4;
  uint32 replan_count = 5;
  bool plan_success = 6;
  double solve_time_ms = 7;
  repeated string planned_action_signatures = 8;
  string compiled_bt_xml = 9;
}

// Result returned by the external dispatcher for a command.
// EntityActions: in (Create/Update/Delete)
message CommandResult {
  pyramid.data_model.common.Entity base = 1;  // For CRUD addressability
  string command_id = 2;
  CommandStatus status = 3;
  repeated FactUpdate observed_updates = 4;
  string source = 5;
}

// Result returned for a previously emitted goal dispatch.
// EntityActions: in (Create/Update/Delete)
message DispatchResult {
  pyramid.data_model.common.Entity base = 1;  // For CRUD addressability
  string dispatch_id = 2;
  CommandStatus status = 3;
  repeated FactUpdate observed_updates = 4;
  string source = 5;
}

// Snapshot of the wrapper-visible backend state.
// EntityActions: out (Read only) - returned by ReadSession
message SessionSnapshot {
  pyramid.data_model.common.Entity base = 1;  // For CRUD addressability
  string session_id = 2;
  AutonomyBackendState state = 3;
  uint64 world_version = 4;
  uint32 replan_count = 5;
  repeated AgentState agent_states = 6;
  repeated Command outstanding_commands = 7;
  repeated GoalDispatch outstanding_goal_dispatches = 8;
  repeated DecisionRecord decision_history = 9;
}

// -----------------------------------------------------------------------------
// Session Control Messages
// -----------------------------------------------------------------------------

// Request to advance backend deliberation (used with UpdateSession).
// Triggers one deliberation cycle and populates egress queues.
message SessionStepRequest {
  pyramid.data_model.base.Identifier session_id = 1;
}

// Request to stop a session (used with DeleteSession).
message SessionStopRequest {
  pyramid.data_model.base.Identifier session_id = 1;
  StopMode mode = 2;
}

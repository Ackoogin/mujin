syntax = "proto3";

package pyramid.data_model.autonomy;

import "pyramid/data_model/base.proto";
import "pyramid/data_model/common.proto";

// =============================================================================
// AME Autonomy Data Model
// =============================================================================
// This proto defines the target PYRAMID-facing AME surface.
//
// Objectives and Tasks own their domain semantics. They delegate planning and
// optional execution to AME by placing PlanningExecutionRequirement entities.
// AME then exposes plans, execution runs, and typed component requirement
// placements as read-only products.
// =============================================================================

// -----------------------------------------------------------------------------
// Enums
// -----------------------------------------------------------------------------

// Backend-neutral authority tag for a world fact update crossing the AME
// boundary.
enum FactAuthorityLevel {
  FACT_AUTHORITY_LEVEL_UNSPECIFIED = 0;
  FACT_AUTHORITY_LEVEL_BELIEVED = 1;
  FACT_AUTHORITY_LEVEL_CONFIRMED = 2;
}

// Requested operating mode for an AME planning/execution requirement.
enum PlanningExecutionMode {
  PLANNING_EXECUTION_MODE_UNSPECIFIED = 0;
  PLANNING_EXECUTION_MODE_PLAN_AND_EXECUTE = 1;
  PLANNING_EXECUTION_MODE_PLAN_ONLY = 2;
  PLANNING_EXECUTION_MODE_EXECUTE_APPROVED_PLAN = 3;
}

// Lifecycle state of a delegated AME planning/execution requirement.
enum PlanningExecutionState {
  PLANNING_EXECUTION_STATE_UNSPECIFIED = 0;
  PLANNING_EXECUTION_STATE_ACCEPTED = 1;
  PLANNING_EXECUTION_STATE_PLANNING = 2;
  PLANNING_EXECUTION_STATE_EXECUTING = 3;
  PLANNING_EXECUTION_STATE_WAITING_FOR_COMPONENTS = 4;
  PLANNING_EXECUTION_STATE_ACHIEVED = 5;
  PLANNING_EXECUTION_STATE_FAILED = 6;
  PLANNING_EXECUTION_STATE_CANCELLED = 7;
}

// EntityActions-style operation AME performs against another component.
enum RequirementPlacementOperation {
  REQUIREMENT_PLACEMENT_OPERATION_UNSPECIFIED = 0;
  REQUIREMENT_PLACEMENT_OPERATION_CREATE_REQUIREMENT = 1;
  REQUIREMENT_PLACEMENT_OPERATION_READ_REQUIREMENT = 2;
  REQUIREMENT_PLACEMENT_OPERATION_UPDATE_REQUIREMENT = 3;
  REQUIREMENT_PLACEMENT_OPERATION_DELETE_REQUIREMENT = 4;
  REQUIREMENT_PLACEMENT_OPERATION_READ_PRODUCT = 5;
  REQUIREMENT_PLACEMENT_OPERATION_READ_CAPABILITY = 6;
}

// -----------------------------------------------------------------------------
// Requirement Delegation Inputs
// -----------------------------------------------------------------------------

// Reference to a requirement/entity owned by another PYRAMID component.
// This preserves traceability without making AME own Objective or Task schemas.
message RequirementReference {
  pyramid.data_model.base.Identifier requirement_id = 1;
  string component_name = 2;
  string service_name = 3;
  string type_name = 4;
}

// Backend-neutral view of an agent/resource AME may use during planning and
// execution.
message AgentState {
  string agent_id = 1;
  string agent_type = 2;
  bool available = 3;
}

// Policy knobs for a delegated AME planning/execution requirement.
message PlanningPolicy {
  uint32 max_replans = 1;
  bool enable_replanning = 2;
  uint32 max_concurrent_placements = 3;
}

// Single goal accepted by AME.
message PlanningGoal {
  pyramid.data_model.common.Entity base = 1;  // For CRUD addressability
  string name = 2;
  oneof goal {
    // Preferred form when the goal is delegated from Objective/Task/component
    // requirements.
    RequirementReference requirement = 3;

    // AME-domain expression for planner-specific adapters, such as PDDL
    // fluents. This is still contained inside the AME contract rather than
    // exposed as a generic command surface.
    string expression = 4;
  }
}

// Requirement placed on AME by Objectives, Tasks, or another coordinator when
// they need AME to plan and optionally execute a response.
// EntityActions: inout (full CRUD)
message PlanningExecutionRequirement {
  pyramid.data_model.common.Requirement base = 1;  // Inherited from Requirement
  repeated RequirementReference upstream_requirement = 2;
  repeated PlanningGoal goal = 3;
  PlanningPolicy policy = 4;
  repeated AgentState available_agents = 5;
  PlanningExecutionMode mode = 6;
  optional pyramid.data_model.base.Identifier approved_plan_id = 7;
}

// -----------------------------------------------------------------------------
// State Inputs
// -----------------------------------------------------------------------------

// Single world fact update applied through AME state ingress.
message WorldFactUpdate {
  pyramid.data_model.common.Entity base = 1;  // For CRUD addressability
  string key = 2;
  bool value = 3;
  string source = 4;
  FactAuthorityLevel authority = 5;
}

// State ingress payload for authoritative or believed world updates.
// EntityActions: in (Create/Update/Delete)
message StateUpdate {
  pyramid.data_model.common.Entity base = 1;  // For CRUD addressability
  repeated WorldFactUpdate fact_update = 2;
}

// -----------------------------------------------------------------------------
// AME Products
// -----------------------------------------------------------------------------

// Declared top-level capabilities of an AME backend.
// EntityActions: out (Read only)
message Capabilities {
  pyramid.data_model.common.Entity base = 1;  // For CRUD addressability
  string backend_id = 2;
  bool supports_plan_only = 3;
  bool supports_plan_and_execute = 4;
  bool supports_execute_approved_plan = 5;
  bool supports_replanning = 6;
  bool supports_typed_component_requirement_placement = 7;
  bool supports_state_update_ingress = 8;
}

// Planned EntityActions interaction with another component.
message PlannedComponentInteraction {
  string target_component = 1;
  string target_service = 2;
  string target_type = 3;
  RequirementPlacementOperation operation = 4;
}

// Ordered step in a plan produced by AME.
message PlanStep {
  pyramid.data_model.common.Entity base = 1;  // For CRUD addressability
  uint32 sequence_number = 2;
  string action_name = 3;
  string signature = 4;
  repeated PlannedComponentInteraction interaction = 5;
}

// Plan product emitted by AME after solving a planning/execution requirement.
// EntityActions: out (Read only)
message Plan {
  pyramid.data_model.common.Entity base = 1;  // For CRUD addressability
  pyramid.data_model.base.Identifier planning_execution_requirement_id = 2;
  string backend_id = 3;
  uint64 world_version = 4;
  uint32 replan_count = 5;
  bool plan_success = 6;
  double solve_time_ms = 7;
  repeated PlanStep step = 8;
  string compiled_bt_xml = 9;
  optional pyramid.data_model.base.Percentage predicted_quality = 10;
}

// Record of a typed EntityActions interaction AME performed or intends to
// perform on another component. This is a traceability product, not a generic
// command envelope.
// EntityActions: out (Read only)
message RequirementPlacement {
  pyramid.data_model.common.Entity base = 1;  // For CRUD addressability
  pyramid.data_model.base.Identifier planning_execution_requirement_id = 2;
  pyramid.data_model.base.Identifier plan_id = 3;
  pyramid.data_model.base.Identifier plan_step_id = 4;
  string target_component = 5;
  string target_service = 6;
  string target_type = 7;
  RequirementPlacementOperation operation = 8;
  pyramid.data_model.base.Identifier target_requirement_id = 9;
  repeated pyramid.data_model.base.Identifier related_entity_id = 10;
  pyramid.data_model.common.Progress progress = 11;
}

// Execution run product for a requirement currently being enacted by AME.
// EntityActions: out (Read only)
message ExecutionRun {
  pyramid.data_model.common.Entity base = 1;  // For CRUD addressability
  pyramid.data_model.base.Identifier planning_execution_requirement_id = 2;
  pyramid.data_model.base.Identifier plan_id = 3;
  PlanningExecutionState state = 4;
  pyramid.data_model.common.Achievement achievement = 5;
  uint32 replan_count = 6;
  repeated RequirementPlacement outstanding_placement = 7;
}

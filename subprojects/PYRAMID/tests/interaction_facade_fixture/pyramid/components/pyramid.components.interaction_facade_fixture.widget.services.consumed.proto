syntax = "proto3";

package pyramid.components.interaction_facade_fixture.widget.services.consumed;

import "pyramid/data_model/pyramid.data_model.base.proto";
import "pyramid/data_model/pyramid.data_model.common.proto";

// Test-only fixture for
// doc/plans/PYRAMID/rpc_pubsub_interchangeability_plan.md Phase 2's negative
// case: a Request-shape service whose 'Update' command has NO matching
// oneof variant on its own '_Request' wrapper (D2: reason="no_match"),
// mirroring the uniform pim/test/ shape (Update non-projectable) without
// depending on pim/test/'s own byte-identity-protected generated output.
// The wrapper carries zero oneof variants at all, so only 'Create' is
// projectable (its request type IS the wrapper, D2's is_wrapper case);
// 'Update' and 'Cancel' are both non-projectable (reason="no_match"),
// exercising the same runtime-fail-closed path Update exercises in every
// real contract in the tree.
message Widget_Service_Request {
}

message Widget_Service_Entity {
  pyramid.data_model.common.Requirement status = 1;
}

service Widget_Service {
  // Create's request type is fully qualified (unlike every other reference
  // in this file) so at least one entry in service_header_gen.py's
  // raw_type_fqn map carries this file's own package prefix -- that is
  // what its has_local_types check keys on to #include this file's own
  // generated types header. Every existing Request-shape contract in the
  // tree happens to also carry an Information-shape service in the same
  // file (a google.protobuf.Empty rpc request, the *other* branch of that
  // check), which masks this being the only path that actually fires for
  // a Request-shape-only file; this fixture has no Information service,
  // so it needs the explicit qualification. Pre-existing generator detail,
  // not a Phase 2 concern -- worked around here rather than touched.
  rpc Create(pyramid.components.interaction_facade_fixture.widget.services.consumed.Widget_Service_Request)
      returns (pyramid.data_model.common.Ack);
  rpc Read(pyramid.data_model.common.Query) returns (stream Widget_Service_Entity);
  rpc Update(Widget_Service_Entity) returns (pyramid.data_model.common.Ack);
  rpc Cancel(pyramid.data_model.base.Identifier) returns (pyramid.data_model.common.Ack);
}
